# ============================================================
# NPC 知识池汇总（knowledge_pool + blind_spots）
# 每个 NPC 的知识池在首次出场时定义，后续循环不变。
# state 文件中通过 "# 知识池见 npc_knowledge_pools.yaml → {npc}" 引用。
#
# 校准依据: 剧情设计/Unit2/ 全部设计文档（人物设定、循环指证设计、证据设计、大纲）
# 校准日期: 2026-03-02
# ============================================================

# ═══════════════════════════════════════
# Morrison — 首次出场: Loop 1（Expose 对象）
# ═══════════════════════════════════════

morrison:
  knowledge_pool:
    case:
      - 死者真实身份是Frank Kowalski（73岁退休工人，钱包幸存可辨认）
      - 收到匿名电话："不要多管Margaret Brennan的事"
      - 自己在造假（故意说死者是Margaret来草率结案）

  blind_spots:
    - Frank的死因是钝器伤而非火灾
    - 谁打了匿名电话
    - Leonard和银行的完整牵连
    - Vinnie的存在和角色

# ═══════════════════════════════════════
# O'Hara — 首次出场: Loop 2（非说谎者，邻居证人）
# ═══════════════════════════════════════

ohara:
  knowledge_pool:
    frank:
      - 快十年的老邻居
      - 腿不好，1912年港口事故伤的
      - 算清银行超额收费，在整理文件准备举报
    loan:
      - 和Frank都向湖滨信托借了钱（"低利息、灵活还款"的承诺）
      - 借200扣50管理费，只拿到150
      - 钞票是崭新连号20美元面额
    rose:
      - 至少四五年前就来到这条街
    neighborhood:
      - 邻居对Frank和黑人女性来往有议论

  blind_spots:
    - Frank贷款具体利率
    - Leonard和Vinnie的指挥关系
    - Frank被杀细节
    - 银行空壳公司架构

# ═══════════════════════════════════════
# Tony — 首次出场: Loop 2（非说谎者，酒吧老板/观察者）
# ═══════════════════════════════════════

tony:
  knowledge_pool:
    vinnie:
      - Vinnie每次用崭新钞票付账
      - Vinnie口头禅"今天又赚了一笔"
      - Vinnie有一个记录地址和日期的小本子
      - Vinnie的银色打火机（侧面V字刻印，Vinnie经常在酒吧里用，到处跟人显摆）

  blind_spots:
    - Frank已死
    - Vinnie和Leonard的关系
    - 银行贷款的具体情况

# ═══════════════════════════════════════
# Vinnie — 首次出场: Loop 2（L5 Expose 对象）
# ═══════════════════════════════════════

vinnie:
  knowledge_pool:
    identity:
      - 自己是Leonard的催收打手
      - Leonard的真名是Russo
      - 自己去过Frank家多次催收
      - Frank欠银行钱
    crime:  # L5才展示
      - 自己去了鞋坊、放了火
      - Leonard杀了Frank（钝器伤）
      - 自己把尸体从地板移到了床上
      - 自己绑架了Margaret
      - 自己故意留下了打火机作为"证据"

  blind_spots:
    - Rose在附近看到了壮汉从鞋坊出来（但未直接认出是自己）
    - Tony能辨认出打火机是自己的
    - Zack有Rose的模糊目击 + Tony的打火机辨认
    - Margaret还活着

# ═══════════════════════════════════════
# Moore — 首次出场: Loop 2（L3 Expose 对象）
# ═══════════════════════════════════════

moore:
  knowledge_pool:
    frank_loan:
      - Frank欠银行超过3000美元
      - 贷款以Frank的房子为抵押
    leonard:
      - Leonard经手了Frank的全部贷款流程
      - Leonard原名Leonard Russo，改名有正式文件
    scheme:
      - 真实利率月息12%复利=年化289%
      - 合同抬头是"Moore投资公司"不是"Moore银行"
      - Leonard伪造了Frank的签名
      - Frank死后可通过合同追索房产

  blind_spots:
    - Frank已死（或者不在意）
    - Vinnie的暴力催收细节（声称不知道）
    - 匿名电话的事
    - Leonard杀了Frank的具体过程

# ═══════════════════════════════════════
# Leonard — 首次出场: Loop 2（L2 + L6 Expose 对象）
# ═══════════════════════════════════════

leonard:
  knowledge_pool:
    identity:
      - 真名Leonard Russo，改名Ross
      - 用假身份在银行工作十年
      - 人事档案背景调查栏空白
    crime_network:
      - 利率是月息12%复利（年化289%），对外报7%
      - Vinnie是自己雇的催收打手（童年伙伴）
      - 连号钞票分赃机制（取款时一分为二）
      - Frank欠的钱是被利滚利的，不是赌博
      - Moore是真正的决策者
      - "更上面还有更危险的人"（Miller集团）
    murder:  # L6指证时才成为焦点
      - 11/6去鞋坊试图说服Frank交出举报材料
      - 争执中用烛台打了Frank，Frank倒地死亡
      - 逃离时眼镜摔碎，碎片嵌入烛台
      - 打电话叫Vinnie来处理
      - 打卡记录六点下班，之后用特权钥匙不留记录进出

  blind_spots:
    - Rose在附近看到了他离开鞋坊
    - Frank死因的法医细节（他以为打一下不会死）

# ═══════════════════════════════════════
# Danny — 首次出场: Loop 3（L4 Expose 对象）
# ═══════════════════════════════════════

danny:
  knowledge_pool:
    frank:
      - Frank去世了
      - 叔叔借了一笔钱修房子，利滚利翻了好几倍
      - 见过金发西装男（Leonard）和意大利壮汉（Vinnie）一起来催收
    rose:
      - Rose"大半年前"出现（❌Danny的说法，实际4-5年）
      - 邻居议论后Rose不再公开露面
      - 遗嘱被改了，Rose的名字在上面
    self:
      - 自己失业，欠房东房租
      - 房子在拆迁区，有补偿价值
      - 从乡下来芝加哥，Frank帮忙找到工作

  blind_spots:
    - Rose藏在Margaret鞋坊地下室
    - Rose和Frank相识五年（不是大半年）
    - Mickey的高利贷诉讼
    - Frank的贷款具体条款（月息12%、原始金额600）
    - 银行的空壳公司架构

# ═══════════════════════════════════════
# Rose — 首次出场: Loop 4（非说谎者，核心证人）
# ═══════════════════════════════════════

rose:
  knowledge_pool:
    love:
      - 1920年在芝加哥县立医院认识Frank（她是护士，Frank摔断腿）
      - 和Frank相识整整五年
      - Frank借了600美元修地下室——Margaret免费借给他们住的
      - Rose劝过Frank不要贷款（"Frank，别去那家银行！"）
    danny:
      - Danny当着Frank的面叫她"淘金者"和种族侮辱
    witness:  # L5才释放
      - 11/6晚约9点准备去鞋坊找Frank赴约，在附近目击异常
      - 约9点多看到壮汉从鞋坊匆忙离开（块头大、深色衣服、像意大利人），天太暗看不清脸
      - 鞋坊窗户已经在冒烟

  blind_spots:
    - 银行的完整诈骗架构
    - Leonard的真名是Russo
    - 意大利男是Vinnie
    - Frank当时已死（钝器伤死于火灾之前）

