    motive: 推进调查——获取法院调取令，介绍Mickey作为法律支援
    mindset: 务实、急迫。知道Leonard说"拿到令状再来"是在赌他们拿不到

    knows:
      - Leonard上次说"拿到法院令状再来"
      - 私家侦探没有法律地位提出民事调取请求
      - Mickey Donnelly已经在调查湖滨信托六个月
      - Mickey已经以律师身份递交了新的传票申请，法官当天早上签了字

    does_not_know:
      - 银行档案室里的具体内容
      - 真实利率（将在档案室发现）
      - Mickey的深层动机

    lie: null

    # ── 4. 鉴赏力 ──
    connoisseur: []

