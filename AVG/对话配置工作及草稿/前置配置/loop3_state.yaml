expose:
  target: Harold Moore (206)
  total_rounds: 3

  round_1:
    lie: "所有文件都是Frank本人亲自签署的，自愿签字。"
    lie_source: 证词 2061001
    usable_evidence:
      - id: 2301
        name: 牛奶订购签收单
        用途: Frank真实笔迹参照
      - id: 2701
        name: Frank签名样本[派生自2301]
        用途: 字迹颤抖有力，与贷款申请表上的光滑精准签名完全不同
      - id: 2303
        name: 银行内部档案
        用途: Leonard代签的记录
    result: Moore承认Leonard"在签字程序上超越了权限"，转入利率合规的新谎言

  round_2:
    lie: "利率和条款合法合规，经过法务部审查。"
    lie_source: Moore的新谎言（Round 1后退守）
    usable_evidence:
      - id: 2305
        name: 贷款协议-利率条款
        用途: 月息12%复利=年化289%（法定上限7%的40倍）
      - id: 2306
        name: 贷款协议-账户服务条款
        用途: 逾期利滚利机制
      - id: 2308
        name: 贷款协议-管理费条款
        用途: $50/月管理费，$600本金不到一年变$3200+
    result: Moore被逼到墙角，暗示Zack"看看你手里拿的到底是什么"——引向空壳公司

  round_3:
    lie: "你拿不出真正关键的信息，上法庭只会自取其辱。"
    lie_source: Moore的最后挣扎
    usable_evidence:
      - id: 2061002
        name: Moore证词——协议抬头
        用途: 抬头是"Moore Investment Company投资协议"而非"Moore Bank贷款协议"
      - id: 2314
        name: Frank的日记
        用途: Frank写的是"去Moore银行借钱"——他以为签的是银行贷款
    result: |
      空壳公司骗局被拆穿。
      Moore承认条款"激进"，否认谋杀。
      作为交易筹码提供Frank遗嘱——全部个人财产留给Rose Martinez，Danny不在遗嘱上。
      Moore警告："遗嘱继承人会继承他的资产，也会继承他的债务。"

  派生证据:
    - id: 2701
      name: Frank签名样本
      source: 2301（牛奶订购签收单）分析获取

doubts:
  - id: 2301
    text: "贷款协议是Frank自己签的吗？"
    unlock_condition: "item:2301 + item:2701 + item:2303"
  - id: 2302
    text: "协议条款是否合法？"
    unlock_condition: "item:2305 + item:2306 + item:2308"
  - id: 2303
    text: "Moore Investment是银行还是投资公司？"
    unlock_condition: "testimony_item:2061002 + item:2314"
