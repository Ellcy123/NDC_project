# 玩家视角（本循环）
# ═══════════════════════════════════════

player_context:
  goals:
    primary: "Leonard不让碰的银行记录里藏着什么？"
    secondary:
      - "Mickey是谁？他的法律资源哪来的？"
  known_facts:
    - "Leonard-Vinnie雇佣催收+连号钞票分赃"
    - "Leonard原名Russo，假身份十年"
    - "Frank欠3000+，但原始贷款金额不明"
  new_directions:
    - direction: "银行档案室"
      trigger: "Mickey提供法院调取令"
    - direction: "Frank的签名真伪"
      trigger: "Leonard说帮Frank填表"
  post_expose_knowledge:
    - "月息12%=年化289%，600变3200+"
    - "Leonard代签，合同是空壳投资公司"
    - "遗嘱全留给Rose Martinez"
    - "Danny不在遗嘱上"

