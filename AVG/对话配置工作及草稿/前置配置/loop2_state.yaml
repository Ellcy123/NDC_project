# ============================================================
# Loop 2 — 威胁链条 + 连号钞票
# 本循环说谎者: Leonard Ross
# 核心揭示: 湖滨信托掠夺性贷款，Leonard-Vinnie催收共谋
# 前序事件: Morrison被拆穿，Frank身份确认，匿名电话曝光
# 时间: 11/7 10:00 白天
# ============================================================

# ═══════════════════════════════════════
# 玩家上下文（Player Context）
# ═══════════════════════════════════════

player_context:
  goals:
    primary: "Frank为什么被杀？谁在威胁南区？"
    secondary:
      - "匿名电话是谁打的？"
      - "Morrison交易条件是否值得信任？"
  known_facts:
    - "死者是Frank Kowalski（73岁退休工人），不是Margaret"
    - "Morrison故意谎报死者身份，出于私怨+匿名电话施压"
    - "Margaret下落不明（失踪）"
    - "尸检报告尚未出具，但骨骼结构不像女性"
  new_directions:
    - direction: "南区威胁网络"
      trigger: "Emma调查发现O'Hara被威胁、Frank住在鞋坊旁边"
    - direction: "银行贷款"
      trigger: "场景道具催款单指向湖滨信托银行"
  post_expose_knowledge:
    - "Leonard真名Russo，雇佣Vinnie暴力催收"
    - "连号钞票证明Leonard-Vinnie分赃"
    - "Leonard威胁：没搜查令你碰不到银行记录"

# ═══════════════════════════════════════
# PART 1: 开篇
# ═══════════════════════════════════════

opening:
  scene_id: 2021
  characters: [Zack, Emma]
  purpose: Emma展示调查地图，规划前往O'Hara家/赌场/银行
  talk: emma_002

  emma_002:
    is_liar: false
    motive: 交换信息——她在Zack审讯Morrison期间独立调查了南区
    mindset: 警觉且有原则，担心Zack会为了救Margaret而替Morrison卖命

    knows:
      - Morrison在说谎（不意外）
      - Frank住在第15街
      - O'Hara（寡妇带女儿）住在Frank隔壁，不肯给Emma开门，很害怕
      - 鞋坊就在Frank家旁边
      - 纵火犯烧了鞋坊但没碰Frank的家——目标可能是Margaret（误伤Frank），也可能本来就是冲Frank去的

    does_not_know:
      - O'Hara被谁威胁
      - 银行贷款的具体情况
      - Leonard和Vinnie的存在

    lie: null

