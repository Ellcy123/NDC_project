expose:
  target: Leonard Ross/Russo (204)
  total_rounds: 3

  round_1:
    lie: "我叫Leonard Ross。我不认识什么Russo，也不认识什么Vinnie。"
    lie_source: 证词 2041001
    usable_evidence:
      - id: 2051002
        name: Vinnie口误（证词）
        用途: Vinnie看到Leonard照片时说出"Russo"而非"Ross"
      - id: 2041002
        name: Leonard曾用名（Moore提供）
        用途: Moore确认Leonard入职档案有改名文件，原名Russo
    result: Leonard承认童年认识Vinnie，但声称"现在没有任何往来"

  round_2:
    lie: "我和Vinnie之间不存在任何金钱往来。一分钱都没有。"
    lie_source: Leonard的新谎言（Round 1后退守）
    usable_evidence:
      - id: 2207
        name: O'Hara的贷款钞票
        用途: 连号序列A73625900B-914B，其中905-908缺失
      - id: 2208
        name: Vinnie的钞票
        用途: 3张$20美钞，序列号A73625905B、906B、908B——与O'Hara钞票缺失序列吻合
    result: 同一次取款分成两份——一份给借款人，一份作为Vinnie的抽佣。Leonard承认"偶尔让Vinnie跑跑腿"

  round_3:
    lie: "我借了他一点钱，让他去帮忙催收而已。这在行业里很常见。"
    lie_source: Leonard的新谎言（Round 2后继续缩小）
    usable_evidence:
      - id: 2111001
        name: Tony证词——"今天又赚了一笔"
        用途: Vinnie每次付账都说这句话——不像还债，像领工资
      - id: 2213
        name: Vinnie催债小本子
        用途: 系统性记录地址/日期，含备注"L.R.给的地址有问题"（L.R.=Leonard Russo）
    result: |
      Leonard承认系统性雇佣Vinnie催收。
      但威胁Zack："你没有搜查令，银行的内部记录你连碰都碰不到。"

doubts:
  - id: 2201
    text: "Leonard和Vinnie是什么关系？"
    unlock_condition: "testimony:2051002 + testimony:2041002"
  - id: 2202
    text: "连号钞票证明了什么？"
    unlock_condition: "item:2207 + item:2208"
  - id: 2203
    text: "Vinnie的收入来源是什么？"
    unlock_condition: "testimony:2111001 + item:2213"
