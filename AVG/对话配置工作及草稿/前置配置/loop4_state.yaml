expose:
  target: Danny Kowalski (207)
  total_rounds: 3
  design_note: "三轮按'物证否定时间线 → 文件证据否定动机 → 当面对质否定核心指控'递进"

  danny:
    talk: loop4_danny
    is_liar: true
    motive: 保住继承权——如果能证明Rose是骗子，遗嘱就可以被推翻
    mindset: 被逼到墙角（遗嘱曝光后他公开暴走），但仍然觉得"血缘=正义"
    # 知识池见 npc_knowledge_pools.yaml → danny

    # ── 2. 玩家询问意图 ──
    # Danny是Expose对象，玩家在指证中被动回应而非主动提问
    player_inquiry: null
    # lie 详见下方 expose round_1 ~ round_3

  round_1:
    lie: "那个女人才认识我叔叔不到一年！"
    lie_source: 证词 2071001
    usable_evidence:
      - id: 2401
        name: 房间旧沙发
        用途: 沙发磨损程度=3-5年，扶手缝补针脚是护士手法
      - id: 2402
        name: 褪色窗帘
        用途: 花色严重褪色=至少悬挂三到五年阳光照射
      - id: 2403
        name: 地板磨痕
        用途: 固定位置磨损匹配Rose鞋码，从楼梯到床铺区域的路径
    result: Danny退守——"就算她住了五年又怎样！这恰恰说明她花了五年时间来算计我叔叔！"

  round_2:
    lie: "Rose骗我叔叔去贷款！六百美元！她把我叔叔害得倾家荡产！"
    lie_source: Danny的新谎言（Round 1后转向贷款）
    usable_evidence:
      - id: 2407
        name: 贷款申请表
        用途: 用途栏写的是"房屋维修——Margaret的地下室"
      - id: 2408
        name: 房间维修收据
        用途: 基础装修费用，合理范围
      - id: 2409
        name: Margaret租赁协议
        用途: Margaret免费借地下室给Frank和Rose住
      - id: 2081002
        name: Rose证词
        用途: Rose反对贷款，Frank坚持"不能让女人养自己"
    result: Danny再退守——"有恩必报？叔叔借六百块给别人修房子，自己欠一屁股债——这叫被人利用！"

  round_3:
    lie: "Rose就是为了遗产！她想拿走叔叔的一切！"
    lie_source: Danny的最后防线
    usable_evidence:
      - id: 2412
        name: 遗嘱附加条款
        用途: Frank写了"若Rose不愿接受，捐给工人互助会"——Frank知道Rose会拒绝
      - id: 2081003
        name: Rose证词——愿意捐赠
        用途: Rose早就对邻居说过会捐出去
      - id: 2414
        name: Rose放弃继承声明
        用途: Rose当场签字放弃继承权
      - id: 2416
        name: Danny经济状况证据
        用途: 失业、赌债、房子在拆迁补偿区
    result: |
      Rose本人出场，当着Danny的面签署放弃继承声明。
      Danny真实动机曝光：失业+赌债，房子在拆迁区有补偿款。
      Danny崩溃，声称案发当晚在酒吧（不在场证明待验证）。

  派生证据:
    - id: 2704
      name: Frank的银戒指（分析后）
      source: 2421
    - id: 2705
      name: 鲜活的玫瑰花束
      source: 2418 分析获取
    - id: 2706
      name: Frank的怀表和表盒
      source: 2201（L2怀表）+ 2423（空表盒）合成

doubts:
  - id: 2401
    text: "Rose和Frank认识多久了？"
    unlock_condition: "item:2401 + item:2402 + item:2403"
  - id: 2402
    text: "贷款的真实用途是什么？"
    unlock_condition: "item:2407 + item:2408 + item:2409"
  - id: 2403
    text: "遗嘱真的对Rose有利吗？"
    unlock_condition: "item:2412 + testimony:2081003 + item:2414"
  - id: 2404
    text: "Danny争遗产的真实动机是什么？"
    unlock_condition: "item:2416 + item:2412"
