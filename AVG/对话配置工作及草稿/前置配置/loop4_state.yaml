# ============================================================
# Loop 4 — Rose的黄昏之爱
# 本循环说谎者: Danny（Expose对象）
# 核心揭示: Frank和Rose相恋五年（非大半年），贷款是为了爱不是赌博
# 前序事件: Moore空壳公司被拆穿，遗嘱曝光（全部留给Rose），Danny暴走
# 时间: 11/7 17:30 白天
# ============================================================

# ═══════════════════════════════════════
# 玩家视角（本循环）
# ═══════════════════════════════════════

player_context:
  goals:
    primary: "Rose是谁？她和Frank什么关系？Danny的指控成立吗？"
    secondary:
      - "Leonard的三年从业空白是什么？"
  known_facts:
    - "遗嘱全留给Rose Martinez"
    - "Moore空壳公司骗局（月息12%=年化289%）"
    - "Danny不在遗嘱上"
  new_directions:
    - direction: "Rose的真实身份"
      trigger: "遗嘱曝光，Danny指控Rose是骗子"
    - direction: "物理证据验证居住时间"
      trigger: "Danny说'大半年'vs需要独立验证"
  post_expose_knowledge:
    - "Rose和Frank相爱五年，贷款为修地下室"
    - "Rose当场放弃继承"
    - "Danny真实动机：失业+赌债+拆迁补偿"
    - "保险箱钥匙→下一循环"

# ═══════════════════════════════════════
# PART 1: 开篇
# ═══════════════════════════════════════

opening:
  scene_id: 2041
  characters: [Zack, Moore]
  purpose: Moore提供遗嘱副本，Danny对遗嘱不满
  talk: emma_004

  emma_004:
    is_liar: false
    motive: 交换隔夜情报——Moore的律师送来遗嘱副本，Danny在银行闹事，Leonard有三年空白
    mindset: 高效、紧迫。连夜调查后很疲倦但不会表现出来

    knows:
      - Moore的律师把Frank遗嘱副本塞在Zack办公室门下
      - Danny去湖滨信托砸椅子，大喊遗嘱是假的、Rose操纵签字
      - Leonard的从业登记有三年空白——声称十年，公开记录只有七年
      - Rose一直住在Frank的地下室（未烧毁的部分），在整理Frank的遗物

    does_not_know:
      - Leonard三年空白期干了什么
      - Rose和Frank的具体相识过程
      - Danny砸银行是真崩溃还是演戏

    lie: null

    # ── 4. 鉴赏力 ──
    connoisseur: []

