    npcs:
      margaret:
        talk: margaret_testimony
        is_liar: false
        motive: 提供案发当晚目击证词——她看到了戴眼镜西装男
        mindset: 刚苏醒，虚弱但清醒。头部受伤导致记忆模糊，努力拼合案发经过

        # ── 4. 鉴赏力 ──
        connoisseur:
          - type: quiz
            node: "#015"
