# ============================================================
# Loop 6 — Leonard终极指证
# 本循环说谎者: Leonard Ross/Russo（最终Expose对象，4轮）
# 核心揭示: Leonard才是杀人凶手，Vinnie是自愿扛罪的替死鬼
# 前序事件: Vinnie虚假认罪被识破，Mickey救出Margaret，"Leo"名字曝光
# 注意: Danny不出场（L4退场），Vinnie已被逮捕
# 时间: 11/8 09:00 白天
# ============================================================

# ═══════════════════════════════════════
# 玩家视角（本循环）
# ═══════════════════════════════════════

player_context:
  goals:
    primary: "Leonard是真凶吗？如何证明？"
    secondary:
      - "Vinnie的认罪为什么有破绽？"
      - "Margaret能提供什么证词？"
  known_facts:
    - "Rose目击：9点多壮汉匆忙离开（体格吻合Vinnie）"
    - "Tony辨认打火机为Vinnie所有"
    - "Vinnie虚假认罪：不知凶器、犹豫说助燃剂"
    - "Leo=Leonard，Vinnie在保护他"
    - "Margaret被救，等待苏醒"
  new_directions:
    - direction: "Margaret的目击证词"
      trigger: "Margaret苏醒，看到戴眼镜男人"
    - direction: "Leonard的物证链"
      trigger: "搜查令批准，可搜Leonard住所"
    - direction: "Vinnie证词的逻辑漏洞"
      trigger: "Vinnie说'床上睡觉'vs验尸报告"
  post_expose_knowledge:
    - "Leonard用烛台打死Frank"
    - "Vinnie移尸、纵火、绑架Margaret"
    - "'床上'vs'地上'致命矛盾"
    - "Leonard以真名Russo被捕"

# ═══════════════════════════════════════
# PART 1: 开篇
# ═══════════════════════════════════════

opening:
  # 两个开篇场景：救援Margaret → Margaret苏醒提供证词

  scene_1:
    scene_id: 2061
    characters: [Zack, Emma, Margaret]
    purpose: 救援被困的Margaret
    talk: emma_007

    emma_007:
      is_liar: false
      motive: 与Zack在最终对决前整理全部证据链
      mindset: 沉稳、肃穆。站在废墟里回顾整个案件

      knows:
        - 全部前序证据链的汇总
        - Leonard Ross = Leonard Russo，假名假履历十年
        - Vinnie是工具/替罪羊，纵火是Vinnie干的，杀人是眼镜男
        - 搜查令批下来了，证人苏醒了，证据链闭合了

      does_not_know: []
      lie: null

  scene_2:
    scene_id: 2062
    characters: [Zack, Emma, Margaret]
    purpose: Margaret恢复意识，证词称看到戴眼镜男人；申请搜查令
    talk: emma_006

    emma_006:
      is_liar: false
      motive: 传递突破性消息——Margaret苏醒了，提供了关键目击证词
      mindset: 激动但专业。这是全案的转折点

      knows:
        - Margaret一小时前恢复意识，能断续说话
        - Margaret约8点多外出买东西，回来路上看到一个戴眼镜深色西装男从鞋坊方向匆匆离开，走路踉跄好像看不清路
        - Margaret进门后发现Frank倒在地上，头上全是血
        - Margaret蹲下查脉搏时被人从背后打晕
        - Emma已经递交了搜查令申请（Leonard住所+银行办公室），法官当天早上签字

      does_not_know:
        - 打晕Margaret的人是谁（Vinnie）
        - Leonard的完整犯罪过程

      lie: null

      # ── 3. 可提取证词 ──
      testimony_ids:
        - 2021006  # Margaret目击：约八点一刻，戴眼镜深色西装男从鞋坊方向匆匆离开
        - 2021008  # Margaret在鞋坊被人从背后打晕

      # ── 4. 鉴赏力 ──
      connoisseur:
        - type: source
          content: "SC2002火灾现场烛台：铜质/黄铜，高约30cm"
          note: "场景道具/证据——本循环margaret quiz#015考这个"

