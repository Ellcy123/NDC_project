        motive: 维持银行家体面——声称不在场证明，撇清与Frank之死的关系
        mindset: 职业化冷漠。西装笔挺，语气礼貌但疏离，把Frank的死当成"令人遗憾的意外"。内心深处的Leonard Russo已经被埋葬十年
        # 知识池见 npc_knowledge_pools.yaml → leonard

        # ── 1. NPC 已知信息 ──
        awareness:  # 以下为L6新获知信息，基础知识见 npc_knowledge_pools.yaml → leonard
