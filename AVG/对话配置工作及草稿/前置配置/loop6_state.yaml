# ═══════════════════════════════════════
# PART 3: 指证（Expose）
# ═══════════════════════════════════════

expose:
  target: Leonard Russo/Ross (204)
  total_rounds: 4
  design_note: "四轮按'间接证据(眼镜片+目击) → 物证链(配镜收据+处理痕迹) → 法医证据(烛台+验尸) → 逻辑陷阱(倒在地上vs床上睡觉)'递进，中间嵌入诱导招供系统"

  round_1:
    lie: "案发当晚我整晚都在家。我从来没有去过那个鞋坊。"
    lie_source: 证词 2042001
    usable_evidence:
      - id: 2601
        name: 烛台（凶器）
        用途: 底部嵌有眼镜碎片
      - id: 2021006
        name: Margaret目击证词
        用途: 约八点一刻看到戴眼镜深色西装男从鞋坊方向匆匆离开
    result: Leonard无法否认现场有戴眼镜的人，转入否认眼镜是自己的

  round_2:
    lie: "那不是我的眼镜！谁都可能戴眼镜！你的证据太牵强了。"
    lie_source: Leonard的新谎言
    usable_evidence:
      - id: 2604
        name: Leonard的眼镜（当场观察）
        用途: 左片新/透亮，右片旧/发黄——近期只换了一片
      - id: 2505
        name: 眼镜维修单据（L5在Leonard住所找到）
        用途: Hoffman眼镜店Clark街分店，日期11月7日（案发次日），Leonard让Vinnie代办
    result: Leonard承认眼镜是自己的，转入"只是去拜访"

  round_3:
    lie: "我只是去拜访Frank，想劝他不要和银行作对。谈话中不小心摔坏了眼镜，但我绝对没有伤害他！"
    lie_source: Leonard的新谎言
    usable_evidence:
      - id: 2601
        name: 烛台（凶器）
        用途: 烛台底部凹痕与Frank致命颅骨伤口完全匹配
      - id: 2613
        name: 法医鉴定报告
        用途: Frank死于钝器伤，在火灾之前；Leonard的眼镜碎片嵌在烛台底部
    result: 进入诱导招供系统（见下方）

  inducement_system:
    name: 诱导招供
    trigger: Round 3结束后，Round 4之前
    mechanism: |
      Zack告诉Leonard"Vinnie已经认了纵火杀人"，让Leonard以为承认打人不会更糟。
      3个选择节点，温和选项填充招供槽，威胁选项降低招供槽。
      填满100%触发QTE，Leonard崩溃供述。
    nodes:
      - node: 1
        gentle: "Vinnie已经认罪了......那也是Vinnie的事了"
        gentle_effect: "+30%"
        threat: "你最好老实交代！"
        threat_effect: "-20%"
      - node: 2
        gentle: "Vinnie已经认了纵火杀人......说出来对你没有坏处"
        gentle_effect: "+40%"
        threat: "证据确凿！强制措施！"
        threat_effect: "-30%"
      - node: 3
        gentle: "发生了什么，Leonard？"
        gentle_effect: "+30% → 100%触发QTE"
        threat: "你最好现在就承认！"
        threat_effect: "-30%"
    success_confession: |
      "我承认。我用烛台打了他。"
      Leonard叙述争执经过、抓起烛台、Frank倒地、血、无法止血、Frank沉默看着他、逃离。
      但坚持："我离开的时候他还活着！我确定！他还在呼吸！"

  round_4:
    lie: "我确实打伤了Frank，但他当时还活着！是Vinnie说这老家伙不听话，不如直接死了算了，然后放火烧死了他！"
    lie_source: Leonard的最终谎言（诱导招供后）
    usable_evidence:
      - id: 2051004
        type: testimony
        name: Vinnie认罪证词（循环5）
        用途: |
          Vinnie说："我透过窗户看到那老头正在床上睡觉，然后我放了火。"
          Leonard说：Frank"受伤倒在地上"。
          矛盾：Vinnie说"床上"是因为他把尸体从地板搬到了床上（伪装睡眠中死亡）。
          Leonard说"地上"是因为只有打人的人才知道Frank是倒在地板上的。
          如果Vinnie看到的是"受伤倒在地上"，他为什么说"床上睡觉"？
          因为Vinnie到的时候Frank已经死了——Vinnie自己布置了现场。
    result: |
      Leonard被逻辑陷阱彻底击溃。
      完整供述：Frank发现掠夺性贷款要举报 → Leonard去劝 → Frank拒绝（"他说宁愿坐牢也不会让我继续害人"）→
      Frank转身拿文件 → Leonard抓起烛台 → Frank倒地 → 打电话给Vinnie → Vinnie说"我来处理"→
      Vinnie到达后移尸、纵火、绑架Margaret。
      Leonard以Leonardo Russo真名被逮捕，罪名：谋杀Frank Kowalski。

  派生证据:
    - id: 2702
      name: Vinnie的连号新钞
      source: 2208（L2 Vinnie钞票）分析获取
    - id: 2703
      name: 高利贷算式铁证
      source: 分析获取
    - id: 2707
      name: Leonard与Vinnie童年合照
      source: 2318（L3旧照片）+ 2506（L5空相框）合成

doubts:
  - id: 2601
    text: "Leonard当晚去过现场吗？"
    unlock_condition: "item:2601 + testimony:2021006"
  - id: 2602
    text: "眼镜碎片是谁的？"
    unlock_condition: "item:2604 + item:2505"
  - id: 2603
    text: "Frank是怎么死的？"
    unlock_condition: "item:2601 + testimony:2051004"
  - id: 2604
    text: "Vinnie的认罪证词有什么矛盾？"
    unlock_condition: "testimony:2051004 + testimony:2042001"
  - id: 2605
    text: "两个目击证人看到的是同一个人吗？"
    unlock_condition: "testimony:2021006 + testimony:2081005"
  - id: 2606
    text: "为什么要纵火？"
    unlock_condition: "item:2613 + item:2507"

ending:
  - id: 2063
    name: 监狱（Vinnie表白）
  - id: 2064
