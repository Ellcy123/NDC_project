# ============================================================
# Loop 1 — 残酷的身份确认
# 本循环说谎者: Morrison
# 核心揭示: 死者不是Margaret，是Frank Kowalski；Morrison腐败渎职
# 时间: 11/6 21:00 夜晚
# ============================================================

# ═══════════════════════════════════════
# 玩家视角（本循环）
# ═══════════════════════════════════════

player_context:
  goals:
    primary: "死者真的是Margaret吗？"
  known_facts: []  # 第一个循环，玩家什么都不知道
  new_directions:
    - direction: "婚戒矛盾"
      trigger: "尸体手指无戒指，Margaret从不摘"
  post_expose_knowledge:
    - "死者是Frank Kowalski，不是Margaret"
    - "Morrison故意谎报，出于私怨+匿名电话"
    - "Margaret下落不明"

# ═══════════════════════════════════════
# PART 1: 开篇
# ═══════════════════════════════════════

opening:
  scene_id: 2012
  characters: [Zack, Emma, Morrison]
  purpose: 独自抵达火灾现场 → Emma和Morrison到场，Morrison声称死者是Margaret
  talk: emma_001

  emma_001:
    is_liar: false
    motive: 向Zack传递火灾现场第一手情报，引导他注意Morrison的可疑行为
    mindset: 冷静但内心焦急——Margaret是Zack的母亲，但她强迫自己用事实说话

    knows:
      - 鞋坊着火，里面有一具烧焦的尸体
      - Morrison声称死者是Margaret，但没做任何验证
      - Morrison说"老房子电线老化"但连进去看都没看
      - Morrison的人只拍了照就准备收队
      - Foster是辖区法医，尸检不归Morrison管

    does_not_know:
      - 死者的真实身份（Frank Kowalski）
      - Morrison收到过匿名电话
      - Frank的钱包在废墟中幸存

    lie: null

    # ── 4. 鉴赏力 ──
    connoisseur:
      - type: source
        content: Morrison提到鞋坊位于南区33号
        note: "L2 leonard_001 #004 入场鉴赏力考这个"

# ═══════════════════════════════════════
# PART 2: 自由探索
# ═══════════════════════════════════════

scenes:
  - id: 2102
    name: Margaret鞋坊-店铺区
    evidence:
      - id: 2101
        name: 尸体手指照片
        note: 场景道具——尸体手指无婚戒，无金属残留
      - id: 2104
        name: 现场地面照片
        note: 场景道具——废墟中未发现金属戒指残留
      - id: 2106
        name: 鞋坊营业记录
      - id: 2107
        name: Frank的拐杖

  - id: 2103
    name: Margaret鞋坊卧室区
    evidence:
      - id: 2102
        name: Margaret的相册
        note: 关键——相册照片中Margaret从不摘婚戒
      - id: 2103
        name: 空的首饰盒
        note: 关键——首饰盒空了但无戒指在现场
      - id: 2108
        name: Margaret的通信小本
        note: 关键证据
      - id: 2109
        name: Patrick的教师证
      - id: 2110
        name: Patrick的遗物匣

  - id: 2104
    name: 警局外（电话亭）
    evidence:
      - id: 2112
        name: 蓝月亮酒吧事件报纸
    npcs:
      emma_foster:
        talk: emma_foster
        is_liar: false
        motive: 传递Foster的法医初检发现，推翻Morrison的草率结论
        mindset: 极度克制的专业状态——知道结果意味着Margaret可能还活着，但不敢高兴太早

        knows:
          - Foster认为骨骼结构不像女性
          - 尸体烧损太严重，光看外观连男女都分不出
          - 起火点在一楼店面中央，地下室烧损较轻
          - Foster的父亲死于1912年港口事故
          - Morrison在骗人——要么知道死者不是Margaret，要么根本没查过

        does_not_know:
          - 死者就是Frank Kowalski
          - Frank被谋杀（钝器伤，死在火灾之前）
          - Margaret被绑架

        # ── 2. 玩家询问意图 ──
        player_inquiry:
          - "Morrison说死者是Margaret但没验证——需要法医专业意见"  # 9
          - "现场是火灾，需要专业分析"  # 7
          - "补充人物背景，非核心调查方向"  # 4

        # ── 3. 可提取证词 ──
        testimony_ids:
          - 2021002  # Foster法医判断起火点在一楼，地下室烧损较轻，典型人为纵火

        # ── 4. 鉴赏力 ──
        connoisseur: []

# ═══════════════════════════════════════
# PART 3: 指证（Expose）
# ═══════════════════════════════════════

expose:
  target: Morrison (203)
  total_rounds: 3

  morrison:
    talk: loop1_morrison
    is_liar: true
    motive: 尽快结案，报复Zack（蓝月俱乐部案的私怨），同时隐瞒匿名电话
    mindset: 傲慢、不把Zack放在眼里，觉得一个私家侦探翻不了天

    # ── 1. NPC 已知信息 ──
    # 知识池见 npc_knowledge_pools.yaml → morrison

    # ── 2. 玩家询问意图 ──
    player_inquiry:
      - "核心悬念：死者是不是Margaret"  # 10
      - "Expose中被逼出，不是主动问的"  # 0

    # lie 详见下方 expose round_1 ~ round_3

  round_1:
    lie: "死者应该就是Margaret，我基于现场情况做出的判断"
    lie_source: 证词 2031001
    usable_evidence:
      - id: 2101
        name: 尸体手指照片
        用途: 尸体手指无婚戒
      - id: 2102
        name: Margaret的相册
        用途: 相册照片中Margaret从不摘婚戒
      - id: 2103
        name: 空的首饰盒
        用途: 首饰盒空了但无戒指在现场
    result: Morrison无法解释戒指去向，但用"火灾可能烧毁了戒指"搪塞，转入新防线

  round_2:
    lie: "火灾很猛烈，戒指可能在火灾中被烧毁了"
    lie_source: Morrison对round_1婚戒矛盾的搪塞
    usable_evidence:
      - id: 2104
        name: 现场地面照片
        用途: 真金不怕火炼——黄金熔点1064°C，普通火灾无法烧毁；废墟中未发现任何金属戒指残留
    result: 物理事实击穿"烧毁"借口，Morrison被迫承认没有核实死者身份，用"我有尸检调查信息"虚张声势反击

  round_3:
    lie: "我有尸检调查信息可以证明死者身份"
    lie_source: Morrison虚张声势
    usable_evidence:
      - id: 2021001
        name: Foster口供（Emma转述）
        用途: 报告最快明天出，连性别都无法确定——Morrison根本没有法医依据
    result: |
      Morrison彻底崩溃，承认：
      - 出于蓝月俱乐部案的私怨故意误导
      - 收到匿名电话"不要多管Margaret Brennan的事"
      - 死者真实身份是Frank Kowalski（73岁，退休工人）
      获得证据：2111（Frank的钱包）
      提出交易：Zack查Frank的死，Morrison查Margaret下落

doubts:
  - id: 2101
    text: "死者真的是Margaret吗？"
    unlock_condition: "item:2101 + item:2102 + item:2103"
  - id: 2102
    text: "Morrison为什么要误导身份确认？"
    unlock_condition: "testimony:2031001 + item:2104"
  - id: 2103
    text: "Morrison声称的法医依据可靠吗？"
    unlock_condition: "testimony:2021001 + testimony:2031001"
