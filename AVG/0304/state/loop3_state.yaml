# ═══════════════════════════════════════
# PART 3: 指证（Expose）
# ═══════════════════════════════════════
#
# 场景状态表: 银行贵宾室 → ⚔️指证(Moore) → 🎭结尾
# 指证设计: 3轮（"Frank亲自签字" → "条款合法" → "投资公司合法，去告我啊"）

expose:
  target: "Moore (06)"
  total_rounds: 3
  # Moore的Talk/证词见上方 scenes → SC2008 → moore_001

  # ── 第一轮：戳破"Frank亲自签字" ──
  # 日记(2314) + 签名对比(2302 vs 2303) → 笔迹造假
  round_1:
    lie: "这是Frank亲自签字的贷款申请，他清楚知道自己在借什么钱"
    lie_source: "证词 2061003"
    usable_evidence:
      - id: 2314
        name: "Frank的日记"
        用途: "'Leonard说我年纪大了手抖，他帮我填表，我只要签个字就行'——Frank根本没亲自填写"
      - id: 2302
        name: "Frank签名样本（胶带）"
        用途: "Frank真实笔迹颤抖歪斜——与银行档案流畅有力的签名完全不同"
      - id: 2303
        name: "湖滨信托银行内部档案"
        用途: "档案签名工整流畅，备注'客户口头确认'——这是Leonard代签的证据"
    result: |
      Moore被迫承认Leonard代填：
      - 日记证明Frank只是"签个字"，不知道具体内容
      - 笔迹对比证明签名不是Frank的
      - Moore辩解"口头确认"但日记只写"借点钱"，没提赌博、没提$3,200
      - Moore升级谎言："好吧Frank不清楚，但协议条款完全合法"

  # ── 第二轮：揭露条款系统性违法 ──
  # 利率(2305) + 利滚利(2306) + 管理费(2308) → 多处违法
  round_2:
    lie: "协议条款完全合法，Leonard填的每一条都符合法律规定"
    lie_source: "Moore对Round 1的新谎言"
    usable_evidence:
      - id: 2305
        name: "贷款协议-利率条款"
        用途: "月利率12%复利=年化289%，州法上限7%，超标40倍"
      - id: 2306
        name: "贷款协议-账户服务条款"
        用途: "'未偿还利息自动计入本金'=利滚利陷阱，州法禁止利息超本金100%"
      - id: 2308
        name: "贷款协议-管理费条款"
        用途: "月$50×12=$600=本金100%，用'管理费'掩盖变相高利贷"
    result: |
      多处违法条款被逐条揭露：
      - 年化289% vs 州法7% = 超标40倍
      - 利滚利让Frank永远还不清
      - 管理费$600=本金100%
      - Moore无法反驳法律证据，但突然冷静下来
      - Moore升级谎言："在我们的协议框架下是完全合法的，去法院告我吧"
      - Moore故意不说破投资公司秘密，暗示"你自己去查协议"

  # ── 第三轮：击穿投资公司马甲 ──
  # 对账单矛盾(2309) + Frank日记(2314) → 系统性欺诈
  round_3:
    lie: "你用这些去法院告我没用——你会成为小丑"
    lie_source: "Moore对Round 2的新谎言（故意隐瞒投资公司马甲）"
    usable_evidence:
      - id: 2309
        name: "客户账户对账单"
        用途: "页眉'Lakeshore Investment Co.'vs正文'Lakeshore Trust Bank'——银行用投资公司马甲规避利率限制"
      - id: 2314
        name: "Frank的日记（回顾）"
        用途: "Frank写'去Moore银行借钱'——根本不知道自己签的是投资公司协议"
