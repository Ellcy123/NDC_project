# ============================================================
# Loop 3 — Mickey登场 + 第一重反转（Frank的正义）
# 本循环说谎者: Harold Moore
# 核心揭示: Frank非赌博欠债，贷款被代签、利率违法、投资公司马甲欺诈
# 前序事件: L2揭露Leonard雇佣Vinnie催收，但法院令状被拒
# 时间: 1925年11月7日 约14:00 下午
# ============================================================

# ═══════════════════════════════════════
# 玩家视角（本循环）
# ═══════════════════════════════════════

player_context:
  goals:
    primary: "Frank的贷款真相是什么？为什么欠这么多钱？"
    secondary:
      - "贷款申请真的是Frank本人签的吗？"
      - "协议条款到底合不合法？"
  known_facts:
    # ── L1 post_expose ──
    - "死者是Frank Kowalski（73岁退休工人），不是Margaret"
    - "Morrison出于蓝月俱乐部栽赃案被揭发的私怨，故意谎报死者身份"
    - "Morrison收到匿名电话：'不要多管Margaret Brennan的事'"
    - "Margaret下落不明，疑被绑架"
    - "Morrison提出交易：Zack查Frank死因给他一个结案答案，他才去查Margaret下落"
    # ── L2 post_expose ──
    - "Leonard真名是Leonard Russo，使用假名Ross在银行工作十年"
    - "Leonard和Vinnie Moretti是旧相识（童年好友）"
    - "Leonard雇佣Vinnie暴力催收——提供目标地址，事后分钱"
    - "连号钞票证明银行→Vinnie的资金链（O'Hara少的钱出现在Vinnie手里）"
    - "Frank也是被Vinnie'特别关照'的受害者之一"
    - "Leonard威胁：没有法院令状，无法调查银行内部文件"
  new_directions:
    - direction: "贷款申请笔迹造假"
      trigger: "Frank日记写'Leonard帮我填表，我只要签个字' + 银行档案签名流畅有力——与Frank颤抖的真实笔迹完全不同"
    - direction: "条款系统性违法"
      trigger: "贷款协议月利率12%=年化289%，州法消费者贷款上限7%，超标40倍"
    - direction: "投资公司马甲"
      trigger: "协议抬头是'LAKESHORE INVESTMENT CO.'而非银行，Frank日记却说'去银行借钱'"
  post_expose_knowledge:
    - "Frank的贷款不是赌博——Leonard代填申请表，Frank不清楚具体内容"
    - "贷款协议系统性违法：月利率12%=年化289%（州法上限7%）、利滚利、管理费$600"
    - "贷款协议抬头是'Lakeshore Investment Co.'——投资公司不受银行法利率限制"
    - "Frank以为去银行借钱，实际被骗签了投资公司协议——系统性欺诈"
    - "Moore迫于谋杀案审计的恐惧，主动提供Frank遗嘱副本"
    - "遗嘱：财产归Rose Martinez（如结婚），否则捐给工人互助会；Danny不在继承人中"

# ═══════════════════════════════════════
# PART 1: 开篇
# ═══════════════════════════════════════
#
# 场景状态表: 市政厅 → 🎬开篇 → ⚡突发(Mickey)
# Zack去市政厅申请搜查令但被拒，陷入僵局。
# Mickey突然出现以律师身份递交传票，帮Zack获得银行搜查令。

opening:
  scene_id: 2010
  characters: [Zack, Emma, Mickey]
  purpose: "搜查令被拒陷入僵局——Mickey突发登场以律师身份递交传票，打破调查死结"
  talk: emma_003

  emma_003:
    is_liar: false
    motive: "协助Zack准备搜查令申请——L2证据已经证明Leonard雇佣关系，但法院要求更多证据"
    mindset: "焦虑中保持务实——预感搜查令会被驳回，但必须走完合法程序"

    knows:
      - "L2已揭露Leonard雇佣Vinnie暴力催收"
      - "Leonard威胁'没有法院令状查不到银行内部'"
      - "连号钞票和Vinnie催债小本子是目前最有力的证据"
      - "需要进入银行档案室才能查到贷款真实条款"
      - "Frank欠银行$3,200（Moore在L2声称是赌博债务）"

    does_not_know:
      - "贷款协议的真实利率（月12%=年化289%）"
      - "协议是投资公司而非银行"
      - "Frank日记中关于'Leonard帮我填表'的内容"
      - "Mickey的真实背景和来历"
      - "遗嘱中提到的Rose Martinez"

    lie: null

    # ── 4. 鉴赏力 ──
    connoisseur:
      - type: quiz
        node: "#006"
        question: "O'Hara拿到的钞票有什么特别的？"
        answer: "崭新连号20美元（来源：L2 ohara_001——O'Hara展示银行放贷给她的钞票）"

  # ── ⚡突发：Mickey登场 ──
  # 触发：开篇结束后（Zack搜查令申请被拒）
  # Mickey以律师身份突然出现，递交传票帮Zack获得银行搜查令
  sudden_event:
    name: "Mickey登场"
    trigger: "开篇结束后（Zack搜查令申请被拒）"
    characters: [Zack, Emma, Mickey]
    purpose: "打破调查僵局——Mickey以律师身份递交传票，帮Zack获得银行搜查令"
    result: |
      - 获得证据2304（银行搜查令——库克县巡回法院签发）
      - 解锁银行档案室(SC2013)和Leonard办公室(SC2014)
      - Mickey展现神秘的法律能力和人脉（伏笔）
      - Zack对Mickey十二年未联系突然出现产生好奇

