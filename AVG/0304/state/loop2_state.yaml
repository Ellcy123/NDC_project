# ============================================================
# Loop 2 — 威胁链条与负面印象建立
# 本循环说谎者: Leonard Ross（真名Leonard Russo）
# 核心揭示: Leonard雇佣Vinnie暴力催收，连号钞票证明银行→黑手党资金链
# 前序事件: L1确认死者是Frank Kowalski，Morrison摊牌交易
# 时间: 1925年11月7日 约10:00 上午
# ============================================================

# ═══════════════════════════════════════
# 玩家视角（本循环）
# ═══════════════════════════════════════

player_context:
  goals:
    primary: "Frank身上发生了什么？谁在威胁他？"
    secondary:
      - "银行和黑手党Vinnie是什么关系？"
      - "Leonard Ross到底是什么人？"
  known_facts:
    - "死者是Frank Kowalski（73岁退休工人），不是Margaret"
    - "Morrison出于蓝月俱乐部栽赃案被揭发的私怨，故意谎报死者身份"
    - "Morrison收到匿名电话：'不要多管Margaret Brennan的事'"
    - "Margaret下落不明，疑被绑架"
    - "Morrison提出交易：Zack查Frank死因给他一个结案答案，他才去查Margaret下落"
  new_directions:
    - direction: "连号钞票矛盾"
      trigger: "O'Hara贷款钞票缺失4张（905-908B），Vinnie在酒吧花的钞票恰好填补缺失（905/906/908B）"
    - direction: "Leonard双重身份"
      trigger: "Vinnie看到Leonard照片脱口而出'Russo' + Moore提供改名记录证实Leonard原名Russo"
  post_expose_knowledge:
    - "Leonard真名是Leonard Russo，使用假名Ross在银行工作十年"
    - "Leonard和Vinnie Moretti是旧相识（童年好友）"
    - "Leonard雇佣Vinnie暴力催收——提供目标地址，事后分钱"
    - "连号钞票证明银行→Vinnie的资金链（O'Hara少的钱出现在Vinnie手里）"
    - "Frank也是被Vinnie'特别关照'的受害者之一"
    - "Leonard威胁：没有法院令状，无法调查银行内部文件"

# ═══════════════════════════════════════
# PART 1: 开篇
# ═══════════════════════════════════════
#
# 场景状态表: 警局外/街道 → 🎬开篇
# L1结束后第二天上午，Zack和Emma在警局外确认调查计划——
# 从Morrison交易出发，调查Frank的背景和银行催收网络。

opening:
  scene_id: 2004
  characters: [Zack, Emma]
  purpose: "承接Morrison交易——Emma梳理已知线索，规划调查路线：先找邻居问Frank情况，再查银行"
  talk: emma_002

  emma_002:
    is_liar: false
    motive: "帮Zack理清调查优先级——Morrison的交易虽是要挟但也给了合法调查名义，必须高效利用"
    mindset: "冷静的战略规划——压下对Margaret的担忧，先完成能做的事，用行动回应Morrison的要挟"

    knows:
      - "死者是Frank Kowalski（73岁退休工人），不是Margaret"
      - "Morrison故意误导身份确认，出于蓝月俱乐部案私怨"
      - "Morrison收到匿名电话：'不要多管Margaret Brennan的事'"
      - "Margaret下落不明，疑被绑架"
      - "Morrison的交易条件：Zack查Frank死因→Morrison才查Margaret下落"
      - "Frank住在南区，O'Hara太太是他的老邻居"
      - "Frank生前被银行催债，有催款记录"

    does_not_know:
      - "Leonard的真实身份（Leonard Russo）"
      - "Leonard与Vinnie的雇佣关系"
      - "连号钞票证明银行→Vinnie的资金链"
      - "Frank的贷款真实利率和条款"
      - "Frank被谁杀害及具体死因"

    lie: null

    # ── 4. 鉴赏力 ──
    connoisseur: []

# ═══════════════════════════════════════
# PART 2: 自由探索
# ═══════════════════════════════════════
#
# 场景状态表 L2:
#   鞋坊一楼(1F)      → ⏸️暂无新线索
#   鞋坊卧室区        → ⏸️无新线索
#   家门口(2A)        → 🔓首次解锁
#   赌场/酒吧         → 🔓首次解锁
#   银行贵宾室        → 🔓首次解锁(对话)
