# Unit8 全局剧情总览（基于《Unit8 大纲 0417》+ 6 个 state 文件）
# 结构：起（loop1）→ 承（loop2-4）→ 转（loop5）→ 合（loop6）
# Part1：Vivian 冤案（loop1-4） · Part2：Webb 勒索案真相（loop5-6）

loop1: |
  【循环1：枪响开场 —— 指证 Rosa（2轮 · 新手教程/假胜利）】

  ———— 开篇 ————
  1928 年 11 月某夜 23:30 的蓝月亮酒吧。Zack 被 Webb 邀请参加舞会，酒保却拒绝他入场——Emma 凭新闻嗅觉感觉今晚有事。两人刚在大门口寒暄完，23:30 枪响——从歌舞厅赶到一楼会客室：Vivian 持枪怔愣站在 Webb 尸体旁，Rosa 当场指控"她杀了 Webb"，醉醺醺的 Morrison 警官随后赶到，宣告死亡并要逮捕 Vivian。

  ———— 自由探索（现场搜证，Morrison 管控）————
  会客室是本 loop 唯一开放场景。关键物证：Vivian 手里的那把小手枪（可分析——无硝烟反应）、Webb 与 Zack 签字的委托协议书（形成"保护 Vivian"的动机）。Rosa 当场给出谎言：Vivian 拿着枪 → 她是凶手；当晚只有 23:30 一声枪响 → 只能是她杀的。Vivian 对 Webb 之死十分震惊，沉默不语、准备认罪。

  ———— 指证 Rosa（场景 SC8101，2 轮）————
  第1轮——Rosa 说"Vivian 手里拿着枪，一定是她刚刚杀的"。Zack 出示 Vivian 手枪的无硝烟分析结果——这把枪根本没开过。Rosa 谎言1被击穿，但"也许还有另一把枪"的退路留下。
  第2轮——Rosa 说"当晚只有 23:30 那一声枪响，当时只有 Vivian 在里面"。Zack 此时没有任何证据或证言能反驳时间线——玩家体验一次"打不穿"的假指证（时间线谜题的新手教程版本）。

  ———— 指证后剧情 ————
  揭穿了谎言1，Rosa 的证词在 Morrison 眼中已打折扣。Zack 出示 Webb 的委托协议书——证明 Webb 生前立协议时已预感到自己将被杀害（"保险倾向"），并要求 Zack 保护 Vivian、确保她能继承遗产。Morrison 看在这两层份上，给出 72 小时调查窗口，暂缓逮捕。大门口 Emma 帮 Zack 梳理线索，抛出核心疑问——"Webb 本人真正怀疑的凶手是谁？"

  【情感基调】震惊 → 挫败 → 重新起步
  假胜利 + 打不穿的时间线谎言让玩家切身体会"证据不够就无法伸张"。Webb 的委托协议书把玩家的调查目标从"Rosa 的证词"转向"Webb 这个人本身"。

loop2: |
  【循环2：酒吧的秘密 —— 指证 Tommy（4轮）】

  ———— 开篇 ————
  承接 loop1 大门口的对话——两人重新进入酒吧。Morrison 仍在场，Vivian 被禁足在工作室，Rosa 仍在清洁间。玩家核心目标：调查 Webb 为何如此紧急雇佣侦探（保险倾向）→ Webb 真正怀疑的凶手是谁？

  ———— 自由探索 ————
  Vivian 工作室：Vivian 心如死灰、咬定自己杀了人（⚠谎言 "我恨 Webb，是我杀的"，她本有杀人计划但 loop4 才揭示）。勒索用的照片浮出水面——Webb 让 Vivian 配合"仙人跳变体"勒索中产客户。听到 Zack 转述 Webb 委托"保护她"后出现动摇，随后反锁房门（loop4 前不再开放深度对话）。
  厨房 Jimmy：兼职主厨，"有副业"、很缺钱，对 Webb 的死表现出隐藏的愧疚（埋伏笔，loop5 揭晓）。
  Webb 办公室：Webb 个人月收入 $15,000 vs 酒吧月净 $4,000——巨大差额暴露主收入不在私酒；VIP 合影；笔迹不明的客户记录（后续分析为 Tommy 笔迹）。
  Tommy 办公室：Tommy 坚称"只做私酒"；玩家翻抽屉触发⚡突发事件，发现一枚旧弹壳——被 Tommy 立刻拿回（loop5 信任触发后才交出）。
  歌舞厅：假油画挂在墙上、花瓶仍在原位（Tommy 后续声称"已经卖出"——现场直接反驳）。

  ———— 指证 Tommy（场景 SC8205，4 轮）————
  第1轮"酒吧里只有私酒生意" → Vivian 证言（Webb 让她勒索别人，她恨他）。
  第2轮"账目都是清清白白的" → Webb 个人收入 vs 酒吧净收入的差额。
  第3轮"还有古董买卖——花瓶卖给了 Thompson、油画卖给了 Coleman" → 油画 + 花瓶现场照（东西都还在）。
  第4轮"我只是按 Webb 指示记账" → 不明记录人的客户记录（笔迹分析 = Tommy 自己）。
  讯问结果：Webb 的酒吧在做敲诈勒索生意，Tommy 是曾经的执行人。Webb 11 月中旬沉迷 Rita 之后停止勒索——Tommy 暗示"Webb 惹上了大人物、想转移财产跑路"，他对这"大人物"心中有猜测但不说破。

  【情感基调】悬疑深化，朝"Webb 惹了谁"靠拢
  Vivian 仍在认罪——她为什么要这样？Webb 的"大人物"是谁？Rosa 的时间线谎言仍悬而未决。

loop3: |
  【循环3：虚假的目击 —— 指证 Rosa（真 · 2轮 · 时间线谜题）】

  ———— 开篇 ————
  承接 loop2——Tommy 指证后确立酒吧勒索生意。Emma 提出重审 Rosa 时间线，建议重回案发现场搜寻物证。

  ———— 自由探索 ————
  厨房 Jimmy：⚡突发事件——Jimmy 正在销毁整个酒吧里所有的《芝加哥狂想曲》鼓点单子，Zack 抢到一片残片（"鼓点很响"）；问到勒索相关，Jimmy 只称自己是"兼职主厨"。
  大厅 Morrison：汇报现场勘验结果，刻意提及"子弹缺失"、尸体伤口——但避谈子弹去向（loop6 揭示是他藏的）。
  会客室重访：Webb 的日记——嘲笑被勒索之人，底下贴着便利贴"WHALE - DANGER"（Webb 自以为是渔夫，实为鱼饵）；Webb 和 Vivian 合影、Rita 照片；保险箱字条（密码是与 Vivian 相遇日）；没有玻璃的窗户——向窗外侧巷望去，垃圾袋正压在碎玻璃上；取出 ⭐ 玻璃碎片（压在垃圾袋下，有硝烟痕迹）。
  清洁间 Rosa：⚠谎言中退守——证言"11:20 出去倒过一次垃圾"；🟢 一张纸条（"11:30 去会客室目睹 Vivian 杀 Webb，否则杀你女儿"）+ 女儿的医疗单。

  ———— 指证 Rosa（场景 SC8308，2 轮）————
  第1轮 → "当晚只有 23:30 枪响、只有 Vivian 在里面" → 玻璃碎片（垃圾袋下、有硝烟） + Rosa 的 11:20 倒垃圾证言。推理链：垃圾袋 11:20 放下 + 玻璃碎片压在袋下 → 玻璃破碎在 11:20 之前 → 真实枪击时间早于 11:30。
  第2轮（退守 · 接近崩溃）→ "可能是我记错，也许 Vivian 之前就杀了 Webb" → 威胁纸条 + 女儿的医疗单。Rosa 完全击穿，哭着坦白。
  讯问结果：有人刻意嫁祸 Vivian，这个人很熟悉酒吧。Rosa 哀求下掏出自己在现场捡到的弹壳——⭐ .45 警用弹壳（留待 loop4 确认型号）。

  【情感基调】时间线恍然大悟 + 对 Rosa 的同情
  "真实案发时间不是 23:30"这个事实颠覆一切——凶手有充足时间嫁祸。

loop4: |
  【循环4：破碎的金丝雀 —— 指证 Vivian（3轮 · "救人"而非"抓凶"）】

  ———— 开篇 ————
  承接 loop3——Rosa 真击穿 + 弹壳到手。本 loop 目标不是抓凶，而是说服 Vivian 不再供述自己是凶手，保全她不被逮捕。弹壳型号未知 + Morrison 在大厅等候——Emma 建议先去 Tommy 办公室鉴定弹壳型号。

  ———— 自由探索 ————
  一楼走廊（垃圾桶）：🟢 被撕毁的合同——某人与 Whale 签了协议，Whale 出大钱委托他做件事；关键细节：合同字迹与 Rosa 的威胁纸条字迹高度一致。
  Tommy 办公室：⭐ 弹壳 = .45 ACP 警用弹，来自米勒集团特制手枪；Tommy 回忆 Whale 曾让他去收勒索时被这把枪击过大腿（警告），那之后改由 Jimmy 接手。Whale 名字首次明晰——Rita 是 Whale 派来渗透酒吧的内线。
  Vivian 化妆间：🟣 痛苦记录（验证 Vivian 曾有杀意）、被撕毁的船票、Vivian 的绝笔信（loop4 前夕的心理底片）。
  歌舞厅 Vivian：面对 Rita 与 Webb 的关系时的内心；证言——《芝加哥狂想曲》的鼓点很强，是 Webb 最喜欢的一首曲子，"那晚我期待与 Webb 共舞，可他没开门、没听到"（⭐ loop5 时间线谜题的关键）。
  酒吧大厅 Morrison（阶段 A）：表面随口等待、顺便追问进展；实则评估 Zack 调查到哪一步。

  ———— 指证 Vivian（场景 SC8407，3 轮）————
  第1轮 → "我真的杀了 Webb！" → Rosa 给的 .45 ACP 弹壳 + Vivian 的 .25 ACP 小手枪。口径不符，Vivian 的枪不可能是凶器。
  第2轮 → "但除了我是凶手，没有其他人能杀 Webb！" → Tommy 证言（Rita 是 Whale 间谍 / Whale 委托酒吧内某人） + 被撕毁的合同。推理：Whale 才是真正的主使者。
  第3轮 → "可是就算如此，也是因为他沉迷于 Rita……" → 保险箱字条 + Webb 委托协议书。推理：Webb 取消与 Vivian 去巴黎的行程是为保护她带着遗产离开，不是沉迷 Rita。
  Vivian 承认不是凶手，但她曾有杀人计划：11:10 准备去、被 Webb 大声吼"Don't be bothering me!"挡走，11:30 觉得不对劲回来开了门（⭐ loop5 Jimmy 口音谜题伏笔）。

  ———— Part1 情节转折 · Morrison 变脸 ————
  Zack 把弹壳和推理告知 Morrison——Morrison 看到 .45 ACP 弹壳脸色骤变（米勒集团线索），态度急转：拿走 Webb 委托协议书（8103 confiscated）、夺走弹壳（8308 confiscated），宣布"Vivian 手枪是凶器、立即逮捕 Vivian"，强押 Vivian 回警局。Vivian 被带走时回头看了 Zack 一眼。

  【情感基调】救人成功的温暖 → Morrison 变脸的震惊
  明明拿出了证据却无法阻止逮捕。Part1 失败——Part2 双目标确立：找到真凶器 + 击破 Morrison。🟣 新疑点：真正的凶器在哪？Morrison 为什么看到 .45 弹壳会脸色骤变？

loop5: |
  【循环5：厨师的代价 —— 指证 Jimmy（4轮 · 灵魂黑夜 + 当场自杀）】

  ———— 开篇 ————
  承接 loop4——Morrison 强押 Vivian 后。大门口 Zack 和 Emma 梳理失败教训，Emma 安慰 Zack，共同面对"灵魂黑夜"。疑点系统正式开启，四大疑点聚焦：①威胁 Rosa 的究竟是谁？②Webb 勒索大人物的执行人是谁？③凶手怎么杀的 Webb、又怎么嫁祸 Vivian？④Morrison 为何看弹壳脸色骤变？确立 Part2 双目标——找真凶器 + 击破 Morrison。

  ———— 自由探索 ————
  Tommy 办公室：信任触发——Zack 帮助 Vivian 后，Tommy 主动交出他 loop2 时藏起来的物证：⭐ 一枚久远陈旧的子弹（Webb 勒索 Whale 那次见过的型号，= .45 ACP）+ ⭐ 《芝加哥鼓点》完整单子（鼓点高潮时间 = 23:00）。
  厨房 Jimmy：⚡ Jimmy 暴露口音——"Don't be bothering me!"（和 Vivian 证言吻合！）。
  Jimmy 家 Anna（首次出场）：Anna 怀孕，家里需要一大笔钱；🟢 Jimmy 给 Whale 的回信（两方相约在蓝月亮酒吧后门 8 点见面）；🟢 Jimmy 家里的英语练习书（字迹 = Rosa 威胁纸条、撕毁合同字迹）；🟢 Jimmy 的爱尔兰裔身份证件。

  ———— 指证 Jimmy（场景 SC8511 酒吧后门凌晨抓捕现行，4 轮）————
  Zack + Emma 抵达后门时 Jimmy 刚结束和 Whale 手下的交易（Whale 手下暗中潜伏）。
  第1轮 "我有不在场证明，枪声发生在 23:30，不可能有其他时间作案" → 芝加哥鼓点完整单子 + Vivian《芝加哥狂想曲》证言。推理：23:00 鼓点高潮掩盖真实枪声，真实案发时间 = 23:10 左右。
  第2轮 "Vivian 当时去找他了！那会儿 Webb 还活着" → Jimmy 爱尔兰身份证件 + Jimmy 口音证词 + Vivian "Don't be bothering me!"证词。推理：Jimmy 模仿 Webb 的声音骗走 Vivian，爱尔兰口音暴露。
  第3轮 "那个人不是我，我根本没有理由杀 Webb" → 被撕毁的合同 + Anna 证言（孩子快出生了，需要一大笔钱）。推理：Jimmy 为 Anna 和孩子接受 Whale 委托。——Zack 说出 Whale 名字的瞬间，潜伏的 Whale 手下鸣笛。
  第4轮（发疯中） → Zack 补上致命一击："威胁 Rosa 的也是你，纸条和合同上的 J 都是倒着写的"（依据 Jimmy 家英语练习书）。Jimmy 最后一层伪装被揭穿。

  ———— 指证后戏剧 · Jimmy 自杀 ————
  Whale 手下的鸣笛枪响后，Jimmy 发疯——为保护 Anna 不被 Whale 报复，他用米勒集团特制手枪自尽，死前将 Anna 托付给 Zack 和 Emma。现场留下 ⭐ 米勒集团特制手枪（真正的凶器）。

  ———— 感情进展 ————
  Zack 要求 Emma 退出调查（太危险），Emma 坚守。两人决定 loop6 利用 Emma 的记者身份 + Zack 的助理伪装潜入 Morrison 家，取回被没收的弹壳。

  【情感基调】最黑暗的时刻 → 悲剧性突破
  真凶器找到了，但凶手当场自杀、留下孕妻——胜利的代价。Emma 的坚守让 Zack 不再独自背负。

loop6: |
  【循环6：正义的重量 —— 指证 Morrison（3轮 · 释放 Vivian + 南区计划钩子）】

  ———— 开篇 ————
  承接 loop5——Jimmy 自杀后次日。Zack 和 Emma 制定 loop6 计划：以记者+助理伪装潜入 Morrison 家搜查。这是 Emma 提案、也是两人共同执行的最后一战。

  ———— 自由探索 ————
  Morrison 家（伪装搜查）：Morrison 在警局值班，家中无人。两人须维持身份不败露。搜到三件关键证物——🟢 Morrison 欠疤面煞星的 5000 美元赌债欠条 + 威胁信（他是个赌鬼，被地下势力威胁）、🟢 Morrison 向 Whale 借款 6000 美元的借据（时间早于 Webb 案三周，借了钱还赌债 → 在 Webb 案中压案还人情）、⭐ Morrison 藏起来的子弹弹壳（原 8308，.45 ACP，与米勒集团特制手枪口径完全匹配）。
  ⚡ 突发事件——调查电话：搜查进行到中段，Morrison 家电话突然响起——是 Whale 亲自来电（Whale 首次以声音形式直接登场）。Whale 语气平静，没有威胁 Zack 和 Emma，只说："我想要你们证明给我看——这个城市里，是否真正还存在正义。"随后挂断。
  警局 Morrison 办公室：Zack 选择单独对质，没有同僚在场——这是一场只有三个人的审判。

  ———— 指证 Morrison（场景 SC8614，3 轮）————
  第1轮 "Vivian 的手枪就是凶器！她就是凶手！" → Morrison 藏的弹壳（8601，.45 ACP） + 米勒集团特制手枪（8507，Jimmy 自杀现场，.45 ACP）。口径完全匹配，而 Vivian 的枪是 .25 ACP——Morrison 的第一道防线松动，退守"我只是搜查失误"。
  第2轮 "我只是临时接警、搜查失误，后续可以重新调查" → Morrison 的赌债欠条+威胁信 + Morrison 向 Whale 的借据。推理：案发前三周借 Whale 的钱还了赌债，案发时快速结案、夺走证据——这是偿债，不是失误。Morrison 退守"Whale 只是放贷的"。
  第3轮 "Whale 只是个放贷的，和本案真凶没任何关系——就算我和他有借贷，那也是私事" → Jimmy 给 Whale 的回信（直接确认 Jimmy 受 Whale 委托在酒吧后门交易）。Whale 不是放贷的，Whale 是策划 Webb 被杀的主使人、Jimmy 是执行者——Morrison 的三道防线全部崩塌。

  ———— 结局 · Ending Sequence ————
  Morrison 当众承认吹黑哨、释放无罪的 Vivian。救出 Vivian 后回到蓝月亮酒吧一楼会客室，Vivian 打开保险箱，将 ⭐ Webb 生前偷听到的"南区计划"（1604）交给 Zack——Webb 死前还在追查的、比 Whale 更深的一层阴谋；具体内容不揭示，作为 Unit2 的钩子留下。

  【情感基调】正义的沉重胜利 + 继续前行
  Vivian 被释放、真相水落石出——但 Whale 那通电话让结局留下余韵：他说"证明给我看这城市是否存在正义"，语气平静甚至带着期待。他既是主使者又是旁观者——真正的恶依然在暗处，南区计划等待被揭开。
