    <script>
    // ===== Sidebar chip helpers =====
    function pickLoop(loopId) {
        const sel = document.getElementById('loopSelect');
        if (sel) sel.value = loopId;
        if (typeof GameController !== 'undefined' && GameController.load) {
            GameController.load();
        }
    }

    function syncLoopChips() {
        const current = (typeof AppState !== 'undefined' && AppState.currentLoop) || 'loop1';
        document.querySelectorAll('.loop-chip').forEach(chip => {
            chip.classList.toggle('active', chip.dataset.loop === current);
        });
    }

    function syncLoopHeader() {
        const titleEl = document.getElementById('loopCurrentTitle');
        const chapterEl = document.getElementById('loopCurrentChapter');
        if (!titleEl || typeof AppState === 'undefined') return;
        const loop = AppState.loopData;
        const loopKey = AppState.currentLoop || 'loop1';
        if (loop && loop.title) {
            titleEl.textContent = loop.title;
        } else {
            titleEl.textContent = loopKey.replace('loop', 'Loop ');
        }
        if (chapterEl) {
            const ch = (typeof DataManager !== 'undefined' && DataManager.chapter)
                ? DataManager.chapter(AppState.currentUnit) : '';
            chapterEl.textContent = ch || (AppState.currentUnit || '—');
        }
    }

    // ===== Utilities =====
    function stripPrefix(id) {
        if (id == null) return '';
        id = String(id);
        if (id.startsWith('EV')) return id.slice(2);
        if (id.startsWith('SC')) return id.slice(2);
        if (id.startsWith('NPC')) return id.slice(3);
        return id;
    }

    function cn(field) {
        if (Array.isArray(field)) return field[0] || '';
        return field || '';
    }

    function truncate(str, len) {
        str = str || '';
        return str.length > len ? str.slice(0, len) + '...' : str;
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str || '';
        return div.innerHTML;
    }

    function escapeHtmlWithBr(str) {
        return escapeHtml(str).replace(/\n/g, '<br>');
    }

    function copyText(text, el) {
        navigator.clipboard.writeText(text).then(() => {
            const orig = el.textContent;
            el.textContent = '已复制!';
            el.style.background = 'rgba(80,200,120,0.3)';
            setTimeout(() => { el.textContent = orig; el.style.background = ''; }, 800);
        });
    }

    // ===== Configuration =====
    // 本地由 avg_editor_v2/server.py 挂载 /data；Vercel 直接按仓库静态目录访问。
    const Config = {
        get mode() {
            const host = location.hostname;
            return (host.includes('vercel.app') || host !== 'localhost' && host !== '127.0.0.1')
                ? 'vercel'
                : 'local';
        },
        get paths() {
            if (this.mode === 'vercel') {
                return {
                    tableData: '/avg_editor_v2/data/table',
                    loopConfig: '/avg_editor_v2/data',
                    assets: '/Assets/Resources',
                    avgData: '/AVG'
                };
            }
            return {
                tableData: '/data/table',
                loopConfig: '/data',
                assets: '/Assets/Resources',
                avgData: '/AVG'
            };
        },
        getAssetUrl(configPath) {
            if (!configPath) return '';
            return `${this.paths.assets}/${configPath.replace(/\\/g, '/')}.png`;
        }
    };

    // ===== App State =====
    const AppState = {
        currentUnit: 'Unit1',
        currentLoop: 'loop1',
        currentView: 'flow',

        allItems: [],
        allScenes: [],
        allNPCs: [],
        allNPCLoops: [],
        allTalks: [],
        tableTalks: [],
        allTestimonies: [],
        allDoubts: [],
        allTimelineEvents: [],

        itemsMap: new Map(),
        scenesMap: new Map(),
        npcsMap: new Map(),
        talksMap: new Map(),
        testimoniesByNpc: new Map(),
        doubtsMap: new Map(),
        timelineEventIds: new Set(),
        satisfiedConditions: new Set(),

        talkSummaries: {},
        sceneTalkSummaries: {},
        storyOverview: {},
        unitFlowData: null,
        unitFlow: null,
        pendingChanges: [],
        chapterConfigs: [],
        chapterConfigMap: new Map(),
        artAssetMap: new Map(),

        loopData: null,
        locationsData: null,
        collectedEvidences: new Set(),
        selectedEvidences: new Set(),
        currentPhase: null,
        currentSceneId: null,

        reset() {
            this.collectedEvidences.clear();
            this.selectedEvidences.clear();
            this.currentPhase = null;
            this.currentSceneId = null;
        }
    };

    // ===== Data Loader =====
    const DataLoader = {
        async loadJSON(path) {
            const resp = await fetch(path);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${path}`);
            const text = await resp.text();
            return JSON.parse(this.fixJson(text));
        },

        // 状态机修复游戏导出的非标准 JSON：
        // 1. 字符串内字面换行符 → 空格  (Describe 字段跨行)
        // 2. 未转义反斜杠 → \\          (Art\Scene 路径)
        // 3. 字符串内裸双引号 → \"       (中文引号用了ASCII双引号)
        fixJson(text) {
            let out = '';
            let inStr = false;
            for (let i = 0; i < text.length; i++) {
                const c = text.charAt(i);
                if (!inStr) {
                    out += c;
                    if (c === '"') inStr = true;
                    continue;
                }
                // 以下都在字符串内部
                if (c === '\\') {
                    const nx = text.charAt(i + 1);
                    if ('"\\\/bfnrt'.includes(nx)) {
                        out += c + nx; i++;           // 合法 2 字符转义
                    } else if (nx === 'u' && /^[0-9a-fA-F]{4}$/.test(text.substring(i + 2, i + 6))) {
                        out += text.substring(i, i + 6); i += 5; // 合法 \uXXXX
                    } else {
                        out += '\\\\';                // 修正非法反斜杠
                    }
                } else if (c === '"') {
                    // 判断是字符串结束引号还是内容引号
                    // 关键：跳过空白后检查下一个非空白字符是否为 JSON 结构符
                    const nx = text.charAt(i + 1);
                    if (nx === '' || ',:]}'.includes(nx)) {
                        out += c; inStr = false;      // 明确的结束引号
                    } else if (' \t\r\n'.includes(nx)) {
                        // 引号后是空白 → 向前看跳过空白
                        let j = i + 1;
                        while (j < text.length && ' \t\r\n'.includes(text.charAt(j))) j++;
                        const after = text.charAt(j);
                        if (after === '' || ',:]}'.includes(after)) {
                            out += c; inStr = false;  // 空白后是结构符 → 结束引号
                        } else {
                            out += '\\"';             // 空白后还是内容 → 内容引号
                        }
                    } else {
                        out += '\\"';                 // 后面直接是内容字符 → 内容引号
                    }
                } else if (c === '\n') {
                    out += '\\n';                     // 字符串内换行 → 保留为 \n
                } else if (c === '\r') {
                    // 忽略 CR（\r\n 中的 \r）
                } else {
                    out += c;
                }
            }
            return out;
        },

        async loadYAML(path) {
            const resp = await fetch(`${path}?t=${Date.now()}`);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${path}`);
            return jsyaml.load(await resp.text());
        },

        async loadTableData() {
            const base = Config.paths.tableData;
            const t = `?t=${Date.now()}`;

            const [items, scenes, npcs, npcLoops, talks, testimonies, doubts, artAssets, timelineEventsRaw] = await Promise.all([
                this.loadJSON(`${base}/ItemStaticData.json${t}`),
                this.loadJSON(`${base}/SceneConfig.json${t}`),
                this.loadJSON(`${base}/NPCStaticData.json${t}`),
                this.loadJSON(`${base}/NPCLoopData.json${t}`).catch(() => []),
                this.loadJSON(`${base}/Talk.json${t}`).catch(() => []),
                this.loadJSON(`${base}/TestimonyItem.json${t}`).catch(() => []),
                this.loadJSON(`${base}/DoubtConfig.json${t}`).catch(() => []),
                this.loadJSON(`${base}/ArtAssetConfig.json${t}`).catch(() => []),
                this.loadJSON(`${base}/TimeLineEvent.json${t}`)
                    .catch(() => this.loadJSON(`/Assets/table/TimeLineEvent.json${t}`).catch(() => []))
            ]);
            const timelineEvents = Array.isArray(timelineEventsRaw)
                ? timelineEventsRaw
                : (Array.isArray(timelineEventsRaw?.value) ? timelineEventsRaw.value : []);

            AppState.allItems = items;
            AppState.allScenes = scenes;
            AppState.allNPCs = npcs;
            AppState.allNPCLoops = Array.isArray(npcLoops) ? npcLoops : [];
            AppState.tableTalks = Array.isArray(talks) ? talks : [];
            AppState.allTestimonies = Array.isArray(testimonies) ? testimonies : [];
            AppState.allDoubts = Array.isArray(doubts) ? doubts : [];
            AppState.allTimelineEvents = timelineEvents;
            AppState.timelineEventIds = new Set(timelineEvents.map(e => String(e.TimeEvent ?? e.id ?? '')).filter(Boolean));
            AppState.doubtsMap.clear();
            AppState.allDoubts.forEach(d => AppState.doubtsMap.set(String(d.id), d));

            AppState.itemsMap.clear();
            items.forEach(i => AppState.itemsMap.set(String(i.id), i));

            // 底图类型表：backgroundImage(id) → sceneKind('explore'/'dialogue')
            AppState.artAssetMap.clear();
            (Array.isArray(artAssets) ? artAssets : []).forEach(a =>
                AppState.artAssetMap.set(String(a.id), a));

            AppState.scenesMap.clear();
            scenes.forEach(s => {
                // 兼容老 preview 字段：从 Unity 嵌套 location 补出扁平的 sceneName / sceneNameEn / backgroundImage / sceneType
                if (s.location && typeof s.location === 'object') {
                    if (!s.sceneName) s.sceneName = (s.location.Name || [])[0] || '';
                    if (!s.sceneNameEn) s.sceneNameEn = (s.location.Name || [])[1] || '';
                    if (!s.backgroundImage) s.backgroundImage = s.location.backgroundImage || '';
                    if (!s.sceneType) s.sceneType = s.location.sceneType || '';
                }
                AppState.scenesMap.set(String(s.sceneId), s);
            });

            AppState.npcsMap.clear();
            npcs.forEach(n => AppState.npcsMap.set(String(n.id), n));

            // testimony 归属 NPC 的正确规则：testimony.id 前 3 位 === npc.id
            // 编码: {chapter1}{npcShort2}{group1}{seq3} ，例 1031001 = 章1 + NPC "03"(即 NPC 103 Rosa) + 组1 + 序001
            // 验证: 166/166 条 testimony 的 head(3) 都精确命中 NPCStaticData 的 id，比 triggerParam 精确
            AppState.testimoniesByNpc = new Map();
            const npcIdSet = new Set(npcs.map(n => String(n.id)));
            AppState.allTestimonies.forEach(t => {
                const head = String(t.id).substring(0, 3);
                if (!npcIdSet.has(head)) return;
                if (!AppState.testimoniesByNpc.has(head)) AppState.testimoniesByNpc.set(head, []);
                AppState.testimoniesByNpc.get(head).push(t);
            });

            console.log(`Table data loaded: ${items.length} items, ${scenes.length} scenes, ${npcs.length} NPCs, ${AppState.tableTalks.length} table talks, ${AppState.allTestimonies.length} testimonies`);
        },

                    goal: (chapter.chapterGoal || [''])[0] || '',

        // ===== AVG Talk 加载 =====

        // 发现目录下的 .json 文件：优先读 _manifest.json，回退到 HTTP 目录列表
        async listJsonFiles(dirUrl) {
            // 1. 尝试读取 deploy 时生成的清单文件
            try {
                const resp = await fetch(`${dirUrl}_manifest.json?t=${Date.now()}`);
                if (resp.ok) {
                    const files = await resp.json();
                    if (Array.isArray(files) && files.length > 0) return files;
                }
            } catch (e) { /* 清单不存在，回退 */ }

            // 2. 回退：解析 Python HTTP server 的目录列表 HTML
            try {
                const resp = await fetch(dirUrl);
                if (!resp.ok) return [];
                const html = await resp.text();
                const matches = [...html.matchAll(/href="([^"]+\.json)"/gi)];
                return matches.map(m => m[1]).filter(f => f !== '_manifest.json');
            } catch (e) { return []; }
        },

        // AVG 扁平格式 → 内部 Talk 格式
        convertAVGTalk(entry) {
            const npcId = (entry.IdSpeaker || '').replace(/^NPC/, '');
            const npcData = AppState.npcsMap.get(npcId);
            return {
                id: String(entry.id),
                step: String(entry.step || ''),
                speakType: entry.speakType,
                waitTime: String(entry.waitTime || 0),
                Speaker: {
                    id: npcId,
                    Name: [entry.cnSpeaker || '', entry.enSpeaker || ''],
                    role: npcData?.role || '',
                    Chapter: npcData?.Chapter || '',
                    IconSmall: npcData?.IconSmall || '',
                    IconLarge: npcData?.IconLarge || ''
                },
                Words: [entry.cnWords || '', entry.enWords || ''],
                next: entry.next ? String(entry.next) : '',
                script: entry.script || '',
                Parameters: this._buildParameters(entry),
                // AVG 独有字段
                cnAction: entry.cnAction || '',
                enAction: entry.enAction || '',
                Location: entry.Location || '',
                // 视频字段
                videoEpisode: entry.videoEpisode || '',
                videoLoop: entry.videoLoop || '',
                videoScene: entry.videoScene || '',
                videoId: entry.videoId ? String(entry.videoId) : '',
                openingBrief: entry.openingBrief || null
            };
        },

        _buildParameters(entry) {
            const params = [];
            for (let i = 0; i < 3; i++) {
                const str = entry[`ParameterStr${i}`] || '';
                const int = entry[`ParameterInt${i}`];
                if (str || int) {
                    params.push({ ParameterStr: str, ParameterInt: String(int || 0) });
                }
            }
            return params.length > 0 ? params : [{ ParameterInt: '0' }];
        },

        normalizeTableTalk(raw) {
            const talk = { ...raw };
            talk.id = String(talk.id || '');
            talk.step = String(talk.step || '');
            talk.next = talk.next ? String(talk.next) : '';
            talk.videoId = talk.videoId ? String(talk.videoId) : talk.id;
            if (!Array.isArray(talk.Parameters)) talk.Parameters = [];
            return talk;
        },

        seedTableTalks(loop) {
            const episode = DataManager.chapter(AppState.currentUnit);
            let count = 0;
            (AppState.tableTalks || []).forEach(raw => {
                const talk = this.normalizeTableTalk(raw);
                if (!talk.id) return;
                if (talk.videoEpisode && talk.videoEpisode !== episode) return;
                if (talk.videoLoop && talk.videoLoop !== loop) return;
                if (AppState.talksMap.has(talk.id)) return;
                AppState.talksMap.set(talk.id, talk);
                AppState.allTalks.push(talk);
                count++;
            });
            return count;
        },

        // 加载指定 loop 的所有 AVG Talk 文件
        async loadAVGTalks(loop) {
            const base = Config.paths.avgData;
            const episode = DataManager.chapter(AppState.currentUnit);
            const dirUrl = `${base}/${episode}/Talk/${loop}/`;

            AppState.talksMap.clear();
            AppState.allTalks = [];
            const tableLoaded = this.seedTableTalks(loop);
            let totalLoaded = tableLoaded;

            try {
                const files = await this.listJsonFiles(dirUrl);
                if (files.length === 0) {
                    console.warn(`No AVG Talk files found in ${dirUrl}`);
                    return tableLoaded;
                }

                const results = await Promise.all(
                    files.map(async (filename) => {
                        try {
                            const resp = await fetch(`${dirUrl}${filename}?t=${Date.now()}`);
                            if (!resp.ok) return { filename, entries: [] };
                            return { filename, entries: await resp.json() };
                        } catch (e) {
                            console.warn(`Failed to load AVG Talk: ${filename}`, e.message);
                            return { filename, entries: [] };
                        }
                    })
                );

                const sceneName = (fn) => fn.replace(/\.json$/i, '');
                results.forEach(({ filename, entries }) => {
                    const vs = sceneName(filename);
                    entries.forEach(raw => {
                        const talk = this.convertAVGTalk(raw);
                        if (!talk.videoScene) talk.videoScene = vs;
                        const existed = AppState.talksMap.has(talk.id);
                        AppState.talksMap.set(talk.id, talk);
                        if (!existed) {
                            AppState.allTalks.push(talk);
                            totalLoaded++;
                        } else {
                            const idx = AppState.allTalks.findIndex(t => String(t.id) === String(talk.id));
                            if (idx >= 0) AppState.allTalks[idx] = talk;
                        }
                    });
                });

                console.log(`Talk loaded: ${totalLoaded} entries (${tableLoaded} table + AVG files from ${files.length} files, ${loop})`);
            } catch (e) {
                console.warn('AVG Talk loading failed:', e.message);
            }
            return totalLoaded;
        },

        // 加载指定 loop 的 Expose 对话文件
        async loadAVGExpose(loop) {
            const base = Config.paths.avgData;
            const episode = DataManager.chapter(AppState.currentUnit);
            const dirUrl = `${base}/${episode}/Expose/`;
            const loopNum = loop.replace('loop', '');
            let totalLoaded = 0;

            try {
                const allFiles = await this.listJsonFiles(dirUrl);
                // 筛选当前 loop 的 expose 文件 (如 loop1_rosa.json)
                // Match current loop expose files. New: Expose_L{loop}_npc.json; legacy: loop{loop}_npc.json.

                const loopFiles = allFiles.filter(f => {

                    const lower = f.toLowerCase();

                    return lower.startsWith(`expose_l${loopNum}_`) ||

                        lower.startsWith(`loop${loopNum}_`);

                });

                if (loopFiles.length === 0) {
                    console.warn(`No AVG Expose files found for ${loop}`);
                    return 0;
                }

                const results = await Promise.all(
                    loopFiles.map(async (filename) => {
                        try {
                            const resp = await fetch(`${dirUrl}${filename}?t=${Date.now()}`);
                            if (!resp.ok) return { filename, entries: [] };
                            return { filename, entries: await resp.json() };
                        } catch (e) {
                            console.warn(`Failed to load AVG Expose: ${filename}`, e.message);
                            return { filename, entries: [] };
                        }
                    })
                );

                const sceneName = (fn) => fn.replace(/\.json$/i, '');
                results.forEach(({ filename, entries }) => {
                    const vs = sceneName(filename);
                    entries.forEach(raw => {
                        const talk = this.convertAVGTalk(raw);
                        if (!talk.videoScene) talk.videoScene = vs;
                        AppState.talksMap.set(talk.id, talk);
                        AppState.allTalks.push(talk);
                        totalLoaded++;
                    });
                });

                console.log(`AVG Expose loaded: ${totalLoaded} entries from ${loopFiles.length} files (${loop})`);
            } catch (e) {
                console.warn('AVG Expose loading failed:', e.message);
            }
            return totalLoaded;
        }
    };

    // ===== Data Manager =====
    const DataManager = {
        getItem(id) {
            return AppState.itemsMap.get(stripPrefix(id)) || null;
        },

        getScene(id) {
            return AppState.scenesMap.get(stripPrefix(id)) || null;
        },

        getNPC(id) {
            return AppState.npcsMap.get(stripPrefix(id)) || null;
        },

        itemName(item) { return cn(item?.Name); },
        itemDesc(item) { return cn(item?.Describe); },
        itemShortDesc(item) { return cn(item?.ShortDescribe); },
        itemLocation(item) { return cn(item?.location); },
        itemActionParamIds(item) {
            const raw = item?.ActionParam;
            if (raw === null || raw === undefined || raw === '') return [];
            const parts = Array.isArray(raw) ? raw : String(raw).split(',');
            return parts.map(x => stripPrefix(String(x).trim())).filter(id => id && id !== '0');
        },
        itemSceneBindingLabel(item) {
            const binding = item?._sceneBinding;
            if (!binding || binding.kind === 'direct') return '';
            const parentName = binding.parentName || binding.parentId || '可交互道具';
            if (binding.kind === 'embedded_state') return `打开态：${parentName}`;
            return `来自可交互道具：${parentName}`;
        },

        typeName(type) {
            return { '0': '装饰', '1': '线索', '2': '环境', '3': '道具', '4': '笔记', '5': '门', '6': '可交互道具', '7': '内嵌道具' }[String(type)] || type || '?';
        },
        typeClass(type) {
            return { '1': 'type-clue', '2': 'type-envir', '3': 'type-item', '4': 'type-note' }[String(type)] || '';
        },

        chapter(unit) {
            if (unit === 'Unit3') return 'EPI03';
            if (unit === 'Unit8') return 'EPI08';
            if (unit === 'Unit9') return 'EPI09';
            return unit === 'Unit2' ? 'EPI02' : 'EPI01';
        },

        itemsByChapter(chapter) {
            return AppState.allItems.filter(i => i.Chapter === chapter);
        },

        // 反查：给定原料ID，找到哪个产物的combineParameter包含它
        findCombineProduct(ingredientId) {
            const id = stripPrefix(ingredientId);
            return AppState.allItems.find(i => Array.isArray(i.combineParameter) && i.combineParameter.includes(id));
        },

        // Scene ID prefix for a given unit+loop: Unit1/loop1 -> "11", Unit8/loop3 -> "83"
        loopPrefix(unit, loop) {
            let u = '1';
            if (unit === 'Unit3') u = '3';
            else if (unit === 'Unit2') u = '2';
            else if (unit === 'Unit8') u = '8';
            else if (unit === 'Unit9') u = '9';
            const l = loop.replace('loop', '');
            return `${u}${l}`;
        },

        scenesForLoop(unit, loop) {
            // v2: 用显式 loop 字段归属 + isOpen 决定是否开放
            // （loop 由原 openInLoops 派生：一个场景=一个 Loop；isOpen 控制是否展示给玩家）
            const loopNum = parseInt(String(loop).replace(/[^\d]/g, '')) || 0;
            const unitPrefix = String(unit).replace(/[^\d]/g, '');
            return AppState.allScenes.filter(s => {
                if (s.isOpen === false) return false;
                if (Number(s.loop) !== loopNum) return false;
                // 跨 Unit 时 loop 单字段不够区分 Unit1 L1 vs Unit2 L1，用 sceneId 首位约束 unit
                return String(s.sceneId).startsWith(unitPrefix);
            });
        },

        // 场景类型：顺着 location.backgroundImage 反查 ArtAssetConfig.sceneKind
        // 返回 'explore'（AVG/探索）/ 'dialogue'（对话）/ '' （底图未登记）
        sceneKind(scene) {
            if (!scene) return '';
            const bg = scene.backgroundImage || (scene.location && scene.location.backgroundImage) || '';
            const a = AppState.artAssetMap.get(String(bg));
            return a ? (a.sceneKind || '') : '';
        },

        // ArtAssetConfig（底图表）按章节过滤：id 路径含 EPI 编码
        artAssetsForChapter(chapter) {
            const out = [];
            AppState.artAssetMap.forEach(a => {
                if (String(a.id).includes(chapter)) out.push(a);
            });
            return out;
        },

        // 按底图反查挂在上面的 NPC：顺着 SceneConfig.location.backgroundImage 收集 NPCInfos
        // 名字来自 NPCStaticData(配置)，预名称来自 ResPath/ClickResPath，按资源名去重并聚合 Loop
        npcMountsForBg(bgPath) {
            const byKey = new Map();
            AppState.allScenes.forEach(s => {
                const bg = s.backgroundImage || (s.location && s.location.backgroundImage) || '';
                if (String(bg) !== String(bgPath)) return;
                const loop = s.loop;
                (s.NPCInfos || []).forEach(info => {
                    const npcObj = info.NPC || {};
                    const npcId = String(npcObj.id || '');
                    const ref = AppState.npcsMap.get(npcId);        // 取真实配置名
                    const name = ref ? cn(ref.Name) : ((npcObj.Name || [])[0] || npcId);
                    const res = info.ResPath ? info.ResPath.split('\\').pop() : '';
                    const click = info.ClickResPath ? info.ClickResPath.split('\\').pop() : '';
                    const key = res || click || ('npc' + npcId);
                    if (!byKey.has(key)) byKey.set(key, { npcId, name, resName: res, clickResName: click, loops: new Set() });
                    if (loop !== null && loop !== undefined) byKey.get(key).loops.add(Number(loop));
                });
            });
            return Array.from(byKey.values())
                .map(m => ({ ...m, loops: [...m.loops].sort((a, b) => a - b) }));
        },

        // Get evidence items from a scene.
        // SceneConfig only stores direct ItemIDs; Type6 interactive items can spawn Type7,
        // and Type7.ActionParam can contain child evidence IDs that also belong to this scene.
        sceneEvidence(sceneId) {
            const scene = this.getScene(sceneId);
            if (!scene?.ItemIDs) return [];
            const byId = new Map();
            const addItem = (item, binding) => {
                if (!item) return;
                const id = String(item.id || '');
                if (!id || byId.has(id)) return;
                byId.set(id, binding ? { ...item, _sceneBinding: binding } : item);
            };
            const addEmbeddedChildren = (embeddedItem, parentItem) => {
                if (!embeddedItem) return;
                const parentBinding = {
                    kind: 'embedded_state',
                    parentId: String(parentItem?.id || ''),
                    parentName: this.itemName(parentItem),
                    embeddedId: String(embeddedItem.id || ''),
                    embeddedName: this.itemName(embeddedItem),
                };
                addItem(embeddedItem, parentBinding);
                this.itemActionParamIds(embeddedItem).forEach(childId => {
                    const child = this.getItem(childId);
                    addItem(child, {
                        kind: 'embedded_child',
                        parentId: parentBinding.parentId,
                        parentName: parentBinding.parentName,
                        embeddedId: parentBinding.embeddedId,
                        embeddedName: parentBinding.embeddedName,
                    });
                });
            };
            scene.ItemIDs.forEach(id => {
                const item = this.getItem(id);
                if (!item) return;
                addItem(item, { kind: 'direct' });
                const type = String(item.itemType || '');
                if (type === '6') {
                    this.itemActionParamIds(item).forEach(targetId => {
                        const target = this.getItem(targetId);
                        if (!target) return;
                        if (String(target.itemType || '') === '7') {
                            addEmbeddedChildren(target, item);
                        } else {
                            addItem(target, {
                                kind: 'embedded_child',
                                parentId: String(item.id || ''),
                                parentName: this.itemName(item),
                                embeddedId: '',
                                embeddedName: '',
                            });
                        }
                    });
                } else if (type === '7') {
                    addEmbeddedChildren(item, item);
                }
            });
            return Array.from(byId.values()).sort((a, b) => Number(a.id || 0) - Number(b.id || 0));
        },

        sceneNPCs(sceneId) {
            const scene = this.getScene(sceneId);
            return scene?.NPCInfos || [];
        },

        // Get non-evidence ItemIDs (those not found in ItemStaticData)
        sceneOtherItems(sceneId) {
            const scene = this.getScene(sceneId);
            if (!scene?.ItemIDs) return [];
            return scene.ItemIDs.filter(id => !this.getItem(id));
        },

        talkEntriesByScene(videoScene) {
            const sceneName = String(videoScene || '').trim();
            if (!sceneName) return [];
            return AppState.allTalks
                .filter(t => String(t.videoScene || '') === sceneName)
                .sort((a, b) => Number(a.videoId || a.id) - Number(b.videoId || b.id));
        },

        firstTalkIdByScene(videoScene) {
            const entries = this.talkEntriesByScene(videoScene);
            return entries.length > 0 ? String(entries[0].id || '') : '';
        },

        // Preferred NPC entry contract:
        // TalkInfo/LoopTalkInfo.videoScene names the AVG JSON file, and .id names the first Talk.
        // NPC speaker/name inference is kept only as a historical fallback for incomplete rows.
        resolveNpcTalkEntry(entry, npcId, opts = {}) {
            const label = opts.label || 'TalkInfo';
            const allowFallback = opts.allowFallback !== false;
            const id = String(entry?.id || '').trim();
            const videoScene = String(entry?.videoScene || '').trim();

            if (videoScene && id) {
                const talk = this.getTalk(id);
                if (!talk) {
                    return { ok: false, id: '', videoScene, message: `${label} 配置错误：找不到 Talk ${id}（${videoScene}.json）` };
                }
                if (talk.videoScene && String(talk.videoScene) !== videoScene) {
                    return { ok: false, id: '', videoScene, message: `${label} 配置不一致：Talk ${id} 不属于 ${videoScene}.json，而属于 ${talk.videoScene}.json` };
                }
                return { ok: true, id, videoScene, source: 'explicit' };
            }

            if (videoScene) {
                const firstId = this.firstTalkIdByScene(videoScene);
                if (!firstId) {
                    return { ok: false, id: '', videoScene, message: `${label} 配置错误：找不到 ${videoScene}.json 的对话数据` };
                }
                return { ok: true, id: firstId, videoScene, source: 'videoScene' };
            }

            if (id) {
                const talk = this.getTalk(id);
                if (!talk) {
                    return { ok: false, id: '', videoScene: '', message: `${label} 配置错误：找不到 Talk ${id}` };
                }
                return { ok: true, id: String(talk.id || id), videoScene: talk.videoScene || '', source: 'legacy-id' };
            }

            if (allowFallback) {
                const fallbackId = this.findTalkForNPC(npcId);
                if (fallbackId) {
                    const talk = this.getTalk(fallbackId);
                    return { ok: true, id: String(fallbackId), videoScene: talk?.videoScene || '', source: 'npc-fallback' };
                }
            }

            return { ok: false, id: '', videoScene: '', message: `${label} 未配置对话入口` };
        },

        // Find talk file (videoScene) where given NPC id is the primary non-Zack speaker.
        // Historical fallback only; new SceneConfig rows should use TalkInfo.videoScene + TalkInfo.id.
        findTalkForNPC(npcId) {
            if (!npcId) return '';
            const sid = String(npcId);
            // convertAVGTalk stores Speaker.id as raw number (e.g. "807"), no "NPC" prefix
            // Try direct match (design ID 907)
            for (const talk of AppState.allTalks) {
                if (talk.Speaker?.id === sid && talk.videoScene) {
                    return this.firstTalkIdByScene(talk.videoScene) || talk.id;
                }
            }
            // Fallback: 9XX → 8XX (EPI09 uses 8XX NPC codes)
            if (sid.startsWith('9')) {
                const epiId = '8' + sid.slice(1);
                for (const talk of AppState.allTalks) {
                    if (talk.Speaker?.id === epiId && talk.videoScene) {
                        return this.firstTalkIdByScene(talk.videoScene) || talk.id;
                    }
                }
            }
            // Fallback: match by NPC chinese name
            const npcData = this.getNPC(sid);
            if (npcData) {
                const npcName = cn(npcData.Name);
                if (npcName) {
                    for (const talk of AppState.allTalks) {
                        if (talk.Speaker?.Name?.[0] === npcName && talk.videoScene) {
                            return this.firstTalkIdByScene(talk.videoScene) || talk.id;
                        }
                    }
                }
            }
            return '';
        },

        getTalk(id) {
            if (id == null) return null;
            const key = String(id);
            const direct = AppState.talksMap.get(key);
            if (direct) return direct;
            // Unit8 uses videoScene names (e.g. "jimmy_001") as TalkInfo.id —
            // resolve to the AVG Talk entry with smallest step whose videoScene matches.
            if (!/^\d+$/.test(key)) {
                let first = null;
                for (const talk of AppState.talksMap.values()) {
                    if (talk.videoScene === key) {
                        const step = parseInt(talk.step) || 0;
                        if (!first || step < (parseInt(first.step) || 0)) first = talk;
                    }
                }
                return first || null;
            }
            return null;
        },

        getTalkSummary(talkId, sceneId) {
            if (sceneId && AppState.sceneTalkSummaries[String(sceneId)]) {
                return AppState.sceneTalkSummaries[String(sceneId)];
            }
            return AppState.talkSummaries[String(talkId)] || '';
        },

        getChapterConfig(unit, loop) {
            let unitNum = 1;
            if (unit === 'Unit3') unitNum = 3;
            else if (unit === 'Unit2') unitNum = 2;
            else if (unit === 'Unit8') unitNum = 8;
            else if (unit === 'Unit9') unitNum = 9;
            const loopNum = parseInt(loop.replace('loop', ''));
            const id = String(unitNum * 100 + loopNum);
            return AppState.chapterConfigMap.get(id) || null;
        },

        extractNpcKey(resPath) {
            if (!resPath) return '';
            const m = resPath.match(/_npc_([A-Za-z]+)\d*$/);
            return m ? m[1] : '';
        },

        currentLoopExposeTalks(loop = AppState.currentLoop) {
            const loopNum = String(loop || '').replace('loop', '');
            if (!loopNum) return [];
            const prefixes = [`expose_l${loopNum}_`, `loop${loopNum}_`];
            return AppState.allTalks.filter(t => {
                const scene = String(t.videoScene || '').toLowerCase();
                return prefixes.some(prefix => scene.startsWith(prefix));
            }).sort((a, b) => {
                const stepA = Number(a.step || 999999);
                const stepB = Number(b.step || 999999);
                if (stepA !== stepB) return stepA - stepB;
                return Number(a.id || 0) - Number(b.id || 0);
            });
        },

        getExposeStartTalkId(loop = AppState.currentLoop) {
            const sourceTalks = this.currentLoopExposeTalks(loop);
            if (sourceTalks.length > 0) return String(sourceTalks[0].id);

            const chapCfg = this.getChapterConfig(AppState.currentUnit, loop);
            const firstLieTalkId = chapCfg?.exposes?.[0]?.talkId;
            if (!firstLieTalkId) return '';
            let startId = String(firstLieTalkId);
            for (const [id, talk] of AppState.talksMap) {
                if (talk.next === String(firstLieTalkId)) {
                    startId = id;
                    break;
                }
            }
            return startId;
        },

        // 从起始 Talk ID 遍历对话链，返回节点数组
        // 每个节点: { talk, branches: null | [{text, targetId}] }
        // 分支检测: script === "1" 且 Parameters 含 ParameterStr/ParameterInt
        buildDialogueChain(startId) {
            const chain = [];
            const visited = new Set();
            let currentId = String(startId);

            while (currentId && !visited.has(currentId)) {
                visited.add(currentId);
                const talk = this.getTalk(currentId);
                if (!talk) break;

                const node = { talk, branches: null };

                // 检测分支: script "1" 或 "branches" + Parameters 含 ParameterStr/ParameterInt
                if ((talk.script === '1' || talk.script === 'branches') && talk.Parameters && talk.Parameters.length > 0) {
                    const branchParams = talk.Parameters.filter(p => p.ParameterStr && p.ParameterInt);
                    if (branchParams.length > 0) {
                        node.branches = branchParams.map(p => ({
                            text: p.ParameterStr,
                            targetId: String(p.ParameterInt)
                        }));
                        chain.push(node);
                        break; // 分支处停止主链
                    }
                }

                if (!talk.next) {
                    // Lie (指证) entries: auto-follow ParameterInt0 jump target
                    const isLie = talk.script === 'Lie' || talk.script === 'lie';
                    const lieTarget = talk.Parameters?.[0]?.ParameterInt;
                    if (isLie && lieTarget && lieTarget !== '0') {
                        chain.push(node);
                        currentId = lieTarget;
                        continue;
                    }
                    // 无 next → 对话结束
                    chain.push(node);
                    break;
                }

                const nextStr = String(talk.next);
                if (nextStr.includes('/')) {
                    // 旧格式分支: next = "id1/id2/id3"
                    const branchIds = nextStr.split('/');
                    const params = talk.Parameters || [];
                    node.branches = branchIds.map((bid, i) => ({
                        text: params[i]?.ParameterStr || `选项 ${i + 1}`,
                        targetId: bid.trim()
                    }));
                    chain.push(node);
                    break;
                }

                chain.push(node);
                currentId = nextStr;
            }
            return chain;
        }
    };

    // ===== UI =====

                return `<p style="margin:0.3rem 0;line-height:1.8;color:var(--text-secondary);">${line}</p>`;

        },

        closeModal() {

            document.querySelector('#evidenceModal .modal').style.maxWidth = '';
            this._modalHistory = [];
            const titleEl = document.getElementById('modalTitle');
            if (titleEl) delete titleEl.dataset.itemId;
            // if a dialog was playing inside the drawer, close it to clear DialogController state
            if (typeof DialogController !== 'undefined'
                && DialogController._state
                && DialogController._state.containerId === 'npcDrawerDialog') {
                DialogController.close();
                DialogController._state.containerId = null;
            }

        modalBack() {

        // NPC drawer (rich, 3 sections) ——
        //   showNpcModal(npcId)         : 仅 NPC 档案(从 Art 视图或无场景上下文调用)
        //   showNpcModal(npcId, sceneNpcIdx) : 带场景上下文(ResPath + Talk/LoopTalk 入口 + 对白内嵌)
        showNpcModal(npcId, sceneNpcIdx) {
            const npc = AppState.npcsMap.get(String(npcId));
            if (!npc) return;
            this._modalHistory = [];

            const scene = (sceneNpcIdx != null) ? DataManager.getScene(AppState.currentSceneId) : null;
            const sceneInfo = (scene && scene.NPCInfos) ? scene.NPCInfos[sceneNpcIdx] : null;

            // 场景里实际用的立绘路径(ResPath) —— 只显示这个,不铺 IconLarge/Small
            const resPath = sceneInfo?.ResPath || '';
            const resUrl  = resPath ? Config.getAssetUrl(resPath) : '';
            const hasRes  = !!resPath;

            // Talk / LoopTalk 入口(仅场景上下文)
            const talkResolved = sceneInfo
                ? DataManager.resolveNpcTalkEntry(sceneInfo.TalkInfo, npc.id, { label: 'TalkInfo' })
                : { ok: false, id: '' };
            const loopTalkResolved = sceneInfo
                ? DataManager.resolveNpcTalkEntry(sceneInfo.LoopTalkInfo, npc.id, { label: 'LoopTalkInfo', allowFallback: false })
                : { ok: false, id: '' };
            const talkId = talkResolved.ok ? talkResolved.id : '';
            const loopTalkId = loopTalkResolved.ok ? loopTalkResolved.id : '';

            // 角色身份
            const roleMap = {'1':'主角','2':'搭档','3':'关键NPC','4':'受害者','5':'NPC','6':'嫌疑人'};
            const roleName = roleMap[npc.role] || npc.role || '未知';

            const titleEl = document.getElementById('modalTitle');
            const cnName = cn(npc.Name) || npc.id;
            const enName = npc.Name?.[1] || '';
            titleEl.innerHTML = `
                <div class="drawer-kicker">NPC · #${escapeHtml(String(npc.id))}</div>
                <div class="drawer-name">${escapeHtml(cnName)}</div>
                <div class="drawer-sub">${escapeHtml(roleName)}${enName ? ' · ' + escapeHtml(enName) : ''}${npc.Chapter ? ' · ' + escapeHtml(npc.Chapter) : ''}</div>
            `;
            titleEl.dataset.itemId = '';

            // ============ Section 1: 立绘 ============
            let html = `<section class="npc-section npc-portrait-section">`;
            html += `<div class="npc-portrait ${hasRes ? '' : 'missing'}">`;
            if (hasRes) {
                html += `<img src="${resUrl}" alt="${escapeHtml(cnName)}" onerror="this.closest('.npc-portrait').classList.add('miss-broken'); this.remove();">`;
            } else {
                html += `<div class="npc-portrait-q">?</div>`;
            }
            html += `</div>`;
            html += `<div class="npc-portrait-meta">`;
            if (!resPath) {
                html += `<div class="art-missing">[!] NPCInfo.ResPath 未填,场景里没有指定立绘</div>`;
            }
            html += `</div></section>`;

            // ============ Section 2: 对白(drawer 内嵌，AVG 流水式) ============
            // scene context(场景名 · NPC 简述)，AVG tabs(talk / loopTalk id 芯片)，stage 容器由 DialogController 填充
            const sceneName = scene?.sceneName || '';
            html += `<section class="npc-section npc-dialog-section">`;

            // tabs 行 —— 一个或两个 id 芯片(首次/重复)
            if (talkId || loopTalkId) {
                html += `<div class="avg-tabs">`;
                if (talkId) {
                    html += `<button class="avg-tab active" data-talk="${escapeHtml(talkId)}" onclick="UI._switchNpcTab(this, ${sceneNpcIdx}, 'talk')">#${escapeHtml(talkId)}</button>`;
                }
                if (loopTalkId && loopTalkId !== talkId) {
                    html += `<button class="avg-tab" data-talk="${escapeHtml(loopTalkId)}" onclick="UI._switchNpcTab(this, ${sceneNpcIdx}, 'loopTalk')">#${escapeHtml(loopTalkId)}</button>`;
                }
                html += `</div>`;
            }

            // scene context line
            if (sceneName || cnName) {
                html += `<div class="avg-ctx mono">`;
                if (sceneName) html += `<span class="avg-ctx-scene">${escapeHtml(sceneName)}</span>`;
                if (sceneName && cnName) html += `<span class="avg-ctx-sep">·</span>`;
                const unresolved = (!talkId && !loopTalkId && (talkResolved.message || loopTalkResolved.message))
                    ? `无对话 · ${talkResolved.message || loopTalkResolved.message}`
                    : '无对话';
                html += `<span class="avg-ctx-desc">${escapeHtml(cnName)} · ${talkId || loopTalkId ? '点击 stage 播放' : unresolved}</span>`;
                html += `</div>`;
            }

            // stage 容器 —— DialogController._renderStream 会往这里写 .avg-stage 等
            html += `<div id="npcDrawerDialog" class="npc-dialog-stage"></div>`;

            if (!talkId && !loopTalkId) {
                html += `<div class="dlg-entry-empty" style="padding:10px 0;">该 NPC 在本场景无对话</div>`;
            }
            html += `</section>`;

            // ============ Section 3: 相关证词 (默认折叠) ============
            const testimonies = AppState.testimoniesByNpc?.get(String(npc.id)) || [];
            const hasTestimonies = testimonies.length > 0;
            html += `<section class="npc-section npc-testimony-section collapsed">`;
            html += `<button class="testimony-toggle" onclick="UI._toggleTestimony(this)" type="button">
                <span class="chev">▸</span>
                <span class="smallcap">相关证词</span>
                <span class="section-count">${testimonies.length}</span>
                ${hasTestimonies ? '<span class="toggle-hint">点击展开</span>' : ''}
            </button>`;
            html += `<div class="npc-testimony-list-wrap">`;
            if (hasTestimonies) {
                html += `<div class="npc-testimony-list">`;
                testimonies.forEach(t => {
                    const zh = (Array.isArray(t.testimony) ? t.testimony[0] : t.testimony) || '';
                    const en = (Array.isArray(t.testimony) ? t.testimony[1] : '') || '';
                    html += `<div class="npc-testimony-item">
                        <div class="quote">"${escapeHtml(zh)}"</div>
                        ${en ? `<div class="quote-en">${escapeHtml(en)}</div>` : ''}
                        <div class="quote-meta">#${escapeHtml(String(t.id))} · type ${escapeHtml(String(t.testimonyType || '?'))}${t.triggerType ? ' · trigger ' + escapeHtml(String(t.triggerType)) : ''}</div>
                    </div>`;
                });
                html += `</div>`;
            } else {
                html += `<div class="dlg-entry-empty" style="padding:10px 0;">暂无绑定到该 NPC 的证词(或 TestimonyItem 未加载)</div>`;
            }
            html += `</div>`;
            html += `</section>`;

            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('evidenceModal').classList.add('active');

            // 自动开播第一段对话(优先 talk，没有就 loopTalk)
            if (sceneNpcIdx != null) {
                if (talkId) {
                    setTimeout(() => DialogController.start(sceneNpcIdx, 'talk', 'npcDrawerDialog'), 60);
                } else if (loopTalkId) {
                    setTimeout(() => DialogController.start(sceneNpcIdx, 'loopTalk', 'npcDrawerDialog'), 60);
                }
            }
        },

        // 相关证词折叠 / 展开
        _toggleTestimony(btn) {
            const section = btn.closest('.npc-testimony-section');
            if (!section) return;
            section.classList.toggle('collapsed');
        },

        // tab 切换 —— 激活对应 tab 并重新开播那一段
        _switchNpcTab(tabEl, sceneNpcIdx, talkType) {
            tabEl.parentElement.querySelectorAll('.avg-tab').forEach(t => t.classList.remove('active'));
            tabEl.classList.add('active');
            DialogController.start(sceneNpcIdx, talkType, 'npcDrawerDialog');
        },

        // 场景点击 NPC 立绘/roster/info 卡 → 调这个(传 NPCInfos 的 index)
        showNpcDrawerBySceneIdx(sceneNpcIdx) {
            const scene = DataManager.getScene(AppState.currentSceneId);
            const info = scene?.NPCInfos?.[sceneNpcIdx];
            const npcId = info?.NPC?.id;
            if (!npcId) return;
            this.showNpcModal(npcId, sceneNpcIdx);
        },

        // 卡片 "▶ 播放" 按钮的便捷入口 —— 位置参数版(避免 inline onclick 里 JSON 转义)
        playTalkInDrawer(talkId, kicker, title, sub) {
            this.showDialogDrawer(talkId, {
                kicker: kicker || 'DIALOG',
                title: title || ('Talk #' + talkId),
                sub: sub || ''
            });
        },

        // 通用对白抽屉 —— 无 NPC 上下文的场合(cutscene / event / ending / expose)用这个
        showDialogDrawer(talkId, opts) {

                <div class="drawer-kicker">${escapeHtml(opts.kicker || 'DIALOG')}</div>

        async saveItemField(itemId, field, value) {
            try {
                const r = await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ table: 'ItemStaticData', id: String(itemId),
                                            changes: { [field]: value } }),
                });
                const j = await r.json();
                if (!r.ok || j.error) throw new Error(j.error || 'save failed');
                const item = DataManager.getItem(itemId);
                if (item) item[field] = value;
                UI.updateStatus(`✓ 已保存 #${itemId}.${field} = ${value}`);
            } catch (e) {
                alert(`保存失败: ${e.message}`);
            }
        },

        renderFlowSidebar(sidebar) {
            // v2: 完全用 JSON + 设计期字段，不读 yaml
            const unit = AppState.currentUnit;
            const loop = AppState.currentLoop;
            const loopNum = parseInt(String(loop).replace(/[^\d]/g, '')) || 0;
            const ld = AppState.loopData;
            let html = '';

            // 目标（来自 ChapterConfig.chapterGoal，loadLoopConfig 已派生进 loopData）
            if (ld && ld.target) {
                html += `<div style="padding: 0.3rem 1rem; font-size: 0.8rem; color: var(--text-muted);">${escapeHtml(ld.target)}</div>`;
            }

            // 取出当前 Loop 的 initScene 用作"开篇"标记
            const unitNum = parseInt(String(unit).replace(/[^\d]/g, '')) || 0;
            const chapterId = `${unitNum}0${loopNum}`;
            const chapter = AppState.chapterConfigMap ? AppState.chapterConfigMap.get(chapterId) : null;
            const initSceneId = chapter ? String(chapter.initScene || '').trim() : '';

            // 当前 Loop 的场景，按 loop + isOpen 过滤
            // initScene 永远排在自己分类的第一位
            const loopScenes = DataManager.scenesForLoop(unit, loop)
                .slice()
                .sort((a, b) => {
                    const aIsInit = String(a.sceneId) === initSceneId;
                    const bIsInit = String(b.sceneId) === initSceneId;
                    if (aIsInit && !bIsInit) return -1;
                    if (bIsInit && !aIsInit) return 1;
                    return String(a.sceneId).localeCompare(String(b.sceneId));
                });

            if (loopScenes.length === 0) {
                html += `<div class="sidebar-section">无场景</div>`;
                html += `<div style="padding:0.6rem 1rem; font-size:0.75rem; color:var(--text-muted);">该 Loop 无开放场景（检查场景的 loop / isOpen 字段）</div>`;
                sidebar.innerHTML = html;
                return;
            }

            // 按底图类型分组：场景 → location.backgroundImage → ArtAssetConfig.sceneKind
            // dialogue=对话 / explore=探索(AVG) / 其余=底图未登记(兜底)
            const byKind = { dialogue: [], explore: [], unknown: [] };
            loopScenes.forEach(s => {
                const kind = DataManager.sceneKind(s);
                if (kind === 'dialogue') byKind.dialogue.push(s);
                else if (kind === 'explore') byKind.explore.push(s);
                else byKind.unknown.push(s);
            });

            const renderScene = (s) => {
                const sid = String(s.sceneId);
                const sceneName = s.sceneName || `场景 ${sid}`;
                const npcCount = s.NPCInfos?.length || 0;
                const evidenceItems = DataManager.sceneEvidence(sid);
                const isActive = AppState.currentSceneId === sid;
                const noteIcon = s?.note === '晚上' ? '🌙' : s?.note === '白天' ? '☀️' : '';
                const isInit = sid === initSceneId;
                const initBadge = isInit ? `<span class="badge init-scene" title="本 Loop 的 initScene">开篇</span>` : '';
                return `
                    <div class="sidebar-item ${isActive ? 'active' : ''}"
                         onclick="FlowView.showScene('${sid}')">
                        ${noteIcon ? `<span title="${s.note}">${noteIcon}</span>` : ''}
                        ${escapeHtml(sceneName)}
                        <span style="color:var(--text-muted); font-size:0.75rem;">${sid}</span>
                        ${initBadge}
                        ${npcCount ? `<span class="badge npc">${npcCount}NPC</span>` : ''}
                        ${evidenceItems.length ? `<span class="badge">${evidenceItems.length}</span>` : ''}
                    </div>
                `;
            };

            // 对话场景
            if (byKind.dialogue.length > 0) {
                html += `<div class="sidebar-section"><span class="phase-tag opening">🎬 对话场景</span> (${byKind.dialogue.length})</div>`;
                byKind.dialogue.forEach(s => html += renderScene(s));
            }
            // 探索场景（AVG）
            if (byKind.explore.length > 0) {
                html += `<div class="sidebar-section"><span class="phase-tag free">🔍 探索场景</span> (${byKind.explore.length})</div>`;
                byKind.explore.forEach(s => html += renderScene(s));
            }
            // 底图未登记（兜底）—— 提示去 ArtAssetConfig 补 sceneKind
            if (byKind.unknown.length > 0) {
                html += `<div class="sidebar-section">📍 底图未登记 (${byKind.unknown.length})</div>`;
                byKind.unknown.forEach(s => html += renderScene(s));
            }
            // Expose is not a standalone scene, but it still needs a clickable dialogue entry.

            const exposeCount = (chapter && Array.isArray(chapter.exposes)) ? chapter.exposes.length : 0;

            if (exposeCount > 0) {

                const exposeStartId = DataManager.getExposeStartTalkId(AppState.currentLoop);

                const exposeTalkCount = DataManager.currentLoopExposeTalks(AppState.currentLoop).length;

                const exposeNpc = chapter?.exposeNpcId ? AppState.npcsMap.get(String(chapter.exposeNpcId)) : null;
                const targetName = loop.expose?.target_name || cn(exposeNpc?.Name) || chapter.exposeNpcId || '';
                const exposeRoundLines = (chapter.exposes || []).map((exposeEntry, idx) => {
                    const targetId = String(exposeEntry?.testimony || '').trim();
                    const target = targetId && targetId !== '0' && typeof FlowOverviewView !== 'undefined' && FlowOverviewView.resolveExposeMaterial
                        ? FlowOverviewView.resolveExposeMaterial(targetId, AppState.currentLoop)
                        : null;
                    const materials = Array.isArray(exposeEntry?.item) ? exposeEntry.item : [];
                    const materialNames = materials.map(id => {
                        const material = typeof FlowOverviewView !== 'undefined' && FlowOverviewView.resolveExposeMaterial
                            ? FlowOverviewView.resolveExposeMaterial(id, AppState.currentLoop)
                            : null;
                        return material?.name || String(id);
                    }).filter(Boolean).slice(0, 2);
                    const more = materials.length > 2 ? ` 等${materials.length}个材料` : '';
                    const roundName = target?.name || '材料组合推理';
                    const materialText = materialNames.length ? `材料：${materialNames.join(' + ')}${more}` : '未配置材料';
                    return `<div class="sidebar-expose-round"><span>第 ${escapeHtml(exposeEntry?.id || idx + 1)} 轮</span><strong>${escapeHtml(roundName)}</strong><em>${escapeHtml(materialText)}</em></div>`;
                }).join('');

                html += `<div class="sidebar-section"><span class="phase-tag expose">⚔️ 指证</span></div>`;

                html += `

                    <div class="sidebar-item sidebar-expose-item ${AppState.currentPhase === 'expose' ? 'active' : ''}"

                         onclick="FlowView.showPhase('expose')">

                        <div class="sidebar-expose-head">

                            <span class="phase-tag expose">指证</span>

                            <span>${escapeHtml(targetName || '本 Loop 指证')}</span>

                            <span class="badge">${exposeCount}轮</span>

                        </div>
                    </div>


                `;

            }


            sidebar.innerHTML = html;
            return;
            // ▼ 旧 yaml-驱动渲染分支（已废弃，保留下方代码以防 fallback；正常不会执行）
            const _legacy_loop = {};
            if (false) {  // 不再执行，但保留下方旧代码避免误删依赖

            // Opening
            if (loop.opening && loop.opening.length > 0) {
                html += `
                    <div class="sidebar-item ${AppState.currentPhase === 'opening' ? 'active' : ''}"
                         onclick="FlowView.showPhase('opening')">
                        <span class="phase-tag opening">开篇</span> (${loop.opening.length}场景)
                    </div>
                `;
            }

            // Scene list: support both old free_phase and new scenes{unlocked,locked,closed}
            // Unit9 yaml uses nested form { unlocked: { 地点A: [id...], 地点B: [id...] } }
            // Other units use flat form { unlocked: [id, id, ...] }; flatten if object.
            const flattenScenes = (raw) => {
                const extractId = (x) => (x && typeof x === 'object' && x.id != null) ? x.id : x;
                if (Array.isArray(raw)) return raw.map(extractId);
                if (raw && typeof raw === 'object') {
                    return Object.values(raw).flat().map(extractId);
                }
                return [];
            };
            if (loop.scenes) {
                const unlocked = flattenScenes(loop.scenes.unlocked);
                const locked = flattenScenes(loop.scenes.locked);
                const closed = flattenScenes(loop.scenes.closed);
                const locations = AppState.locationsData?.locations;

                // Helper: extract location code (last 2 digits) from scene ID
                const locCode = (sid) => String(sid).slice(-2);
                const padCode = (n) => String(n).padStart(2, '0');

                // Helper: find location group for a scene ID
                const findLocation = (sid) => {
                    if (!locations) return null;
                    const code = locCode(sid);
                    return locations.find(loc =>
                        padCode(loc.entry) === code ||
                        (loc.children || []).map(c => padCode(c)).includes(code)
                    );
                };

                // Helper: group items by location, preserving order
                const groupByLocation = (items, getId) => {
                    const groups = new Map(); // locName → items[]
                    const noGroup = [];
                    items.forEach(item => {
                        const sid = getId(item);
                        const loc = findLocation(sid);
                        if (loc) {
                            if (!groups.has(loc.name)) groups.set(loc.name, []);
                            groups.get(loc.name).push(item);
                        } else {
                            noGroup.push(item);
                        }
                    });
                    return { groups, noGroup };
                };

                // Render unlocked scenes grouped by location
                if (unlocked.length > 0) {
                    html += `<div class="sidebar-section">解锁 (${unlocked.length})</div>`;
                    const { groups, noGroup } = groupByLocation(unlocked, id => String(typeof id === 'object' ? id.id : id));

                    for (const [locName, sceneIds] of groups) {
                        html += `<div style="padding:0.3rem 1rem 0.1rem; font-size:0.75rem; color:var(--highlight); font-weight:600;">${escapeHtml(locName)}</div>`;
                        sceneIds.forEach(sceneId => {
                            const sid = String(sceneId);
                            const scene = DataManager.getScene(sid);
                            const sceneName = scene?.sceneName || `场景 ${sid}`;
                            const npcCount = scene?.NPCInfos?.length || 0;
                            const evidenceItems = scene ? DataManager.sceneEvidence(sid) : [];
                            const isActive = AppState.currentSceneId === sid;
                            const noteIcon = scene?.note === '晚上' ? '🌙' : scene?.note === '白天' ? '☀️' : '';
                            html += `
                                <div class="sidebar-item ${isActive ? 'active' : ''}"
                                     onclick="FlowView.showScene('${sid}')" style="padding-left:1.5rem;">
                                    ${noteIcon ? `<span title="${scene.note}">${noteIcon}</span>` : ''}
                                    ${escapeHtml(sceneName)}
                                    <span style="color:var(--text-muted); font-size:0.75rem;">${sid}</span>
                                    ${npcCount ? `<span class="badge npc">${npcCount}NPC</span>` : ''}
                                    ${evidenceItems.length ? `<span class="badge">${evidenceItems.length}</span>` : ''}
                                </div>
                            `;
                        });
                    }
                    noGroup.forEach(sceneId => {
                        const sid = String(sceneId);
                        const scene = DataManager.getScene(sid);
                        const sceneName = scene?.sceneName || `场景 ${sid}`;
                        const npcCount = scene?.NPCInfos?.length || 0;
                        const evidenceItems = scene ? DataManager.sceneEvidence(sid) : [];
                        const isActive = AppState.currentSceneId === sid;
                        const noteIcon = scene?.note === '晚上' ? '🌙' : scene?.note === '白天' ? '☀️' : '';
                        html += `
                            <div class="sidebar-item ${isActive ? 'active' : ''}"
                                 onclick="FlowView.showScene('${sid}')">

                                ${escapeHtml(sceneName)}
                                <span style="color:var(--text-muted); font-size:0.75rem;">${sid}</span>

                                ${evidenceItems.length ? `<span class="badge">${evidenceItems.length}</span>` : ''}
                            </div>
                        `;
                    });
                }

                // Render locked scenes grouped by location
                if (locked.length > 0) {
                    html += `<div class="sidebar-section">未解锁 (${locked.length})</div>`;
                    const { groups, noGroup } = groupByLocation(locked, item => String(typeof item === 'object' ? item.id : item));

                    for (const [locName, items] of groups) {
                        html += `<div style="padding:0.3rem 1rem 0.1rem; font-size:0.75rem; color:var(--highlight); font-weight:600;">${escapeHtml(locName)}</div>`;
                        items.forEach(item => {
                            const sid = String(typeof item === 'object' ? item.id : item);
                            const reason = (typeof item === 'object' && item.reason) ? item.reason : '';
                            const scene = DataManager.getScene(sid);
                            const sceneName = scene?.sceneName || `场景 ${sid}`;
                            html += `
                                <div class="sidebar-item locked" style="padding-left:1.5rem;" ${reason ? `title="${escapeHtml(reason)}"` : ''}>
                                    🔒 ${escapeHtml(sceneName)}
                                    <span style="color:var(--text-muted); font-size:0.75rem;">${sid}</span>
                                    ${reason ? `<div style="font-size:0.75rem; color:var(--text-muted); margin-top:2px;">${escapeHtml(reason)}</div>` : ''}
                                </div>
                            `;
                        });
                    }
                    noGroup.forEach(item => {
                        const sid = String(typeof item === 'object' ? item.id : item);
                        const reason = (typeof item === 'object' && item.reason) ? item.reason : '';
                        const scene = DataManager.getScene(sid);
                        const sceneName = scene?.sceneName || `场景 ${sid}`;
                        html += `
                            <div class="sidebar-item locked" ${reason ? `title="${escapeHtml(reason)}"` : ''}>
                                🔒 ${escapeHtml(sceneName)}
                                <span style="color:var(--text-muted); font-size:0.75rem;">${sid}</span>
                                ${reason ? `<div style="font-size:0.75rem; color:var(--text-muted); margin-top:2px;">${escapeHtml(reason)}</div>` : ''}
                            </div>
                        `;
                    });
                }

                // Render closed scenes grouped by location
                if (closed.length > 0) {
                    html += `<div class="sidebar-section">不开放 (${closed.length})</div>`;
                    const { groups, noGroup } = groupByLocation(closed, item => String(typeof item === 'object' ? item.id : item));

                    for (const [locName, items] of groups) {
                        html += `<div style="padding:0.3rem 1rem 0.1rem; font-size:0.75rem; color:var(--highlight); font-weight:600;">${escapeHtml(locName)}</div>`;
                        items.forEach(item => {
                            const sid = String(typeof item === 'object' ? item.id : item);
                            const reason = (typeof item === 'object' && item.reason) ? item.reason : '';
                            const scene = DataManager.getScene(sid);
                            const sceneName = scene?.sceneName || `场景 ${sid}`;
                            html += `
                                <div class="sidebar-item closed" style="padding-left:1.5rem;" ${reason ? `title="${escapeHtml(reason)}"` : ''}>
                                    ${escapeHtml(sceneName)}
                                    <span style="color:var(--text-muted); font-size:0.75rem;">${sid}</span>
                                    ${reason ? `<div style="font-size:0.75rem; color:var(--text-muted); margin-top:2px;">${escapeHtml(reason)}</div>` : ''}
                                </div>
                            `;
                        });
                    }
                    noGroup.forEach(item => {
                        const sid = String(typeof item === 'object' ? item.id : item);
                        const reason = (typeof item === 'object' && item.reason) ? item.reason : '';
                        const scene = DataManager.getScene(sid);
                        const sceneName = scene?.sceneName || `场景 ${sid}`;
                        html += `
                            <div class="sidebar-item closed" ${reason ? `title="${escapeHtml(reason)}"` : ''}>
                                ${escapeHtml(sceneName)}
                                <span style="color:var(--text-muted); font-size:0.75rem;">${sid}</span>
                                ${reason ? `<div style="font-size:0.75rem; color:var(--text-muted); margin-top:2px;">${escapeHtml(reason)}</div>` : ''}
                            </div>
                        `;
                    });
                }
            } else if (loop.free_phase && loop.free_phase.length > 0) {
                // Legacy flat list (Unit1 backward compat)
                html += `<div class="sidebar-section">自由探索 (${loop.free_phase.length})</div>`;
                loop.free_phase.forEach(sceneId => {
                    const sid = String(sceneId);
                    const scene = DataManager.getScene(sid);
                    const sceneName = scene?.sceneName || `场景 ${sid}`;
                    const npcCount = scene?.NPCInfos?.length || 0;
                    const evidenceItems = scene ? DataManager.sceneEvidence(sid) : [];
                    const isActive = AppState.currentSceneId === sid;
                    const noteIcon = scene?.note === '晚上' ? '🌙' : scene?.note === '白天' ? '☀️' : '';
                    html += `
                        <div class="sidebar-item ${isActive ? 'active' : ''}"
                             onclick="FlowView.showScene('${sid}')">
                            ${noteIcon ? `<span title="${scene.note}">${noteIcon}</span>` : ''}
                            ${escapeHtml(sceneName)}
                            <span style="color:var(--text-muted); font-size:0.75rem;">${sid}</span>
                            ${npcCount ? `<span class="badge npc">${npcCount}NPC</span>` : ''}
                            ${evidenceItems.length ? `<span class="badge">${evidenceItems.length}</span>` : ''}
                        </div>
                    `;
                });
            }

            // Expose
            if (loop.expose) {
                html += `
                    <div class="sidebar-item ${AppState.currentPhase === 'expose' ? 'active' : ''}"
                         onclick="FlowView.showPhase('expose')">
                        <span class="phase-tag expose">指证</span> ${escapeHtml(loop.expose.target_name || '')}
                    </div>
                `;
            }

            // Events (突发事件) — 每个事件单独一行展示
            if (loop.events && loop.events.length > 0) {
                loop.events.forEach((event, idx) => {
                    const fullName = event.name || `Event ${idx + 1}`;
                    const displayName = fullName.replace(/^(突发|Cutscene|Post-Expose|警局过场|情节转折|Ending|Suspect Suicide Sequence|Arrest Cutscene|Post-Expose Dialogue|Post-Expose Romance)\s*[·:]\s*/, '');
                    html += `
                        <div class="sidebar-item ${AppState.currentPhase === 'events' ? 'active' : ''}"
                             onclick="FlowView.showPhase('events', ${idx})"
                             title="${escapeHtml(fullName)}">
                            <span class="phase-tag events">突发</span> ${escapeHtml(displayName)}
                        </div>
                    `;
                });
            }

            // Ending (Loop 6 only)
            if (loop.ending && loop.ending.length > 0) {
                html += `
                    <div class="sidebar-item ${AppState.currentPhase === 'ending' ? 'active' : ''}"
                         onclick="FlowView.showPhase('ending')">
                        <span class="phase-tag ending">结尾</span> (${loop.ending.length}场景)
                    </div>
                `;
            }

            sidebar.innerHTML = html;
            }  // ← 关闭上面的 if (false) 死代码块
        }
    };

    // ===== Doubt View (疑点详情浮层) =====
    const DoubtView = {
        // Unit3 30xx 系列 ID 未在 ID 中编码 loop, 需要静态映射
        _u3loopMap: {
            '3001': 'loop1', '3002': 'loop1',
            '3003': 'loop2', '3004': 'loop2', '3005': 'loop2', '3014': 'loop2',
            '3006': 'loop3', '3007': 'loop3', '3008': 'loop3', '3010': 'loop3', '3011': 'loop3',
            '3009': 'loop4', '3012': 'loop4', '3013': 'loop4'
        },

        unitPrefix(unit) {
            if (unit === 'Unit1') return '1';
            if (unit === 'Unit3') return '3';
            if (unit === 'Unit9') return '9';
            return null;
        },

        doubtLoop(id) {
            const s = String(id);
            if (this._u3loopMap[s]) return this._u3loopMap[s];
            const d = s[1];
            if (d >= '1' && d <= '6') return 'loop' + d;
            return null;
        },

        doubtsInLoop(unit, loop) {
            const prefix = this.unitPrefix(unit);
            if (!prefix) return [];
            return AppState.allDoubts.filter(d => {
                const s = String(d.id);
                return s[0] === prefix && this.doubtLoop(s) === loop;
            });
        },

        condKey(c) { return `${c.type}:${c.param}`; },

        isSat(c) { return AppState.satisfiedConditions.has(this.condKey(c)); },

        progress(doubt) {
            const conds = doubt.condition || [];
            const done = conds.filter(c => this.isSat(c)).length;
            return { done, total: conds.length };
        },

        resolveCondition(c) {
            const type = String(c.type);
            const pid = String(c.param);
            if (type === '1') {
                const item = AppState.itemsMap.get(pid);
                return {
                    cls: 'item',
                    typeLabel: '道具',
                    name: item ? (cn(item.Name) || '(未命名)') : '(未找到)'
                };
            }
            // type 3 = Timeline / type 4 = 证词条目（数据中两种都出现过）
            // 都映射到 TestimonyItem.testimony 文本
            if (type === '3' || type === '4') {
                const t = AppState.allTestimonies.find(x => String(x.id) === pid);
                let textZh = '(未找到)';
                let npcName = '';
                if (t && t.testimony) textZh = cn(t.testimony) || '(无文本)';
                const npcId = pid.length >= 3 ? pid.slice(0, 3) : '';
                const npc = AppState.npcsMap.get(npcId);
                if (npc) npcName = cn(npc.Name) || '';
                const label = type === '3' ? '时间线' : '证词';
                return {
                    cls: 'testi',
                    typeLabel: label,
                    name: npcName ? `${npcName}·${textZh}` : textZh
                };
            }
            if (type === '2') {
                return { cls: 'rel', typeLabel: '关系网', name: `关系连接 ${pid}` };
            }
            return { cls: '', typeLabel: '未知', name: pid };
        },

        showList() {
            this.render();
            document.getElementById('doubtModal').classList.add('active');
        },

        render() {
            const doubts = this.doubtsInLoop(AppState.currentUnit, AppState.currentLoop);
            const loopLabel = (AppState.currentLoop || '').replace('loop', 'Loop ');
            const doneCount = doubts.filter(d => {
                const p = this.progress(d);
                return p.total > 0 && p.done === p.total;
            }).length;

            let html = `
                <div class="doubt-list-header">
                    <span class="dl-title">疑点面板</span>
                    <span class="dl-sub">${escapeHtml(AppState.currentUnit)} · ${escapeHtml(loopLabel)} · ${doneCount}/${doubts.length}</span>
                </div>
            `;

            if (doubts.length === 0) {
                html += `<div class="doubt-list-empty">当前 Loop 暂无疑点配置</div>`;
                document.getElementById('doubtDrawerContent').innerHTML = html;
                return;
            }

            html += `<div class="doubt-cond-toolbar" style="margin-top:0;border-top:0;padding-top:0;">
                <button onclick="DoubtView.setAllLoop(true)">全部已满足</button>
                <button onclick="DoubtView.setAllLoop(false)">全部清除</button>
            </div>`;

            doubts.forEach(doubt => {
                const { done, total } = this.progress(doubt);
                const isDone = total > 0 && done === total;

                html += `
                    <div class="doubt-card ${isDone ? 'done' : ''}">
                        <div class="doubt-card-meta">
                            <span class="doubt-label">疑点 · #${escapeHtml(String(doubt.id))}</span>
                            <span class="doubt-progress">${done} / ${total}</span>
                        </div>
                        <div class="doubt-card-title">${escapeHtml(doubt.text || '(无文本)')}</div>
                        <div class="doubt-cond-list">
                `;

                (doubt.condition || []).forEach(c => {
                    const info = this.resolveCondition(c);
                    const sat = this.isSat(c);
                    const type = String(c.type);
                    const param = String(c.param);
                    html += `
                        <div class="doubt-cond-row ${info.cls} ${sat ? 'sat' : ''}"
                             onclick="DoubtView.toggleCondition('${type}','${param}')">
                            <span class="cond-icon"></span>
                            <span class="cond-type">${escapeHtml(info.typeLabel)}</span>
                            <span class="cond-pid">#${escapeHtml(param)}</span>
                            <span class="cond-name" title="${escapeHtml(info.name)}">${escapeHtml(info.name)}</span>
                            <span class="cond-dot"></span>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            });

            document.getElementById('doubtDrawerContent').innerHTML = html;
        },

        // 同步右上角入口按钮的徽章文字和样式
        refreshEntry() {
            const el = document.getElementById('doubtFloat');
            if (!el) return;
            // 隐藏条件：美术视图 / 未加载 Loop / 仍在开篇对白阶段 / 尚未选中任何阶段
            if (AppState.currentView === 'art'
                || !AppState.loopData
                || AppState.currentPhase === 'opening'
                || AppState.currentPhase == null) {
                el.classList.add('doubt-float-hidden');
                return;
            }
            el.classList.remove('doubt-float-hidden');

            const loopData = AppState.loopData;
            const doubts = this.doubtsInLoop(AppState.currentUnit, AppState.currentLoop);
            const doneCount = doubts.filter(d => {
                const p = this.progress(d);
                return p.total > 0 && p.done === p.total;
            }).length;

            const loopLabel = (AppState.currentLoop || '').replace('loop', 'LOOP ');
            // 注：loop.title 是策划导航标签（含剧透，如"厨师的代价"→James），
            //     绝不可展示给玩家——浮窗只显示 target 问句。
            const loopTarget = loopData.target || '(本 Loop 未填写目标)';

            document.getElementById('doubtFloatKicker').textContent = '当前目标';
            document.getElementById('doubtFloatLoop').textContent = loopLabel;
            document.getElementById('doubtFloatTarget').textContent = loopTarget;
            const progressText = doubts.length === 0 ? '无配置' : `${doneCount} / ${doubts.length}`;
            document.getElementById('doubtFloatPill').textContent = progressText;
