    // ===== Dialog Controller (one-line-at-a-time navigation) =====
    const DialogController = {
        _state: {
            chain: [],       // 当前线性对话链 [{talk, branches}]
            index: 0,        // 当前位置
            history: [],     // 分支历史栈，用于返回上一层
            avatarUrl: '',   // NPC 默认头像
            sceneId: '',
        },

        start(npcIdx, talkType, containerId) {
            const scene = DataManager.getScene(AppState.currentSceneId);
            const info = scene?.NPCInfos?.[npcIdx];
            if (!info) return;

            const entry = talkType === 'loopTalk' ? info.LoopTalkInfo : info.TalkInfo;
            const resolved = DataManager.resolveNpcTalkEntry(entry, info.NPC?.id, {
                label: talkType === 'loopTalk' ? 'LoopTalkInfo' : 'TalkInfo',
                allowFallback: talkType !== 'loopTalk',
            });
            if (!resolved.ok || !resolved.id) {
                UI.updateStatus(resolved.message || '该 NPC 无对话入口');
                return;
            }
            const talkId = resolved.id;

            const resA = info.ResPath ? Config.getAssetUrl(info.ResPath) : '';
            const resB = info.ClickResPath ? Config.getAssetUrl(info.ClickResPath) : '';

            this._state = {
                chain: DataManager.buildDialogueChain(talkId),
                index: 0,
                history: [],
                avatarUrl: resA || resB,
                sceneId: AppState.currentSceneId,
                containerId: containerId || null,
                focusSpeakerId: info.NPC?.id || '',
            };

            if (this._state.chain.length === 0) {
                UI.updateStatus('该 NPC 无对话数据');
                return;
            }

            this._render();
        },

        // 从任意 Talk ID 开始对话（不依赖 NPCInfos）
        startFromTalkId(talkId, containerId) {
            if (!talkId) return;
            const chain = DataManager.buildDialogueChain(talkId);
            if (chain.length === 0) {
                UI.updateStatus('无对话数据');
                return;
            }
            const firstIcon = chain.find(n => n.talk.Speaker?.IconSmall)?.talk.Speaker?.IconSmall;
            const firstSpeakerId = chain[0]?.talk?.Speaker?.id || '';
            this._state = {
                chain, index: 0, history: [],
                avatarUrl: firstIcon ? `${Config.paths.assets}/Art/NPC/Icon/${firstIcon}.png` : '',
                sceneId: '', containerId: containerId || null,
                focusSpeakerId: firstSpeakerId,
            };
            this._render();
        },

        _render() {
            if (!this._state.chain.length) { this.close(); return; }

            // 所有对白都在 drawer 里 streaming。没 containerId 说明调用方没走 drawer 入口 ——
            // 用 UI.showDialogDrawer 兜底,把当前 chain 的首句 id 送进去开 drawer(再回头调 startFromTalkId 传 containerId)
            if (!this._state.containerId) {
                const firstTalkId = this._state.chain[0]?.talk?.id;
                if (firstTalkId && typeof UI !== 'undefined' && UI.showDialogDrawer) {
                    UI.showDialogDrawer(String(firstTalkId));
                }
                return;
            }
            this._renderStream();
        },

        // 流水式渲染(drawer 专用)：lines[0..index] 全部堆叠，淡化旧的，高亮当前
        _renderStream() {
            const { chain, index, containerId, focusSpeakerId } = this._state;
            const stage = document.getElementById(containerId);
            if (!stage) return;
            this.closeScriptEditor(false);

            const total = chain.length;
            const curNode = chain[index];
            const curTalk = curNode.talk;
            const isLast = (index === total - 1);
            const hasBranches = isLast && curNode.branches && curNode.branches.length > 0;
            const isEnd = isLast && !curNode.branches;
            const canPrev = index > 0 || this._state.history.length > 0;
            // 主角 Zack / 搭档 Emma 在不同 Unit 的 NPC id 不统一，按姓名判断更稳
            const PROTAGONIST_NAMES = ['Zack', 'Zack Brennan', '扎克', '扎克·布伦南'];
            const PARTNER_NAMES = ['Emma', "Emma O'Malley", '艾玛', '艾玛·奥马利'];

            const buildLineHtml = (i) => {
                const n = chain[i];
                const t = n.talk;
                const speakerName = cn(t.Speaker?.Name) || t.Speaker?.id || '?';
                const speakerId = String(t.Speaker?.id || '');
                const words = cn(t.Words) || '';
                const action = t.cnAction || '';
                const isCurrent = (i === index);
                const isSelf = focusSpeakerId && speakerId === String(focusSpeakerId);
                const speakerNameEn = t.Speaker?.Name?.[1] || '';
                const isProtagonist = PROTAGONIST_NAMES.includes(speakerName)
                    || PROTAGONIST_NAMES.includes(speakerNameEn);
                const isPartner = PARTNER_NAMES.includes(speakerName)
                    || PARTNER_NAMES.includes(speakerNameEn);
                const isLie = t.script === 'Lie' || t.script === 'lie';
                const lieEv = isLie ? (t.Parameters?.[0]?.ParameterStr || '') : '';
                const roleCls = isProtagonist ? 'protagonist' : (isPartner ? 'partner' : (isSelf ? 'self' : ''));
                return `
                    <div class="avg-line ${isCurrent ? 'current' : 'faded'} ${roleCls}">
                        <div class="avg-who">${escapeHtml(speakerName)}${action ? `<span class="avg-mood">(${escapeHtml(action)})</span>` : ''}</div>
                        <div class="avg-text">&ldquo;${escapeHtml(words)}&rdquo;</div>
                        ${isLie ? `<div class="avg-lie">&#x1f3af; 指证点 · 证据 ${escapeHtml(lieEv)}</div>` : ''}
                    </div>
                `;
            };

            let footerHtml;
            if (hasBranches) {
                let branchBtns = '';
                curNode.branches.forEach(b => {
                    branchBtns += `<button class="avg-branch-btn" onclick="DialogController.selectBranch('${b.targetId}')">${escapeHtml(b.text)}</button>`;
                });
                footerHtml = `<div class="avg-branches">${branchBtns}</div>`;
            } else {
                const hintText = isEnd ? '对白结束' : '点击 / 空格 继续 ▸';
                footerHtml = `
                    <div class="avg-footer">
                        <span class="avg-progress mono">${index + 1} / ${total}<span class="avg-sep">·</span>Talk #${escapeHtml(String(curTalk.id || '?'))}</span>
                        <span class="avg-hint mono">${hintText}</span>
                    </div>
                `;
            }

            const controlsHtml = `
                <div class="avg-controls">
                    <button class="avg-pill" onclick="DialogController.replay()" ${canPrev ? '' : 'disabled'}>&#x21bb; 重播本段</button>
                    <button class="avg-pill" onclick="DialogController.prev()" ${canPrev ? '' : 'disabled'}>&larr; 上一句</button>
                    <button class="avg-pill" onclick="DialogController.openCurrentScriptEditor()">挂 script</button>
                    ${!isEnd && !hasBranches ? '<button class="avg-pill on" onclick="DialogController.next()">下一句 &rarr;</button>' : ''}
                    ${isEnd ? '<button class="avg-pill on" onclick="DialogController.close()">关闭</button>' : ''}
                </div>
            `;

            const existing = stage.querySelector('.avg-stream');
            const alreadyRendered = existing ? existing.children.length : 0;
            // 可 append：stream 已存在 + 链还是同一条 + 至少有 1 条新行要追加(alreadyRendered ≤ index)
            // 严格 ≤ index(不是 ≤ index+1)：避免同 index 二次渲染把 .current 误改为 .faded 又没新行接上
            const sameChain = existing && stage._avgRenderedChain === chain;
            const canAppend = existing && sameChain && alreadyRendered > 0 && alreadyRendered <= index;

            if (canAppend) {
                // 1) 上次的 .current → .faded
                const prevCurrent = existing.querySelector('.avg-line.current');
                if (prevCurrent) {
                    prevCurrent.classList.remove('current');
                    prevCurrent.classList.add('faded');
                }
                // 2) 追加 [alreadyRendered..index] 的新行(通常 1 行)
                let newHtml = '';
                for (let i = alreadyRendered; i <= index; i++) newHtml += buildLineHtml(i);
                if (newHtml) existing.insertAdjacentHTML('beforeend', newHtml);

                // 3) 只替换 footer，不动 stream
                const outer = stage.querySelector('.avg-stage');
                if (outer) {
                    const oldFooter = outer.querySelector('.avg-footer, .avg-branches');
                    if (oldFooter) oldFooter.outerHTML = footerHtml;
                    else outer.insertAdjacentHTML('beforeend', footerHtml);
                    outer.classList.toggle('done', isEnd);
                    if (!isEnd && !hasBranches) outer.setAttribute('onclick', 'DialogController.next()');
                    else outer.removeAttribute('onclick');
                }
                // 4) 替换 controls
                const oldControls = stage.querySelector('.avg-controls');
                if (oldControls) oldControls.outerHTML = controlsHtml;
                else stage.insertAdjacentHTML('beforeend', controlsHtml);

                // 5) 只在确实追加了新行时 scroll 到底；其它情况 scrollTop 保持
                if (newHtml) {
                    existing.scrollTop = existing.scrollHeight;
                    // 新 current 行启动打字机
                    const newCurrent = existing.querySelector('.avg-line.current .avg-text');
                    if (newCurrent) this._startTypewriter(newCurrent);
                }
                return;
            }

            // 全量重建（首次开播 / replay / prev / branch 切换）
            this._stopTypewriter();
            let linesHtml = '';
            for (let i = 0; i <= index; i++) linesHtml += buildLineHtml(i);

            const clickHandler = (!hasBranches && !isEnd) ? 'onclick="DialogController.next()"' : '';
            stage.innerHTML = `
                <div class="avg-stage${isEnd ? ' done' : ''}" ${clickHandler} tabindex="0">
                    <div class="avg-stream">${linesHtml}</div>
                    ${footerHtml}
                </div>
                ${controlsHtml}
            `;
            // 标记这次渲染对应的 chain 引用；后续 _renderStream 会比对，不一致则强制重建
            stage._avgRenderedChain = chain;
            const stream = stage.querySelector('.avg-stream');
            if (stream) stream.scrollTop = stream.scrollHeight;
            // 当前句启动打字机(全量重建/首次开播/replay/prev 场景)
            const curText = stage.querySelector('.avg-line.current .avg-text');
            if (curText) this._startTypewriter(curText);
        },

        currentTalk() {
            return this._state.chain?.[this._state.index]?.talk || null;
        },

        scriptPresetOptions(current) {
            const scripts = [
                '',
                'new_npc_in',
                'npc_out',
                'exhibit',
                'get',
                'Lie',
                'comic',
                'interrupt',
                'end',
            ];
            const cur = String(current || '');
            if (cur && !scripts.includes(cur)) scripts.push(cur);
            return [
                `<option value="__custom__"${scripts.includes(cur) ? '' : ' selected'}>常用 script / 自定义</option>`,
                ...scripts.map(s => {
                    const label = s ? `${s} · ${FlowOverviewView.eventKind(s)}` : '空 script · 普通对白';
                    return `<option value="${escapeHtml(s)}"${s === cur ? ' selected' : ''}>${escapeHtml(label)}</option>`;
                })
            ].join('');
        },

        scriptRule(script) {
            const key = String(script || '').trim().toLowerCase();
            const unused = {
                intLabel: '不用填',
                intHint: '保留 0',
                strLabel: '不用填',
                strHint: '留空',
            };
            const rawRows = [
                { intLabel: 'ParameterInt', intHint: '原始 Int', strLabel: 'ParameterStr', strHint: '原始 Str' },
                { intLabel: 'ParameterInt', intHint: '原始 Int', strLabel: 'ParameterStr', strHint: '原始 Str' },
                { intLabel: 'ParameterInt', intHint: '原始 Int', strLabel: 'ParameterStr', strHint: '原始 Str' },
            ];
            if (key === 'npc_out') {
                return {
                    title: 'npc_out：让一个场景 NPC 退场',
                    hint: '参数0.ParameterInt = NPC id；ParameterStr 不使用。保存前请确认选的是要离开的角色。',
                    rows: [
                        { intLabel: '退场 NPC', intHint: 'NPCStaticData.id', intSource: 'npc', strLabel: '不用填', strHint: '留空' },
                        unused,
                        unused,
                    ],
                };
            }
            if (key === 'new_npc_in') {
                return {
                    title: 'new_npc_in：让一个 NPC 实例入场',
                    hint: '参数0.ParameterInt = NPCLoopData 表 ID；参数0.ParameterStr = 入场提示文本；参数1.ParameterStr = 提示位置，格式 x,y。',
                    rows: [
                        { intLabel: '入场实例', intHint: 'NPCLoopData.id', intSource: 'npcloop', strLabel: '提示文本', strHint: '如 Wait! / TAP...' },
                        { intLabel: '不用填', intHint: '保留 0', strLabel: '提示位置', strHint: 'x,y anchoredPosition' },
                        unused,
                    ],
                };
            }
            if (key === 'exhibit') {
                return {
                    title: 'exhibit：在当前句出示物品',
                    hint: '参数0.Int = 物品ID，参数0.Str = x；参数1.Int = 档位 1/2/3，参数1.Str = y；参数2.Str = 自定义展示文字，可空。',
                    rows: [
                        { intLabel: '展示物品', intHint: 'ItemStaticData.id', intSource: 'item', strLabel: '位置 x', strHint: '数值' },
                        { intLabel: '展示档位', intHint: '1/2/3', intSource: 'grade', strLabel: '位置 y', strHint: '数值' },
                        { intLabel: '不用填', intHint: '保留 0', strLabel: '展示文字', strHint: '空则用默认文案' },
                    ],
                };
            }
            if (key === 'get' || key.startsWith('get_')) {
                return {
                    title: 'get：获得一个配置对象',
                    hint: '通常参数0.Int 指向获得的道具/证据 ID。只有真正“获得”的内容才挂 get，普通谈话笔记不要挂。',
                    rows: [
                        { intLabel: '获得目标', intHint: 'ItemStaticData.id', intSource: 'item', strLabel: '提示/备注', strHint: '可空' },
                        unused,
                        unused,
                    ],
                };
            }
            if (key === 'lie') {
                return {
                    title: 'Lie：标记这句是指证点',
                    hint: '当前显示逻辑读取参数0.ParameterStr 作为指证证据/证词 ID；这里应选择已有证据或证词。',
                    rows: [
                        { intLabel: '不用填', intHint: '保留 0', strLabel: '指证材料', strHint: '证据/证词 ID', strSource: 'evidence' },
                        unused,
                        unused,
                    ],
                };
            }
            if (key === 'comic' || key.includes('comic')) {
                return {
                    title: 'comic：播放动态漫画/突发图',
                    hint: '漫画类参数目前按旧配置保留原始输入；建议只在确认资源名和代码读取方式后填写。',
                    rows: rawRows,
                };
            }
            return {
                title: script ? '自定义 script：按原始参数填写' : '普通对白：不触发事件',
                hint: script ? '这个 script 暂无专用规则，参数区保留原始 Int / Str 输入。' : '空 script 表示普通对白，一般不需要填写任何参数。',
                rows: rawRows,
            };
        },

        optionHtml(value, label, selected) {
            return `<option value="${escapeHtml(String(value ?? ''))}"${String(value ?? '') === String(selected ?? '') ? ' selected' : ''}>${escapeHtml(label)}</option>`;
        },

        npcOptions(selected) {
            const chapter = DataManager.chapter(AppState.currentUnit);
            return [
                this.optionHtml('0', '选择 NPC', selected),
                ...AppState.allNPCs
                    .filter(n => !chapter || n.Chapter === chapter)
                    .map(n => this.optionHtml(n.id, `${cn(n.Name) || n.id} · NPC ${n.id}`, selected))
            ].join('');
        },

        npcLoopOptions(selected) {
            const chapter = DataManager.chapter(AppState.currentUnit);
            const currentLoop = AppState.currentLoop;
            const rows = (AppState.allNPCLoops || [])
                .filter(n => !chapter || n.NPC?.Chapter === chapter)
                .map(n => {
                    const talkLoop = n.TalkInfo?.videoLoop || n.LoopTalkInfo?.videoLoop || '';
                    const loc = cn(n.TalkInfo?.Location) || cn(n.LoopTalkInfo?.Location) || '未知场景';
                    const name = cn(n.NPC?.Name) || n.NPC?.id || '未知 NPC';
                    return {
                        id: String(n.id || ''),
                        label: `${name} · ${loc} · NPCLoop ${n.id}${talkLoop ? ` · ${talkLoop}` : ''}`,
                        current: talkLoop === currentLoop,
                    };
                })
                .sort((a, b) => Number(b.current) - Number(a.current) || a.label.localeCompare(b.label));
            return [
                this.optionHtml('0', '选择入场 NPC 实例', selected),
                ...rows.map(r => this.optionHtml(r.id, r.current ? `当前 ${r.label}` : r.label, selected))
            ].join('');
        },

        itemOptions(selected) {
            const chapter = DataManager.chapter(AppState.currentUnit);
            const rows = DataManager.itemsByChapter(chapter)
                .map(i => ({
                    id: String(i.id || ''),
                    label: `${cn(i.Name) || i.id} · ${DataManager.typeName(i.Type)} ${i.id}`,
                }))
                .sort((a, b) => a.label.localeCompare(b.label));
            return [
                this.optionHtml('0', '选择道具/证据', selected),
                ...rows.map(r => this.optionHtml(r.id, r.label, selected))
            ].join('');
        },

        evidenceOptions(selected) {
            const chapterNum = String(AppState.currentUnit || '').replace(/[^\d]/g, '') || '1';
            const chapter = DataManager.chapter(AppState.currentUnit);
            const itemRows = DataManager.itemsByChapter(chapter).map(i => ({
                id: String(i.id || ''),
                label: `[道具] ${cn(i.Name) || i.id} · ${DataManager.typeName(i.Type)} ${i.id}`,
            }));
            const testimonyRows = (AppState.allTestimonies || [])
                .filter(t => String(t.id || '').startsWith(chapterNum))
                .map(t => ({
                    id: String(t.id || ''),
                    label: `[证词] ${cn(t.shortDesc) || truncate(cn(t.testimony), 26) || t.id} · ${t.id}`,
                }));
            return [
                this.optionHtml('', '选择证据/证词', selected),
                ...itemRows.concat(testimonyRows)
                    .sort((a, b) => a.label.localeCompare(b.label))
                    .map(r => this.optionHtml(r.id, r.label, selected))
            ].join('');
        },

        intControlHtml(row, param, idx) {
            const value = String(param?.ParameterInt ?? '0');
            const id = `dialog-script-param-int-${idx}`;
            if (row.intSource === 'npc') return `<select id="${id}">${this.npcOptions(value)}</select>`;
            if (row.intSource === 'npcloop') return `<select id="${id}">${this.npcLoopOptions(value)}</select>`;
            if (row.intSource === 'item') return `<select id="${id}">${this.itemOptions(value)}</select>`;
            if (row.intSource === 'grade') {
                return `<select id="${id}">
                    ${this.optionHtml('0', '选择档位', value)}
                    ${this.optionHtml('1', '档位 1 · here.', value)}
                    ${this.optionHtml('2', '档位 2 · show!', value)}
                    ${this.optionHtml('3', '档位 3 · look this!!', value)}
                </select>`;
            }
            return `<input id="${id}" value="${escapeHtml(value)}" placeholder="${escapeHtml(row.intHint || 'ParameterInt')}">`;
        },

        strControlHtml(row, param, idx) {
            const value = String(param?.ParameterStr ?? '');
            const id = `dialog-script-param-str-${idx}`;
            if (row.strSource === 'evidence') return `<select id="${id}">${this.evidenceOptions(value)}</select>`;
            return `<input id="${id}" value="${escapeHtml(value)}" placeholder="${escapeHtml(row.strHint || 'ParameterStr')}">`;
        },

        readScriptEditorParams() {
            return Array.from({ length: 3 }, (_, idx) => ({
                ParameterInt: String(document.getElementById(`dialog-script-param-int-${idx}`)?.value ?? '0').trim() || '0',
                ParameterStr: String(document.getElementById(`dialog-script-param-str-${idx}`)?.value ?? '').trim(),
            }));
        },

        renderScriptParamList(script, params) {
            const rule = this.scriptRule(script);
            return rule.rows.map((row, idx) => {
                const p = params?.[idx] || { ParameterInt: '0', ParameterStr: '' };
                return `
                    <div class="dialog-script-param-row">
                        <div class="dialog-script-label">参数 ${idx}<small>${escapeHtml(row.intLabel || 'ParameterInt')} / ${escapeHtml(row.strLabel || 'ParameterStr')}</small></div>
                        ${this.intControlHtml(row, p, idx)}
                        ${this.strControlHtml(row, p, idx)}
                    </div>
                `;
            }).join('');
        },

        updateScriptParamRules(scriptValue) {
            const script = scriptValue ?? document.getElementById('dialog-script-value')?.value ?? '';
            const params = this.readScriptEditorParams();
            const rule = this.scriptRule(script);
            const ruleEl = document.getElementById('dialog-script-rule');
            if (ruleEl) ruleEl.innerHTML = `<strong>${escapeHtml(rule.title)}</strong><br>${escapeHtml(rule.hint)}`;
            const list = document.getElementById('dialog-script-param-list');
            if (list) list.innerHTML = this.renderScriptParamList(script, params);
        },

        renderScriptEditor(talk) {
            if (!talk) return '';
            const speaker = cn(talk.Speaker?.Name) || talk.Speaker?.id || '旁白';
            const words = cn(talk.Words) || '(无对白文本)';
            const script = String(talk.script || '');
            const params = Array.from({ length: 3 }, (_, idx) => talk.Parameters?.[idx] || { ParameterInt: '0', ParameterStr: '' });
            const rule = this.scriptRule(script);
            return `
                <div id="dialogScriptEditor" class="dialog-script-editor" onclick="event.stopPropagation()">
                    <div class="dialog-script-head">
                        <div>
                            <div class="dialog-script-title">当前句挂 script · Talk #${escapeHtml(String(talk.id || '?'))}</div>
                            <div class="dialog-script-meta">${escapeHtml(talk.videoScene || 'Talk 表回填')} · step ${escapeHtml(String(talk.step || '?'))} · ${escapeHtml(speaker)}</div>
                        </div>
                        <button type="button" class="avg-pill" onclick="DialogController.closeScriptEditor()">关闭</button>
                    </div>
                    <div class="dialog-script-line">${escapeHtml(words)}</div>
                    <div class="dialog-script-grid">
                        <div class="dialog-script-label">script</div>
                        <div class="dialog-script-grid" style="grid-template-columns: minmax(150px, 0.36fr) minmax(0, 1fr);">
                            <select id="dialog-script-preset" onchange="DialogController.applyScriptPreset(this.value)">${this.scriptPresetOptions(script)}</select>
                            <input id="dialog-script-value" value="${escapeHtml(script)}" placeholder="例如 exhibit / npc_out / Lie" onchange="DialogController.updateScriptParamRules(this.value)">
                        </div>
                    </div>
                    <div id="dialog-script-rule" class="dialog-script-rule">
                        <strong>${escapeHtml(rule.title)}</strong><br>${escapeHtml(rule.hint)}
                    </div>
                    <div id="dialog-script-param-list" class="dialog-script-param-list">
                        ${this.renderScriptParamList(script, params)}
                    </div>
                    <div class="dialog-script-actions">
                        <button type="button" class="avg-pill" onclick="DialogController.saveCurrentScriptEditor()">保存到修改记录</button>
                    </div>
                </div>
            `;
        },

        openCurrentScriptEditor() {
            const talk = this.currentTalk();
            if (!talk) {
                UI.updateStatus('当前没有可编辑的 Talk 句子');
                return;
            }
            const stage = document.getElementById(this._state.containerId);
            if (!stage) return;
            this.closeScriptEditor(false);
            const controls = stage.querySelector('.avg-controls');
            if (controls) controls.insertAdjacentHTML('afterend', this.renderScriptEditor(talk));
            else stage.insertAdjacentHTML('beforeend', this.renderScriptEditor(talk));
        },

        closeScriptEditor(showStatus = true) {
            const editor = document.getElementById('dialogScriptEditor');
            if (editor) editor.remove();
            if (showStatus) UI.updateStatus('已关闭当前句 script 编辑');
        },

        applyScriptPreset(value) {
            if (value === '__custom__') return;
            const input = document.getElementById('dialog-script-value');
            if (input) input.value = value;
            this.updateScriptParamRules(value);
        },

        saveCurrentScriptEditor() {
            const talk = this.currentTalk();
            if (!talk) {
                UI.updateStatus('当前没有可保存的 Talk 句子');
                return;
            }
            const loop = FlowOverviewView.findLoop(AppState.currentLoop) || { id: AppState.currentLoop || 'loop?' };
            FlowOverviewView.ensureTalkEventOriginal(talk);

            const oldState = FlowOverviewView._originalTalkEvents.get(String(talk.id)) || { script: '', Parameters: [] };
            const newScript = String(document.getElementById('dialog-script-value')?.value || '').trim();
            const rule = this.scriptRule(newScript);
            talk.script = newScript;
            FlowOverviewView.recordTalkEventChange(loop, talk, {
                key: `Talk:${talk.id}:script`,
                action: newScript === (oldState.script || '') ? 'remove' : 'update',
                field: 'script',
                valuePath: 'script',
                label: `当前句 Talk ${talk.id} script`,
                old: oldState.script || '',
                new: newScript,
                scriptRule: rule.title,
            });

            if (!Array.isArray(talk.Parameters)) talk.Parameters = [];
            while (talk.Parameters.length < 3) talk.Parameters.push({ ParameterInt: '0', ParameterStr: '' });
            const editorParams = this.readScriptEditorParams();
            for (let idx = 0; idx < 3; idx++) {
                const oldValue = oldState.Parameters?.[idx] || { ParameterInt: '0', ParameterStr: '' };
                const newValue = editorParams[idx] || { ParameterInt: '0', ParameterStr: '' };
                const rowRule = rule.rows?.[idx] || {};
                talk.Parameters[idx] = newValue;
                FlowOverviewView.recordTalkEventChange(loop, talk, {
                    key: `Talk:${talk.id}:Parameters:${idx}`,
                    action: JSON.stringify(oldValue) === JSON.stringify(newValue) ? 'remove' : 'update',
                    field: 'Parameters',
                    valuePath: `Parameters[${idx}]`,
                    label: `当前句 Talk ${talk.id} 参数 ${idx} · ${rowRule.intLabel || 'ParameterInt'} / ${rowRule.strLabel || 'ParameterStr'}`,
                    old: oldValue,
                    new: newValue,
                    scriptRule: rule.title,
                    parameterRule: {
                        index: idx,
                        intLabel: rowRule.intLabel || 'ParameterInt',
                        strLabel: rowRule.strLabel || 'ParameterStr',
                        intHint: rowRule.intHint || '',
                        strHint: rowRule.strHint || '',
                    },
                });
            }

            UI.updateStatus(`已记录 Talk ${talk.id} 的 script 修改`);
            this._renderStream();
        },

        // 打字机效果 —— 按字符逐一揭露当前行，22ms/char，末尾带闪烁光标
        _startTypewriter(textEl) {
            if (!textEl) return;
            this._stopTypewriter();
            const full = textEl.textContent;
            textEl.dataset.full = full;
            textEl.textContent = '';
            textEl.classList.add('typing');
            this._state.typing = true;
            this._state.typeEl = textEl;
            let i = 0;
            this._state.typeInterval = setInterval(() => {
                i++;
                textEl.textContent = full.slice(0, i);
                if (i >= full.length) {
                    clearInterval(this._state.typeInterval);
                    this._state.typeInterval = null;
                    this._state.typing = false;
                    textEl.classList.remove('typing');
                }
            }, 22);
        },

        // 立即填完当前在打的行(点击 / 空格可跳过打字)
        _completeTypewriter() {
            if (!this._state.typeInterval) return;
            clearInterval(this._state.typeInterval);
            this._state.typeInterval = null;
            this._state.typing = false;
            const el = this._state.typeEl;
            if (el && el.dataset.full != null) {
                el.textContent = el.dataset.full;
                el.classList.remove('typing');
            }
            this._state.typeEl = null;
        },

        // 彻底停掉(切链/close 用)
        _stopTypewriter() {
            if (this._state.typeInterval) {
                clearInterval(this._state.typeInterval);
                this._state.typeInterval = null;
            }
            this._state.typing = false;
            this._state.typeEl = null;
        },

        replay() {
            this._state.index = 0;
            this._state.history = [];
            this._render();
        },

        next() {
            // 还在打字时：第一次 click/next 先跳完当前句；第二次才真推进
            if (this._state.typing) {
                this._completeTypewriter();
                return;
            }
            const { chain, index } = this._state;
            if (index < chain.length - 1) {
                this._state.index++;
                this._render();
            }
        },

        prev() {
            if (this._state.index > 0) {
                this._state.index--;
                this._render();
            } else if (this._state.history.length > 0) {
                const prev = this._state.history.pop();
                this._state.chain = prev.chain;
                this._state.index = prev.index;
                this._render();
            }
        },

        selectBranch(targetId) {
            this._state.history.push({
                chain: this._state.chain,
                index: this._state.index
            });
            this._state.chain = DataManager.buildDialogueChain(targetId);
            this._state.index = 0;

            if (this._state.chain.length === 0) {
                UI.updateStatus('分支无后续对话');
                this.close();
                return;
            }
            this._render();
        },

        close() {
            this._stopTypewriter();
            const cid = this._state.containerId;
            if (cid) {
                const stage = document.getElementById(cid);
                if (stage) stage.innerHTML = '';
                // fallback 容器用完就删，保持 #content 干净；drawer 容器(#npcDrawerDialog)由 drawer 自己管理
                if (cid === 'dlg-fallback-container') {
                    const fb = document.getElementById(cid);
                    if (fb && fb.parentElement) fb.remove();
                }
                this._state.containerId = null;
            }
        }
    };

    // ===== Game Controller =====
    const GameController = {
        async load() {
            const unit = document.getElementById('unitSelect').value;
            const loop = document.getElementById('loopSelect').value;

            AppState.currentUnit = unit;
            AppState.currentLoop = loop;
            AppState.reset();

            UI.updateStatus('加载中...');

            try {
                // 检测是否为 file:// 协议
                if (location.protocol === 'file:') {
                    const msg = '当前使用 file:// 协议打开，浏览器会阻止加载本地文件。\n\n' +
                        '请用以下任一方式启动本地服务器：\n' +
                        '1. VS Code 安装 Live Server 插件，右键 index.html → Open with Live Server\n' +
                        '2. 命令行进入 preview_new2 目录，运行: python -m http.server 8080\n' +
                        '   然后访问 http://localhost:8080\n\n' +
                        '尝试继续加载...';
                    console.warn(msg);
                    UI.updateStatus('警告: file:// 协议可能导致加载失败，建议使用本地服务器');
                }

                console.log('Loading table data from:', Config.paths.tableData);
                await DataLoader.loadTableData();
                console.log('Table data loaded successfully');

                console.log('Loading loop config:', unit, loop);
                // ChapterConfig 必须先于 loadLoopConfig（v2: loopData 从它派生）
                await DataLoader.loadChapterConfig();
                await Promise.all([
                    DataLoader.loadLoopConfig(unit, loop),
                    DataLoader.loadTalkSummaries(unit),
                    DataLoader.loadStoryOverview(unit),
                    DataLoader.loadUnitFlow(unit)
                ]);
                console.log('Loop config loaded:', AppState.loopData ? 'OK' : 'not found');

                // 加载 AVG Talk + Expose 数据（替代 Talk.json）
                console.log('Loading AVG Talk data:', loop);
                const talkCount = await DataLoader.loadAVGTalks(loop);
                const exposeCount = await DataLoader.loadAVGExpose(loop);
                console.log(`AVG data loaded: ${talkCount} talks, ${exposeCount} expose entries`);

                const chapter = DataManager.chapter(unit);
                const chapterItems = DataManager.itemsByChapter(chapter);
                const loopScenes = DataManager.scenesForLoop(unit, loop);
                const hasArt = chapterItems.filter(i => i.ArtRequirement).length;

                UI.updateStatus(
                    `${unit} ${loop} | ` +
                    `证据: ${chapterItems.length} (美术需求: ${hasArt}/${chapterItems.length}) | ` +
                    `场景: ${loopScenes.length} | ` +
                    `对话: ${talkCount} + 指证: ${exposeCount}`
                );

                this.switchView(AppState.currentView);
            } catch (e) {
                console.error('Load failed:', e);
                const errMsg = `加载失败: ${e.message}`;
                UI.updateStatus(errMsg);
                document.getElementById('content').innerHTML = `
                    <div style="color:var(--warning); padding:2rem; max-width:600px;">
                        <h3 style="margin-bottom:1rem;">加载失败</h3>
                        <p><strong>错误：</strong>${escapeHtml(e.message)}</p>
                        <p style="margin-top:1rem; color:var(--text-secondary);">
                            如果是网络错误 (Failed to fetch)，通常是因为用 file:// 协议直接打开了 HTML 文件。<br><br>
                            <strong>解决方法：</strong><br>
                            1. VS Code 安装 <strong>Live Server</strong> 插件 → 右键 index.html → Open with Live Server<br>
                            2. 或在 preview_new2 目录运行: <code style="background:var(--card);padding:0.2rem 0.4rem;border-radius:3px;">python -m http.server 8080</code><br>
                            然后访问 <code style="background:var(--card);padding:0.2rem 0.4rem;border-radius:3px;">http://localhost:8080</code>
                        </p>
                        <p style="margin-top:1rem; color:var(--text-muted);">
                            数据路径: ${escapeHtml(Config.paths.tableData)}<br>
                            当前协议: ${location.protocol}
                        </p>
                    </div>
                `;
            }
        },

        switchView(view) {
            AppState.currentView = view;

            document.getElementById('btnArt').classList.toggle('active', view === 'art');
            document.getElementById('btnFlow').classList.toggle('active', view === 'flow');
            document.getElementById('btnValidate').classList.toggle('active', view === 'validate');

            // 美术需求总览不需要 Loops 按钮（按 Unit 维度展示，不按 Loop 切换）
            const hideLoops = (view === 'art');
            const sideHead = document.querySelector('.sidebar > .side-head');
            const loopRow = document.querySelector('.sidebar > .loop-row');
            const loopCurrent = document.querySelector('.sidebar > .loop-current');
            if (sideHead) sideHead.style.display = hideLoops ? 'none' : '';
            if (loopRow) loopRow.style.display = hideLoops ? 'none' : '';
            if (loopCurrent) loopCurrent.style.display = hideLoops ? 'none' : '';

            if (view === 'art') {
                ArtOverviewView.render();
            } else if (view === 'validate') {
                ValidationOverviewView.render();
            } else {
                FlowOverviewView.render();
            }

            UI.renderSidebar();
            if (typeof DoubtView !== 'undefined') DoubtView.refreshEntry();
        }
    };

    // ===== Init =====
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('btnFlow').classList.add('active');
        // initial loop chip sync (shows loop1 active by default)
        if (typeof syncLoopChips === 'function') syncLoopChips();
        if (typeof syncLoopHeader === 'function') syncLoopHeader();
    });
    </script>
