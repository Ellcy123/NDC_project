<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDC Preview v4.0 (New Table)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
    <script src="/js-yaml.min.js"></script>
    <style>
        /* ===== NOIR PALETTE (legacy names preserved; prototype tokens added) ===== */
        :root {
            --primary: #0a0a0a;
            --secondary: #121212;
            --card: #201d1a;
            --accent: #b84040;
            --highlight: #e8c678;
            --text-primary: #f0e6d2;
            --text-secondary: #d8cfbb;
            --text-muted: #968c78;
            --success: #6b8f5e;
            --warning: #c78a3a;
            --border: #2e2823;
            --coal-3: #1a1818;
            --ink: #201d1a;
            --ink-2: #2a2623;
            --rule: #2e2823;
            --rule-2: #3a322b;
            --gold-2: #b89650;
            --parchment: #f0e6d2;
            --parch-mute: #c9bfa9;
            --text-dim: #968c78;
            --text-faint: #60584c;
            --brick: #b84040;
            --brick-2: #8a2e2e;
            --gold: #e8c678;
            --ok: #6b8f5e;
            --ok-2: #3f5a38;
            --warn: #c78a3a;
            --miss: #b84040;
            --locked: #4a443d;
            --ff-serif: "Playfair Display", "Noto Serif SC", "Cormorant Garamond", Georgia, serif;
            --ff-sans: "Inter", "Noto Sans SC", ui-sans-serif, system-ui, -apple-system, sans-serif;
            --ff-mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, Menlo, monospace;
        }

        /* ===== Paper grain & vignette (fixed overlays, pointer-events: none) ===== */
        .grain {
            pointer-events: none;
            position: fixed; inset: 0; z-index: 9999;
            opacity: .06; mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.92' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.9 0 0 0 0 0.85 0 0 0 0 0.7 0 0 0 .6 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
        }
        .vignette {
            pointer-events: none;
            position: fixed; inset: 0; z-index: 9998;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.45) 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--ff-sans);
            background: var(--primary);
            color: var(--text-secondary);
            line-height: 1.55;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            font-size: 13px;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ===== Header (noir topbar) ===== */
        .header {
            background:
                linear-gradient(180deg, rgba(255,255,255,.02) 0%, rgba(0,0,0,.25) 100%),
                var(--secondary);
            padding: 0 1.25rem;
            height: 56px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            flex-shrink: 0;
        }
        .header::after {
            content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-2) 20%, var(--gold-2) 80%, transparent);
            opacity: .18;
        }

        .header-title {
            font-family: var(--ff-serif);
            font-size: 1rem;
            color: var(--parchment);
            font-weight: 600;
            letter-spacing: .04em;
        }

        /* ===== Brand block (left of header) ===== */
        .brand {
            display: flex; align-items: center; gap: 10px;
            min-width: 200px;
        }
        .brand-mark {
            width: 28px; height: 28px; border-radius: 2px;
            background: var(--primary); border: 1px solid var(--gold-2);
            display: grid; place-items: center;
            color: var(--highlight); font-family: var(--ff-serif); font-weight: 700;
            font-size: 14px; letter-spacing: .05em;
            box-shadow: 0 0 0 1px var(--secondary) inset;
            flex-shrink: 0;
        }
        .brand-text { line-height: 1.15; }
        .brand-name {
            font-family: var(--ff-serif); font-size: 15px;
            color: var(--parchment); letter-spacing: .04em;
        }
        .brand-sub {
            font-family: var(--ff-mono); font-size: 9.5px;
            color: var(--text-faint); letter-spacing: .18em; text-transform: uppercase;
            margin-top: 1px;
        }

        /* ===== Header center (unit/loop pickers + load) ===== */
        .header-center {
            flex: 1;
            display: flex; align-items: center; gap: 10px;
            justify-content: center;
        }
        .header-right {
            display: flex; gap: 4px; align-items: center;
            min-width: 200px; justify-content: flex-end;
        }

        /* select-group: UNIT label + <select> together in a framed pill */
        .select-group {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--coal-3); border: 1px solid var(--border); border-radius: 2px;
            height: 30px; padding: 0 8px 0 10px;
            transition: border-color .15s ease-out;
        }
        .select-group:hover { border-color: var(--gold-2); }
        .select-group:focus-within { border-color: var(--gold-2); }
        .select-group .select-label {
            font-family: var(--ff-mono); font-size: 9.5px;
            color: var(--gold-2); letter-spacing: .18em;
            flex-shrink: 0;
        }
        .select-group select {
            border: 0; background: transparent; height: 28px;
            padding: 0 22px 0 0;
            background-position: right 2px center;
        }
        .select-group select:hover, .select-group select:focus { border: 0; }

        /* Legacy .header-controls fallback (still referenced nowhere now, but safe) */
        .header-controls {
            display: flex;
            gap: 0.4rem;
            align-items: center;
        }

        /* primary/ghost button variants */
        .btn.primary {
            background: var(--highlight); color: var(--primary);
            border-color: var(--highlight);
            font-weight: 600;
        }
        .btn.primary:hover {
            background: var(--gold-2); color: var(--primary);
            border-color: var(--gold-2);
        }
        .btn.ghost {
            background: transparent; color: var(--text-secondary);
            border-color: transparent;
            text-decoration: none;
        }
        .btn.ghost:hover {
            color: var(--highlight); border-color: var(--border); background: var(--coal-3);
        }

        /* ===== Main Tabs (below header, above main) ===== */
        .main-tabs {
            display: flex; align-items: flex-end;
            padding: 0 20px;
            background: var(--secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .main-tab {
            position: relative;
            padding: 12px 18px 10px;
            font-family: var(--ff-serif);
            font-size: 13px; letter-spacing: .04em;
            color: var(--text-muted); background: transparent;
            border: 0; cursor: pointer;
            transition: color .15s ease-out;
            text-decoration: none;
            display: inline-flex; align-items: baseline;
        }
        .main-tab:hover { color: var(--parchment); }
        .main-tab .tab-idx {
            font-family: var(--ff-mono); font-size: 10px;
            color: var(--gold-2); margin-right: 6px;
        }
        .main-tab.active { color: var(--parchment); }
        .main-tab.active::after {
            content: ""; position: absolute; left: 10px; right: 10px; bottom: -1px; height: 2px;
            background: var(--accent);
        }
        .tab-meta {
            margin-left: auto;
            font-family: var(--ff-mono); font-size: 10px;
            color: var(--text-faint);
            padding-bottom: 12px; letter-spacing: .08em;
        }

        select {
            background: var(--coal-3);
            color: var(--parchment);
            border: 1px solid var(--border);
            padding: 0 1.8rem 0 0.7rem;
            height: 30px;
            border-radius: 2px;
            cursor: pointer;
            font-family: var(--ff-sans);
            font-size: 12px;
            letter-spacing: .02em;
            appearance: none; -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%23b89650' stroke-width='1.3' fill='none'/></svg>");
            background-repeat: no-repeat;
            background-position: right 10px center;
            transition: border-color .15s ease-out, background-color .15s ease-out;
        }
        select:hover, select:focus { border-color: var(--gold-2); outline: none; }
        select option { background: var(--secondary); color: var(--parchment); }

        .btn {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 0 0.9rem;
            height: 30px;
            border-radius: 2px;
            cursor: pointer;
            font-family: var(--ff-mono);
            font-size: 11px;
            letter-spacing: .08em;
            transition: color .15s ease-out, border-color .15s ease-out, background .15s ease-out;
            display: inline-flex; align-items: center;
        }
        .btn:hover { color: var(--highlight); border-color: var(--gold-2); background: var(--coal-3); }
        .btn.active {
            color: var(--primary);
            background: var(--highlight);
            border-color: var(--highlight);
        }
        .btn.active:hover { background: var(--highlight); color: var(--primary); }

        /* ===== Main Layout ===== */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ===== Sidebar (noir with shell) ===== */
        .sidebar {
            width: 260px;
            background: var(--secondary);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0 0 2rem;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            transition: width .2s ease-out;
        }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--rule-2); border-radius: 3px; }

        .side-head {
            padding: 14px 14px 10px;
            border-bottom: 1px solid var(--rule);
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .side-title {
            font-family: var(--ff-serif); font-size: 13px;
            color: var(--parchment); letter-spacing: .04em;
        }

        .loop-row {
            padding: 10px 12px 4px;
            display: flex; gap: 4px; flex-wrap: wrap;
            flex-shrink: 0;
        }
        .loop-chip {
            font-family: var(--ff-mono); font-size: 10px;
            padding: 4px 7px;
            border-radius: 2px;
            background: var(--coal-3);
            border: 1px solid var(--rule);
            color: var(--text-dim);
            cursor: pointer;
            letter-spacing: .05em;
            transition: color .15s, border-color .15s, background .15s, box-shadow .25s;
        }
        .loop-chip:hover { color: var(--parchment); border-color: var(--rule-2); }
        .loop-chip.active {
            color: var(--gold);
            border-color: var(--gold-2);
            background: linear-gradient(180deg, rgba(232,198,120,.08), rgba(232,198,120,.02));
            box-shadow: 0 0 0 1px rgba(232,198,120,.15) inset, 0 0 12px -2px rgba(232,198,120,.18);
        }
        .loop-chip.locked { color: var(--locked); cursor: not-allowed; }

        .loop-current {
            padding: 8px 14px 14px;
            border-bottom: 1px dashed var(--rule);
            flex-shrink: 0;
        }
        .loop-current .kicker {
            font: 500 10px/1 var(--ff-sans);
            color: var(--gold);
            letter-spacing: .2em;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .loop-current-title {
            font-family: var(--ff-serif);
            font-size: 15px;
            color: var(--parchment);
            letter-spacing: .01em;
            line-height: 1.3;
        }

        .sidebar-body {
            padding: 4px 0 16px;
            flex: 1;
            min-height: 0;
        }

        .sidebar-section {
            padding: 0.9rem 0.9rem 0.3rem;
            font-family: var(--ff-sans);
            font-weight: 600;
            font-size: 9.5px;
            color: var(--text-faint);
            text-transform: uppercase;
            letter-spacing: .22em;
            margin-top: 0.2rem;
            display: flex; align-items: center; gap: 8px;
        }
        .sidebar-section::before {
            content: ""; width: 4px; height: 4px; background: var(--gold-2); border-radius: 50%; opacity: .6;
            flex-shrink: 0;
        }
        .sidebar-section::after {
            content: ""; flex: 1; height: 1px; background: var(--border); opacity: .6;
        }

        .sidebar-item {
            position: relative;
            padding: 0.45rem 0.8rem 0.45rem 1rem;
            cursor: pointer;
            border-left: none;
            transition: background .15s ease-out, color .15s ease-out;
            font-size: 12.5px;
            color: var(--text-secondary);
            display: flex; align-items: center; gap: 8px;
        }
        .sidebar-item::before {
            content: ""; position: absolute; left: 0; top: 6px; bottom: 6px; width: 3px;
            background: var(--accent);
            transform: scaleY(0); transform-origin: top;
            transition: transform .2s ease-out;
        }
        .sidebar-item:hover { background: rgba(232,198,120,.04); }
        .sidebar-item:hover::before { transform: scaleY(1); }
        .sidebar-item.active {
            background: rgba(232,198,120,.07);
            color: var(--parchment);
        }
        .sidebar-item.active::before { transform: scaleY(1); background: var(--highlight); }
        .sidebar-item.sidebar-expose-item {
            display: block;
            line-height: 1.45;
        }
        .sidebar-expose-head {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .sidebar-expose-rounds {
            margin-top: 0.45rem;
            display: grid;
            gap: 0.35rem;
        }
        .sidebar-expose-round {
            border-left: 2px solid color-mix(in srgb, var(--brick) 70%, var(--border));
            padding-left: 0.45rem;
            color: var(--text-muted);
            font-size: 11px;
        }
        .sidebar-expose-round strong {
            display: block;
            color: var(--text-secondary);
            font-weight: 600;
        }
        .sidebar-expose-round em {
            display: block;
            margin-top: 0.12rem;
            font-style: normal;
            color: var(--text-faint);
        }

        .badge {
            display: inline-flex; align-items: center; gap: 3px;
            font-family: var(--ff-mono);
            font-size: 10px;
            letter-spacing: .02em;
            padding: 1px 5px;
            border-radius: 2px;
            background: var(--coal-3);
            color: var(--text-muted);
            border: 1px solid var(--border);
            min-width: 22px;
            justify-content: center;
            margin-left: 0.25rem;
        }
        .badge.npc {
            color: var(--success);
            border-color: color-mix(in srgb, var(--success) 40%, var(--border));
            background: color-mix(in srgb, var(--success) 6%, var(--coal-3));
        }
        .badge.init-scene {
            color: var(--gold);
            border-color: color-mix(in srgb, var(--gold) 50%, var(--border));
            background: color-mix(in srgb, var(--gold) 12%, var(--coal-3));
            font-weight: 600;
        }

        /* ===== Content (main view, noir) ===== */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 22px 24px 60px;
            animation: viewIn .22s ease-out;
        }
        @keyframes viewIn {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .content::-webkit-scrollbar { width: 8px; }
        .content::-webkit-scrollbar-thumb { background: var(--rule-2); border-radius: 4px; }

        /* ===== Art Table (evidence-table -> noir .art-table) ===== */
        .evidence-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .evidence-table th {
            background: var(--secondary);
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--rule);
            font-family: var(--ff-sans);
            font-weight: 600;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .18em;
            color: var(--text-faint);
            position: sticky;
            top: 0;
            z-index: 2;
        }
        .evidence-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--rule);
            color: var(--text-primary);
            vertical-align: middle;
            font-size: 12px;
        }
        .evidence-table tr:hover td { background: color-mix(in srgb, var(--gold) 4%, var(--secondary)); }
        .evidence-table .art-req { color: var(--parchment); font-weight: 500; }
        .evidence-table .art-req.empty {
            color: var(--brick);
            font-style: normal;
            font-family: var(--ff-mono);
            font-size: 10.5px;
            letter-spacing: .06em;
        }
        .evidence-table tr.missing td,
        .evidence-table tr:has(.art-req.empty) td { background: color-mix(in srgb, var(--brick) 6%, transparent); }
        .evidence-table tr.missing td:first-child,
        .evidence-table tr:has(.art-req.empty) td:first-child { box-shadow: inset 3px 0 0 var(--brick); }
        .art-scene-list {
            display: grid;
            gap: 0.85rem;
            margin-top: 1rem;
        }
        .art-scene-card {
            border: 1px solid var(--rule);
            border-radius: 8px;
            background: color-mix(in srgb, var(--secondary) 88%, #000 12%);
            overflow: hidden;
        }
        .art-scene-card.dialogue {
            border-color: color-mix(in srgb, #6ea3c8 36%, var(--rule));
        }
        .art-scene-head {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 0.75rem;
            padding: 0.8rem 0.9rem;
            border-bottom: 1px solid var(--rule);
        }
        .art-scene-actions {
            display: flex;
            gap: 0.4rem;
            align-items: center;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .art-scene-title {
            color: var(--text);
            font-weight: 850;
            overflow-wrap: anywhere;
        }
        .art-scene-meta {
            margin-top: 0.22rem;
            color: var(--text-muted);
            font-size: 0.78rem;
            line-height: 1.45;
        }
        .art-scene-body {
            display: grid;
            gap: 0.7rem;
            padding: 0.82rem 0.9rem 0.95rem;
        }
        .art-scene-card.collapsed .art-scene-body {
            display: none;
        }
        .art-scene-brief {
            margin-top: 0.34rem;
            color: var(--text-secondary);
            font-size: 0.78rem;
            line-height: 1.45;
        }
        .art-scene-section-title {
            color: var(--highlight);
            font-size: 0.78rem;
            font-weight: 850;
            text-transform: uppercase;
            letter-spacing: .08em;
        }
        .art-npc-mount-list {
            display: grid;
            gap: 0.45rem;
            margin-top: 0.42rem;
        }
        .art-npc-mount-row {
            display: grid;
            grid-template-columns: auto minmax(70px, 0.22fr) minmax(0, 1fr);
            gap: 0.5rem;
            align-items: center;
            border: 1px solid var(--rule);
            border-radius: 8px;
            padding: 0.45rem 0.55rem;
            background: color-mix(in srgb, var(--card) 88%, #000 12%);
        }
        .art-npc-mount-name {
            color: var(--text);
            font-weight: 850;
            min-width: 0;
            overflow-wrap: anywhere;
        }
        .art-npc-mount-assets {
            display: flex;
            gap: 0.38rem;
            align-items: center;
            flex-wrap: wrap;
            min-width: 0;
        }
        .art-npc-mount-empty {
            color: var(--brick);
            font-family: var(--ff-mono);
            font-size: 0.72rem;
            letter-spacing: .04em;
        }
        .art-req-box {
            border: 1px solid var(--rule);
            border-radius: 8px;
            padding: 0.62rem 0.7rem;
            background: color-mix(in srgb, var(--primary) 70%, transparent);
            color: var(--parchment);
            line-height: 1.55;
            white-space: pre-wrap;
        }
        .art-req-box.empty {
            color: var(--brick);
            font-family: var(--ff-mono);
            font-size: 0.74rem;
            letter-spacing: .04em;
            background: color-mix(in srgb, var(--brick) 7%, var(--primary));
            border-color: color-mix(in srgb, var(--brick) 45%, var(--rule));
        }
        .art-evidence-list {
            display: grid;
            gap: 0.45rem;
        }
        .art-evidence-row {
            display: grid;
            grid-template-columns: minmax(190px, 0.44fr) minmax(0, 1fr) auto;
            gap: 0.62rem;
            align-items: center;
            border: 1px solid var(--rule);
            border-radius: 8px;
            padding: 0.42rem 0.58rem;
            cursor: pointer;
            background: color-mix(in srgb, var(--card) 90%, #000 10%);
        }
        .art-evidence-row:hover {
            border-color: var(--highlight);
            background: color-mix(in srgb, var(--highlight) 6%, var(--card));
        }
        .art-evidence-main {
            min-width: 0;
        }
        .art-evidence-name {
            color: var(--text);
            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .art-evidence-meta,
        .art-evidence-desc {
            color: var(--text-muted);
            font-size: 0.76rem;
            line-height: 1.35;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .art-evidence-status {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.38rem;
            white-space: nowrap;
        }
        .art-evidence-pill {
            border: 1px solid var(--rule);
            border-radius: 999px;
            padding: 0.18rem 0.48rem;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-muted);
        }
        .art-evidence-pill.filled {
            color: var(--success);
            border-color: color-mix(in srgb, var(--success) 55%, var(--rule));

            border: 1px solid var(--rule);

        .validation-severity.error {

        }
        .validation-severity.warn {
            color: var(--warning);
            border-color: color-mix(in srgb, var(--warning) 54%, var(--rule));
        }
        .validation-module {
            color: var(--highlight);
            font-size: 0.74rem;
            font-weight: 800;
        }
        .validation-loop {
            color: var(--text-muted);
            font-family: var(--mono);
            font-size: 0.72rem;
        }
        .validation-message {
            color: var(--text);
            font-weight: 820;
            line-height: 1.4;

        .validation-detail {
            margin-top: 0.28rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            line-height: 1.4;
            overflow-wrap: anywhere;

        .validation-actions {

            flex-wrap: wrap;

        .validation-empty {

        .flow-entry-grid {

            grid-template-columns: repeat(2, minmax(0, 1fr));
