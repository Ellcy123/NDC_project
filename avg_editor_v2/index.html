            const miniPillEl = document.getElementById('doubtFloatMiniPill');
            if (miniPillEl) miniPillEl.textContent = doubts.length === 0 ? '—' : `${doneCount}/${doubts.length}`;

            const pct = doubts.length === 0 ? 0 : Math.round((doneCount / doubts.length) * 100);
            document.getElementById('doubtFloatBarFill').style.width = pct + '%';
            el.classList.toggle('done', doubts.length > 0 && doneCount === doubts.length);

            // 应用折叠状态（仅当用户曾主动折叠过才生效；默认展开）
            if (localStorage.getItem('ndcDoubtFloatCollapsed') === '1') {
                el.classList.add('collapsed');
            }
        },

        // 折叠/展开浮窗（状态写入 localStorage，刷新后保持）
        toggleCollapsed() {
            const el = document.getElementById('doubtFloat');
            if (!el) return;
            const collapsed = el.classList.toggle('collapsed');
            localStorage.setItem('ndcDoubtFloatCollapsed', collapsed ? '1' : '0');
        },

        toggleCondition(type, param) {
            const key = `${type}:${param}`;
            if (AppState.satisfiedConditions.has(key)) AppState.satisfiedConditions.delete(key);
            else AppState.satisfiedConditions.add(key);
            this.render();
            this.refreshEntry();
        },

        setAllLoop(val) {
            const doubts = this.doubtsInLoop(AppState.currentUnit, AppState.currentLoop);
            doubts.forEach(d => {
                (d.condition || []).forEach(c => {
                    const key = this.condKey(c);
                    if (val) AppState.satisfiedConditions.add(key);
                    else AppState.satisfiedConditions.delete(key);
                });
            });
            this.render();
            this.refreshEntry();
        },

        close() {
            document.getElementById('doubtModal').classList.remove('active');
        }
    };

    // ===== Unit Flow Overview (planning-level, not dialogue-line graph) =====
    const FlowOverviewView = {
        editableFields: {
            title: { label: 'Loop 标题', tableField: 'chapterTitle', multiline: false },
            goal: { label: '循环目标', tableField: 'chapterGoal', multiline: true },
            brief: { label: 'Loop 简述', tableField: 'chapterBrief', multiline: true },
            newDoubtTitle: { label: '新疑点标题', tableField: 'newDoubtTitle', multiline: false },
            newDoubtContent: { label: '新疑点内容', tableField: 'newDoubtContent', multiline: true },
            summaryContent: { label: 'Loop 总结', tableField: 'summaryContent', multiline: true },
        },
        pickerState: null,
        editPage: null,
        _originalTalkEvents: new Map(),

        render() {
            const flow = AppState.unitFlow;
            const content = document.getElementById('content');
            if (!flow || !Array.isArray(flow.loops) || flow.loops.length === 0) {
                content.innerHTML = `
                    <div class="unit-flow-page">
                        <div class="flow-warning">
                            当前 Unit 没有 UnitFlow 数据。请先运行 <code>build_unit_flow.py</code>，或检查 ChapterConfig 是否有对应 Unit。
                        </div>
                    </div>
                `;
                UI.renderSidebar();
                return;
            }
            this.applyPendingToFlow();

            const selectedId = AppState.currentLoop || flow.loops[0].id;
            const selected = flow.loops.find(l => l.id === selectedId) || flow.loops[0];
            this.ensureOriginals(selected);
            const aliasText = flow.formalUnit && flow.formalUnit !== flow.unit
                ? `当前展示的是 ${escapeHtml(flow.unit)} 的设计名，正式配置映射到 ${escapeHtml(flow.formalUnit)}。`
                : '';

            let html = `<div class="unit-flow-page">`;
            html += `
                <section class="unit-flow-hero">
                    <div class="unit-flow-kicker">Unit Flow · ${escapeHtml(flow.chapter || '')}</div>
                    <div class="unit-flow-title">${escapeHtml(flow.unit)} · ${escapeHtml(flow.title || '')}</div>
                    ${aliasText ? `<div class="unit-flow-alias">${aliasText}</div>` : ''}
                </section>
            `;

            html += `<section class="loop-flow-rail">`;
            flow.loops.forEach(loop => {
                const active = loop.id === selected.id ? 'active' : '';
                html += `
                    <article class="loop-flow-card ${active}" onclick="FlowOverviewView.pick('${escapeHtml(loop.id)}')">
                        <div class="loop-flow-num">${escapeHtml(loop.chapterId || '')} · ${escapeHtml(loop.id)}</div>
                        <div class="loop-flow-name">${escapeHtml(loop.title || '')}</div>
                        <div class="loop-flow-goal">${escapeHtml(loop.goal || '未配置目标')}</div>
                    </article>
                `;
            });
            html += `</section>`;

            const isEditing = this.editPage && this.editPage.loopId === selected.id;
            html += `
                <section class="flow-detail-grid">
                    <div class="flow-panel">
                        <h2>${escapeHtml(selected.title || selected.id)}</h2>
                        <div class="flow-panel-sub">${escapeHtml(selected.brief || '')}</div>
                        <div class="flow-chip-row">
                            <span class="flow-chip">目标：${escapeHtml(selected.goal || '未配置')}</span>
                            <span class="flow-chip">开篇 Talk：${escapeHtml(selected.initTalk || '未配置')}</span>
                            <span class="flow-chip clickable" onclick="FlowView.showScene('${escapeHtml(selected.initScene || '')}')">开篇场景：${escapeHtml(selected.initScene || '未配置')}</span>
                        </div>
                        ${isEditing ? this.renderModuleEditor(selected) : this.renderLoopOverview(selected)}
                    </div>
                    <aside class="flow-panel">
                        ${this.renderLoopFacts(selected)}
                        ${this.renderChangeLog()}
                    </aside>
                </section>
            `;

            html += `</div>`;
            content.innerHTML = html;
            UI.renderSidebar();
        },

        pick(loopId) {
            // Use the existing loader path so scene details, AVG talks, expose talks,
            // and sidebar state all stay aligned with the selected Loop.
            this.editPage = null;
            pickLoop(loopId);
        },

        openModuleEditor(loopId, module) {
            this.editPage = { loopId, module: module || 'loopText' };
            this.render();
        },

        closeModuleEditor() {
            this.editPage = null;
            this.render();
        },

        switchModuleEditor(module) {
            if (!this.editPage) return;
            this.editPage.module = module || 'loopText';
            this.render();
        },

        ensureOriginals(loop) {
            if (!loop || loop._originalEditable) return;
            loop._originalEditable = {};
            Object.keys(this.editableFields).forEach(field => {
                loop._originalEditable[field] = loop[field] || '';
            });
            loop._originalEntry = {
                initTalk: loop.initTalk || '',
                initScene: loop.initScene || '',
            };
            loop._originalScenes = JSON.parse(JSON.stringify(loop.scenes || []));
            loop._originalDoubts = JSON.parse(JSON.stringify(loop.doubts || []));
            loop._originalExposes = JSON.parse(JSON.stringify(loop.exposes || []));
        },

        renderLoopOverview(loop) {
            return `
                ${this.renderStages(loop)}
                <div class="flow-overview-grid">
                    ${this.renderModuleSummaryCard(loop, 'loopText')}
                    ${this.renderModuleSummaryCard(loop, 'entry')}
                    ${this.renderModuleSummaryCard(loop, 'scenes')}
                    ${this.renderModuleSummaryCard(loop, 'events')}
                    ${this.renderModuleSummaryCard(loop, 'doubts')}
                    ${this.renderModuleSummaryCard(loop, 'exposes')}
                </div>
            `;
        },

        moduleMeta(module) {
            const meta = {
                loopText: { label: 'Loop 文案', hint: '目标、简述、新疑点、总结' },
                entry: { label: '入口配置', hint: '开篇 Talk 与初始场景' },
                scenes: { label: '场景配置', hint: '开放场景、开篇场景、场景归属' },
                events: { label: '事件 / AVG', hint: '只读查看 Talk 脚本事件和参数' },
                doubts: { label: '疑点配置', hint: '疑点文本与前置依赖' },
                exposes: { label: '指证道具', hint: '每轮指证材料' },
            };
            return meta[module] || meta.loopText;
        },

        renderModuleSummaryCard(loop, module) {
            const meta = this.moduleMeta(module);
            const body = {
                loopText: this.renderLoopTextSummary(loop),
                entry: this.renderEntrySummary(loop),
                scenes: this.renderScenesSummary(loop),
                events: this.renderEventsSummary(loop),
                doubts: this.renderDoubtsSummary(loop),
                exposes: this.renderExposesSummary(loop),
            }[module] || '';
            return `
                <article class="flow-module-card ${module === 'scenes' ? 'wide' : ''}">
                    <div class="flow-module-head">
                        <div>
                            <div class="flow-module-title">${escapeHtml(meta.label)}</div>
                            <div class="flow-module-hint">${escapeHtml(meta.hint)}</div>
                        </div>
                        <button type="button" class="btn primary" onclick="FlowOverviewView.openModuleEditor('${escapeHtml(loop.id)}','${escapeHtml(module)}')">编辑</button>
                    </div>
                    <div class="flow-module-body">${body}</div>
                </article>
            `;
        },

        renderLoopTextSummary(loop) {
            const lines = [
                ['目标', loop.goal || '未配置'],
                ['简述', loop.brief || '未配置'],
                ['新疑点', loop.newDoubtTitle || loop.newDoubtContent || '未配置'],
                ['总结', loop.summaryContent || '未配置'],
            ];
            return `<div class="flow-module-list">${lines.map(([k, v]) => `
                <div class="flow-module-line"><span>${escapeHtml(k)}</span><strong>${escapeHtml(v)}</strong></div>
            `).join('')}</div>`;
        },

        renderEntrySummary(loop) {
            const scene = AppState.scenesMap.get(String(loop.initScene || ''));
            return `<div class="flow-module-list">
                <div class="flow-module-line"><span>开篇 Talk</span><strong>${escapeHtml(loop.initTalk || '未配置')}</strong></div>
                <div class="flow-module-line"><span>初始场景</span><strong>${escapeHtml(loop.initScene || '未配置')} ${scene ? `· ${escapeHtml(this.sceneName(scene))}` : ''}</strong></div>
            </div>`;
        },

        renderScenesSummary(loop) {
            const scenes = loop.scenes || [];
            if (!scenes.length) return `<div class="flow-list-sub">本 Loop 暂无开放场景。</div>`;
            return `<div class="flow-module-list compact">${scenes.slice(0, 8).map(s => `
                <div class="flow-module-line">
                    <span>${String(loop.initScene || '') === String(s.id) ? '开篇' : '场景'}</span>
                    <strong>${escapeHtml(s.id)} · ${escapeHtml(s.name || `Scene ${s.id}`)}</strong>
                </div>
            `).join('')}${scenes.length > 8 ? `<div class="flow-list-sub">还有 ${scenes.length - 8} 个场景，进入编辑页查看。</div>` : ''}</div>`;
        },

        renderEventsSummary(loop) {
            const events = this.talkEventsForLoop(loop);
            if (!events.length) return `<div class="flow-list-sub">当前已加载 Talk 中暂无脚本事件。</div>`;
            const grouped = this.groupEvents(events);
            return `<div class="flow-module-list compact">${Object.entries(grouped).slice(0, 5).map(([kind, list]) => `
                <div class="flow-module-line">
                    <span>${escapeHtml(kind)}</span>
                    <strong>${list.length} 个节点</strong>
                </div>
            `).join('')}${events.length > 12 ? `<div class="flow-list-sub">共 ${events.length} 个事件节点，进入编辑页查看。</div>` : ''}</div>`;
        },

        renderDoubtsSummary(loop) {
            const doubts = loop.doubts || [];
            if (!doubts.length) return `<div class="flow-list-sub">本 Loop 暂无疑点。</div>`;
            return `<div class="flow-module-list compact">${doubts.map(d => `
                <div class="flow-module-line vertical">
                    <span>疑点 #${escapeHtml(d.id)}</span>
                    <strong>${escapeHtml(d.text || '未配置疑点文本')}</strong>
                    <em>${(d.conditions || []).length} 条前置依赖</em>
                </div>
            `).join('')}</div>`;
        },

        renderExposesSummary(loop) {
            const exposes = loop.exposes || [];
            if (!exposes.length) return `<div class="flow-list-sub">本 Loop 暂无指证配置。</div>`;
            return `<div class="flow-module-list compact">${exposes.map(e => `
                <div class="flow-module-line vertical">
                    <span>第 ${escapeHtml(e.id || '?')} 轮 · Talk ${escapeHtml(e.talkId || '未配置')}</span>
                    <strong>${escapeHtml(e.testimonyLabel || '无被攻击证词')}</strong>
                    <em>${(e.items || []).length} 个指证材料</em>
                </div>
            `).join('')}</div>`;
        },

        renderModuleEditor(loop) {
            const module = this.editPage?.module || 'loopText';
            const tabs = ['loopText', 'entry', 'scenes', 'events', 'doubts', 'exposes'].map(key => {
                const active = key === module ? 'active' : '';
                return `<button type="button" class="flow-editor-tab ${active}" onclick="FlowOverviewView.switchModuleEditor('${key}')">${escapeHtml(this.moduleMeta(key).label)}</button>`;
            }).join('');
            const body = {
                loopText: this.renderEditForm(loop, false),
                entry: this.renderEntryEditor(loop),
                scenes: this.renderScenesEditor(loop),
                events: this.renderEventsViewer(loop),
                doubts: this.renderDoubts(loop),
                exposes: this.renderExposes(loop),
            }[module] || this.renderEditForm(loop, false);
            return `
                <div class="flow-editor-shell">
                    <div class="flow-editor-head">
                        <div>
                            <div class="flow-editor-kicker">二级编辑 · ${escapeHtml(loop.id)}</div>
                            <div class="flow-editor-title">${escapeHtml(this.moduleMeta(module).label)}</div>
                        </div>
                        <button type="button" class="btn ghost" onclick="FlowOverviewView.closeModuleEditor()">返回总览</button>
                    </div>
                    <div class="flow-editor-tabs">${tabs}</div>
                    <div class="flow-editor-body">${body}</div>
                </div>
            `;
        },

        renderEditForm(loop, includeEntry = true) {
            let html = `<div class="flow-edit-grid">`;
            Object.entries(this.editableFields).forEach(([field, meta]) => {
                const value = loop[field] || '';
                const wide = meta.multiline ? 'wide' : '';
                const ref = `ChapterConfig.${meta.tableField}[0]`;
                const inputId = `flow-edit-${loop.id}-${field}`;
                html += `<label class="flow-edit-field ${wide}">`;
                html += `<span class="flow-edit-label"><span>${escapeHtml(meta.label)}</span><span class="flow-edit-ref">${escapeHtml(ref)}</span></span>`;
                if (meta.multiline) {
                    html += `<textarea id="${escapeHtml(inputId)}" class="flow-edit-textarea" onchange="FlowOverviewView.updateLoopText('${escapeHtml(loop.id)}','${escapeHtml(field)}',this.value)">${escapeHtml(value)}</textarea>`;
                } else {
                    html += `<input id="${escapeHtml(inputId)}" class="flow-edit-input" value="${escapeHtml(value)}" onchange="FlowOverviewView.updateLoopText('${escapeHtml(loop.id)}','${escapeHtml(field)}',this.value)">`;
                }
                html += `<button type="button" class="btn flow-edit-commit" onclick="event.preventDefault(); FlowOverviewView.updateLoopTextFromInput('${escapeHtml(loop.id)}','${escapeHtml(field)}')">记录修改</button>`;
                html += `</label>`;
            });
            html += `</div>`;
            if (includeEntry) html += this.renderEntryEditor(loop);
            return html;
        },

        renderEntryEditor(loop) {
            const sceneOptions = this.renderSceneOptions(loop.initScene);
            return `
                <div class="flow-mini-editor">
                    <div class="flow-mini-editor-title">入口与初始场景</div>
                    <div class="flow-entry-grid">
                        <div class="flow-entry-field">
                            <label>ChapterConfig.initTalk</label>
                            <input id="flow-entry-${escapeHtml(loop.id)}-initTalk" value="${escapeHtml(loop.initTalk || '')}" placeholder="开篇 Talk ID">
                            <button type="button" class="btn" onclick="FlowOverviewView.updateEntryFieldFromInput('${escapeHtml(loop.id)}','initTalk')">记录</button>
                        </div>
                        <div class="flow-entry-field">
                            <label>ChapterConfig.initScene</label>
                            <select id="flow-entry-${escapeHtml(loop.id)}-initScene">${sceneOptions}</select>
                            <button type="button" class="btn" onclick="FlowOverviewView.updateEntryFieldFromInput('${escapeHtml(loop.id)}','initScene')">记录</button>
                        </div>
                    </div>
                </div>
            `;
        },

        renderSceneOptions(current) {
            const chapter = this.currentFormalChapter();
            const scenes = AppState.allScenes
                .filter(s => !chapter || String(s.sceneId || '').startsWith(this.chapterDigit()))
                .sort((a, b) => Number(a.sceneId || 0) - Number(b.sceneId || 0));
            let html = `<option value="">未配置</option>`;
            scenes.forEach(s => {
                const id = String(s.sceneId || '');
                const selected = String(current || '') === id ? 'selected' : '';
                const label = `${id} · ${this.sceneName(s)}`;
                html += `<option value="${escapeHtml(id)}" ${selected}>${escapeHtml(label)}</option>`;
            });
            return html;
        },

        updateEntryFieldFromInput(loopId, field) {
            const el = document.getElementById(`flow-entry-${loopId}-${field}`);
            if (!el) return;
            this.updateEntryField(loopId, field, el.value);
        },

        updateEntryField(loopId, field, value) {
            const loop = this.findLoop(loopId);
            if (!loop || !['initTalk', 'initScene'].includes(field)) return;
            this.ensureOriginals(loop);
            const oldValue = loop._originalEntry?.[field] || '';
            const newValue = String(value || '').trim();
            loop[field] = newValue;
            const opening = (loop.flow || []).find(s => s.type === 'opening');
            if (opening) {
                if (!opening.refs) opening.refs = {};
                if (field === 'initTalk') {
                    opening.refs.talkId = newValue;
                    opening.summary = `从 Talk ${newValue || '未配置'} 进入本 Loop。`;
                } else {
                    opening.refs.sceneId = newValue;
                }
            }
            const key = `ChapterConfig:${loop.chapterId}:${field}`;
            this.recordChapterScalarChange(loop, {
                key,
                action: newValue === oldValue ? 'remove' : 'update',
                id: loop.chapterId,
                field,
                label: field === 'initTalk' ? '开篇 Talk' : '初始场景',
                valuePath: field,
                old: oldValue,
                new: newValue,
            });
            this.render();
        },

        updateLoopTextFromInput(loopId, field) {
            const el = document.getElementById(`flow-edit-${loopId}-${field}`);
            if (!el) return;
            this.updateLoopText(loopId, field, el.value);
        },

        updateLoopText(loopId, field, value) {
            const flow = AppState.unitFlow;
            const loop = flow?.loops?.find(l => l.id === loopId);
            const meta = this.editableFields[field];
            if (!loop || !meta) return;
            this.ensureOriginals(loop);

            const oldValue = loop._originalEditable[field] || '';
            const newValue = String(value || '').trim();
            loop[field] = newValue;
            if (field === 'summaryContent') {
                const summary = (loop.flow || []).find(s => s.type === 'summary');
                if (summary) summary.summary = newValue;
            }
            if (field === 'goal' && AppState.loopData && loop.id === AppState.currentLoop) {
                AppState.loopData.target = newValue;
            }

            const key = `ChapterConfig:${loop.chapterId}:${meta.tableField}:0`;
            const idx = AppState.pendingChanges.findIndex(c => c.key === key);
            if (newValue === oldValue) {
                if (idx >= 0) AppState.pendingChanges.splice(idx, 1);
            } else {
                const change = {
                    key,
                    action: 'update',
                    source: 'avg_editor_v2',
                    unit: AppState.currentUnit,
                    formalUnit: flow.formalUnit || flow.unit,
                    loop: loop.id,
                    table: 'ChapterConfig',
                    id: loop.chapterId,
                    field: meta.tableField,
                    valuePath: `${meta.tableField}[0]`,
                    label: meta.label,
                    old: oldValue,
                    new: newValue,
                    updatedAt: new Date().toISOString(),
                };
                if (idx >= 0) AppState.pendingChanges[idx] = change;
                else AppState.pendingChanges.push(change);
            }
            this.render();
        },

        recordChapterScalarChange(loop, change) {
            if (change.action === 'remove') {
                AppState.pendingChanges = AppState.pendingChanges.filter(c => c.key !== change.key);
                return;
            }
            const idx = AppState.pendingChanges.findIndex(c => c.key === change.key);
            const payload = {
                ...change,
                source: 'avg_editor_v2',
                unit: AppState.currentUnit,
                formalUnit: AppState.unitFlow?.formalUnit || AppState.unitFlow?.unit,
                loop: loop.id,
                table: 'ChapterConfig',
                affectedTables: ['ChapterConfig'],
                updatedAt: new Date().toISOString(),
            };
            if (idx >= 0) AppState.pendingChanges[idx] = payload;
            else AppState.pendingChanges.push(payload);
        },

        applyPendingToFlow() {
            const flow = AppState.unitFlow;
            if (!flow?.loops) return;
            AppState.pendingChanges
                .filter(c => c.table === 'ChapterConfig' && c.formalUnit === (flow.formalUnit || flow.unit))
                .forEach(c => {
                    const loop = flow.loops.find(l => String(l.chapterId) === String(c.id));
                    if (!loop) return;
                    const field = Object.keys(this.editableFields).find(k => this.editableFields[k].tableField === c.field);
                    this.ensureOriginals(loop);
                    if (field) {
                        loop[field] = c.new;
                        if (field === 'summaryContent') {
                            const summary = (loop.flow || []).find(s => s.type === 'summary');
                            if (summary) summary.summary = c.new;
                        }
                        return;
                    }
                    if (c.field === 'initTalk' || c.field === 'initScene') {
                        loop[c.field] = c.new || '';
                        const opening = (loop.flow || []).find(s => s.type === 'opening');
                        if (opening) {
                            if (!opening.refs) opening.refs = {};
                            if (c.field === 'initTalk') {
                                opening.refs.talkId = c.new || '';
                                opening.summary = `从 Talk ${c.new || '未配置'} 进入本 Loop。`;
                            } else {
                                opening.refs.sceneId = c.new || '';
                            }
                        }
                        return;
                    }
                    if (c.field === 'doubts') {
                        this.applyDoubtChange(loop, c);
                    } else if (c.field === 'exposes') {
                        this.applyExposeChange(loop, c);
                    }
                });
        },

        applyDoubtChange(loop, change) {
            if (!Array.isArray(loop.doubts)) loop.doubts = [];
            const doubt = loop.doubts.find(d => String(d.id) === String(change.doubtId));
            if (!doubt) return;
            if (change.kind === 'doubt_text') {
                doubt.text = change.new || '';
                return;
            }
            if (!Array.isArray(doubt.conditions)) doubt.conditions = [];
            if (change.kind === 'doubt_condition_update') {
                const next = change.new || {};
                doubt.conditions[change.conditionIndex] = {
                    type: String(next.type || ''),
                    param: String(next.param || ''),
                    ...this.resolveDependency(next.type, next.param, loop.loop),
                };
            } else if (change.kind === 'doubt_condition_insert') {
                const exists = doubt.conditions.some(c => String(c.type) === String(change.new?.type) && String(c.param) === String(change.new?.param));
                if (!exists) {
                    const next = change.new || {};
                    doubt.conditions.push({
                        type: String(next.type || ''),
                        param: String(next.param || ''),
                        ...this.resolveDependency(next.type, next.param, loop.loop),
                    });
                }
            } else if (change.kind === 'doubt_condition_delete') {
                doubt.conditions.splice(change.conditionIndex, 1);
            }
        },

        renderOpeningStage(loop, stage) {
            const items = (typeof FlowView !== 'undefined' && FlowView.resolveOpeningItems)
                ? FlowView.resolveOpeningItems(loop)
                : [];
            const item = items[0] || {};
            const firstId = String(item.firstId || stage?.refs?.talkId || loop.initTalk || '').trim();
            const sceneId = String(item.id || stage?.refs?.sceneId || loop.initScene || '').trim();
            const talk = firstId ? DataManager.getTalk(firstId) : null;
            const talkFile = item.talk || talk?.videoScene || '';
            const entries = talkFile ? DataManager.talkEntriesByScene(talkFile) : [];
            const scene = sceneId ? DataManager.getScene(sceneId) : null;
            const sceneName = scene?.sceneName || (sceneId ? `场景 ${sceneId}` : '开篇');
            const brief = item.purpose || loop.openingBrief || '';
            const loaded = entries.length > 0 || !!talk;
            const sub = talkFile ? `${talkFile}.json · 首句 #${firstId}` : `首句 #${firstId}`;
            const title = escapeHtml(sceneName).replace(/'/g, '&apos;');
            const safeSub = escapeHtml(sub).replace(/'/g, '&apos;');
            const playAction = firstId
                ? `UI.playTalkInDrawer('${escapeHtml(firstId)}', 'OPENING', '${title}', '${safeSub}')`
                : '';

            return `
                <div class="flow-opening-preview">
                    ${brief ? `<div class="flow-opening-brief">${escapeHtml(brief)}</div>` : ''}
                    <div class="flow-opening-row">
                        <span>${escapeHtml(sceneName)}${sceneId ? ` · ${escapeHtml(sceneId)}` : ''}</span>
                        ${talkFile ? `<span>${escapeHtml(talkFile)}.json</span>` : ''}
                        ${firstId ? `<span>首句 #${escapeHtml(firstId)}</span>` : '<span>未配置首句</span>'}
                        ${loaded ? `<span>${entries.length || 1} 句</span>` : '<span style="color:var(--warning);">未加载</span>'}
                    </div>
                    ${firstId && loaded ? `
                        <button type="button" class="flow-opening-play-card" onclick="${playAction}">
                            <span>
                                <span class="flow-opening-play-title">播放开篇对白</span>
                                <span class="flow-opening-play-meta">${escapeHtml(sceneName)}${talkFile ? ` · ${escapeHtml(talkFile)}.json` : ''} · 首句 #${escapeHtml(firstId)} · ${entries.length || 1} 句</span>
                            </span>
                            <span class="flow-opening-play-action">打开</span>
                        </button>
                    ` : ''}
                </div>
            `;
        },

        renderStages(loop) {
            const stages = loop.flow || [];
            if (!stages.length) {
                return `<div class="flow-stage-list"><div class="flow-warning">这个 Loop 暂无阶段链。</div></div>`;
            }
            let html = `<div class="flow-stage-list">`;
            stages.forEach((stage, idx) => {
                const openingExtra = stage.type === 'opening' ? this.renderOpeningStage(loop, stage) : '';
                html += `
                    <div class="flow-stage">
                        <div class="flow-stage-title">
                            <span>${idx + 1}. ${escapeHtml(stage.title || stage.type)}</span>
                            <span class="flow-stage-type">${escapeHtml(stage.type || '')}</span>
                        </div>
                        <div class="flow-stage-summary">${escapeHtml(stage.summary || '')}</div>
                        ${openingExtra}
                    </div>
                `;
            });
            html += `</div>`;
            return html;
        },

        renderLoopFacts(loop) {
            let html = `<h3>本 Loop 配置摘要</h3>`;

            const issues = this.validate(loop);
            if (issues.length) {
                html += `<div class="flow-list">`;
                issues.forEach(issue => {
                    html += `<div class="flow-warning">${escapeHtml(issue)}</div>`;
                });
                html += `</div>`;
            }

            html += `<div class="flow-list">`;
            html += `
                <div class="flow-list-item">
                    <div class="flow-list-title">开放场景 · ${loop.scenes?.length || 0}</div>
                    <div class="flow-list-sub">${(loop.scenes || []).slice(0, 4).map(s => `${escapeHtml(s.id)} ${escapeHtml(s.name || '')}`).join('<br>') || '暂无开放场景'}</div>
                </div>
            `;

            html += `
                <div class="flow-list-item">
                    <div class="flow-list-title">疑点 · ${loop.doubts?.length || 0}</div>
                    <div class="flow-list-sub">${(loop.doubts || []).map(d => `#${escapeHtml(d.id)} · ${(d.conditions || []).length} 条依赖`).join('<br>') || '暂无疑点'}</div>
                </div>
            `;

            html += `
                <div class="flow-list-item">
                    <div class="flow-list-title">指证 · ${loop.exposes?.length || 0}</div>
                    <div class="flow-list-sub">${(loop.exposes || []).map(e => `第 ${escapeHtml(e.id || '?')} 轮 · ${(e.items || []).length} 个材料`).join('<br>') || '暂无指证'}</div>
                </div>
            `;
            html += `</div>`;

            return html;
        },

        renderScenesEditor(loop) {
            const scenes = loop.scenes || [];
            let html = `<div class="scene-edit-list">`;
            if (!scenes.length) {
                html += `<div class="flow-list-sub">本 Loop 暂无开放场景。</div>`;
            }
            scenes.forEach(s => {
                const isPendingClosed = s.pendingIsOpen === false;
                const pendingClosed = isPendingClosed ? 'pending-closed' : '';
                const init = String(loop.initScene || '') === String(s.id) ? `<span class="flow-chip">开篇</span>` : '';
                const toggleLabel = isPendingClosed ? '打开' : '关闭';
                const toggleNext = isPendingClosed ? 'true' : 'false';
                const toggleClass = isPendingClosed ? 'btn' : 'btn ghost';
                html += `
                    <div class="scene-edit-row ${pendingClosed}">
                        <div>
                            <div class="scene-edit-name">${escapeHtml(s.name || `Scene ${s.id}`)} ${init}</div>
                            <div class="scene-edit-meta">${escapeHtml(s.id)} · ${escapeHtml(s.kind || 'unknown')} · NPC ${s.npcCount || 0} · 道具 ${s.itemCount || 0}</div>
                        </div>
                        <div class="scene-edit-actions">
                            <button type="button" class="btn" onclick="FlowView.showScene('${escapeHtml(s.id)}')">查看</button>
                            <button type="button" class="btn" onclick="FlowOverviewView.updateEntryField('${escapeHtml(loop.id)}','initScene','${escapeHtml(s.id)}')">设为开篇</button>
                            <button type="button" class="${toggleClass}" onclick="FlowOverviewView.setSceneOpen('${escapeHtml(loop.id)}','${escapeHtml(s.id)}',${toggleNext})">${toggleLabel}</button>
                        </div>
                    </div>
                `;
            });
            html += `
                <div class="scene-add-row">
                    <select id="scene-add-${escapeHtml(loop.id)}">${this.renderSceneOptions('')}</select>
                    <button type="button" class="btn" onclick="FlowOverviewView.addSceneToLoop('${escapeHtml(loop.id)}')">加入本 Loop</button>
                </div>
            `;
            html += `</div>`;
            return html;
        },

        sceneName(scene) {
            if (!scene) return '';
            const loc = scene.location || {};
            return scene.sceneName || cn(loc.Name) || `Scene ${scene.sceneId || scene.id || ''}`;
        },

        sceneNodeFromScene(scene, loop) {
            const sid = String(scene?.sceneId || '');
            const itemIds = (scene?.ItemIDs || []).map(x => String(x));
            return {
                id: sid,
                name: this.sceneName(scene),
                kind: DataManager.sceneKind(scene) || 'unknown',
                isInit: sid === String(loop?.initScene || ''),
                npcCount: (scene?.NPCInfos || []).length,
                itemCount: itemIds.filter(id => AppState.itemsMap.has(id)).length,
                itemIds,
            };
        },

        setSceneOpen(loopId, sceneId, isOpen) {
            const loop = this.findLoop(loopId);
            const scene = AppState.scenesMap.get(String(sceneId));
            if (!loop || !scene) return;
            this.ensureOriginals(loop);
            const sid = String(sceneId);
            if (!Array.isArray(loop.scenes)) loop.scenes = [];
            let node = loop.scenes.find(s => String(s.id) === sid);
            if (!node && isOpen) {
                node = this.sceneNodeFromScene(scene, loop);
                loop.scenes.push(node);
                loop.scenes.sort((a, b) => Number(a.id || 0) - Number(b.id || 0));
            }
            if (node) node.pendingIsOpen = !!isOpen;

            this.recordSceneFieldChange(loop, scene, 'isOpen', scene.isOpen === false ? false : true, !!isOpen);
            if (isOpen && Number(scene.loop) !== Number(loop.loop)) {
                this.recordSceneFieldChange(loop, scene, 'loop', scene.loop ?? '', Number(loop.loop));
            }
            this.render();
        },

        addSceneToLoop(loopId) {
            const el = document.getElementById(`scene-add-${loopId}`);
            const sceneId = String(el?.value || '').trim();
            if (!sceneId) {
                UI.updateStatus('请选择要加入的场景');
                return;
            }
            this.setSceneOpen(loopId, sceneId, true);
        },

        recordSceneFieldChange(loop, scene, field, oldValue, newValue) {
            const sid = String(scene.sceneId || '');
            const oldNorm = oldValue == null ? '' : oldValue;
            const newNorm = newValue == null ? '' : newValue;
            const key = `SceneConfig:${sid}:${field}`;
            const idx = AppState.pendingChanges.findIndex(c => c.key === key);
            if (String(oldNorm) === String(newNorm)) {
                if (idx >= 0) AppState.pendingChanges.splice(idx, 1);
                return;
            }
            const change = {
                key,
                action: 'update',
                source: 'avg_editor_v2',
                unit: AppState.currentUnit,
                formalUnit: AppState.unitFlow?.formalUnit || AppState.unitFlow?.unit,
                loop: loop.id,
                table: 'SceneConfig',
                id: sid,
                field,
                valuePath: field,
                label: `${this.sceneName(scene)} · ${field}`,
                old: oldNorm,
                new: newNorm,
                affectedTables: ['SceneConfig'],
                updatedAt: new Date().toISOString(),
            };
            if (idx >= 0) AppState.pendingChanges[idx] = change;
            else AppState.pendingChanges.push(change);
        },

        talkEventsForLoop(loop) {
            const currentLoop = loop?.id || AppState.currentLoop;
            if (currentLoop && currentLoop !== AppState.currentLoop) return [];
            return (AppState.allTalks || [])
                .filter(t => String(t.script || '').trim())
                .filter(t => this.shouldShowTalkEvent(t.script))
                .sort((a, b) => Number(a.id || 0) - Number(b.id || 0));
        },

        shouldShowTalkEvent(script) {
            const s = String(script || '').trim().toLowerCase();
            if (!s) return false;
            return !['branches', '1', 'end'].includes(s);
        },

        eventKind(script) {
            const s = String(script || '').trim();
            const lower = s.toLowerCase();
            if (!s) return '普通对白';
            if (['new_npc_in', 'npc_out'].includes(lower)) return 'NPC 入退场';
            if (lower === 'exhibit') return '出示道具';
            if (lower.includes('comic')) return '动态漫画';
            if (lower === 'interrupt') return '突发打断';
            if (lower === 'get' || lower.startsWith('get_')) return '获取';
            if (lower === 'lie') return '指证点';
            if (lower === 'branches' || lower === '1') return '分支';
            if (lower === 'end') return '结束';
            return '其他事件';
        },

        groupEvents(events) {
            return events.reduce((acc, event) => {
                const script = String(event.script || '').trim() || '(empty)';
                if (!acc[script]) acc[script] = [];
                acc[script].push(event);
                return acc;
            }, {});
        },

        eventScriptOptions(current) {
            const scripts = [
                '',
                'new_npc_in',
                'npc_out',
                'exhibit',
                'interrupt',
                'get',
                'get_Evidence_Box',
                'Lie',
                'branches',
                'end',
            ];
            const cur = String(current || '');
            if (cur && !scripts.includes(cur)) scripts.push(cur);
            return scripts.map(s => {
                const label = s || '普通对白（空 script）';
                return `<option value="${escapeHtml(s)}" ${s === cur ? 'selected' : ''}>${escapeHtml(label)}</option>`;
            }).join('');
        },

        renderEventsViewer(loop) {
            const events = this.talkEventsForLoop(loop);
            if (!events.length) {
                return `<div class="flow-list-sub">当前已加载 Talk 中暂无脚本事件。切到对应 Loop 并点击「加载」后，这里会扫描该 Loop 的 AVG Talk / Expose 节点。</div>`;
            }
            const grouped = this.groupEvents(events);
            return `<div class="event-edit-list">` + Object.entries(grouped).map(([kind, list]) => `
                <div class="event-group">
                    <div class="event-group-head">
                        <span>script: ${escapeHtml(kind)}</span>
                        <span class="flow-chip">${escapeHtml(this.eventKind(kind))} · ${list.length} 个节点</span>
                    </div>
                    ${list.map(t => this.renderTalkEventSummary(t)).join('')}
                </div>
            `).join('') + `</div>`;
        },

        renderTalkEventSummary(talk) {
            const speaker = cn(talk.Speaker?.Name) || talk.Speaker?.id || '旁白';
            const words = cn(talk.Words) || '';
            const params = Array.from({ length: 3 }, (_, idx) => talk.Parameters?.[idx] || { ParameterInt: '0', ParameterStr: '' })
                .filter(p => String(p.ParameterInt ?? '0') !== '0' || String(p.ParameterStr ?? '').trim());
            return `
                <div class="event-edit-card">
                    <div class="event-edit-top">
                        <div>
                            <div class="event-edit-title">${escapeHtml(talk.videoScene || '未知文件')} · step ${escapeHtml(talk.step || '?')} · ${escapeHtml(this.eventKind(talk.script))}</div>
                            <div class="event-edit-meta">${escapeHtml(speaker)} · step ${escapeHtml(talk.step || '')} · next ${escapeHtml(talk.next || '空')}</div>
                        </div>
                        <span class="dep-status current">${escapeHtml(this.eventKind(talk.script))}</span>
                    </div>
                    <div class="event-quote">${escapeHtml(truncate(words || '(无对白文本)', 120))}</div>
                    ${params.length ? `<div class="event-param-list readonly">${params.map((p, idx) => `
                        <div class="event-param-read">
                            <span>参数 ${idx}</span>
                            <strong>Int ${escapeHtml(String(p.ParameterInt ?? '0'))}</strong>
                            <em>${escapeHtml(String(p.ParameterStr ?? '')) || 'Str 空'}</em>
                        </div>
                    `).join('')}</div>` : `<div class="event-edit-meta">无有效参数</div>`}
                </div>
            `;
        },

        renderTalkEventParams(loop, talk) {
            const params = Array.from({ length: 3 }, (_, idx) => talk.Parameters?.[idx] || { ParameterInt: '0', ParameterStr: '' });
            return `<div class="event-param-list">${params.map((p, idx) => `
                <div class="event-param-row">
                    <div class="event-param-label">参数 ${idx}</div>
                    <input id="talk-event-param-int-${escapeHtml(talk.id)}-${idx}" value="${escapeHtml(p.ParameterInt ?? '0')}" placeholder="ParameterInt">
                    <input id="talk-event-param-str-${escapeHtml(talk.id)}-${idx}" value="${escapeHtml(p.ParameterStr ?? '')}" placeholder="ParameterStr">
                    <button type="button" class="btn" onclick="FlowOverviewView.updateTalkEventParamFromInput('${escapeHtml(loop.id)}','${escapeHtml(talk.id)}',${idx})">记录</button>
                </div>
            `).join('')}</div>`;
        },

        ensureTalkEventOriginal(talk) {
            const key = String(talk?.id || '');
            if (!key || this._originalTalkEvents.has(key)) return;
            this._originalTalkEvents.set(key, {
                script: talk.script || '',
                Parameters: JSON.parse(JSON.stringify(talk.Parameters || [])),
            });
        },

        findTalkEvent(talkId) {
            return (AppState.allTalks || []).find(t => String(t.id) === String(talkId)) || null;
        },

        updateTalkEventScriptFromInput(loopId, talkId) {
            const el = document.getElementById(`talk-event-script-${talkId}`);
            this.updateTalkEventScript(loopId, talkId, el?.value);
        },

        updateTalkEventScript(loopId, talkId, value) {
            const loop = this.findLoop(loopId);
            const talk = this.findTalkEvent(talkId);
            if (!loop || !talk) return;
            this.ensureTalkEventOriginal(talk);
            const oldValue = this._originalTalkEvents.get(String(talkId))?.script || '';
            const newValue = String(value || '').trim();
            talk.script = newValue;
            this.recordTalkEventChange(loop, talk, {
                key: `Talk:${talkId}:script`,
                action: newValue === oldValue ? 'remove' : 'update',
                field: 'script',
                valuePath: 'script',
                label: `Talk ${talkId} 事件 script`,
                old: oldValue,
                new: newValue,
            });
            this.render();
        },

        updateTalkEventParamFromInput(loopId, talkId, paramIdx) {
            const intEl = document.getElementById(`talk-event-param-int-${talkId}-${paramIdx}`);
            const strEl = document.getElementById(`talk-event-param-str-${talkId}-${paramIdx}`);
            this.updateTalkEventParam(loopId, talkId, paramIdx, intEl?.value, strEl?.value);
        },

        updateTalkEventParam(loopId, talkId, paramIdx, intValue, strValue) {
            const loop = this.findLoop(loopId);
            const talk = this.findTalkEvent(talkId);
            if (!loop || !talk) return;
            this.ensureTalkEventOriginal(talk);
            if (!Array.isArray(talk.Parameters)) talk.Parameters = [];
            while (talk.Parameters.length <= paramIdx) talk.Parameters.push({ ParameterInt: '0', ParameterStr: '' });
            const originalParams = this._originalTalkEvents.get(String(talkId))?.Parameters || [];
            const oldValue = originalParams[paramIdx] || { ParameterInt: '0', ParameterStr: '' };
            const newValue = {
                ParameterInt: String(intValue ?? '0').trim() || '0',
                ParameterStr: String(strValue ?? '').trim(),
            };
            talk.Parameters[paramIdx] = newValue;
            this.recordTalkEventChange(loop, talk, {
                key: `Talk:${talkId}:Parameters:${paramIdx}`,
                action: JSON.stringify(oldValue) === JSON.stringify(newValue) ? 'remove' : 'update',
                field: 'Parameters',
                valuePath: `Parameters[${paramIdx}]`,
                label: `Talk ${talkId} 事件参数 ${paramIdx}`,
                old: oldValue,
                new: newValue,
            });
            this.render();
        },

        recordTalkEventChange(loop, talk, change) {
            if (change.action === 'remove') {
                AppState.pendingChanges = AppState.pendingChanges.filter(c => c.key !== change.key);
                return;
            }
            const idx = AppState.pendingChanges.findIndex(c => c.key === change.key);
            const payload = {
                ...change,
                source: 'avg_editor_v2',
                unit: AppState.currentUnit,
                formalUnit: AppState.unitFlow?.formalUnit || AppState.unitFlow?.unit,
                loop: loop.id,
                table: 'Talk新增表',
                id: String(talk.id),
                talkFile: talk.videoScene || '',
                speakerId: talk.Speaker?.id || '',
                affectedTables: ['Talk新增表', 'AVG JSON'],
                updatedAt: new Date().toISOString(),
            };
            if (idx >= 0) AppState.pendingChanges[idx] = payload;
            else AppState.pendingChanges.push(payload);
        },

        renderDoubts(loop) {
            const doubts = loop.doubts || [];
            if (!doubts.length) return `<div class="flow-list-sub">本 Loop 未配置疑点。</div>`;
            return doubts.map(d => `
                <div class="doubt-edit-card">
                    <div class="doubt-edit-title">
                        <span>疑点 #${escapeHtml(d.id)}</span>
                        <span class="flow-stage-type">${escapeHtml(loop.id)}</span>
                    </div>
                    <textarea id="doubt-text-${escapeHtml(loop.id)}-${escapeHtml(d.id)}"
                              class="flow-edit-textarea"
                              onchange="FlowOverviewView.updateDoubtText('${escapeHtml(loop.id)}','${escapeHtml(d.id)}',this.value)">${escapeHtml(d.text || '')}</textarea>
                    <button type="button" class="btn flow-edit-commit"
                            onclick="FlowOverviewView.updateDoubtTextFromInput('${escapeHtml(loop.id)}','${escapeHtml(d.id)}')">记录疑点文本</button>
                    <div class="flow-list-sub" style="margin-top:0.65rem;">前置依赖</div>
                    ${(d.conditions || []).map((c, idx) => this.renderDependencyRow(loop, d, c, idx)).join('')}
                    ${this.renderDependencyAddRow(loop, d)}
                </div>
            `).join('');
        },

        renderDependencyRow(loop, doubt, condition, idx) {
            const dep = this.resolveDependency(condition.type, condition.param, loop.loop);
            return `
                <div class="dep-row">
                    <select id="dep-type-${escapeHtml(loop.id)}-${escapeHtml(doubt.id)}-${idx}">
                        ${this.renderTypeOptions(condition.type)}
                    </select>
                    <input id="dep-param-${escapeHtml(loop.id)}-${escapeHtml(doubt.id)}-${idx}" value="${escapeHtml(condition.param || '')}" placeholder="ID">
                    <div class="dep-label">${escapeHtml(dep.label)}</div>
                    <div class="dep-status ${escapeHtml(dep.status)}">${escapeHtml(dep.statusText)}</div>
                    <div class="dep-actions">
                        <button class="btn" onclick="FlowOverviewView.openDependencyPicker('${escapeHtml(loop.id)}','${escapeHtml(doubt.id)}',${idx},'edit')">选择</button>
                        <button class="btn" onclick="FlowOverviewView.updateDoubtCondition('${escapeHtml(loop.id)}','${escapeHtml(doubt.id)}',${idx})">记录</button>
                        <button class="btn ghost" onclick="FlowOverviewView.removeDoubtCondition('${escapeHtml(loop.id)}','${escapeHtml(doubt.id)}',${idx})">删除</button>
                    </div>
                </div>
            `;
        },

        renderDependencyAddRow(loop, doubt) {
            return `
                <div class="dep-add-row">
                    <select id="dep-add-type-${escapeHtml(loop.id)}-${escapeHtml(doubt.id)}">
                        ${this.renderTypeOptions('1')}
                    </select>
                    <input id="dep-add-param-${escapeHtml(loop.id)}-${escapeHtml(doubt.id)}" value="" placeholder="新增依赖 ID">
                    <div class="dep-label">新增一条必须先获得的道具或证词</div>
                    <div class="dep-status unknown">待添加</div>
                    <div class="dep-actions">
                        <button class="btn" onclick="FlowOverviewView.openDependencyPicker('${escapeHtml(loop.id)}','${escapeHtml(doubt.id)}',-1,'add')">选择</button>
                        <button class="btn" onclick="FlowOverviewView.addDoubtCondition('${escapeHtml(loop.id)}','${escapeHtml(doubt.id)}')">新增依赖</button>
                    </div>
                </div>
            `;
        },

        renderTypeOptions(current) {
            const opts = [
                ['1', '道具'],
                ['2', '关系'],
                ['3', '时间线证词'],
                ['4', '证词'],
            ];
            return opts.map(([value, label]) =>
                `<option value="${value}" ${String(current) === value ? 'selected' : ''}>${label}</option>`
            ).join('');
        },

        openDependencyPicker(loopId, doubtId, idx, mode) {
            const typeId = mode === 'add'
                ? `dep-add-type-${loopId}-${doubtId}`
                : `dep-type-${loopId}-${doubtId}-${idx}`;
            const type = document.getElementById(typeId)?.value || '1';
            this.pickerState = {
                loopId,
                doubtId,
                idx: Number(idx),
                mode: mode || 'edit',
                type: String(type),
                query: '',
            };
            this.renderDependencyPicker();
            document.getElementById('depPickerModal')?.classList.add('active');
        },

        openExposeItemPicker(loopId, exposeIdx, itemIdx, mode) {
            const loop = this.findLoop(loopId);
            const expose = loop?.exposes?.[Number(exposeIdx)];
            const currentItem = expose?.items?.[Number(itemIdx)];
            const addType = document.getElementById(`expose-add-type-${loopId}-${exposeIdx}`)?.value;
            const inferredType = mode === 'add'
                ? (addType || '1')
                : this.inferExposeMaterialType(currentItem?.id || currentItem || '');
            this.pickerState = {
                target: 'exposeItem',
                loopId,
                exposeIdx: Number(exposeIdx),
                itemIdx: Number(itemIdx),
                mode: mode || 'edit',
                type: inferredType || '1',
                query: '',
            };
            this.renderDependencyPicker();
            document.getElementById('depPickerModal')?.classList.add('active');
        },

        closeDependencyPicker() {
            document.getElementById('depPickerModal')?.classList.remove('active');
        },

        switchDependencyPickerType(type) {
            if (!this.pickerState) return;
            this.pickerState.type = String(type || '1');
            this.pickerState.query = '';
            this.renderDependencyPicker();
        },

        filterDependencyPicker(query) {
            if (!this.pickerState) return;
            this.pickerState.query = String(query || '');
            this.renderDependencyPicker();
        },

        renderDependencyPicker() {
            const state = this.pickerState;
            const content = document.getElementById('depPickerContent');
            if (!state || !content) return;
            const loop = this.findLoop(state.loopId);
            const doubt = loop?.doubts?.find(d => String(d.id) === String(state.doubtId));
            const expose = state.target === 'exposeItem' ? loop?.exposes?.[state.exposeIdx] : null;
            const type = String(state.type || '1');
            const query = String(state.query || '').trim();
            const allOptions = this.dependencyCatalog(type, loop);
            const options = this.filterDependencyOptions(allOptions, query).slice(0, 160);
            const typeLabel = this.dependencyTypeLabel(type);
            const title = state.target === 'exposeItem' ? '选择指证材料' : `选择${typeLabel}依赖`;
            const sub = state.target === 'exposeItem'
                ? `${loop?.title || state.loopId} · 指证第 ${expose?.id || state.exposeIdx + 1} 轮`
                : `${loop?.title || state.loopId} · 疑点 ${state.doubtId}${doubt?.text ? ' · ' + truncate(doubt.text, 28) : ''}`;

            let html = `
                <div class="dep-picker-head">
                    <div>
                        <div class="dep-picker-title">${escapeHtml(title)}</div>
                        <div class="dep-picker-sub">${escapeHtml(sub)}</div>
                    </div>
                    <span class="dep-status unknown">${escapeHtml(state.mode === 'add' ? '新增' : '替换当前项')}</span>
                </div>
                <div class="dep-picker-tools">
                    <select onchange="FlowOverviewView.switchDependencyPickerType(this.value)">
                        ${this.renderTypeOptions(type)}
                    </select>
                    <input id="dep-picker-search" value="${escapeHtml(query)}"
                           placeholder="搜索名称 / ID / 来源 Loop / 地点 / NPC"
                           oninput="FlowOverviewView.filterDependencyPicker(this.value)">
                </div>
            `;

            if (!options.length) {
                html += `<div class="dep-picker-empty">没有匹配的候选项。可以换类型、换关键词，或回到条件行手填 ID。</div>`;
            } else {
                html += `<div class="dep-picker-list">`;
                options.forEach(opt => {
                    html += `
                        <div class="dep-picker-item" onclick="FlowOverviewView.selectDependencyFromPicker('${escapeHtml(opt.type)}','${escapeHtml(opt.param)}')">
                            <div class="dep-picker-item-top">
                                <div class="dep-picker-item-name">${escapeHtml(opt.name || '(无标题)')}</div>
                                <div class="dep-picker-id">${escapeHtml(opt.param)}</div>
                            </div>
                            <div class="dep-picker-item-meta">
                                ${escapeHtml(opt.meta || '')}
                                ${opt.detail ? `<br>${escapeHtml(opt.detail)}` : ''}
                            </div>
                            <div class="flow-chip-row" style="margin-top:0.45rem;">
                                <span class="dep-status ${escapeHtml(opt.status || 'unknown')}">${escapeHtml(opt.statusText || '来源未知')}</span>
                                ${opt.kind ? `<span class="flow-chip">${escapeHtml(opt.kind)}</span>` : ''}
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            }
            content.innerHTML = html;
            const search = document.getElementById('dep-picker-search');
            if (search) {
                search.focus();
                search.setSelectionRange(search.value.length, search.value.length);
            }
        },

        selectDependencyFromPicker(type, param) {
            const state = this.pickerState;
            if (!state) return;
            const chosenType = String(type || '').trim();
            const chosenParam = String(param || '').trim();
            if (!chosenType || !chosenParam) return;

            if (state.target === 'exposeItem') {
                this.closeDependencyPicker();
                if (state.mode === 'add') {
                    this.addExposeItem(state.loopId, state.exposeIdx, chosenParam);
                } else {
                    this.updateExposeItem(state.loopId, state.exposeIdx, state.itemIdx, chosenParam);
                }
                UI.updateStatus(`已选择指证材料 ${chosenParam}`);
                return;
            }

            if (state.mode === 'add') {
                this.closeDependencyPicker();
                this.insertDoubtCondition(state.loopId, state.doubtId, chosenType, chosenParam);
                UI.updateStatus(`已新增依赖 ${chosenType}:${chosenParam}`);
                return;
            }

            this.closeDependencyPicker();
            this.commitDoubtCondition(state.loopId, state.doubtId, state.idx, chosenType, chosenParam);
            UI.updateStatus(`已选择依赖 ${chosenType}:${chosenParam}`);
        },

        dependencyCatalog(type, loop) {
            const typ = String(type || '1');
            const chapter = this.currentFormalChapter();
            const currentLoop = loop?.loop || 0;
            const withDep = (raw) => {
                const dep = this.resolveDependency(raw.type, raw.param, currentLoop);
                return { ...raw, ...dep };
            };

            if (typ === '1') {
                return AppState.allItems
                    .filter(i => !chapter || i.Chapter === chapter)
                    .filter(i => !['0', '5'].includes(String(i.itemType || '')))
                    .map(i => withDep({
                        type: '1',
                        param: String(i.id),
                        name: cn(i.Name) || `(道具 ${i.id})`,
                        meta: `L${this.loopFromItemId(i.id) || '?'} · ${DataManager.typeName(i.itemType)} · ${cn(i.location) || '未配置地点'}`,
                        detail: cn(i.ShortDescribe) || cn(i.Describe) || '',
                    }));
            }

            if (typ === '2') {
                const seen = new Set();
                const out = [];
                this.unitTestimonies().filter(t => this.isRelationTestimony(t)).forEach(t => {
                    seen.add(String(t.id));
                    out.push(withDep({
                        type: '2',
                        param: String(t.id),
                        name: cn(t.shortDesc) || cn(t.testimony) || `关系 ${t.id}`,
                        meta: `L${this.loopFromTestimonyId(t.id) || '?'} · ${this.testimonyNpcName(t)} · 关系证词`,
                        detail: cn(t.testimony) || '',
                    }));
                });
                this.existingRelationParams().forEach(pid => {
                    if (seen.has(pid)) return;
                    out.push(withDep({
                        type: '2',
                        param: pid,
                        name: `关系连接 ${pid}`,
                        meta: '来自现有疑点配置',
                        detail: '',
                    }));
                });
                return out;
            }

            const testimonies = this.unitTestimonies().filter(t => {
                if (typ === '3') return this.isTimelineTestimony(t);
                if (typ === '4') return !this.isTimelineTestimony(t) && !this.isRelationTestimony(t);
                return true;
            });

            return testimonies.map(t => withDep({
                type: typ,
                param: String(t.id),
                name: cn(t.shortDesc) || cn(t.testimony) || `(证词 ${t.id})`,
                meta: `L${this.loopFromTestimonyId(t.id) || '?'} · ${this.testimonyNpcName(t)}${typ === '3' ? ' · ' + (this.timeLabelForTestimony(t) || '时间线') : ''}`,
                detail: cn(t.testimony) || '',
            }));
        },

        filterDependencyOptions(options, query) {
            const q = String(query || '').trim().toLowerCase();
            if (!q) return options;
            return options.filter(opt => [
                opt.param,
                opt.name,
                opt.meta,
                opt.detail,
                opt.statusText,
            ].some(v => String(v || '').toLowerCase().includes(q)));
        },

        currentFormalChapter() {
            if (AppState.unitFlow?.chapter) return AppState.unitFlow.chapter;
            const formal = AppState.unitFlow?.formalUnit || AppState.currentUnit;
            if (formal === 'Unit1' || AppState.currentUnit === 'Unit9') return 'EPI01';
            return DataManager.chapter(formal);
        },

        chapterDigit() {
            const m = String(this.currentFormalChapter() || '').match(/\d+/);
            return m ? String(Number(m[0])) : '';
        },

        unitTestimonies() {
            const digit = this.chapterDigit();
            return AppState.allTestimonies.filter(t => !digit || String(t.id).startsWith(digit));
        },

        dependencyTypeLabel(type) {
            return { '1': '道具', '2': '关系', '3': '时间线证词', '4': '证词' }[String(type)] || '依赖';
        },

        isTimelineTestimony(t) {
            // 规则来自 config-table-language-rules:
            // 时间线证词必须是 TestimonyItem.triggerType = Timeline，
            // triggerParam = NPCID,日期代码,开始时间,结束时间；
            // 若 TimeLineEvent 已加载，还必须存在同 ID 事件行。
            const triggerType = this.normalizeTriggerType(t?.triggerType);
            if (triggerType !== 'Timeline') return false;
            if (!this.hasTimelineParam(t?.triggerParam)) return false;
            if (AppState.timelineEventIds?.size) {
                return AppState.timelineEventIds.has(String(t?.id || ''));
            }
            return true;
        },

        isRelationTestimony(t) {
            return this.normalizeTriggerType(t?.triggerType) === 'RelationNetwork';
        },

        normalizeTriggerType(value) {
            const raw = String(value ?? 'None').trim();
            if (raw === '1' || raw.toLowerCase() === 'timeline') return 'Timeline';
            if (raw === '2' || raw.toLowerCase() === 'relationnetwork') return 'RelationNetwork';
            return 'None';
        },

        hasTimelineParam(triggerParam) {
            const parts = String(triggerParam || '').split(',').map(v => v.trim());
            if (parts.length < 4) return false;
            return /^\d{3}$/.test(parts[0])
                && /^\d{4}$/.test(parts[1])
                && /^\d{3,4}$/.test(parts[2])
                && /^\d{3,4}$/.test(parts[3]);
        },

        testimonyNpcName(t) {
            const id = String(t?.id || '').slice(0, 3);
            const npc = AppState.npcsMap.get(id);
            return cn(npc?.Name) || `NPC ${id || '?'}`;
        },

        timeLabelForTestimony(t) {
            const parts = String(t?.triggerParam || '').split(',').map(v => v.trim()).filter(Boolean);
            if (parts.length < 4) return '';
            const start = this.formatClock(parts[2]);
            const end = this.formatClock(parts[3]);
            if (start && end && start !== end) return `${start}-${end}`;
            return start || '';
        },

        formatClock(raw) {
            const s = String(raw || '').padStart(4, '0');
            return `${s.slice(0, 2)}:${s.slice(2)}`;
        },

        existingRelationParams() {
            const out = new Set();
            const scanConds = (conds) => (conds || []).forEach(c => {
                if (String(c.type) === '2' && c.param) out.add(String(c.param));
            });
            (AppState.allDoubts || []).forEach(d => scanConds(d.condition));
            (AppState.unitFlow?.loops || []).forEach(l => (l.doubts || []).forEach(d => scanConds(d.conditions)));
            return Array.from(out);
        },

        updateDoubtTextFromInput(loopId, doubtId) {
            const el = document.getElementById(`doubt-text-${loopId}-${doubtId}`);
            if (!el) return;
            this.updateDoubtText(loopId, doubtId, el.value);
        },

        updateDoubtText(loopId, doubtId, value) {
            const loop = this.findLoop(loopId);
            const doubt = loop?.doubts?.find(d => String(d.id) === String(doubtId));
            if (!loop || !doubt) return;
            this.ensureOriginals(loop);
            const original = this.originalDoubt(loop, doubtId);
            const oldValue = original?.text || '';
            const newValue = String(value || '').trim();
            doubt.text = newValue;
            this.recordDoubtChange(loop, {
                key: `ChapterConfig:${loop.chapterId}:doubts:${doubtId}:text`,
                action: newValue === oldValue ? 'remove' : 'update',
                kind: 'doubt_text',
                id: loop.chapterId,
                label: `疑点 ${doubtId} 文本`,
                valuePath: `doubts[id=${doubtId}].text`,
                old: oldValue,
                new: newValue,
                doubtId: String(doubtId),
            });
            this.render();
        },

        updateDoubtCondition(loopId, doubtId, idx) {
            const typeEl = document.getElementById(`dep-type-${loopId}-${doubtId}-${idx}`);
            const paramEl = document.getElementById(`dep-param-${loopId}-${doubtId}-${idx}`);
            const type = String(typeEl?.value || '').trim();
            const param = String(paramEl?.value || '').trim();
            if (!type || !param) {
                UI.updateStatus('依赖类型和 ID 都不能为空');
                return;
            }
            this.commitDoubtCondition(loopId, doubtId, idx, type, param);
        },

        commitDoubtCondition(loopId, doubtId, idx, type, param) {
            const loop = this.findLoop(loopId);
            const doubt = loop?.doubts?.find(d => String(d.id) === String(doubtId));
            if (!loop || !doubt) return;
            this.ensureOriginals(loop);
            const typ = String(type || '').trim();
            const pid = String(param || '').trim();
            if (!typ || !pid) {
                UI.updateStatus('依赖类型和 ID 都不能为空');
                return;
            }
            const dep = this.resolveDependency(type, param, loop.loop);
            const nextCondition = { type: typ, param: pid, ...dep };
            const original = this.originalDoubt(loop, doubtId);
            const oldCondition = original?.conditions?.[idx] || null;
            const oldPair = oldCondition ? { type: String(oldCondition.type), param: String(oldCondition.param) } : null;
            doubt.conditions[idx] = nextCondition;
            this.recordDoubtChange(loop, {
                key: `ChapterConfig:${loop.chapterId}:doubts:${doubtId}:condition:${idx}`,
                action: JSON.stringify(oldPair) === JSON.stringify({ type: typ, param: pid }) ? 'remove' : 'update',
                kind: 'doubt_condition_update',
                id: loop.chapterId,
                label: `疑点 ${doubtId} 依赖 #${idx + 1}`,
                valuePath: `doubts[id=${doubtId}].condition[${idx}]`,
                old: oldPair,
                new: { type: typ, param: pid },
                doubtId: String(doubtId),
                conditionIndex: idx,
                dependency: dep,
            });
            this.render();
        },

        addDoubtCondition(loopId, doubtId) {
            const loop = this.findLoop(loopId);
            const doubt = loop?.doubts?.find(d => String(d.id) === String(doubtId));
            if (!loop || !doubt) return;
            this.ensureOriginals(loop);
            const typeEl = document.getElementById(`dep-add-type-${loopId}-${doubtId}`);
            const paramEl = document.getElementById(`dep-add-param-${loopId}-${doubtId}`);
            const type = String(typeEl?.value || '').trim();
            const param = String(paramEl?.value || '').trim();
            if (!type || !param) {
                UI.updateStatus('新增依赖需要填写类型和 ID');
                return;
            }
            this.insertDoubtCondition(loopId, doubtId, type, param);
        },

        insertDoubtCondition(loopId, doubtId, type, param) {
            const loop = this.findLoop(loopId);
            const doubt = loop?.doubts?.find(d => String(d.id) === String(doubtId));
            if (!loop || !doubt) return;
            this.ensureOriginals(loop);
            const typ = String(type || '').trim();
            const pid = String(param || '').trim();
            if (!typ || !pid) {
                UI.updateStatus('新增依赖需要填写类型和 ID');
                return;
            }
            const dep = this.resolveDependency(typ, pid, loop.loop);
            const idx = (doubt.conditions || []).length;
            if (!Array.isArray(doubt.conditions)) doubt.conditions = [];
            doubt.conditions.push({ type: typ, param: pid, ...dep });
            this.recordDoubtChange(loop, {
                key: `ChapterConfig:${loop.chapterId}:doubts:${doubtId}:condition:add:${idx}:${typ}:${pid}`,
                action: 'insert',
                kind: 'doubt_condition_insert',
                id: loop.chapterId,
                label: `疑点 ${doubtId} 新增依赖`,
                valuePath: `doubts[id=${doubtId}].condition[${idx}]`,
                old: null,
                new: { type: typ, param: pid },
                doubtId: String(doubtId),
                conditionIndex: idx,
                dependency: dep,
            });
            this.render();
        },

        removeDoubtCondition(loopId, doubtId, idx) {
            const loop = this.findLoop(loopId);
            const doubt = loop?.doubts?.find(d => String(d.id) === String(doubtId));
            if (!loop || !doubt || !Array.isArray(doubt.conditions)) return;
            this.ensureOriginals(loop);
            const removed = doubt.conditions[idx];
            doubt.conditions.splice(idx, 1);
            this.recordDoubtChange(loop, {
                key: `ChapterConfig:${loop.chapterId}:doubts:${doubtId}:condition:${idx}:delete`,
                action: 'delete',
                kind: 'doubt_condition_delete',
                id: loop.chapterId,
                label: `疑点 ${doubtId} 删除依赖 #${idx + 1}`,
                valuePath: `doubts[id=${doubtId}].condition[${idx}]`,
                old: removed ? { type: removed.type, param: removed.param } : null,
                new: null,
                doubtId: String(doubtId),
                conditionIndex: idx,
            });
            this.render();
        },

        recordDoubtChange(loop, change) {
            if (change.action === 'remove') {
                AppState.pendingChanges = AppState.pendingChanges.filter(c => c.key !== change.key);
                return;
            }
            const idx = AppState.pendingChanges.findIndex(c => c.key === change.key);
            const payload = {
                ...change,
                source: 'avg_editor_v2',
                unit: AppState.currentUnit,
                formalUnit: AppState.unitFlow?.formalUnit || AppState.unitFlow?.unit,
                loop: loop.id,
                table: 'ChapterConfig',
                field: 'doubts',
                affectedTables: change.kind === 'doubt_text' ? ['ChapterConfig', 'DoubtConfig'] : ['ChapterConfig'],
                updatedAt: new Date().toISOString(),
            };
            if (idx >= 0) AppState.pendingChanges[idx] = payload;
            else AppState.pendingChanges.push(payload);
        },

        findLoop(loopId) {
            return AppState.unitFlow?.loops?.find(l => l.id === loopId) || null;
        },

        originalDoubt(loop, doubtId) {
            return (loop._originalDoubts || []).find(d => String(d.id) === String(doubtId)) || null;
        },

        resolveDependency(type, param, currentLoop) {
            const typ = String(type || '').trim();
            const pid = String(param || '').trim();
            let kind = '未知';
            let name = '未找到';
            let exists = false;
            let sourceLoopNum = 0;

            if (typ === '1') {
                kind = '道具';
                const item = AppState.itemsMap.get(pid);
                exists = !!item;
                name = item ? (cn(item.Name) || '(未命名)') : '未找到';
                sourceLoopNum = this.loopFromItemId(pid);
            } else if (typ === '3' || typ === '4') {
                kind = typ === '3' ? '时间线证词' : '证词';
                const testimony = AppState.allTestimonies.find(t => String(t.id) === pid);
                exists = !!testimony;
                name = testimony ? (cn(testimony.shortDesc) || cn(testimony.testimony) || '(无文本)') : '未找到';
                sourceLoopNum = this.loopFromTestimonyId(pid);
            } else if (typ === '2') {
                kind = '关系';
                const testimony = AppState.allTestimonies.find(t => String(t.id) === pid);
                exists = !!pid && (!!testimony || this.existingRelationParams().includes(pid));
                name = testimony ? (cn(testimony.shortDesc) || cn(testimony.testimony) || `关系连接 ${pid}`) : (pid ? `关系连接 ${pid}` : '未填写');
                sourceLoopNum = testimony ? this.loopFromTestimonyId(pid) : 0;
            }

            let status = 'unknown';
            let statusText = '来源未知';
            if (!exists) {
                status = 'missing';
                statusText = '未找到';
            } else if (sourceLoopNum > currentLoop) {
                status = 'future';
                statusText = `未来依赖 L${sourceLoopNum}`;
            } else if (sourceLoopNum < currentLoop && sourceLoopNum > 0) {
                status = 'previous';
                statusText = `前置依赖 L${sourceLoopNum}`;
            } else if (sourceLoopNum === currentLoop) {
                status = 'current';
                statusText = `当前 Loop L${sourceLoopNum}`;
            }

            return {
                kind,
                name,
                label: `${kind} ${pid} · ${name}`,
                exists,
                sourceLoop: sourceLoopNum ? `loop${sourceLoopNum}` : '',
                sourceLoopNum,
                status,
                statusText,
            };
        },

        loopFromItemId(id) {
            const pid = String(id || '');
            const source = AppState.allItems.find(i => String(i.analysedEvidence || '') === pid);
            const raw = source ? String(source.id || '') : pid;
            const digit = raw[1];
            return digit >= '1' && digit <= '6' ? Number(digit) : 0;
        },

        loopFromTestimonyId(id) {
            const pid = String(id || '');
            const digit = pid[3];
            return digit >= '1' && digit <= '6' ? Number(digit) : 0;
        },

        renderExposes(loop) {
            const exposes = loop.exposes || [];
            if (!exposes.length) return `<div class="flow-list-sub">本 Loop 未配置指证。</div>`;
            return `<div class="expose-edit-list">` + exposes.map((e, exposeIdx) => `
                <div class="expose-edit-card">
                    <div class="expose-round-head">
                        <div>
                            <div class="expose-edit-title">第 ${escapeHtml(e.id || '?')} 轮 · Talk ${escapeHtml(e.talkId || '未配置')}</div>
                            <div class="expose-edit-meta">ChapterConfig.exposes[${exposeIdx}].item</div>
                        </div>
                        <span class="dep-status ${escapeHtml(this.exposeRoundStatus(loop, e))}">${escapeHtml((e.items || []).length)} 个材料</span>
                    </div>
                    ${this.renderExposeTarget(loop, e)}
                    ${(e.items || []).map((item, itemIdx) => this.renderExposeItemRow(loop, e, exposeIdx, item, itemIdx)).join('')}
                    <div class="expose-item-row expose-add-row">
                        <select id="expose-add-type-${escapeHtml(loop.id)}-${exposeIdx}" class="expose-add-type">
                            ${this.renderTypeOptions('1')}
                        </select>
                        <input id="expose-add-${escapeHtml(loop.id)}-${exposeIdx}" value="" placeholder="新增指证材料 ID">
                        <div class="expose-item-label">新增一条指证道具/证词材料</div>
                        <div class="expose-item-actions">
                            <button type="button" class="btn" onclick="FlowOverviewView.openExposeItemPicker('${escapeHtml(loop.id)}',${exposeIdx},-1,'add')">选择</button>
                            <button type="button" class="btn" onclick="FlowOverviewView.addExposeItemFromInput('${escapeHtml(loop.id)}',${exposeIdx})">新增</button>
                        </div>
                    </div>
                </div>
            `).join('') + `</div>`;
        },

        renderExposeTarget(loop, expose) {
            const tid = String(expose?.testimony || '').trim();
            if (!tid || tid === '0') {
                return `
                    <div class="expose-target-box">
                        <div class="expose-target-title">本轮没有配置被攻击证词</div>
                        <div class="expose-target-meta">ChapterConfig.exposes.testimony 为空或为 0。</div>
                    </div>
                `;
            }
            const material = this.resolveExposeMaterial(tid, loop.loop);
            return `
                <div class="expose-target-box">
                    <div class="expose-target-title">被攻击证词：${escapeHtml(material.name)}</div>
                    <div class="expose-target-meta">
