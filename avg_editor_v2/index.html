                        ${escapeHtml(material.kind)} ${escapeHtml(tid)} · ${escapeHtml(material.statusText)}
                        ${material.detail ? ` · ${escapeHtml(truncate(material.detail, 72))}` : ''}
                    </div>
                </div>
            `;
        },

        exposeRoundStatus(loop, expose) {
            const items = expose?.items || [];
            if (items.some(item => this.resolveExposeMaterial(item.id || item, loop.loop).status === 'missing')) return 'missing';
            if (items.some(item => this.resolveExposeMaterial(item.id || item, loop.loop).status === 'future')) return 'future';
            return 'current';
        },

        renderExposeItemRow(loop, expose, exposeIdx, item, itemIdx) {
            const material = this.resolveExposeMaterial(item.id || item, loop.loop);
            return `
                <div class="expose-item-row">
                    <input id="expose-item-${escapeHtml(loop.id)}-${exposeIdx}-${itemIdx}" value="${escapeHtml(item.id || item || '')}" placeholder="材料 ID">
                    <div class="expose-material-card">
                        <div class="expose-material-title">${escapeHtml(material.name)}</div>
                        <div class="expose-material-chips">
                            <span class="flow-chip">${escapeHtml(material.kind)}</span>
                            <span class="flow-chip">#${escapeHtml(material.id || item.id || item || '')}</span>
                            <span class="dep-status ${escapeHtml(material.status)}">${escapeHtml(material.statusText)}</span>
                        </div>
                        ${material.detail ? `<div class="expose-material-detail">${escapeHtml(truncate(material.detail, 96))}</div>` : ''}
                    </div>
                    <div class="expose-item-actions">
                        <button type="button" class="btn" onclick="FlowOverviewView.openExposeItemPicker('${escapeHtml(loop.id)}',${exposeIdx},${itemIdx},'edit')">选择</button>
                        <button type="button" class="btn" onclick="FlowOverviewView.updateExposeItemFromInput('${escapeHtml(loop.id)}',${exposeIdx},${itemIdx})">记录</button>
                        <button type="button" class="btn ghost" onclick="FlowOverviewView.removeExposeItem('${escapeHtml(loop.id)}',${exposeIdx},${itemIdx})">删除</button>
                    </div>
                </div>
            `;
        },

        resolveExposeMaterial(id, currentLoop = 0) {
            const pid = String(id || '').trim();
            const type = this.inferExposeMaterialType(pid);
            const item = AppState.itemsMap.get(pid);
            if (item) {
                const dep = this.resolveDependency('1', pid, currentLoop || this.loopFromItemId(pid));
                return {
                    ...dep,
                    id: pid,
                    type: '1',
                    kind: '道具',
                    name: cn(item.Name) || '(未命名)',
                    label: `道具 ${pid} · ${cn(item.Name) || '(未命名)'}`,
                    detail: cn(item.ShortDescribe) || cn(item.Describe) || cn(item.location) || '',
                };
            }
            const testimony = AppState.allTestimonies.find(t => String(t.id) === pid);
            if (testimony) {
                const typ = this.isTimelineTestimony(testimony) ? '3' : (this.isRelationTestimony(testimony) ? '2' : '4');
                const dep = this.resolveDependency(typ, pid, currentLoop || this.loopFromTestimonyId(pid));
                const kind = typ === '3' ? '时间线证词' : (typ === '2' ? '关系证词' : '证词');
                const name = cn(testimony.shortDesc) || cn(testimony.testimony) || '(无文本)';
                const extra = typ === '3' ? this.timeLabelForTestimony(testimony) : this.testimonyNpcName(testimony);
                return {
                    ...dep,
                    id: pid,
                    type: typ,
                    kind,
                    name,
                    label: `${kind} ${pid} · ${name}`,
                    detail: `${extra || ''}${extra ? ' · ' : ''}${cn(testimony.testimony) || ''}`,
                };
            }
            return {
                id: pid,
                type,
                kind: '未知',
                name: '未找到',
                label: `材料 ${pid || '空'} · 未找到`,
                detail: '',
                exists: false,
                status: 'missing',
                statusText: '未找到',
                sourceLoop: '',
                sourceLoopNum: 0,
            };
        },

        inferExposeMaterialType(id) {
            const pid = String(id || '').trim();
            if (AppState.itemsMap.has(pid)) return '1';
            const testimony = AppState.allTestimonies.find(t => String(t.id) === pid);
            if (testimony) {
                if (this.isTimelineTestimony(testimony)) return '3';
                if (this.isRelationTestimony(testimony)) return '2';
                return '4';
            }
            return '1';
        },

        exposeItemIds(expose) {
            return (expose?.items || []).map(item => String(item.id || item || '').trim()).filter(Boolean);
        },

        originalExposeItemIds(loop, exposeIdx) {
            const expose = loop?._originalExposes?.[exposeIdx];
            return this.exposeItemIds(expose);
        },

        updateExposeItemFromInput(loopId, exposeIdx, itemIdx) {
            const el = document.getElementById(`expose-item-${loopId}-${exposeIdx}-${itemIdx}`);
            this.updateExposeItem(loopId, exposeIdx, itemIdx, el?.value);
        },

        addExposeItemFromInput(loopId, exposeIdx) {
            const el = document.getElementById(`expose-add-${loopId}-${exposeIdx}`);
            this.addExposeItem(loopId, exposeIdx, el?.value);
        },

        updateExposeItem(loopId, exposeIdx, itemIdx, id) {
            const loop = this.findLoop(loopId);
            const expose = loop?.exposes?.[exposeIdx];
            const pid = String(id || '').trim();
            if (!loop || !expose || !pid) return;
            this.ensureOriginals(loop);
            if (!Array.isArray(expose.items)) expose.items = [];
            const material = this.resolveExposeMaterial(pid, loop.loop);
            expose.items[itemIdx] = { id: pid, name: material.name, kind: material.kind };
            this.recordExposeItemsChange(loop, exposeIdx);
            this.render();
        },

        addExposeItem(loopId, exposeIdx, id) {
            const loop = this.findLoop(loopId);
            const expose = loop?.exposes?.[exposeIdx];
            const pid = String(id || '').trim();
            if (!loop || !expose || !pid) {
                UI.updateStatus('请填写或选择指证材料 ID');
                return;
            }
            this.ensureOriginals(loop);
            if (!Array.isArray(expose.items)) expose.items = [];
            const material = this.resolveExposeMaterial(pid, loop.loop);
            expose.items.push({ id: pid, name: material.name, kind: material.kind });
            this.recordExposeItemsChange(loop, exposeIdx);
            this.render();
        },

        removeExposeItem(loopId, exposeIdx, itemIdx) {
            const loop = this.findLoop(loopId);
            const expose = loop?.exposes?.[exposeIdx];
            if (!loop || !expose || !Array.isArray(expose.items)) return;
            this.ensureOriginals(loop);
            expose.items.splice(itemIdx, 1);
            this.recordExposeItemsChange(loop, exposeIdx);
            this.render();
        },

        recordExposeItemsChange(loop, exposeIdx) {
            const expose = loop.exposes?.[exposeIdx];
            if (!expose) return;
            const oldItems = this.originalExposeItemIds(loop, exposeIdx);
            const newItems = this.exposeItemIds(expose);
            const oldDetails = oldItems.map(id => this.exposeMaterialChangeDetail(id, loop.loop));
            const newDetails = newItems.map(id => this.exposeMaterialChangeDetail(id, loop.loop));
            const key = `ChapterConfig:${loop.chapterId}:exposes:${exposeIdx}:item`;
            const idx = AppState.pendingChanges.findIndex(c => c.key === key);
            if (JSON.stringify(oldItems) === JSON.stringify(newItems)) {
                if (idx >= 0) AppState.pendingChanges.splice(idx, 1);
                return;
            }
            const change = {
                key,
                action: 'update',
                kind: 'expose_items',
                source: 'avg_editor_v2',
                unit: AppState.currentUnit,
                formalUnit: AppState.unitFlow?.formalUnit || AppState.unitFlow?.unit,
                loop: loop.id,
                table: 'ChapterConfig',
                id: loop.chapterId,
                field: 'exposes',
                valuePath: `exposes[${exposeIdx}].item`,
                label: `指证第 ${expose.id || exposeIdx + 1} 轮材料`,
                old: oldItems,
                new: newItems,
                oldDetails,
                newDetails,
                exposeIndex: exposeIdx,
                exposeRoundId: expose.id || '',
                exposeTalkId: expose.talkId || '',
                targetTestimony: expose.testimony || '',
                affectedTables: ['ChapterConfig', 'ExposeData'],
                updatedAt: new Date().toISOString(),
            };
            if (idx >= 0) AppState.pendingChanges[idx] = change;
            else AppState.pendingChanges.push(change);
        },

        applyExposeChange(loop, change) {
            const expose = loop.exposes?.[change.exposeIndex];
            if (!expose || change.kind !== 'expose_items') return;
            expose.items = (change.new || []).map(id => ({
                id: String(id),
                name: this.resolveExposeMaterial(id, loop.loop).name,
                kind: this.resolveExposeMaterial(id, loop.loop).kind,
            }));
        },

        exposeMaterialChangeDetail(id, currentLoop) {
            const material = this.resolveExposeMaterial(id, currentLoop);
            return {
                id: String(id || ''),
                type: material.type,
                kind: material.kind,
                name: material.name,
                exists: material.exists,
                sourceLoop: material.sourceLoop,
                sourceLoopNum: material.sourceLoopNum,
                status: material.status,
                statusText: material.statusText,
            };
        },

        validate(loop) {
            const issues = [];
            if (!loop.goal) issues.push('缺少循环目标');
            if (!loop.initTalk) issues.push('缺少开篇 Talk');
            if (!loop.initScene) issues.push('缺少开篇场景');
            if (!loop.scenes || loop.scenes.length === 0) issues.push('没有开放场景');
            if ((loop.exposes || []).length > 0 && (loop.doubts || []).length === 0) issues.push('有指证但没有疑点门槛');
            (loop.exposes || []).forEach(e => {
                if (e.testimony && String(e.testimony) !== '0') {
                    const target = this.resolveExposeMaterial(e.testimony, loop.loop);
                    if (target.status === 'missing') issues.push(`指证第 ${e.id || '?'} 轮被攻击证词 ${e.testimony} 未找到`);
                    if (target.status === 'future') issues.push(`指证第 ${e.id || '?'} 轮被攻击证词来自未来 L${target.sourceLoopNum}`);
                }
                (e.items || []).forEach(item => {
                    const mid = item.id || item;
                    const material = this.resolveExposeMaterial(mid, loop.loop);
                    if (material.status === 'missing') issues.push(`指证第 ${e.id || '?'} 轮材料 ${mid} 未找到`);
                    if (material.status === 'future') issues.push(`指证第 ${e.id || '?'} 轮材料 ${mid} 来自未来 L${material.sourceLoopNum}`);
                });
            });
            (loop.doubts || []).forEach(d => {
                (d.conditions || []).forEach(c => {
                    const dep = this.resolveDependency(c.type, c.param, loop.loop);
                    if (dep.status === 'missing') issues.push(`疑点 ${d.id} 的依赖 ${c.type}:${c.param} 未找到`);
                    if (dep.status === 'future') issues.push(`疑点 ${d.id} 使用了未来依赖 ${c.type}:${c.param}`);
                });
            });
            return issues;
        },

        renderChangeLog() {
            const changes = AppState.pendingChanges || [];
            let html = `
                <div class="change-log-panel">
                    <div class="change-log-head">
                        <span>待应用修改 · ${changes.length}</span>
                        <span class="change-log-actions">
                            <button class="btn" onclick="FlowOverviewView.copyChangeLog()">复制</button>
                            <button class="btn" onclick="FlowOverviewView.exportChangeLog()">导出 JSON</button>
                            <button class="btn ghost" onclick="FlowOverviewView.clearChangeLog()">清空</button>
                        </span>
                    </div>
            `;
            if (!changes.length) {
                html += `<div class="change-log-empty">暂无修改。这里会记录网页改动，之后交给 AI 同步正式配置。</div>`;
            } else {
                html += `<div class="change-log-list">`;
                changes.forEach(c => {
                    html += `
                        <div class="change-log-item">
                            <strong>${escapeHtml(c.loop)} · ${escapeHtml(c.label)}</strong><br>
                            ${escapeHtml(c.table)} #${escapeHtml(c.id)} · ${escapeHtml(c.valuePath)}<br>
                            <span style="color:var(--text-muted);">原：</span>${escapeHtml(this.displayValue(c.old))}<br>
                            <span style="color:var(--highlight);">新：</span>${escapeHtml(this.displayValue(c.new))}
                            ${c.dependency ? `<br><span style="color:var(--text-muted);">${escapeHtml(c.dependency.statusText || '')}</span>` : ''}
                        </div>
                    `;
                });
                html += `</div>`;
            }
            html += `</div>`;
            return html;
        },

        displayValue(value) {
            if (value == null) return '空';
            if (typeof value === 'object') return truncate(JSON.stringify(value), 90);
            return truncate(String(value), 90);
        },

        changeLogPayload() {
            return {
                schemaVersion: 1,
                type: 'ndc_editor_change_log',
                generatedAt: new Date().toISOString(),
                source: 'avg_editor_v2',
                target: 'formal_config',
                changes: AppState.pendingChanges.map(({ key, ...rest }) => rest),
            };
        },

        copyChangeLog() {
            const text = JSON.stringify(this.changeLogPayload(), null, 2);
            if (navigator.clipboard?.writeText) {
                navigator.clipboard.writeText(text).then(() => UI.updateStatus('已复制 change log'));
            } else {
                UI.updateStatus('当前浏览器不支持剪贴板复制，请使用导出 JSON');
            }
        },

        exportChangeLog() {
            const text = JSON.stringify(this.changeLogPayload(), null, 2);
            const blob = new Blob([text], { type: 'application/json;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ndc_change_log_${Date.now()}.json`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
            UI.updateStatus('已导出 change log JSON');
        },

        clearChangeLog() {
            const flow = AppState.unitFlow;
            (flow?.loops || []).forEach(loop => {
                if (loop._originalEditable) {
                    Object.entries(loop._originalEditable).forEach(([field, value]) => {
                        loop[field] = value;
                        if (field === 'summaryContent') {
                            const summary = (loop.flow || []).find(s => s.type === 'summary');
                            if (summary) summary.summary = value;
                        }
                    });
                }
                if (loop._originalEntry) {
                    loop.initTalk = loop._originalEntry.initTalk || '';
                    loop.initScene = loop._originalEntry.initScene || '';
                    const opening = (loop.flow || []).find(s => s.type === 'opening');
                    if (opening) {
                        if (!opening.refs) opening.refs = {};
                        opening.refs.talkId = loop.initTalk;
                        opening.refs.sceneId = loop.initScene;
                        opening.summary = `从 Talk ${loop.initTalk || '未配置'} 进入本 Loop。`;
                    }
                }
                if (loop._originalScenes) {
                    loop.scenes = JSON.parse(JSON.stringify(loop._originalScenes));
                }
                if (loop._originalDoubts) {
                    loop.doubts = JSON.parse(JSON.stringify(loop._originalDoubts));
                }
                if (loop._originalExposes) {
                    loop.exposes = JSON.parse(JSON.stringify(loop._originalExposes));
                }
            });
            AppState.pendingChanges = [];
            this.render();
            UI.updateStatus('已清空待应用修改');
        },
    };

    const ValidationOverviewView = {
        severityFilter: 'all',
        moduleFilter: 'all',

        moduleLabel(module) {
            return {
                loopText: 'Loop 文案',
                entry: '入口配置',
                scenes: '场景配置',
                events: '事件 / AVG',
                doubts: '疑点配置',
                exposes: '指证道具',
            }[module] || module || '配置';
        },

        render() {
            const content = document.getElementById('content');
            const flow = AppState.unitFlow;
            if (!flow || !Array.isArray(flow.loops) || flow.loops.length === 0) {
                content.innerHTML = `
                    <div class="validation-page">
                        <div class="flow-warning">当前 Unit 没有 UnitFlow 数据。请先点击「加载」。</div>
                    </div>
                `;
                UI.renderSidebar();
                return;
            }

            FlowOverviewView.applyPendingToFlow();
            const issues = this.collectIssues();
            const filtered = this.filterIssues(issues);
            const errorCount = issues.filter(i => i.severity === 'error').length;
            const warnCount = issues.filter(i => i.severity === 'warn').length;
            const affectedLoops = new Set(issues.map(i => i.loopId).filter(Boolean)).size;

            let html = `
                <div class="validation-page">
                    <section class="unit-flow-hero">
                        <div class="unit-flow-kicker">Config Validation · ${escapeHtml(flow.chapter || '')}</div>
                        <div class="unit-flow-title">${escapeHtml(flow.unit)} · 配置校验总览</div>
                        <div class="unit-flow-alias">按正式表结构检查入口、场景、疑点依赖、指证材料和来源 Loop。</div>
                        <div class="validation-toolbar">
                            <select onchange="ValidationOverviewView.setSeverityFilter(this.value)">
                                ${this.renderFilterOption('all', '全部严重度', this.severityFilter)}
                                ${this.renderFilterOption('error', '只看错误', this.severityFilter)}
                                ${this.renderFilterOption('warn', '只看警告', this.severityFilter)}
                            </select>
                            <select onchange="ValidationOverviewView.setModuleFilter(this.value)">
                                ${this.renderFilterOption('all', '全部模块', this.moduleFilter)}
                                ${['loopText', 'entry', 'scenes', 'events', 'doubts', 'exposes'].map(m => this.renderFilterOption(m, this.moduleLabel(m), this.moduleFilter)).join('')}
                            </select>
                            <button class="btn" onclick="ValidationOverviewView.render()">重新校验</button>
                        </div>
                    </section>

                    <section class="validation-summary-grid">
                        ${this.renderStat('全部问题', issues.length)}
                        ${this.renderStat('错误', errorCount)}
                        ${this.renderStat('警告', warnCount)}
                        ${this.renderStat('影响 Loop', affectedLoops)}
                    </section>

                    <section class="flow-panel">
                        <h3>校验结果 · ${filtered.length}</h3>
                        ${filtered.length ? `<div class="validation-list">${filtered.map(i => this.renderIssue(i)).join('')}</div>` : `<div class="validation-empty">当前筛选下没有问题。这个小检查员暂时可以歇一口气。</div>`}
                    </section>
                </div>
            `;
            content.innerHTML = html;
            UI.renderSidebar();
        },

        renderFilterOption(value, label, current) {
            return `<option value="${escapeHtml(value)}" ${String(value) === String(current) ? 'selected' : ''}>${escapeHtml(label)}</option>`;
        },

        renderStat(label, value) {
            return `
                <div class="validation-stat-card">
                    <div class="validation-stat-num">${escapeHtml(String(value))}</div>
                    <div class="validation-stat-label">${escapeHtml(label)}</div>
                </div>
            `;
        },

        filterIssues(issues) {
            return issues.filter(i => {
                if (this.severityFilter !== 'all' && i.severity !== this.severityFilter) return false;
                if (this.moduleFilter !== 'all' && i.module !== this.moduleFilter) return false;
                return true;
            });
        },

        setSeverityFilter(value) {
            this.severityFilter = String(value || 'all');
            this.render();
        },

        setModuleFilter(value) {
            this.moduleFilter = String(value || 'all');
            this.render();
        },

        readableLoop(loop) {
            if (!loop) return 'Unit';
            const name = loop.title ? ` · ${loop.title}` : '';
            return `${loop.id || `loop${loop.loop || ''}`}${name}`;
        },

        readableScene(sceneId) {
            const sid = String(sceneId || '').trim();
            const scene = AppState.scenesMap.get(sid);
            if (!scene) return sid ? `场景未找到 · ${sid}` : '场景未填写';
            const name = FlowOverviewView.sceneName ? FlowOverviewView.sceneName(scene) : (scene.sceneName || scene.Name || '');
            return `${name || '未命名场景'} · ${sid}`;
        },

        readableTalk(talkId) {
            const tid = String(talkId || '').trim();
            const talk = AppState.talksMap.get(tid) || AppState.talksMap.get(Number(tid));
            if (!talk) return tid ? `Talk 未找到 · ${tid}` : 'Talk 未填写';
            const speaker = talk.speakerName || talk.speaker || talk.npcName || '';
            const scene = talk.videoScene || talk.file || talk.source || '';
            const step = talk.step ? `step ${talk.step}` : '';
            const text = cn(talk.Words) || cn(talk.content1) || cn(talk.Content1) || cn(talk.text) || cn(talk.content) || '';
            const summary = text ? truncate(text.replace(/\s+/g, ' '), 28) : (talk.script ? `${talk.script} 事件` : '无文本');
            return [scene, step, speaker, summary].filter(Boolean).join(' · ');
        },

        readableDoubt(doubt) {
            const did = String(doubt?.id || '').trim();
            const text = doubt?.text ? ` · ${truncate(doubt.text, 42)}` : '';
            return `疑点 ${did || '未填写'}${text}`;
        },

        readableDependency(type, param, loop) {
            const dep = FlowOverviewView.resolveDependency(type, param, loop?.loop || loop || 0);
            const bits = [dep.label, dep.statusText].filter(Boolean);
            return bits.join(' · ');
        },

        readableMaterial(id, loop) {
            const material = FlowOverviewView.resolveExposeMaterial(id, loop?.loop || loop || 0);
            const bits = [material.label, material.detail ? truncate(material.detail, 72) : '', material.statusText].filter(Boolean);
            return bits.join(' · ');
        },

        readableIssueRef(issue) {
            const table = issue.table || 'ChapterConfig';
            const id = String(issue.id || '').trim();
            if (table === 'ChapterConfig') {
                const loop = AppState.unitFlow?.loops?.find(l => String(l.chapterId) === id || String(l.id) === String(issue.loopId));
                return loop ? `${table} · ${this.readableLoop(loop)}` : `${table}${id ? ` · ${id}` : ''}`;
            }
            if (table === 'SceneConfig') return `${table} · ${this.readableScene(id)}`;
            if (table === 'Talk新增表' || table === 'Talk') return `${table} · ${this.readableTalk(id)}`;
            if (table === 'ArtAssetConfig') return `${table} · ${id || '资源未填写'}`;
            return `${table}${id ? ` · ${id}` : ''}`;
        },

        renderIssue(issue) {
            const moduleLabel = this.moduleLabel(issue.module);
            const refLabel = this.readableIssueRef(issue);
            return `
                <article class="validation-issue ${escapeHtml(issue.severity)}">
                    <div>
                        <div class="validation-issue-top">
                            <span class="validation-severity ${escapeHtml(issue.severity)}">${escapeHtml(issue.severity)}</span>
                            <span class="validation-module">${escapeHtml(moduleLabel)}</span>
                            <span class="validation-loop">${escapeHtml(issue.loopId || 'Unit')}</span>
                            ${issue.table ? `<span class="flow-chip">${escapeHtml(refLabel)}</span>` : ''}
                            ${issue.field ? `<span class="flow-chip">${escapeHtml(issue.field)}</span>` : ''}
                        </div>
                        <div class="validation-message">${escapeHtml(issue.message)}</div>
                        ${issue.detail ? `<div class="validation-detail">${escapeHtml(issue.detail)}</div>` : ''}
                    </div>
                    <div class="validation-actions">
                        ${issue.loopId ? `<button class="btn" onclick="ValidationOverviewView.focusLoop('${escapeHtml(issue.loopId)}')">定位 Loop</button>` : ''}
                        ${issue.loopId ? `<button class="btn primary" onclick="ValidationOverviewView.editIssue('${escapeHtml(issue.loopId)}','${escapeHtml(issue.editModule || issue.module)}')">去编辑</button>` : ''}
                    </div>
                </article>
            `;
        },

        collectIssues() {
            const issues = [];
            const flow = AppState.unitFlow;
            (flow?.loops || []).forEach(loop => {
                FlowOverviewView.ensureOriginals(loop);
                this.checkLoopText(loop, issues);
                this.checkEntry(loop, issues);
                this.checkScenes(loop, issues);
                this.checkEvents(loop, issues);
                this.checkDoubts(loop, issues);
                this.checkExposes(loop, issues);
            });
            return issues;
        },

        addIssue(issues, loop, module, severity, message, detail, table, id, field, editModule) {
            issues.push({
                severity,
                module,
                loopId: loop?.id || '',
                loopTitle: loop?.title || '',
                message,
                detail: detail || '',
                table: table || 'ChapterConfig',
                id: id || loop?.chapterId || '',
                field: field || '',
                editModule: editModule || module,
            });
        },

        checkLoopText(loop, issues) {
            if (!loop.title) this.addIssue(issues, loop, 'loopText', 'warn', 'Loop 标题未配置', 'ChapterConfig.chapterTitle[0] 为空。', 'ChapterConfig', loop.chapterId, 'chapterTitle');
            if (!loop.goal) this.addIssue(issues, loop, 'loopText', 'error', '循环目标未配置', '玩家进入本 Loop 后缺少明确目标文本。', 'ChapterConfig', loop.chapterId, 'chapterGoal');
            if (!loop.brief) this.addIssue(issues, loop, 'loopText', 'warn', 'Loop 简述未配置', '一级流程总览会缺少本 Loop 的剧情摘要。', 'ChapterConfig', loop.chapterId, 'chapterBrief');
        },

        checkEntry(loop, issues) {
            if (!loop.initTalk) {
                this.addIssue(issues, loop, 'entry', 'error', '开篇 Talk 未配置', 'ChapterConfig.initTalk 为空，Loop 开头没有入口对白。', 'ChapterConfig', loop.chapterId, 'initTalk');
            }
            if (!loop.initScene) {
                this.addIssue(issues, loop, 'entry', 'error', '初始场景未配置', 'ChapterConfig.initScene 为空，进入 Loop 后无法定位主场景。', 'ChapterConfig', loop.chapterId, 'initScene');
                return;
            }
            const scene = AppState.scenesMap.get(String(loop.initScene));
            if (!scene) {
                this.addIssue(issues, loop, 'entry', 'error', `初始场景不存在：${this.readableScene(loop.initScene)}`, 'SceneConfig 中找不到该 sceneId。', 'ChapterConfig', loop.chapterId, 'initScene');
                return;
            }
            if (Number(scene.loop) !== Number(loop.loop)) {
                this.addIssue(issues, loop, 'entry', 'warn', `初始场景不属于当前 Loop：${this.readableScene(loop.initScene)}`, `SceneConfig.loop=${scene.loop || '空'}，当前是 L${loop.loop}。`, 'SceneConfig', loop.initScene, 'loop');
            }
            const opened = (loop.scenes || []).some(s => String(s.id) === String(loop.initScene));
            if (!opened) {
                this.addIssue(issues, loop, 'entry', 'warn', `初始场景不在开放场景列表：${this.readableScene(loop.initScene)}`, '玩家可能能进入场景，但流程总览和开放场景配置不一致。', 'ChapterConfig', loop.chapterId, 'initScene', 'scenes');
            }
        },

        checkScenes(loop, issues) {
            const scenes = loop.scenes || [];
            if (!scenes.length) {
                this.addIssue(issues, loop, 'scenes', 'error', '没有开放场景', 'SceneConfig 中没有该 Loop 的 isOpen 场景。', 'SceneConfig', '', 'isOpen');
                return;
            }
            scenes.forEach(s => {
                const scene = AppState.scenesMap.get(String(s.id));
                if (!scene) {
                    this.addIssue(issues, loop, 'scenes', 'error', `开放场景不存在：${this.readableScene(s.id)}`, 'UnitFlow 中出现了 SceneConfig 找不到的场景。', 'SceneConfig', s.id, 'sceneId');
                    return;
                }
                if (Number(scene.loop) !== Number(loop.loop)) {
                    this.addIssue(issues, loop, 'scenes', 'warn', `场景 loop 归属不一致：${this.readableScene(s.id)}`, `SceneConfig.loop=${scene.loop || '空'}，当前展示在 L${loop.loop}。`, 'SceneConfig', s.id, 'loop');
                }
                if (!s.kind || s.kind === 'unknown') {
                    this.addIssue(issues, loop, 'scenes', 'warn', `场景缺少底图类型：${this.readableScene(s.id)}`, 'ArtAssetConfig.sceneKind 未识别，流程页无法判断探索/对白底图。', 'ArtAssetConfig', scene.backgroundImage || '', 'sceneKind');
                }
            });
        },

        checkEvents(loop, issues) {
            if (loop.id !== AppState.currentLoop) return;
            const events = FlowOverviewView.talkEventsForLoop(loop);
            events.forEach(talk => {
                const script = String(talk.script || '').trim().toLowerCase();
                const p0 = talk.Parameters?.[0] || {};
                const p1 = talk.Parameters?.[1] || {};
                if (script === 'new_npc_in' && (!p0.ParameterInt || String(p0.ParameterInt) === '0')) {
                    this.addIssue(issues, loop, 'events', 'error', `new_npc_in 缺少 NPCLoopData：${this.readableTalk(talk.id)}`, 'Parameters[0].ParameterInt 应为 NPCLoopData 表 ID。', 'Talk新增表', talk.id, 'Parameters[0].ParameterInt', 'events');
                }
                if (script === 'npc_out' && (!p0.ParameterInt || String(p0.ParameterInt) === '0')) {
                    this.addIssue(issues, loop, 'events', 'error', `npc_out 缺少 NPC：${this.readableTalk(talk.id)}`, 'Parameters[0].ParameterInt 应为 NPC id。', 'Talk新增表', talk.id, 'Parameters[0].ParameterInt', 'events');
                }
                if (script === 'exhibit') {
                    if (!p0.ParameterInt || String(p0.ParameterInt) === '0') {
                        this.addIssue(issues, loop, 'events', 'error', `exhibit 缺少展示物品：${this.readableTalk(talk.id)}`, 'Parameters[0].ParameterInt 应为要展示的物品 ID。', 'Talk新增表', talk.id, 'Parameters[0].ParameterInt', 'events');
                    }
                    if (!p1.ParameterInt || String(p1.ParameterInt) === '0') {
                        this.addIssue(issues, loop, 'events', 'warn', `exhibit 缺少展示档位：${this.readableTalk(talk.id)}`, 'Parameters[1].ParameterInt 建议配置 1/2/3。', 'Talk新增表', talk.id, 'Parameters[1].ParameterInt', 'events');
                    }
                }
                if (!talk.next && !['end', 'branches', '1'].includes(script)) {
                    this.addIssue(issues, loop, 'events', 'warn', `Talk 没有 next：${this.readableTalk(talk.id)}`, '如果不是结束或分支节点，可能会导致对白链断开。', 'Talk新增表', talk.id, 'next', 'events');
                }
            });
        },

        checkDoubts(loop, issues) {
            (loop.doubts || []).forEach(d => {
                const doubtLabel = this.readableDoubt(d);
                if (!d.text) {
                    this.addIssue(issues, loop, 'doubts', 'warn', `${doubtLabel} 缺少文本`, 'DoubtConfig/ChapterConfig 中的疑点展示文本为空。', 'ChapterConfig', loop.chapterId, `doubts[id=${d.id}].text`);
                }
                if (!d.conditions || d.conditions.length === 0) {
                    this.addIssue(issues, loop, 'doubts', 'warn', `${doubtLabel} 没有前置依赖`, '玩家可能不收集关键材料也能推进疑点。', 'ChapterConfig', loop.chapterId, `doubts[id=${d.id}].condition`);
                }
                (d.conditions || []).forEach((c, idx) => {
                    const dep = FlowOverviewView.resolveDependency(c.type, c.param, loop.loop);
                    const depLabel = this.readableDependency(c.type, c.param, loop);
                    if (dep.status === 'missing') {
                        this.addIssue(issues, loop, 'doubts', 'error', `${doubtLabel} 的依赖未找到`, depLabel, 'ChapterConfig', loop.chapterId, `doubts[id=${d.id}].condition[${idx}]`);
                    } else if (dep.status === 'future') {
                        this.addIssue(issues, loop, 'doubts', 'error', `${doubtLabel} 使用未来依赖`, depLabel, 'ChapterConfig', loop.chapterId, `doubts[id=${d.id}].condition[${idx}]`);
                    }
                    this.checkDependencyType(loop, issues, d, c, idx);
                });
            });
        },

        checkDependencyType(loop, issues, doubt, condition, idx) {
            const typ = String(condition.type || '');
            const pid = String(condition.param || '');
            const testimony = AppState.allTestimonies.find(t => String(t.id) === pid);
            if (!testimony) return;
            const doubtLabel = this.readableDoubt(doubt);
            const materialLabel = this.readableMaterial(pid, loop);
            if (typ === '3' && !FlowOverviewView.isTimelineTestimony(testimony)) {
                this.addIssue(issues, loop, 'doubts', 'error', `${doubtLabel} 把非时间线证词配置成时间线`, `${materialLabel}；没有有效 Timeline triggerParam。`, 'ChapterConfig', loop.chapterId, `doubts[id=${doubt.id}].condition[${idx}]`);
            }
            if (typ === '4' && FlowOverviewView.isTimelineTestimony(testimony)) {
                this.addIssue(issues, loop, 'doubts', 'warn', `${doubtLabel} 的证词类型可疑`, `${materialLabel}；这是时间线证词，当前条件类型写成普通证词。`, 'ChapterConfig', loop.chapterId, `doubts[id=${doubt.id}].condition[${idx}]`);
            }
            if (typ === '4' && FlowOverviewView.isRelationTestimony(testimony)) {
                this.addIssue(issues, loop, 'doubts', 'warn', `${doubtLabel} 的证词类型可疑`, `${materialLabel}；这是关系证词，当前条件类型写成普通证词。`, 'ChapterConfig', loop.chapterId, `doubts[id=${doubt.id}].condition[${idx}]`);
            }
        },

        checkExposes(loop, issues) {
            (loop.exposes || []).forEach(e => {
                if (!e.talkId) {
                    this.addIssue(issues, loop, 'exposes', 'error', `指证第 ${e.id || '?'} 轮缺少 Talk`, 'ChapterConfig.exposes.talkId 为空。', 'ChapterConfig', loop.chapterId, 'exposes.talkId');
                }
                if (e.testimony && String(e.testimony) !== '0') {
                    const target = FlowOverviewView.resolveExposeMaterial(e.testimony, loop.loop);
                    if (target.status === 'missing') {
                        this.addIssue(issues, loop, 'exposes', 'error', `指证第 ${e.id || '?'} 轮被攻击证词不存在`, this.readableMaterial(e.testimony, loop), 'ChapterConfig', loop.chapterId, 'exposes.testimony');
                    } else if (target.status === 'future') {
                        this.addIssue(issues, loop, 'exposes', 'error', `指证第 ${e.id || '?'} 轮攻击了未来证词`, this.readableMaterial(e.testimony, loop), 'ChapterConfig', loop.chapterId, 'exposes.testimony');
                    }
                }
                if (!e.items || e.items.length === 0) {
                    this.addIssue(issues, loop, 'exposes', 'warn', `指证第 ${e.id || '?'} 轮没有材料`, 'ChapterConfig.exposes.item 为空，玩家可能无法完成本轮指证。', 'ChapterConfig', loop.chapterId, 'exposes.item');
                }
                (e.items || []).forEach((item, idx) => {
                    const mid = item.id || item;
                    const material = FlowOverviewView.resolveExposeMaterial(mid, loop.loop);
                    if (material.status === 'missing') {
                        this.addIssue(issues, loop, 'exposes', 'error', `指证第 ${e.id || '?'} 轮材料未找到`, `${this.readableMaterial(mid, loop)}；既不是有效道具，也不是有效证词。`, 'ChapterConfig', loop.chapterId, `exposes[id=${e.id}].item[${idx}]`);
                    } else if (material.status === 'future') {
                        this.addIssue(issues, loop, 'exposes', 'error', `指证第 ${e.id || '?'} 轮材料来自未来`, this.readableMaterial(mid, loop), 'ChapterConfig', loop.chapterId, `exposes[id=${e.id}].item[${idx}]`);
                    }
                });
            });
        },

        async focusLoop(loopId) {
            const sel = document.getElementById('loopSelect');
            if (sel) sel.value = loopId;
            if (GameController?.load) await GameController.load();
            this.render();

            html += `<div class="art-tab ${this.currentTab === 'npc' ? 'active' : ''}" onclick="ArtOverviewView.switchTab('npc')">

        // ---- Scene dedup helper: merge scenes by sceneNameEn ----
        _mergeScenes(allScenes) {
            const map = new Map(); // sceneNameEn → merged object
            allScenes.forEach(s => {
                const key = s.sceneNameEn || s.sceneName || String(s.sceneId);
                if (!map.has(key)) {
                    map.set(key, {
                        key,
                        sceneName: s.sceneName || '',
                        sceneNameEn: s.sceneNameEn || '',
                        backgroundImage: s.backgroundImage || '',
                        ArtRequirement: s.ArtRequirement || '',
                        loops: [],
                        npcMap: new Map() // npcNameEn → { info, resPathSet }
                    });
                }
                const m = map.get(key);
                // Collect loop number from sceneId (2nd digit)
                const loopNum = String(s.sceneId).length >= 2 ? String(s.sceneId)[1] : '?';
                if (!m.loops.includes(loopNum)) m.loops.push(loopNum);
                // Merge ArtRequirement (take first non-empty)
                if (!m.ArtRequirement && s.ArtRequirement) m.ArtRequirement = s.ArtRequirement;
                // Merge NPCInfos
                (s.NPCInfos || []).forEach(info => {
                    const npcKey = info.NPC?.Name?.[1] || cn(info.NPC?.Name) || String(info.id);
                    if (!m.npcMap.has(npcKey)) {
                        m.npcMap.set(npcKey, {
                            info,
                            resPaths: new Set(),
                            ArtRequirement: info.ArtRequirement || ''
                        });
                    }
                    const npcEntry = m.npcMap.get(npcKey);
                    if (info.ResPath) npcEntry.resPaths.add(info.ResPath.split('\\').pop());
                    if (info.ClickResPath) npcEntry.resPaths.add(info.ClickResPath.split('\\').pop());
                    if (!npcEntry.ArtRequirement && info.ArtRequirement) npcEntry.ArtRequirement = info.ArtRequirement;
                });
            });
            return Array.from(map.values());
        },

        artScenesForChapter(chapter) {
            const unitPrefix = String(AppState.currentUnit || '').replace(/[^\d]/g, '') || (chapter === 'EPI02' ? '2' : '1');
            return AppState.allScenes
                .filter(s => String(s.sceneId || '').startsWith(unitPrefix) || String(s.backgroundImage || '').includes(chapter))
                .sort((a, b) => Number(a.loop || 0) - Number(b.loop || 0) || String(a.sceneId || '').localeCompare(String(b.sceneId || '')));
        },

        assetRowsForChapter(sceneAssets, chapter) {
            const scenes = this.artScenesForChapter(chapter);
            const rows = sceneAssets.map(asset => {
                const assetId = String(asset.id || '');
                const usedScenes = scenes.filter(scene => String(scene.backgroundImage || scene.location?.backgroundImage || '') === assetId);
                return {
                    asset,
                    scenes: usedScenes,
                    evidenceItems: this.isExploreAsset(asset) ? this.uniqueItemsFromScenes(usedScenes) : [],
                };
            });
            const registered = new Set(sceneAssets.map(asset => String(asset.id || '')));
            const missingAssetRows = [];
            const missingMap = new Map();
            scenes.forEach(scene => {
                const bg = String(scene.backgroundImage || scene.location?.backgroundImage || '');
                if (!bg || registered.has(bg)) return;
                if (!missingMap.has(bg)) {
                    missingMap.set(bg, {
                        asset: {
                            id: bg,
                            displayName: bg.split('\\').pop(),
                            Name: '未登记底图',
                            sceneKind: DataManager.sceneKind(scene) || '',
                            ArtRequirement: '',
                            _missingAsset: true,
                        },
                        scenes: [],
                        evidenceItems: [],
                    });
                }
                missingMap.get(bg).scenes.push(scene);
            });
            missingMap.forEach(row => {
                row.evidenceItems = this.isExploreAsset(row.asset) ? this.uniqueItemsFromScenes(row.scenes) : [];
                missingAssetRows.push(row);
            });
            return rows.concat(missingAssetRows).sort((a, b) => {
                const ak = this.assetKind(a.asset);
                const bk = this.assetKind(b.asset);
                if (ak !== bk) return ak.localeCompare(bk);
                return String(a.asset.displayName || a.asset.id || '').localeCompare(String(b.asset.displayName || b.asset.id || ''));
            });
        },

        assetForScene(scene) {
            const bg = scene?.backgroundImage || scene?.location?.backgroundImage || '';
            return AppState.artAssetMap.get(String(bg)) || null;
        },

        assetKind(asset) {
            return String(asset?.sceneKind || '').toLowerCase() || 'unknown';
        },

        isExploreAsset(asset) {
            return this.assetKind(asset) === 'explore';
        },

        sceneKindForArt(scene) {
            return DataManager.sceneKind(scene) || this.assetForScene(scene)?.sceneKind || '';
        },

        isExploreScene(scene) {
            return String(this.sceneKindForArt(scene)).toLowerCase() === 'explore';
        },

        uniqueItemsFromScenes(scenes) {
            const byId = new Map();
            scenes.forEach(scene => {
                DataManager.sceneEvidence(scene.sceneId).forEach(item => byId.set(String(item.id), item));
            });
            return Array.from(byId.values()).sort((a, b) => Number(a.id || 0) - Number(b.id || 0));
        },

        boundExploreItemIds(assetRows) {
            const ids = new Set();
            assetRows.filter(row => this.isExploreAsset(row.asset)).forEach(row => {
                row.evidenceItems.forEach(item => ids.add(String(item.id)));
            });
            return ids;
        },

        sceneEvidenceStats(chapter, items, sceneAssets) {
            const assetRows = this.assetRowsForChapter(sceneAssets, chapter);
            const boundIds = this.boundExploreItemIds(assetRows);
            const boundItems = new Map();
            assetRows.filter(row => this.isExploreAsset(row.asset)).forEach(row => {
                row.evidenceItems.forEach(item => boundItems.set(String(item.id), item));
            });
            const sceneMissing = assetRows.filter(row => !row.asset?.ArtRequirement).length;
            const itemMissing = new Map([...Array.from(boundItems.entries()), ...items.filter(i => !boundIds.has(String(i.id))).map(i => [String(i.id), i])]);
            return {
                total: assetRows.length + items.length,
                missing: sceneMissing + Array.from(itemMissing.values()).filter(i => !i.ArtRequirement).length,
            };
        },

        itemMatchesArtFilter(item, q) {
            if (!q) return true;
            return String(item.id || '').includes(q)
                || DataManager.itemName(item).toLowerCase().includes(q)
                || DataManager.itemDesc(item).toLowerCase().includes(q)
                || DataManager.itemLocation(item).toLowerCase().includes(q)
                || (item.ArtRequirement || '').toLowerCase().includes(q);
        },

        assetRowMatchesArtFilter(row, q) {
            if (!q) return true;
            const asset = row.asset || {};
            const bgName = asset.displayName || (asset.id || '').split('\\').pop();
            return (asset.Name || '').toLowerCase().includes(q)
                || (bgName || '').toLowerCase().includes(q)
                || (asset.ArtRequirement || '').toLowerCase().includes(q)
                || (asset.id || '').toLowerCase().includes(q)
                || row.scenes.some(scene =>
                    String(scene.sceneId || '').includes(q)
                    || (scene.sceneName || '').toLowerCase().includes(q)
                    || (scene.sceneNameEn || '').toLowerCase().includes(q)
                )
                || row.evidenceItems.some(item => this.itemMatchesArtFilter(item, q));
        },

        renderArtRequirementBox(text, emptyText = '未填写') {
            const hasText = String(text || '').trim();
            return `<div class="art-req-box ${hasText ? '' : 'empty'}">${hasText ? escapeHtmlWithBr(text) : escapeHtml(emptyText)}</div>`;

        renderNpcMounts(mounts) {
            if (!mounts.length) {
                return `<div class="flow-list-sub">无 NPC 挂载</div>`;
            }
            return `
                <div class="art-npc-mount-list">

                            : `<span class="art-npc-mount-empty">默认立绘未填</span>`;

                            ? `<span class="copy-tag" onclick="event.stopPropagation(); copyText('${escapeHtml(m.clickResName)}', this)">点击态 · ${escapeHtml(m.clickResName)}</span>`

                            <div class="art-npc-mount-row">

        renderSceneArtCard(row) {
            const asset = row.asset;
            const kind = this.assetKind(asset) || 'unknown';
            const isExplore = kind === 'explore';
            const bgName = asset?.displayName || (asset?.id || '').split('\\').pop();

                ? row.scenes.map(scene => `${scene.sceneName || `场景 ${scene.sceneId}`}（${scene.sceneId} / L${scene.loop || '?'}）`).join('；')

            const artBrief = asset?.ArtRequirement ? '底图需求已填' : '底图需求未填';
            const kindLabel = isExplore ? '探索场景底图' : (kind === 'dialogue' ? '对话场景底图' : '未分类底图');
            return `
                <article class="art-scene-card ${kind === 'dialogue' ? 'dialogue' : ''} ${expanded ? 'expanded' : 'collapsed'}">
                    <div class="art-scene-head">
                        <div>
                            <div class="art-scene-title">${escapeHtml(asset?.Name || bgName || '未命名底图')}${asset?._missingAsset ? ' · 未登记' : ''}</div>
                            <div class="art-scene-meta">

                    <div class="art-scene-body">

                        </div>

        renderUnboundEvidenceBlock(items) {
            return `
                <section class="art-unbound-block">
                    <div class="art-scene-section-title">未绑定探索场景的证据需求 · ${items.length}</div>
                    <div class="art-scene-meta" style="margin-bottom:0.65rem;">这些证据/道具没有挂到任何探索场景的 SceneConfig.ItemIDs 下，可能是背包、分析、NPC 给予、指证专用，或还没配置场景归属。</div>
                    ${this.renderArtEvidenceRows(items, '没有未绑定探索场景的证据需求。')}
                </section>
            `;
        },

        assetRowKey(row) {
            return btoa(unescape(encodeURIComponent(String(row?.asset?.id || row?.asset?.displayName || row?.asset?.Name || 'unknown'))))
                .replace(/=+$/g, '');
        },

        toggleAssetExpanded(assetKey) {
            const key = String(assetKey || '');
            if (!key) return;
            if (this.expandedAssets.has(key)) this.expandedAssets.delete(key);
            else this.expandedAssets.add(key);
            this.render();
        },

        // ---- Scene Tab ----（场景优先：探索场景下挂证据，对话场景不挂证据）
        renderSceneTab(sceneAssets, allItems, chapter) {
            UI._artByFile = {};
            sceneAssets.forEach(a => { UI._artByFile[a.displayName || (a.id || '').split('\\').pop()] = a; });

            const assetRowsAll = this.assetRowsForChapter(sceneAssets, chapter);
            const q = (this.filterText || '').toLowerCase();
            const boundIds = this.boundExploreItemIds(assetRowsAll);
            const unboundAll = allItems
                .filter(item => !boundIds.has(String(item.id)))
                .sort((a, b) => Number(a.id || 0) - Number(b.id || 0));

            const assetRows = assetRowsAll.filter(row => {
                if (!this.assetRowMatchesArtFilter(row, q)) return false;
                if (!this.showOnlyNoArt) return true;
                return !row.asset?.ArtRequirement || row.evidenceItems.some(item => !item.ArtRequirement);
            });

            let unboundItems = unboundAll.filter(item => this.itemMatchesArtFilter(item, q));
            if (this.showOnlyNoArt) unboundItems = unboundItems.filter(item => !item.ArtRequirement);

            const shownEvidenceCount = assetRows.reduce((sum, row) => sum + row.evidenceItems.length, 0) + unboundItems.length;
            const missingCount = assetRows.filter(row => !row.asset?.ArtRequirement).length
                + assetRows.reduce((sum, row) => sum + row.evidenceItems.filter(item => !item.ArtRequirement).length, 0)
                + unboundItems.filter(item => !item.ArtRequirement).length;

            let html = `
                <div class="filter-bar">
                    <label>搜索：</label>
                    <input type="text" id="filterInput" placeholder="场景 / 底图 / 证据 / 道具 / 美术需求..."
                           value="${escapeHtml(this.filterText)}"
                           oninput="ArtOverviewView.onFilter(this.value)">
                    <button class="btn ${this.showOnlyNoArt ? 'active' : ''}"
                            onclick="ArtOverviewView.toggleNoArt()">
                        仅未填美术需求
                    </button>
                    ${this.filterText ? `<button class="btn" onclick="ArtOverviewView.clearFilter()">清除筛选</button>` : ''}
                    <span class="stats">
                        显示 ${assetRows.length} 张底图 · ${shownEvidenceCount} 条证据/道具 |
                        <span class="no-art">未填 ${missingCount}</span>
                    </span>
                </div>
            `;

            if (!assetRows.length && !unboundItems.length) {
                return html + `<p style="text-align:center; color:var(--text-muted); padding:2rem;">没有匹配的底图或证据需求。</p>`;
            }

            const groups = [
                { key: 'explore', label: '探索底图 · 证据跟随底图', rows: assetRows.filter(row => this.isExploreAsset(row.asset)) },
                { key: 'dialogue', label: '对话底图 · 不配置证据', rows: assetRows.filter(row => this.assetKind(row.asset) === 'dialogue') },
                { key: 'unknown', label: '未分类底图', rows: assetRows.filter(row => !['explore', 'dialogue'].includes(this.assetKind(row.asset))) },
            ];

            groups.forEach(group => {
                if (!group.rows.length) return;
                html += `<div style="margin:1.4rem 0 0.6rem; padding:0.5rem 0.8rem; font-size:1.15rem; font-weight:800; color:var(--highlight); border-left:5px solid var(--highlight); border-bottom:1px solid rgba(232,198,120,0.35); background:rgba(232,198,120,0.06);">${escapeHtml(group.label)} <span style="font-size:0.86rem; color:var(--text-muted);">(${group.rows.length})</span></div>`;
                html += `<div class="art-scene-list">${group.rows.map(row => this.renderSceneArtCard(row)).join('')}</div>`;
            });

            html += this.renderUnboundEvidenceBlock(unboundItems);
            return html;
        },

        // ---- Shared filter methods ----
        onFilter(text) {
            this.filterText = text;
            this.render();
        },

        clearFilter() {
            this.filterText = '';
            this.showOnlyNoArt = false;
            this.render();
        },

        toggleNoArt() {
            this.showOnlyNoArt = !this.showOnlyNoArt;
            this.render();
        },

        filterByLocation(loc) {
            this.filterText = loc;
            this.render();
            const input = document.getElementById('filterInput');
            if (input) input.value = loc;
        }
    };

    // ===== Flow View =====
    const FlowView = {
        openingBriefText(value) {
            if (!value) return '';
            if (Array.isArray(value)) return value[0] || '';
            if (typeof value === 'object') return value.cn || value.zh || value.text || '';
            return String(value);
        },

        resolveOpeningItems(loop) {
            if (Array.isArray(loop?.opening) && loop.opening.length > 0) return loop.opening;

            const chapter = DataManager.getChapterConfig(AppState.currentUnit, AppState.currentLoop);
            const initTalk = String(loop?.initTalk || chapter?.initTalk || '').trim();
            const initScene = String(loop?.initScene || chapter?.initScene || '').trim();
            if (!initTalk && !initScene) return [];

            const talk = initTalk ? DataManager.getTalk(initTalk) : null;
            const talkFile = talk?.videoScene || '';
            const purpose = this.openingBriefText(chapter?.openingBrief)
                || this.openingBriefText(talk?.openingBrief)
                || this.openingBriefText(loop?.openingBrief)
                || this.openingBriefText(chapter?.chapterBrief)
                || loop?.brief
                || '';

            return [{
                id: initScene,
                talk: talkFile,
                firstId: initTalk,
                purpose,
                _source: 'ChapterConfig.initTalk'
            }];
        },

        showScene(sceneId, autoPlayTalkId) {
            AppState.previousPhase = AppState.currentPhase || 'opening';
            AppState.currentPhase = 'scene';
            AppState.currentSceneId = sceneId;
            if (typeof DoubtView !== 'undefined') DoubtView.refreshEntry();

            const scene = DataManager.getScene(sceneId);
            if (!scene) {
                document.getElementById('content').innerHTML =
                    `<p style="color:var(--text-muted)">场景 ${escapeHtml(sceneId)} 在 SceneConfig 中未找到</p>`;
                UI.renderSidebar();
                return;
            }

            const bgUrl = Config.getAssetUrl(scene.backgroundImage);
            const evidenceItems = DataManager.sceneEvidence(sceneId);
            const npcInfos = scene.NPCInfos || [];
            const otherItems = DataManager.sceneOtherItems(sceneId);

            // Game reference resolution for NPC positioning
            const REF_W = 2560, REF_H = 1440;

            const noteTag = scene.note
                ? `<span style="display:inline-block; padding:0.1rem 0.4rem; border-radius:3px; font-size:0.75rem; margin-left:0.5rem; background:${scene.note === '晚上' ? '#1a237e' : '#e8a735'}; color:${scene.note === '晚上' ? '#90caf9' : '#3e2723'};">${escapeHtml(scene.note)}</span>`
                : '';
            const prevPhase = AppState.previousPhase || 'opening';
            const backLabel = prevPhase === 'expose' ? '← 返回指证阶段' : prevPhase === 'ending' ? '← 返回结尾阶段' : prevPhase === 'events' ? '← 返回突发事件' : prevPhase === 'free' ? '← 返回自由探索' : '← 返回开篇阶段';
            // Check if this is an opening/ending scene
            const loopRef = AppState.loopData;
            let openingMeta = null;
            if (loopRef?.opening) {
                openingMeta = loopRef.opening.find(item =>
                    String(typeof item === 'object' ? item.id : item) === String(sceneId)
                );
                if (openingMeta && typeof openingMeta !== 'object') openingMeta = null;
            }
            if (!openingMeta) {
                openingMeta = this.resolveOpeningItems(loopRef).find(item =>
                    String(item?.id || '') === String(sceneId)
                ) || null;
            }

            let html = `
                <div style="margin-bottom:0.5rem;">
                    <button class="btn" onclick="FlowView.showPhase('${prevPhase}')" style="font-size:0.8rem; padding:0.2rem 0.6rem;">${backLabel}</button>
                </div>
                <div class="scene-title">
                    ${escapeHtml(scene.sceneName)}
                    <span style="color:var(--text-muted); font-size:0.85rem;"> (${scene.sceneId})</span>
                    ${noteTag}
                </div>
            `;

            // Display backgroundImage asset path if available
            if (scene.backgroundImage) {
                const bgName = scene.backgroundImage.split('\\').pop();
                html += `<div style="margin:0.3rem 0 0.5rem; display:flex; align-items:center; gap:0.5rem;">
                    <span style="color:var(--text-muted); font-size:0.8rem;">背景美术:</span>
                    <span class="copy-tag" onclick="copyText('${escapeHtml(bgName)}', this)" style="font-size:0.8rem;">🎨 ${escapeHtml(bgName)}</span>
                    <span style="color:var(--text-muted); font-size:0.7rem;">${escapeHtml(scene.backgroundImage)}</span>
                </div>`;
            }

            // Opening scene: show characters, purpose, talk files inline
            if (openingMeta) {
                if (openingMeta.characters?.length) {
                    html += `<div style="display:flex; flex-wrap:wrap; gap:0.4rem; margin:0.5rem 0;">`;
                    openingMeta.characters.forEach(name => {
                        html += `<span style="background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:0.2rem 0.5rem; font-size:0.85rem;">${escapeHtml(name)}</span>`;
                    });
                    html += `</div>`;
                }
                if (openingMeta.purpose) {
                    html += `<p style="margin:0.5rem 0; color:var(--text-secondary);">${escapeHtml(openingMeta.purpose)}</p>`;
                }
                if (openingMeta.talk) {
                    const fileName = openingMeta.talk;
                    const entries = DataManager.talkEntriesByScene(fileName);
                    const firstId = openingMeta.firstId || (entries.length > 0 ? entries[0].id : '');
                    html += `<div style="display:flex; align-items:center; gap:0.75rem; margin:0.5rem 0; flex-wrap:wrap;">`;
                    html += `<span class="copy-tag" onclick="copyText('${escapeHtml(fileName)}', this)">📄 ${escapeHtml(fileName)}.json</span>`;
                    if (entries.length > 0) {
                        html += `<span style="color:var(--text-muted); font-size:0.8rem;">${entries.length} 句 | 首句: ${firstId}</span>`;
                    } else {
                        html += `<span style="color:var(--warning); font-size:0.8rem;">(未加载)</span>`;
                    }
                    html += `</div>`;
                    if (firstId) {
                        html += `
                            <button type="button" class="flow-opening-play-card" onclick="DialogController.startFromTalkId('${firstId}')">
                                <span>
                                    <span class="flow-opening-play-title">播放开篇对白</span>
                                    <span class="flow-opening-play-meta">${escapeHtml(scene.sceneName)} · ${escapeHtml(fileName)}.json · 首句 #${escapeHtml(firstId)} · ${entries.length || 1} 句</span>
                                </span>
                                <span class="flow-opening-play-action">打开</span>
                            </button>
                        `;
                    }
                }
            }

            // Scene container: background + NPC sprites overlay + dialog target
            html += `<div class="scene-container"${bgUrl ? '' : ' style="min-height:280px;"'}>`;
            if (bgUrl) {
                html += `<img class="scene-bg" src="${bgUrl}" onerror="this.style.display='none';" alt="">`;
            }

            // 所有 NPC 都在场景里占位 —— 无坐标的自动按"缺失"数量在场景底部 40% 区域等距散布
            // 效果:像原型一样,每个人都有一个大砖红占位框贴在场景上,一眼看清"这里少个人"
            const totalNoPos = npcInfos.filter(i => !(parseFloat(i.PosX) > 0 || parseFloat(i.Posy) > 0)).length;
            let autoIdx = 0;
            npcInfos.forEach((info, npcIdx) => {
                const resA = info.ResPath ? Config.getAssetUrl(info.ResPath) : '';
                const npcName = info.NPC?.Name?.[1] || cn(info.NPC?.Name) || '?';
                const px = parseFloat(info.PosX) || 0;
                const py = parseFloat(info.Posy) || 0;
                const hasPos = (px > 0 || py > 0);

                let leftPct, topPct;
                if (hasPos) {
                    leftPct = (px / REF_W * 100).toFixed(1);
                    topPct  = (py / REF_H * 100).toFixed(1);
                } else {
                    // 自动散布:占场景宽度 70%,垂直位置 65%(大致在人物中线高度)
                    const span = 70;
                    const start = 50 - span / 2;
                    const i = autoIdx++;
                    leftPct = totalNoPos > 1 ? (start + (span / (totalNoPos - 1)) * i).toFixed(1) : 50;
                    topPct = 65;
                }

                if (resA) {
                    // 图片可能 404(艺术资源未交付) —— onerror 要用 figure-miss 红框替换 <img>,而不是简单移除
                    html += `
                        <div class="npc-on-scene${hasPos ? '' : ' auto-placed'}" style="left:${leftPct}%; top:${topPct}%;"
                             onclick="UI.showNpcDrawerBySceneIdx(${npcIdx})">
                            <img src="${resA}" onerror="var p=this.parentElement; p.classList.add('missing'); var d=document.createElement('div'); d.className='npc-figure-miss'; d.textContent='?'; this.replaceWith(d);" alt="">
                            <div class="npc-label">${escapeHtml(npcName)}</div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="npc-on-scene missing${hasPos ? '' : ' auto-placed'}" style="left:${leftPct}%; top:${topPct}%;"
                             title="${hasPos ? '缺立绘资源' : '缺立绘 · 无坐标'}"
                             onclick="UI.showNpcDrawerBySceneIdx(${npcIdx})">
                            <div class="npc-figure-miss">?</div>
                            <div class="npc-label">${escapeHtml(npcName)}</div>
                        </div>
                    `;
                }
            });

            html += `</div>`;

            // Opening scene metadata — handled inline in title block below

            // NPC info (click NPC on scene or buttons below to start dialogue)
            if (npcInfos.length > 0) {
                html += `<div class="section-title">NPC (${npcInfos.length}) — 点击场景中的人物或下方按钮开始对话</div>`;
                npcInfos.forEach((info, npcIdx) => {
                    const npcName = info.NPC?.Name?.[1] || cn(info.NPC?.Name) || info.NPC?.id || '?';
                    const talkResolved = DataManager.resolveNpcTalkEntry(info.TalkInfo, info.NPC?.id, { label: 'TalkInfo' });
                    const loopTalkResolved = DataManager.resolveNpcTalkEntry(info.LoopTalkInfo, info.NPC?.id, { label: 'LoopTalkInfo', allowFallback: false });
                    const talkId = talkResolved.ok ? talkResolved.id : '';
                    const loopTalkId = loopTalkResolved.ok ? loopTalkResolved.id : '';
                    const hasStateB = !!info.ClickResPath;

                    html += `<div class="npc-card">`;
                    html += `<div style="display:flex; align-items:center; gap:1rem;">`;
                    html += `<div>`;
                    html += `<span class="npc-name">${escapeHtml(npcName)}</span>`;
                    html += `<div class="npc-meta">位置: (${info.PosX || '?'}, ${info.Posy || '?'})${hasStateB ? ' | <span style="color:var(--highlight)">有状态B立绘</span>' : ''}</div>`;
                    html += `</div>`;
                    html += `<div style="display:flex; gap:0.5rem; margin-left:auto;">`;
                    if (talkId) {
                        html += `<button class="btn" onclick="UI.showNpcDrawerBySceneIdx(${npcIdx})">首次对话 (${talkId})</button>`;
                    }
                    if (loopTalkId && loopTalkId !== talkId) {
                        html += `<button class="btn" onclick="UI.showNpcDrawerBySceneIdx(${npcIdx})">重复对话 (${loopTalkId})</button>`;
                    }
                    if (!talkId && !loopTalkId) {
                        const msg = talkResolved.message || loopTalkResolved.message || '无对话';
                        html += `<span style="color:var(--text-muted); font-size:0.85rem;">${escapeHtml(msg)}</span>`;
                    }
                    html += `</div></div>`;

                    // Production spec area
                    const summary = talkId ? DataManager.getTalkSummary(talkId, sceneId) : '';
                    const npcKey = DataManager.extractNpcKey(info.ResPath);
                    const sceneNameEn = scene.sceneNameEn || '';

                    html += `<div class="prod-spec">`;
                    if (summary) {
                        html += `<div class="spec-summary">${escapeHtml(summary)}</div>`;
                    }
                    if (talkId) {
                        html += `<div class="spec-row"><span class="spec-label">Talk ID:</span><span class="copy-tag" onclick="copyText('${talkId}', this)">${talkId}</span></div>`;
                    }
                    // 立绘资源名（给美术看）—— 直接读 ResPath / ClickResPath 的文件名
                    if (info.ResPath || info.ClickResPath) {
                        html += `<div class="spec-row"><span class="spec-label">立绘:</span>`;
                        if (info.ResPath) {
                            const nameA = info.ResPath.split('\\').pop();
                            html += ` <span class="copy-tag" onclick="copyText('${nameA}', this)" title="默认态">${nameA}</span>`;
                        }
                        if (info.ClickResPath) {
                            const nameB = info.ClickResPath.split('\\').pop();
                            html += ` <span class="copy-tag" onclick="copyText('${nameB}', this)" title="点击态">${nameB}</span>`;
                        }
                        html += `</div>`;
                    }
                    html += `</div>`;

                    html += `</div>`;
                });
            }

            // YAML talks fallback — when SceneConfig has no NPCInfos but YAML lists talks for this scene
            if (npcInfos.length === 0 && loopRef?.scenes?.unlocked) {
                const yamlScenes = Object.values(loopRef.scenes.unlocked).flat();
                const yamlEntry = yamlScenes.find(s => s && typeof s === 'object' && String(s.id) === sceneId);
                const yamlTalks = yamlEntry?.talks || [];
                const yamlSuddenEvents = yamlEntry?.sudden_events || [];

                if (yamlTalks.length > 0) {
                    html += `<div class="section-title">对话</div>`;
                    yamlTalks.forEach(talkName => {
                        const entries = AppState.allTalks.filter(t => t.videoScene === talkName).sort((a, b) => Number(a.videoId || a.id) - Number(b.videoId || b.id));
                        const firstId = entries.length > 0 ? entries[0].id : '';
                        const loaded = entries.length > 0;
                        const sub = `${talkName}.json · ${entries.length} 句`;
                        const playAction = `UI.playTalkInDrawer('${firstId}', 'TALK', '${escapeHtml(talkName).replace(/'/g, '&apos;')}', '${escapeHtml(sub).replace(/'/g, '&apos;')}')`;
                        html += `<div class="phase-scene-talk" style="margin:0.5rem 0;">`;
                        html += `<span class="copy-asset" onclick="copyText('${escapeHtml(talkName)}', this)">
                            <span class="copy-asset-dot ${loaded ? 'ok' : 'miss'}"></span>
                            <span class="copy-asset-name">${escapeHtml(talkName)}.json</span>
                            <span class="copy-asset-ico">copy</span>
                        </span>`;
                        if (loaded) {
                            html += `<span class="talk-meta">${entries.length} 句 · 首句 <span class="talk-meta-id">#${firstId}</span></span>`;
                        } else {
                            html += `<span class="talk-meta miss">未加载</span>`;
                        }
                        if (firstId) {
                            html += `<button class="btn primary phase-play-btn" onclick="event.stopPropagation(); ${playAction}">▶ 播放</button>`;
                        }
                        html += `</div>`;
                    });
                }

                if (yamlSuddenEvents.length > 0) {
                    html += `<div class="section-title">⚡ 突发事件</div>`;
                    yamlSuddenEvents.forEach(se => {
                        const seStartId = se.start_id ? String(se.start_id) : '';
                        html += `<div style="margin:0.5rem 0; padding:0.6rem; background:var(--ink); border:1px solid var(--rule); border-radius:6px;">`;
                        html += `<div style="font-weight:600; color:var(--warning);">⚡ ${escapeHtml(se.name || '突发事件')}</div>`;
                        if (seStartId) {
                            const playAction = `UI.playTalkInDrawer('${seStartId}', 'EVENT', '${escapeHtml(se.name || '').replace(/'/g, '&apos;')}', '从 #${seStartId} 开始')`;
                            html += `<button class="btn primary" onclick="${playAction}" style="margin-top:0.4rem;">▶ 播放</button>`;
                        }
                        html += `</div>`;
                    });
                }
            }

            // Also show YAML talks for scenes WITH NPCInfos but where talks field adds extra files not covered by NPC
            if (npcInfos.length > 0 && loopRef?.scenes?.unlocked) {
                const yamlScenes = Object.values(loopRef.scenes.unlocked).flat();
                const yamlEntry = yamlScenes.find(s => s && typeof s === 'object' && String(s.id) === sceneId);
                const yamlSuddenEvents = yamlEntry?.sudden_events || [];
                if (yamlSuddenEvents.length > 0) {
                    html += `<div class="section-title">⚡ 突发事件</div>`;
                    yamlSuddenEvents.forEach(se => {
                        const seStartId = se.start_id ? String(se.start_id) : '';
                        html += `<div style="margin:0.5rem 0; padding:0.6rem; background:var(--ink); border:1px solid var(--rule); border-radius:6px;">`;
                        html += `<div style="font-weight:600; color:var(--warning);">⚡ ${escapeHtml(se.name || '突发事件')}</div>`;
                        if (seStartId) {
                            const playAction = `UI.playTalkInDrawer('${seStartId}', 'EVENT', '${escapeHtml(se.name || '').replace(/'/g, '&apos;')}', '从 #${seStartId} 开始')`;
                            html += `<button class="btn primary" onclick="${playAction}" style="margin-top:0.4rem;">▶ 播放</button>`;
                        }
                        html += `</div>`;
                    });
                }
            }

            // Evidence
            if (evidenceItems.length > 0) {
                html += `<div class="section-title">证据 / 道具 (${evidenceItems.length})</div>`;
                html += `<div class="evidence-grid">`;
                evidenceItems.forEach(item => {
                    const artClass = item.ArtRequirement ? 'ev-art filled' : 'ev-art empty';
                    const artText = item.ArtRequirement
                        ? `[ART] ${truncate(item.ArtRequirement, 50)}`
                        : '[!] 未填美术需求';
                    html += `
                        <div class="evidence-card" onclick="UI.showEvidenceModal('${item.id}')">
                            <div class="ev-name">${escapeHtml(DataManager.itemName(item))}</div>
                            <div class="ev-id">
                                ID: ${item.id}
                                <span class="ev-type ${DataManager.typeClass(item.itemType)}">${escapeHtml(DataManager.typeName(item.itemType))}</span>
                                ${item.canAnalyzed === 'true' ? '<span class="ev-type" style="background:var(--success)">可分析</span>' : ''}
                            </div>
                            <div class="ev-desc">${escapeHtml(truncate(DataManager.itemDesc(item), 100))}</div>
                            <div class="${artClass}">${escapeHtml(artText)}</div>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            // Other scene items (non-evidence IDs)
            if (otherItems.length > 0) {
                html += `<div class="section-title">其他场景物品 ID</div>`;
                html += `<p style="color:var(--text-muted); font-size:0.85rem;">`;
                otherItems.forEach(id => {
                    html += `<span style="background:var(--card); padding:0.2rem 0.5rem; border-radius:4px; margin:0.15rem; display:inline-block;">${escapeHtml(id)}</span>`;
                });
                html += `</p>`;
            }
