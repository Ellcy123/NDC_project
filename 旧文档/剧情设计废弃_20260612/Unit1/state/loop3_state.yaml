# ═══════════════════════════════════════
# PART 3: 指证（Expose）
# ═══════════════════════════════════════
#
# 场景状态表: Tommy办公室/酒吧大堂 → ⚔️指证(Tommy)
# 指证设计: 3轮（"只做私酒" → "古董正常买卖" → "我不知情只是做账"）
# exposeNpcId: 105 (Tommy)

expose:
  target: "Tommy (105)"
  total_rounds: 3
  testimony: 1053001  # "Webb先生只做私酒生意，没有其他业务"

  # ── 第一轮：戳破"只做私酒生意" ──
  # Webb个人收入(1311) + 酒吧收入账本(1322) → 收入差额暴露
  round_1:
    id: 9
    lie: "Webb先生只做私酒生意，没有其他业务"
    lie_source: "证词 1053001"
    usable_evidence:
      - id: 1311
        name: "Webb个人收入记录"
        用途: "月总收入$15,000——远超酒吧正常营业额，多出的$11,000从何而来？"
      - id: 1322
        name: "酒吧收入账本"
        用途: "月净酒类销售仅$4,000——如果只做私酒，怎么解释$11,000的差额？"
    result: |
      Tommy无法解释巨大的收入差额：
      - Webb月收入$15,000 vs 酒吧营业额$4,000 = $11,000来源不明
      - Tommy被迫承认还有古董买卖生意
      - Tommy升级谎言："还有古董买卖，那些是正常的艺术品交易"

  # ── 第二轮：揭穿"古董正常买卖" ──
  # 油画现场照(1331) + 花瓶现场照(1332) → 古董从未卖出
  round_2:
    id: 10
    lie: "还有古董买卖，中国花瓶卖给了Thompson，欧洲油画卖给了Coleman"
    lie_source: "Tommy对Round 1的新谎言"
    usable_evidence:
      - id: 1331
        name: "油画现场照"
        用途: "欧洲油画仍完好挂在歌舞厅墙上——与'已售给Coleman'矛盾"
      - id: 1332
        name: "花瓶现场照"
        用途: "中国花瓶仍完好摆放原位——与'已售给Thompson'矛盾"
    result: |
      古董从未真正售出：
      - 声称卖给Thompson的花瓶还在歌舞厅
      - 声称卖给Coleman的油画也还挂在墙上
      - Tommy辩解"客户暂时寄存"但无法解释反复收费
      - Tommy升级谎言："我只是按Webb指示记账，具体业务我不知情"

  # ── 第三轮：击穿"不知情只是做账" ──
  # 客户记录(1704=Tommy笔迹) → 深度参与
  round_3:
    id: 11
    lie: "我只是按Webb先生的指示记账！不参与具体业务，不知道Webb是怎么运作的"
    lie_source: "Tommy对Round 2的新谎言"
    usable_evidence:
      - id: 1704
        name: "不明记录人的客户记录（分析后=Tommy笔迹）"
        note: "派生自1313，经与1323(Tommy同情日记)笔迹对比确认"
        用途: "客户记录详细记载访问时间、停留时长、观看古董类型——笔迹与Tommy一致，证明Tommy深度参与勒索网络运作"
    result: |
      Tommy彻底崩溃：
      - 亲手记录的客户日志暴露：不是'做账'，而是勒索网络的核心操作者
      - 同一件古董反复'出售'给不同客户——本质是按月收取保护费
      - Tommy承认Webb确实在勒索Thompson、Coleman等政商要人
      - Tommy痛哭："我只是配合的！我需要这份工作养家！"
      - 揭示更大威胁：Tommy暗示真正可怕的不是Webb，而是Whale

