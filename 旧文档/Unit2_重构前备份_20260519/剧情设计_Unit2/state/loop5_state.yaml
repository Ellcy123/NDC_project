# PART 3: 指证（Expose）
# ═══════════════════════════════════════
#
# 场景状态表: 赌场/酒吧 → 🔓搜证(矛盾) → ⚔️指证(Vinnie)
# 指证设计: 1轮（打火机+目击+Tony辨认 → Vinnie"认罪"）
# 特殊机制: false_confession — Vinnie主动认罪但认罪内容存在致命破绽

expose:
  target: "Vinnie (05)"
  total_rounds: 1
  special_mechanism: false_confession  # Vinnie假认罪——掩护Leonard

  # Vinnie NPC条目见 scenes → SC2007 → vinnie_002

  # ── 第一轮（也是唯一一轮）：击穿"不在场"谎言 ──
  # 打火机(2501) + Rose目击(2081005) + Tony辨认(2112001) → 三重打击
  round_1:
    lie: "最近很久都没去Frank那附近，至少两三个月了"
    lie_source: "证词 2051003"
    usable_evidence:
      - id: 2501
        name: "火灾现场的打火机"
        用途: "鞋坊废墟发现银色打火机，侧面'V'字刻痕——Vinnie的个人物品出现在火灾现场"
      - id: 2081005
        name: "Rose模糊目击证词"
        用途: "11/6晚9点多壮汉从鞋坊匆忙离开——块头大、深色衣服、像意大利人，描述与Vinnie吻合"
      - id: 2112001
        name: "Tony辨认打火机证词"
        用途: "'每天在酒吧用它点烟，上周还用它给姑娘点烟'——不可能'两三个月前'落在鞋坊"
    result: |
      Vinnie被三重证据逼入死角：
      - 打火机V字刻痕 + Tony辨认 = 物品确认是Vinnie的
      - Tony证实"上周还在用" = 推翻"很久以前落下"的辩解
      - Rose目击壮汉体格 + 意大利人 = 与Vinnie吻合
      ★ 特殊机制触发：Vinnie突然打断，主动"认罪" ★
      - Vinnie暴怒："好！够了！是我！是我放的火！Frank是我杀的！"
      - 声称"透过窗户看到Frank在床上睡觉——然后放火"
      - 急切要求被捕："报警吧！我现在就签字！"

  # ── 假认罪分析（本循环不揭露，L6才追究） ──
  false_confession:
    content: |
      Vinnie认罪存在致命破绽：
      1. 声称"纵火杀的"——（L6法医鉴定报告将揭示Frank死于钝器击打，L5玩家尚不知情）
      2. 声称"看到Frank在床上睡觉"——说明到场时Frank已死（被Leonard打死后Vinnie移尸到床上）
      3. 认罪太快、太主动——像在保护某人（Leonard）
      4. 打火机保存"太完美"——火灾现场不该有几乎无烟熏的金属物品，是Vinnie事后放置的假证据
    emma_doubt: "他的认罪…有问题。"

