opening:
  type: cutscene  # 🎬 硬切，无玩家操作
  location: "Zack 侦探事务所"
  characters: [Zack, Emma, Mickey]
  description: |
    Mickey 登门到 Zack 侦探事务所，委托 Zack 和 Emma 调查 Thomas Smith 坠楼案。
    Mickey 在起诉湖滨信托银行的过程中调查到这又一起被警方掩盖的"意外坠楼"——
    死者 Thomas 死前和 Frank 一样欠下巨额贷款，还购买了巨额保险，保单来自湖滨信托银行。
    Mickey 怀疑案件背后有隐情，说不定能帮助他推进起诉银行的案子。
    他不参与调查，请 Zack 和 Emma 务必先去看看情况，之后再到他办公室汇报。

  L1_opening_mickey:
    talk: L1_opening_mickey
    is_liar: false
    motive: "委托动机——为起诉湖滨信托银行寻找新案例。Thomas 案与 Frank 案的高度相似让他敏锐察觉到一致的犯罪模式"
    mindset: "克制而审慎——Mickey 习惯先收集事实再下结论，不在 Zack 面前过早渲染'银行就是凶手'"

    # ── 1. NPC 已知信息 ──
    active_topics:
      - "委托事由：Thomas 死前与 Frank 一样欠贷款 + 购买巨额保险，疑似同一犯罪模式"
      - "起诉湖滨信托银行的案件需要新证据——Thomas 案可能是突破口"
      - "汇报机制：Zack/Emma 调查后到 Mickey 办公室碰头"
    withheld_topics:
      - "Mickey 的真实身份（Whale，Unit4 才揭示）"
      - "Mickey 与本案三方（Mary/Helen/Bernard）的私下关系"
      - "Loop6 控辩对决的最终立场"

    # ── 2. 玩家询问意图 ──
    player_inquiry:
      - "Mickey 怎么注意到 Thomas 案的——他与起诉银行案的关联"  # 9
      - "Mickey 为什么不亲自参与调查"  # 6

    # ── 3. 可提取证词 ──
    testimony_ids:
      - 3011001  # Mickey 委托：Thomas 案与 Frank 案的相似性
      - 3011002  # Mickey 委托：保单来自湖滨信托银行

