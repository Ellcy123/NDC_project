#   SC3006 公寓二楼走廊          → 🔒尚未发现二楼线索
#   SC3007 教堂                  → 🔒尚未发现教堂线索
#   SC3008 Helen家               → 🔒尚未发现Helen线索
#   SC3009 Continental银行公共区域 → 🔒银行尚未出现在调查方向中
#   SC3010 Margaret鞋坊          → 🔒尚未发现Margaret线索
#   SC3011 街角                  → 🔒尚未出现在调查方向中
#   SC3012 Sullivan家卧室        → 🔒尚未发现Sullivan家线索
#   SC3013 公寓楼门口            → 🔒尚未出现在调查方向中
#   SC3014 Bernard办公室         → 🔒银行尚未出现在调查方向中

scenes:
  # ── SC3001 楼下现场（开篇 → 搜证） ──
  - id: 3001
    name: "Thomas公寓楼下现场"
    evidence:
      - id: 3101
        name: "着地点照片"
        note: "关键——尸体距墙仅0.8米，主动跳跃应≥1.5米（Expose R2用）"
      - id: 3108
        name: "报纸天气版"
        note: "关键——Chicago Tribune 1928年11月21日，头版天气栏：'昨夜大风警报，湖区及山区阵风达40英里/小时'（L2 Expose R2用）"

  # ── SC3002 楼顶 ──
  - id: 3002
    name: "Thomas公寓楼顶"
    evidence:
      - id: 3103
        name: "男性脚印照片"
        note: "陷阱——42码Thomas靴印。R1中选此无效（'死者的痕迹'不反驳'只有死者一个人'）"
      - id: 3104
        name: "女性脚印照片"
        note: "关键——约38码，深浅不一、方向杂乱，与Thomas靴印面对面（Expose R1用）。🔒藏梗：实为Mary+Helen两人脚印"
      - id: 3106
        name: "护栏灰尘分布照片"
        note: "关键——外侧灰尘完整无损，内侧有手掌印和衣物擦痕（Expose R2用）"
      - id: 3107
        name: "Jameson威士忌空瓶"
        note: "伏笔——$3好酒，Thomas这种穷酒鬼买不起。循环4揭晓酒是Helen带的"

  # ── SC3005 法医办公室（Foster对话 + 搜证） ──
  # 位置：County Hospital（库克县医院）院区内，Coroner's Office
  - id: 3005
    name: "法医办公室"
    evidence:
      - id: 3102
        name: "Thomas的钥匙"
        note: "Thomas钱包中有形状特殊的老式安全门钥匙（伏笔——L3与Helen家楼顶钥匙比对）"
      - id: 3105
        name: "袖扣纤维样本"
        note: "Thomas右袖扣处发现异源织物纤维——黑色蕾丝，高档编织物，纹理特殊（关键——L2搜身观察触发条件）"
      - id: 3611
        name: "Foster的旧烟斗和医学院毕业照"
        note: "环境叙事——石楠木烟斗+1898年毕业合影，Primum non nocere"
    npcs:
      foster_001:
        # ── 基本信息 ──
        talk: foster_001
        is_liar: false
        motive: "提供专业法医分析——察觉到某些异常，但选择只陈述事实不做推测"
        mindset: "职业严谨但意味深长——用语克制，'顿了顿'暗示他比表面知道得多"

        # ── 1. NPC 已知信息 ──（模式 D：一次性 NPC）
        knows:
          - "血液酒精浓度0.25%，明显醉酒状态"
          - "颈椎断裂，符合高处坠落"
          - "指甲下有少量皮肤组织，经检查为死者本人的——指尖反向剐蹭护栏边缘"
          - "组织量太少，不是剧烈挣扎，更像坠落瞬间的本能反应"
        does_not_know:
          - "Thomas被灌醉到0.25%（只知道检测结果，不知道原因）"
          - "楼顶有两个女人"

        # ── 2. 玩家询问意图 ──
        player_inquiry:
          - "法医对Thomas坠楼的专业分析——确认死因和身体状态"  # 8
          - "指甲下的组织意味着什么——挣扎还是本能反应？"  # 7

        # ── 3. 可提取证词 ──
        testimony_ids: []  # Foster信息作为场景对话呈现，不提取为证词道具

        # ── 4. 鉴赏力 ──
        connoisseur:
          - type: source
            content: "1920年代法医无法通过血迹确定身份——只能判断是不是人血，除非抓到嫌疑人做比对"
            note: "L6 foster_006 quiz#101 考这个（Foster对话中提到技术局限）"

# ═══════════════════════════════════════
