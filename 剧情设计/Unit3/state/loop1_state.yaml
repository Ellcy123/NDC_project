        description: "尸体手部特写：指尖与掌心可见油痕，手背干净；油的成分本 Loop 无法分析"

      - id: 3109
        name: "Foster 烟斗与医学院毕业照"
        type: clue
        pickup: false
        note: "环境叙事——石楠木烟斗 + 1898 年医学院毕业合影；提示 Foster 的资历与职业克制底色"
        description: "1898 年 Rush 医学院毕业合影，年轻的 Foster 在第二排；旁边的石楠木烟斗有长年摩挲的光泽"

    npcs:
      L1_scene3005_foster:
        talk: L1_scene3005_foster
        is_liar: false
        motive: "提供专业法医分析——察觉到酒精浓度异常和手部油痕这两个反常细节，但检测结果报告还未出，作为法医，她只陈述粗略结论，把精确数值留到本 Loop 之外"
        mindset: "职业严谨而克制——用语经过斟酌，使用'血液里含有酒精'作为术语"

