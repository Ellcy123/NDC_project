# ============================================================
# Loop 1 — 不是自杀
# 本循环说谎者: Morrison
# 核心揭示: Thomas不是自杀，楼顶有女性在场，不是主动跳下的
# 前序事件: Unit 2结束后，Zack接到报案赶到Thomas公寓楼
# 时间: 1928年11月21日 约08:00 早晨（案发后+9.5小时）
# ============================================================

# ═══════════════════════════════════════
# 玩家视角（本循环）
# ═══════════════════════════════════════

player_context:
  chapter_goal: "调查Thomas Sullivan坠楼事件"
  goals:
    primary: "Thomas Sullivan真的是自杀吗？"
    secondary:
      - "Morrison为什么急着按自杀结案？"
      - "楼顶到底发生了什么？"
  known_facts: []  # L1，玩家对本章案件一无所知
  new_directions:
    - direction: "女性脚印矛盾"
      trigger: "楼顶护栏边有约38码女性脚印，与Thomas靴印面对面分布，不是Morrison说的'只有死者一个人'"
    - direction: "坠落方式矛盾"
      trigger: "护栏外侧灰尘无损（没翻越）+ 着地点仅0.8米（无水平初速度）→ 不是主动跳下的"
  post_expose_knowledge:
    - "Thomas不是自杀——现场有女性在场，且Thomas不是主动跳下的"
    - "楼顶有约38码女性脚印，与Thomas面对面站在护栏边（深夜22:30）"
    - "脚印深浅不一（🔒藏梗：实为两个体重不同的女人，Loop 4揭晓）"
    - "Morrison佛系甩手：Thomas打老婆，整栋楼都知道，脚印十有八九是Mary的"
    - "'失足'可能性未排除——开放性结论"
    - "Jameson空瓶：穷酒鬼买不起$3好酒，来源存疑"
    - "Morrison暗示Continental银行打过招呼，案件比想象的复杂"

# ═══════════════════════════════════════
# PART 1: 开篇
# ═══════════════════════════════════════
#
# 场景状态表: 楼下现场(SC3001) → 🎬案发现场
# Zack和Emma接报赶到Thomas公寓楼下，Morrison宣布"自杀结案"，
# Emma冷静引导Zack质疑Morrison判断，开始搜证。

opening:
  scene_id: 3001
  characters: [Zack, Emma, Morrison]
  purpose: "Morrison宣布自杀结案 → Emma引导Zack冷静质疑 → 开始搜证"
  talk: emma_001

  emma_001:
    is_liar: false
    motive: "引导Zack从Morrison的草率判断中抽离——用观察事实替代情绪反应，启动独立搜证"
    mindset: "冷静警觉——经历Unit1/2后对Morrison的判断本能不信任，但不急于下结论，先看现场"

    knows:
      - "Thomas Sullivan从公寓楼顶坠楼死亡"
      - "Morrison声称自杀，想赶在Zack到来前结案"
      - "Morrison拖延了9.5小时才通知Zack——想处理完再说"
      - "Morrison在Unit1/2中都有过误导和阻碍的前科"
      - "芝加哥验尸官是选举产生的政治职位——自己挑陪审团、自己选证人，死因裁定几乎无人监督（Unit1/2经验中积累的常识）"

    does_not_know:
      - "楼顶有女性脚印"
      - "Thomas不是主动跳下的"
      - "Thomas打老婆的事"
      - "Continental银行打过招呼"
      - "脚印深浅不一的含义"

    lie: null

    # ── 4. 鉴赏力 ──
    connoisseur:
      - type: source
        content: "芝加哥验尸官是选举产生的政治职位——自己挑陪审团成员、自己选证人，裁定死因无人监督"
        note: "L4 emma_006 quiz#105 考这个（Emma/Morrison场景中揭示验尸官制度）"

# ═══════════════════════════════════════
