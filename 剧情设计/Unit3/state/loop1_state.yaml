    lie: "这人明显是自己跳下去的。护栏那么矮，喝多了站不稳，一脚踩空就掉了"
    lie_source: "Morrison对Round 1的退守"
    usable_evidence:
      - id: 3106
        name: "护栏灰尘分布照片"
        用途: "外侧灰尘完整无损——如果翻越护栏，必然压到外侧灰尘"
      - id: 3101
        name: "着地点照片"
        用途: "尸体距墙仅0.8米，主动跳跃应≥1.5米——无水平初速度"
    result: |
      排除"主动跳下"，但"失足"未排除：
      - Morrison退让"也许不是自己跳的，但喝成那样靠在护栏边，重心不稳就能掉"
      - 佛系交代Thomas/Mary家事："打老婆，整栋楼都知道"
      - 甩手："前两回你也见识过了——我这人就这样，能省事就省事。跟我没关系了"
      - 随口提供Mary信息："Thomas的老婆叫Mary Sullivan，就住楼下"
      - 暗示银行利益："Continental银行打过招呼"
      - 警告："这案子比你想的复杂。真相不一定是你想要的"
      - 🔒开放性结论：失足 vs 被推？脚印深浅不一？Jameson哪来的？

