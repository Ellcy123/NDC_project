# ═══════════════════════════════════════
#
# L1 场景状态（全14场景）:
#   SC3001 楼下现场              → 🎬开篇→🔓搜证
#   SC3002 楼顶                  → 🔓搜证
#   SC3003 Sullivan家客厅        → 🔒尚未发现Sullivan家线索
#   SC3004 警局                  → ⚔️指证(Morrison)
