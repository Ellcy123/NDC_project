        name: "女性脚印照片"
        type: clue
        pickup: true
        note: "关键——6 码女鞋印，凌乱、暂时不能判断人数；与男性脚印（Thomas）不同（Expose R2 用）"
        description: "栏杆封锁线外侧地面：6 码女鞋印，朝向杂乱，鞋底花纹清晰；脚印新鲜——边缘未被风蚀，与昨夜降露形成的薄层覆盖关系一致（推断留下时间在昨夜降露前后，即 22:00 左右）"

      - id: 3105
        name: "男性脚印照片"
        type: clue
        pickup: true
        note: "陷阱——Thomas 自己的脚印。R2 中选此无效（'死者的痕迹'不反驳'只有死者一人'）"
        description: "栏杆封锁线附近：Thomas 的男性脚印，与尸体脚部尺码吻合"

