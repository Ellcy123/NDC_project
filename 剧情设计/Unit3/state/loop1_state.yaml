# 场景状态表: 警局(SC3004) → ⚔️指证(Morrison)
# 指证设计: 2轮（女性在场 → 不是主动跳下）

expose:
  target: "Morrison (01)"
  total_rounds: 2

  morrison:
    # ── 基本信息 ──
    talk: loop1_morrison
    is_liar: true
    motive: "省事结案 + 银行利益 + 佛系不想管"
    mindset: "不耐烦的敷衍——被逼问时恼怒，但最终佛系甩手'你想查就去查'"

    # ── 1. NPC 已知信息 ──
    knows:
      - "Thomas Sullivan坠楼死亡"
      - "Thomas打老婆，整栋楼都知道"
      - "Thomas的妻子叫Mary Sullivan，住楼下"
      - "Continental银行打过招呼——谋杀案一立，房产变犯罪现场；自杀则今天结案明天查封"
      - "案发后故意拖延9.5小时"

    does_not_know:
      - "脚印深浅不一是两个女人"
      - "Helen的存在和参与"
      - "Thomas被灌醉"

    # ── 2. 玩家询问意图 ──
    player_inquiry: null  # Expose对象

    # ── 3. 可提取证词 ──
    testimony_ids:
      - 3101001  # ⚠谎言: "自杀，很明显。这种烂酒鬼，喝多了自己跳下去了"

    # ── 4. 鉴赏力 ──
    connoisseur: []

  # ── 第一轮：楼顶不只Thomas一个人 ──
  # C-04（女性脚印）证明有女性在场，C-03（Thomas脚印）是陷阱
  round_1:
    lie: "现场干干净净，只有死者一个人的痕迹"
    lie_source: "证词 3101001"
    usable_evidence:
      - id: 3104
        name: "女性脚印照片"
        用途: "约38码女鞋印与Thomas靴印面对面，深夜22:30有女性在场不是偶然"
    trap_evidence:
      - id: 3103
        name: "男性脚印照片"
        用途: "陷阱——Thomas的42码靴印是'死者的痕迹'，选了不构成反驳"
    result: |
      Morrison被迫承认有女性在场：
      - 先狡辩"公共区域白天有人晒衣服"
      - Zack用脚印朝向（面对面）和时间点（深夜22:30）反驳
      - Morrison恼怒"你非要搞出个谋杀案？"
      - 退守新防线："有人在场不代表有人推他"

  # ── 第二轮：不是主动跳下的 ──
  # 护栏灰尘（排除翻越）+ 着地点距离（排除主动跳跃）
