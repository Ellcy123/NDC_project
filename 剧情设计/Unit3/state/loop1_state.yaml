  target_talk: L1_expose_morrison
  location: "SC3004 警局"
  total_rounds: 2
  is_liar: true
  player_inquiry: null

  context: |
    Morrison 想以"自杀"快速结案，懒得继续调查。
    Zack 必须依次击破"自杀"和"没有其他人在场痕迹"两个谎言，
    把案件性质从"自杀"扳回"可能的他杀或意外"，并把 Mary 拽入调查视野。

  # ── 第一轮：不是自杀 ──
  round_1:
    lie: "他自己跳下去的"
    lie_source: 3031001
    usable_evidence:
      - id: 3102
