scenes:
  # ── SC3001 楼下现场（坠落点 + 外墙） ──
  - id: 3001
    name: "Thomas 公寓楼下现场"
    type: free_exploration
    description: |
      Thomas Smith 坠落着地点。
      警戒线围出一片小范围，地面上还留着粉笔标记的尸体轮廓。
      抬头可见公寓外墙——窗户与窗户之间的墙面上有几道新鲜的刮痕。
      Chicago Tribune 11 月 21 日的早报散落在警戒线外，被风掀着边角。

    evidence:
      - id: 3102
        name: "外墙照片"
        type: clue
        pickup: true
        note: "关键——外墙面有新鲜抓挠痕迹，符合坠落瞬间本能抓握（Expose R1 主力，配合尸体手部伤痕以及墙皮灰 3110）"
        description: "楼顶护栏下方一段外墙特写：几道指甲刮挠痕迹横向分布，集中在护栏下方"

      - id: 3103
        name: "11 月 20 日晚报"
        type: item
        pickup: true
        note: "🔵 跨 Loop——天气栏记录当晚 22:00 左右港口强风约 40mph（L2 用于击破 Mary 的教堂蜡烛谎言）"
        description: "Chicago Tribune 1928.11.20 晚报，头版财经；翻到天气栏：'今夜港口及湖区阵风 40mph，需注意露天物品'"

  # ── SC3002 楼顶 ──
  # 注：栏杆/护栏破坏痕迹被警戒线封锁，L3 才解锁
  - id: 3002
    name: "Thomas 公寓楼顶"
    type: free_exploration
    description: |
      老旧公寓楼顶。北侧栏杆（坠落侧）被警戒线封锁，无法靠近。
      Zack 和 Emma 只能在栏杆外的开阔区域查看脚印和零散物件。
      东南角避风处地面有几个零散物件。

    evidence:
