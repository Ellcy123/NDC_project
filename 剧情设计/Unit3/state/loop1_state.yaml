    - "案发现场不止 Thomas 一人——楼顶有 6 码女性脚印"
    - "脚印的主人 Morrison 推测可能是 Thomas 的妻子 Mary Smith（住楼下）"
    - "Morrison 不愿深查，想处理成自杀结案——'这案子内部牵扯太多'"
    - "Morrison 默许 Zack 和 Emma 继续调查（'大不了我这个月又没钱喝酒'）"
    - "保留疑点：是意外坠楼还是谋杀？暂时无法判断"

