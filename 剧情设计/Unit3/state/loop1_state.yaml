player_context:
  chapter_goal: "调查 Thomas Smith 坠楼事件——为 Mickey 起诉湖滨信托银行寻找新案例"
  goals:
    primary: "Thomas 真的是自杀吗？"
    secondary:
      - "为什么 Thomas 死前会和 Frank 一样欠下巨额贷款 + 购买巨额保险？"
      - "湖滨信托银行的保单和 Thomas 之死有没有关系？"

  known_facts: []  # Loop1，玩家对本章案件一无所知

  new_directions:
    - direction: "Mickey 的银行案线索"
      trigger: "Mickey 在起诉湖滨信托银行的过程中调查到 Thomas 案——死者死前欠贷款 + 巨额保险，疑似与 Frank 案同一模式"
    - direction: "坠楼方式可疑"
      trigger: "外墙有抓挠痕迹 + 尸体手部有抓挠伤和墙皮灰（本能抓墙求生）"
    - direction: "现场可能不止一人"
      trigger: "楼顶发现 6 码女性脚印（凌乱、暂时不能判断人数），死者是男性"

  post_expose_knowledge:
