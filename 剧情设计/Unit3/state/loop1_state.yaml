        name: "Jameson 空酒瓶"
        type: item
        pickup: true
        note: "🔵 跨 Loop——伏笔，本 Loop 仅作'角落零散物'对待，不暗示来源（L3 揭示与 Helen 家 Jameson 一致）"
        description: "天台东南角避风处：一只 Jameson 威士忌空酒瓶，瓶身完好"

  # ── SC3005 法医办公室（Foster 对话 + 搜证） ──
