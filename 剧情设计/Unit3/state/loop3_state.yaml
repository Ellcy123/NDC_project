expose:
  target: helen
  target_talk: L3_expose_helen
  location: "SC3008 Helen 家"
  total_rounds: 3
  is_liar: true
  player_inquiry: null

  context: |
    Helen 否认与 Thomas 有深度关系、否认与保单有关、否认在天台。Zack 依次击破：
    R1 出轨关系 → R2 保险动机 → R3 现场存在。
    指证后 Helen 承认布置陷阱（毁栏杆 + 涂油），新一层"我没在场杀 Thomas"
    的退守谎言为 L4 揭破。

  round_1:
    lie: "只是有一次聊天诉苦，再也没有其他联系"
    lie_source: 3053002
    usable_evidence:
      - id: 3063001
        name: "Bernard 证词（Helen 旁听过意外赔付咨询）"
        用途: "Helen 与 Thomas 一起去银行听过赔付咨询——不是'一次诉苦'那么简单"
    auxiliary_evidence:
      - id: 3308
        name: "Helen 嘴上深红色口红（环境叙事）"
        用途: "辅助——颜色与衬衫口红印吻合，玩家可在内心补完出轨链"
    result: |
      Helen 沉默后承认与 Thomas 是出轨关系：
      - 银行咨询的细节，不是普通邻居会去旁听的
      - Helen 退守：'就算我和 Thomas 有关系，又不能说明我和他的死有关'

  round_2:
    lie: "是 Thomas 良心发现给 Mary 买的保险"
    # 本 R2 谎言在 Expose 现场临时说出，无独立 testimony，沿用 R1 lie 系列
    lie_source: 3053002
    usable_evidence:
      - id: 3312
        name: "Mary 人寿保险单副本"
        用途: "Mary 人寿保险单受益人是 Thomas——这笔钱只有 Thomas 拿得到，根本不是'良心发现'给 Mary 的"
    auxiliary_evidence:
      - id: 3303
        name: "Mary 人寿保险单原件"
        用途: "辅助——原件在 Helen 家被揉皱藏在猫窝里，证明 Helen 看过、关心过这份保单"
    result: |
      Helen 被迫承认 Thomas 是为骗保给 Mary 买的保险：
      - 受益人 = Thomas 直接拆穿"良心发现"
      - Helen 退守：'我只是旁听了一次，我从没去过天台'

