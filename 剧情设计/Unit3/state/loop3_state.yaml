      - 承认11月19日在地面涂轮椅维护油
      - 辩称Thomas指导她涂哪一段、用什么油
      - 退守新防线："Thomas只是想在楼顶吓唬Mary"
      - ⚠️仍坚持"那晚在家"

  # ── 第三轮：一万美元的保单 ──
  # 保险单副本（Bernard提供），RelationNetwork系统呈现Bernard证词
