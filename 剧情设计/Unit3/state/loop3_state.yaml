        用途: "Helen家玄关小桌，齿形与Thomas钱包钥匙完全一致——Helen为Thomas配了楼顶钥匙"
    timeline_background:
      - testimony: 3310001
        标注: "11月5日 Helen拿楼管钥匙串出门（'检查漏水'），半小时后还回"
      - testimony: 3310002
        标注: "11月6日 Helen再次出门，手在抖，回来口袋鼓了一块"
      设计说明: "Timeline日期链：11/5借钥匙→11/6配钥匙→...→11/20案发，提前15天准备"
    result: |
      Helen承认为Thomas配了楼顶钥匙：
      - 辩称"Thomas说他喜欢去楼顶吹风散心"
      - 承认Thomas那晚来她家拿走钥匙（约21:00）
      - 退守新防线："钥匙配好我就给他了，天台我自己从来没上去过"
      - Helen眼神闪烁看向窗外楼顶方向（→触发楼顶第二次搜证）
      - ⚠️仍坚持"那晚在家"

  # ── 第二轮：地面上的油 ──
  # 油样本化学比对报告（派生） + 地面涂油示意图
  # Helen说"从来没上去过天台"，但Helen家的油出现在天台护栏附近地面上
  round_2:
    lie: "我只是帮Thomas配了把钥匙。天台我自己从来没上去过。楼顶发生的事跟我没关系"
    lie_source: "Helen R1后的退守"
    usable_evidence:
