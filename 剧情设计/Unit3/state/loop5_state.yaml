expose:
  target: bernard
  target_talk: L5_expose_bernard
  location: "SC3014 Bernard 办公室"
  total_rounds: 2
  is_liar: true
  player_inquiry: null

  context: |
    Bernard 自称按标准流程办理保单。Zack 用皮质垫板压痕证明 Thomas 那份"银行术语标注报纸"
    是在 Bernard 桌上写的——他主动诱导。R2 进一步用垫板上的花形手链压痕逼出"另一位
    来咨询的女人"——这是 L6 揭穿 Mary 是策划者的关键伏笔。

  round_1:
    lie: "按标准流程办保单 · 没做多余的事"
    lie_source: 3065001
    usable_evidence:
      - id: 3570
        name: "标注报纸压痕比对报告（派生）"
        用途: "系统分析：皮质垫板压痕中的一份与 Thomas 家标注报纸 3206 的字迹和压力分布完全吻合——Thomas 那份'银行术语标注报纸'是在 Bernard 桌上写的，证明 Bernard 在主动'教'Thomas 怎么用保险"
    result: |
      Bernard 被迫承认主动向 Thomas 解释了'用妻子做受益人'的方案：
      - Zack 追问：'那除了 Thomas，还有其他人来过吗？'
      - Bernard 退守：'没人来过'

  round_2:
    lie: "没人来过"
    lie_source: 3065002
    usable_evidence:
      - id: 3502
        name: "垫板上的手链压痕"
        用途: "皮质垫板上一片压痕呈手工花形、一片花瓣有明显缺口——是一只独特手链留下的印记，说明有戴这种手链的人来过"
    result: |
      Bernard 沉默后承认：
      - 确实有个戴手工花形手链（一片花瓣缺口）的女人来咨询过
      - 她问的是：'如果买保险、欠银行贷款的人意外死了，债务、房子抵押和那份保单会怎么处理？'

  post_expose:
    description: |
      Bernard 承认那个女人来咨询的细节后，态度软下来——
      他让 Zack 别再打探下去：'我也是打工人而已'。
      Bernard 提到：'现在 Thomas 死了，他们家欠的债务还是只能用房子抵了。'
    new_evidence_gained: null
    player_knowledge_gained:
      - "Bernard 是主动诱导 Thomas 接受'用妻子做受益人'的保险方案"
      - "Bernard 承认：曾有戴手工花形手链（一片花瓣有缺口）的女人来咨询过"
      - "她咨询的是'欠贷款 + 买保险的人意外死后，债务房子保单怎么处理'"
      - "Thomas 死后债务只能用房子抵"
      - "Bernard 不愿继续配合调查（'我也是打工人'）"

