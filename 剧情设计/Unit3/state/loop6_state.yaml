# 一、玩家视角（本循环）
# ─────────────────────────────

player_context:
  chapter_goal: "调查 Thomas Smith 坠楼事件——揭示真相 + 完成对湖滨信托银行的调查"
  goals:
    primary: "Mary 是否参与了蓄意谋杀 Thomas？"
    secondary:
      - "找到能从根本上颠覆'正当防卫'结论的证据"
      - "完成对银行诱导链条的调查（为 Mickey 起诉湖滨信托银行收尾）"

  known_facts:
    # 沿用 L1-L5 累积（客观事实层）
    - "Thomas 不是主动跳下；Mary 22:00 上过天台；Helen 当晚也去过天台"
    - "门外侧把手有 Helen 家轮椅油、内侧把手干净（油痕检测仪结果）"
    - "天台门钥匙只有一把，在 Helen 处"
    - "Mickey 已为 Mary 争取到无罪、Helen 正在争取无罪辩护"
    - "Mary 人寿保险单受益人是 Thomas；Thomas 计划骗保杀 Mary（小纸条）"
    - "Bernard 主动诱导 Thomas 接受'用妻子做受益人'的保险方案"
    - "Bernard 承认曾有戴手工花形手链（一片花瓣有缺口）的女人来咨询"
    - "她咨询的是'欠贷款 + 买保险的人意外死后，债务房子保单怎么处理'"
    - "Thomas 死前手部有油痕（指尖掌心有/手背无）"
    - "天台角落有 Old Crow 药用威士忌空瓶；Helen 家有同款 Old Crow 药用威士忌；Thomas 家中只有廉价酒"
    - "Mary 母亲遗物花形手链（一片花瓣有缺口，L2 已观察到）"

  current_assumptions:
    # L4 假结局推论——L6 控辩对决会逐条颠覆
    - "L4 推定：Helen 当晚为保护 Mary 推下 Thomas（正当防卫假结局）"
    - "L4 推定：门内侧干净是因为 Mary 当晚帮 Helen 从内侧开门"
    - "L4 推定：陷阱是 Helen 一个人 19/20 号布置的"

  new_directions:
    - direction: "重审 Foster 的法医结论"
      trigger: "Foster 主动联系：精密检测结果出来——血液酒精浓度 0.25%"
    - direction: "Seamus 关于润滑油的新陈述"
      trigger: "Zack 经过二楼走廊时撞见 Seamus 正用一瓶熟悉的润滑油润轮椅"

  post_expose_knowledge:
    - "**第三重反转**：Mary 是冷静的策划者，不是单纯受害者"
    - "Mary + Helen 19 号一起预先上天台布置陷阱"
    - "Mary 早识破 Thomas 的杀妻骗保计划，与 Helen 联手反杀"
    - "Mary 即'戴花瓣缺口手链去 Bernard 桌上咨询的女人'"
    - "玩家做出二选项决定：销毁证据保护 Mary / 拿起证据继续"
    - "（若拿起）案件后续走向待续；（若销毁）Zack 选择不告诉 Emma 真相"
    - "Mary 准备把房子卖给 TideWater 还债；银行不会阻拦，因为清退房产最终正流向 TideWater"
    - "南区援助计划：房产清退最终流入 TideWater，世博会选址附近"

# ─────────────────────────────
# 二、开篇（🎬 硬切剧情）
# ─────────────────────────────

opening:
  type: cutscene
  scene_name: "L6 开篇 · Mickey办公室 · 控辩前"
  location: "Mickey 律师事务所"
  characters: [Zack, Mickey]
  description: |
    Bernard 坦白完毕：有一个戴手工花形手链（花瓣缺口）的女人曾来咨询
    '欠银行贷款的人买保险后意外死了，债务房子保单怎么处理'。
    Zack 怀疑那个人是 Mary——母亲遗物花形手链，一片花瓣有缺口。
    Zack 前往 Mickey 办公室和他商议。
    Mickey 提醒：法庭上仅有怀疑和推测不够，要拿出事实证据才能上诉。
    Zack 决定再去调查一下——如果 Mary 和 Helen 合谋且提前杀人，
    两人将分别被判为蓄意杀人的主犯和从犯，会面临死刑。

  L6_opening_mickey:
    talk: L6_opening
    is_liar: false
    motive: "法律层面的严肃提醒——如果 Mary 和 Helen 是合谋蓄意杀人，两人都将面临死刑"
    mindset: "沉重而克制——Mickey 在法律逻辑和个人情感之间权衡，提醒 Zack 要拿出事实证据"

    active_topics:
      - "Bernard 坦白：戴花瓣缺口手链的女人来咨询过保险清算"
      - "Zack 怀疑那个女人是 Mary（母亲遗物花形手链）"
      - "法庭仅有怀疑和推测不够，必须拿出事实证据"
      - "如果 Mary 和 Helen 合谋且蓄意杀人——主犯从犯都面临死刑"
    withheld_topics:
      - "Mickey 的真实身份（Whale，Unit4 揭示）"
      - "Mickey 已经知道或预感到 Mary 的真实角色"
      - "控辩对决中 Mickey 最终会站在哪一边"

    player_inquiry:
      - "如果证据指向 Mary 是策划者，法律后果是什么"  # 8
      - "Mickey 对 Mary 合谋的可能性怎么看"  # 7

    testimony_ids: []

# ─────────────────────────────
# 三、场景（🔓 自由探索）
# ─────────────────────────────
#
# 本 Loop 场景状态:
#   SC3005 法医办公室    → 🔓（Foster 精确报告 + 关键证词）
#   SC3006 二楼走廊      → 🔓（Seamus 润滑油新陈述）
#   SC3011 Mickey 办公室 → 🔓 → ⚔️ 控辩对决

scenes:
  # ── SC3005 法医办公室（精密检测出炉） ──
  - id: 3005
    name: "法医办公室（精密检测出炉）"
    type: free_exploration
    description: |
      Foster 把一份盖了红章的鉴定报告推到桌上。
      "精密检测结果出来了——血液酒精浓度 0.25%。"
      她不需要再用'严重醉酒'这种委婉的措辞。

    evidence:
      - id: 3601
        name: "法医鉴定报告"
        type: item
        pickup: true
        note: "关键——血液酒精浓度 0.25%（Expose R1 主力）"
        description: "Foster 出具的正式法医鉴定报告：死者 Thomas Smith 血液酒精浓度（BAC）0.25%"

    npcs:
      L6_scene3005_foster:
        talk: L6_scene3005_foster
        is_liar: false
        motive: "在确切的精密检测结果出来之后，可以给出 L1 时不能下的结论"
        mindset: "依然克制——只把精确数值和职业判断推到桌面上"

        active_topics:
          - "死者血液酒精浓度 0.25%"
          - "0.25% 已无有效攻击能力（医学判断）"
        withheld_topics: []  # L6 收束，Foster 不再保留

        player_inquiry:
          - "0.25% 意味着什么——能否进行有效行动 / 攻击"  # 9
          - "L1 给出的'严重醉酒'与 0.25% 的关系"          # 7

        testimony_ids:
          - 3046001  # Foster：死者血液酒精浓度超标，已无有效攻击能力（Expose R1 主力）

  # ── SC3006 公寓二楼走廊（Seamus 润滑油新陈述） ──
  - id: 3006
    name: "公寓二楼走廊（Seamus 润滑油新陈述）"
    type: free_exploration
    description: |
      Zack 再次走过二楼。Seamus 正坐在自己门口，
      用一瓶熟悉的轮椅润滑油给自己破旧的轮椅上油——
      那瓶子的样式 Zack 在 Helen 家见过。

    npcs:
      L6_scene3006_seamus:
        talk: L6_scene3006_seamus
        is_liar: false
        motive: "想用自己的'被照顾'体现存在感，并不知道这件事的真正含义"
        mindset: "话痨自然地透露——'她家最后一瓶'"

        active_topics:
          - "19 号晚上 Helen 把这瓶润滑油送给了 Seamus，说那是她家最后一瓶，以后也不需要了"
        withheld_topics: []

        player_inquiry:
          - "Seamus 手里的润滑油来自哪里——什么时候到他这"  # 9

        testimony_ids:
          - 3086001  # Seamus：19 号晚上 Helen 把她家最后一瓶润滑油送给我，说以后也不需要了（关键——Expose R3 主力，颠覆"门把手油是当晚蹭的"）

# ─────────────────────────────
# 四、指证（⚔️ Expose：Mickey · 5 轮控辩对决）
# ─────────────────────────────
# 特殊形式：相同证据不同解读，Zack 逐轮赢
# 注：Mickey 在本 Expose 中是辩方（不是真说谎者）——他用辩护推理形式
#     逼 Zack 把案件链条逐环说清楚。最终 Mickey 投降认输。

expose:
  target: mickey
  target_talk: L6_expose_mickey
  location: "SC3011 Mickey 办公室"
  total_rounds: 5
  is_liar: true   # 形式上 Mickey 是 Expose 对象，但他是友方辩护人
  player_inquiry: null

  context: |
    Mickey 与 Zack 进入正式控辩——五轮辩论。
    Mickey 的开场底线：'如果真的是 Mary 蓄意杀人，那么即使牺牲我的名誉，
    我也会重新提起上诉。'
    控辩对决里 Mickey 每轮提出一个反诉假设，Zack 用既有证据 + 新发现逐条击破。
    R4 含玩家三选项（涂油的人是谁），引导玩家做出"Helen + Mary 合谋"的认知。

  round_1:
    lie: "Thomas 计划杀害 Mary，案发当晚准备将 Mary 推下天台"
    lie_source: 3014001  # Mickey 自己 L4 市政厅证词，被本 Loop 引为辩护立场（沿用其'Mary 合法杀人'的辩护主张）
    usable_evidence:
      - id: 3601
        name: "法医鉴定报告（0.25% BAC）"
        用途: "Thomas 血液酒精浓度 0.25%——已无有效攻击能力，不可能完成'把人推下天台'的动作"
      - id: 3046001
        name: "Foster 证词（已无有效攻击能力）"
        用途: "Foster 的医学判断锚定 0.25% 的实际意义"
    result: |
      Zack 推理：
      - Thomas 0.25% 已无有效攻击能力 → 不可能由 Thomas 推 Mary 下楼
      - 只能是 Mary + Helen 合力推下了 Thomas

  round_2:
    lie: "Thomas 不会在要杀人的时刻喝多，按照你的意思是有人给他灌酒？"
    lie_source: 3014001
    usable_evidence:
      - id: 3106
        name: "Old Crow 药用威士忌空瓶（L1，天台）"
        用途: "天台角落的空瓶是 Old Crow 药用威士忌"
      - id: 3307
        name: "Helen 家的 Old Crow 药用威士忌（L3）"
        用途: "Helen 家有同款 Old Crow 药用威士忌"
      - id: 3205
        name: "Thomas 家的廉价酒照片（L2）"
        用途: "Thomas 家中只有廉价自酿私酒——他不可能自带 Old Crow 药用威士忌上天台"
    result: |
      Zack 推理（形成假设）：
      - 天台的 Old Crow 药用威士忌不可能是 Thomas 自己的——来源指向 Helen
      - 当晚是 Helen 在灌 Thomas 酒，Thomas 在不知情下被灌醉

  round_3:
    lie: "假设不成立——当天 Helen 应该是在听到吵架声后才去现场的；不然如果油迹是之前粘上去的，为什么门把手内侧没有呢？"
    lie_source: 3014001
    usable_evidence:
      - id: 3086001
        name: "Seamus 证词（Helen 19 号晚上把家里最后一瓶润滑油送给 Seamus）"
        用途: "Helen 家'最后一瓶'润滑油在19 号晚上就送出了——案发当晚 Helen 家根本没有油源，手上不可能临时蹭到"
    result: |
      Zack 推理：
      - 19 号晚上 Helen 把最后一瓶油送出后，家里就没有油了
      - 所以门把手上的油迹不一定是当晚弄到的——这个'油的时间链'颠覆了 Mickey 的反诉
      - 油迹的来源时间往前推：陷阱布置那天（19 号）

  round_4:
    lie: "按我的理解，应该是 Helen 几天前在家里打翻了润滑油后、当晚不小心手上蹭到了；猫尾巴上也有油就是这个原因。听到 Mary 呼救后她去案发现场时急着开门蹭到门外侧把手上，内侧没有油是因为回来时 Mary 帮忙开的门。所以事实就是 Thomas 先进入现场，Helen 进入时不小心蹭到了，之后跟着 Mary 一起返回"
    lie_source: 3014001
    usable_evidence:
      - id: 3108
        name: "尸体手部油迹（L1）"
        用途: "尸体指尖与掌心有油（手背干净）——Thomas 自己接触过外侧把手油迹；这意味着 Thomas 比 Helen 早到天台 + 开门时蹭到外侧油"
    result: |
      Zack 推理：
      - 尸体指尖与掌心有油，说明 Thomas 曾接触外侧把手油迹，并且在 Mary 到达前就已经进入天台
      - 如果 22:00 真是 Thomas 给 Mary 开门，内侧把手也应该留下油
      - 内侧把手干净，只能说明当时给 Mary 开门的是手上没有油的 Helen，而 Thomas 那时已经醉倒或无力行动
      - **玩家三选项**：那么涂油的人只能是——

    player_choice:
      prompt: "涂油的人只能是——"
      options:
        - id: A
          label: "Helen 自己"
          zack_reasoning: "Helen 一个人在让门把手沾上油的布置陷阱阶段，出门离开的时候必定也会让内侧门把手沾上油……应该有人在她身边帮忙才对"
          outcome: incorrect
        - id: B
          label: "Helen 和 Thomas"
          zack_reasoning: "Thomas 那天下午被 Mary 拉去买祈祷披肩，根本没上过天台——他不可能和 Helen 一起涂油布置"
          outcome: incorrect
        - id: C
          label: "Helen 和 Mary"
          zack_reasoning: "……Mary 要是提前知道了这个计划呢？她会不会和 Helen 一起上天台、帮她布置现场？"
          outcome: correct

  round_5:
    lie: "即使成立也有可能是其他人和 Helen 一起制造了这次的计划，没有证据能够说明是 Mary"
    lie_source: 3014001
    usable_evidence:
      - id: 3502
        name: "垫板上的手链压痕（L5）"
        用途: "Bernard 垫板上压痕呈手工花形、一片花瓣有明显缺口——这种独有特征只对应 Mary 母亲遗物的手链"
    auxiliary_evidence:
      - id: 3202
        name: "Mary 的花形手链（L2）"
        用途: "辅助——比对 Mary 手链与垫板压痕的花瓣缺口形状一致"
    result: |
      Zack 推理：
      - Bernard 垫板上的手链压痕特征对应 Mary 母亲遗物手链上的独有花瓣缺口
      - 那个去 Bernard 桌上主动咨询"欠贷款 + 买保险的人意外死后处理方式"的女人就是 Mary
      - **第三重反转完成**：Mary 不是受害者，是冷静的策划者

  post_expose:
    description: |
      Zack 辩论成功。
      Mickey 准备投降认输——让 Zack 拿上他整理好的材料，两人一起去找法官。
      Zack 将证据拿了起来——
    new_evidence_gained: null
    player_knowledge_gained:
      - "Mary 是冷静策划者：识破 Thomas 杀妻骗保计划后，与 Helen 联手反杀"
      - "Mary 即'戴花瓣缺口手链去 Bernard 桌上主动咨询'的女人"
      - "Mary + Helen 19 号一起上天台预先布置陷阱"
      - "20 号下午 Mary 借口买祈祷披肩支开 Thomas，让他误以为 Helen 独自去布置陷阱（实则陷阱 19 号已由 Mary+Helen 布好，当天无人上天台）"
      - "当晚 Helen 21:00 带 Thomas 上天台灌酒；Mary 22:00 到达，Helen 从内侧开门；22:30 两人合力推下"

    # ── 玩家二选项（结局分叉） ──
    # 两条 outcome 都会进入下方共用的 ending_sequence（大纲第 587-589 明示：
    # 无论销毁/拿起，Mickey 都问 Zack 要不要告诉 Emma；Zack 都表明不告诉的理由）。
    # 选项差异仅在于 Zack 此刻持有/不持有证据，以及后续追诉可能性——影响 Unit4+。
    player_choice:
      prompt: "证据就在手中——"
      options:
        - id: destroy
          label: "销毁证据 · 放过 Mary"
          outcome: "Zack 销毁了证据。Mickey 问 Zack 要不要告诉 Emma 这一切；Zack 表示如果说了 Emma 肯定执着于真相——还是算了。"
        - id: take
          label: "拿起证据"
          outcome: "Zack 拿走了证据。Mickey 同样问 Zack 要不要告诉 Emma；Zack 表示如果说了 Emma 肯定执着于真相——还是算了。证据被保留，案件后续追诉可能性留待 Unit4+。"

# ─────────────────────────────
# 五、结局序列（🎭 大纲明示的多场景收尾）
# ─────────────────────────────
# 注：以下为大纲第 591-631 行明确写明的结局序列，
#     无论玩家在 player_choice 选哪条，本结局序列都会发生（只是 Zack 心境不同）。

ending_sequence:
  - id: ending_office_group
    type: story_dialogue
    scene_name: "L6 结局 · Zack侦探事务所 · Emma/Mary/Helen"
    location: "Zack 侦探事务所"
    characters: [Zack, Emma, Mary, Helen]
    description: |
      Emma 从报社回到事务所，与 Zack 谈到 Bernard 已招供银行违规。
      Zack 没有把 Mary 蓄意谋杀 Thomas 的真实角色告诉 Emma。
      随后 Mary 携 Helen 登门道谢：Mary 准备将房子卖给 TideWater 还债，
      Helen 提出让 Mary 与自己同住，两人一起打工偿还余债。

    L6_ending_emma:
      talk: L6_ending_emma
      is_liar: false
      motive: "从报社回事务所碰头，确认 Bernard 招供后的银行调查结果"
