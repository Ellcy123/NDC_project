# ═══════════════════════════════════════
# PART 3: 辩论（Expose — 特殊形式）
# ═══════════════════════════════════════
#
# 场景: Mickey办公室(SC3011) → ⚔️辩论(Mickey)
# 辩论设计: 5轮控辩对决
# 形式: Mickey设定议题（辩护论点），Zack用证据反驳
# Mickey的Talk见上方 scenes → SC3011 → mickey_002
#
# ⚠️ 特殊：这不是传统指证。Mickey不是在说谎，而是用相同证据做不同解读。
# Mickey的"辩护论点"替代传统的"谎言"。

expose:
  target: "Mickey (04) — 辩护律师角色"
  format: "控辩辩论（非传统指证）"
  location: "Mickey办公室"
  total_rounds: 5

  # ── 第一轮：Thomas没有攻击能力 ──
  # 3601（L6新证据）证明0.25%下无攻击能力，含L1尸检数据的补充解读（配合3111 Foster坠楼分析）
  round_1:
    mickey_argument: "Thomas打了Mary多少年？酗酒者的暴力是肌肉记忆，不需要清醒。0.25%对这种人不算什么。Margaret亲眼看到他在推Mary。正当防卫，没问题"
    usable_evidence:
      - id: 3601
        name: "Foster血液酒精浓度补充分析报告"
        用途: "0.25%浓度下肌肉协调性严重受损，无法完成推人/抓人等复杂动作。附带指甲组织补充分析：组织量极少（<0.1mg），不像剧烈挣扎，更像被推时本能反应"
        来源: "L6新证据（含L1尸检数据的补充解读）"
    result: |
      Zack用Foster补充分析击破"酗酒者肌肉记忆"论：
      - 0.25%下连走直线都做不到，更不可能主动攻击
      - 指甲下组织量极少=被推时本能反应，不是剧烈挣扎
      - Mickey退守："Helen那边我说不过你——但Mary不是策划者"

  # ── 第二轮：Helen没有反悔（V2：Jameson三件套证明从头合谋，非临时心软） ──
  # §B6.1 R2：3107+3408+3217 Jameson三件套击破"Helen可能最后心软没执行计划"
  round_2:
    mickey_argument: "Helen可能最后心软了，没执行计划。地面油是准备阶段的残留，不代表她当晚还在执行计划"
    usable_evidence:
      - id: 3107
        name: "Jameson空瓶"
        用途: "楼顶Jameson空瓶（L1发现）——Thomas欠债买不起$3好酒，这瓶酒不是Thomas自带的"
        来源: "L1证据"
      - id: 3408
        name: "Helen家Jameson威士忌"
        用途: "Helen家同品牌Jameson——楼顶空瓶与Helen家同款，Helen特意带高度数Jameson灌Thomas"
        来源: "L3证据"
      - id: 3217
        name: "Thomas家廉价酒照片"
        用途: "Thomas平时只喝廉价酒——$3 Jameson根本不是Thomas自带，是Helen从家里带来的"
        来源: "L2证据"
    result: |
      Zack用Jameson三件套证明Helen从头合谋，非临时心软：
      - Helen特意带高度数Jameson（40%ABV）=有意让Thomas快速醉倒
      - Thomas欠债根本买不起Jameson=酒是Helen带来的
      - 从头合谋，而非临时心软
      - Mickey退守："进入R3"

  # ── 第三轮：油迹时间线（V2：Seamus最后一瓶油+门内侧干净，推翻"听到吵架才去"） ──
  # §B6.1 R3：3606 Seamus最后一瓶油 + 3402门内侧干净 + 时间线还原
  round_3:
    mickey_argument: "Helen是听到吵架后才去，不然门把手油迹怎么解释——临时上楼不是合谋"
    usable_evidence:
      - id: 3606
        name: "Seamus持有的最后一瓶轮椅润滑油"
        用途: "案发前一天Helen已把家里最后一瓶油送给Seamus，说'以后也不需要了'——提前处理好了所有油，说明是事先计划好的行动，不是临时起意"
        来源: "L6新证据（SC3006 Seamus）"
      - id: 3402
        name: "楼顶门内侧把手照片（干净）"
        用途: "门内侧（天台侧）干净——若Helen临时听到吵架才上去，从楼梯间侧进入，油迹分布与门内侧干净吻合；但送油/提前计划说明Helen早就准备好了，不是临时决定"
        来源: "L4证据"
      # 时间线还原：完整链——案发前一天送油（预谋）→ 案发当晚带Jameson上楼（执行）→ 时间线精确配合
    result: |
      Seamus最后一瓶油+门内侧干净→时间线还原完整链：
      - 案发前一天Helen已送出最后一瓶油"以后不需要了"=事先就打算不再需要油
      - 门内侧（天台侧）干净="听到吵架临时去"油迹说法不成立
      - 完整时间线：提前处理油→带Jameson上楼→Helen从头执行合谋计划
      - **进入A/B/C推理选项**：当天涂油/留下油迹的人只能是——
        A: Helen自己 → 短反馈后汇合
        B: Mary和Thomas → 短反馈后汇合
        C: Helen和Mary（正确）→ 推理演出继续
      - Mickey退守："就算有预谋，那也是求生不是谋杀"

  # ── 第四轮：经济动机（情感高潮） ──
  # L5雏菊压痕+Bernard供述证明Mary有经济动机
  # §0.5决策：3509不作为独立usable_evidence，通过3507出示+推理演出完成；3207通过对白关联演出
  round_4:
    mickey_argument: "就算有预谋，那也是被家暴者的求生。Mary去银行不是为了钱——是为了确认如果Thomas死了，她和Emily能不能活下去"
    usable_evidence:
      - id: 3507
        name: "垫板花形压痕照片"
        用途: "雏菊五瓣花形压痕（1.2cm）=有戴花饰女人长时间坐在对面；通过推理演出关联3207 Mary手链（不单独出示3207/3509），确认来访者就是Mary，主动研究保险条款"
        来源: "L5证据"
      # 3207 Mary手链照片（L2获得）通过Zack/Emma对白指出"垫板花形——和Mary那条雏菊手链"关联，不作为独立usable_evidence出示
      # 3509花形压痕比对报告：按§0.5决策不作为独立可出示证据，通过系统层推理演出完成
      # Bernard供述引用：Mary询问的是"投保人死了怎么赔"
    result: |
      雏菊压痕+Bernard供述=Mary有明确的经济动机：
      - 3507垫板花形压痕=有女人来过Bernard桌前；Emma/Zack对白：花形与Mary雏菊手链吻合
      - Mary主动研究了Thomas死后的保险赔付
      - 询问角度是"投保人死了"而非"被保险人死了"
      - **Mickey反击**："一个母亲在确认生存手段。Emily八岁"
      - 没有赢家——Zack辩论获胜但道德撕裂
      - Mickey退守："别再查了。让案子结了吧"

  # ── 第五轮：Margaret的认知偏差（最终高潮） ──
  # ⚠️ R5特殊：Mickey不再辩护，而是主动请求停止 + 主动出示证据
  # 3610由Mickey自己现场勘查制作（不经Foster），R5中Mickey主动出示
  round_5:
    mickey_action: "请求停止辩论 + 主动出示3610"
    evidence:
      - id: 3610
        name: "楼顶目击条件实地勘查记录"
        用途: "仰角65度+护栏遮挡+深夜无光=Margaret从地面不可能看清楼顶具体动作"
        来源: "L6新证据——Mickey自己做的现场勘查"
        出示方式: "Mickey主动出示（非Zack选择）"
      - id: 3406001
        name: "Margaret目击证词"
        用途: "L4获取的证词——用'好像''应该是'等模糊词，与物理验证结果呼应"
        来源: "L4证词"
    result: |
      Mickey揭示Margaret证词的认知偏差：
      - 65度仰角+1.1米护栏=只能看到肩部以上模糊剪影
      - 深夜22:30+最近煤气灯15米外=几乎完全看不见
      - 推搡vs拉扯vs搀扶——从地面完全无法区分
      - Margaret不是在说谎——10年目睹Thomas家暴Mary，
        大脑自动将模糊观察解读为"Thomas在攻击Mary"
      - "每个人都基于自己的理解选择了同情Mary"：
        Margaret（认知偏差）+ Foster（专业沉默）+ Helen（共谋保护）
      - 进入玩家选择

