        awareness:
          - content: "Bernard被拆穿——系统性诱导Thomas骗保"
            trigger: "L5 Expose结果"
          - content: "正当防卫判决已下"
            trigger: "法庭判决"

        active_topics:
          - "0.25%血液酒精浓度的完整生理影响（补充分析的核心内容）"
          - "原报告用词保守的原因（'不想让受害者因技术细节被起诉'）"

        withheld_topics: []  # L6最终循环

        # ── 2. 玩家询问意图 ──
        player_inquiry:
          - "0.25%酒精浓度到底意味着什么？Foster原报告为什么用词保守？"  # 10

        # ── 3. 可提取证词 ──
        testimony_ids: []  # 信息通过36-E-01报告呈现，不额外提取证词

        # ── 4. 鉴赏力 ──
        connoisseur:
          - type: quiz
            node: "#101"
            trigger_mode: "C"
            question: "Zack与Foster聊到案件全靠化学分析推进，展示对法医技术局限的了解"
            answer: "血迹只能确定是不是人血，确认不了是谁的（来源：L1 SC3005 Foster对话）"
            reward: "Foster：'你知道吗，德国人已经能用血型来排除嫌疑人了——但我们这边的法官还不认。也许再过十年，法医能做到更多。但目前……我能做的，已经是这个时代的极限了。'"

  # ── SC3011 街角 — Mickey Talk（新场景） ──
  - id: 3011
    name: "街角"
    # 解锁契机: 开篇中Mickey来警局找Zack说"跟我来谈谈"
