# ============================================================
# Loop 6 — 辩论
# 本循环形式: 控辩辩论（Zack控方 vs Mickey辩方，非传统指证）
# 核心揭示: Mary和Helen是预谋合谋，但每个知情者都基于自己的理解选择了同情Mary
# 前序事件: Loop 5确认Bernard系统性诱导Thomas骗保，Mary曾拜访Bernard询问"投保人死了怎么赔"
# 时间: 1928年11月23日 约18:00（案发后+67.5小时，循环5结束后+8小时）
# ============================================================

# ═══════════════════════════════════════
# 玩家视角（本循环）
# ═══════════════════════════════════════

player_context:
  chapter_goal: "收集最后的证词，拼出完整真相"
  goals:
    primary: "Mary和Helen是正当防卫，还是预谋杀人？"
    secondary:
      - "Thomas在0.25%酒精浓度下真的有攻击能力吗？"
      - "Helen当晚到底是'心软'还是从头到尾在合谋？"
      - "Mary的45分钟空白到底在做什么？"
      - "Margaret的目击证词可靠吗？"
  known_facts:
    # ── L1 ──
    - "Thomas不是自杀——现场有女性在场，且Thomas不是主动跳下的"
    - "楼顶有约38码女性脚印，与Thomas面对面站在护栏边（深夜22:30）"
    - "脚印深浅不一（实为两个体重不同的女人，Loop 4已揭晓）"
    - "Morrison佛系甩手：Thomas打老婆，整栋楼都知道，脚印十有八九是Mary的"
    - "'失足'可能性未排除——开放性结论"
    - "Jameson空瓶：穷酒鬼买不起$3好酒，来源存疑"
    - "Morrison暗示Continental银行打过招呼，案件比想象的复杂"
    # ── L2 ──
    - "Mary伪造了教堂不在场证明——蜡烛仅烧15分钟，提前背了第23章内容，走前挪书签留蜡烛"
    - "Mary早就知道Thomas和Helen的关系——三个月前发现衬衫口红印，藏在衣柜深处不洗"
    - "Mary在楼顶护栏边与Thomas争吵并有肢体接触——祈祷披肩织物在Thomas袖扣上"
    - "Mary坚持Thomas'失足'掉下去，坚称'只有Thomas和我'"
    - "Mary被追问Helen是否在楼顶时明显心虚——快速否认，眼神闪烁"
    - "Mary报警三次家暴无人管"
    - "Thomas和Helen有'不清不楚的关系'（Mary供出Helen名字）"
    - "Thomas钱包里有一把形状特殊的钥匙——不像普通房门钥匙"
    - "脚印深浅不一仍未解释——Mary辩称'地面不平整'"
    # ── L3 ──
    - "Helen和Thomas有完整的杀妻骗保计划——$10,000人寿保险，受益人Thomas，计划推Mary坠楼伪装意外"
    - "Helen参与准备工作：以'检查漏水'为由借钥匙串配楼顶安全门钥匙、在地面涂轮椅维护油"
    - "Helen声称被Thomas胁迫参与——'他威胁毁掉我的名声'"
    - "Thomas的计划：约Mary到楼顶 → 推Mary → 地面有油Mary会打滑站不稳 → 伪装意外骗保还$12,000债务"
    - "Thomas欠Continental银行$12,000高利贷"
    - "Helen始终坚持'那晚在家'——成功守住'不在场'防线"
    - "第二组女性脚印仍未解释——Helen否认在场但脚印证据暗示另有隐情"
    - "Bernard Wells（银行保险代理人）见证了Thomas咨询'如何让意外看起来合理'，Helen在场"
    - "Helen童年目睹父亲家暴母亲（为后续动机铺垫）"
    # ── L4 ──
    - "Helen当晚在楼顶——门把手油迹+油迹二方比对(系统层)证明Helen独自从楼梯间侧上楼顶"
    - "两双相似鞋子+脚印深浅不一的真相：Mary和Helen穿着相似的鞋（同码数、同类型），Loop 1的脚印是两个体重不同的女人的混合脚印"
    - "Jameson威士忌是Helen从家里带上楼顶的——母亲去世后留着的'药酒'"
    - "Helen持续给Thomas灌酒——0.25%需要持续补充至少一小时，不是'看一眼就走了'"
    - "Helen解释'心软'：以为Thomas只是想吓唬Mary，直到那晚确认要动手才决定灌醉他阻止"
    - "Thomas扑向Mary时Helen从身后拉住Thomas，Mary推开Thomas，Thomas失去平衡翻过护栏"
    - "Helen和Mary事后商量好隐瞒Helen在场——'两个女人把一个男人弄死了，谁会信是防卫？'"
    - "Helen选择带Jameson（40%ABV）而非Thomas平时喝的廉价酒——度数更高，Thomas上头更快更容易被灌醉。Helen解释为'手边只有母亲的酒'"
    - "Helen手伤真相：涂油时被护栏锋利处割伤（非'修轮椅'），解释了下午涂油时Thomas帮开门"
    - "结论：正当防卫——Thomas要杀Mary，Helen和Mary联手反抗"
    # ── L5 ──
    - "Bernard亲手在报纸上标注了保险条款关键段落，教Thomas理解'意外死亡'的赔付条件"
    - "批注是在Bernard办公桌上完成的——垫板压痕与报纸批注笔迹轨迹完全吻合，是面对面教学"
    - "Bernard以'专业咨询'为名，实质引导Thomas将模糊的念头具体化为可执行的骗保方案"
    - "银行对高风险贷款客户有系统性'处理方案'——保险理赔回收贷款+代理人提成，或客户出事没收房产，银行都不亏"
    - "垫板边缘发现雏菊花形压痕，与Mary手链上的雏菊吊坠完全吻合——Mary来过Bernard办公室"
    - "Mary在Thomas死前曾独自拜访Bernard，询问的是'投保人死了怎么赔'——不是'被保险人死了怎么赔'"
    - "Bernard拒绝确认来访女人身份，以'银行规定不能透露客户隐私'为由搪塞"
  new_directions:
    - direction: "Thomas可能根本没有攻击能力"
      trigger: "L5结束后Zack回顾：0.25%酒精浓度+指甲下组织量极少——Foster原报告用词'相当高的浓度'是否保守了？"
    - direction: "正当防卫判决可能需要推翻"
      trigger: "Mary去银行问'投保人死了怎么赔'——不是防御，是研究Thomas死后的利益"
  post_expose_knowledge:
    - "Thomas在0.25%血液酒精浓度下已无攻击能力——连挣扎都做不到，更不可能主动攻击（Foster补充分析）"
    - "Helen没有'心软'——地面油在Thomas一侧是给Thomas准备的陷阱，Helen'检查油'而非擦油，从头到尾是合谋"
    - "Mary的45分钟空白（20:00-20:45）与Helen在楼顶的时间线精确配合——不是恐惧冻结，而是合谋者的时间协调"
    - "Mary事先研究过保险条款（Bernard供述+雏菊压痕），有明确的经济动机"
    - "Margaret的目击证词源于认知偏差——物理条件（65度仰角+护栏遮挡+深夜无光）决定她不可能看清楼顶细节，10年目睹家暴的记忆让她自动将模糊观察解读为'Thomas在攻击Mary'"
    - "Foster在原报告中用词保守（'相当高的浓度'而非'无攻击能力'），承认'不想让一个受害者因为技术细节被起诉'"
    - "每个知情者（Foster、Margaret、Helen）都基于自己的理解选择了同情/保护Mary"
    - "Zack最终选择销毁证据——基于自己对Mary处境的理解，而非被Mickey说服"

# ═══════════════════════════════════════
# PART 1: 开篇
# ═══════════════════════════════════════
#
# 场景状态表: 警局(SC3004) → 🎬开篇
# Zack独白整理L5发现（Mary去银行+雏菊压痕），表达深深的不安。
# Mickey来访说"跟我来谈谈"，触发进入自由探索。

opening:
  scene_id: 3004
  characters: [Zack, Emma, Mickey]
  purpose: "Zack整理L5发现表达不安 → Mickey来访触发自由探索 → 为辩论做铺垫"
  talk: emma_010

  emma_010:
    is_liar: false
    motive: "陪伴Zack整理思路——L5发现Mary可能是主谋后，Emma也在消化这个信息"
    mindset: "沉重但清醒——不急着下结论，但意识到正当防卫判决可能有问题"

    knows:
      - "Bernard系统性诱导Thomas骗保（L5 Expose全过程）"
      - "垫板雏菊花形压痕与Mary手链吻合——Mary来过Bernard办公室"
      - "Mary询问的是'投保人死了怎么赔'"
      - "正当防卫判决已下"

    does_not_know:
      - "Thomas在0.25%下是否真有攻击能力（Foster补充分析尚未出）"
      - "Margaret的目击证词是否可靠"
      - "Mary和Helen到底是正当防卫还是预谋"
      - "推翻正当防卫的法律后果"

    lie: null

    # ── 4. 鉴赏力 ──
    connoisseur: []

  # Mickey在开篇短暂出现（来警局找Zack），正式Talk在SC3011
  # Mickey台词仅限："Zack。""我听说你去了Continental银行？""跟我来。我需要跟你谈谈。"

