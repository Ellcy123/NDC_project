# ============================================================
# Loop 6 — 辩论
# 本循环形式: 控辩辩论（Zack控方 vs Mickey辩方，非传统指证）
# 核心揭示: Mary和Helen是预谋合谋，但每个知情者都基于自己的理解选择了同情Mary
# 前序事件: Loop 5确认Bernard系统性诱导Thomas骗保，Mary曾拜访Bernard询问"投保人死了怎么赔"
# 时间: 1928年11月23日 约18:00（案发后+67.5小时，循环5结束后+8小时）
# ============================================================

# ═══════════════════════════════════════
# 玩家视角（本循环）
# ═══════════════════════════════════════

player_context:
