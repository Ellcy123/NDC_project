#   A. 情感铺垫——Margaret/Mary/Helen让玩家亲眼看到Mary的惨状
#   B. 逻辑松动——Mickey以律师视角分析推翻正当防卫的现实后果
#   C. 证据获取——Foster实验室获取36-E-01（不再是开篇硬塞）

scenes:
  # ── SC3010 Margaret鞋坊（新NPC Margaret） ──
  - id: 3010
    name: "Margaret鞋坊"
    # 解锁契机: L5发现Mary可能是主谋后，Zack想了解Mary的真实生活状况
    # Thomas公寓楼区域在L1起可进入，L6增加Margaret鞋坊作为新可对话位置
    npcs:
      margaret_002:
        # ── 基本信息 ──
        talk: margaret_002
        is_liar: false
        motive: "儿子来看她，她很高兴——但Zack问起Mary的事，她的情绪被牵动，开始回忆这些年的片段"
        mindset: "糊涂但情感真实——记忆碎片化，时间线混乱，把不同年份的事混在一起说，但情绪清晰、关心真切"

        # ── 1. NPC 已知信息 ──（模式B：再次出场）
        awareness:  # 以下为L6新获知信息，基础知识见 loop4_state → margaret_001
          - content: "正当防卫判决已下，案子结了"
            trigger: "社区消息/Zack告知"

        active_topics:
          - "Mary被Thomas打的碎片记忆——说不清哪年哪次，但记得'那孩子抱着Emily在走廊里哭'"
          - "三次报警无人管——细节记不全，但'没人来'记得很牢"
          - "Emily——'那么小的孩子，什么都看到了'"
          - "Thomas酗酒——'喝了酒就不是人了'"

        withheld_topics: []  # L6最终循环，无需保留

        # ── 2. 玩家询问意图 ──
        player_inquiry:
          - "Mary这些年过得怎么样？（Zack想了解Mary的处境）"  # 9
          - "Thomas打Mary的事你知道多少？（Margaret作为邻居的目击）"  # 8

        # ── 3. 可提取证词 ──
        testimony_ids: []  # 无新增，L4的3406001保持不变

        # ── 4. 鉴赏力 ──
        connoisseur:
          - type: quiz
            node: "#103"
            trigger_mode: "B"
            question: "Margaret回忆Mary这些年的遭遇，Zack展示对社区沉默的理解"
            answer: "她报过三次警，警察问一句'没事吧'就走了（来源：L3 SC3006 Seamus对话）"
            reward: "Margaret：'我看着那孩子脸上带着青印去杂货店……看了十年。法律管不到人家前门以里——The law stops at the front door——这是规矩，不是我们不管。'"

  # ── SC3013 公寓楼门口（Mary回访对话，新解锁） ──
  # 解锁契机: L5发现Mary可能是主谋，但正当防卫已判——Zack需要去看看Mary的状态
  # 解锁原因: 此前案子方向是'谁在楼顶''保险计划是谁策划的'，Mary家方向不涉及
  - id: 3013
    name: "公寓楼门口"
    npcs:
      mary_002:
        # ── 基本信息 ──
        talk: mary_002
        is_liar: false
        motive: "正当防卫判决后松了口气但不轻松——面对Zack来访保持克制，不会主动透露任何事"
        mindset: "安静、疲惫、警觉——案子结了但Zack又来，不确定他想做什么"

        # ── 1. NPC 已知信息 ──（模式B：再次出场）
        awareness:  # 基础知识见 loop2_state → mary_001
          - content: "正当防卫判决已下"
            trigger: "法庭判决"
          - content: "Helen的情况也已明确"
            trigger: "判决过程"

        active_topics:
          - "正当防卫判决后的生活——安静、疲惫"
          - "Emily——Mary一切行动的核心理由"

        withheld_topics: []  # L6最终循环

        # ── 2. 玩家询问意图 ──
        player_inquiry:
          - "正当防卫判决后，你现在怎么样？"  # 7

        # ── 3. 可提取证词 ──
        testimony_ids: []  # 无新增

        # ── 4. 鉴赏力 ──
        connoisseur: []

  # ── SC3003 Sullivan家客厅（环境叙事，无NPC） ──
  # 场景价值在于视觉/情感叙事：补过的墙洞、Emily的画、生活拮据的迹象
  # 玩家可选择进去观察，作为辩论前的情感铺垫

  # ── SC3008 Helen家（复用场景，新对话） ──
  - id: 3008
    name: "Helen家"
    # Helen家在L3起可进入，L6增加新对话内容（判决后态度变化）
    npcs:
      helen_003:
        # ── 基本信息 ──
        talk: helen_003
        is_liar: false
        motive: "判决后不再那么紧绷——愿意说说Mary的苦和自己的经历，但不会主动承认合谋"
        mindset: "释然中带着疲惫——十年的秘密终于有了结局，但不是轻松的那种"

        # ── 1. NPC 已知信息 ──（模式B：再次出场）
        awareness:  # 基础知识见 loop3_state → helen_001, loop4_state → helen_002
          - content: "正当防卫判决已下"
            trigger: "法庭判决"

        active_topics:
          - "Mary这些年过得很苦（Helen视角的叙述）"
          - "自己的童年经历——父亲家暴母亲，母亲后来精神失常（L3已有伏笔）"

        withheld_topics: []  # L6最终循环
        # ⚠️ 不能说: 任何关于预谋/合谋的细节（正当防卫已判，她没理由自证预谋）

        # ── 2. 玩家询问意图 ──
        player_inquiry:
          - "Mary这些年……（Helen视角的Mary）"  # 8
          - "你自己当年……（Helen的童年家暴经历）"  # 7

        # ── 3. 可提取证词 ──
        testimony_ids: []  # 无新增

        # ── 4. 鉴赏力 ──
        connoisseur: []

  # ── SC3005 Foster实验室（复用场景，新内容） ──
  - id: 3005
    name: "法医办公室"
    # L5已建立Foster与Zack的合作关系，L6 Zack申请补充分析0.25%酒精浓度的完整生理影响
    evidence:
      - id: 3601
        name: "Foster血液酒精浓度补充分析报告"
        note: "关键——R1击破证据。补充L1原报告（31-T-01），揭示0.25%下无攻击能力"
    npcs:
      foster_006:
        # ── 基本信息 ──
        talk: foster_006
        is_liar: false
        motive: "Zack追问0.25%的完整含义——Foster这次选择说出完整真相，不再用保守措辞"
        mindset: "释然但沉重——承认原报告用词保守是有意为之"

