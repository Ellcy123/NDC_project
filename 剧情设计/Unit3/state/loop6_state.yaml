#   SC3007 教堂                  → 🔒无新证据
#   SC3008 Helen家               → 🔓对话(Helen)
#   SC3009 Continental银行公共区域 → ⏸️无新线索
#   SC3010 Margaret鞋坊          → 🔓对话(Margaret)
#   SC3011 街角                  → 🔓对话(Mickey)→⚔️辩论
