# ═══════════════════════════════════════
# PART 3: 辩论（Expose — 特殊形式）
# ═══════════════════════════════════════
#
# 场景: 街角(SC3011) → ⚔️辩论(Mickey)
# 辩论设计: 5轮控辩对决
# 形式: Mickey设定议题（辩护论点），Zack用证据反驳
# Mickey的Talk见上方 scenes → SC3011 → mickey_002
#
# ⚠️ 特殊：这不是传统指证。Mickey不是在说谎，而是用相同证据做不同解读。
# Mickey的"辩护论点"替代传统的"谎言"。

expose:
  target: "Mickey (04) — 辩护律师角色"
  format: "控辩辩论（非传统指证）"
  location: "街角"
  total_rounds: 5

  # ── 第一轮：Thomas没有攻击能力 ──
  # 36-E-01（L6新证据）证明0.25%下无攻击能力，L1尸检报告补充指甲组织分析
  round_1:
    mickey_argument: "Thomas打了Mary多少年？酗酒者的暴力是肌肉记忆，不需要清醒。0.25%对这种人不算什么。Margaret亲眼看到他在推Mary。正当防卫，没问题"
    usable_evidence:
      - id: 3601
        name: "Foster血液酒精浓度补充分析报告"
        用途: "0.25%浓度下肌肉协调性严重受损，无法完成推人/抓人等复杂动作。附带指甲组织补充分析：组织量极少（<0.1mg），不像剧烈挣扎，更像被推时本能反应"
        来源: "L6新证据（含L1尸检数据的补充解读）"
    result: |
      Zack用Foster补充分析击破"酗酒者肌肉记忆"论：
      - 0.25%下连走直线都做不到，更不可能主动攻击
      - 指甲下组织量极少=被推时本能反应，不是剧烈挣扎
      - Mickey退守："Helen那边我说不过你——但Mary不是策划者"

  # ── 第二轮：Helen没有反悔 ──
  # L3地面涂油示意图+L4证据证明Helen从头到尾在合谋
  round_2:
    mickey_argument: "Helen心软了——她涂了油，但最后没推Thomas。地面油是准备阶段的残留，不代表她当晚还在执行计划"
    usable_evidence:
      - id: 3308
        name: "地面涂油示意图"
        用途: "地面油在Thomas一侧——这是给Thomas准备的陷阱，不是给Mary的"
        来源: "L3证据"
      # L4 Helen证词引用：Helen当晚'检查油'而非擦油——有足够时间擦油却没擦
      # L4 第二组脚印+门把手油迹引用：Helen在场的物证链
      - id: 3309
        name: "第二组脚印特写"
        用途: "脚印矛盾——Helen声称'心软后一直在倒酒'，但脚印分布不支持"
        来源: "L3证据"
    result: |
      Zack证明Helen从头到尾在合谋：
      - 地面油在Thomas一侧=给Thomas准备的陷阱
      - Helen"检查油"而非擦油=确认陷阱就位
      - 有足够时间擦油却没擦=从没打算放弃计划
      - Mickey退守："Mary不是策划者——45分钟是恐惧"

  # ── 第三轮：Mary的45分钟不是恐惧（转折点） ──
  # L2蜡烛残骸（教堂时间线）+Timeline系统重建证明时间精确配合
  round_3:
    mickey_argument: "Mary的45分钟空白是恐惧冻结反应。一个被家暴十年的女人听到楼顶传来动静——她不是在观望，她是吓呆了"
    usable_evidence:
      - id: 3201
        name: "蜡烛残骸"
        用途: "蜡烛仅燃烧约15分钟——证明Mary在教堂停留极短即离开，与L4 Helen灌酒时间线精确配合"
        来源: "L2证据"
      # Timeline系统：完整时间线重建（Mary离开教堂 → 45分钟空白 → 对照Helen楼顶时间线）
      # R2已用3309（第二组脚印）证明Helen角色，R3聚焦时间线维度
    result: |
      时间线精确配合=合谋者时间协调，不是恐惧冻结：
      - Mary 20:00离开教堂，20:45才出现——45分钟精确对应Helen在楼顶的准备时间
      - **Mickey反击**（转折）："她报警三次，Zack。三次。没有一个人帮她"
      - Zack第一次沉默
      - Mickey退守："就算有预谋，那也是求生不是谋杀"

  # ── 第四轮：经济动机（情感高潮） ──
  # L5雏菊压痕+Bernard供述证明Mary有经济动机
  round_4:
    mickey_argument: "就算有预谋，那也是被家暴者的求生。Mary去银行不是为了钱——是为了确认如果Thomas死了，她和Emily能不能活下去"
    usable_evidence:
      - id: 3507
        name: "垫板花形压痕照片"
        用途: "雏菊压痕证明Mary亲自去过Bernard办公桌前——主动研究保险条款"
        来源: "L5证据"
      - id: 3509
        name: "花形压痕比对报告"
        用途: "压痕与Mary手链吊坠完全吻合——确认来访者就是Mary"
        来源: "L5证据"
      # Bernard供述引用：Mary询问的是"投保人死了怎么赔"
    result: |
      雏菊压痕+Bernard供述=Mary有明确的经济动机：
      - Mary主动研究了Thomas死后的保险赔付
      - 询问角度是"投保人死了"而非"被保险人死了"
      - **Mickey反击**："一个母亲在确认生存手段。Emily八岁"
      - 没有赢家——Zack辩论获胜但道德撕裂
      - Mickey退守："别再查了。让案子结了吧"

  # ── 第五轮：Margaret的认知偏差（最终高潮） ──
  # ⚠️ R5特殊：Mickey不再辩护，而是主动请求停止 + 主动出示证据
  # 3610由Mickey自己现场勘查制作（不经Foster），R5中Mickey主动出示
  round_5:
    mickey_action: "请求停止辩论 + 主动出示3610"
    evidence:
      - id: 3610
        name: "楼顶目击条件实地勘查记录"
        用途: "仰角65度+护栏遮挡+深夜无光=Margaret从地面不可能看清楼顶具体动作"
        来源: "L6新证据——Mickey自己做的现场勘查"
        出示方式: "Mickey主动出示（非Zack选择）"
      - id: 3406001
        name: "Margaret目击证词"
        用途: "L4获取的证词——用'好像''应该是'等模糊词，与物理验证结果呼应"
        来源: "L4证词"
    result: |
      Mickey揭示Margaret证词的认知偏差：
      - 65度仰角+1.1米护栏=只能看到肩部以上模糊剪影
      - 深夜22:30+最近煤气灯15米外=几乎完全看不见
      - 推搡vs拉扯vs搀扶——从地面完全无法区分
      - Margaret不是在说谎——10年目睹Thomas家暴Mary，
        大脑自动将模糊观察解读为"Thomas在攻击Mary"
      - "每个人都基于自己的理解选择了同情Mary"：
        Margaret（认知偏差）+ Foster（专业沉默）+ Helen（共谋保护）
      - 进入玩家选择

