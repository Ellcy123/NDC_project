# PART 2: 自由探索
# ═══════════════════════════════════════
#
# L6 场景状态（全14场景）:
#   SC3001 楼下现场              → ⏸️无新线索
#   SC3002 楼顶                  → ⏸️无新线索
#   SC3003 Sullivan家客厅        → 🔒Mary在楼下，无新证据
