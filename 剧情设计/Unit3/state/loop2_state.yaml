        is_liar: true
        motive: "在Zack面前维持'悲伤无辜妻子'形象——精确控制信息披露，交出无害信息引导方向，坚决隐瞒危险信息"
        mindset: "紧张但有计划——提前准备好了教堂不在场证明，知道可能会被调查，但没想到证据会这么细致"

        # ── 1. NPC 已知信息 ──（首次出场）
        knows:
          - "Thomas从楼顶坠楼死亡"
