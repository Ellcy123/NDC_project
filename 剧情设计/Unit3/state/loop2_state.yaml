# ═══════════════════════════════════════
# PART 3: 指证（Expose）
# ═══════════════════════════════════════
#
# 场景状态表: Sullivan家(SC3003) → ⚔️指证(Mary)
# 指证设计: 4轮（教堂蜡烛 → 大风因果 → 早知奸情 → 见到Thomas）
# Mary的Talk/证词见上方 scenes → SC3003 → mary_001

expose:
  target: "Mary Sullivan (03)"
  total_rounds: 4

  # ── 第一轮：蜡油封住了第5章 ──
  # 出示祈祷册+蜡烛残骸，Mary合理反驳"那是我离开之后的事"
  round_1:
    lie: "那晚我在教堂祈祷了很久，读到第23章'正义的审判'，蜡烛烧了很久才走"
    lie_source: "证词 3203001"
    usable_evidence:
      - id: 3202
        name: "祈祷册"
        用途: "书签在第23章，但蜡油粘住的是第5章页面——蜡油颜色与祈祷蜡烛一致"
      - id: 3201
        name: "蜡烛残骸"
        用途: "被风吹倒折断，残余长度显示仅燃烧约15分钟——不是Mary说的'烧了很久'"
    result: |
      Mary合理反驳，拒绝承认：
      - 否认因果关系："我走的时候蜡烛好好地立在那里。不管后来发生了什么，那是我离开之后的事"
      - 否认蜡油来源："祈祷册是母亲遗物，用了很多年，上面有蜡油不奇怪"
      - 坚守内容防线："我读到了第23章，'义人必因信而生'，要不要我从头背给你听？"
      - Zack暂时无法反驳——需要证明蜡烛倒塌和蜡油是当晚发生的

  # ── 第二轮：大风暴露了真相 ──
  # 出示报纸天气版，完成因果闭合
  round_2:
    lie: "蜡烛断了、蜡油在第5章——那是我离开之后的事，跟我没关系"
    lie_source: "Mary的R1反驳"
    usable_evidence:
      - id: 3210
        name: "报纸天气版"
        用途: "11月20日芝加哥大风警报40mph——教堂在山上风力更强，大风从窗缝灌入→吹回书页到第5章→吹倒蜡烛→蜡油封住第5章"
    result: |
      Mary崩溃承认提前离开教堂：
      - Zack完成因果链：大风→吹回书页到实际阅读的第5章→吹倒蜡烛→蜡油封住第5章
      - 反驳核心："你确实知道第23章的内容，但不是当晚读的"——揭露预谋
      - 蜡烛15分钟 = Mary在教堂待了不到20分钟
      - Timeline系统标注修正："Mary声称: 20:00-23:00" → "实际约20分钟" ✖已击穿
      - Mary承认去了楼顶找Thomas
      - Mary被迫提到Helen名字："听说Thomas和三楼的Helen有不清不楚的关系"
      - Mary止损声称"上去没找到Thomas"（R4谎言预埋）
      - Mary止损声称"最近才听说"Helen的事（R3谎言预埋）

  # ── 第三轮：证明Mary早就知道奸情 ──
  # 出示口红分析报告+Mary口红
  round_3:
    lie: "我也是最近才听说Thomas和Helen的事……大概一周前吧"
    lie_source: "Mary在R2末尾的止损回答"
    usable_evidence:
      - id: 3213
        name: "口红颜色比对报告"
        用途: "衬衫口红=珊瑚红Maybelline Coral Flame（铅丹+胭脂虫红），Mary=玫瑰红Elizabeth Arden Rose Blush（氧化铁）——颜色、质地、成分完全不同"
      - id: 3204
        name: "Mary的玫瑰红口红"
        用途: "与衬衫口红现场比对——不是Mary的口红，衬衫藏了至少三个月"
    result: |
      Mary承认早就知道奸情：
      - 承认三个月前发现便条和衬衫口红印
      - 情绪爆发："我报警三次！没人管！"
      - 承认留衬衫是为了当离婚证据
      - 仍坚持"没找到Thomas"（R4谎言预埋）
      - 情绪从"被动辩解"转为"压抑的愤怒"

  # ── 第四轮：证明Mary见到了Thomas ──
  # 出示织物比对报告（小玩法生成）
  round_4:
    lie: "我上去看了一圈，没找到他，就回来了。我那天晚上根本没见到Thomas"
    lie_source: "Mary在R3末尾的止损回答"
    usable_evidence:
      - id: 3212
        name: "织物比对报告"
        用途: "Thomas袖扣织物与Mary祈祷披肩材质、颜色、编织纹理完全一致——Thomas抓过Mary的披肩"
    result: |
      Mary承认在楼顶见到Thomas并有肢体接触：
      - 承认在护栏边与Thomas争吵
      - 称Thomas"喝醉了想动手打我，抓住了我的披肩"
      - 坚持Thomas"失足"掉下去："他喝多了站不稳，失足掉了下去"
      - 被追问Helen是否在楼顶时明显心虚——快速否认"不在"、眼神闪烁
      - 坚称"只有Thomas和我"——隐瞒Helen在场
      - 脚印深浅不一被提及但未解释——Mary辩称"地面不平整"
      - 🔒开放性结论：Mary见到Thomas ✓ | Thomas怎么掉的？| Helen到底在不在？

