        note: "🔒藏梗——约38码，鞋底有楼顶灰尘。与L4 Helen的鞋外观相似同码数，脚印'深浅不一'的伏笔"
      - id: 3214
        name: "家暴痕迹"
        note: "场景道具——客厅墙上拳头大小的凹陷、靠墙角的断裂椅子腿、一张被烟头烫过的Mary照片从柜子顶上滑下来。Thomas暴行的视觉证据，为Mary'报警三次无人管'建立情感基础"
      - id: 3215
        name: "Emily蜡笔画"
        note: "🔒伏笔——冰箱上贴着8岁女儿的蜡笔画：一个女人牵着小女孩的手在阳光下走，旁边一个男人被黑色蜡笔用力涂黑，几乎看不出轮廓。孩子眼中的家庭。循环5-6揭示Helen帮Mary的深层动机——Helen看到Emily想起8岁的自己目睹父亲打母亲"
      - id: 3216
        name: "Emily房间门栓"
        note: "场景道具——女儿房间门外侧新安装的铁质滑栓，高度约180cm只有成人才能够到。Mary保护Emily的痕迹——从外面锁上，Thomas喝醉时进不去女儿房间"
