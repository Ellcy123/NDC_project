# ============================================================
# Loop 2 — Mary的嫌疑
# 本循环说谎者: Mary Sullivan
# 核心揭示: Mary伪造教堂不在场证明，在楼顶与Thomas争吵并有肢体接触，坚持Thomas"失足"
# 前序事件: 循环1 Morrison甩手结案，供出Mary的名字"十有八九是他老婆"
# 时间: 1928年11月21日 约14:00（案发后+15.5小时）
# ============================================================

# ═══════════════════════════════════════
# 玩家视角（本循环）
# ═══════════════════════════════════════

player_context:
  goals:
    primary: "Mary与Thomas的死有什么关系？"
    secondary:
      - "Mary那晚真的在教堂吗？"
      - "楼顶脚印深浅不一是怎么回事？"
      - "Thomas和Helen是什么关系？"
  known_facts:
    - "Thomas不是自杀——现场有女性在场，且Thomas不是主动跳下的"
    - "楼顶有约38码女性脚印，与Thomas面对面站在护栏边（深夜22:30）"
    - "脚印深浅不一（🔒藏梗：实为两个体重不同的女人，Loop 4揭晓）"
    - "Morrison佛系甩手：Thomas打老婆，整栋楼都知道，脚印十有八九是Mary的"
    - "'失足'可能性未排除——开放性结论"
    - "Jameson空瓶：穷酒鬼买不起$3好酒，来源存疑"
    - "Morrison暗示Continental银行打过招呼，案件比想象的复杂"
  new_directions:
    - direction: "Mary教堂不在场证明"
      trigger: "Morrison指名Mary Sullivan，需要确认Mary那晚是否真的在教堂祈祷到很晚"
    - direction: "衬衫口红颜色矛盾"
      trigger: "Mary家衣柜深处藏着有珊瑚红口红的Thomas衬衫，与Mary的玫瑰红口红颜色不同"
    - direction: "袖扣织物与披肩一致"
      trigger: "Thomas袖扣上的黑色蕾丝织物与Mary祈祷披肩材质、纹理完全一致"
  post_expose_knowledge:
    - "Mary伪造了教堂不在场证明——蜡烛仅烧15分钟，提前背了第23章内容，走前挪书签留蜡烛"
    - "Mary早就知道Thomas和Helen的关系——三个月前发现衬衫口红印，藏在衣柜深处不洗"
    - "Mary在楼顶护栏边与Thomas争吵并有肢体接触——祈祷披肩织物在Thomas袖扣上"
    - "Mary坚持Thomas'失足'掉下去，坚称'只有Thomas和我'"
    - "Mary被追问Helen是否在楼顶时明显心虚——快速否认，眼神闪烁"
    - "Mary报警三次家暴无人管"
    - "Thomas和Helen有'不清不楚的关系'（Mary供出Helen名字）"
    - "Thomas钱包里有一把形状特殊的钥匙——不像普通房门钥匙"
    - "脚印深浅不一仍未解释——Mary辩称'地面不平整'"

