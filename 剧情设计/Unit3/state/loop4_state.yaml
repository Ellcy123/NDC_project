        验证: "Margaret听到争吵挣扎+看到人影推搡 vs Helen'谁都没碰他，自己滑倒'"
    result: |
      Helen含泪完整坦白当晚经过：
      - Thomas扑向Mary → Helen从身后拉住Thomas → Mary推开Thomas → Thomas翻过护栏
      - 解释隐瞒原因："两个女人把一个男人弄死了——谁会信是防卫？"
      - Helen和Mary事后商量好隐瞒Helen在场——"我求Mary不要提我在场"
      - Helen提到Emily："Mary还有个女儿……才8岁……如果Mary被关进监狱……"
      - 结论：正当防卫——Thomas要杀Mary，Helen和Mary联手反抗
