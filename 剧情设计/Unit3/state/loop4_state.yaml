        用途: "Helen家厨房同品牌Jameson（已开封剩1/3）——酒来自Helen家，不是Thomas自己的"
      - id: 3407
        name: "Thomas家廉价酒照片"
        用途: "Thomas家全是$0.10-$0.15廉价酒——欠$12,000买不起$3的Jameson"
    timeline_background:
      - testimony: 3402001
        标注: "BAC 0.25%需要持续补充酒精至少一小时——Helen不是'看一眼就走了'。且Thomas习惯低度数廉价酒，突然喝40度Jameson上头更快——Helen选这瓶酒不是随手拿的（L4解读：心软时刻意选强酒快速灌醉Thomas）"
    result: |
      Helen含泪承认带酒上楼顶、持续灌酒：
      - "酒是我带上去的。母亲的酒。""我一直在给他倒。"
      - 解释"心软"：以为Thomas只是想吓唬Mary，直到那晚确认要动手才决定灌醉他
      - Zack质疑"短暂停留vs一直倒酒"的时间矛盾，Helen回答"记不清时间了"
      - 母亲遗物双重含义：L3轮椅油是"凶器来源"，L4母亲的酒是"阻止凶手的工具"
      - ⚠️Helen退守新谎言："Thomas太醉了自己滑倒了，谁都没碰他"

  # ── 第三轮：谁都没碰他？ ──
  # Margaret目击证词(RelationNetwork) → "争吵+挣扎+推搡"与Helen"自己滑倒"矛盾
  # 本轮无需玩家选择证据，通过RelationNetwork系统完成指证
  round_3:
    lie: "我给Thomas倒了很多酒。后来Mary到了。Thomas太醉了，站都站不稳，自己滑倒摔下去的。谁都没碰他"
