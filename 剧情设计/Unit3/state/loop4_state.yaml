expose:
  target: "Helen (04)"
  total_rounds: 3

  # ── 第一轮：门把手上的油 ──
  # 门把手外侧油迹+Foster三方比对 → Helen当晚独自从楼梯间侧进入楼顶
  # Zack口头引用：鞋底油迹(3403)、内侧把手照片(3402干净)、护栏锋利处(3404)+Helen手伤
  round_1:
    lie: "我把东西都准备好了，但那天晚上我一直待在家里"
    lie_source: "L3 Helen的坚持（'那晚在家'防线）"
    usable_evidence:
      - id: 3405
        name: "油迹三方比对报告"
        用途: "三方比对（门把手外侧+鞋底+地面油）成分完全一致——Helen家的油出现在门把手上和她的鞋底"
      - id: 3401
        name: "楼顶门外侧把手油迹照片"
        用途: "视觉辅助——外侧有油膜，侧光下可见"
    result: |
      Helen承认当晚上过楼顶：
      - 辩称"Thomas叫我上去检查油干没干"
      - 门把手方向揭示：外侧有油+内侧干净=Helen独自从楼梯间侧进入
      - Helen手伤揭穿："修轮椅"→实为涂油时被护栏割伤→解释下午Thomas帮开门
      - 两双相似鞋子+脚印深浅不一的真相揭晓：L1脚印是两个体重不同女人的混合脚印
      - ⚠️Helen退守新谎言："看了一眼就回来了，Thomas自己在那喝酒，自己带的酒"
      - 新证词 3404001 在此阶段被收集

  # ── 第二轮：Thomas喝不起的酒 ──
  # Helen家Jameson + Thomas家廉价酒 → 酒是Helen从家里带上去灌的
  # 口头引用：楼顶Jameson空瓶(3107)、催款单(3409/$12,000)、Timeline系统呈现BAC(3402001)
  round_2:
    lie: "Thomas叫我上去检查，我看了一眼就回去了。他自己在那喝酒，自己带的酒"
    lie_source: "证词 3404001"
