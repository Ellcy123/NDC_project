expose:
  target: helen
  target_talk: L4_expose_helen
  location: "SC3008 Helen 家"
  total_rounds: 3
  is_liar: true
  player_inquiry: null

  context: |
    Helen 用"独自做陷阱时手上蹭到油"作为新狡辩。Zack 用 L4 新解锁的油痕检测仪 +
    Margaret 目击证词，依次击破"当晚没去""没钥匙""Thomas 掉前我走了"三层谎言，
    把 Helen 当晚在场坐实。post_expose 进入"正当防卫"假结局。

  round_1:
    lie: "今晚 Thomas 在的时候并没有去过楼顶，我是被他命令、在这之前一个人去做了陷阱（一个人做陷阱时两只手都沾到了油，当时 Thomas 不在场）"
    lie_source: 3053002   # L3 收集；本 Loop 同谎言系列（Helen R1）
    usable_evidence:
      - id: 3402
        name: "门外侧把手油迹"
        用途: "油痕检测仪比对：外侧把手油 = Helen 家轮椅维护油；外侧把手有油说明 Helen 进门时蹭到了"
      - id: 3403
        name: "门内侧把手"
        用途: "内侧把手干净——若是 Helen 自己开门进出，离开时内侧也应该蹭到油；干净说明开门的是另一双没沾油的手"
    auxiliary_evidence:
      - id: 3404
        name: "Helen 家地面油迹（取样同源）"
        用途: "辅助——确证外侧把手油的产地就在 Helen 家"
    result: |
      Helen 被迫承认当晚去过天台：
      - 外侧把手有 Helen 家轮椅维护油、内侧把手干净 → Helen 当晚才蹭的油，且不是她开门
      - Zack 推理：是 Mary 从内侧帮 Helen 开的门 —— Mary 当晚也在
      - Helen 退守：'Thomas 没安排我当晚去——我没有钥匙，钥匙在 Thomas 那'

  round_2:
    lie: "Thomas 没有安排我当晚去，我没有钥匙，钥匙在 Thomas 那"
    lie_source: 3054002
    usable_evidence:
      - id: 3304
        name: "楼顶钥匙（L3 来）"
        用途: "钥匙在 Helen 猫窝里被刻意藏起来；是唯一一把（Seamus 证词锚定'只有一把'）"
    auxiliary_evidence:
      - id: 3083002
        name: "Seamus 证词（钥匙只有一把）"
        用途: "辅助——钥匙数量锁定"
    result: |
      Helen 被迫承认钥匙在自己手上：
      - 钥匙在猫窝、Seamus 证实只有一把 → Helen 当晚有能力开门
      - Helen 退守：'好吧我当天确实去过——不过 Thomas 还没掉下去的时候我就走了'

  round_3:
    lie: "好吧我当天确实去过——不过 Thomas 还没掉下去的时候我就走了"
    lie_source: 3054003
    usable_evidence:
      - id: 3074001
        name: "Margaret 证词（楼顶有三个人影挣扎、随后有人坠落）"
        用途: "目击：'有人坠落'就发生在'三个人影挣扎'之中——Helen 不可能在 Thomas 掉之前就走了"
    auxiliary_evidence:
      - id: 3405
        name: "Thomas 的小纸条"
        用途: "辅助——Thomas 的原计划是让 Helen 20 号下午独自做陷阱，纸条措辞与 Helen 自述吻合，但纸条本身证明这是 Thomas 单方面的指令；不能洗白 Helen 当晚在场的事实"
    result: |
      Helen 被"三人影挣扎 + 随即坠落"的目击击破，"我在 Thomas 掉之前就走了"站不住脚。
      Helen 一时语塞、不知该说什么 → 进入 post_expose（Mary 出现救场，给出"正当防卫"版本）

  post_expose:
    description: |
      **第二重反转（假结局）**：Helen 被点破当晚在场，却一时语塞、不知如何辩解。
      这时 Mary 出现，主动作证：是 Helen 为了保护自己、才把 Thomas 推下楼的。
      Helen 顺着 Mary 的话接下去——她当晚听到 Mary 的呼救声，于心不忍，才……
      Mary 随即恳请 Zack 按自己过失杀人告知警官，不要连累 Helen。
      Mary 补充：当晚是 Thomas 先约 Mary 说话，争吵之后 Helen 才出现的。
      Zack 决定回去和 Mickey 商量，看能否帮两人辩护。
    new_evidence_gained: null
    player_knowledge_gained:
      - "Helen 被点破当晚在场后语塞；是 Mary 出现主动作证'Helen 为保护自己才推下 Thomas'"
      - "Helen 顺着 Mary 的话称：当晚听到 Mary 呼救、于心不忍才上楼（被动附和）"
      - "Mary 请求按自己过失杀人告知警官，不连累 Helen"
      - "Mary 补充：当晚 Thomas 先约 Mary，争吵后 Helen 才出现"
      - "Zack 决定与 Mickey 商量辩护方案"

