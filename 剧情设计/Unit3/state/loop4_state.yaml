# ─────────────────────────────
# 注：以下两段是大纲第 402-417 行明确写明的"AVG 剧情 1/剧情 2"，
#     非脑补衔接。结构上沿用 post_expose_scene 表达。

post_expose_scene:
  # ── 衔接剧情 1：市政厅门口 ──
  - id: scene_municipal
    type: story_dialogue
    scene_name: "L4 衔接 · 市政厅门口 · 判决方案"
    location: "市政厅门口"
    characters: [Harrison, Mickey, Zack, Emma]
    description: |
      Mickey 在市政厅门口与 Harrison 法官交代案情：
      Mary 部分——Thomas 家暴 + 准备杀妻骗保 → 争取 Mary 合法杀人（Justifiable Homicide）判决。
      Helen 部分——Helen 最后关头悔悟、有充分证据证明她是自愿且有效阻止 Thomas；
      大陪审团可能 2-5 年刑期，但 Mickey 会为 Helen 争取无罪判决，期望 Harrison 公正处理。

    L4_postexpose_mickey:
      talk: L4_postexpose_mickey
      is_liar: false
      motive: "履行辩护人职责——为 Mary 与 Helen 争取最有利的判决；继续推进起诉湖滨信托银行"
      mindset: "克制专业的律师姿态——不流露多余情绪"

      active_topics:
        - "Mary：Thomas 家暴 + 准备杀妻骗保 → 争取合法杀人判决"
        - "Helen：最后关头悔悟 + 充分证据 → 争取无罪判决"
        - "大陪审团可能给 Helen 2-5 年；Mickey 会继续争取"
      withheld_topics:
        - "Mickey 真身 = Whale（Unit4 才揭）"
        - "Mickey 与 Mary/Helen 的私下关联"
        - "L6 控辩对决中将作为辩方的最终立场"

      player_inquiry:
        - "Mary 的辩护策略——合法杀人判决能不能争得到"  # 8
        - "Helen 的辩护策略——无罪判决的概率"          # 7

      testimony_ids:
        - 3014001  # Mickey：辩护方向（Mary 合法杀人 / Helen 无罪）

  # ── 衔接剧情 2：报社 ──
  - id: scene_newsroom
    type: story_dialogue
    scene_name: "L4 衔接 · 报社 · 采访 Mary/Helen"
    location: "报社"
    characters: [Emma, Mary, Helen]
    description: |
      Emma 在报社采访 Mary 与 Helen。Mary 陈述自己多年遭遇（家暴、报警三次无果）。
      Emma 表示会为她们撰写报道。Helen 在采访末尾补充：银行存在诱导情况
      —— 为 L5 调查 Bernard 起手势。

    L4_postexpose_mary:
      talk: L4_postexpose_mary
      is_liar: false  # 本场不是 Expose 对象；Mary 陈述的家暴遭遇本身真实，但她仍隐瞒"主动策划"
      motive: "塑造受害者公众形象——为后续判决与司法环境争取舆论支持"
      mindset: "压抑后的舒缓——对 Emma 表现得克制而坦诚"

      active_topics:
        - "Mary 多年遭遇：Thomas 家暴、报警三次无果、女儿坠落痛失"
      withheld_topics:
        - "Mary 早已识破 Thomas 杀妻骗保计划并反过来策划反杀"  # L6 才揭
        - "Mary 主动去银行咨询"                                 # L5/L6 才揭

      player_inquiry:
        - "Mary 多年与 Thomas 共同生活的真实状态"  # 6

      testimony_ids:
        - 3024001  # Mary：自述多年遭遇（家暴 + 报警无果 + 女儿之死）

    L4_postexpose_helen:
      talk: L4_postexpose_helen
      is_liar: false  # 本场不是 Expose 对象；Helen 的"银行诱导"陈述真实，但她仍隐瞒"与 Mary 合谋"
      motive: "向公众揭示 Thomas 杀妻骗保的源头——银行——以分担道德负担"
      mindset: "在 Emma 镜头前显得受伤但克制"

      active_topics:
        - "银行存在诱导情况——Thomas 是被推销保险的"
      withheld_topics:
        - "Helen 与 Mary 合谋"  # L6 才揭

      player_inquiry:
        - "银行如何诱导 Thomas——具体细节"  # 9（为 L5 Bernard 调查起势）

      testimony_ids:
        - 3054004  # Helen：银行存在诱导情况（为 L5 Bernard 起势）

