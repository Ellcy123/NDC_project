scenes:
  # ── 场景 9006：歌舞厅小包厢 ──
  - id: 9006
    name: "歌舞厅小包厢"
    type: free_exploration  # 🔓 自由探索（含 ⚡ 突发事件）
    description: |
      酒吧 1F 歌舞厅一侧的私人小包厢，平时供 VIP 使用。
      Vivian 配合 Webb 拍摄的勒索照片就存放在此处。
      玩家在此找到仙人跳材料——勒索用的照片。
      ⚡ 突发事件——Emma 拍照角落观察（详见 sudden_event 字段）：
         Emma 指出此处的光线与构图像是专门为拍照搭出来的，
         由她的观察引导 Zack 发现角落里的便携相机——拍摄勒索照片所用的工具。

    sudden_event:
      type: emma_observation  # 🎭 叙事事件 + 新证据产出
      trigger: "玩家在小包厢开始搜证后，Emma 环视空间时自然触发"
      description: |
        Emma 环顾小包厢一圈，语气平平地说：
        "这角落——沙发正对墙面，灯光偏暖且压得很低，窗帘又封得死死的。
         Zack，你不觉得这里更像是一个专门搭出来拍照的小角落吗？"
        她的观察让 Zack 转向角落的木质抽屉，翻出一台落灰的便携相机——
        正是 Webb 用来拍摄勒索照片的工具。

    evidence:
      - id: 9201
        name: "勒索用的照片 / Blackmail Photos"
        type: item
        pickup: true
        description: "Vivian 和中产阶级人士的暧昧合影；照片背面分别标注'花瓶 $4,000''油画 $7,000'两个化名对应的金额"
        note: "关键——疑点 9201 condition；L2 R1 击穿件"

      - id: 9209
        name: "便携相机 / Portable Camera"
        type: item
        pickup: true
        description: "一台 1920 年代的便携相机，机身落灰但机械完好；卷片轴上仍留有半卷未冲洗底片，型号与勒索照片的成像风格吻合——正是拍摄勒索照片所用的工具"
        note: "场景道具——勒索生意的物证补充，不入 doubt condition；由 Emma 的拍照角落观察（sudden_event）引出"

    npcs: {}  # 小包厢自由探索阶段无 NPC 驻场

