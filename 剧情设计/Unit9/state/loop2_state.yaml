# 四、指证（⚔️ Expose：Tommy）
# ─────────────────────────────

expose:
  target: tommy
  target_talk: tommy_expose_l2
  is_liar: true
  player_inquiry: null
  exposeNpcId: 105
  total_rounds: 3

  context: |
    Zack 完成自由探索后，拿到勒索照片（9201）、VIP 合影（9202）、Webb 收入（9203）、
    Tommy 账本（9204）、假油画（9205）、花瓶现场照（9206），对 Tommy 酒吧生意的说辞发起指证。
    Tommy 将从"只有私酒"→"账目清白"→"古董买卖"三层退守，
    最终在古董实物面前无法狡辩。

  # ── 轮次一：击破"正当生意" ──
  round_1:
    lie: "酒吧里都是正当生意，除了私酒之外没有别的交易"
    lie_source: 9052001  # Tommy 的谎言证词（Talk 阶段已收集）
    usable_evidence:
      - id: 9201
        name: "勒索用的照片"
        purpose: "照片是典型的'仙人跳'材料（Vivian 与中产人士的暧昧合影 + 背面金额标注），不是正当生意能产生的；照片存在本身就反驳'只有私酒'"
    result: |
      Tommy 被勒索照片打了个措手不及，无法否认照片的性质。
      他立刻转移焦点，退守到新防线：
      "你有证据吗？一个歌女的话算什么——账目上都是清清白白的，那只是 Vivian 小姐的个人爱好。"

  # ── 轮次二：击破"账目清白" ──
  round_2:
    lie: "没有实质性收入，收入都来自私酒——酒吧账目都是清清白白的"
    lie_source: "NPC 新谎言（被 R1 逼退后的退守，Expose 中 Tommy 主动提出）"
    usable_evidence:
      - id: 9203
        name: "Webb 收入记录（月净 $15,000）"
        purpose: "Webb 每月收入 $15,000，来源模糊；配合 Tommy 账本显示差额"
      - id: 9204
        name: "Tommy 酒吧账本（月净 $4,000）"
        purpose: "酒吧正式账面利润只有 $4,000；两本账差额 $11,000 无法被私酒解释——账目根本不'清白'"
    trap_evidence:
      - id: 9201
        reason: "勒索照片只证明有勒索行为，不能反驳'$11,000 差额'这一数字维度；误用此件会失败"
    result: |
      Tommy 无法解释巨大差额，被迫承认还有别的来源。
      他立刻转移话题，提出新的止损说法：
      "我们还做古董买卖——花瓶卖给了 Thompson，油画卖给了 Coleman，都已经卖出去了。"

  # ── 轮次三：击破"古董买卖" ──
  round_3:
    lie: "还有古董买卖——花瓶卖给了 Thompson，油画卖给了 Coleman，都已经卖出去了"
    lie_source: "NPC 新谎言（Expose 中 Tommy 主动提出，止损式退守）"
    usable_evidence:
      - id: 9205
        name: "假油画（仍在歌舞厅墙上）"
        purpose: "油画仍然挂在歌舞厅——根本没有卖出去，Tommy 的说法是谎言"
      - id: 9206
        name: "花瓶现场照（仍在原位）"
        purpose: "案发当晚拍摄的现场照片清晰显示花瓶仍在原处——同样没有卖出"
    result: |
      Tommy 的"古董买卖"说法被当场击穿。
      他神色越来越慌，防线彻底崩溃，开始主动补充：
      - 确认 Webb 的酒吧在做敲诈勒索，自己曾是执行人
      - 自 11 月中旬 Webb 沉迷 Rita 之后，就不再参与了
      - 他提到：别人会觉得那是 Webb 沉迷美色；但他认为 Webb 是勒索惹上了某个大人物，
        想转移财产跑路
      - 说这句话时，神情暗示他对那个大人物是谁心中有猜测，但未点名

  # ── 指证后剧情 ──
  post_expose:
    description: |
      Tommy 承认勒索生意存在，并暗示 Webb 惹上了大人物想跑路。
      Zack 获得关键信息：当前执行人不是 Tommy，而是另有其人（L2 未点名）。
      这将成为 L3 继续调查的核心驱动——Rosa 的时间线谎言 + 幕后执行人是谁。
    new_evidence_gained: null
    player_knowledge_gained:
      - "Webb 的酒吧在做敲诈勒索生意（已确认）"
      - "Tommy 是曾经的执行人，11 月中旬之后不再执行"
      - "现在的执行人不是 Tommy——另有其人（L2 未确认是谁）"
      - "Webb 可能因勒索惹上了大人物，想转移财产跑路（Tommy 心中有猜测但未点名）"

