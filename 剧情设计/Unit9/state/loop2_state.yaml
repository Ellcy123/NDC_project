player_context:
  goals:
    primary: "调查 Webb 的酒吧在做什么生意——他为何如此紧急地雇佣侦探？Webb 究竟怀疑谁会杀他？"
    secondary:
      - "向酒吧里每个人询问 Webb 的情况"
      - "找出 Webb 的真实收入来源"
      - "揭穿 Tommy 关于酒吧生意的说辞是否诚实"
      - "了解 Vivian 为何选择认罪而不自辩"

  known_facts:
    # L1 post_expose_knowledge 全部累积至此 + L1 指证后剧情所建立的事实
    - "Webb 已死亡（Morrison 宣告），死亡地点：蓝月亮酒吧 1F 会客室（South Side）"
    - "Vivian 手持手枪在现场，但该枪无硝烟反应——她不是刚刚开枪的那个人"
    - "23:30 众人听到枪响，Zack 和 Emma 从歌舞厅赶到会客室发现 Webb 尸体"
    - "Webb 提前雇佣 Zack：委托协议书包含保护 Vivian 安全 + 确保 Vivian 继承遗产"
    - "Rosa 谎言1（Vivian 刚刚开枪）已被推翻，她的整体可信度存疑"
    - "Rosa 谎言2（23:30 枪声 + 只有 Vivian 在场）在 L1 无法反驳——时间线悬而未决"
    - "Webb 委托协议书证明 Webb 预见自己有被害风险（保险倾向）"
    - "Morrison 同意给 Zack 72 小时调查期，暂缓逮捕 Vivian"
    - "Morrison 要求 Vivian 禁足不得离开酒吧"
    - "Emma 提出核心疑点：Webb 真正怀疑的凶手到底是谁？"

  new_directions:
    - direction: "调查 Webb 的酒吧在做什么生意"
      trigger: "委托协议书显示 Webb 预见自己会死，说明酒吧有隐藏的危险"
    - direction: "调查 Vivian 为何选择认罪"
      trigger: "Vivian 沉默不自辩、心如死灰——她在隐瞒什么？"
    - direction: "调查 Tommy 关于酒吧生意的陈述是否诚实"
      trigger: "Tommy 是酒吧经理，熟悉账目——他的说辞值得核对"
    - direction: "关注 Jimmy——他是否与 Webb 有更深关系"
      trigger: "Jimmy 对 Webb 的死态度异常，夹在忙碌中流露出某种愧疚"

  post_expose_knowledge:
    # Tommy 指证结束后玩家确认的信息
    - "Webb 的酒吧除私酒之外在做敲诈勒索生意（仙人跳变体）"
    - "Tommy 曾是敲诈勒索生意的执行人，但自 11 月中旬 Webb 沉迷 Rita 后就不再执行了"
    - "11 月中旬之后酒吧的勒索执行人换了——不是 Tommy（暗示另有其人，L2 未点名）"
    - "Tommy 认为 Webb 因勒索惹上了大人物，想转移财产跑路——他心中有猜测但未点名"
    - "Vivian 曾被 Webb 强迫协助勒索中产人士（仙人跳），对此深恶痛绝"
    - "Vivian 平时在 23:30 给 Webb 送酒（时间节点确认）"
    - "Jimmy 是兼职主厨，经济困难，对 Webb 的死有隐藏的愧疚"
    - "新疑点：Webb 的勒索执行人换成了谁？那个'大人物'是谁？"

