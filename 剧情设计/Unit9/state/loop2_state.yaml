opening:
  type: transition_cutscene  # 🎬 从 L1 大门口 Emma 对话过渡到 L2 自由探索
  description: |
    L1 结束时 Zack 和 Emma 在大门口确认目标——"Webb 真正怀疑的凶手是谁？"
    L2 开篇：两人重新进入酒吧，开始逐一调查酒吧内的每个人。
    Morrison 仍在场；Vivian 被禁足，房门紧闭，偶尔传出啜泣声。
    Rosa 在清洁间。Tommy 在自己办公室。Jimmy 在厨房。
    玩家进入自由探索模式。

  npcs:
    emma_l2_open:
      talk: emma_l2_open
      is_liar: false
      motive: "作为搭档帮助 Zack 聚焦 L2 调查方向；对真相的坚守驱使她深入"
      mindset: "清醒而坚定，已完成 L1 的目标定向，开始推进实质调查"

      # ── 1. NPC 已知信息 ──
      active_topics:
        - "Vivian 的枪无硝烟反应，Rosa 谎言1 已被击穿"
        - "Rosa 的时间线谎言（谎言2）无法反驳，时间线真相悬而未决"
        - "Webb 的委托协议书：保护 Vivian + 确保继承遗产（保险倾向）"
        - "Morrison 同意 72 小时调查期"
        - "下一步：调查 Webb 这个人——向酒吧内每个人问 Webb 的情况"
      withheld_topics:
        - "Rosa 收到威胁纸条的事（L3 才揭示）"
        - "Jimmy 对 Webb 有愧疚感的深层原因（L5 才揭示）"
        - "酒吧收入和 Webb 个人收入的差额细节（需调查后才知）"

      # ── 2. 玩家询问意图 ──
      player_inquiry:
        - "\"L1 结束后的方向确认——为什么要调查 Webb 本人\" # 8"
        - "\"Emma 对今晚舞会和 Webb 的印象\" # 5"

      # ── 3. 可提取证词 ──
      testimony_ids:


