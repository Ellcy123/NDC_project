  context: |
    Zack 完成自由探索后，手握玻璃碎片（9301）、Rosa 的倒垃圾证言（9033001）、
    威胁纸条（9302）和女儿医疗单（9303），决定正式指证 Rosa。
    Rosa 仍然坚持"23:30 枪响时 Vivian 在会客室里"的说法。
    本场指证分两轮：
    - 第一轮：时间线击穿（partial_victory——Rosa 立刻退守，转向"持枪即有罪"继续维持）
    - 第二轮：威胁纸条击穿（full_breakthrough，Rosa 崩溃）

  # ── 轮次一：时间线击穿（partial_victory → triggers_retreat）──
  round_1:
    lie: "大家都听到了 23:30 的枪响，当晚并没有其他枪响，当时只有 Vivian 在里面，所以只能是她杀的"
    lie_source: 9033002  # Rosa 的谎言证词（储藏室 Talk 阶段已收集）
    usable_evidence:
      - id: "9301"
        name: "玻璃碎片（压垃圾袋下有硝烟）"
        usage: "碎片压在垃圾袋下：玻璃破碎时间早于垃圾袋放置时间（23:20）；碎片有硝烟痕迹：来源于子弹穿窗。结合 Rosa 自己的证言（9033001），证明真实枪击发生在 23:20 之前，不可能是 23:30 的事——Rosa 声称的'23:30 枪响就是案发'在物理上无法成立。"
      - id: "9033001"
        name: "Rosa 证言：23:20 去外面倒过垃圾"
        usage: "Rosa 自己提供的时间节点：垃圾袋是 23:20 放下的，而玻璃碎片压在垃圾袋下方——玻璃破碎必定早于 23:20，真实枪击不是 23:30。"
    result: partial_victory
    triggers_retreat: true
    result_description: |
      玻璃碎片 + 时间节点逻辑击穿了 Rosa 的"23:30 是案发时间"说法。
      Rosa 明显动摇，但随即退守到新的谎言：
      "也许我记错了时间，但我亲眼看见 Vivian 手里有枪——有枪就是证明！"
      Rosa 的退守是从"时间论点"转向"持枪论点"——她没有真正认错，
      而是切换到新的防线继续维持"Vivian 是凶手"。

  # ── 轮次二：威胁纸条击穿（full_breakthrough）──
  round_2:
    lie: "也许我记错了时间，但我亲眼看见 Vivian 手里有枪——有枪就是证明！"
    lie_source: "Rosa 在 round_1 结果中主动提出的退守谎言"
    usable_evidence:
      - id: "9302"
        name: "威胁纸条（倒写 J）"
        usage: "纸条内容直接证明 Rosa 的'目击证言'是被人威胁说出来的：'23:30 去 Webb 的会客室，说你目击了 Vivian 杀害 Webb，否则我就杀了你女儿。'Rosa 不是真正的目击者——她是被指示去说这些话的，包括被告知去指认 Vivian。"
      - id: "9303"
        name: "女儿的医疗单"
        usage: "威胁纸条的附件，证明威胁者掌握了 Rosa 女儿的具体病情信息，威胁是真实且有针对性的——Rosa 被迫配合是可信的，她没有理由无端撒谎。"
    result: full_breakthrough
    result_description: |
      威胁纸条 + 女儿医疗单彻底击穿了 Rosa 的最后防线。
      Rosa 崩溃，肩膀塌下去，开始哭泣，说出实情：
      她是被威胁的，那个人知道她女儿的病情，她没有选择。
      她说：写纸条的人应该很熟悉酒吧——因为纸条里利用了 Vivian 每晚送酒的习惯，
      不熟悉酒吧内部规律的人不可能知道这个细节。
      幕后有人刻意嫁祸 Vivian，且此人对酒吧内部情况了如指掌。

  # ── 指证后剧情（Rosa 交出弹壳）──
  post_expose:
    description: |
      Rosa 崩溃后，哭着向 Zack 坦白了一切。
      讯问结束时，她从衣服口袋里拿出一枚弹壳——
      说这是她 23:30 进入会客室后在地上捡到的，她保留下来是为了自保，
      万一写纸条的人反悔，她可以用这个去找警察。
      她沉默了很长时间，才把弹壳递给 Zack——像是在做一个不可撤回的决定。
      她哀求 Zack 不要对外声张她坦白的事情，担心威胁者会伤害她的女儿。

    new_evidence_gained:
      - id: 9401
        name: ".45 警用弹壳 / .45 ACP Police-Issue Casing"
        type: item
        pickup: true
        note: "关键（Loop4 核心）——Rosa 在现场捡到的一枚弹壳，请求 Zack 保密。Loop3 阶段玩家只知'一枚弹壳'，不揭示口径；Loop4 指证 Vivian 时与 Vivian 手枪（9101）对比后锁定为 .45 ACP 警用弹壳，证明凶器不是 Vivian 的 .25 ACP 手枪"
        description: "一枚弹壳，Rosa 称是在 Webb 死亡现场地上拾得。外观普通，金属色泽。（注：Loop4 鉴定后确认为 .45 ACP 口径，与 Vivian 的 .25 ACP 手枪不符——Loop3 阶段不揭示具体口径）"
        metadata:
          cross_loop_critical: true
          loop4_critical: true
          reveal_caliber_in_loop: 4

    player_knowledge_gained:
      - "Rosa 的'目击'是被威胁伪造的——她不是真正的目击者"
      - "幕后有人刻意嫁祸 Vivian，且此人对酒吧内部情况了如指掌（熟悉 Vivian 每晚送酒习惯）"
      - "真实枪击早于 23:20：玻璃碎片时序推理链成立，23:30 枪声不是案发时间"
      - "威胁纸条上有倒写的 J 书写特征——胁迫者身份未知，但留下了书写破绽"
      - "Rosa 给了 Zack 一枚她在现场捡到的弹壳（口径待 Loop4 确认），请求保密"
      - "Rosa 从'被迫说谎者'变成了 Zack 的潜在协助者"

