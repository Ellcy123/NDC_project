  description: |
    Jimmy 自杀后的片刻沉默。
    Emma 和 Zack 两人站在夜色中整理思路——真凶已死，
    真正的凶器（9601）在手，Jimmy 与 Whale 的回信（9503）也在手。
    但 Vivian 依然被关在警局，那道最后的锁还有一个名字：Morrison。
    Emma 说出了接下来的计划：
    先去 Morrison 的住所——他和 Whale 之间的往来一定留有记录，找到它。
    Emma 以记者身份（"专访一线警察的日常"）作掩护，Zack 以 Emma 的助理身份随行——
    这样既能合法进入 Morrison 家，又不会让他起疑。
    然后去警局，直接走进 Morrison 的办公室，单独面对他，
    一件一件把证据摆出来，在没有外人的空间里让他无处可退。

