        Vivian 把碎片捧起来，交给 Zack，说：
        "这是 Webb 真正的死因，我将它交给真正能用上的人。"
        交完之后 Vivian 转身走出会客室，把门轻轻带上——她说："我先回大堂——这间屋子里的事，从今晚起不再是我的。"
        她不需要听碎片的内容；她把碎片交给了该交的人，自己留下空间。
        Zack 和 Emma 单独留在会客室——和那把保险箱、那叠碎片、和墙角那台 Webb 留下的老式留声机。
      vivian_line: "这是 Webb 真正的死因，我将它交给真正能用上的人"
      vivian_exit_line: "我先回大堂——这间屋子里的事，从今晚起不再是我的。"
