    # 前段有一小节 🎬 硬切：Zack+Emma 以"专访警察家属"为由进入；Mrs. Morrison 开门接待
    description: |
      Zack 和 Emma 来到 Morrison 的住所。Morrison 本人不在（已出门赶赴警局值夜班，半小时内将到岗），
      妻子 Mrs. Morrison 在家。Emma 以《艾斯弗德先驱报》记者身份"专访一线警察家属"作为掩护，
      Zack 以助理身份随行。
      Mrs. Morrison 戏份设计：她在开门时短暂打照面，让客人自取桌上的咖啡（已凉的旧壶——这是她不太热情的"打发"）。
      Emma 反客为主，用"这壶咖啡早就凉了，麻烦您再煮一壶吧"的礼貌请求把太太支去厨房——这是 Emma 主动支走，
      不是太太主动退场。太太礼貌应承去厨房煮新咖啡。她不会全程陪同两位来访者。
      Emma 和 Zack 在客厅独处后开始分工：Zack 进书房偷搜（9016 9603/9604/9401），
      Emma 在客厅放风（监视厨房动静，钢笔握着随时遮掩；真正任务是盯死厨房门——
      一旦 Mrs. Morrison 出来走向书房就必须立刻拦下、拖延，绝不能让她发现 Zack 不在客厅）。
      Mrs. Morrison 全程只在两个瞬间出现：开门接客 + 告辞时送行多看 Zack 一眼。
      Whale 电话时她在厨房没听到（书房在另一头 + 厨房门关 + 水壶咕嘟声三重隔离）。
      其余时间她都在厨房煮咖啡（瓷器轻响 + 水壶咕嘟声作为环境音）。
      客厅陈设简朴，靠墙的矮柜底层塞着一叠厚厚的华盛顿公园赛场马票存根
      （9606，envir，仅查看不入背包）。
      核心藏匿证据（9603 赌债欠条 / 9604 借 Whale 钱记录 / 9401 弹壳找回）在相邻的 9016 书房，
      Whale 调查电话事件也在书房触发（电话机就在书桌一角）——Zack 全程在书房，
      不切场景；搜证 → 接电话 → retrieve 9401 一气呵成。
      关键张力：Mrs. Morrison 隐约察觉但选择不追究——保护自己 > 保护丈夫的精明计算。
      她"借口去厨房"的主动退场是这种精明的具体表现：让出空间给来访者搜查的同时，自己也不必为目睹的一切负责。

    # ── Mrs. Morrison NPC 条目（场景 NPC，非 Expose 对象）──
    # 沿用 Unit1 SC005 已建立的角色（Audio/NPC/Morrisonwife.md）
    mrs_morrison_house:
      id: 910
      talk: mrs_morrison_loop6_house
      is_liar: false  # 她不撒谎，但精明地不主动透露不利信息
      motive: "维持表面礼貌；保护自己的身份和优渥生活——保护自己 > 保护丈夫"
      mindset: |
        精明计算的家庭主妇，38 岁，与 Morrison 貌合神离二十年。
        表面温柔得体，实际冷漠自私——她不在乎丈夫的钱从哪里来，只在乎自己的优渥生活不要被搅黄。
        她隐约察觉来访者的真正目的（领带是临时打的），但她不会主动揭穿——揭穿没有好处，只会把自己也卷进麻烦。
        开门时她让客人"自己倒桌上那壶旧咖啡"（不太热情的打发，但不至于失礼）；
        Emma 用"咖啡冷了，麻烦您煮一壶"把她支去厨房时，她浅笑应承去煮——
        她乐得离开客厅，让自己不必目睹任何让自己为难的事。这是她活下来的方式：让出空间 + 不参与。
        台词风格：得体的中产腔，措辞客气但有边界；每一句礼貌都关一道门。
        全场只在两个瞬间出现：开门接客（被 Emma 支去厨房）、告辞送行（多看 Zack 一眼但什么都不问）。
        Whale 电话时她在厨房没听到（书房在另一头 + 厨房门关 + 水壶咕嘟声三重隔离），也未走出厨房。

      # ── 1. 已知信息 ──
      active_topics:
        - "丈夫的工作强度（笼统）：警察这一行每天都担心，那还活不活"
        - "婚姻规矩（表面话）：他从不在家说工作，我也从不问，二十年下来的规矩"
        - "排班表贴在冰箱上（这就是她对丈夫行踪的全部认知）"
        - "丈夫下班的习惯（中性细节）：听收音机，新闻台，二十年都是这一个习惯"
        - "对来访者的礼貌接待——咖啡或茶，得体的家庭主妇形象"
      withheld_topics:
        - "丈夫的赌博——她知道但绝不主动提（矮柜底层那叠马票她默许的隐瞒）"
        - "丈夫的债务——她隐约知道家里钱来得越来越紧，但不主动追问"
        - "丈夫和 Whale 的关系——她可能完全不知具体内容，但知道近期某个人让丈夫心事重"
        - "她对 Zack/Emma 来意的真实判断——她隐约知道这不是真的'专访'，但不会戳破"
        - "她在节拍 7 去厨房的真实动机——评估眼前局面，给自己一个不在场的窗口"

      # ── 2. 玩家询问意图 ──
      player_inquiry: []  # 草稿中 Mrs. Morrison 是 cutscene NPC（开门 + 厨房 + 送行），不进入玩家探索询问轮

      # ── 3. 可提取证词 ──
      testimony_ids:
        # Mrs. Morrison 不提供可作为指证机制的证词
        # 她的所有台词属探索阶段对话内容；不挂任何疑点 condition；不作为击穿件
        # 设计意图：她是"什么都看见了但选择不参与"的精明计算者，
        # 任何具体证言都会让她被卷入——她绝不让这种事发生

    phone_call_event:
      # Whale 在此唯一一次以"声音"形式直接登场（电话另一端）
      # 技术处理：叙事事件，不产生可拾取证据；不设 NPC 条目，Whale 未正式出场
      type: narrative_event
      interlude:
        id: "U9-L6-INT-01"
        title: "Whale 调查电话"
        outline_anchor: "§L6 🔵 插入剧情：Whale 调查电话"
      trigger: "玩家在 9016 书房疑点 9601 condition 满足后（9603 + 9604 均已获取），书房电话铃响自动触发"
      description: |
        Morrison 家书房的电话铃骤响（电话机就在书桌一角）。事件触发瞬间的角色分工：
          - Zack 在 9016 书房偷搜（刚把 9603 + 9604 收进内袋）——离书房电话机最近，
            铃响时几乎是反射性立刻按下听筒接起：绝不能让铃声多响一秒、绝不能让
            Mrs. Morrison 从厨房过来接到这通电话（一旦她接到 Whale 的声音 = 灾难）
          - Emma 在 9013 客厅放风（钢笔握着做出"正在写采访记录"的姿态遮掩）——
            真正的任务是盯死厨房门，一旦 Mrs. Morrison 从厨房出来走向书房就必须
            立刻拦下、拖延，不能让她发现 Zack 不在客厅
          - Mrs. Morrison 在厨房（书房在另一头 + 厨房门关 + 水壶咕嘟声三重隔离，
            她没听到，也未走出厨房）
        Zack 接起听筒，没有先开口。电话另一端先是大约两秒的呼吸声——低沉、平稳，
        像在确认线路畅通。然后那个声音响起：
        "Brennan。"
        "你比我想的有耐心。"
        "James 那个孩子可惜了——他差一点就上岸。"
        Zack 没有回应。Whale 不期待他回应。最后一句以草稿落地版为准
        （草稿 909001005，犬儒看客视角的"继续往下挖吧"宣告），挂断。
        Whale 把活人和死人都用工具视角评价——对 Zack 是"棋盘上有耐心的变量"，
        对 James 是"差一点上岸的孩子"。
        Zack 把听筒扣回叉簧，没有立刻转身——cutscene 在他的沉默中解除。
        全程不切场景：Zack 始终在 9016 书房；Emma 始终在 9013 客厅放风见证（但不发声）；
        Mrs. Morrison 始终在厨房未察觉。事件结束后 Zack 直接在书房继续 retrieve 9401。
      whale_lines:
        # 压轴句以草稿落地版为准（草稿 909001005 已采用）；以下为节拍参考，最终台词以 MD 草稿为准
        - "Brennan。"
        - "你比我想的有耐心。"
        - "James 那个孩子可惜了——他差一点就上岸。"
        - "[压轴宣告——具体台词以草稿 909001005 落地版为准]"
      narrative_significance:
        - "Whale 首次以声音形式直接登场——此前他只是'影子'，现在有了声音"
        - "3-5 句犬儒工具评价 + 压轴宣告，挂断——他对在世的人和死去的人都用工具视角评价"
        - "叫 Zack 的姓 = 全知凝视的第一个具体物证（他知道你的名字，他从一开始就在看）"
        - "把 James 的死轻巧带过为'差一点上岸的孩子'——犬儒到底，James 在他眼里只是用过的工具"
        - "挂断电话不等 Zack 回答——Whale 不与 Zack 平等对话，他只是'宣告'"
        - "事件以 Zack 沉默放下听筒收尾，无人评论——这种'什么都不说'比任何反应台词都更重"
        - "Unit9 结束后 Whale 的形象依然是'空头像'——玩家知道有这个人，但不知道他是谁"
      testimony_ids:
        # Whale 的电话台词属 🔵 phone_call_event 插入剧情，不作为可提取证词

