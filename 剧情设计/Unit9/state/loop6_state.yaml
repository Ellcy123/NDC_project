  target_talk: morrison_expose_loop6
  is_liar: true
  player_inquiry: null

  context: |
    Zack 和 Emma 在 Morrison 办公室单独对质——没有同僚在场。
    Morrison 已经赶走了下属，这个动作已经出卖了他。
    此时 Zack 手中的证据：
    ── 继承自 loop3 ──
    - 9401（.45 警用弹壳，Rosa 从会客室地上捡到、交给 Zack，弹底印记"MILLER ARMS"）
    ── 继承自 loop5 ──
    - 9601（米勒集团特制手枪，真凶器，铭文"MILLER ARMS · CHI" + 狮形印记）
    - 9503（Jimmy 给 Whale 的回信，直接确认 Jimmy 受 Whale 委托）
    ── loop6 Morrison 家新取得 ──
    - 9603（Morrison 欠疤面煞星 5000 美元赌债欠条）
    - 9604（Morrison 借 Whale 钱的记录）
    Morrison 没有外援，没有观众——他必须独自面对每一件证据。

  # ── Morrison NPC 条目（Expose 对象）──
  morrison_expose:
    talk: morrison_expose_loop6
    is_liar: true
    motive: "保住警察职位和个人声誉——他不是彻底的坏人，是在贪婪和恐惧中做了糟糕选择的人"
    mindset: |
      被逼到墙角但仍在挣扎；开场还用警察权威压人，但没有外人可以充当观众——
      每轮谎言被击破时，他只能一次次独自承受逼近认罪的压力；
      R2 Morrison 主动赶走下属这一动作已经是自证，他自己也知道

    # ── 1. 已知信息 ──
    active_topics:
      - "三层防线（对应三轮 Expose 谎言）"
      - "关于为何快速结案的官方说法：搜查失误"
      - "关于 Whale 的定性：只是放贷的，与本案无关"
      - "正在向下属吹嘘 Vivian 案办得神速——官僚得意感"
    withheld_topics:
