    title: "Unit 结尾动画（四幕）"
    outline_anchor: "§Unit 结尾 🔵 插入剧情：Unit 结尾动画"
  description: "Unit9 完整收束 + Unit2 衔接钩子；四幕连续，不可中断"

  sequence:

    # ── Act 1：制度性的正义——Morrison 处分 ──
    act_1_morrison_verdict:
      location: "警局 Morrison 办公室"
      description: |
        三轮指证完成后，Morrison 在自己的办公室里被逼到最后一步。
        Zack 推过来一张纸——要 Morrison 当面写下失职认罪书：
        警官失职——故意压制证据、收受贿赂、错误羁押无辜嫌疑人。
        Emma 作为记者见证签字。
        Morrison 握着笔停顿了很久，第一次没有任何争辩，把名字签了上去。
        他当场签字撤销了 Vivian 的羁押令。
        Morrison 被认定"警官失职"，重新立案查证，由上级接手——
        不是最大的正义，但是能做到的那种正义。
      morrison_status: "在职警官 → 签下认罪书，待上级纪律审查（副本由 Emma 以记者身份留存/披露）"

      # ── 过场字幕卡（title_card / interstitial）──
      # 草稿对应 ID：904906091
      # 用于在 Act1 签字 → Act2 蓝月亮重逢之间做时间跳转的过渡说明
