      - "赌债金额与债主身份（指证前 Morrison 不主动提及）"

    # ── 2. 玩家询问意图 ──
    player_inquiry: null  # Expose 对象，设为 null

    # ── 3. 可提取证词 ──
    testimony_ids:
      - 9046001  # ⚠谎言: Morrison："Vivian 的手枪就是凶器，凶手就是 Vivian！"（R1 起始谎言）
      - 9046002  # ⚠谎言: Morrison："我只是临时接警，搜查有失误——后续可以重新调查，不需要现在就释放嫌疑人"（R1 被击破后的退守谎言）
      - 9046003  # ⚠谎言: Morrison："就算我和 Whale 之间有借贷关系，Whale 只是个放贷的——和 Webb、Jimmy 的死无关，那是私人交易"（R2 被击破后的最后防线）


  # ── 轮次一：凶器匹配维度 ──
  round_1:
    lie: "Vivian 的手枪就是凶器！她就是凶手！"
    lie_source: 9046001
    usable_evidence:
      - id: 9401
        role: "这枚 .45 ACP 弹壳来自真正的凶器；弹底印记'MILLER ARMS'——不是 Vivian 的 .25 ACP 手枪能打出的口径"
      - id: 9601
        role: "米勒集团特制手枪，.45 ACP 口径，铭文'MILLER ARMS · CHI'与弹壳印记完全对应——这才是真凶器；Vivian 的手枪是 .25 ACP，口径根本不符"
    required_items: [9401, 9601]  # 两件必须同时出示
    trap_evidence:
      - id: 9601
        alone: true
        reason: "只出示 9601 米勒手枪（不出 9401 弹壳）——Morrison 可辩'还有其他 .45 手枪，不能证明这就是现场用的那把'"
    result: partial_victory
    result_description: |
      Zack 出示 9401（.45 弹壳，弹底"MILLER ARMS"）和 9601（米勒集团特制手枪，.45 ACP）：
      .45 的弹壳配 .45 的手枪——这把枪才是凶器。Vivian 的枪是 .25，口径根本不符。
      Morrison 的手停在桌面上——他沉默了一秒，用手摸了摸面前的笔记本封皮，才重新抬头。
      第一道防线松动。Morrison 做出第一次退守：
      "好，也许是我临时接警时搜查失误——但后续完全可以重新调查，不需要现在就释放嫌疑人。"

  # ── 轮次二：债务利益冲突维度 ──
  round_2:
    lie: "我只是临时接警、搜查失误——这不是故意的，后续可以重新调查，不需要立刻释放嫌疑人"
    lie_source: 9046002
    usable_evidence:
      - id: 9603
        role: "Morrison 欠疤面煞星 5000 美元赌债、被威胁——财务上极度脆弱，正是可以被收买的时候；这不是'失误'，这是他主动选择的结果"
      - id: 9604
        role: "Morrison 向 Whale 借了 $6000，时间在 Webb 案发生前三周——他用这笔钱还了赌债，然后在 Webb 案中选择快速结案、夺走证据；这是贿赂，不是失误"
    required_items: [9603, 9604]  # 两件必须同时出示
    trap_evidence:
      - id: 9603
        alone: true
        reason: "只出示 9603 赌债欠条——Morrison 可分别开脱：'我有赌债，和本案有什么关系？'"
      - id: 9604
        alone: true
        reason: "只出示 9604 借款记录——Morrison 可分别开脱：'借钱是合法的，贷方是谁和本案无关'"
    scene_beat: |
      讯问剧情节奏：
      先出示 9603 赌债欠条 → Morrison 脸色大变 → 主动赶走下属要求私下谈判（如果尚未赶走）
      → Zack 再出示 9604 借款记录
      Morrison 主动赶走下属这一行为本身就是最强的自证（讨论结论风险 B）
    result: partial_victory
    result_description: |
      Zack 摆出 9603（赌债欠条+威胁信）和 9604（向 Whale 的借款记录）：
      你欠了 Whale 一笔钱，就在案发三周前。你用那笔钱还了赌债。
      然后案子来了，你快速结案，压制证据，把无罪的 Vivian 押进警局。
      这不是失误，这是偿债——偿 Whale 的债。
      Morrison 的手抖了一下。没有同僚给他台阶，他只能自己面对这些数字。
      Morrison 做出第二次退守：
      "就算我和 Whale 之间有借贷关系，Whale 只是个放贷的——和 Webb 被杀有什么关系？"

  # ── 轮次三：Whale 关联人网络维度 ──
  round_3:
    lie: "就算我和 Whale 之间有借贷关系，Whale 只是个放贷的，和本案真凶没有任何关系"
    lie_source: 9046003
    usable_evidence:
