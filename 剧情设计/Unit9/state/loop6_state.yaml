    act_4_epilogue:
      location: "Webb 会客室（继续，Vivian 已退场）→ 车内黑屏 → 南区 Margaret 鞋坊"
      time: "11 月 6 日傍晚"
      description: |
        Webb 会客室。Vivian 已退场。Zack 走到墙角那台 Webb 留下的老式手摇留声机前——
        黄铜号角已经发黑。他把碎片放在转盘上一块一块拼起来：
        "让我把这些碎片拼起来......希望能播放。"

        沙沙电流声中传来一个男人的声音，冷静，按数据念稿。三段录音：
        1. "......Moore 银行注资已到位......南区清退计划启动......"
        2. "......我们没有时间了，名单上的'钉子'必须在 11 月初彻底消失......"
        3. "......1912 年家属名单确认......第一批目标：Margaret Brennan......鞋坊......"
        录音断了。唱针在破损处重复噪音。

        Zack 脸色煞白："Margaret Brennan...... 鞋坊......？不......这怎么可能......"
        Emma 认出名字："Brennan 先生，那是你母亲的名字！还有'1912 年家属'......这是什么意思？"
        Zack 猛地站起："Webb 死了，James 死了......这根本不是什么简单的商业清退，这是一场有预谋的清洗行动！"
        Emma 推算时间："录音里说'11 月初消失'......今天是 11 月 6 日，他们就是这几天动手！"
        Zack 抓起外套冲门："他们已经在清理'钉子'了。James 是昨晚，下一个就是她！我得马上赶去鞋坊！"
        Emma："坐我的车，我来开！快走！"

        切：蓝月亮门外。两人冲出会客室，穿过大堂——Vivian 在吧台后看见他们冲出，没有出声。
        引擎发动。

        切：车内黑屏（11 月 6 日傍晚）。
        Emma：[引擎轰鸣，轮胎尖啸]"Zack，坐稳了！"
        Zack："再快点！Emma！求你了，再快点！母亲还在店里！"
        Emma：[风声呼啸]"我已经把油门踩到底了！前面就是 Maple 街区！"
        Zack：[刺耳的急刹车声]"那是......前面那是......烟？！"
        Zack："不......不......不！！！"

        切：Margaret 鞋坊外。火光冲天。Zack 推开车门冲下车，Emma 紧跟。
        Zack：[试图冲入火场]"妈——！！"

        Unit9 结束。
