          这张字幕卡让玩家明白制度的处理已经完成（Morrison 失职定性 + Vivian 羁押撤销），
          剧情进入 Vivian 走出阴影后的"重新做选择"阶段。

    # ── Act 2：Vivian 的选择——留下经营蓝月亮 ──
    act_2_vivian_choice:
      location: "蓝月亮酒吧大堂"
      description: |
        Vivian 获释一段时间后，Zack 和 Emma 时常去探望 Anna。某天，Vivian 打电话相约两人在蓝月亮见面。
        蓝月亮酒吧大堂。白天的光线照进来，显得这里有些空旷和萧瑟。
        Anna 坐在角落的椅子上，双手交叠放在膝盖上，安静地看着空气里的浮尘。
        Vivian 站在吧台后整理玻璃杯，没有化妆，眼底的疲惫清晰可见。
        门铃响起——Emma 推门进来，Zack 在身后。Vivian 抬起头。
        她从吧台下取出一个没封口的信封，推过桌面：警察撤封后，她去开了 Webb 的保险箱，
        里面有 Webb 留给她的信，还有一张去巴黎的头等舱船票连着一笔钱。
        她说三年来她以为自己恨他到只剩开枪一条路，结果到最后他连这个资格都剥夺了，还给她留了条后路。
        她看着角落里的 Anna——两个女人隔着几张空桌子，没有任何语言交流，但有一种沉重的理解横在中间。
        Anna 昨天来找过她，想知道 James 在厨房最后的时间都在干什么；她答不上来。
        她在这里唱了三年，却从来没看过这座酒吧底下的人是怎么活的。
        她不去巴黎了。她会接手这里，继续开门，至少要等到那些在厨房和后巷干活的人拿到合法身份——
        算是她替 Webb 补上没付的账。
        Zack 第一次对她表现出真正的认同："这不是一笔好算的账。"
        Vivian 看着他，不再有防备，也没有感激："我知道。所以在那之前，我们得先把 Webb 真正的账算清。跟我来吧。"
      vivian_status: "imprisoned → released → 主动选择留下经营蓝月亮 + 接过 Webb 未竟的账"

    # ── Act 3：保险箱——密码、字条、录音盘碎片 + Vivian 退场 ──
