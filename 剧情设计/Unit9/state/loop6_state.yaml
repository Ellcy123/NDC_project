      location: "警局走廊 → 蓝月亮酒吧"
      description: |
        Vivian 走出警局关押室，看到等在走廊的 Zack 和 Emma，以及站在角落的 Anna。
        她没有说话——低头看了看自己的手，然后抬头，只说了两个字："谢谢你。"
        之后来到蓝月亮酒吧，Anna 也在。
        Vivian 看了很久吧台、灯光、那些还没来得及清走的椅子，然后说：
        "我决定留下来经营这里。"
        Anna 什么都没说，但她坐了下来。
        两个被这个案子伤过的女人，在这个房间里沉默地坐着。
      vivian_status: "imprisoned → released → 主动选择留下经营蓝月亮"

