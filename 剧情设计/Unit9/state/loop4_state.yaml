      - "帮 Webb 勒索 Whale 的人不是 Vivian——另有其人（L5 揭示）"
      - "'Don't be bothering me!'——23:05 在门外听到的话（⭐ L5 口音谜题伏笔）"
      - "Vivian 终于不再坚持认罪——Zack 完成了'救 Vivian'的目标"

