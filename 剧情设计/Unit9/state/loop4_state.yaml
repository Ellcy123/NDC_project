expose:
  target: vivian
  target_talk: vivian_expose_L4
  scene_id: 9003
  is_liar: true
  player_inquiry: null
  exposeNpcId: 106
  total_rounds: 3

  context: |
    Zack 完成自由探索后，手握：
    - 9401 .45 警用弹壳（L3 post_expose 继承）
    - 9101 Vivian 的小手枪（.25 ACP，可分析派生 9711 无硝烟手枪）
    - 9402 被撕毁的合同（Whale 花大钱委托酒吧里的人做某件事）
    - 9054001 Tommy 证言（Rita 是 Whale 派来的间谍）
    - 9304 保险箱字条（密码 = 相遇日）
    - 9103 Webb 委托协议书（Webb 要保护 Vivian、确保遗产）
    Vivian 仍然坚持认罪："我杀了 Webb。"
    这场指证的基调是"救"——不是在审问凶手，而是在拯救一个想用死来解脱的人。

  # ── 轮次一：弹壳口径 vs 手枪口径不符 ──
  round_1:
    lie: "我真的杀了 Webb！"
    lie_source: 9063003  # Vivian 在 L3 Talk 阶段的认罪证词（跨 Loop 引用，仍然坚持认罪）
    usable_evidence:
      - id: 9401
        name: ".45 警用弹壳"
        note: "关键——现场唯一找到的弹壳，口径 .45 ACP——凶器是 .45 口径手枪"
        usage: "凶器口径是 .45 ACP——对应 .45 口径手枪"
      - id: 9101
        name: "Vivian 的小手枪（含分析派生 9711）"
        note: "关键——Vivian 的枪是 .25 ACP 口径；分析派生 9711 无硝烟手枪"
        usage: "Vivian 的枪是 .25 ACP，无硝烟反应——与弹壳口径不符，她的枪根本无法射出 .45 弹壳"
    requiredItems:
      - 9401
      - 9101
    result: partial_victory
    result_description: |
      Zack 指出：弹壳是 .45 ACP，你的枪是 .25 ACP——口径不对，凶器不可能是你的枪。
      Vivian 被这个事实击中，短暂沉默。
      但她随即退守到新的谎言（谎言 2）：
      "但除了我是凶手，没有其他人能够杀害 Webb！"

  # ── 轮次二：Whale 雇人已行动，打破"只有我能杀他" ──
  round_2:
    lie: "但除了我是凶手，没有其他人能够杀害 Webb！"
    lie_source: "NPC 退守谎言（round_1 结果 Vivian 主动提出）"
    usable_evidence:
      - id: 9054001
        name: "Tommy 证言：Rita 也是 Whale 派来的间谍"
        note: "关键——Whale 不仅有动机，还在酒吧内部安排了渗透者"
        usage: "Whale 身份由 Tommy 正式指认 + Rita 是 Whale 的内线——Whale 有动机、有渠道"
      - id: 9402
        name: "被撕毁的合同"
        note: "关键——Whale 花大笔钱委托了酒吧里的某人做某件事"
        usage: "实物证据：Whale 与酒吧里的某人签了合同，委托做某件事——直接指向 Whale 是幕后主使"
    requiredItems:
      - 9054001
      - 9402
    trap_evidence:
      - id: 9403
        name: "Vivian 的绝笔信"
        trap_reason: "绝笔信只证明 Vivian 有死志和绝望心态，不能反驳'Whale 已渗透酒吧并有准备行动'的维度——误用于 R2 会失败"
    result: partial_victory
    result_description: |
      Zack 向 Vivian 指出：还有一个人——Whale，他不仅可能是幕后主使，
      他甚至在酒吧里安排了人（合同为证）。
      Vivian 无法反驳这个逻辑——但她还有最后一道防线：
      "可是就算如此，也是因为他沉迷于 Rita……他早就把我忘了。"

  # ── 轮次三：Webb 没有忘记 Vivian，打破情感辩解 ──
  round_3:
    lie: "可是就算如此，也是因为他沉迷于 Rita……他早就把我忘了，我对他来说什么都不是了。"
    lie_source: "NPC 最后防线（Vivian 情感层面的退守——即使凶手不是她，Webb 也已经不爱她了）"
    usable_evidence:
      - id: 9304
        name: "保险箱字条（密码 = 相遇日）"
        note: "关键——Webb 将保险箱密码留给 Vivian，密码是他们相遇那天的日期"
        usage: "Webb 的保险箱密码是两人的相遇日——他在用保险箱保存重要的东西，密码是纪念日，说明他心里从未忘记 Vivian"
    requiredItems:
      - 9304
    result: full_breakthrough
    result_description: |
      保险箱字条戳破了 Vivian 最后的防线——
      Webb 的密码是他们共同的纪念日。
      Vivian 再无话可说，情绪彻底崩溃（从求死到接受被救的转变）。
      她最终承认：自己不是凶手，但她曾经有过杀人计划。
      Vivian 进入 post_expose 阶段，主动交出关键证言。

  # ── 指证后剧情（Vivian 交出证言） ──
  post_expose:
    description: |
      Vivian 彻底崩溃，从"求死认罪"到"接受被救"的情感转变完成。
      她开始主动说出真相——三条关键证言。
      随后，Morrison 进入 Webb 会客室，正式触发 turn_cutscene。
      Vivian 被押走时听到枪声"从头顶方向传来"（为 L5 假枪声诡计埋伏笔）。

    new_evidence_gained: null

    new_testimony_gained:
      - id: 9064005
        content: "Webb 利用 Vivian 勒索的都是孤立的银行家、工程师等中产阶级不抱团人士；帮 Webb 勒索 Whale 的人不是她"
        significance: "确认 Vivian 的勒索范围，排除她与 Whale 直接对抗；为 L5 指证 Jimmy 奠基"

      - id: 9064006
        content: "Vivian 在 23:05 准备去杀 Webb，在门口听到'Don't be bothering me!'就退走了；她越来越觉得不对劲，23:30 才回去推开了门"
        significance: "23:05 时间节点确认；'Don't be bothering me!'是 L5 爱尔兰口音谜题的关键伏笔"

      - id: 9064007
        content: "被带走时，Vivian 感觉枪声是从头顶方向传来的（23:30 那声枪响）"
        significance: "⭐ L5 假枪声诡计伏笔——枪响来自头顶（2F 厨房），不是 1F 会客室"
        metadata:
          cross_loop_critical: true
          loop5_critical: true
          usage: "L5 指证 Jimmy R1 的叙事背景支撑；鼓点遮掩假枪声的方向伏笔"

    player_knowledge_gained:
