turn_cutscene:
  type: turn_cutscene
  interlude:
    id: "U9-L4-INT-01"
    title: "Part1 情节转折——Morrison 变脸强押 Vivian"
    outline_anchor: "§L4 🔵 插入剧情：Loop1-4 结束的情节转折"
  location: "蓝月亮酒吧大厅（Morrison 出现的地方）"
  description: |
    【Part1 情节转折——Morrison 逆转】

    1. Zack 先指出：已得到 Vivian 不认罪的证词，Morrison 可以去向 Vivian 亲自求证。
    2. 接着 Zack 出示 .45 弹壳（9401）并提出推理：
       凶器型号是 .45 ACP，与 Vivian 的 .25 手枪不符——Vivian 无罪。

    Morrison 看到 .45 弹壳后——手停住、眼神定在弹壳上、沉默很久。
    （玩家可以看到"认出了某种东西"的反应，不是单纯的惊讶；state 只写动作变化，不写"米勒集团"字样）

    随后 Morrison 的态度急转直下：
    1. 不再客气，对 Emma 和 Zack 的态度变得强硬
    2. 程序性地宣布：Vivian 拥有杀人动机和计划，她的手枪就是真正的凶器
    3. 拿走了 Webb 委托协议书（9103）→ 状态更新为 confiscated_by_morrison
    4. 下令将 Vivian 逮捕，押回警局
    Morrison 的台词是程序性的，不愤怒、不解释——越平静越可怕。

    Zack 和 Emma 无力阻止——Morrison 是在场的最高警方权威。
    Vivian 被带走时回头看了 Zack 一眼（情感戏收尾）。

  evidence_status_changes:
    - id: 9103
      name: "Webb 委托协议书"
      change_type: "confiscated_by_morrison"
      agent: "Morrison（turn_cutscene 中拿走）"
      player_impact: "玩家手中不再持有 9103 实物；L5 无法以此证物对抗 Morrison；内容仍在 known_facts 中"
      reveal_loop: null

  npcs:
    morrison_turn_L4:
      talk: morrison_turn_L4
      is_liar: false
      # 注：Morrison 在此宣称"Vivian 的手枪是凶器"在技术上是谎言，
      # 但 L4 中玩家无法当场反驳——这是强制剧情转折，不是 Expose 轮次。
      # Morrison 的谎言将在 L6 的 Expose 中正式击破。
      motive: "快速压制 Zack 的调查，保护 .45 弹壳不被进一步分析；维持 Vivian 被逮捕、案件结案的结局"
      mindset: "权威、压迫，脸色骤变后迅速切换到强硬模式；程序性执法，不解释不愤怒"

      # ── 1. 已知信息 ──
      active_topics:
        - "强制宣布：Vivian 有动机有计划，手枪是凶器（强制剧情宣告，不在本 Loop 被反驳）"
        - "拿走委托协议书（9103）的行动（强制剧情动作）"
        - "宣布逮捕 Vivian——程序性执法，不解释原因"
      withheld_topics:
        - "他看到 .45 弹壳脸色一变的真实原因（L6 揭示）"
        - "9103 委托协议书被他拿走后的计划（L6 揭示）"

      # ── 2. 玩家询问意图 ──
      player_inquiry:
        - '"Morrison 为什么看到 .45 弹壳会脸色骤变（疑点 9402 推进驱动）" # 9'
        - '"Morrison 为什么要拿走委托协议书——他在阻止什么" # 9'

      # ── 3. 可提取证词 ──
      testimony_ids:
        # L4 turn_cutscene 中 Morrison 的谎言和行动均属 🔵 插入剧情台词/行为，不作为可提取证词


