  description: |
    Part1 的失败像重锤砸下：Vivian 无罪却被强押，Morrison 当场撕毁了协议书（9103），
    并从 Zack 手中夺走了那枚 .45 弹壳（9401）。Zack 两手空空——协议书没了，弹壳也没了。
    Emma 在旁边没有说"算了"，她递来一支烟，坐下来陪 Zack 把线索重新理一遍。
    两人的对话中，疑点系统 UI 正式浮现——四个待解的问题如锁一般悬在眼前：
    1. 23:05 隔着门吼退 Vivian 的人是谁？（疑点 9501）
    2. James 家为什么这么急需钱？（疑点 9502，F1 合并后显示）
    3. 鼓点高潮掩盖了真实枪声？（疑点 9503）
    4. Whale 和酒吧里的谁有生意往来？（疑点 9504）
    另有一个疑点在 UI 可见但标注"待解"：Morrison 为何看见弹壳脸色一变？（L6 才解锁）

    【搭档关系转折】
    关于被 Morrison 撕毁的委托协议书（9103），Emma 问 Zack 要不要继续调查——
    酬劳已无望，但 Vivian 还在警局、真凶仍在酒吧。
    Zack 决定坚持。Emma 真正把他当作值得并肩的搭档。

