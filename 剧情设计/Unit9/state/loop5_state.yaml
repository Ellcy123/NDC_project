suspect_suicide_sequence:
  type: forced_cutscene  # 🎬 强制剧情，无玩家操作
  interlude:
    id: "U9-L5-INT-01"
    title: "James 自杀"
    outline_anchor: "§L5 🔵 插入剧情：James 自杀"
  location: "蓝月亮酒吧后门"
  description: |
    【James 自杀序列——时序】

    1. Expose R3 完成：
       Zack 和 Emma 指证 James 的整个过程，等同于在 Whale 手下面前
       公开宣告 James 和 Whale 的关系、James 接受的委托、整桩案件的内幕。

    2. 鸣笛（R3 结束，Zack 说出 Whale 名字后）：
       注意：这里是"鸣笛（whistle）"，不是"枪响（gunshot）"。
       来自酒吧后门暗处的一声哨声——那是 Whale 手下给 James 的信号：
       事情败露，无法挽回。James 紧张但还在撑——尚未崩溃。

    3. Zack 的字迹叙事对白（post_expose_dialogue——压垮骆驼的最后一根稻草）：
       Zack 对 James 说："威胁 ROSA 的也是你——那个纸条和合同上面的 J 都是倒着写的。"
       依据是 Zack 在 James 家观察到的英语练习书（9504，envir/pickup:false）。
       这不是 Expose 轮次，而是 Expose 之后的脚本对白。

    4. James 发疯：
       字迹对白让 James 意识到——连 Rosa 那条胁迫线也被 Zack 看穿了。
       James 进入非逻辑的情绪性否认状态："不是我……我没有……"

    5. James 的最后选择——自杀：
       James 看了一眼暗处的方向（Whale 手下所在位置），
       明白了一件事：自己已经彻底暴露。
       为了保护 Anna 和未出生的孩子，James 做出了最后的选择。
       他拔出了那把曾经杀死 Webb 的米勒集团特制手枪，开枪自杀。
       死前，他看向 Zack 和 Emma，说出了最后的话：
       "Anna……照顾好她……"

    6. 现场遗留：
       James 的尸体旁，留下了那把米勒集团特制手枪（9601）——
       那把枪，曾经在 23:00 杀死了 Webb，
       现在又杀死了使用它的人。

