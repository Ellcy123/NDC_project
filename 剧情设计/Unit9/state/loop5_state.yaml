    - role: "Whale 的手下（复数）"
      visibility: hidden
      presence_mode: "环境暗示——灯影、脚步声、后门另一侧隐约的呼吸声"
      narrative_function: |
        Whale 的手下作为不可见的背景存在，影响 James 的情绪反应：
        James 知道他们就在附近，他在 Zack 面前的每一个字都暴露在 Whale 的眼皮底下。
        这是 James 情绪紧张（而非单纯心虚）的根本原因。
        他们的存在将在 R3 结束时通过"鸣笛"正式提示——那一声哨声是给 James 的信号：
        事情已经败露，无法挽回。
      trigger_event: "R3 结束（Zack 提到 Whale 名字）→ 手下鸣笛（whistle）"

  design_note: |
    Zack 和 Emma 的闯入，等同于在 Whale 手下面前公开宣告了 James 的身份。
    这一场景是 James 最终自杀的叙事前提：
    他知道，指证一旦开始，无论结果如何，自己都已无法保全 Anna。
    唯一的出路，是在彻底暴露之前，用死亡切断所有通向 Whale 的线索。

# ─────────────────────────────
# 五、指证（⚔️ Expose：James）——三轮谎言
# ─────────────────────────────

expose:
  target: james
  target_talk: james_expose_001
  is_liar: true
  player_inquiry: null

  context: |
    Zack 完成自由探索后，手握：
    - 9501 完整节目单（Tommy 交出）
    - 9502 节目修改申请（Tommy 交出）
    - 9075001 James 口音证词（厨房口音暴露，非物证）
    - 9503 James 给 Whale 的回信（James 家发现）
    - 9504 Berlitz 英语练习书（James 家 envir 观察——不是手持物证；将在 post_expose_dialogue 使用）
    - 9505 Anna 的合法移民申请通过通知（James 家卧室梳妆抽屉发现；附 James 配偶非配额申请资格书）
    - 9085001 Anna 证言：怀孕 + 急需大笔钱（James 家获得）
    - 9054002 Tommy 证言：知道 Whale 的只有前/现勒索人（L4 已获得，L5 继续使用）
    - 9402 被撕毁的合同（L4 发现，Whale 委托某人）
    - 9302 Rosa 威胁纸条（L3 取得，字迹三物之一）
    - 9064001 Vivian 证言：23:05 在门口听到"Don't be bothering me!"（L4 指证后取得，对话叙事引用，不进 requiredItems）
    James 面对 Zack 和 Emma 的正面指控。

  # ── 轮次一：鼓点时间线——"我当天有不在场证明，枪声发生在 23:30" ──
  round_1:
    lie: "我当天有不在场证明，枪声发生在 23:30，不可能有其他时间能杀人，如果有枪声大家都能听到"
    lie_source: 9075002  # James 在 Talk 阶段声称自己一直在厨房（不在场证明暗示）
    requiredItems:
      - 9501  # 完整节目单——23:00 鼓点高潮，全曲最强爆发，足以掩盖枪声
      - 9502  # 节目修改申请——Vivian 申请改曲目并调至最高音量，证明 23:00 鼓点高潮是有人刻意安排
    trap_evidence:
      - id: 9306
        reason: "L3 节目单碎片——只有曲目名，无演奏时间；无法证明 23:00 鼓点高潮；误用此件将失败"
    usable_evidence:
      - id: 9501
        name: "完整节目单"
        usage: "完整节目单明确标注：23:00 是《艾斯弗德狂想曲》第三乐章鼓点高潮，全曲最强爆发——此时酒吧内所有人都听不清其他声音，枪声完全可以被掩盖"
      - id: 9502
        name: "节目修改申请"
        usage: "Vivian 亲笔申请将节目改为《艾斯弗德狂想曲》并调至最高音量——23:00 鼓点高潮的出现是有人事先安排的，并非偶然"
    result: partial_victory
    result_description: |
      Zack 指出：23:00 的鼓点高潮足以掩盖枪声——真实案发时间是 23:00–23:05，不是 23:30。
      你的"不在场证明"建立在虚假的时间线上。
      James 短暂语塞，随即提出新的反驳：
      Vivian 当时去找 Webb 了！说明 Webb 那时候还活着，所以不可能是那会儿作案。

  # ── 轮次二：爱尔兰口音身份——"Vivian 当时去找 Webb 了！说明他还活着" ──
  round_2:
    lie: "Vivian 当时去找他了！说明当时 Webb 还活着，所以不可能是那会儿作案的"
    lie_source: "R1 被击破后 James 主动提出，以 Vivian 的行动为挡箭牌"
    requiredItems:
      - 9505  # Anna 的合法移民通过通知（附 James 配偶资格书）——坐实 James 爱尔兰裔身份（James O'Sullivan，科克郡）
      - 9075001  # James 口音证词——脱口说出"Don't be bothering me!"，爱尔兰裔 Hiberno-English 特有句法
    # 注：Vivian 证言 9064001"23:05 被 Don't be bothering me! 吼退"作为对话叙事引用，不进 requiredItems——讨论结论裁决 6
    trap_evidence:
      - id: 9207
        reason: "James 工资单——证明缺钱是动机维度，不反驳口音/身份论点；误用此件将失败"
    usable_evidence:
      - id: 9505
        name: "Anna 的合法移民申请通过通知"
        usage: "Anna 刚拿到合法移民通过通知（原籍爱尔兰科克郡）；附件《非配额移民申请资格书》上写着 James O'Sullivan（James），以 Anna 配偶身份申请豁免——两件合起来坐实 James 是来自爱尔兰科克郡的非法身份移民；爱尔兰裔英语（Hiberno-English）有独特语法习惯，'Don't be bothering me!'是典型爱尔兰句式，不是美式英语说法"
      - id: 9075001
        name: "James 口音证词（厨房对话记录，非物证）"
        usage: "James 在厨房对话中脱口说出'Don't be bothering me!'——这句话与 Vivian 23:05 在会客室门口听到的完全一致；说那句话的人是 James，他在 23:05 模仿 Webb 的声音把 Vivian 骗走了"
    result: partial_victory
    result_description: |
      Zack 指出：Vivian 在 23:05 听到的"Don't be bothering me!"不是 Webb——
      这是爱尔兰裔英语的特有句法，你刚才也用了这个句法。
      你在那个时间模仿了 Webb 的声音，把 Vivian 骗走了。
      James 脸色发白，开始语无伦次，随即换了一道防线：
      那个人不是我，我根本没有理由杀 Webb。

  # ── 轮次三：动机三件组合——"我根本没有理由杀 Webb"（Expose 最终轮）──
  round_3:
    lie: "那个人不是我，我根本没有理由杀 Webb"
    lie_source: "R2 被击破后 James 的新防线：否认动机"
    requiredItems:
      - 9402  # 被撕毁的合同——Whale 花大笔钱委托酒吧内部某人，字迹与纸条一致，签约方是 James
      - 9085001  # Anna 证言——怀孕急需大笔钱；James 接受委托的根本动机
      - 9054002  # Tommy 证言——知道 Whale 的只有前/现勒索人（L4 获得），James 就是现勒索人
    # 注：三件组合，讨论结论裁决 2——Expose.requiredItems 不受疑点 condition 件数上限约束
    # 注：9054002 来自 L4 Tommy Talk 已 get 持续持有；L5 不重复 get（state 与草稿 §2 头部协议复用 L4 持有版本）。
    #     L5 草稿 §2 双选择节点改造后未在主干安排 Tommy 复述这条信息，按"持有→直接出示"路径，本轮指证仍可正常使用。
    trap_evidence:
      - id: 9403
        reason: "Vivian 绝笔信（L4 道具）——只证 Vivian 有杀意，不反驳 James 的动机论点；误用此件将失败"
    usable_evidence:
      - id: 9402
        name: "被撕毁的合同"
        usage: "Whale 花大笔钱委托酒吧内部某人做件事；合同字迹与 Rosa 威胁纸条（9302）字迹高度一致——同一人所写；签约方就是 James"
      - id: 9085001
        name: "Anna 证言：我们的孩子快出生了，家里需要一大笔钱"
        usage: "Anna 亲口说出：家里急需大笔钱来迎接孩子的到来，爱尔兰裔在艾斯弗德的处境本就艰难——这正是 James 为何要接受 Whale 委托的根本动机"
      - id: 9054002
        name: "Tommy 证言：知道 Whale 存在的只有前/现勒索人（L4 获得）"
        usage: "Tommy 确认：这家酒吧里知道 Whale 存在的人，只有前勒索人和现勒索人；James 接了 Whale 的委托，说明他就是那个知道 Whale 的现执行人"
    result: expose_complete
    result_description: |
      Zack 指出：你有动机——Anna 怀孕，家里急需大笔钱；
      Whale 给了你一个机会：杀掉 Webb，把一切推给 Vivian，换取一大笔钱。
      你签了那份合同，你就是执行人。
      Zack 说出"Whale"这个名字的瞬间——
      一声来自暗处的哨声（鸣笛）刺破夜空。
      James 的身体猛地一僵——他知道那声哨是什么意思。
      那是 Whale 手下给他的信号：你已经暴露了，什么都挽不回了。
      James 紧张到极致，但还在撑——Expose 到此结束。
      接下来进入 post_expose_dialogue（字迹叙事对白），压垮骆驼的最后一根稻草还没落下。
    post_round_event:
      trigger: "Zack 在指证中提到 Whale 的名字"
      event_type: "whistle"  # 鸣笛（whistle），严格区别于枪响（gunshot）
      source: "暗处潜伏的 Whale 手下"
      audio_cue: "whistle（哨声）——给 James 的暗号：你已经暴露，事情败露"
      narrative_effect: |
        一声来自暗处的哨声刺破夜空。
        James 的身体猛地一僵。
        那是 Whale 手下给他的信号：你已经暴露了，什么都挽不回了。
        James 紧张但还在撑，尚未崩溃；崩溃发生在随后的 post_expose_dialogue 中。

  # ── R4 叙事收尾（非指证操作，narrative_closure）──
  narrative_closure:
    type: narrative_closure  # 非指证轮次，不走 Expose 流程
    description: |
      James 重复性短句碎片："不是我……我没有……我没有……"
      Zack 接上："威胁 Rosa 的也是你——那个纸条和合同上面的 J 都是倒着写的。"
      引用：9504 英语练习书倒写 J 与 9302 纸条倒写 J 吻合（Zack 凭 James 家观察记忆）。
      这是对 L3 疑点 9302 胁迫者身份的补完，不挂独立疑点。
    reference_evidence:
      - id: 9302
        name: "Rosa 威胁纸条（L3）"
        usage: "字迹三物之一——倒写的 J"
        presentation_mode: "Zack 心证，不主动出示"
      - id: 9402
        name: "被撕毁的合同（L4）"
        usage: "字迹三物之二——与 9302 字迹一致"
        presentation_mode: "Zack 心证，不主动出示"
      - id: 9504
        name: "Berlitz 英语练习书（L5）"
        usage: "字迹三物之三——Zack 在 James 家观察到的 envir 道具（pickup:false）；以对白形式使用，不作为物证出示"
        presentation_mode: "Zack 凭观察记忆陈述，不作为物证出示"

