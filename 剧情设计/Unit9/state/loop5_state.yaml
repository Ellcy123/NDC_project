  time: "晚上 8 点（呼应 9503 回信约定时间）"
  description: |
    Zack 和 Emma 返回酒吧，带齐了证据。
    Zack 决定：直接找 James，要求他跟自己去警局，
    指证他是 Webb 案的真正凶手，以此证明 Vivian 的清白。
    Emma 支持——她和 Zack 一起行动。

    两人来到蓝月亮酒吧后门。

    开场状态（暗示性叙事，非直接展示）：
    James 独自站在后门暗处等待——他是来和 Whale 手下做最后交接的，
    但交易还没开始。按照 9503 回信的约定，今晚的事项是：James 归还那把
    米勒集团特制手枪（9601，当初杀 Webb 用的那把），Whale 手下结清尾款。
    James 手里没有钱——他空着手，怀里只揣着那把待归还的枪。
    Zack 和 Emma 抵达时只能看到 James 的身影立在阴影中，神情紧绷、动作迟疑。
    场景光线昏暗，空气里是一种"交易还没开始就被打断"的凝滞感。
    James 看见 Zack 和 Emma 出现，身形微微一僵——他知道自己完了：
    交易没完成，枪还在身上，Whale 手下就在不远处盯着这一切。

