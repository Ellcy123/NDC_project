scenes:

  # ── 场景 9010：Tommy 办公室 ──
  - id: 9010
    name: "Tommy 办公室"
    type: free_exploration  # 🔓 自由探索（玩家搜证 → Tommy 回应交代）
    description: |
      Tommy 在自己的办公室里。他没有主动拿出任何东西——
      完整节目单（9501）和 Vivian 的节目修改申请（9502）静静地放在他办公桌的文件堆里，
      等玩家自己搜证发现。
      Zack 翻出这两件东西后，Tommy 并不阻拦，只是平静地解释："本来也是想给你的。"
      他对 Morrison 把 Vivian 强押回警局这件事深感同情——
      Vivian 是他看着成长起来的歌女，这桩冤案他看在眼里却救不了她。
      他没有直接点名 James，但追加了一条关键证言：
      知道 Whale 存在的人，在这家酒吧只有前勒索人和现勒索人——
      然后郑重地对 Zack 说：希望你能查明真相，还 Vivian 清白。

      在 Zack 准备离开前，Tommy 从抽屉深处取出一枚生锈的 .45 警用弹壳（9506），
      放在桌上推过去——这是他自己过去的旧事：几年前他还是 Webb 的勒索执行人时，
      曾勒索到 Whale 头上，被 Whale 手下开枪警告，弹壳落在他身边，他捡走当保命凭据。
      交出它 = 暴露自己曾经勒索者的身份。他信任 Zack 真的站在真相那一边，才敢放出这块旧伤。
      这是情感信物，不挂疑点、不作击穿件，但弹底"MILLER ARMS"印记与 9401 同批次——
      为 Unit2 埋下米勒集团在南区布局年头已久的旁证。

      【玩家选择节点 1：Tommy 离开】
      交出弹壳后，Tommy 突然说自己今晚必须离开酒吧——他感觉到 Whale 的人一直在盯着这里，
      他不能再待下去了。玩家在此面临第一个选择节点（正确答案：放他走）：
      - 拦住他 → bad_ending_1（Tommy 判断被怀疑，立刻封口；Whale 手下察觉异动，局势崩溃；loop 失败）
      - 等等   → bad_ending_1（Tommy 沉默离去，什么都没留下；loop 失败）
      - 放他走 → correct_path，触发 Emma 时间限制 + 玩家选择节点 2

      【玩家选择节点 2：去找谁】
      Tommy 离开后，Emma 立刻说：时间只够再去一个地方——Rosa、Vivian、James，你去哪？
      （正确答案：James）
      - 去找 Rosa   → bad_ending_2（Rosa 已供出一切无新线索，James 趁机跑路；loop 失败）
      - 去找 Vivian → bad_ending_3（Vivian 被关押无法接触，时间白费，James 跑路；loop 失败。
                       讽刺：玩家相信了"她自首了"这个最大的谎言）
      - 去找 James  → correct_path，进入 Scene 9009 James 厨房

    evidence:
      - id: 9501
        name: "完整节目单 / Complete Program List"
        type: item
