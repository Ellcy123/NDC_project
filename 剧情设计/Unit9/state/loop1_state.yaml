    # 注意：这是"假胜利"——loop1 没有真正救出 Vivian，只换到 72h 调查期
    - "Vivian 手中手枪无硝烟反应——她不是刚刚开枪的那个人（但不排除另有一把枪）"
    - "Rosa 的谎言1（Vivian 刚刚开枪）被推翻，Morrison 指出硝烟可能消散，Rosa 的话已打折扣"
    - "谎言2（23:30 枪响 + 只有 Vivian 在场）在本 Loop 无法反驳——时间线谜题留待后续"
    - "Webb 委托协议书证明 Webb 早知道自己有被害风险，Morrison 认可了 72 小时调查期"
    - "Webb 紧急雇佣存在'保险倾向'——他提前规划了 Vivian 的继承权，意味着他预感到自己会死"
    - "Emma 提出核心疑点：Webb 自己真正怀疑的凶手到底是谁？"
    - "Vivian 被 Morrison 要求禁足"

