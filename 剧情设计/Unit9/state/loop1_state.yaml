# 四、指证（⚔️ Expose：Rosa）
# ─────────────────────────────

expose:
  target: rosa
  target_talk: rosa_expose_001
  is_liar: true
  player_inquiry: null

  context: |
    Rosa 当众指控 Vivian 是凶手，Morrison 准备逮捕 Vivian。
    Vivian 沉默不反驳，呈现准备认罪的姿态。
    Zack 必须在这里反击 Rosa 的指控，否则调查权就此终止。

  # ── 轮次一：击破硝烟谎言（有局限） ──
  round_1:
    lie: "Vivian 此刻手里正拿着一把手枪，她一定是刚刚杀了 Webb"
    lie_source: 9031001  # Rosa 的谎言1证词
    usable_evidence:
      - id: 9711
        name: "无硝烟的手枪（分析派生）"
        用途: "枪管无硝烟残留，证明该枪近期未被击发，Rosa 所谓'刚刚开枪'不成立"
    result: |
      Rosa 的谎言1被推翻：Vivian 手中的枪根本没有开过。
      Morrison 表情微变，但随即指出"硝烟可能消散"，不再那么肯定——R1 打破但有局限。
      Rosa 立刻补充新的指控（谎言2），事件进入第二轮。
      # 风险 A（讨论结论）：Morrison 的"硝烟消散"反驳要带一丝不确定口气，保留玩家"我是对的但还不够"的情绪

  # ── 轮次二：时间线谜题（新手教程失败点）──
  round_2:
    lie: "大家都听到了 23:30 的枪响，当晚并没有其他枪响，当时只有 Vivian 在里面，所以只能是她杀的"
    lie_source: 9031002  # Rosa 的谎言2证词
    usable_evidence: []  # 刻意为空——loop1 无证据可反驳
    result: tutorial_failure
    # tutorial_failure 说明：
    # 这是整个游戏"时间线玩法"的新手教程版本。
    # 玩家在此处无论使用什么证据都无法击穿 Rosa 的时间线论点。
    # 设计意图：让玩家第一次体验"打不穿"的挫败感，
    # 为后续 loop3 的时间线谜题（玻璃碎片 + Rosa 倒垃圾时间）埋下悬念。
    # 游戏继续：挫败不等于结束——Zack 转而出示 Webb 委托协议书换取 72 小时调查期。

  # ── 🔵 [U9-L1-INT-01] 插入剧情：指证结束剧情（72h 调查期换取）──
  post_expose:
    interlude:
      id: "U9-L1-INT-01"
      title: "指证结束剧情——72h 调查期换取"
      outline_anchor: "§L1 指证结束剧情"
    description: |
      尽管谎言2无法被击穿，Zack 揭穿谎言1已使 Rosa 的可信度大打折扣。
      Zack 出示 Webb 委托协议书（9103）——证明 Webb 预感被害并提前立协议保护 Vivian。
      Morrison 看在"Zack 揭穿了 Rosa 部分谎言 + Webb 生前委托"的份上，
      同意给 Zack 72 小时时间进行调查，暂缓逮捕 Vivian；但要求 Vivian 禁足酒吧。
      # 风险 B（讨论结论）：此处需要 Emma 帮忙换到 72h 的"小正向锚点"，避免玩家带受挫情绪进 L2
    new_evidence_gained: null
    player_knowledge_gained:
      - "Webb 提前立协议 = 他预感自己会被害（保险倾向），调查 Webb 的目标人物很有价值"
      - "时间线谜题悬而未决——loop1 的调查目标由此成立"

