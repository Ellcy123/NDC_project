opening:
  type: cutscene  # 🎬 硬切，无玩家操作
  scene_id: 9004
  description: |
    Zack 和 Emma 站在蓝月亮酒吧大门口聊天——酒保刚刚拒绝让 Zack 进入，
    Emma 凭新闻嗅觉感觉今晚会有大事，以"King Oliver sent us."接头暗语引路入场。
    两人进入大堂（场景 9004 酒吧大堂），边聊边观看舞台表演。
    23:30，会客室方向传来枪响。Zack 和 Emma 从歌舞厅赶到会客室——到达时，
    Vivian 手持一把小手枪怔愣在原地（半醉失神，眼神涣散），Rosa 也在场。
    随后，同样听到枪响的 Morrison 醉醺醺地赶到查看尸体——他平时就常来蓝月亮喝酒，
    和 Webb 关系还行；得知是 Webb 死亡，他一边嫌麻烦一边还是姑且秉公办事，
    宣布 Webb 已经死亡，并表示要逮捕 Vivian。

  emma_001:
    talk: emma_001
    is_liar: false
    motive: "新闻嗅觉驱动，对今晚的舞会抱有期待；同时是 Zack 进入上流俱乐部的引路人"
    mindset: "职业兴奋感，边聊边观察，即将切换到记者状态"

    # ── 1. NPC 已知信息 ──
    active_topics:
      - "Zack 被 Webb 紧急雇佣（Emma 是引路人，但合同细节不清楚）"
      - "酒保不让 Zack 进酒吧，Emma 以'King Oliver sent us.'接头引路入场"
      - "Webb 是蓝月亮酒吧老板，今晚举办舞会"
      - "23:30 枪响，Vivian 手持手枪，Rosa 在场"
      - "Morrison 宣告 Webb 死亡"
    withheld_topics:
      - "Webb 委托协议书的具体内容（保护 Vivian + 继承遗产）"
      - "手枪是否有硝烟反应"
      - "Rosa 指控的真实动机"
      - "勒索生意（loop2 才揭示）"
      - "Jimmy 存在及其真相（loop5 才揭示）"

    # ── 2. 玩家询问意图 ──
    player_inquiry:
      - "Emma 作为引路人，Zack 需要解释自己与 Webb 的合同关系" # 6
      - "Emma 的新闻嗅觉——她觉得今晚会发生什么大事" # 5

    # ── 3. 可提取证词 ──
    testimony_ids:


