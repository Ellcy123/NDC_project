# ═══════════════════════════════════════
# PART 3: 指证（Expose）
# ═══════════════════════════════════════
#
# 场景状态表: Frank家次卧(Danny) → 🔓搜证 → ⚔️指证(Danny)
# 指证设计: 3轮（"Rose最近才来" → "Rose骗叔叔贷款" → "Rose图遗产"）
# 核心冲突: Danny的种族偏见+财产贪婪 vs Rose的五年真爱+无私放弃

expose:
  target: "Danny (07)"
  total_rounds: 3
  # Danny的Talk/证词见上方 scenes → SC2012 → danny_002

  # ── 第一轮：击破"时间"谎言 ──
  # 旧沙发(2401) + 褪色窗帘(2402) + 地板磨痕(2403) → 长期使用证据
  # 照片墙(2404) → 补充，直接证明关系五年
  round_1:
    lie: "Rose Martinez最近才勾引我叔叔，他老了判断力不行了！"
    lie_source: "证词 2071001（L3 danny_001 ⚠谎言——Danny声称Rose'最近才勾引叔叔'）"
    usable_evidence:
      - id: 2401
        name: "房间旧沙发"
        用途: "扶手磨损严重、坐垫凹陷至少3-5年——不是'最近'能形成的痕迹"
      - id: 2402
        name: "地下室褪色窗帘"
        用途: "窗帘褪色明显，悬挂至少3-5年——房间被长期使用"
      - id: 2403
        name: "地板固定位置磨痕"
        用途: "特定位置深度磨痕——房间被长期、固定地使用，Margaret鞋坊在一楼，没理由长期使用地下室"
      - id: 2404
        name: "照片墙"
        用途: "5张照片从1920年公园野餐到1925.10.15房间合影——两人关系横跨五年"
    result: |
      Danny被迫承认两人认识已久：
      - 沙发磨损3-5年 + 照片横跨1920-1925 = "最近"是彻底的谎言
      - Danny从"最近"退守为"认识久一点"
      - Rose（在场）含泪证实："我和Frank相爱五年了…"
