validation_status:
  cross_check: "2026-03-07 FAIL: 1 issues"
  structure_completeness: "PENDING"
  evidence_coverage: "PENDING"
  npc_entries: "PENDING"
  goal_alignment: "PENDING"
  info_pacing: "PENDING"
  expose: "PENDING"
