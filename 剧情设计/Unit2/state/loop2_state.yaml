      trap:
        - id: 2201
          reason: "Leonard 名片只证明他是银行职员（贷款部主任），不能证明他与 Vinnie 相识——R1 要击穿的是'不认识催债的人'，需要 Russo 这个旧名作为认识 Vinnie 的锚点，单出示名片只会让 Leonard 说'我是银行职员，谁都可能拿到我名片'"
    result: |
      Leonard 被 Vinnie 的口误和档案改名双重击中，无法否认两人认识。
      立刻退守新防线："我们只是认识——认识不等于有来往，更不等于他替我做什么。"

  # ── 轮次二：击破"只是认识没来往" ──
  round_2:
    lie: "我们只是认识，没有什么来往"
    lie_source: null  # R2 谎言为 Expose 内部退守对白，无 testimony ID（R1 被破后 Leonard 当场说出）
    evidence_set:
      usable:
        - id: 2202
          purpose: "O'Hara 塞给 Zack 的两张连号新钞（901B、905B）——中间隔着 902B/903B/904B 三张空缺，钱本身来自 Leonard 经手放贷"
        - id: 2206
          purpose: "Tony 找零的三张连号新钞（902B、903B、904B）恰好填补 O'Hara 那两张中间的空缺——五张拼回完整连号 901–905，证明同一批资金从 Leonard 流出，经 O'Hara 之手分流给 Vinnie，再被 Vinnie 在 Silver Moon 消费时留给 Tony；Leonard 和 Vinnie 之间有资金流动，不只是'认识'"
      trap:
        - id: 2203
          reason: "催款单只证明银行在追债，不能证明资金链具体流向 Vinnie——只解决银行有催债的问题，不解决谁在催"
    result: |
      连号钞票拼图直接展示资金流通——O'Hara 借到的 901–905 连号新钞，中间三张
      经 Vinnie 转手出现在 Tony 找零里。Leonard 无法解释为何自己经手放给 O'Hara 的钱
      会绕一圈出现在 Vinnie 的零钱里。被迫再退守："那是我私下借给 Vinnie 的钱，他还给我——怎么用是他的事。"

  # ── 轮次三：击破"那是借给 Vinnie 的钱" ──
  round_3:
    lie: "那是我借给 Vinnie 的钱，和催债没关系"
    lie_source: null  # R3 谎言为 Expose 内部退守对白，无 testimony ID（R2 被破后 Leonard 当场说出）
    evidence_set:
      usable:
        - id: 2092002
          purpose: "Tony 明确说 Vinnie 花钱时说的是'赚了一笔'，不是'还了债'——Vinnie 自己都没说是还款"
        - id: 2205
          purpose: "Vinnie 的催债小本子里标注'L.R.'（Leonard Ross 首字母）+ 银行地址——这是 Vinnie 的工作记录，不是个人债务记录"
      trap:
        - id: 2092001
          reason: "Tony 说的'今天又赚了一笔'是疑点 condition 之外的同源证词，但单独使用无法反驳'借来的钱花掉'——Vinnie 说赚了一笔可以是别的来源，需要与小本子结合才能构成反驳"
    result: |
      Leonard 的三层防线全面崩溃。
      他假装叹气，改换策略——"好吧，Frank 的确欠银行的钱，我用了一些……非正规的方式催收，
      你也知道艾斯弗德是什么地方，这种事很普遍。"
      表情从惊慌变为假善意：掏出一个信封，说"这里有我的亲笔介绍信，你拿去市政厅
      申请搜查令，如果真能查出什么，我会全力配合。"
      内心：他知道这封信根本没用，只是在拖延 Zack。

  # ── 指证后剧情 ──
  post_expose:
    talk: leonard_l2_postexpose
    description: |
      Leonard 承认雇用 Vinnie 暴力催债，但将其美化为"非正规但普遍的做法"。
      他递给 Zack 一个信封（签着自己名字的介绍信），声称凭此可申请搜查令。
      Zack 收下信封（此时不知道是假的）。
      背景补充：Moore 行长在贵宾室隔着玻璃目睹了指证的收尾，
      脸上带着冷静的旁观者表情，不介入也不阻止。
    new_evidence_gained: null
    player_knowledge_gained:
      - "Leonard Russo/Ross 雇用 Vinnie 暴力催债，Frank 是受害者；两人五五分成"
      - "Leonard 给 Zack 一封签名介绍信，声称可以申请搜查令——Zack 拿走信封（伏笔：L3 开篇被拒）"
      - "Moore 行长全程旁观，不介入——他知道银行在做什么，也知道 Leonard 的信封没用"

