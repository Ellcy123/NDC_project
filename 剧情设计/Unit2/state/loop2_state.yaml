opening:
  type: cutscene  # 🎬 硬切过场——圣心医院病房
  talk: opening_l2_hospital
  location: "圣心医院 Margaret 病房（场景 2006）"
  description: |
    L2 自动触发。Zack 持 Mickey 电报赶到圣心医院。
    病房门口，Mickey 等候——12 年未见的童年好友，如今是一身剪裁合体西装的成功律师。
    Mickey 介绍自己：他是 Frank 的代理律师，本约定今天来检举银行-黑手党勾结材料，
    但 Frank 没有出现；他在路边发现了昏迷的 Margaret，叫了救护车送来。
    病床上 Margaret 未醒，呼吸平稳，医生说需要观察。
    Mickey 邀请 Zack 进他的律所——事务所在市中心，背景过硬，可以帮 Zack 运作这件案子。
    Zack 谢过，表示先自己查。Mickey 不催，笑着说"随时来找我"。
    Mickey 离开后，Zack 开始 L2 自由探索。

