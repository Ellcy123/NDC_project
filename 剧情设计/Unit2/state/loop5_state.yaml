    posed_loop: 5
    resolved_loop: 5
    status: "unlocked_loop5"
    # 3 件 condition（讨论结论 5.1 裁决：2114004 必须挂疑点 condition；单疑点件数无硬上限，≤2 为推荐非强制）；
    # 时序合规：2114004 在 L4 post_expose 取得，疑点首现 L5 ≥ L4 ✅
    # L5 R1 击穿 Vinnie"很久没去 Frank 那附近"谎言时解决

