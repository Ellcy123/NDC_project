# 一、玩家视角
# ─────────────────────────────

player_context:
  goals:
    primary: "Frank 被杀那晚到底发生了什么？谁在案发现场，谁做了什么？"
    secondary:
      - "查清小铁盒里的举报材料指向谁——Frank 冒险收集这些证据，是针对什么人"
      - "查清打火机为何在废墟里完好无损——火灾现场的痕迹是否经过伪造"
      - "查清 Vinnie 与案发当晚的关联——他说'两三个月没去'，这是真话吗"
      - "决定下一步：站在法庭上当律师，还是继续追查真相"

  known_facts:
    # loop1-4 post_expose_knowledge 全部累积
    - "死者确认为 Frank Kowalski（73 岁退休工人，Margaret 鞋坊雇员）"
    - "死亡地点：Margaret 鞋坊卧室区；Morrison 原编造死因为'厨房失火意外'"
    - "Morrison 承认：EPI01 旧仇 + 省事结案；有本地黑手党打电话警告他别深究（Whale 系伏笔）"
    - "Morrison 承诺：拿出'他是被人杀的'硬证据，他签搜查令（L6 兑现钩子）"
    - "Margaret 是 Zack 的母亲，案发当晚被 Vinnie 从背后打晕，现在圣心医院昏迷治疗"
    - "Mickey 是 Frank 的律师，本约定当晚来检举银行犯罪行为但 Frank 没出现；在路边发现昏迷的 Margaret，送医后发电报告知 Zack"
    - "湖滨信托银行实施掠夺性贷款（年单利 12% + 月管理费 50$，5 年总计约 3,960$）；使用 Lakeshore Investment Co. 马甲规避银行法"
    - "Leonard 雇佣 Vinnie 暴力催债，对半分成；Leonard 童年改名（Russo → Ross）以融入白人社会"
    - "Frank 贷款协议签名是伪造的——2301 + 2302 双件直接对比签名笔迹即可证明"
    - "Danny 在 L2 银行大厅偷听到 Leonard 谈 Frank 房产证；Moore 承认是 Danny 把房产证给了银行换沉默（证词 2083004）"
    - "Danny 坦承：11月6日晚与 Frank 同路出门去赌场（被 O'Hara 目击），并非凶手"
    - "Danny 目击证词（2114004）：晚 8 点多，块头大深色衣服像意大利人的壮汉从鞋坊方向匆忙离开，还打晕了 Margaret；看见戒指从她手旁滚出来反光"
    - "Margaret 的婚戒出现在 Danny 房间——Danny 在街边顺手捡走的；已物归原主"
    - "Lula Washington 是 Frank 相恋五年的真爱，圣卢克医院护士；二人秘密约会地点是 Margaret 鞋坊地下室（Margaret 借出并支持）"
    - "Lula 在 L4 post_expose 提到 Frank 主屋床后藏有一个密码锁小铁盒——L5 开篇带 Zack 去取，密码是相遇年 1923"
    - "Frank 不会做饭，绝不会用 Margaret 的厨房——Lula 证词 2124001 回收 L1 Emma 皱眉伏笔（'厨房失火点'是 Morrison 编造的，也与实际不符）"
    - "O'Hara 目击：11月6日晚 7 点 Frank 出门前后脚 Danny 也出门，走同一条路"
    - "O'Hara 目击：Lula 至少四五年前就来这条街，经常去 Frank 家"
    - "地下室旧沙发磨损 3-5 年，与 Lula 证词互证；求婚戒指（2403）藏在玫瑰花蕊中"
    - "Frank 遗嘱：全部遗产默认归 Lula Washington（法定受遗赠人）；若 Lula 拒绝则兜底捐艾斯弗德工人互助会；Lula 当场签署放弃继承——放弃她本该完整获得的遗产，启动兜底条款"
    - "Lula 在 L4 自发出现在 Margaret 鞋坊店铺区 + R3 厕所小窗外——跟随 Zack/Mickey 到 Frank 家，进不了男厕所只能站在侧墙小窗外听全过程；R3 举证已签好的放弃继承协议"

  new_directions:
    - direction: "Lula 带 Zack 去 Frank 家主屋取床后密码锁小铁盒——Frank 一定留下了什么"
      trigger: "L4 post_expose：Lula 提到 Frank 留了密码锁铁盒；密码是只有他们俩懂的那一年（玫瑰戒指 F & L 1923 即密码线索）"
    - direction: "选择：当律师回法庭，还是继续调查 Frank 死因"
      trigger: "Mickey 离场邀请时的二选一分支（主线=继续当侦探）"
    - direction: "前往鞋坊废墟深度搜证——案发现场是否还藏有被忽略的物证"
      trigger: "主线分支触发后，Emma 提示废墟深度搜证"
    - direction: "前往 Silver Moon 赌场找 Vinnie——Danny 目击证词指向一个块头大的意大利人"
      trigger: "Danny 目击证词 2114004 在背包中；废墟打火机搜到后，方向明确"

  post_expose_knowledge:
    # L5 指证 Vinnie + 指证后 Foster 电话获得的新知识
    - "Vinnie 认罪：他就是 Danny 目击的'块头大意大利人'——当晚在鞋坊纵火并打晕 Margaret"
    - "Vinnie 的打火机（2501）在废墟完好——是他事后放置的，故意留下证据（认罪准备）"
    - "Vinnie 认罪语速反常、抢话、细节奇怪——'透过窗户看到 Frank 在床上睡觉'（2105002b 存疑，L6 回收）"
    - "Vinnie 认罪主体（2105002a）：'是我！绑架了 Margaret！因为她看见是我放的火！Frank 是我杀的！'"
    - "Vinnie 认罪细节（2105002b）：'我透过窗户看到他在床上睡觉，然后放火！'——这个细节留待 L6 击穿"
    - "Foster 电话（2155001）：Frank 很可能不是因为火灾被烧死，而是钝器击打致死——花了整整一天才有这个初步结论"
    - "法医鉴定报告实物（2601）在 L6 才能取得（需去医院见 Foster）"
    - "Mickey 拿走了 Frank 举报材料（2502）——棕色皮制公文包，两个铜扣；2502 已从玩家背包移除"
    - "疑点 2501 解锁：打火机在废墟完好、Tony 辨认上周还在 Vinnie 手里、Danny 目击壮汉当晚在现场——三方面共同指向 Vinnie 案发当晚在场"
    - "疑点 2502 解锁：Vinnie 的认罪说'是我放的火，Frank 是我杀的'——但 Frank 是被钝器打死的，他怎么能说自己是凶手？（L6 深化）"

# ─────────────────────────────
# 二、开篇（Frank 家主屋 Lula 取盒 + 密码考验 + 二选一分支）
# ─────────────────────────────

opening:
  type: scripted_cutscene
  talk: opening_l5_frankhome
  location: "Frank 家主屋开间（场景 2018）"
  scene_id: 2018
  description: |
    Zack 和 Lula、Mickey 一起重访 Frank 家主屋。
    Lula 走到床边蹲下，从床和墙之间的窄缝里取出一个 15cm × 10cm 的铁皮小盒——
    盒面是密码盘（四位数转盘），没有钥匙孔。
    Lula 把铁盒放在桌上，看向 Zack：
    「Frank 给这盒子设了密码……四位数，那一年的。
     只有我们俩懂的那一年。你应该知道是什么意思。」

    [Zack 心中浮现：玫瑰花蕊里那枚戒指——"F & L 1923"]

  password_puzzle:
    type: dialogue_choice
    correct_answer: "1923"
    correct_hint_source: "L4 玫瑰花蕊小玩法揭示的 2403 求婚戒指内圈刻字 'F & L 1923'"
    retry_policy: unlimited  # 答错可无限重试，无惩罚

    options:
      - value: "1901"
        is_correct: false
        trap_reason: "Margaret 与 Patrick 婚戒刻字年（2405 内圈 'P & M 1901'）——别人的年份，不是 Frank 和 Lula 的"
      - value: "1916"
        is_correct: false
        trap_reason: "Leon 嘉奖奖杯的颁发年份（L2 物证 2208）——这是 Leonard 旧名线索，不是 Frank 和 Lula 的年份"
      - value: "1923"
        is_correct: true
        unlock: "铁盒打开，取出 2502 举报材料 + 2503 情书"
      - value: "1928"
        is_correct: false
        trap_reason: "案发当年——结束的年份，不是开始的年份"

    on_wrong:
      lula_reaction: |
        Lula 摇了摇头，眼神低下去：
        「……不是。Frank 不会用别人的年份。他要的，是只有我们两个人懂的那一年。」
        [选项重新出现，玩家可继续尝试]

    on_correct:
      lula_reaction: |
        Lula 长出一口气，眼眶微红：
        「……对。是那一年。」
        [她拨动密码盘：1—9—2—3。三声咔嗒，盒盖弹起。]

  reveal_contents: |
    盒内有两件东西：
    - 一叠装订整齐的文件（2502 Frank 的举报材料——Mickey 会拿走）
    - 一沓信纸（2503 Frank 写给 Lula 的情书，Lula 第一次捧读 Frank 八年积累的告白）

    Lula 抱着情书的瞬间，时间停了一下。

    Lula 恳求 Zack 和 Mickey 帮她查清 Frank 死亡的真相。

    Mickey 拿走检举材料的视觉特写：棕色皮制公文包，两个铜扣——
    "这些材料我拿回去打官司。你也一起来，做我的二辩律师。"
    2502 从玩家背包移除（removed_from_inventory）。

  branch_point:
    type: choice
    save_lock: false  # 不锁存档，律师结局后可回选择点重选
    options:
      - id: choose_lawyer
        label: "当律师——回到法庭"
        result: lawyer_bad_ending
        note: "触发律师坏结局三幕过场，结束后回到本选择点"
      - id: choose_detective
        label: "继续当侦探——查清真相"
        result: main_path
        note: "进入主线，进入自由探索阶段"

# ─────────────────────────────
# 律师坏结局序列（选律师时触发）
# ─────────────────────────────

lawyer_bad_ending_sequence:
  type: bad_ending_cutscene
  presentation: "黑屏白字 + 静态画面"
  narrative_principle: "沉默 ≥ 台词重要性——三幕的分量在于缺席与没有回答"
  return_to: branch_point  # 结束后回到 opening.branch_point，不锁存档

  acts:
    - act: 1
      title: "三个月后 · 库克县法庭"
      visual: "静态画面：法庭内景，法官席，旁听席稀疏"
      text: |
        Mickey 主辩、Zack 二辩，对 湖滨信托银行集团民事诉讼。
        法官敲槌。败诉。
        走出法庭时，Moore 对 Mickey 笑了笑。

    - act: 2
      title: "同日 · 库克县监狱与北区银行总部"
      visual: "静态画面：监狱铁栏 + 银行大厅（双格拼接）"
      text: |
        Vinnie 已认罪入狱。
        Leonard 升职为 湖滨信托银行副行长。

    - act: 3
      title: "同日 · 圣心医院"
      visual: "静态画面：病房，Margaret 侧卧，窗外阳光，Zack 站在窗边背对镜头"
      text: |
        Margaret 苏醒。
        "Zack……Frank 的案子结了吗？"
        Zack 看着窗外，没有回答。

  ending_card:
    text: |
      "我们做了所有看起来正确的事。"
      这个城市需要的不是律师。
    note: "末白为第三方叙述视角（讨论结论 5.12 裁决）；Whale 真身在此分支不暴雷——败诉表面是'对抗 Moore 失败'，Unit11+ 回看时才意识到是 Whale 故意放水"

