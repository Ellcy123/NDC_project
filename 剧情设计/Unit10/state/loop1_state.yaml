# ============================================================
# loop1_state.yaml — Unit10 Loop 1: 残酷的身份确认
# ============================================================
#
# 叙事功能：入口 Loop——Zack 赶到鞋坊现场，以为母亲 Margaret 死亡；
#           限时搜证揭穿"死者就是 Margaret"的误导，指证 Morrison；
#           指证后确认死者为 Frank Kowalski，获得 Morrison 承诺搜查令锚点；
#           事务所收到 Mickey 电报——Margaret 在圣心医院。
#
# 核心体验：恐惧（母亲死了？）→ 困惑（证据不对劲）→ 愤怒（Morrison 在误导）→ 微弱的希望（母亲活着）
#
# 权威来源：讨论结论.md（剧情设计/Unit10/讨论结论.md）§Loop1
# 生成日期：2026-05-13
#
# NPC 编码（Unit10 系统策划建议）：
#   Morrison=01（沿用既有 ID）/ Emma=03（沿用 Unit9 ID）/ Foster=04（新建，本 Loop 仅 Emma 转述）
#   Testimony ID 格式：{loop1位}{npc_code2位}{seq3位} = 7位
#   L1 Morrison：101xxxx → 1010001（R1 谎言锚，仅此一条作 testimony；R2/R3 谎言无 ID）
#   L1 Foster（Emma 转）：1030001（挂在 Emma NPC 条目下，来源注明）
#
# 遗留待拍板（不阻塞 state 生成）：
#   U-P0-1：场景 ID 4 位 vs 5 位（当前按 4 位写，遵循讨论结论默认值）
#   U-P0-2：Morrison / Emma 跨章 NPCStaticData 复用确认
#
# ──────────────────────────────────────────────────────────
# 自检清单（A-G）
# A. 结构完整性   PASS — loop_id / loop_title / loop_time / player_context / opening /
#                        scenes（10001 限时搜证 / 10002 限时搜证 / 10003 搜证后 Morrison 对话 / 10004 警局指证 / 10005 事务所过场）/
#                        phone_booth_cutscene / expose / doubts / evidence_registry / cross_loop_setup 全部存在
# B. 证据覆盖     PASS — 讨论结论 L1 全部 8 件证据（10101-10108）已分配：
#                        10001 场景：10101 / 10104 / 10105；
#                        10002 场景：10102 / 10103 / 10106 / 10107 / 10108；
#                        10003 场景：无可拾取证据（纯 Morrison 对话）；
#                        证词 1030001（Foster via Emma）挂在电话亭场景（自由探索）
# C. NPC 条目     PASS — Morrison（is_liar:true，挂在 scene_10003，搜证完成后才可对话）/ Emma（挂在 scene_10002）；
#                        两个 NPC 全部含 active_topics / withheld_topics / player_inquiry / testimony_ids
# D. 目标对齐     PASS — goals 与讨论结论"确认死者身份，揭穿 Morrison 误导"一致
# E. 信息节奏     PASS — L2+ 内容（银行/黑手党/Mickey 重逢/Leonard/Vinnie/钞票对比）均未超前；
#                        Mickey 仅以"电报发件人"身份出现，身份伏笔未展开；
#                        Foster 仅经 Emma 转述一句话，Miller 集团资助作为环境旁白一句提及
# F. quiz 配对    PASS — 疑点 10101/10102 各两件 condition；一对一挂载无冲突
#                        （原 R3 疑点 10103 已删——R3 矛盾由 Foster 证词在 Expose 当场击穿，不另设疑点）
# G. Expose 逻辑  PASS — R1 谎言锚 1010001 由 10101+10102 反驳；
#                        R2 谎言（Expose 内部退守对白，无 testimony ID）由 10104 反驳；
#                        R3 谎言（Expose 内部退守对白，无 testimony ID）由 1030001 反驳；
#                        陷阱选项各自有明确"看似相关但不构成反驳"的逻辑原因
# H. 谎言收集规则 PASS — 仅 R1 谎言锚作可收集 testimony（挂在 scene_10003）；
#                        R2/R3 谎言为 Expose 内部退守对白，无 testimony ID，写在 expose.round_X.lie 字段
# ──────────────────────────────────────────────────────────
#
# validation_status: PASS
# ============================================================

loop_id: 1
loop_title: "残酷的身份确认"
loop_time: "11月6日 晚 9:00"
loop_summary: "Zack 赶到 Margaret 鞋坊火灾现场，Morrison 告知死者"应该就是"Margaret。限时搜证后，证据显示死者没有婚戒、首饰盒空置、现场无金属残留——Margaret 不可能不戴戒指。Emma 联系 Foster 戳破 Morrison 声称有尸检结果的谎言。警局指证 Morrison 三轮，确认死者为 Frank Kowalski。事务所收 Mickey 电报，母亲在圣心医院。"

# ─────────────────────────────
# 一、玩家视角
# ─────────────────────────────

player_context:
  goals:
    primary: "死者是谁——真的是母亲 Margaret 吗？"
    secondary:
      - "Morrison 为什么这么快就下结论，他是在敷衍还是在误导？"
      - "尸检还没有出结果，他凭什么说'应该就是她'？"
      - "EPI01 栽赃旧仇——Morrison 有没有故意让 Zack 接受这个结论的动机？"

  known_facts:
    # Loop1 是 Unit10 首轮，known_facts 为空——玩家从零起点进入
    # 以下为开篇硬切剧情向玩家展示的初始信息
    - "Margaret 鞋坊发生火灾，消防扑灭后警察封锁现场"
    - "Morrison 在现场，告知 Zack '死者应该就是 Margaret，基于现场情况判断'"
    - "尸体盖着白布，现场还未清场，Zack 在尸体被抬走前有限时搜证机会"
    - "Zack 与 Morrison 之间有 EPI01 的旧仇（Morrison 曾栽赃 Zack）"

  new_directions:
    - direction: "检查尸体手部——Margaret 从不摘婚戒，如果真是她，戒指应该在"
      trigger: "Morrison 说'基于现场情况判断'，却没有给出任何具体证据"
    - direction: "找 Margaret 相册或其他能证明她日常佩戴婚戒的东西"
      trigger: "尸体手指无戒指这一观察引发对比需求"
    - direction: "联系法医确认尸检状态——Morrison 说他有尸检信息，这可能吗？"
      trigger: "火灾发生不到两小时，法医不可能这么快出结论"

  post_expose_knowledge:
    # 指证 Morrison 三轮结束后玩家获得的新知识
    - "死者确认为 Frank Kowalski，73 岁退休钢厂工人，是 Margaret 鞋坊的雇员"
    - "Morrison 承认动机：EPI01 的栽赃旧仇 + 想省事结案"
    - "Morrison 编造的死因：Frank 在卧室旁的开放式厨房做饭忘关火，失火意外身亡"
    - "Morrison 透露：有本地黑手党打来匿名电话警告他别深究——电话来源不明（伏笔）"
    - "Morrison 的摆烂威胁：意外火灾不是谋杀案，不需要立案查，让 Zack 自己去找证据"
    - "承诺锚点：Morrison 撂下'你要真能拿出他是被人杀的硬证据，我签搜查令'——L6 callback 钩子"
    - "Margaret 没有死——Zack 和 Emma 回事务所，桌上有 Mickey 发来的电报：Margaret 已在圣心医院接受治疗"
    - "谁送的 Margaret 去医院？Mickey 是谁？——新悬念"

# ─────────────────────────────
# 二、开篇（硬切剧情）
# ─────────────────────────────

opening:
  type: cutscene  # 🎬 硬切，无玩家操作
  talk: opening_l1_crimescene
  scene_id: 10001  # Margaret 鞋坊-店铺区（L1 开篇状态：尸体在场，消防刚离开）
  description: |
    深夜。Zack 和 Emma 赶到 Margaret 鞋坊门外——街上还有消防残留的水渍，
    焦味弥漫，玻璃碎片散落路边。Morrison 站在门口，神情疲惫，手里夹着烟。
    他看见 Zack 走来，只是往旁边挪了一步，没有主动拦。
    Zack 冲进去，看到卧室区方向盖着白布的身影。
    Morrison 跟进来，用一种特别不走心的语气说："死者应该就是你妈。基于现场情况判断。"
    Zack 愣了一秒。Zack 转向 Morrison，要求进入现场搜证。
    Morrison 耸肩："你有五分钟，尸体等会儿要抬走。"
    Emma 轻轻拉了一下 Zack 的手臂——她也皱眉，没说话。

# ─────────────────────────────
# 三、场景（限时自由探索）
# ─────────────────────────────

scenes:
  # ── 场景 10001：Margaret 鞋坊-店铺区（限时搜证）──
  - id: 10001
    name: "Margaret 鞋坊-店铺区"
    type: timed_exploration  # ⏸️ 限时探索——尸体被抬走前
    unlock_condition:
      - type: auto
        param: "L1_opening_complete"
    description: |
      店铺区前半段：展示台、鞋架、收银台焦黑；火势主要在卧室区，这里烟尘重但结构完整。
      尸体在卧室区方向，白布盖着，能看到伸出来的手——老年男性，手指无戒指，也无佩戴痕迹。
      Morrison 站在旁边，偶尔看表，姿态很明显：催人快点。
      限时搜证阶段 Morrison 不可对话（仅环境存在），搜证完成后场景 10003 才解锁可询问。
    timer_note: "尸体被抬走前；完成搜证后切到 10002 卧室区，两区搜证均完成后触发尸体抬走、解锁场景 10003"

    evidence:
      - id: 10101
        name: "尸体手指照片"
        type: clue
        itemType: 1
        pickup: true
        note: "关键——L1 R1 击穿件；疑点 10101 condition"
        description: |
          Zack 拍下的近景照片：尸体左手无名指无戒指，皮肤无明显佩戴压痕——
          不像长期佩戴后摘下，更像原本就没有戴过任何戒指的手。

      - id: 10104
        name: "现场地面照片"
        type: clue
        itemType: 1
        pickup: true
        note: "关键——L1 R2 击穿件；疑点 10102 condition"
        description: |
          卧室区地面照片：消防已细筛过，无任何金属残留物——无戒指、无衣物金属配件、无烟灰中的金属熔核。
          照片中可见消防人员的筛查记录注记。现场温度未达熔金点（MAX TEMP. ≈ 650°F）。
          备注：店内消防迅速扑灭，O'Hara 事后提到"幸好没烧开"。

      - id: 10105
        name: "鞋坊营业记录"
        type: envir
        itemType: 2
        pickup: false  # 环境观察——雇员名单可看不可拿走
        note: "场景道具——L1 R1 陷阱选项；雇员 Frank 身份线索"
        description: |
          Margaret 鞋坊 1925 年度营业台账，记录修鞋单和进货账。
          雇员栏手写：Frank Kowalski，按件计酬，每周三、六工作。
          最后一页有 Frank 11月6日（案发当天）的预定到岗排班——锚定 Frank 在案发当晚原本就会出现在鞋坊。

    # 限时搜证阶段无可对话 NPC——Morrison 在场但不可询问，对话挂在场景 10003

  # ── 场景 10002：Margaret 鞋坊-卧室区（限时）──
  - id: 10002
    name: "Margaret 鞋坊-卧室区"
    type: timed_exploration  # ⏸️ 限时探索——与 10001 共用计时
    unlock_condition:
      - type: auto
        param: "L1_opening_complete"
    description: |
      火灾核心区。床边角落倒着一只约 30cm 高的黄铜圆底烛台（底部有明显凹痕），床头板焦黑，卧室旁有一个开放式小厨房——
      铁锅、调料架都烟熏黄黑，炉灶旁有"失火点"的蜡烛痕迹（Morrison 的编造依据）。
      整间屋子带着安安静静的、属于老年独居者的气息：针线篓、一双旧皮鞋、相框。
      Emma 在这里陪 Zack 搜证——她看到 10106 厨房失火点时皱了皱眉，
      没有说话，但盯着炉灶旁的布置看了两秒才移开视线。（N4 藏梗：Frank 不会做饭——L4 Lula 证词回收）

    evidence:
      - id: 10102
        name: "Margaret 相册"
        type: item
        itemType: 3
        pickup: true
        note: "关键——L1 R1 击穿件；疑点 10101 condition"
        description: |
          Margaret Brennan 家庭相册，时间跨度 1895–1923 年。
          每一张有 Margaret 出现的照片，都能清晰看到左手无名指的金色婚戒——
          从年轻时到最近一两年，无一例外。婚戒从未缺席。

      - id: 10103
        name: "空的首饰盒"
        type: item
        itemType: 3
        pickup: true
        note: "关键——L1 R1 击穿件；疑点 10102 condition"
        description: |
          桃木首饰盒，内里深红色绒布，有圆形凹槽——婚戒的位置。
          凹槽空置，绒布上方有今天临时取出过的轻微划痕（戒指被临时取出、后来未放回）。
          其余槽位有胸针、耳环，均完好未动。

      - id: 10106
        name: "卧室开放式厨房失火点照片"
        type: clue
        itemType: 1
        pickup: true
        note: "场景道具——Morrison 编造死因依据；L1 R3 陷阱选项；Emma 皱眉（N4 藏梗）"
        description: |
          卧室旁开放式小厨房的炉灶区：炉灶旁散落的蜡烛灰和碎蜡迹是这次火灾的发火点。
          Morrison 认为这是"忘关火意外失火"的证据。
          厨具摆放整齐，但炉灶使用痕迹不多，不像经常下厨的人的厨房。
          （Emma 看到这里沉默了一下——L4 Lula 证词会回收：Frank 根本不会做饭）

      - id: 10107
        name: "Patrick 遗物匣"
        type: envir
        itemType: 2
        pickup: false  # 环境叙事，不可拾取
        note: "场景道具——Zack 父亲情感锚点；Patrick 工人运动领袖身份的视觉锚 + 跨 Unit Chekhov's gun（'FOR THE MANY WE PAY THE FEW' 在 Unit4 才解开）"
        description: |
          橡木小匣，顶盖刻有"P.B."首字母——Zack 一眼认出是父亲 Patrick Brennan 的遗物。
          匣身正面嵌着一枚氧化发暗的工人运动领袖徽章，徽章上可读"P. BRENNAN — ORGANIZER"
          或"STRIKE COMMITTEE · A.R.U. 1894"——表明 Patrick 是 1894 Pullman 大罢工的组织者/领袖，
          不是普通参与者。匣身侧面还刻有一行较小的英文短语"FOR THE MANY WE PAY THE FEW"——
          Patrick 1890s–1900s 在工人聚会上反复宣讲的独创信条（非公开名言，只在最亲近的圈子里口传）。
          匣子放在卧室角落最稳当的地方，说明 Margaret 一直带着它。
          Zack 停顿了一下，没有打开。
          注：Zack 不在 Unit10 内点破"父亲教过这句话"——这句话的全部意义在 Unit4 解开。

      - id: 10108
        name: "地下室的门（打不开）"
        type: door
        itemType: 5
        pickup: false  # 不可拾取，场景互动道具
        note: "场景道具——L3 解锁；环境叙事"
        description: |
          卧室区角落的一扇木门，向下通往地下室。
          门锁是新换的铸铁锁，非常牢固。Zack 试了试，推不开。
          门下方地面无积灰，门槛被反复踩踏出明显的磨痕——这扇门虽然锁着，但平时经常被人开启走过。
          （崭新铸铁锁 vs 频繁使用痕迹的反差是视觉伏笔——L3/L4 揭示 Frank+Lula 的秘密约会空间在地下室。）

  # ── 场景 10003：Margaret 鞋坊-店铺区（搜证后 Morrison 对话）──
  - id: 10003
    name: "Margaret 鞋坊-店铺区（搜证后）"
    type: free_exploration  # 🔓 自由对话——限时计时结束后解锁
    unlock_condition:
      - type: auto
        param: "scene_10001_complete AND scene_10002_complete"
    description: |
      限时计时结束，尸体被抬走，现场清空——只剩 Morrison 还在店铺区，烟抽到一半，等程序走完。
      他这才转过身来，示意 Zack 有什么问题现在问、问完他要回警局。
      Morrison 不会久留——Zack 必须在他离开前把该问的问完。

    evidence: []  # 此阶段无可拾取证据，纯对话

    npcs:
      morrison_l1_lobby:
        talk: morrison_l1_lobby
        is_liar: true  # Morrison 是本 Loop Expose 对象
        motive: |
          EPI01 旧仇（Morrison 曾栽赃 Zack）+ 接到匿名黑手党电话警告别深究 +
          懒得查、想把这件事归为意外火灾快速结案。
          他的冷漠不是恶意，是腐败的疲惫——他知道深究没有好处，便不深究。
        mindset: |
          烟抽了大半，有点困，语气是那种职业性的厌倦。
          面对 Zack 他带着一丝旧仇的快意——"你最好别来烦我"的底色，但还没彻底翻脸。
          他已经认定了结论，正在等程序走完。
        player_inquiry: null  # Expose 对象，player_inquiry 留给 expose 段

        active_topics:
          - "告知死者'应该就是 Margaret，基于现场情况判断'（R1 谎言锚 1010001，唯一可收集 testimony）"
          - "提及 EPI01 旧仇——态度冷淡，用来表明他不打算给 Zack 方便"
          - "暗示'有人不希望我查'（不点名，指证后才坦白是黑手党电话）"
          - "摆烂底色：意外火灾不需要立案，除非有谋杀的硬证据"
        withheld_topics:
          - "R2 / R3 谎言（'戒指可能烧毁' / '我有尸检信息'）——仅 Expose 当场退守说出，非 Talk 阶段可收集"
          - "电话是谁打的（Whale 派系——L6 后才有机会追问）"
          - "他在 L4 会夺走 Zack 的物证（L4 事件，不超前）"
          - "L6 他被迫再签搜查令的心路历程"
          - "Frank 是否真的被人杀——他实际上也不完全清楚"

        testimony_ids:
          - 1010001  # ⚠谎言: "死者应该就是 Margaret，基于现场情况判断"（R1 谎言锚）
          # 注：R2 谎言（"戒指可能烧毁"）和 R3 谎言（"我有尸检信息"）为 Expose 内部退守对白，
          #     不进 testimony 池、不可预先收集——见 expose.round_2 / round_3 的 lie 字段

  # ── 场景 10019：鞋坊外电话亭（自由探索 🔓）──
  # 限时搜证结束、自由探索阶段开放即可进，玩家主动前往；与 10003 同一道门，无额外前置
  # 进入后：Emma 在公用电话亭联系 Foster，Foster 告知：尸检最快明天，连性别都无法确认
  # Emma 转述给 Zack，证词 1030001 进入玩家可用证词池
  - id: 10019
    name: "鞋坊外电话亭"
    type: free_exploration  # 🔓 自由探索，玩家主动进入
    unlock_condition:
      - type: auto
        param: "scene_10001_complete AND scene_10002_complete"
    description: |
      鞋坊外街边的公用电话亭。Emma 拨了一通电话。
      不到两分钟，Emma 挂断，神情平静但眼神带着确认的意味。
      她对 Zack 说："Foster 说，至少明天才有初步结果。现在连性别都没法确认。"
      停顿。"她补了一句——'你们警察局那边别乱说话。'"
      Emma 小声加了一句背景："我们以前认识。她现在受 Miller 集团资助，不太方便正式表态。"

    npcs:
      emma_l1_phonebooth:
        talk: emma_l1_phonebooth
        is_liar: false
        active_topics:
          - "转述 Foster 答复：尸检最快明天，现在连性别都没法确认"
          - "转述 Foster 提醒：警察局那边别乱说话"
          - "一句带过：与 Foster 以前认识，Foster 现受 Miller 集团资助、不便正式表态（伏笔，不深入）"
        withheld_topics:
          - "Foster 与 Miller 集团的深层关系（L5+ 才展开）"
          - "Emma 自己与 Miller 集团的关联（Unit11 才揭晓）"
        testimony_ids:
          - 1030001  # Foster（Emma 转）："尸检最快明天，连性别都未定"——L1 R3 击穿件
          # 注：1030001 为 Foster 意见经 Emma 转述，证词 ID 挂 Emma 电话亭条目，来源注明 Foster（NPC04）

  # ── 场景 10004：警局-Morrison 办公区（指证场）──
  - id: 10004
    name: "警局-Morrison 办公区"
    type: expose_scene  # ⚔️ 指证场
    unlock_condition:
      - type: auto
        param: "phone_booth_complete"
    description: |
      Morrison 的办公区：破旧的桌子、文件堆、烟灰缸。
      Zack 带着证据进来，Morrison 没有站起来，只是抬头看了一眼。
      EPI01 的旧账悬在空气里——他知道 Zack 来者不善，但他更知道自己手上有的是借口。

  # ── 场景 10005：Zack 侦探事务所（过场）──
  - id: 10005
    name: "Zack 侦探事务所"
    type: cutscene  # 🎬 过场，指证结束后自动触发
    unlock_condition:
      - type: expose_complete
        param: "expose_morrison_L1"
    description: |
      深夜。Zack 和 Emma 回到南区与北区交界处的侦探事务所。
      桌上放着一封电报，是刚才抵达的。
      Zack 拿起来——发件人：Mickey Donnelly，律师。
      电文简短：
        "Margaret Brennan 已在圣心医院接受治疗。病房在三楼。她醒着。
         —— Mickey D."
      Zack 和 Emma 对视。谁是 Mickey？他为什么知道 Margaret 在哪里？他怎么送她去医院的？
    items_gained:
      - description: "Mickey 电报实物（叙事道具，不进 ItemStaticData，仅演出）"

# ─────────────────────────────
# 四、指证（⚔️ Expose：Morrison）
# ─────────────────────────────

expose:
  target: morrison
  target_talk: Loop1_morrison
  scene_id: 10004
  is_liar: true
  player_inquiry: null

  context: |
    Morrison 已经认定死者是 Margaret，想把案子归为意外火灾结案。
    Zack 带着搜证结果来警局对质——他需要一轮一轮击穿 Morrison 的托辞，
    逼他承认死者身份错误、自己的结论没有依据。
    EPI01 旧仇的底色让 Morrison 不打算给 Zack 任何方便，
    但证据摆在眼前，他只能一次次退守。

  round_1:
    lie: "死者应该就是 Margaret，基于现场情况判断"
    lie_source: 1010001
    usable_evidence:
      - id: 10101
        name: "尸体手指照片"
        用途: "尸体手指无戒指、无佩戴压痕——与 Margaret 从不摘婚戒的习惯矛盾"
      - id: 10102
        name: "Margaret 相册"
        用途: "30 年照片无一例外佩戴婚戒——证明 Margaret 从不摘戒"
      - id: 10103
        name: "空的首饰盒"
        用途: "戒指凹槽空置——Margaret 出门没带走戒指；三件合并构成'婚戒矛盾'推理链"
    trap_evidence:
      - id: 10105
        name: "鞋坊营业记录"
        trap_reason: "只证明 Frank 是雇员，说明可能死的是雇员，但不能反驳'死者是否是 Margaret'"
    result: |
      Morrison 被迫承认：尸体手指无戒指 + Margaret 从不摘婚戒 + 家中首饰盒空置——"死者就是 Margaret"这个结论彻底崩溃。
      Morrison 立刻转移阵地：进入谎言2（戒指去向）。

  round_2:
    lie: "火灾很猛烈，戒指可能掉在现场或被烧毁"
    lie_source: null  # R2 谎言为 Expose 内部退守对白，无 testimony ID（R1 被击破后 Morrison 当场说出）
    usable_evidence:
      - id: 10104
        name: "现场地面照片"
        用途: "消防细筛现场地面无任何金属残留——现场温度未达熔金点（MAX TEMP. ≈ 650°F）；戒指不可能被烧毁，现场也没找到"
    trap_evidence: []  # 10103 已移至 R1 usable；R2 陷阱待补
    result: |
      Morrison 被迫承认：现场无金属残留，普通火灾温度不可能熔化金戒指。
      戒指的物理去向无法用"被烧毁"来解释。Morrison 最后一道防线：进入谎言3（声称有尸检信息）。

  round_3:
    lie: "我有尸检调查信息可以证明死者身份"
    lie_source: null  # R3 谎言为 Expose 内部退守对白，无 testimony ID（R2 被击破后 Morrison 当场说出）
    usable_evidence:
      - id: 1030001
        name: "Foster（Emma 转）：'尸检最快明天，连性别都未定'"
        用途: "专业法医明确表示报告最快明天才出——Morrison 的'尸检信息'根本不存在，是虚张声势"
    trap_evidence:
      - id: 10106
        name: "卧室开放式厨房失火点照片"
        trap_reason: "这针对的是'死因维度'（做饭失火），不能反驳'Morrison 是否有尸检信息证明身份'——维度不同"
    result: |
      Morrison 的虚张声势被直接击穿：法医都说尸检最快明天，他不可能已经有结论。
      Morrison 沉默了几秒，最终收起了装腔作势的姿态，承认死者实为 Frank Kowalski。

  post_expose:
    talk: morrison_l1_postexpose
    description: |
      Morrison 收起架子，语气变成疲惫的坦白：
      - 承认动机：EPI01 旧仇 + 省事结案——Frank 死了，意外火灾好结案，没人追问。
      - 承认编造死因：Frank 在厨房做饭忘关火意外失火——那个厨房根本没人用，他就是凑了个由头。
      - 透露：有本地黑手党打电话警告他"别深究"。电话内容就是这五个字。他接了，但他没说他听了。
      - 摆烂威胁：意外火灾用不着立案，Zack 要查自己去查，
        "你要真能拿出他是被人杀的硬证据，我签搜查令。"
        （这句话是 Morrison 扔下的最后一块石头，也是 L6 兑现的钩子）
    knowledge_gained:
      - "死者为 Frank Kowalski，73 岁，Margaret 鞋坊雇员"
      - "Morrison 编造死因：厨房做饭忘关火（内心知道说不通，但死无对证）"
      - "有黑手党匿名电话警告别深究（来源不明，伏笔）"
      - "Morrison 承诺：拿出谋杀硬证据，签搜查令——L6 callback 锚点"

