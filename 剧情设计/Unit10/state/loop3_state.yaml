        name: "贷款计算玩法分析报告（派生）"
        usage: "三条款叠加分析：年单利 12%（第 5 条）+ 利滚利（第 7 条）+ 月管理费 50$（第 12 条），5 年本金 600$ 累计债务约 3,960$，折合年化约 112%——远超伊利诺伊州法 7% 上限（约 16 倍——这不只是违规，是赤裸裸的高利贷）。这不是'完全合法'，这是系统性违法。"
