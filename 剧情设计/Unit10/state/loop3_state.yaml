opening:
  type: cutscene_sequence  # 🎬 过场序列
  talk: opening_l3_cityhall
  description: |
    L2 末 Zack 拿着 Leonard 给的信封赶到市政厅/法院，
    门房看了信直接摆手：这不够，需要有效律师签名的正式申请。
    Zack 在市政厅台阶上停了一下——调查陷入僵局。
    他转而回到 Moore 银行门口，打算再试试别的办法。
    就在银行门口，一个陌生男人走上台阶，从公文包里拿出一叠文件，
    礼貌但不容拒绝地递给银行门卫：这是法院签署的传票，请通知你们行长。
    那人回过头，看到 Zack，停了一下，微微一笑：
    "Zack Brennan？好久不见。我叫 Mickey Donnelly——Frank Kowalski 的代理律师。"
    随后过场：Mickey 与 Emma 互换分工——
    Emma 去跟进法医鉴定和 Margaret 病情，Mickey 留下来协助 Zack 查银行。
  scenes_involved:
    - id: 10016
      name: "市政厅/法院大门外台阶"
      type: cutscene  # 🎬 纯过场，无搜证，户外场景
      description: "Zack 站在艾斯弗德市政厅大门前的石阶上，递信封给守门警卫——警卫扫一眼摇头，连门都不让进。整段过场全程发生在户外台阶，玩家不踏入建筑内部。"

  mickey_entrance:
    npc: mickey
    npc_code: 103
    role: "Frank 的代理律师，递交传票，获得银行搜查令"
    motive: "以律师身份合法打开银行档案的门；对 Zack 表现出专业和善意（伏笔层：控制调查方向）"
    mindset: "沉稳、自信，见到 Zack 有真实的亲切感（童年好友重逢）；说话简洁有力，每句话都准确"
    active_topics:
      - "自己是 Frank Kowalski 的代理律师——Frank 本来约定今天来律所检举银行，但没出现"
      - "递交传票获得搜查令——档案室和 Leonard 办公室现在可以进入"
      - "邀请 Zack 以私家侦探身份协助——他处理法律层面，Zack 处理调查层面"
      - "Emma 去跟进 Foster 法医鉴定和 Margaret 病情，Mickey 来帮 Zack 查银行"
    withheld_topics:
      - "自己的真实身份和动机——Unit11+ 揭示是 Whale"
      - "Frank 为什么找 Mickey 做律师的真实原因（监控 Frank 检举进度）"
      - "检举材料的具体位置（L5 才会知道小铁盒里有）"
    player_inquiry:
      - "\"Mickey 是 Frank 的律师——他知道 Frank 银行纠纷的什么内情\" # 8"
      - "\"Mickey 怎么拿到传票的——这代表什么\" # 9"
      - "\"Mickey 是童年好友重逢——12 年没联系为什么突然出现\" # 6"
    testimony_ids: []  # Mickey 开篇无正式证词条目；关键台词通过对话草稿承载

