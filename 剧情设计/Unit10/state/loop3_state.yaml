        usage: "同一份文件的双重身份：页眉是'Lakeshore Investment Co. No.4872'（投资公司），正文是'开户银行：Lakeshore Trust Bank'（银行）。同一笔业务，对客户称银行、内部称投资公司——这是系统性欺骗的直接证据。法庭上这份文件会说明他们用投资公司名义规避银行法、实际以银行名义向客户揽业务，两头欺诈。"
