      10301 + 10302 双件并排出示，签名笔迹明显不一致——Frank 真迹颤抖歪斜，档案签名工整流畅。
      Moore 眉头皱起，沉默片刻，然后说：
      "就算如此，协议条款本身是完全合法的。去告我吧。"
      Moore 切换到 R2 新防线——看起来是承认了代签，但转向主张"条款合法"。

  # ── 轮次二：掠夺性贷款击穿 ──
