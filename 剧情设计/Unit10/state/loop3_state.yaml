      - id: "10302"
        name: "Lakeshore Trust Bank 客户贷款档案（签名工整流畅）"
        usage: "贷款档案上的 Frank Kowalski 签名工整流畅、笔画连贯无颤抖——肉眼可辨与 10301 的真迹完全不是同一人写的。两份签名并排呈上，Moore 无从辩驳。"
