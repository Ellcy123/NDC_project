    type: free_exploration  # 🔓 自由探索（L6 Margaret 苏醒，可交互）
    loop_flag: "margaret_awake"
    description: |
      圣心医院。病房光线柔和。Margaret Brennan 已经苏醒，坐在床上，神情平静但疲惫。
      Foster 法医也在——她提前到了，带来了 10601 法医鉴定报告实物、10602 房屋抵押证明（原件）、
      以及 10603 医用镊子（配合鞋坊柜子缝隙取证用）。
      Margaret 的第一反应不是问自己的伤，而是问 Frank 的案子——
      然后才问 Zack 自己昏迷期间发生了什么。
      这个顺序是 Margaret 角色弧的灵魂：她先是鞋坊主人、Frank 的朋友，然后才是 Zack 的母亲。
      Margaret 目击证词是 L6 最关键的新信息源——她当晚街角看到的细节直指 Leonard。

