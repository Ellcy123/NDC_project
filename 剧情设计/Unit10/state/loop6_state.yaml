ending_sequence:
  type: forced_cutscene  # 🎬 强制剧情，无玩家操作
  description: "Unit10 终局收束；含 Vinnie 字条 / Lula 悼念 / Zack 苦笑 Moore 银行"

  sequence:

    # ── Act 1：Foster 到来，递交 Vinnie 字条 ──
    act_1_foster_note:
      location: "Leonard 住所客厅（指证完成后，Foster 到场）"
      description: |
        指证完成后，Leonard 低着头。片刻后有人敲门——Foster。
        她走进来，没有多余的神情，从外套口袋里取出一张叠好的纸条递给 Zack。
        Foster 台词："狱卒在他枕下找到的。按规矩本来要烧掉。我替你留了下来。"
        Zack 接过纸条，打开。
        字条文本（手写，字迹粗糙，墨水浓淡不均）：

          Leo——
          这件事，让我替你做完。
          我从来没指望你知道。
          但能再帮你一次也好。
          ——V.

        Zack 读完，把纸条折回去。
        Leonard 在旁边——他没有抬头，不知道 Zack 手里是什么，但他察觉到了气氛变化。
        这张字条不进 ItemStaticData，不进推理证据链——只是情感载体。
      foster_line: "狱卒在他枕下找到的。按规矩本来要烧掉。我替你留了下来。"
      vinnie_note_text: |
        Leo——
        这件事，让我替你做完。
        我从来没指望你知道。
        但能再帮你一次也好。
        ——V.
      note: "字条不分配 ItemStaticData ID，仅演出；字条文本保留四句中文版本（讨论结论 5.3）"
      vinnie_status: "已在狱中上吊自杀（Leonard 招供后玩家得知）"

    # ── Act 2：Leonard 知晓 Vinnie 字条 ──
    act_2_leonard_learns:
      location: "Leonard 住所客厅"
      description: |
        Zack 把字条放到 Leonard 面前的桌上，没有说话。
        Leonard 的眼神落下去，看到字条上的字。他认出了那个笔迹。
        他读完之后没有眼泪——只是很长时间没有动。
        Leonard 最终抬起头，开口，声音很低：
        "我不知道他会……"
        然后就没有后续了。
        假释文件之后，Leonard 会以自由人的身份离开——
        但他知道了 Vinnie 为他做的一切，他没有办法用"我不知道"来活下去了。
      leonard_note: "Leonard 假释，生不如死——知道了 Vinnie 的真相之后"
      leonard_status: "假释，生不如死"

    # ── Act 3：Lula 悼念 ──
    act_3_lula_mourning:
      location: "Frank 墓地（傍晚）"
      description: |
        Lula 一个人站在 Frank 的墓碑前。她没有哭，只是站着，
        手里什么都没有拿。Zack 和 Emma 从墓地小径走过来，
        在她身后停下，没有立刻上前。
        过了一会儿，Lula 开口——三句话，每句之间有沉默间隔，
        不一口气说完，对着墓碑说，不回头：
      lula_lines:
        - "Frank……我终于可以光明正大地说我爱你了，但你已经不在了。"
        - "你答应过我，做完这件事就带我离开。现在我自由了，但你不在了。"
        - "他想把举报材料交出去，是因为他觉得这样子他们就可以光明正大了。"
      note: "三句话按顺序，中间各有沉默间隔；Lula 不回头看 Zack/Emma；说完转身从他们身边走过，仍不说话"

    # ── Act 4：Zack 苦笑——Moore 银行 ──
    act_4_zack_moore:
      location: "Frank 墓地（Lula 转身走后，Zack/Emma 留下）"
      description: |
        Lula 的背影从墓地小径走远。Zack 和 Emma 站在 Frank 墓碑前。
        四句对话，按顺序：
        1. Zack（低声，像跟自己说）："Vinnie 故意留下打火机。一开始就打算认罪。"
        2. Emma（停一拍）："至少正义得到了伸张。"
        3. Zack（盯着墓碑，苦笑）："Moore 银行呢？真正的罪犯还在逍遥法外。"
        4. Emma（停一会儿，看着 Zack）："我们还没完。"
        画面在两人对视中淡出。
      zack_lines:
        - "Vinnie 故意留下打火机。一开始就打算认罪。"
        - "Moore 银行呢？真正的罪犯还在逍遥法外。"
      emma_lines:
        - "至少正义得到了伸张。"
        - "我们还没完。"
      cross_unit_hook: "Moore / 掠夺性贷款体制 / 银行-黑手党共谋——Unit11 开门钩子"

