          伤口出血在火灾前即已停止，确认 Frank 在火灾之前已死于钝器击打，非烟熏或烧伤致死。
          报告注明"花费整整一天排除替代假设"——措辞极其谨慎，但结论清晰。
        note: "关键——兑现 Morrison L1 承诺；携此前往 10004 警局触发搜查令过场"

      - id: 10602
        name: "房屋抵押证明"
        name_en: "Property Mortgage Certificate"
        type: item
        itemType: 3
        pickup: true
        analysis: false
        description: |
          Moore 银行出具的鞋坊房屋抵押证明，附原始内景照片数张。
          其中一张照片清晰显示卧室区角落的烛台在原位——30cm 黄铜圆底烛台，
          底部有轻微磨损，尚未移动。
          与 L6 现场的烛台（10604）位置参照，可对比"原位"与"现场"的位置差。
        note: "关键——L6 R3 击破件之一；疑点 10603 condition"

      - id: 10603
        name: "医用镊子（15cm）"
        name_en: "Medical Forceps (15cm)"
        type: item
        itemType: 3
        pickup: true
        analysis: false
        description: |
          标准医用不锈钢镊子，15cm 长，Foster 借给 Zack 用于现场取证。
          适合夹取嵌入柜子缝隙的细小物证而不损坏样本。
        note: "场景道具——用于 10001 夹取柜子缝隙中的 10605 眼镜碎片；canCombined=true，combineParameter=[10605,10603]"
        metadata:
          canCombined: true
          combineParameter: [10605, 10603]
          usage_note: "玩家发现柜子缝隙反光后，需持有 10603 才能触发夹取交互，产出 10605"


  # ── 场景 10001：Margaret 鞋坊-店铺区（深度搜证，L6 柜子缝隙）──
  - id: 10001
    name: "Margaret 鞋坊-店铺区（深度搜证）"
    type: free_exploration  # 🔓 自由探索
    loop_flag: "deep_search_l6"
    description: |
      鞋坊废墟。L5 已经搜过一轮，但柜子缝隙里还有东西——
      一丁点反光，几乎不可能注意到，除非你蹲下来仔细看。
      烛台（10604）就在卧室区原位附近（实际卧室区废墟与店铺区相连，环境叙事 NPC 不在场）。
      凹陷的货物箱（10606）在店铺区靠墙位置，高度吻合成人背部。
      柜子缝隙的反光物是烟熏黄色的眼镜碎片（10605）——需持有 10603 镊子才能夹出。
      没有 NPC，只有废墟的沉默和偶尔路过的邻居脚步声。

      🎮 烛台找茬小玩法触发：
      玩家持有 10602 房屋抵押证明（含案发前店铺内景照片）进入本场景后，可调用 10602 叠加到现实废墟上，
      通过"找不同"机制揭示三处异常——烛台移位、柜面打斗划痕、货物箱凹陷。
      详见 `剧情设计/Unit10/小玩法/L6_鞋坊_烛台找茬.md`。
      玩法揭示后 10604 / 10606 进入可拾取/记录状态；10605 需持 10603 镊子嵌套取出。

    evidence:
      - id: 10604
        name: "烛台"
        name_en: "Brass Candlestick"
        type: item
        itemType: 3
        pickup: true
        analysis: false
        description: |
          黄铜圆底烛台，30cm 高。底部有明显的暗红色锈迹状污渍（血迹与火灾烟熏的混合物），
          底部边缘有细微的凹痕——与 Foster 报告描述的"圆底钝器"形状高度吻合。
          对比 10602 房屋抵押证明内景照片，这把烛台的位置已从原位移动过。
        note: "R3 陷阱选项——凶器维度，但需先破'和平拜访'谎言才能进入凶器归属讨论；单独出示无法击穿 R3；本物证由烛台找茬玩法揭示位置后可拾取"

      - id: 10605
        name: "眼镜碎片（烟熏黄色旧镜片）"
        name_en: "Spectacle Lens Fragment (Smoke-yellowed)"
        type: item
        itemType: 3
        pickup: true
        analysis: false
        description: |
          从烛台原位（柜子上）拿走后露出的柜子缝隙夹出的眼镜镜片碎片，火灾烟尘留下明显的烟熏黄色着色。
          碎片形状为右眼镜片的一部分——老旧镜片，非新换的透明镜片。
          找到这块碎片需要持有镊子（10603）蹲下仔细操作，否则缝隙太深无法徒手取出。
        note: "关键——L6 R1 击破件；疑点 10601 condition"
        metadata:
          canCombined: true
          combineParameter: [10605, 10603]
          lens_eye: "右眼"
          color: "烟熏黄色（旧镜片，非新换）"
          obtain_prerequisite: "玩家需先持有 10603 镊子才能触发取出交互"

      - id: 10606
        name: "凹陷的货物箱"
        name_en: "Dented Cargo Box"
        type: clue
        itemType: 1
        pickup: true   # clue：场景交互取证（拍照）入背包
        analysis: false
        description: |
          靠墙的木制货物箱，中部有明显的 3cm 深凹陷，高度约 1.2m，吻合成人背部位置。
          这种程度的凹陷需要相当大的力量冲击——像是有人被用力撞或压在箱子上。
        note: "关键——L6 R3 击破件之一；疑点 10603 condition（与 10602 联用）"
        metadata:
          dent_depth: "3cm"
          dent_height: "~1.2m（成人背部高度）"
          pickup: true
          record_method: "场景交互后取证（拍照）入背包"


  # ── 场景 10004：警局 Morrison 办公区（过场，Morrison 签搜查令）──
  - id: 10004
    name: "警局 Morrison 办公区"
    type: transition_cutscene  # 🎬 过场，自动触发
    unlock_condition: "持有 10601 法医鉴定报告"
    description: |
      Zack 带着 10601 法医报告来到警局。Morrison 正在办公室整理文件。
      Zack 把报告推过去——没有多余的话。
      Morrison 看了两遍，盯着报告沉默了一会儿。
      他 L1 说过"你要真能拿出他是被人杀的硬证据，我签搜查令"。
      这句话现在回来了。
      他拿起笔，在搜查令（10607）上签了字。没有反驳，没有条件，只是签字。
      这不是悔改——这是一个疲惫的腐败警察兑现了他唯一的一句话。

    npc:
      - id: 904  # Morrison（复用 Unit9 ID）
        name: "Morrison"
        talk: morrison_l6_warrant
        is_liar: false
        motive: "兑现 L1 的承诺——他说过的话不能全部没用，这是他为数不多的体面"
        mindset: |
          疲惫、沉默。他不争辩，不拖延。
          签搜查令这个动作本身就是他对这件事的全部态度。
          这不代表他良心发现，只代表他当时那句话不是空话。

        # ── 1. 已知信息 ──
        active_topics:
          - "法医报告确认 Frank 死于钝器，非火灾——证据确凿"
          - "L1 的承诺：'有硬证据就签搜查令'"
          - "搜查令指向北区湖滨大道 88 号 Leonard Russo（Ross）住所"
        withheld_topics:
          - "Morrison 与 Whale 之间的往来——这不是他在这个场景里会说的话"
          - "他对 Leonard 的了解程度——他只知道签令，不参与后续"

        # ── 2. 玩家询问意图 ──
        player_inquiry:
          - '"这份报告对你来说意味着什么" # 6'
          - '"搜查令对 Leonard 住所有效期多长" # 5'

        # ── 3. 可提取证词 ──
        testimony_ids:
          # Morrison 在本场景不产生可提取证词——这是过场，他的唯一动作是签字

    evidence:
      - id: 10607
        name: "搜查令（Leonard 住所，Morrison 签字版）"
        name_en: "Search Warrant — Leonard Ross Residence (Signed)"
        type: item
        itemType: 3
        pickup: true
        analysis: false
        description: |
          正式搜查令，授权搜查北区湖滨大道 88 号 Leonard Ross（Russo）住所，Morrison 警官签字。
          搜查令是进入 10017 Leonard 住所的解锁钥匙。
        note: "关键——解锁场景 10017；Morrison 兑现 L1 承诺的物证"


  # ── 场景 10011：Moore 银行大厅（Leonard 谎言锚台词）──
  - id: 10011
    name: "Moore 银行大厅"
    type: free_exploration  # 🔓 自由探索（Leonard 在工位，可短暂交互）
    description: |
      Moore 银行大厅。Leonard Russo 在他的工位上，西装笔挺，眼镜是新配的——
      左眼是透明的新镜片，右眼是旧镜片（颜色略显偏黄，但在室内光线下不那么明显）。
      他知道 Zack 在追这件案子，但此刻还不知道 Zack 拿着搜查令和眼镜碎片。
      他表现出得体的惋惜和无辜。
      他的台词是接下来 R1-R4 谎言链的预铺锚点。

    npc:
      - id: 1105  # Leonard Russo
        name: "Leonard Russo（Ross）"
        talk: leonard_l6_lobby
        is_liar: true  # 本场景说谎，is_liar 标注但非 Expose 对象
        motive: "维持无辜形象——他知道 Zack 在查这件事，尽量表现得镇定和无辜"
        mindset: |
          表面镇定，内心紧张。他在 L2 已经被指证过一次（催债关联），但那次没有触及当晚的真相。
          现在他不知道 Zack 手上有什么新东西。
          他的策略是：完全否认与 Frank 的任何当晚接触，把一切推给 Vinnie 和"悲剧偶然"。
          他对 Vinnie 的认罪是松了一口气的——他以为事情就这样结束了。

        # ── 1. 已知信息 ──
        active_topics:
          - "Leonard 公开的立场：Frank 的死是悲剧，与他无关"
          - "L2 已承认雇 Vinnie 催债，但将其定性为'正常的催债安排'"
          - "他提到 Vinnie 认罪，语气是'此事已了'"
          - "他对 Zack 的调查表示'配合'，但措辞都在设防"
        withheld_topics:
          - "当晚他到过鞋坊这件事——他绝不会主动提"
          - "烛台 / 眼镜碎片 / 打斗的任何细节"
          - "他打电话给 Vinnie 求助的 37 秒通话"
          - "Vinnie 为他顶罪的任何暗示"

        # ── 2. 玩家询问意图 ──
        player_inquiry:
          - '"你对 Vinnie 的认罪怎么看" # 7'
          - '"11月6日晚上你整晚在哪里" # 10'
          - '"你和 Frank 最后一次见面是什么时候" # 9'

        # ── 3. 可提取证词 ──
        testimony_ids:
          - 6050001  # ⚠谎言: "Frank 的死是场悲剧，但和我无关。那天晚上我整晚都在家，从来没有见过 Frank"（R1 谎言锚，唯一可收集 testimony）
          # 注：R2 / R3 / R4 谎言（"眼镜不能证明" / "拜访时摔坏眼镜" / "Vinnie 烧死"）为 Expose 内部退守对白，
          #     不进 testimony 池、不可预先收集——见 expose.round_2 / round_3 / round_4 的 lie 字段


# ─────────────────────────────
# 四、指证（⚔️ Expose：Leonard）——四轮 + 诱导招供
# ─────────────────────────────

expose:
  target: leonard
  target_npc_id: 1105
  target_talk: Loop6_leonard
  is_liar: true
  player_inquiry: null
  scene_id: 10017

  scene_setup:
    name: "Leonard 住所（北区湖滨大道 88 号）"
    unlock_condition: "持有 10607 搜查令"
    description: |
      北区湖滨大道 88 号，Leonard Russo 的住所。与南区的逼仄贫民街区完全不同——
      米色石灰岩外墙，铸铁栏杆，门童制服笔挺。
      Leonard 此刻还在 Moore 银行（§5 末他借口"客户没办完"拖延，没跟回来）。
      Zack/Emma 持搜查令独自上门——开门的是 Edith Ross（角色档见 `Characters/edith.md`），
      Leonard 妻子。她是本场自由探索阶段的对话 NPC——玩家可以走近她对话，
      听到她对 Leonard 最近反常的观察（眼镜换了、夜里失眠、出门时间反常）。
      她对话时端着茶盘，回答简短不带情绪，问完她会端着茶盘上楼，裙角消失在楼梯转角。
      Edith 上楼后，玩家继续搜证（10609 envir + 10610 pickup）。
      搜证近尾声时 Leonard 从银行回到家，进门撞见 Zack 已经搜过——
      他以为这只是例行搜查，表演配合（"搜查令我看见了，请自便"+拇指压袖口）。
      Leonard 的 pre-expose 对话发生在他回家之后；Expose 紧接其后启动。
    environment_narrative:
      - "Zack/Emma 进场氛围：Edith 应门，端茶站在通往楼梯的过道——玩家可走近触发对话；对话结束后她端茶上楼，裙角在楼梯转角消失。Leonard 尚未到家"
      - "Leonard 到家：Edith 已上楼后，Leonard 进门——他没看到 Edith 接待 Zack 的过程，但看到 Zack 已经搜过的痕迹（10610 已不在书桌侧）；他面色没变，但拇指压袖口"
      - "R4 诱导招供触底前演出帧：Leonard 望向楼梯，Zack 视线跟着他——楼梯顶端 Edith 的裙角再次出现一瞬（她下楼取东西又上去），然后消失。Leonard 转回头，开口招供"

  context: |
    Zack 持搜查令进入 Leonard 住所。此时 Zack 手中的证据：
    ── 场景 10006 取得 ──
    - 10601 法医鉴定报告（Frank 死于钝器）
    - 10602 房屋抵押证明（含烛台原位内景照片）
    - 10603 医用镊子（已用于取出 10605）
    ── 场景 10001 取得 ──
    - 10604 烛台（凶器，已取得）
    - 10605 眼镜碎片（烟熏黄色旧镜片，镊子夹出）
    - 10606 凹陷货物箱（记录/照片，3cm 凹陷，成人背部高度）
    ── 场景 10017 搜证取得 ──
    - 10609 旧报纸剪报（1900 南区双家纵火，环境叙事）
    - 10610 眼镜维修单据（左眼新镜片，右眼旧镜片）
    ── 继承自前序 Loop ──
    - 5080002b Vinnie 假认罪细节（"透过窗户看到他在床上睡觉"）
    - 4090004 Danny 目击证词（8点多壮汉从鞋坊方向离开，打晕 Margaret）

  # ── Leonard 住所搜证证据（进入 Expose 场景后先搜证再指证）──
  scene_evidence:
    - id: 10609
      name: "旧报纸剪报（1900 南区双家纵火）"
      name_en: "1900 Newspaper Clipping — Russo & Moretti Double Arson"
      type: envir
      itemType: 2
      pickup: false  # 环境叙事——Leonard 私物，纯叙事，跨章伏笔
      analysis: false
      description: |
        1900 年《艾斯弗德论坛报》剪报，标题：南区双家纵火案——Russo 与 Moretti 两户意大利裔家庭住所协同遭纵火，两家父母全部遇难，两名男孩（10 岁、6 岁）由教区收容。
        剪报已发黄，压在书桌底层。Russo 家的创伤——Leonard 这个人的某种起源。
      note: "场景道具（envir）——环境叙事，解释 Leonard 改名融入白人社会的背景动机"

    - id: 10610
      name: "眼镜维修单据"
      name_en: "Eyeglass Repair Receipt"
      type: item
      itemType: 3
      pickup: true
      analysis: false
      description: |
        眼镜店出具的维修单据，日期为 11月7日（案发次日）。
        项目：左眼镜片更换（新镜片，透明），右眼镜片未更换（旧镜片，备注"有轻微烟熏色，客户选择不换"）。
        单据上有 Leonard 的签名。
      note: "关键——L6 R2 击破件；疑点 10602 condition；镜片新旧对比小玩法"

  # ── Leonard NPC 条目（Expose 对象）──
  leonard_expose:
    talk: leonard_l6_home  # 场景 10017 Leonard 住所对话（与 expose.target_talk: Loop6_leonard 区分——同 loop2 leonard_l2_lobby vs Loop2_leonard 模式）
    is_liar: true
    motive: "保住自由和生活——他有妻子、有工作、有北区的生活，他不愿意为一次失手付出一切代价"
    mindset: |
      他以为 Vinnie 的认罪已经把这件事封死了。
      搜查令让他表面镇定，但开始警觉。
      当眼镜碎片出现在桌上，他真正慌了——但仍在战术性撤退，每次只承认被证明的那一层。
      他不是恶人，他是在一步一步错下去的人：雇 Vinnie 催债→失手打死 Frank→打电话求助 Vinnie→
      任由 Vinnie 纵火→接受 Vinnie 顶罪。每一步他都告诉自己"只是这一次"。
      R4 招供前他望向楼梯——他知道妻子在楼上，他知道她不爱他，他知道他会失去这一切，
      然后他开口说了真相。

    # ── 1. 已知信息 ──
    active_topics:
      - "四层谎言防线（对应 R1-R4）"
      - "Leonard 对 Vinnie 的认罪的态度：'Vinnie 为这件事认了罪，案子已经结了'"
      - "表面无辜立场：'我当天晚上一直在家，从没见过 Frank'"
      - "被逼后退守：'就算有碎片，不能证明是我的眼镜'"
      - "二次退守：'我拜访过 Frank，是和平拜访，摔了眼镜，他把我送出门'"
      - "R4 诱导招供后：把一切推给 Vinnie——'我打伤了 Frank，但是 Vinnie 说不如直接死了算了，然后是他烧死的'"
    withheld_topics:
      - "Vinnie 对他的情感深度——他真的不知道 Vinnie 为他能做到如此"
      - "他知道 Vinnie 认罪是假认罪这件事——他不会主动说，怕供词矛盾"
      - "烛台是他随手拿起来的，不是预谋凶器"

    # ── 2. 玩家询问意图 ──
    player_inquiry: null  # Expose 对象，设为 null

    # ── 3. 可提取证词 ──
    testimony_ids:
      - 6050001  # ⚠谎言: "Frank 的死是场悲剧，但和我无关。那天晚上我整晚都在家，从来没有见过 Frank"（R1 谎言锚，唯一可收集 testimony）
      # 注：R2 / R3 / R4 谎言（眼镜不能证明 / 拜访时摔坏 / Vinnie 烧死）为 Expose 内部退守对白，
      #     不进 testimony 池、不可预先收集——见下方 round_2 / round_3 / round_4 的 lie 字段


  # ── Edith Ross NPC 条目（Leonard 妻子，L6 §10017 自由探索对话 NPC）──
  edith_ross:
    talk: edith_l6_home
    is_liar: false
    motive: "保持自己的离场选项——她不为 Leonard 撒谎，不为 Leonard 隐瞒；她对 Frank 案不在意，但她对 Leonard 最近反常的事实陈述是中立的"
    mindset: |
      冷漠、疲态、节能。她没有爱了，所以她不为 Leonard 多说一句话；
      她也没有恨，所以她不会主动指控他。她说她观察到的事实，仅此。
      她对 Zack 没有抗拒也没有合作——回答简短，问完就停。
      她不知道 Leonard 是凶手——她只知道他这两个月反常（换眼镜 / 失眠 / 出门时间不对）。
      她在客厅端着茶盘站着，对话结束就端茶上楼。

    # ── 1. 已知信息 ──
    active_topics:
      - "Leonard 最近两个月换了新眼镜（左眼新片透明、右眼旧片未换——10610 视觉证据的旁证）"
      - "Leonard 最近夜里不睡——具体两个月内开始的失眠"
      - "Leonard 最近出门时间反常——11月6日晚出门时间也不正常，她没在意是几点"
      - "她对 Leonard 工作上的事不问——她从不主动了解 Lakeshore Trust Bank 的事"
      - "她对 Frank Kowalski 没印象——只听过 Leonard 在书房跟另一个穿西装的人提过一次（"那个老顽固"）"
    withheld_topics:
      - "她在心里已经准备离开 Leonard 这件事（不主动说出来）"
      - "她对 Leonard 是凶手的可能性的内心猜测（她没有证据，也不愿主动指控；如果玩家直接问，她回'我不知道，那是他的事'）"
      - "她和 Leonard 婚姻无爱的具体细节（不主动展开）"

    # ── 2. 玩家询问意图 ──
    player_inquiry:
      - '"Leonard 最近反常——眼镜 / 失眠 / 出门" # 10'
      - '"她对 Leonard 工作的态度" # 6'
      - '"她对 Frank 的印象 / 案子的看法" # 4'

    # ── 3. 可提取证词 ──
    testimony_ids:
      - 6120001  # Edith："Leonard 最近换了新眼镜——左眼是新片，右眼没换。两个月前开始的"（10610 维修单的旁证，强化 R2 击破链）
      - 6120002  # Edith："他最近夜里不睡。也不说原因。我也没问"（Leonard 反常行为的旁证；可在 Expose 中作为 R1/R2 辅助语境，但非必需）
      - 6120003  # Edith："那天晚上他几点出门的？……我没看。但不是正常的时间"（间接削弱 Leonard "整晚在家"的 R1 谎言）
      # 注：testimony ID 格式 {loop:1}{npc_code:2}{seq:4} = 7位；Edith NPC code 12（Leo妻子，已确认）


  # ── 轮次一：否认到场维度 ──
  round_1:
    lie: "Frank 的死是场悲剧，但和我无关。那天晚上我整晚都在家，从来没有见过 Frank。"
    lie_source: 6050001
    usable_evidence:
      - id: 10605
        role: "鞋坊柜子缝隙里夹出来的眼镜碎片——烟熏黄色旧镜片，与 Leonard 新配眼镜的右眼旧镜片同款；柜子缝隙位置在烛台下方，打斗时眼镜被碰碎的碎片落入缝隙，不会自己出现在那里"
      - id: 6110001
        role: "Margaret 8:16 在街角亲眼目击戴眼镜西装男独自从鞋坊方向踉跄离开——她差点撞上他；Leonard 整晚在家的说法与此直接矛盾"
    required_items: [10605, 6110001]
    trap_evidence: []  # R1 无陷阱选项——10605 + 6110001 双件构成直接击穿
    result: partial_victory
    result_description: |
      Zack 出示 10605（烟熏黄色眼镜碎片）和 6110001（Margaret 目击证词）：
      这块碎片从鞋坊柜子缝隙里取出来——烛台下方，旧镜片。
      而你今天配的眼镜：左眼新片透明，右眼旧片偏黄。
      同时，我母亲当晚 8:16 在街角，差点撞上一个戴眼镜的西装男，
      从鞋坊方向独自踉跄离开。
      整晚在家，是这么整晚在家的吗？
      Leonard 的眼神定了一秒。第一道防线开始松动：
      "就算有眼镜碎片……那也不能证明是我的眼镜。"

  # ── 轮次二：否认眼镜归属维度 ──
  round_2:
    lie: "就算有眼镜碎片，也不能证明是我的。"
    lie_source: null  # R2 谎言为 Expose 内部退守对白，无 testimony ID（R1 被破后 Leonard 当场说出）
    usable_evidence:
      - id: 10610
        role: "眼镜维修单据——案发次日（11月7日）Leonard 去配了新眼镜，左眼换了新镜片（透明），右眼旧镜片未换（备注'有轻微烟熏色'）。旧镜片的烟熏色 + 碎片的烟熏黄色 + 案发时间完全对应；小玩法：将碎片拖拽到维修单旁边进行新旧镜片对比——颜色、磨损纹路完全吻合"
    required_items: [10610]
    mini_game:
      type: lens_comparison
      description: "将 10605 眼镜碎片拖拽至 10610 维修单，触发新旧镜片视觉对比——碎片与维修单备注'右眼旧镜片、烟熏色'完全吻合"
    trap_evidence: []  # R2 无陷阱件——原 10611 空相框已与 Miro 对齐删除
    result: partial_victory
    result_description: |
      Zack 出示 10610（眼镜维修单据）并引导对比：
      案发次日，你去配了新眼镜。左眼换了新片，右眼旧片没换——维修单上写着"轻微烟熏色"。
      而柜子缝隙里的碎片：烟熏黄色，旧镜片。一模一样。
      Leonard 的嘴唇动了一下，然后他换了方向：
      "好。我承认，我那天去拜访过 Frank。但那是和平拜访——我不小心摔了眼镜，
      Frank 帮我扶起来，把我送出门。他送我出门的时候还好好的。"

  # ── 轮次三：否认暴力打斗维度 ──
  round_3:
    lie: "我当天拜访 Frank，不小心摔坏了眼镜，Frank 怕我摔了还把我送出门呢。"
    lie_source: null  # R3 谎言为 Expose 内部退守对白，无 testimony ID（R2 被破后 Leonard 当场说出）
    usable_evidence:
      - id: 6110001
        role: "Margaret 证词的'独自'细节——8:16 她目击的西装男是独自一人，踉跄离开，像看不清路；如果是'和平拜访'、Frank 把你送出门，为什么是踉跄的、像看不清路的状态？而且是独自——没有 Frank 相送"
      - id: 10606
        role: "货物箱 3cm 凹陷（成人背部高度）——这里发生过激烈的打斗；货物箱被人狠狠撞过，留下深陷的痕迹；和平拜访不会留下这个"
    required_items: [6110001, 10606]
    trap_evidence:
      - id: 10604
        reason: "烛台是凶器维度，需要先击破'和平拜访'这一层，才能进入凶器归属的讨论；现在出示只会让 Leonard 转移话题到'你怎么证明凶器是烛台'"
    result: partial_victory
    result_description: |
      Zack 拿出两件：
      一：你母亲 Margaret——8:16，她目击你独自踉跄离开，像看不清路。和平拜访之后，Frank 把你送出门，
      你为什么是踉跄的？为什么是独自的？
      二：货物箱——3cm 凹陷，高度和你的背部一样。
      这间屋子里发生过非常激烈的打斗——有人被狠狠撞到了箱子上。
      Leonard 盯着桌面。他不说话了。

  # ── 诱导招供系统（R3 击穿后，R4 开始前）──
  induce_system:
    enabled: true
    mechanic_exception_note: |
      此阶段豁免"喂话禁止"规则——机制特例 induce_system.enabled=true。
      仅在本阶段内豁免；L6 其他对话仍严格遵守"不替玩家说出结论"原则。
    gauge:
      max: 100
      initial: 0
      win_threshold: 100
    nodes:
      - node_id: "induce_1"
        prompt: "我知道那晚你没有计划要杀他——这只是失控的一瞬间，对吗？"
        correct_choice: "温和追问（上述台词）"
        wrong_choice: "强硬威胁（'你最好现在交代，否则……'）"
        correct_delta: +30
        wrong_delta: 0  # 错误选项不增不减，防止卡关
        effect_description: "Leonard 的眼神略微软化——有人说出了他藏在心里的话，他的防线出现了细小的裂缝"

      - node_id: "induce_2"
        prompt: "你打电话给 Vinnie——你只是需要有人帮你处理那个局面，你没有想到后来发生的那些事。"
        correct_choice: "温和追问"
        wrong_choice: "强硬威胁"
        correct_delta: +40
        wrong_delta: 0
        effect_description: "Leonard 的手放在膝盖上，手指轻轻捏了一下——那通 37 秒的电话是他无法否认的，而有人把它说出来不是在指控他，而是在理解他"

      - node_id: "induce_3"
        prompt: "你不知道 Vinnie 会做那些事——你以为他只是来帮你处理一下，然后你回家了。"
        correct_choice: "温和追问"
        wrong_choice: "强硬威胁"
        correct_delta: +30
        wrong_delta: 0
        effect_description: "诱导槽达到 100%。Leonard 望向楼梯——楼梯顶端，妻子裙角一闪而过，消失。他转回头，开口说话了。"

    qte:
      trigger: "诱导槽达到 100%"
      description: "3 秒按键 QTE（移动端适配方案待程序确认 U-P1-3），成功触发 Leonard 开口招供进入 R4"
      mobile_note: "移动端输入方式待程序确认 U-P1-3"

  # ── 轮次四：R4 谎言——甩锅 Vinnie 维度 ──
  round_4:
    lie: "我打伤了 Frank，但 Vinnie 说不如直接死了算了，然后是 Vinnie 烧死了他。"
    lie_source: null  # R4 谎言为 Expose 内部退守/甩锅对白，无 testimony ID（诱导招供后 Leonard 当场说出）
    usable_evidence:
      - id: 5080002b
        role: "Vinnie 假认罪的细节：'我透过窗户看到 Frank 在床上睡觉，然后放火'——Vinnie 说到场时 Frank 在床上；但如果 Frank 是在打斗中倒地死亡，尸体应该在地上。是 Vinnie 自己把尸体搬上了床，然后说'看到他睡在床上'——他在保护 Leonard，编了一个'没有人打他'的故事。你说是 Vinnie 建议杀了他，但 Vinnie 到场时根本不知道 Frank 怎么死的——他只知道'这里有一具尸体，Leonard 需要帮忙'"
    required_items: [5080002b]
    trap_evidence:
      - id: 5080002a
        reason: "Vinnie 假认罪主体（'是我杀的 Frank！'）反而支持 Leonard 的甩锅——单独使用只会强化 Vinnie 是凶手的印象，正确做法是用细节矛盾 5080002b 戳破 Vinnie 护着 Leonard 的谎言"
    result: full_victory
    result_description: |
      Zack 拿出 Vinnie 的认罪记录，引出那句话：
      "我透过窗户看到他在床上睡觉，然后放火。"
      Vinnie 说，他到的时候 Frank 在床上。
      但你刚才说的是：Frank 是在打斗中倒下的，你打伤了他。
      打斗中倒下的人，不会自己爬回床上。
      是 Vinnie 把他抬上床的——Vinnie 到场时已经是一具尸体了，他不知道你们之间发生了什么，
      他只知道你需要帮忙，然后他编了一个'没有人打他、只是睡觉然后失火'的故事。
      Vinnie 不是在认罪。Vinnie 是在替你掩护一个他根本不知道全貌的故事。
      Leonard 长时间没有说话。然后低下头，不再看 Zack。

