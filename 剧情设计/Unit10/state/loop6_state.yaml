          苏醒后神情平静而专注。她不自怜，不强调自己的伤痛。
          她记得当晚出去买东西，记得街角的那个男人，记得戒指滚出来的声音——
          这些细节她一直保存在意识里，等待能说出来的时刻。
          她知道 Frank 死了，但不知道是谁杀的。她把自己知道的全说出来。

        # ── 1. 已知信息 ──
        active_topics:
          - "当晚她约 7:45 外出，去街对面洗衣店取衣服并顺道买了面包"
          - "8:16 左右从洗衣店出来，提着面包袋，街角差点撞上一个戴眼镜的西装男——他独自从鞋坊方向踉跄离开，像看不清路"
          - "西装男的外貌：戴眼镜、西装、步伐踉跄、独自一人"
          - "她没有看到 Vinnie——她只看到了那个西装男"
          - "随后遭到从背后袭击，失去意识，没有看到打她的人"
          - "她感觉戒指那一刻从手指脱落——撞击地面时手腕磕到了路缘"
          - "醒来后 Mickey 律师告知她在圣心医院，但她不知道 Mickey 和她的案子的关联"
        withheld_topics:
          - "Leonard 的名字和身份——她不知道她目击的那个人叫什么"
          - "凶案全貌——她不知道 Frank 是被打死的，不知道 Leonard 就是那个西装男"
          - "Vinnie 纵火 + 打晕她的关联——她没看到打她的人"

        # ── 2. 玩家询问意图 ──
        player_inquiry:
          - '"当晚你在什么时间、什么地点外出" # 10'
          - '"你看到的那个男人的外貌特征" # 10'
          - '"你是怎么知道时间是 8:16 的" # 8'
          - '"你当时提着什么，有没有撞到他" # 7'
          - '"你是否注意到他的眼镜有什么异常" # 9'
          - '"你被袭击之前最后看到了什么" # 9'

        # ── 3. 可提取证词 ──
        testimony_ids:
          - 6110001  # "8:16 街角目击戴眼镜西装男独自从鞋坊方向匆忙离开，走路踉跄，像看不清路；我提着面包袋从洗衣店出来，差点撞上他；看见戒指从她手旁滚出来反光（备注：戒指是她自己的婚戒，Vinnie 打晕她倒地时手腕撞路缘脱落）"

