opening:
  type: cutscene  # 🎬 硬切，无玩家操作
  talk: opening_l6_hospital
  location: "Zack 事务所（L5 末接到 Foster 电话后，整理思路）"
  description: |
    L5 末 Vinnie 认罪后，Foster 的电话打破了一切"结案"的幻觉。
    Frank 不是被火烧死的——是钝器击打。Vinnie 认罪细节里有个不对劲的地方：
    他说"透过窗户看到 Frank 在床上睡觉"——但如果 Frank 是在打斗中被杀、倒在地上，
    是谁把他移到床上的？Vinnie 到场时尸体应该还在地上。
    Zack 注意到：Vinnie 认罪的方式太主动、太快、太干净——像是精心准备的结局。
    他需要找到真凶。
    Foster 说明天（11/8 09:00）她会在圣心医院，法医报告实物届时取到。
    同时——Margaret 苏醒了。

