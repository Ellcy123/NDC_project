# A. 结构完整性   PASS — player_context / opening / scenes(S10006/S10010/S10001/S10007/S10009/S10020) /
#                        expose（scene_id=10020 Frank 家厕所）/ post_expose_scene / doubts / evidence_registry 全部存在
# B. 证据覆盖     PASS — L4 所有证据（10402-10410 共 9 件，新增 10409 枯萎玫瑰 + 10410 水杯做玫瑰花蕊玩法 input）已分配到场景；
