doubts:
  # ID 编码：104xx 系列（Unit10 L4）
  # condition type: 1=Item / 2=RelationNetwork / 3=Testimony（Timeline 标记）
  # isFragment: false=疑点 / true=碎片
  # 一对一挂载：每件证据/证言 ID 在整个 6-Loop state 里只被一个疑点/碎片的 condition 引用

