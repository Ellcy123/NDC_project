# 四、指证（Expose：Danny Kowalski）
# ─────────────────────────────

expose:
  target: danny
  target_talk: danny_expose_L4
  scene_id: 10020  # Frank 家厕所——Danny 蹲马桶上无处可逃
  is_liar: true
  player_inquiry: null
  exposeNpcId: 109
  total_rounds: 3

  context: |
    Zack 搜证完成后，手握：
    - 4040001 O'Hara 证词：Frank 7 点出门，Danny 前后脚走了同一条路
    - 10405 Margaret 的婚戒（Danny 床垫下找到）
    - 3060004 Moore 指证后坦白证词：Danny 把 Frank 房产证给了银行
    - 10404 空怀表盒（Tony 便条：怀表抵押换 100$，上周）
    - 4040002 O'Hara 证词：Lula 至少四五年前就常来这条街
    - 10403 求婚戒指（F & L 1923，玫瑰花蕊找戒指小玩法产出）
    Danny 在 Frank 家厕所拉肚子。Zack 推门进去时他正蹲在马桶上，狼狈、按肚子、面如土色。
    他第一反应会撒谎（整晚在家），然后逐步退守——所有狡辩都伴随着肠胃叫声和马桶冲水。
    L4 的情感基调：Danny 是个可悲的机会主义者，不是凶手——
    最终击破后他会交出目击证词（4090004），是这个 Loop 真正重要的信息。
    R3 收尾的关键演出：Lula 隔着厕所侧墙小窗（朝后巷的 30cm × 40cm 通风窗）平静签下放弃继承协议——
    Danny 在马桶上仰头看小窗，对比构图极具冲击。

  # ── 轮次一：Danny 不在场谎言 ──
  round_1:
    lie: "11月6日当晚我在家，哪儿都没去。"
    lie_source: 4090001  # Danny 谎言锚证词
    usable_evidence:
      - id: 4040001
        name: "O'Hara 证词：Frank 7 点出门，前后脚 Danny 也出门，走同一条路"
        note: "关键——O'Hara 目击 Danny 出门，直接反驳不在场谎言；疑点 10402 condition"
        usage: "邻居 O'Hara 亲眼目睹：Frank 晚上 7 点出门，Danny 紧跟着也出了门，走的是同一条路——怎么能说整晚在家？"
      - id: 10405
        name: "Margaret 的婚戒"
        note: "关键——婚戒只能来自案发现场附近，Danny 必须在场才能拿到；疑点 10402 condition"
        usage: "这枚婚戒内刻'P & M 1901'，是 Margaret 从不摘下的婚戒。它在你床垫底下。Margaret 在街边倒地时戒指脱落——你当晚必定在场。"
    requiredItems:
      - 4040001
      - 10405
    trap_evidence:
      - id: 10407
        trap_reason: "遗嘱是动机证据，不能反驳 Danny 不在场的谎言——误用会失败"
    result: partial_victory
    result_description: |
      Danny 被两件证据当场击穿。他短暂沉默，随后退守：
      "好吧，我出门了。但我没有理由杀我叔叔！"

  # ── 轮次二：Danny 说自己没有动机 ──
  round_2:
    lie: "我没有理由杀我叔叔！"
    lie_source: null  # R2 谎言为 Expose 内部退守对白，无 testimony ID（R1 被破后 Danny 当场说出）
    usable_evidence:
      - id: 3060004
        name: "Moore 指证后坦白证词：Danny 把 Frank 的房产证给了银行"
        note: "关键——Danny 暗中出卖叔叔房产证换自己的沉默，有明确经济动机；父疑点 10401 condition"
        usage: "Moore 银行的 Harold Moore 已经承认了：是 Danny 把 Frank 的房产证交给了银行。你为了让银行催债催到叔叔头上、为了还你自己的赌债——这就是你的动机。"
      - id: 10404
        name: "空怀表盒（含 Tony 便条）"
        note: "关键——怀表抵押换 100$，上周；Danny 经济状况极度拮据；疑点 10404 condition"
        usage: "你的怀表上周已经拿去赌场抵押换了 100 块。还有 Lula 说的：Frank 的工资一直在给你还债。你真的没有理由杀他？"
    requiredItems:
      - 3060004
      - 10404
    trap_evidence:
      - id: 10402
        trap_reason: "旧沙发属于 Frank 为 Lula 布置约会场所的证据，与 Danny 的经济动机无直接关联——误用会失败"
      - id: 10406
        trap_reason: "维修收据是 Frank 为 Lula 的花销，证明 Frank 感情真实，但无法反驳 Danny 的'没有动机'谎言"
    result: partial_victory
    result_description: |
      Danny 被击穿，慌乱起来：
      "就算我缺钱，Lula 才是真正的威胁！她是个感情骗子，骗我叔叔签了遗嘱！"

  # ── 轮次三：Danny 诬陷 Lula ──
  round_3:
    lie: "是 Lula！她是个感情骗子，骗我叔叔签了遗嘱！"
    lie_source: null  # R3 谎言为 Expose 内部退守对白，无 testimony ID（R2 被破后 Danny 当场说出）
    usable_evidence:
      - id: 4040002
        name: "O'Hara 证词：Lula 至少四五年前就来这条街"
        note: "关键——五年前 Frank 房子还没有被盯上；Lula 与 Frank 认识时无法提前预谋遗嘱；疑点 10403 condition"
        usage: "邻居 O'Hara 说 Lula 四五年前就来这条街了。五年前 Frank 的房子还没被银行盯上、遗嘱还没有写——你说她'骗遗嘱'，骗谁的？"
      - id: 10403
        name: "求婚戒指（F & L 1923）"
        note: "关键——1923 年定制（共度 5 周年纪念），五年前已存在；Frank 的真爱物证；疑点 10403 condition"
        usage: "这枚戒指刻着'F & L 1923'，是 Frank 1923 年关系正式确立时定制的求婚戒指，藏在他们约会的地下室里。五年承诺，五年等待——这是真情实感的物理证据。"
      - id: "lula_window_signature"
        name: "Lula 隔厕所小窗签字（游戏内演出）"
        note: "关键——R3 指证时 Lula 出现在厕所侧墙小窗外，隔窗递入放弃继承协议、当 Danny 面平静签下名字"
        usage: "（厕所侧墙的小窗一暗。Lula 的脸出现在窗外。她不说话，把一张折好的纸从窗格递进来，拿起 Zack 递过去的笔，在窗台上签下名字——'Lula Washington'——签完抬起头，平静地看着马桶上的 Danny。Danny 仰着脸，按着肚子，说不出话。）"
    requiredItems:
      - 4040002
      - 10403
    trap_evidence:
      - id: 10407
        trap_reason: "遗嘱本身不能证明 Lula 是否是真爱——只证明 Frank 做了遗嘱安排，Danny 会用'她骗他签的'来反驳"
    result: full_breakthrough
    result_description: |
      Lula 出现在厕所小窗外，平静签下放弃继承协议，然后才开口。
      Danny 仰着脸看着小窗，肚子还在咕咕响，整个人垮了下去。
      他再无话可说——他是彻底的机会主义者，不是凶手。
      他慌乱地摊牌：当晚他确实出门去赌场，回来时在街边看到了大块头打晕 Margaret、
      戒指从她手旁滚出来，他顺手捡走了。

  # ── 指证后剧情 ──
  post_expose_scene:
    description: |
      Danny 的目击证词 4090004 进入玩家背包（L5 击穿件之一，已确认挂入 L5 疑点 10501 condition）。
      Lula 补充证词 4100001（Frank 不会做饭/不用 Margaret 厨房）和 4100002（工资给 Danny 还债）。
      Lula 交出 10408 小铁盒备用钥匙，说：Frank 说这把钥匙以后会用到，现在交给 Zack 比放在我手上更合适。
      全场沉默。Danny 站起来要走，没有人拦他。
      Zack 心里清楚：Danny 是这个案子最坏的旁观者，但不是杀人的那一个。

    new_evidence_gained:
      - id: 10408
        name: "Lula 小铁盒备用钥匙 / Lula's Spare Iron Box Key"
        type: item
        itemType: 3
        pickup: true
        analysis: false
        description: "一把黄铜小钥匙，标签上 Frank 用铅笔写着'Iron Box'。Lula 保管了两年，按 Frank 的嘱托在'需要的时候'交出。L5 在 Frank 家主屋开间（10018）开小铁盒使用一次后归档。"
        note: "关键——L5 开 Frank 家主屋开间床后小铁盒（10018）的唯一钥匙；使用后归档，L6 不再需要"

    new_testimony_gained:
      - id: 4090004
        npc: danny
        content: "当晚 8 点多，我在街边看到一个壮汉从鞋坊方向匆忙离开——块头大，深色衣服，走路像意大利人。他打晕了 Margaret，戒指从她手旁滚出来反光，我顺手捡走了。"
        significance: "L5 疑点 10501 condition；Vinnie 在场时间和体型特征的旁证；Danny 的目击是 L5 确认纵火者身份的关键之一"
        note: "已确认挂入 L5 疑点 10501 condition；时序合规（L4 末取得，疑点 10501 属 L5）"

    player_knowledge_gained:
      - "Danny 不是凶手——他是机会主义目击者，趁乱捡走了婚戒"
      - "大块头、深色衣服、走路像意大利人——Vinnie 的体型特征初步浮现（L5 疑点 10501 核心）"
      - "Frank 的工资一直给 Danny 还赌债（Lula 证词 4100002）"
      - "Frank 不会做饭，绝对不会用 Margaret 的厨房（Lula 证词 4100001）——L1 Emma 皱眉伏笔正式回收"
      - "10408 小铁盒备用钥匙到手——L5 可以进入 Frank 家主屋开小铁盒"
      - "父疑点 10401 已满足全部 condition（2090001 + 3060004），在本 Loop 末点亮"


