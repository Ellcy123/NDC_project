#                        O'Hara（S10007）/ Danny（S10020 厕所 + expose）各含 4 必填块；
#                        Danny 在指证场为 Expose 对象（is_liar:true, player_inquiry:null）
# D. 目标对齐     PASS — goals 与讨论结论"Lula 是骗子还是真爱？Danny 的诬陷能否击破？"一致；
#                        三轮维度（不在场/动机/诬陷 Lula）互不重叠
# E. 信息节奏     PASS — 揭示：Frank-Lula 五年真感情 / Danny 收贿目击 / 婚戒下落 / O'Hara 目击；
#                        锁定：纵火者身份 / Frank 死亡原因（钝器）/ Leonard 凶手身份 / 眼镜碎片；
