# 三、场景（主线分支：继续当侦探）
# ─────────────────────────────

scenes:

  # ── 场景 10001：Margaret 鞋坊-店铺区（废墟深度搜证）──
  - id: 10001
    name: "Margaret 鞋坊-店铺区（废墟深度搜证）"
    type: free_exploration  # 🔓 自由探索
    unlock_condition:
      - type: story_flag
        param: "L5_choose_detective"
    description: |
      废墟状态——前部烧毁，灰烬与焦木。L1 时未仔细搜的角落现在可以深入。
      Emma 和 Zack 分工扫查。
      在靠近入口的墙角灰烬中，Zack 找到一个完好无损的银色打火机（10501）——
      火灾现场里没有任何烧变形的痕迹，它看起来"太完美了"。
      侧面有 V 字样刻字。

    evidence:
      - id: 10501
        name: "火灾现场打火机 / Lighter Found at Fire Scene"
        type: item
        itemType: 3
        pickup: true
        analysis: false
        description: "银色金属打火机，侧面刻有 V 字样。在鞋坊废墟靠近入口处的灰烬中发现，完好无损——普通打火机在火灾温度下外壳会熔变，此件无任何热损痕迹。"
        note: "关键——L5 R1 击穿件；疑点 10501 condition"

  # ── 场景 10015：Silver Moon 赌场/酒吧 ──
  - id: 10015
    name: "Silver Moon 赌场"
    type: free_exploration  # 🔓 自由探索（含指证入口）
    unlock_condition:
      - type: story_flag
        param: "L5_choose_detective"
    description: |
      Silver Moon 酒吧。Tony 在吧台，Vinnie 在他惯常的角落位置。
      爵士背景音、昏暗的灯光、角落的扑克桌——Vinnie 坐得很稳，直到 Zack 走近。
      玩家先与 Tony 对话（辨认打火机），再对 Vinnie 出示证据，进入指证流程。

    evidence: []  # 本场景无可拾取物证，证据从 Zack 背包出示

    npcs:
      tony_002:
        talk: tony_002_silver_moon_l5
        is_liar: false
        motive: "Vinnie 是他的常客，他对这段关系有点微妙——不完全帮衬，但也不主动出卖；打火机认出来是认出来了，他不会为 Vinnie 撒谎"
        mindset: "平静、职业感；擦吧台，听 Zack 说，短句回答；对 Vinnie 有一种'江湖习惯'的默契，但事到临头不会做伪证"

        # ── 1. NPC 已知信息 ──
        active_topics:
          - "认出打火机（10501）是 Vinnie 的——'这 V 字，Vinnie 的！每天在这用它点烟，上周还用它给姑娘点烟'"
          - "上周 Vinnie 还在用这个打火机给姑娘点烟（时间节点锚定：打火机不可能在两三个月前就遗落在鞋坊）"
        withheld_topics:
          - "Vinnie 是否真的纵火（Tony 不掌握直接信息）"
          - "Leonard 与 Vinnie 的具体交易细节（L2 已揭示，此处不重复）"
          - "Frank 真正死因（Tony 不知道）"

        # ── 2. 玩家询问意图 ──
        player_inquiry:
          - '"（出示 10501）你认识这个打火机吗？" # 10'
          - '"Vinnie 最近来过吗？什么时候来的？" # 8'

        # ── 3. 可提取证词 ──
        testimony_ids:
          - id: 5070001
            content: "这 V 字，Vinnie 的！每天在这用它点烟，上周还用它给姑娘点烟"
            note: "关键——L5 R1 击穿件；疑点 10501 condition"

# ─────────────────────────────
# 四、指证（Vinnie · 1 轮）
# ─────────────────────────────

expose:
  scene_id: 10015
  target_npc: Vinnie
  npc_code: "08"
  is_liar: true
  player_inquiry: null
  rational: "Vinnie 是 Frank 已死后才到场的从犯，有充分理由快速认罪止血；L6 会继续追问 Leonard 才是真凶"

  # Vinnie 的"安排感"演出说明：
  # 语速比平时快一截；Zack 还没把话说完就抢着认罪；
  # 认罪的细节（"透过窗户看到在床上睡觉"）和他作为纵火者的视角明显不对；
  # 整个认罪像是排练过的，不是被逼出来的。

  setup_dialogue:
    # 指证前的谎言设定（玩家通过 Tony 辨认打火机后，走向 Vinnie）
    lie_statement:
      testimony_id: 5080001
      content: "最近很久没去 Frank 那附近，至少两三个月了"
      note: "L5 R1 谎言锚"

  rounds:
    - round: 1
      lie:
        testimony_id: 5080001
        content: "最近很久没去 Frank 那附近，至少两三个月了"
      evidence_set:
        - evidence_id: 10501
          note: "打火机在废墟里完好发现——物证到了现场"
        - evidence_id: 5070001
          type: testimony
          note: "Tony：上周还在用它点烟——打火机不可能在两三个月前落在鞋坊"
        - evidence_id: 4090004
          type: testimony
          note: "Danny 目击：晚 8 点多块头大意大利男从鞋坊方向匆忙离开——人到了现场"
      presentation_mode: "逐步出示（非一次性呈现）——先打火机，Vinnie 辩'可能是之前落下的'，再引 Tony 辨认，最后引 Danny 目击；三步递进让 Vinnie 的辩解空间越来越小"
      result:
        type: forced_confession
        note: "Vinnie 突然抢话认罪，语速反常——安排感刻意设计"

  confession_dialogue:
    # 认罪段落：5080002a 和 5080002b 是同一段对白的连续两句台词，不同 talkitem 分隔
    testimonies:
      - id: 5080002a
        content: "够了！是我！绑架了 Margaret！因为她看见是我放的火！Frank 是我杀的！"
        note: "关键——疑点 10502 condition；认罪主体部分"
        talkitem_note: "独立 talkitem 句段；本句结束后有换气/停顿"
      - id: 5080002b
        content: "我透过窗户看到他在床上睡觉，然后放火！"
        note: "关键——疑点 10604 condition（L6）；L6 R4 击破件；认罪细节部分，留 L6 用"
        talkitem_note: "独立 talkitem 句段，紧接 5080002a 之后；语速更快，像是补充却越补越乱"

  post_expose_note:
    anomaly_flags:
      - "Vinnie 抢话：Zack 话还没说完，Vinnie 就开口了"
      - "细节不对：纵火者应该从外部点火，不应该'透过窗户看到床上有人'再入室——视角描述与纵火行为顺序矛盾（L6 揭示真相）"
      - "语速反常：相比 L2 在酒吧时的冷静沉默，此次极度急切"

# ─────────────────────────────
# 五、指证后剧情（Foster 电话过场）
# ─────────────────────────────

post_expose_scene:
  type: scripted_cutscene
  location: "Silver Moon 赌场外街道 → 附近公用电话亭"
  description: |
    Vinnie 坐上警车离去。
    Zack 和 Emma 站在夜里，事情好像已经告一段落——但又感觉哪里不对。
    两人走向附近的公用电话亭，打电话给 Foster 报喜，顺便问 Margaret 状况。

  foster_phone_call:
    testimony_id: 5030001
    speaker: "Foster（电话中）"
    content: "Margaret 已经脱离生命危险，但……有件事我得告诉你们，你们来一趟医院。Frank 似乎并不是因为火灾被烧死的——很可能是和某人博弈后的凶杀。我花了整整一天才有这个初步结论。"
    note: "L6 引擎点火；法医反转锚点；实物报告 10601 在 L6 医院取得"

  inventory_change:
    - item_id: 10502
      action: removed_from_inventory
      note: "Mickey 已在开篇拿走；L6 指证不依赖 10502；Mickey 拿走举报材料的伏笔在 Unit11+ 回收"

  scene_transition:
    next_loop: loop6
    trigger: "Foster 电话内容传达后，Zack 和 Emma 决定去医院——L6 开始"

# ─────────────────────────────
# 六、疑点（DoubtConfig 条目）
# ─────────────────────────────
# 进度条分母：2 项（2 疑点）
# 一对一挂载检查：
#   10501 → 疑点 10501（本 Loop 新件）
#   5070001 → 疑点 10501（本 Loop 新件）
#   4090004 → 疑点 10501（跨 Loop 件，L4 末取得，L5 疑点=L5，时序合规：4090004 取得在 L4 末，疑点 10501 在 L5，L5 ≥ L4，✅）
#   5080002a → 疑点 10502（本 Loop 新件）
#   5080002b → 疑点 10604（L6 疑点，留 L6 挂，此处仅记录）
# ─────────────────────────────

doubts:
  - id: 10501
    isFragment: false
    text: "完好的打火机怎么会在火灾现场？"
    unlock_condition:
      - type: 1
        param: "10501"  # 持有火灾现场打火机（完好无损，V 字样）
      - type: 3
        param: "5070001"  # 持有 Tony 辨认证词：上周 Vinnie 还在用它
      - type: 3
        param: "4090004"  # 持有 Danny 目击证词：当晚有块头大意大利男从鞋坊方向离开（跨 Loop 件，L4 末取得）
    posed_loop: 5
    resolved_loop: 5
    status: "unlocked_loop5"
    # 3 件 condition（讨论结论 5.1 裁决：4090004 必须挂疑点 condition；单疑点件数无硬上限，≤2 为推荐非强制）；
    # 时序合规：4090004 在 L4 post_expose 取得，疑点首现 L5 ≥ L4 ✅
    # L5 R1 击穿 Vinnie"很久没去 Frank 那附近"谎言时解决

  - id: 10502
    isFragment: false
    text: "Vinnie 真的杀了 Frank 吗？"
    unlock_condition:
      - type: 3
        param: "5080002a"  # Vinnie 假认罪主体证词："是我！绑架了 Margaret！因为她看见是我放的火！Frank 是我杀的！"
    posed_loop: 5
    resolved_loop: 6
    status: "posed_loop5_resolved_loop6"
    # 单件证词 condition；Frank 被钝器致死是 L5 末 Foster 电话揭示的——疑点首现于 Foster 电话后
    #（知道死因与认罪矛盾）；Vinnie 是假认罪、真凶 Leonard 在 L6 才揭，故 resolved_loop=6

