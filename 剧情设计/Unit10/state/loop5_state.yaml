# ============================================================
# loop5_state.yaml — Unit10 Loop 5: Vinnie 纵火认罪（误导性结局）
# ============================================================
#
# 叙事功能：
#   - 开篇：Frank 家小铁盒开启（10502 举报材料 + 10503 情书），Mickey 离场邀 Zack 当律师
#   - 二选一分支：律师 → 三幕坏结局过场（黑屏白字+静态画面）→ 回到选择点重选（不锁存档）
#   - 主线分支：继续当侦探，废墟深度搜证（10501 打火机）+ Silver Moon 赌场指证 Vinnie
#   - 指证 Vinnie（1 轮）：语速反常+细节不对+抢话认罪（安排感）
#   - 指证后：Vinnie 坐上警车，Zack/Emma 打电话 Foster → 法医反转（Frank 钝器致死）
#   - Mickey 拿走 10502（叙事特写，棕色皮制公文包两个铜扣），10502 removed_from_inventory
#
# 证据 ID 段：10xxx（Unit10 独立段）
#   - L5 新增物品：10501（火灾现场打火机）/ 10502（Frank 举报材料）/ 10503（Frank 情书）
#   - L5 末 Mickey 拿走 10502：removed_from_inventory 标注
#
# NPC 编码（Unit10）：
#   Morrison=01, Mickey=02, Emma=03, Foster=04, Margaret=05,
#   Leonard=05（Leonard NPC ID=1006，testimony code=05→已被 Margaret 占用？）
#   ——以讨论文件实际 testimony ID 为准：
#   Vinnie=08（NPC 1009）, Tony=07（NPC 1010）, Foster=03（testimony via phone）
#   Danny=09（NPC 1008）— 注：4090004 是 L4 已入袋的证词
#
# 场景 ID（讨论结论定稿，4 位格式）：
#   10018 = Frank 家主屋（开间客厅+床+开放式厨房；床后缝隙藏小铁盒）
#   10006 = 圣心医院-Margaret 病房（L5 末 Foster 电话过场）
#   10001 = Margaret 鞋坊-店铺区（废墟深度搜证）
#   10015 = Silver Moon 赌场（指证 Vinnie）
#
# known_facts 来源：loop1-4 post_expose_knowledge 全部累积
#
# ──────────────────────────────────────────────────────────
# 自检清单（A-G）
# A. 结构完整性   PASS — player_context / opening（Frank 家小铁盒 + 二选一）/
#                        lawyer_bad_ending_sequence / scenes（鞋坊废墟、Silver Moon）/
#                        expose（Vinnie 单轮）/ post_expose_scene / doubts /
#                        evidence_registry 全部存在
# B. 证据覆盖     PASS — 10501 → 场景 10001（废墟搜证）；10502 → 开篇小铁盒（Mickey 拿走）；
#                        10503 → 开篇小铁盒（环境叙事，isUsable=false）
#                        讨论结论 L5 全部 3 件证据已分配；4090004（L4 已入袋）在 expose 中引用
# C. NPC 条目     PASS — Emma（过场提及）/ Tony（场景 10015）/ Vinnie（Expose，is_liar:true）
#                        各含 4 必填块；Tony 4 块完整；Vinnie is_liar=true player_inquiry=null
# D. 目标对齐     PASS — goals 与"查清 Frank 当晚真相，揭穿 Vinnie 谎言"一致；进度条分母=2
# E. 信息节奏     PASS — 揭示：Vinnie 当晚在鞋坊（打火机+Tony辨认+Danny目击）；
#                        锁定：Frank 真正死因（L5 末 Foster 电话触发，10601 实物 L6 获取）；
#                        锁定：Leonard 真凶（L6 揭示）；
#                        锁定：Vinnie 假认罪内在矛盾（L6 疑点 10604 才解锁）；
#                        5080002b 留 L6 用，本 Loop 以完整认罪段落收录但 condition 挂 L6 疑点
# F. quiz 配对    PASS — 本 Loop 无独立 quiz 节点；开篇过场包含叙事节点，不需要 quiz 配对
# G. Expose 逻辑  PASS — R1 谎言 5080001（"两三个月没去"）；
#                        击破：10501+5070001+4090004（三方面证明 Vinnie 当晚在鞋坊）；
#                        无独立陷阱选项（以演出形式逐步出示）；
#                        Vinnie 抢话认罪 5080002a/5080002b 作为后续证词在同一段对白记录
# ──────────────────────────────────────────────────────────
#
# validation_status: PASS
# ============================================================

# ─────────────────────────────
# 一、玩家视角
# ─────────────────────────────

player_context:
  goals:
    primary: "Frank 被杀那晚到底发生了什么？谁在案发现场，谁做了什么？"
    secondary:
      - "查清小铁盒里的举报材料指向谁——Frank 冒险收集这些证据，是针对什么人"
      - "查清打火机为何在废墟里完好无损——火灾现场的痕迹是否经过伪造"
      - "查清 Vinnie 与案发当晚的关联——他说'两三个月没去'，这是真话吗"
      - "决定下一步：站在法庭上当律师，还是继续追查真相"

  known_facts:
    # loop1-4 post_expose_knowledge 全部累积
    - "死者确认为 Frank Kowalski（73 岁退休工人，Margaret 鞋坊雇员）"
    - "死亡地点：Margaret 鞋坊卧室区；Morrison 原编造死因为'厨房失火意外'"
    - "Morrison 承认：EPI01 旧仇 + 省事结案；有本地黑手党打电话警告他别深究（Whale 系伏笔）"
    - "Morrison 承诺：拿出'他是被人杀的'硬证据，他签搜查令（L6 兑现钩子）"
    - "Margaret 是 Zack 的母亲，案发当晚被 Vinnie 从背后打晕，现在圣心医院昏迷治疗"
    - "Mickey 是 Frank 的律师，本约定当晚来检举银行犯罪行为但 Frank 没出现；在路边发现昏迷的 Margaret，送医后发电报告知 Zack"
    - "Moore 银行实施掠夺性贷款（年单利 12% + 月管理费 50$，5 年总计约 3,960$）；使用 Lakeshore Investment Co. 马甲规避银行法"
    - "Leonard 雇佣 Vinnie 暴力催债，对半分成；Leonard 童年改名（Russo → Ross）以融入白人社会"
    - "Frank 贷款协议签名是伪造的——10301 + 10302 双件直接对比签名笔迹即可证明"
    - "Danny 在 L2 银行大厅偷听到 Leonard 谈 Frank 房产证；Moore 承认是 Danny 把房产证给了银行换沉默（证词 3060004）"
    - "Danny 坦承：11月6日晚与 Frank 同路出门去赌场（被 O'Hara 目击），并非凶手"
    - "Danny 目击证词（4090004）：晚 8 点多，块头大深色衣服像意大利人的壮汉从鞋坊方向匆忙离开，还打晕了 Margaret；看见戒指从她手旁滚出来反光"
    - "Margaret 的婚戒出现在 Danny 房间——Danny 在街边顺手捡走的；已物归原主"
    - "Lula Washington 是 Frank 相恋五年的真爱，圣卢克医院护士；二人秘密约会地点是 Margaret 鞋坊地下室（Margaret 借出并支持）"
    - "Lula 提供了 Frank 家小铁盒备用钥匙 10408（L4 post_expose 入袋）"
    - "Frank 不会做饭，绝不会用 Margaret 的厨房——Lula 证词 4100001 回收 L1 Emma 皱眉伏笔（'厨房失火点'是 Morrison 编造的，也与实际不符）"
    - "O'Hara 目击：11月6日晚 7 点 Frank 出门前后脚 Danny 也出门，走同一条路"
    - "O'Hara 目击：Lula 至少四五年前就来这条街，经常去 Frank 家"
    - "地下室旧沙发磨损 3-5 年，与 Lula 证词互证；求婚戒指（10403）藏在玫瑰花蕊中"
    - "Frank 遗嘱：全部遗产默认归 Lula Washington（法定受遗赠人）；若 Lula 拒绝则兜底捐艾斯弗德工人互助会；Lula 当场签署放弃继承——放弃她本该完整获得的遗产，启动兜底条款"
    - "Mickey 在 L4 hospital 说'他已联系了可以证明 Lula 来历清白的人，如果 Danny 那边有问题，我有后手'——Lula 果然在 L4 R3 指证时现身"

  new_directions:
    - direction: "前往 Frank 家，用小铁盒备用钥匙 10408 开启小铁盒——Frank 一定留下了什么"
      trigger: "L4 post_expose：Lula 交出小铁盒备用钥匙 10408，告知小铁盒里有举报材料"
    - direction: "选择：当律师回法庭，还是继续调查 Frank 死因"
      trigger: "Mickey 离场邀请时的二选一分支（主线=继续当侦探）"
    - direction: "前往鞋坊废墟深度搜证——案发现场是否还藏有被忽略的物证"
      trigger: "主线分支触发后，Emma 提示废墟深度搜证"
    - direction: "前往 Silver Moon 赌场找 Vinnie——Danny 目击证词指向一个块头大的意大利人"
      trigger: "Danny 目击证词 4090004 在背包中；废墟打火机搜到后，方向明确"

  post_expose_knowledge:
    # L5 指证 Vinnie + 指证后 Foster 电话获得的新知识
    - "Vinnie 认罪：他就是 Danny 目击的'块头大意大利人'——当晚在鞋坊纵火并打晕 Margaret"
    - "Vinnie 的打火机（10501）在废墟完好——是他事后放置的，故意留下证据（认罪准备）"
    - "Vinnie 认罪语速反常、抢话、细节奇怪——'透过窗户看到 Frank 在床上睡觉'（5080002b 存疑，L6 回收）"
    - "Vinnie 认罪主体（5080002a）：'是我！绑架了 Margaret！因为她看见是我放的火！Frank 是我杀的！'"
    - "Vinnie 认罪细节（5080002b）：'我透过窗户看到他在床上睡觉，然后放火！'——这个细节留待 L6 击穿"
    - "Foster 电话（5030001）：Frank 很可能不是因为火灾被烧死，而是钝器击打致死——花了整整一天才有这个初步结论"
    - "法医鉴定报告实物（10601）在 L6 才能取得（需去医院见 Foster）"
    - "Mickey 拿走了 Frank 举报材料（10502）——棕色皮制公文包，两个铜扣；10502 已从玩家背包移除"
    - "疑点 10501 解锁：打火机在废墟完好、Tony 辨认上周还在 Vinnie 手里、Danny 目击壮汉当晚在现场——三方面共同指向 Vinnie 案发当晚在场"
    - "疑点 10502 解锁：Vinnie 的认罪说'是我放的火，Frank 是我杀的'——但 Frank 是被钝器打死的，他怎么能说自己是凶手？（L6 深化）"

# ─────────────────────────────
# 二、开篇（Frank 家小铁盒 + 二选一分支）
# ─────────────────────────────

opening:
  type: scripted_cutscene
  location: "Frank 家主屋开间（场景 10018）"
  scene_id: 10018
  description: |
    Zack 重访 Frank 家主屋——L3 来过这里拿牛奶签收单，但当时没注意到床和墙之间那道窄缝。
    Lula 在 L4 给的备用钥匙（10408）配的不是小铁盒，而是 Frank 藏在床后缝隙里的小铁盒。
    Zack 把床稍微挪开，伸手从缝隙里取出一个 15cm × 10cm 的铁皮小盒——
    上面有一把简易挂锁，钥匙 10408 正好对得上。
    内容：Frank 的举报材料（10502，演出件——Mickey 会拿走）和留给 Lula 的情书（10503，纯情感叙事载体，Lula 第一次捧读 Frank 八年积累的告白）。

    Lula 恳求 Zack 和 Mickey 帮她查清 Frank 死亡的真相。

    Mickey 拿走检举材料的视觉特写：棕色皮制公文包，两个铜扣——
    "这些材料我拿回去打官司。你也一起来，做我的二辩律师。"
    10502 从玩家背包移除（removed_from_inventory）。

  branch_point:
    type: choice
    save_lock: false  # 不锁存档，律师结局后可回选择点重选
    options:
      - id: choose_lawyer
        label: "当律师——回到法庭"
        result: lawyer_bad_ending
        note: "触发律师坏结局三幕过场，结束后回到本选择点"
      - id: choose_detective
        label: "继续当侦探——查清真相"
        result: main_path
        note: "进入主线，进入自由探索阶段"

  npcs:
    mickey_005:
      talk: mickey_005_frank_house
      is_liar: false
      motive: "拿走举报材料以律师身份打官司；邀请 Zack 入伙（表面善意，真身 Whale 的伏笔——Unit10 不暴雷）"
      mindset: "从容、笃定；对 Zack 表现出信任和拉拢；对小铁盒内容表现出'这正是我需要的'态度"

      # ── 1. NPC 已知信息 ──
      active_topics:
        - "Frank 举报材料的法律价值——'这就是 Frank 准备的，让他的死不白费'"
        - "邀请 Zack 做二辩律师——'你有调查经验，法庭上也用得上'"
        - "对 Margaret 状态的关心（Margaret 仍在昏迷治疗）——'你母亲需要你'"
        - "对 Vinnie、Leonard 等人的态度——'这些人会在法庭上受到应有的惩罚'"
      withheld_topics:
        - "Mickey 真身是 Whale——Unit10 内不暴雷"
        - "Mickey 拿走举报材料的真实目的（销毁或控制证据）——Unit11+ 揭示"
        - "Frank 被钝器打死的真实死因——Mickey 此时不知道（或假装不知道）"
        - "Leonard 才是真凶——L6 揭示"

      # ── 2. 玩家询问意图 ──
      player_inquiry:
        - '"你确定靠这些材料能打赢官司吗？" # 6'
        - '"这些材料能证明 Frank 是怎么死的吗？" # 7'
        - '"我现在更想查清 Frank 怎么死的" # 8'

      # ── 3. 可提取证词 ──
      testimony_ids:
        # Mickey 本 Loop 无指证用证词；他的行为是剧情演出，不进 TestimonyItem

    lula_002:
      talk: lula_002_frank_house
      is_liar: false
      motive: "恳求查清 Frank 之死；在小铁盒打开的那一刻，她能感受到 Frank 为她和为正义拼尽了一切"
      mindset: "悲痛中带着坚定；她不哭，但眼圈红了；她信任 Zack，也第一次面对 Frank 留给她的情书"

      # ── 1. NPC 已知信息 ──
      active_topics:
        - "小铁盒里的情书（10503）——Frank 在里面告诉了她什么（内容由对话作者编写，不在 state 中展开）"
        - "恳求 Zack 不要放弃——'他花了那么多时间收集这些，不是为了让它们被锁回去'"
        - "对 Mickey 的感谢——'没有你们，我什么都做不了'"
      withheld_topics:
        - "Frank 的死亡细节（Lula 不知道真正死因，只知道有火）"
        - "Leonard 是真凶（L6 揭示）"
        - "Vinnie 是纵火者（L5 Expose 揭示，此时 Lula 不知道）"

      # ── 2. 玩家询问意图 ──
      player_inquiry:
        - '"情书里 Frank 说了什么？" # 7'
        - '"你知道 Frank 在小铁盒里放了什么吗？" # 8'

      # ── 3. 可提取证词 ──
      testimony_ids:
        # Lula L5 开篇无新指证用证词

