expose: null  # 本Loop无指证，纯探索

# ═══════════════════════════════════════
# Loop 结束条件
# ═══════════════════════════════════════
#
# 由于没有指证环节，Loop结束条件改为：
# - 完成所有NPC对话（Vivian、Jimmy、Tommy）
# - 收集完关键证据/发现关键信息
# - 触发讯问阶段（Tommy揭示Webb勒索生意）
# - Vivian反锁房门事件触发

loop_end_condition:
  type: "exploration_complete"
  requirements:
    - "完成Vivian对话（触发遗产消息→反锁房门事件）"
    - "完成Jimmy对话（发现工资单和移民证明）"
    - "完成Tommy对话+讯问阶段（揭示勒索生意）"
    - "发现Tommy办公室的假账和假油画"
  trigger_event: "Vivian反锁房门——标志L2探索结束"
  next_loop_effect:
    - "L3开始时Vivian化妆室不可进入（门被反锁）"
    - "Tommy的弹壳被拿回，但玩家记住了这个细节"

# ═══════════════════════════════════════
# 疑点系统
# ═══════════════════════════════════════

doubts: []  # L2不新增疑点，信息积累阶段

# ═══════════════════════════════════════
# 设计备注
# ═══════════════════════════════════════
#
# 1. 本Loop是全剧唯一的纯探索Loop，无指证。
#    系统上：ChapterConfig.exposeNpcId 为空，EXPOSE按钮始终灰色。
#    Loop结束由"完成所有对话+关键事件触发"驱动。
#
# 2. 每个NPC承载的核心信息点（严格不超过3个）：
#    - Vivian: (1)自认为凶手 (2)对遗产消息的反应→暗示Webb对她的真实感情
#    - Jimmy: (1)经济困难 (2)移民身份问题→悲剧背景铺垫
#    - Tommy: (1)Webb的勒索生意 (2)子弹弹壳伏笔 (3)"惹上大人物"暗示
#
# 3. 关键伏笔：
#    - 子弹弹壳：L2被Tommy拿回 → L5 Tommy主动交出（因Zack帮了Vivian获得信任）
#    - 假油画：暗示Webb的勒索幌子，L3-4 进一步揭示
#    - Vivian反锁房门：系统门控，L3不可进入 → L4解锁
#    - Jimmy的"普通厨师"伪装：L3突发事件开始露出破绽
#
# 4. 讯问阶段揭示的信息对后续Loop的影响：
#    - "勒索执行人不是Tommy"→ 推动玩家在L3-5寻找真正的执行人
#    - "Webb惹上大人物"→ Whale的影子首次出现
#    - "Webb想转移财产跑路"→ 与Webb签合同保护Vivian的动机呼应
