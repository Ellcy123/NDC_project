# ============================================================
# Loop 2 — 酒吧的秘密 / The Speakeasy's Secret
# 本循环说谎者: 无（纯探索Loop）
# 核心揭示: Webb的酒吧是敲诈勒索帝国的前台；Webb沉迷Rita后停止勒索；Webb可能惹上了"大人物"
# 前序事件: L1中Zack部分击破Rosa对Vivian的指控，获得72小时调查权
# 时间: 获得调查权后的首次自由探索
# ============================================================

# ═══════════════════════════════════════
# 玩家视角（本循环）
# ═══════════════════════════════════════

player_context:
  goals:
    primary: "Vivian仍有嫌疑。我需要找到更多线索证明她的清白——或者找到真凶。"
    secondary:
      - "Webb的酒吧背后到底有什么秘密？"
      - "Vivian为什么心如死灰？她是否真的杀了Webb？"
      - "Jimmy和Tommy各自隐藏了什么？"
  known_facts:
    - "Webb在23:30枪声后被发现死亡"
    - "Rosa指认Vivian在23:30射杀Webb"
    - "Zack击破Rosa谎言1：Vivian的手枪无硝烟反应"
    - "Rosa谎言2（时间线层面）尚未反驳"
    - "Webb生前与Zack签署了保密侦探合同，给予酒吧调查权"
    - "Webb似乎预感到自己会被杀"
  new_directions:
    - direction: "Webb的勒索生意"
      trigger: "Tommy讯问中透露Webb的酒吧在做敲诈勒索生意，但勒索执行人不是Tommy"
    - direction: "Jimmy的经济困境"
      trigger: "Jimmy厨房发现工资单（极低薪水）和被撕毁的移民身份办理失败证明"
    - direction: "Webb惹上了大人物"
      trigger: "Tommy透露Webb自11月中旬沉迷Rita后就没做敲诈勒索了，认为Webb惹上了大人物想转移财产跑路"
    - direction: "Vivian自认为凶手"
      trigger: "Vivian表现出心如死灰的状态，似乎认为自己有罪"
    - direction: "可疑的子弹弹壳"
      trigger: "Tommy办公室抽屉里发现子弹弹壳，但被Tommy发现后拿回"
  post_loop_knowledge:  # 本Loop无指证，用post_loop_knowledge代替post_expose_knowledge
    - "Webb的蓝月亮酒吧是敲诈勒索帝国的前台"
    - "Webb的勒索执行人不是Tommy（那是谁？）"
    - "Webb自11月中旬沉迷Rita后停止了勒索活动"
    - "Tommy认为Webb惹上了大人物，想转移财产跑路"
    - "Jimmy经济极度困难，移民身份办理失败——暗示动机铺垫"
    - "Vivian心如死灰，似乎认为自己有罪——听到遗产消息后反锁房门"
    - "Tommy办公室有可疑子弹弹壳——但被Tommy拿回（伏笔）"
    - "歌舞厅的油画是假的——暗示Webb的'品位'是勒索幌子"

# ═══════════════════════════════════════
# PART 1: 开篇
# ═══════════════════════════════════════
#
# 场景状态表: 酒吧大门口 → 🎬开篇
# L1结束后，Zack获得72小时调查权，正式开始调查。
# 可选：Emma简要提醒调查方向。

opening:
  scene_id: 1201  # 酒吧大门口或大堂入口
  characters: [Zack, Emma]
  purpose: "L1结束后Zack获得调查权，正式开始自由探索酒吧。Emma提醒关注Vivian、厨房和Tommy办公室。"
  talk: null  # 简短过渡，可由系统处理或设计简短开篇对话

  emma:
    is_liar: false
    motive: "帮助Zack规划调查方向，提醒他关注酒吧内部的可疑人物"
    mindset: "积极主动——获得调查权是好的开始，但时间有限需要高效"

    knows:
      - "Zack获得了72小时调查权"
      - "Vivian仍是最大嫌疑人"
      - "酒吧内有多个值得调查的人物和区域"

    does_not_know:
      - "Webb的勒索生意"
      - "Jimmy的经济困境"
      - "Tommy的秘密"
      - "Vivian的真实心态"

    lie: null
    connoisseur: []

# ═══════════════════════════════════════
# PART 2: 自由探索
# ═══════════════════════════════════════
#
# 场景状态表 L2:
#   酒吧大门口(1201)       → 🎬开篇
#   Vivian化妆室(1202)     → 🔓探索 (环境叙事+对话)
#   Jimmy厨房(1203)        → 🔓探索 (证据+对话)
#   Tommy办公室(1204)      → 🔓探索 (证据+对话)
#   酒吧大堂(1210)         → 讯问阶段
#
# 本Loop核心：信息积累，无指证。
# 每个NPC承载2-3个核心信息点（不超标）。

scenes:
  # ── SC1201 酒吧大门口（开篇场景） ──
  - id: 1201
    name: "酒吧大门口"
    note: "开篇过渡场景"
    evidence: []

  # ── SC1202 Vivian化妆室 ──
  - id: 1202
    name: "Vivian化妆室"
    note: "Vivian禁足状态；心如死灰；听到遗产消息后反锁房门。L2结尾Vivian反锁房门→L3期间此场景不可进入"
    evidence:
      - id: 1201
        name: "Vivian的化妆桌物品"
        note: "环境叙事——化妆桌上散落的物品暗示Vivian的心理状态"
      - id: 1202
        name: "Webb给Vivian的信件/便条"
        note: "环境叙事——暗示Webb对Vivian的真实感情（保护而非利用）"
    npcs:
      vivian:
        talk: loop2_vivian
        is_liar: false  # Vivian不说谎，但隐藏了杀人计划
        motive: "心如死灰——被指控为凶手，同时内心确实有过杀意，认为自己'配得上'这个指控"
        mindset: "绝望且自我放弃——不反抗指控，认为一切都无所谓了"

        knows:
          - "自己曾计划杀Webb（但未实施）"
          - "Webb和Rita的关系让她崩溃"
          - "Webb原本承诺带她去巴黎"
          - "Webb的遗产安排（听到后沉默）"

        does_not_know:
          - "Rita是Whale的间谍，不是真正的情人"
          - "Webb取消巴黎是为了保护她"
          - "Jimmy才是真凶"
          - "Webb的勒索帝国的完整规模"

        lie: null  # 不主动说谎，但隐瞒了杀人计划
        connoisseur: []

        testimony_ids: []  # L2 Vivian无可提取证词

  # ── SC1203 Jimmy厨房 ──
  - id: 1203
    name: "Jimmy厨房"
    note: "Jimmy伪装成普通厨师；工资单暗示经济困境；移民证明暗示绝望"
    evidence:
      - id: 1203
        name: "Jimmy的工资单"
        note: "环境叙事——极低的薪水，暗示Jimmy的经济困境"
      - id: 1204
        name: "被撕毁的移民身份办理失败证明"
        note: "环境叙事——移民身份被拒，暗示Jimmy和Anna的绝望处境"
    npcs:
      jimmy:
        talk: loop2_jimmy
        is_liar: false  # 在L2不直接说谎，但隐瞒了真实身份
        motive: "维持'普通厨师'的表面身份，不引起怀疑"
        mindset: "紧张但伪装镇定——Webb死了，他必须保持低调"

        knows:
          - "自己是杀Webb的真凶"
          - "Whale指使他杀Webb"
          - "威胁纸条是自己写的"
          - "Anna怀孕了"
          - "自己的移民身份有问题"

        does_not_know:
          - "Zack已经击破Rosa的部分谎言"
          - "Zack怀疑的方向"
          - "Tommy知道子弹弹壳的事"

        lie:
          content: "我只是个厨师，什么都不知道"
          truth: "他是杀Webb的真凶，也是Webb勒索Whale的执行人"

        connoisseur: []

        testimony_ids: []  # L2 Jimmy无可提取证词

  # ── SC1204 Tommy办公室 ──
  - id: 1204
    name: "Tommy办公室"
    note: "假账暗示Webb收入异常；子弹弹壳伏笔（被Tommy拿回）；假油画暗示勒索幌子"
    evidence:
      - id: 1205
        name: "Tommy的假账本"
        note: "线索——收入异常，暗示酒吧有非法收入来源"
      - id: 1206
        name: "子弹弹壳"
        note: "伏笔——Tommy发现Zack看到后拿回。L5 Tommy主动交出同一弹壳"
        # 注意：此证据在L2被Tommy拿回，玩家无法持有
      - id: 1207
        name: "歌舞厅假油画"
        note: "线索——古董非真品，暗示Webb的'品位'是勒索幌子"
    npcs:
      tommy:
        talk: loop2_tommy
        is_liar: false  # Tommy在L2配合调查，但有所保留
        motive: "配合调查但保护自己——Tommy知道Webb的勒索生意，但不想暴露太多"
        mindset: "职业化的谨慎——用管理者语言回答问题，透露必要信息但控制边界"

        knows:
          - "Webb的酒吧是敲诈勒索帝国的前台"
          - "Webb的勒索执行人不是自己"
          - "Webb自11月中旬沉迷Rita后停止了勒索"
          - "Webb认为惹上了大人物，想转移财产跑路"
          - "子弹弹壳的来源可疑（但L2不透露）"

        does_not_know:
          - "Jimmy是Webb的勒索执行人（对Whale方向）"
          - "Jimmy是真凶"
          - "Whale的完整计划"
          - "Morrison被Whale收买"

        lie: null  # L2 Tommy不说谎，但有所保留
        connoisseur: []

        testimony_ids:
          - 1051001  # "Webb的酒吧在做敲诈勒索生意"
          - 1051002  # "勒索执行人不是我"
          - 1051003  # "Webb自11月沉迷Rita后就停了勒索，惹上了大人物想跑路"

  # ── SC1210 酒吧大堂（讯问阶段） ──
  - id: 1210
    name: "酒吧大堂"
    note: "讯问阶段——Tommy在此揭示Webb的勒索生意"
    evidence: []
    npcs:
      tommy_interrogation:
        talk: loop2_tommy_interrogation
        is_liar: false
        motive: "在正式讯问中提供关于Webb勒索生意的信息"
        mindset: "相对坦诚——在正式场合下透露更多细节"

        knows:
          - "Webb的勒索生意细节"
          - "勒索主要执行人不是Tommy"
          - "Webb沉迷Rita后的变化"

        does_not_know:
          - "真正的勒索执行人是谁"
          - "Jimmy的真实身份"

        lie: null
        connoisseur: []

        testimony_ids: []

