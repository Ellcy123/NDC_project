# ═══════════════════════════════════════
# PART 3: 指证（Expose）
# ═══════════════════════════════════════
#
# 场景状态表: 酒吧大堂(1303) → ⚔️指证（Rosa）
# 指证设计: 2-3 轮（"亲眼目击" → "时间不可能" → 假胜利）
# exposeNpcId: 103 (Rosa)
#
# 核心推理链:
#   Rosa 23:20 倒垃圾（证词 3031001）
#   → 垃圾袋下有玻璃碎片（1305）
#   → 碎片来自子弹穿窗（23:00-23:05）
#   → 碎片早于 23:20 就存在
#   → 杀人发生在 23:20 之前
#   → Rosa 声称的 23:30 目击不可能是案发时间
#   → Rosa 在说谎

expose:
  target: "Rosa (103)"
  total_rounds: 2
  testimony: 3031002  # "Vivian 在 23:30 进了会客室射杀了 Webb，我亲眼看见的"

  # ── 第一轮：戳破"23:30 亲眼目击" ──
  # 核心逻辑: 玻璃碎片 + Rosa 自己的证词 = 案发时间必须早于 23:20
  round_1:
    id: 1
    lie: "Vivian 在 23:30 进了会客室射杀了 Webb，我亲眼看见的"
    lie_source: "证词 3031002"
    usable_evidence:
      - id: 1305
        name: "垃圾袋下玻璃碎片"
        usage: "碎片来自会客室窗玻璃被子弹击碎——Rosa 23:20 倒垃圾时碎片已在地上，说明枪击在 23:20 之前就已发生"
      - id: 3031001
        name: "Rosa 的证词：23:20 倒垃圾"
        usage: "Rosa 自己承认 23:20 倒过垃圾——与碎片证据交叉验证，证明枪击时间早于 Rosa 所称的 23:30"
    result: |
      Zack 用 Rosa 自己的话反驳 Rosa：
      - 你说你 23:20 倒了垃圾，但垃圾袋下面压着会客室窗玻璃碎片
      - 碎片是子弹穿窗留下的——这意味着枪击在 23:20 之前就已经发生
      - 23:30 的目击根本不可能是真正的枪击时间
      Rosa 开始崩溃——她无法反驳自己的行动与物证的矛盾
      Rosa 升级防线："那……那不是我说谎，也许我记错时间了"

  # ── 第二轮：彻底击穿"可能记错时间" ──
  # 核心逻辑: 威胁纸条 = 有人提前告诉她要说什么时间，不是记错，是被迫
  round_2:
    id: 2
    lie: "也许我记错时间了……我那天太慌了"
    lie_source: "Rosa 对 Round 1 的退守"
    usable_evidence:
      - id: 1304
        name: "威胁纸条"
        usage: "纸条明确写着要求 Rosa 在 Morrison 面前说 Vivian 23:30 进会客室——这不是记错，是被人写好了台词"
    result: |
      威胁纸条彻底击穿"记错时间"的说法：
      - 有人提前写好了纸条，告诉你要说什么时间——这不是记忆错误，这是有人给你编造的谎言
      Rosa 彻底崩溃，哭泣承认：
      - 她收到威胁纸条，被迫在 Morrison 面前作伪证
      - 她实际上早于 Vivian 来到现场，发现了弹壳并藏起来（自保）
      - 她将弹壳交给 Zack，恳求他不要暴露自己
      - 她愿意修正在 Morrison 处的证言
      假胜利结果：Zack 得到弹壳——型号指向米勒集团，与 Vivian 的手枪型号不符

