<!DOCTYPE html>

<meta charset="UTF-8">
<title>Unit1 State Viewer — 案发夜</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--dim:#8b949e;--h:#f0f6fc;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff;--orange:#f0883e}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;color:var(--h);white-space:nowrap}
.tabs{display:flex;gap:4px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;background:transparent;color:var(--dim);border:1px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{background:#1c2128;color:var(--text)}
.tab.active{background:var(--blue)22;color:var(--blue);border-color:var(--blue)44}
.tab .liar{font-size:10px;color:var(--red);margin-left:4px}
.main{max-width:1100px;margin:0 auto;padding:24px}
.loop-title{font-size:22px;color:var(--h);margin-bottom:4px}
.loop-sub{color:var(--dim);font-size:13px;margin-bottom:20px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;margin-right:4px}
.b-liar{background:var(--red)22;color:var(--red)}
.b-expose{background:var(--orange)22;color:var(--orange)}
.b-explore{background:var(--green)22;color:var(--green)}
.b-cutscene{background:var(--purple)22;color:var(--purple)}
.b-evidence{background:var(--yellow)22;color:var(--yellow)}
.b-doubt{background:var(--blue)22;color:var(--blue)}
.section{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:16px;overflow:hidden}
.section-head{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;color:var(--h);cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none}
.section-head:hover{background:#1c2128}
.section-head .icon{font-size:16px}
.section-head .arrow{margin-left:auto;color:var(--dim);font-size:12px;transition:transform .2s}
.section-head.collapsed .arrow{transform:rotate(-90deg)}
.section-body{padding:16px}
.section-body.hidden{display:none}
.goal-primary{font-size:15px;color:var(--yellow);font-weight:500;margin-bottom:8px;padding:8px 12px;background:var(--yellow)0a;border-left:3px solid var(--yellow);border-radius:0 4px 4px 0}
.goal-secondary{color:var(--text);font-size:13px;padding-left:16px}
.goal-secondary li{margin-bottom:4px}
.fact-list{list-style:none;padding:0}
.fact-list li{padding:4px 0 4px 20px;position:relative;font-size:13px;color:var(--text)}
.fact-list li::before{content:"•";position:absolute;left:6px;color:var(--dim)}
.scene-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:10px}
.scene-card:last-child{margin-bottom:0}
.scene-id{font-size:11px;color:var(--dim);font-family:monospace}
.scene-name{font-size:14px;color:var(--h);font-weight:600;margin:2px 0}
.scene-note{font-size:12px;color:var(--dim);margin-bottom:8px}
.evidence-item{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--yellow)11;border:1px solid var(--yellow)33;border-radius:4px;font-size:12px;color:var(--yellow);margin:2px 4px 2px 0;cursor:default}
.evidence-item:hover .ev-tip{display:block}
.ev-tip{display:none;position:absolute;left:0;top:100%;background:var(--card);border:1px solid var(--border);padding:8px;border-radius:6px;font-size:12px;color:var(--text);width:320px;z-index:10;box-shadow:0 4px 12px #0005}
.evidence-item{position:relative}
.npc-block{background:#1c2128;border-radius:6px;padding:10px 12px;margin-top:8px}
.npc-name{font-size:13px;font-weight:600;color:var(--blue)}
.npc-name .liar-tag{color:var(--red);font-size:11px;margin-left:6px}
.npc-detail{font-size:12px;color:var(--dim);margin-top:4px}
.npc-detail b{color:var(--text);font-weight:500}
.expose-round{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:10px}
.round-num{font-size:12px;font-weight:700;color:var(--orange);margin-bottom:4px}
.lie-text{font-size:13px;color:var(--red);font-style:italic;margin-bottom:6px;padding:6px 10px;background:var(--red)08;border-radius:4px}
.result-text{font-size:12px;color:var(--text);white-space:pre-line;padding:6px 10px;background:var(--green)08;border-radius:4px;border-left:3px solid var(--green)}
.doubt-item{padding:8px 12px;border-left:3px solid var(--blue);margin-bottom:8px;background:var(--blue)08;border-radius:0 4px 4px 0}
.doubt-item.cleared{border-left-color:var(--green);background:var(--green)08}
.doubt-id{font-size:11px;color:var(--dim);font-family:monospace}
.doubt-text{font-size:13px;color:var(--h)}
.doubt-cond{font-size:11px;color:var(--dim);margin-top:2px}
.timeline{display:flex;gap:0;margin:20px 0;overflow-x:auto;padding-bottom:8px}
.tl-item{flex:1;min-width:140px;text-align:center;position:relative}
.tl-item::after{content:"";position:absolute;top:18px;left:50%;right:-50%;height:2px;background:var(--border)}
.tl-item:last-child::after{display:none}
.tl-dot{width:36px;height:36px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;position:relative;z-index:1}
.tl-item.active .tl-dot{box-shadow:0 0 0 3px var(--blue)44}
.tl-label{font-size:11px;color:var(--dim)}
.tl-title{font-size:12px;color:var(--h);font-weight:600}
.tl-liar{font-size:10px;color:var(--red)}
.knowledge-tag{display:inline-block;padding:2px 6px;background:var(--green)11;border:1px solid var(--green)33;border-radius:3px;font-size:11px;color:var(--green);margin:2px}
.val-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.val-item{padding:8px;background:var(--bg);border-radius:4px;border:1px solid var(--border)}
.val-label{font-size:11px;color:var(--dim)}
.val-status{font-size:12px;font-weight:600}
.val-pass{color:var(--green)}
.val-pending{color:var(--yellow)}
.val-na{color:var(--dim)}
.direction-item{padding:6px 10px;margin-bottom:6px;background:var(--purple)08;border-left:3px solid var(--purple);border-radius:0 4px 4px 0}
.dir-name{font-size:13px;color:var(--purple);font-weight:500}
.dir-trigger{font-size:12px;color:var(--dim);margin-top:2px}
.post-item{padding:4px 0;font-size:12px;color:var(--text);border-bottom:1px solid var(--border)44}
.post-item:last-child{border:none}
.testimony-item{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--purple)11;border:1px solid var(--purple)33;border-radius:4px;font-size:11px;color:var(--purple);margin:2px;font-family:monospace}
</style>
</head>

let current = 0;

function renderTabs(){
  const c = document.getElementById('tabs');
  c.innerHTML = loops.map((l,i)=>`<div class="tab ${i===current?'active':''}" onclick="switchLoop(${i})">L${l.id} ${l.title}${l.liar!=='无（纯探索）'?`<span class="liar">⚔${l.liar.split('(')[0].split('（')[0].trim()}</span>`:''}</div>`).join('');
}

function switchLoop(i){current=i;renderTabs();renderLoop();}

function renderLoop(){
  const l=loops[current];
  const m=document.getElementById('main');
  let h='';

  // Title
  h+=`<div class="loop-title">Loop ${l.id} — ${l.title}</div>`;
  h+=`<div class="loop-sub">${l.time} &nbsp;|&nbsp; <span class="badge b-liar">说谎者: ${l.liar}</span> <span class="badge b-expose">${l.type}</span></div>`;
  h+=`<div style="margin-bottom:16px;padding:10px 14px;background:var(--orange)0a;border:1px solid var(--orange)33;border-radius:6px;font-size:13px;color:var(--orange)">核心揭示: ${l.reveal}</div>`;

  // Player Context
  h+=sec('🎯','玩家视角',[
    `<div class="goal-primary">${l.goals.primary}</div>`,
    `<ul class="goal-secondary">${l.goals.secondary.map(s=>`<li>${s}</li>`).join('')}</ul>`,
    l.known_facts.length?`<div style="margin-top:12px"><b style="color:var(--dim);font-size:12px">已知事实 (${l.known_facts.length})</b><ul class="fact-list">${l.known_facts.map(f=>`<li>${f}</li>`).join('')}</ul></div>`:''
  ].join(''));

  // New Directions
  if(l.new_directions.length){
    h+=sec('🧭','新调查方向',l.new_directions.map(d=>`<div class="direction-item"><div class="dir-name">${d.name}</div><div class="dir-trigger">${d.trigger}</div></div>`).join(''));
  }

  // Opening
  h+=sec('🎬','开篇',l.opening.map(o=>`<div class="scene-card"><span class="badge b-cutscene">${o.type}</span> <span class="scene-id">${o.scene}</span><div style="font-size:13px;color:var(--text);margin-top:4px">${o.purpose}</div><div style="font-size:12px;color:var(--dim);margin-top:2px">角色: ${o.chars.join(', ')}</div></div>`).join(''));

  // Scenes
  if(l.scenes.length){
    h+=sec('🔍','自由探索场景',l.scenes.map(s=>{
      let sc=`<div class="scene-card"><span class="scene-id">${s.id}</span><div class="scene-name">${s.name}</div><div class="scene-note">${s.note}</div>`;
      if(s.evidence&&s.evidence.length) sc+=`<div>${s.evidence.map(e=>`<span class="evidence-item">📦 ${e.id} ${e.name}</span>`).join('')}</div>`;
      if(s.npcs&&s.npcs.length) sc+=`<div style="margin-top:4px">${s.npcs.map(n=>`<span class="badge b-explore">👤 ${n}</span>`).join('')}</div>`;
      sc+=`</div>`;
      return sc;
    }).join(''));
  } else {
    h+=sec('🔍','自由探索场景','<div style="color:var(--dim);font-size:13px">本Loop无自由探索场景</div>');
  }

  // Expose
  if(l.expose){
    let ex=`<div style="margin-bottom:12px"><span class="badge b-liar">目标: ${l.expose.target}</span> <span class="badge b-expose">${l.expose.rounds}轮</span> <span style="color:var(--dim);font-size:12px">${l.expose.mode}</span></div>`;
    ex+=l.expose.detail.map(r=>`<div class="expose-round"><div class="round-num">第${r.round}轮</div><div class="lie-text">"${r.lie}"</div><div style="margin:6px 0"><b style="font-size:11px;color:var(--yellow)">使用证据:</b> ${r.evidence.map(e=>`<span class="evidence-item" style="font-size:11px">📦 ${e}</span>`).join('')}</div><div class="result-text">${r.result}</div></div>`).join('');
    h+=sec('⚔️','指证 (Expose)',ex);
  } else {
    h+=sec('⚔️','指证 (Expose)','<div style="color:var(--dim);font-size:13px">本Loop无指证，纯探索</div>');
  }

  // Part7 (L4 only)
  if(l.part7){
    let p7=`<div style="color:var(--red);font-size:14px;font-weight:600;margin-bottom:8px">${l.part7.title}</div>`;
    p7+=`<ol style="padding-left:20px;font-size:13px">${l.part7.steps.map(s=>`<li style="margin-bottom:4px">${s}</li>`).join('')}</ol>`;
    p7+=`<div style="margin-top:12px;padding:8px 12px;background:var(--red)0a;border-radius:4px;border-left:3px solid var(--red)"><b style="color:var(--red);font-size:12px">后果:</b><ul style="padding-left:16px;font-size:12px;margin-top:4px">${l.part7.aftermath.map(a=>`<li>${a}</li>`).join('')}</ul></div>`;
    h+=sec('💥','Part7 情节转折',p7);
  }

  // Post Knowledge
  if(l.post_knowledge.length){
    h+=sec('📖','本轮结束后玩家获得的知识',`<div>${l.post_knowledge.map((p,i)=>`<div class="post-item">${i+1}. ${p}</div>`).join('')}</div>`);
  }

  // Evidence Summary
  h+=sec('📦','关键证据一览',`<div>${l.evidence.map(e=>`<span class="evidence-item">${e.id} ${e.name}</span>`).join('')}</div>`);

  // Doubts
  if(l.doubts.length){
    h+=sec('❓','疑点',l.doubts.map(d=>`<div class="doubt-item ${d.clear?'cleared':''}"><span class="doubt-id">#${d.id}</span> ${d.clear?'<span style="font-size:11px;color:var(--green)">✓ 已解决</span>':'<span style="font-size:11px;color:var(--yellow)">⏳ 遗留</span>'}<div class="doubt-text">${d.text}</div><div class="doubt-cond">解锁条件: ${d.cond}</div></div>`).join(''));
  } else {
    h+=sec('❓','疑点','<div style="color:var(--dim);font-size:13px">本Loop不新增疑点（信息积累阶段）</div>');
  }

  // Ending (L6 only)
  if(l.ending){
    h+=sec('🏁','结局',`<div style="font-size:14px;color:var(--h);margin-bottom:8px">${l.ending.scene}</div><div style="font-size:13px;margin-bottom:8px">${l.ending.moment}</div><div style="font-size:13px;color:var(--dim);font-style:italic">${l.ending.emotion}</div>`);
  }

  // Validation
  const vs=l.validation;
  h+=sec('✅','验证状态',`<div class="val-grid">${Object.entries(vs).map(([k,v])=>`<div class="val-item"><div class="val-label">${k}</div><div class="val-status ${v==='PASS'?'val-pass':v==='N/A'?'val-na':'val-pending'}">${v}</div></div>`).join('')}</div>`);

  m.innerHTML=h;
  document.querySelectorAll('.section-head').forEach(el=>{
    el.addEventListener('click',()=>{
      el.classList.toggle('collapsed');
      el.nextElementSibling.classList.toggle('hidden');
    });
  });
}

function sec(icon,title,body){
  return `<div class="section"><div class="section-head"><span class="icon">${icon}</span>${title}<span class="arrow">▼</span></div><div class="section-body">${body}</div></div>`;
}

renderTabs();
renderLoop();
</script>
