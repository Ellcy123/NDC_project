# ═══════════════════════════════════════
# PART 3: 指证（Expose）
# ═══════════════════════════════════════
#
# 场景状态表: 酒吧大堂 → ⚔️指证(Vivian)
# 指证设计: 3轮（"是我杀了Webb" → "巴黎梦碎是因为出轨" → "Don't be bothering me"伏笔）
# exposeNpcId: 106 (Vivian)

expose:
  target: "Vivian (106)"
  total_rounds: 3
  testimony: 1061001  # ⚠谎言——"是我杀了 Webb"

  # ── 第一轮：击破"是我杀了 Webb"——弹壳型号 ──
  # Rosa 给的弹壳(跨Loop，L3获得) → 型号与 Vivian 手枪不符
  round_1:
    id: 16
    lie: "是我杀了 Webb。我恨他，我应该为此付出代价。"
    lie_source: "证词 1061001（⚠谎言——Vivian 的自我认罪，基于罪恶感而非事实）"
    usable_evidence:
      - id: 1033001
        name: "Rosa 交出的弹壳（米勒集团型号，L3获得）"
        note: "关键——弹壳型号与 Vivian 的手枪不符；Vivian 的枪是标准左轮，米勒集团弹壳对应半自动手枪"
      - id: 1403
        name: "Vivian 的手枪"
        note: "关键——L1 确认无硝烟反应，型号可与弹壳比对，直接排除 Vivian 为射击者"
    result: |
      物证层面击破"是我杀了 Webb"：
      - 弹壳型号 + Vivian 手枪型号不匹配——这颗弹壳不可能从 Vivian 的枪里出来
      - Vivian 被迫承认她当晚没有真的开枪："我有那个计划……但我最后没有做"
      - 升级谎言：Vivian 转向情感层面——"Webb 和 Rita 出轨，毁了我们的梦。我有杀他的权利。"

  # ── 第二轮：击破"巴黎梦因出轨而碎"——Rita 是间谍 + Tommy 证词 ──
  # Rita 相关文件(1301，L3已获得) + Tommy 证词(1054001) → Webb 取消巴黎是为了保护 Vivian
  round_2:
    id: 17
    lie: "Webb 和 Rita 出轨，他抛弃了我们去巴黎的约定——这是他自己做出的选择。"
    lie_source: "证词 1061004（⚠偏见——Vivian 不知道 Rita 是间谍，误解了 Webb 的真实动机）"
    usable_evidence:
      - id: 1301
        name: "Rita 相关文件/照片"
        note: "关键——证明 Rita 是 Whale 派来监视 Webb 的间谍；'出轨'是 Whale 布置的烟幕弹"
      - id: 1054001
        name: "Tommy 证词：Webb 惹上大人物后什么都停了"
        note: "关键——Tommy 推断 Webb 取消巴黎之约是为了让 Vivian 跑路，而非因为 Rita"
    result: |
      情感层面击破"出轨"叙事：
      - Rita 是间谍，不是 Webb 自愿交往的女伴——Webb 是被安排进了陷阱
      - Tommy 的推断：Webb 想让 Vivian 带着遗产安全离开，而不是抛弃她
      - Vivian 开始动摇，沉默，但不肯接受："就算是这样……我当时不知道……"
      - 升级到 R3：Vivian 喃喃说起那晚的细节——"我去找过他……他喊我走……"

  # ── 第三轮：语言特征伏笔——不完全击破，引发新疑点 ──
  # Vivian 的证词 1061003 → 说话人有爱尔兰口音，Webb 没有
  round_3:
    id: 18
    lie: "那个声音叫我别打扰他——是 Webb 的声音，我确定。他就是不想见我。"
    lie_source: "证词 1061003（⚠偏见——Vivian 确信声音是 Webb 的，实际上她没有注意到口音的差异）"
    usable_evidence:
      - id: 1402
        name: "Vivian 的绝笔信"
        note: "场景道具——信中 Vivian 描述了那一刻；通过仔细阅读，她写到了'那句话'，引出对口音的回忆"
    result: |
      此轮不完全击破——而是引发新疑点：
      - Zack 引导 Vivian 回忆那个声音的细节："他说的是什么词？用什么口音？"
      - Vivian 缓缓意识到："Don't be bothering me"——这个表达……Webb 不这么说话
      - Webb 是标准美式英语，"Don't be bothering me" 是爱尔兰英语的习惯句式
      - 此轮结果：Vivian 自我认罪彻底瓦解，但真凶未被点名
      - 新疑点解锁：谁在模仿 Webb 的声音？说话人有爱尔兰口音（L5 解答：Jimmy）
      - Expose 结束后——Vivian 不再坚持认罪，Zack 决定去找 Morrison 说明情况

  post_expose:
    vivian_state: "彻底动摇——不再认罪，但对未来失去方向"
    new_doubt_unlocked:
      - id: 1401
        text: "那个声音有爱尔兰口音——Webb 没有。说话的人是谁？"
        unlock_condition: "expose_round_3_complete"
    zack_decision: "带弹壳去找 Morrison，告知 Vivian 无罪的事实"

# ═══════════════════════════════════════
# PART 4: Part7 情节转折（中点转折）
# ═══════════════════════════════════════
#
# 场景状态表: 酒吧大堂或走廊 → 🎬转折（Morrison 翻脸）
# 这是全剧的中点转折（midpoint reversal）——玩家以为赢了，却被权力碾压

part7_turning_point:
  scene: "酒吧大堂/Morrison 所在位置"
  trigger: "Expose 结束后，Zack 主动带弹壳去找 Morrison 汇报 Vivian 无罪"
  characters: [Zack, Morrison, Vivian, Emma]
  type: "🎬硬切剧情——不可交互"

  morrison_104:
    is_liar: true
    motive: "隐瞒自己与 Whale 的勾结——米勒集团型号的弹壳一旦被追查，就会暴露 Whale 的军火渠道和自己的背叛"
    mindset: "被逼到墙角的权力反扑——Morrison 认出弹壳来自米勒集团，立刻意识到必须扼杀这条线索"

    knows:
      - "米勒集团是 Whale 的军火供应方"
      - "自己因赌债被 Whale 收买"
      - "Whale 要处理掉 Webb 的调查，Zack 是潜在威胁"
      - "Vivian 有杀人动机（绝笔信），可以作为借口逮捕"
    does_not_know:
      - "Jimmy 是真凶（他只知道结果，不知道细节）"
      - "Zack 已经与 Rosa/Tommy 建立了信任"

    part7_sequence:
      - step: "Zack 出示弹壳（米勒集团型号），说明 Vivian 的手枪型号不符"
      - step: "Morrison 认出弹壳来源，脸色骤变"
      - step: "Morrison 当场撕毁 Zack 与 Webb 签署的合同（法律依据：作为案件负责警官，私人合同不具法律效力）"
      - step: "Morrison 没收弹壳——'这是案件证物，需要由警方保管'"
      - step: "Morrison 宣布：Vivian 有明确的杀人动机和预谋计划（绝笔信）"
      - step: "Morrison 指定 Vivian 的手枪为'真正的凶器'（无视型号矛盾）"
      - step: "Morrison 宣布逮捕 Vivian"

    aftermath:
      - "Zack 的合同被撕毁——调查权力归零"
      - "弹壳被没收——关键证据消失"
      - "Vivian 被捕——Zack 的'胜利'变成更大的失败"
      - "Emma 和 Zack 被迫离开——L5 开篇'灵魂黑夜'的起点"
      - "玩家目标重置：L5-6 需要重新获取等效证据（Tommy 同型号弹壳 + Jimmy 凶器）"

  design_note: |
    Morrison 撕毁合同的法律合理性：
    Webb 的保密侦探合同是私人协议，不具有法律授权效力。
    Morrison 作为案件负责警官，有权决定谁可以介入官方调查。
    他撕毁合同在法律程序上无可指摘——这是权力压制，不是违法行为（至少表面如此）。
    这种"权力合法地碾压正义"的设计是 Part7 情绪震撼的核心。

