    # ── L1 post_expose ──
    - "Vivian 的手枪在案发时没有硝烟反应——不可能刚刚开过枪"
    - "Rosa 指认 Vivian 在 23:30 射杀 Webb，但 Zack 成功击破了物证层面的谎言"
    - "Rosa 的时间线谎言（23:30 目击）在 L1 未被击破——留到 L3"
    - "Webb 的保密侦探合同证明他早就预感自己会被杀"
    # ── L2 post_expose ──
    - "Webb 的酒吧是敲诈勒索帝国的前台"
    - "Webb 的主要勒索执行人不是 Tommy"
    - "Tommy 认为 Webb 惹上了大人物，想转移财产跑路"
    - "Rita 相关信息暗示她不只是普通女伴"
    # ── L3 post_expose ──
    - "Rosa 承认伪证——她被人威胁，才指认了 Vivian"
    - "案发真实时间早于 23:20——玻璃碎片在 Rosa 倒垃圾前就已存在（Rosa 23:20 倒垃圾，垃圾袋压在玻璃碎片上方）"
    - "Rosa 在 Vivian 之前到达会客室现场，发现了一颗弹壳并藏了起来"
    - "Rosa 事后将弹壳交给 Zack——弹壳型号指向米勒集团，与 Vivian 的手枪型号不符"
    - "一楼走廊垃圾桶发现 Whale 与某人签订的合同——Whale 愿意出大笔钱让某人做件事"
    - "Jimmy 在厨房销毁了《芝加哥狂想曲》歌点单子"
  new_directions:
    - direction: "Vivian 真相"
      trigger: "弹壳型号与 Vivian 手枪不符——Vivian 的自我认罪开始出现矛盾，需要直面她"
    - direction: "Webb 保护 Vivian 的动机"
      trigger: "Webb 委托合同中要求 Zack 保证 Vivian 继承遗产——他为什么在意 Vivian 的安全？"
    - direction: "执行人是谁"
      trigger: "Whale 与某人签订了合同，但合同执行人不是 Vivian——那个人是谁？"
  post_expose_knowledge:
    - "Vivian 曾计划杀死 Webb（绝笔信为证），但实际上没有实施"
    - "Webb 之所以取消与 Vivian 的巴黎之约，不是因为 Rita——而是为了保护 Vivian 不被卷入 Whale 的危险"
    - "Rita 是 Whale 派来监视 Webb 的间谍"
    - "说'Don't be bothering me'的人有爱尔兰口音——而 Webb 没有爱尔兰口音（伏笔：真正说话的是 Jimmy）"
    - "Morrison 翻脸：拿走弹壳、撕毁合同、逮捕 Vivian——他不是中立执法者"

