# ═══════════════════════════════════════
# PART 3: 指证（Expose）—— 诱导式指证
# ═══════════════════════════════════════
#
# 场景: Jimmy 厨房(1511) / 或单独触发的特殊场景
# 指证模式: 非标准——Zack 和 Emma 使用变声器伪装成 Whale，诱导 Jimmy 交出凶器和录音证词
# 玩法: "全网公敌"式选项模式——玩家已确认 Jimmy 是真凶，通过选择正确的对话选项引导 Jimmy 上钩
# exposeNpcId: 107 (Jimmy)
#
# 触发条件: 收集全部以下线索后解锁
#   - 1502 Tommy 交出的弹壳（+ Tommy 证词 1055002）
#   - Jimmy 口音台词 1075002（"Don't be bothering me!"）
#   - 1503 英语练习书字迹比对
#   - 1504 Jimmy-Whale 合同
#   - 1506 变声器

expose:
  target: "Jimmy (107)"
  total_rounds: 2  # 诱导式：不是"击穿谎言"模式，而是"选项引导"模式
  is_liar: true
  player_inquiry: null  # Expose 对象，player_inquiry 为 null

  # ── 指证前提摘要 ──
  # Zack 和 Emma 在 Jimmy 家发现变声器。
  # 他们知道：Whale 通过这台设备与 Jimmy 联络。
  # 计划：用变声器伪装成 Whale，呼叫 Jimmy，诱导他"按计划"交出凶器和进行确认。
  # 玩家选择正确的选项，让 Jimmy 相信对方是 Whale，从而交出手枪和录音证词。

  inducement_system:
    mode: "全网公敌选项模式"
    description: "玩家已知 Jimmy 是真凶，通过正确的选项引导 Jimmy 上钩。错误选项会让 Jimmy 产生怀疑，失败需重来。"
    objective:
      - "获得真正的凶器手枪（米勒集团型号）"
      - "获得 Jimmy 承认与 Whale 关系的录音证词"
    failure_condition: "选项错误导致 Jimmy 怀疑，拨断通话，短暂逃跑机会出现"

  # ── 第一轮：建立身份，让 Jimmy 确信是 Whale ──
  round_1:
    id: 501
    lie: "Jimmy 的不在场证明——当晚一直在厨房工作，从未离开"
    lie_source: "证词 1075001"
    usable_evidence:
      - id: 1502
        name: "Tommy 交出的弹壳（米勒集团型号）"
        note: "关键——用途：弹壳型号与 Jimmy 的手枪匹配，Tommy 证实这是 Whale 的枪，佐证 Jimmy 使用了 Whale 提供的武器"
      - id: 1503
        name: "英语练习书字迹"
        note: "关键——用途：字迹与 Rosa 威胁纸条吻合，证明 Jimmy 写了纸条威胁 Rosa 作伪证"
      - id: 1504
        name: "Jimmy-Whale 合同"
        note: "关键——用途：证明 Jimmy 是执行人，和 Whale 有协议关系，Whale 会认得'自己的合作者'"
    result: |
      用变声器伪装 Whale，呼叫 Jimmy：
      - Zack/Emma（扮演 Whale）："Jimmy，是我。事情有变化，你手里的东西——枪，得转移了。"
      - Jimmy 警觉，问口令/确认词（预置在合同或通话协议中）
      - 玩家选择正确的确认信息（来自合同细节），Jimmy 放松警惕
      - Jimmy 承认："好，我明白。我把枪交给你的人。"
      - Jimmy 说出他的真实行动：承认自己"做了那件事"并用 Whale 的枪执行

  # ── 第二轮：取得凶器，获得录音证词 ──
  round_2:
    id: 502
