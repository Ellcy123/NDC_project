# ============================================================
# Loop 6 — 正义的重量
# 本循环说谎者: Morrison (104)
# 核心揭示: Morrison 是 Whale 操控的棋子，整个案件是 Whale 对 Webb 的反杀
# 前序事件: L5 用变声器伪装 Whale 诱导 Jimmy，Jimmy 交出凶器手枪和录音证词后自杀
#           自由探索（下）：Morrison 家搜证，获得皮箱+赌债记录+勾结文件
# 时间: 1925年，案发后续调查，最终收网
# ChapterConfig id: 106（待定）
#
# ── 案件真相全貌（至 L6 已还原） ──
# 23:00-23:05  Jimmy 在 Webb 会客室枪杀 Webb（音乐高潮掩盖枪声）
# ~23:05       Jimmy 锁门后模仿 Webb 口音骗走 Vivian："Don't be bothering me!"
# 23:05-23:20  Jimmy 返回地下室厨房制造不在场证明
# 23:20        Rosa 外出倒垃圾，垃圾袋压住已存在的玻璃碎片
# 23:30        Jimmy 从二楼向外空射一枪伪造假枪声
# 23:30        Vivian 听到枪声，返回会客室，发现 Webb 已死
# 23:30后      Morrison 带人冲入，宣布 Webb 死亡
# 23:30后      Rosa 被 Jimmy 纸条胁迫，指认 Vivian 射杀 Webb
# ============================================================

# ═══════════════════════════════════════
# 玩家视角（本循环）
# ═══════════════════════════════════════

player_context:
  goals:
    primary: "Jimmy 已死，真相在手——如何当着 Morrison 同僚的面，让他无法再用权力压制？"
    secondary:
      - "Morrison 与 Whale 究竟有多深的勾结？证据是否足够当众揭露？"
      - "Morrison 案发前就带着装备来现场——这是失误还是预谋？"
      - "指证成功后，Vivian 能获释吗？Webb 的保险箱里究竟藏着什么？"
  known_facts:
    # ── L1 post_expose ──
    - "Vivian 的手枪在案发当晚未被使用（无硝烟、弹匣完整）"
    - "Rosa 谎言1（手枪物证层面）已被击破，Rosa 谎言2（23:30 时间线目击）暂时无法推翻"
    - "Zack 凭协议书获得了 Morrison 的 72 小时调查许可"
    # ── L2 post_expose ──
    - "Webb 的酒吧是敲诈勒索帝国的前台，主要执行人不是 Tommy"
    - "Tommy 说 Webb 自 11 月中旬惹上了大人物，想转移财产跑路"
    # ── L3 post_expose ──
    - "Rosa 是被 Jimmy 以威胁纸条胁迫作伪证（'指认 Vivian，否则杀你女儿'）"
    - "23:20 Rosa 倒垃圾时，垃圾袋下的玻璃碎片证明杀人发生在 23:20 之前"
    - "弹壳指向米勒集团（Whale 的军火来源），与 Vivian 手枪型号不符"
    - "Rita 是 Whale 派来监视 Webb 的间谍"
    - "Whale-某人合同：Whale 出大价钱雇人做事"
    # ── L4 post_expose ──
    - "Vivian 有杀人计划（绝笔信、备有手枪）但未实施"
    - "Webb 取消与 Vivian 去巴黎的行程是为了保护她，不是因为 Rita"
    - "23:05 在会客室门口喊 'Don't be bothering me!' 的人有爱尔兰口音，Webb 没有爱尔兰口音"
    - "Morrison 见到米勒集团弹壳后脸色大变，撕毁合同、没收证据、逮捕 Vivian"
    # ── L5 post_expose ──
    - "Jimmy 是 Webb 枪杀案的真凶；真实死亡时间是 23:00-23:05，23:30 枪声是伪造的"
    - "Jimmy 接受了 Whale 的交易，杀 Webb 是向 Whale 的'投名状'，报酬是妻儿的合法身份"
    - "Jimmy 模仿 Webb 口音是 '23:05 会客室门口那个声音' 的完整解释"
    - "凶器手枪（来自 L5，Jimmy 交出）已在 Zack 手中"
    - "Jimmy 承认与 Whale 关系的录音证词（来自 L5）已在 Zack 手中"
    - "Morrison 家皮箱压痕与犯罪现场压痕吻合——Morrison 案发前就带着装备"
    - "Morrison 赌债记录——Morrison 的经济弱点，被 Whale 利用的原因"
    - "Morrison-Whale 勾结文件——直接证明 Morrison 是 Whale 的人"
  new_directions:
    - direction: "公开指证——警察局同僚在场"
      trigger: "Morrison 手握权力、曾撕毁合同没收证据；在警察局当着他同僚的面出示证据，让他无法再私下压制"
    - direction: "预谋证明——皮箱谜题"
      trigger: "L5 犯罪现场压痕(1531) + Morrison 家皮箱(1601) → 比对吻合 → Morrison 案发前就带着装备到场，不是临时接警失误"
    - direction: "Whale 操控链条"
      trigger: "Jimmy 录音(跨L5) + Morrison-Whale 勾结文件(1603) → 完整揭露 Whale 指使 Jimmy 动手、Morrison 配合栽赃的双线操控"
  post_expose_knowledge:
    - "Morrison 是 Whale 收买的腐败警察，负责在案发后栽赃和压制调查"
    - "整个案件是 Whale 对 Webb 的反杀：Whale 出资 → Jimmy 动手 → Morrison 配合 → Vivian 被嫁祸"
    - "Morrison 当众被认定警官失职，Vivian 当场获释"
    - "Vivian 打开 Webb 的保险箱，取出 Webb 偷听到的'南区计划'——交给 Zack"
    - "南区计划是 Unit1 → Unit2 的关键线索"

