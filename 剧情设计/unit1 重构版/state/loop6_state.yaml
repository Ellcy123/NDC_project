  characters: [Zack, Emma]
  purpose: "Zack 和 Emma 带着 L5 获得的凶器手枪和 Jimmy 录音，来到 Morrison 家进行最后的证据收集。Emma 梳理当前证据清单，确认缺失的预谋证据需要在此获得。"
  note: "本段为过渡性开篇对话，非完整硬切剧情。对话结束即进入 Morrison 家自由搜证。"

  emma_102:
