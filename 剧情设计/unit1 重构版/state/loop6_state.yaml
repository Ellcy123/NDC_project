      - "凶器手枪（L5 获得）和 Jimmy 录音已足够证明 Vivian 无罪和真凶是 Jimmy"
      - "但 Morrison 会辩称'临时接警失误'——需要预谋证据"
      - "L5 发现的犯罪现场皮箱压痕，Morrison 家里应该有对应的箱子"
      - "Morrison 的赌债和 Whale 的勾结文件能让他彻底无法辩解"
    withheld_topics:
      - "Morrison-Whale 具体勾结内容（尚未找到文件）"
      - "南区计划的内容（L6 结局才揭晓）"

    lie: null
    connoisseur: []

    testimony_ids: []

