    player_inquiry: '"凶器手枪和 Jimmy 录音证词" # 8'
    motive: "整理当前所有证据，分析指证 Morrison 还缺少什么"
    mindset: "冷静而沉重——Jimmy 的自杀带来的心理重量，但任务必须完成"

    # 知识池见 npc_knowledge_pools.yaml → emma
