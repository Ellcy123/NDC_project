scenes:
  # ── SC1601 Morrison 家（🔓搜证，L6 新地图） ──
  - id: SC1601
    name: "Morrison 家"
    note: "🔓搜证——L6 新地图。Morrison 不在家（在警察局），Zack 持合法搜证许可（由 Rosa 修正证词后重新取得）进入。"
    evidence:
      - id: 1601
        name: "Morrison 的皮箱"
        note: "关键——与犯罪现场压痕（L5证据）比对吻合，证明 Morrison 案发前就将装备带至现场（Expose R2 关键）"
        cross_ref: "与 L5 犯罪现场压痕证据合成/比对 → 解锁疑点 1601"

      - id: 1602
        name: "Morrison 赌债记录"
        note: "场景道具——Morrison 欠下巨额赌债，是被 Whale 利用的弱点。辅助 Expose R3 的背景动机。"

      - id: 1603
        name: "Morrison-Whale 勾结文件"
        note: "关键——直接书面证明 Morrison 与 Whale 存在指使关系（Expose R3 核心证据）"

      - id: 1604
        name: "针对 Vivian 的逮捕草稿"
        note: "关键——Morrison 皮箱中发现的打字机文书草稿；含案发前日期和 Vivian 全名；证明 Morrison 在 Webb 死亡之前就预写好了逮捕依据（Expose R2 补强证据）。文字必须含案发前日期或具体指控，不能是空白模板，否则 Morrison 可辩解'例行准备'。"
        cross_ref: "与 1601（皮箱）+ 1531（现场压痕）共同用于 Expose R2，证明预谋性"

  # ── SC1602 警察局（⚔️指证 Morrison，L6 新场景） ──
  - id: SC1602
    name: "警察局"
    note: "⚔️指证 Morrison——L6 新场景。Morrison 在工作，同僚在场。'当着同僚面'是关键设计——公开性让 Morrison 无法再用权力压制。"
    npcs:
      morrison_104:
        talk: loop6_morrison_expose
        is_liar: true
        player_inquiry: null  # 指证对象不设 player_inquiry

        motive: "维护自己的警察身份和权威——承认任何一点都会导致职务丢失，甚至刑事追责"
        mindset: "外强中干——在同僚面前必须保持强硬姿态，但内心清楚证据越来越多，防线随时会崩"

        # 知识池见 npc_knowledge_pools.yaml → morrison
        active_topics:
          - "主动声称 Vivian 是案件唯一嫌疑人，证据确凿"
          - "面对凶器手枪出现时，声称是'临时接警，搜查失误'"
          - "被追问预谋时，声称'我只是依照程序办事'"
        withheld_topics:
          - "与 Whale 的完整勾结细节（被迫沉默）"
          - "赌债具体金额和来源（不主动提及）"
          - "知道 Jimmy 是真凶（从一开始就知道）"

        lie:
          content: "我是临时接到报警赶到现场的，Vivian 的手枪就是凶器，我依据现场证据依法行事。"
          truth: "Morrison 早已收受 Whale 的贿赂，与 Jimmy 是 Whale 安排的'双线棋子'；他带着皮箱工具提前准备好了栽赃流程"

        connoisseur: []

        testimony_ids:
          - 1041001  # ⚠谎言: "我是临时接警，到现场时 Webb 已死，Vivian 在场，依据目击者证词（Rosa）我有充分理由逮捕她"
          - 1041002  # ⚠谎言: "搜查中发现的凶器就是 Vivian 的手枪，任何说法都是马后炮"

  # ── SC1008 Webb 办公室（🎬结尾，已解锁场景复用） ──
  - id: SC1008
    name: "Webb 办公室（结尾）"
    note: "🎬结尾——Vivian 获释后，Zack 和 Vivian 返回 Webb 办公室，Vivian 打开保险箱，取出'南区计划'。"
    npcs:
      vivian_106_ending:
        talk: loop6_vivian_ending
        is_liar: false
        player_inquiry: '"Webb 保险箱里的秘密" # 9'
        motive: "实现对 Zack 的承诺——在案件查清、自己获释后，将 Webb 保管的秘密交出去"
        mindset: "疲惫而释然——经历了一切之后，终于能做一件有意义的事"

        active_topics:
          - "Webb 告诉过她保险箱的位置和密码，托付她在他出事后处理"
