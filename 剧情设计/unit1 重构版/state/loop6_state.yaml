# ═══════════════════════════════════════
# 跨循环证据（Expose 中使用）
# ═══════════════════════════════════════
#
# From L5 指证场景: 凶器手枪（L5 Jimmy 交出，ID 待定为 1501）
# From L5 指证场景: Jimmy-Whale 录音证词（L5 Jimmy 交出，ID 待定为 1502）
# From L5 搜证（犯罪现场）: 犯罪现场皮箱压痕（ID 待定为 1531）
# L6 Morrison 家: 皮箱(1601)、赌债记录(1602)、勾结文件(1603)

# ═══════════════════════════════════════
# PART 3: 指证（Expose）
# ═══════════════════════════════════════
#
# 场景: 警察局 (SC1602) → ⚔️指证 Morrison，三阶段
# 背景: Zack 当着 Morrison 同僚的面出示证据，逐步击破 Morrison 的三道防线
#       Morrison 无法私下压制——公开性是本场指证的核心设计
# exposeNpcId: 104 (Morrison)

expose:
  target: "Morrison (104)"
  total_rounds: 3
  testimony: 1041001  # ⚠谎言: "临时接警依法行事，Vivian 是合法逮捕"

  # ── 第一阶段：Vivian 无罪，真凶是 Jimmy ──
  # 凶器手枪（L5 获得）→ 证明真正的凶器是 Jimmy 使用的手枪，不是 Vivian 的
  round_1:
    id: 61
    lie: "我是临时接到报警赶到现场的，Vivian 的手枪就是凶器，我依据现场证据依法行事"
    lie_source: "证词 1041001 + 证词 1041002"
    usable_evidence:
      - id: 1501  # 跨循环：L5 获得
        name: "凶器手枪（Jimmy 交出）"
        note: "关键——Jimmy 在 L5 指证中亲手交出的真正凶器；米勒集团型号，与 Vivian 手枪型号不符"
        用途: "这才是真正的凶器——Jimmy 亲口承认并亲手交出。Vivian 的手枪（无硝烟、弹匣完整）从未开过枪。"
    result: |
      Vivian 无罪在物证层面确立：
      - 真正的凶器是 Jimmy 使用的手枪（米勒集团型号），而非 Vivian 的手枪
      - Vivian 的手枪弹匣完整、无硝烟——案发当晚从未使用过（L1 已部分证明，此处完整确认）
      - 在同僚面前，Morrison 无法再宣称"Vivian 的手枪是凶器"
      - Morrison 被迫后退一步："也许我当时搜查出现了失误……但这只是程序问题，案件还需要重新调查。Vivian 在此期间仍应羁押。"
      → 阶段升级：Morrison 承认"失误"但不肯放人——Zack 的下一步是证明这不是失误，而是预谋

  # ── 第二阶段：Morrison 并非临时接警，早有预谋 ──
  # Morrison 皮箱（1601）+ 犯罪现场压痕（L5 获得）+ 逮捕草稿（1602）→ 三重证据证明预谋
  # 注意：逮捕草稿必须含案发前日期或 Vivian 具体指控内容，不能是空白模板
  # （空白模板 Morrison 可辩解"例行准备"；有姓名+日期则无从辩解）
  round_2:
    id: 62
    lie: "我只是临时接到报警赶到现场，任何搜查上的出入都是当时情况紧急导致的失误"
    lie_source: "Morrison 现场辩解（延续 R1 结果）"
    usable_evidence:
      - id: 1601
        name: "Morrison 的皮箱"
        note: "关键——Morrison 家中的皮箱，与犯罪现场留下的压痕完全吻合"
        用途: "犯罪现场的压痕（L5获得）与 Morrison 家皮箱完全匹配——Morrison 案发前就将这个箱子带到了现场，这不是临时接警，这是预谋布局。"
      - id: 1531  # 跨循环：L5 获得
        name: "犯罪现场皮箱压痕"
        note: "跨循环证据——L5 在犯罪现场搜证时发现的压痕，此处与 1601 比对"
        用途: "现场压痕与 Morrison 皮箱吻合——物证交叉验证预谋成立"
      - id: 1604
        name: "针对 Vivian 的逮捕草稿"
        note: "关键——Morrison 家皮箱中发现的文书草稿；打字机打出，含案发前日期和 Vivian 全名；证明 Morrison 在 Webb 死亡之前已预写好逮捕依据，不可能是临时决定。对话草稿阶段注意：草稿文字必须包含案发前日期或针对 Vivian 的具体指控，不能是空白模板（否则 Morrison 有'例行准备'的辩解空间）。"
        用途: "这份草稿在案发之前就已经写好——Morrison 知道 Webb 会死，知道 Vivian 会成为嫌疑人，他是提前准备好了一切来配合这场谋杀。"
    result: |
      Morrison 预谋证明：
      - 犯罪现场的皮箱压痕与 Morrison 的皮箱完全吻合
      - Morrison 在案发前就将装备带至现场——这不是"临时接警"，这是事先准备好的栽赃布局
      - 同僚们开始交头接耳，Morrison 的脸色变了
      - Morrison 支吾道："我……我那个箱子是……"——无法给出合理解释
      → 阶段升级：Morrison 被证明预谋，但仍试图保住最后一道防线：他只是独立作案，与任何更大势力无关

  # ── 第三阶段：Morrison 与 Whale 勾结，Whale 是幕后黑手 ──
  # Jimmy 录音证词（L5 获得）+ Morrison-Whale 勾结文件（1603）→ 双重证据揭露完整操控链
  round_3:
    id: 63
    lie: "就算我提前准备了什么，那也是我个人的判断，和其他任何人没有关系"
    lie_source: "Morrison 现场辩解（延续 R2 结果）"
    usable_evidence:
      - id: 1502  # 跨循环：L5 获得
        name: "Jimmy 承认与 Whale 关系的录音证词"
        note: "关键——Jimmy 亲口承认 Whale 指使他杀 Webb，作为'投名状'换取妻儿合法身份"
        用途: "Jimmy 的录音说明了他是谁指使的——Whale。那么 Morrison，你是以什么身份出现在现场？"
      - id: 1603
        name: "Morrison-Whale 勾结文件"
        note: "关键——书面证明 Morrison 接受了 Whale 的指示，配合 Jimmy 完成案件的收尾与栽赃"
        用途: "这份文件证明 Morrison 不是独立作案——他是 Whale 操控的另一颗棋子，负责确认 Jimmy 完成任务并将嫌疑转移到 Vivian 身上。"
    result: |
