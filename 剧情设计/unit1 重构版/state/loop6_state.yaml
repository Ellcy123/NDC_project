          - "Webb 让 Zack 保护自己，是因为他知道这份文件一旦曝光，Vivian 也会成为目标"
        withheld_topics:
          - "南区计划的具体内容（超出她的了解范围）"
          - "Whale 的后续动向"

        lie: null
