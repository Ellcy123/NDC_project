# ============================================================
# Loop 6 — 正义的重量 / The Weight of Justice
# 本循环说谎者: Morrison (104)，3 阶段指证
# 核心揭示: Morrison 因赌债被 Whale 操控、被迫配合结案；整个案件是 Whale 对 Webb 的反杀；
#           Vivian 获释；保险箱开启；南区计划浮出水面——引出 Unit2
# 前序事件: L5 Jimmy 被指证为真凶，枪杀 Webb 后自杀；凶器手枪(1506)入库
# ChapterConfig exposeNpcId: 104 (Morrison)
# ============================================================

# ═══════════════════════════════════════
# 玩家视角（本循环）
# ═══════════════════════════════════════

player_context:
  goals:
    primary: "Morrison 在这件事里扮演了什么角色？他是无能，还是故意包庇？"
    secondary:
      - "Morrison 和 Whale 之间究竟是什么关系？"
      - "能否凭手中的证据当着同僚的面逼 Morrison 认罪？"
      - "Vivian 能被释放吗？"
      - "Webb 保险箱里藏着什么——南区计划是什么？"
  known_facts:
    # ── L1 post_expose_knowledge 累积 ──
    - "Webb 在宴会上被枪杀"
    - "Rosa 指认 Vivian 是凶手（声称 23:30 目击 Vivian 射杀 Webb）"
    - "Vivian 的手枪（.25 ACP）无硝烟反应——物证不支持 Rosa 指控"
    - "Rosa 谎言2（23:30 只有 Vivian 在里面）在 L1 暂时无法反驳"
    - "保密侦探协议书(1101)：Zack 受 Webb 委托保护 Vivian + 财产继承条款"
    - "Vivian 自认有罪，被 Morrison 禁足化妆室"
    - "Zack 凭协议书获得 Morrison 的 72 小时调查权"
    - "Webb 似乎预感到自己会死——主动雇用 Zack 是最后的保障安排"
    # ── L2 post_expose_knowledge 累积 ──
    - "Webb 月收入 $15,000，酒吧净利润仅 $4,000——$11,000 差额来自敲诈勒索（酒吧是勒索帝国前台）"
    - "Tommy 是曾经的执行人，但表示自己已不再参与"
    - "Webb 自 11 月中旬沉迷 Rita 后停止勒索活动，Tommy 认为他惹上了大人物想转移财产跑路"
    - "Rita 是 Whale 的间谍（Tommy 在 L2 暗示，L3 进一步确认）"
    - "Jimmy 经济极度困难（薪水微薄、移民身份办理失败）——动机铺垫"
    - "Vivian 禁足，心如死灰，听到遗产消息后反锁化妆室"
    - "Tommy 办公室出现过可疑弹壳，被 Tommy 发现后拿回（伏笔）"
    # ── L3 post_expose_knowledge 累积 ──
    - "真正的枪击发生在 23:20 之前——玻璃碎片在垃圾袋下，碎片早于 Rosa 23:20 倒垃圾时已存在"
    - "Rosa 被人威胁伪证：威胁纸条要挟她女儿高额医疗费，被迫指认 Vivian"
    - "真凶使用 .45 ACP（与 Vivian 的 .25 ACP 型号不符）"
    - "Rosa 指证后交出一颗 .45 弹壳（ID 1403，L4 正式入库使用）"
    - "大家都知道 Vivian 每晚给 Webb 送酒——有人刻意利用这个规律嫁祸 Vivian"
    - "有人与 Whale 签订合同(1301)，内容涉及大额酬劳——Whale 在幕后操纵"
    - "Jimmy 在销毁歌点单子（可疑行为，L5 揭晓单子记录了真实枪击时间）"
    - "Rosa 恳求 Zack 不要暴露她——她的伪证是被迫的，不是主动的"
    # ── L4 post_expose_knowledge 累积 ──
    - "Vivian 不是凶手（但曾有杀意）——弹壳(1403, .45)与她的手枪(.25)型号不符，物证排除嫌疑"
    - "Whale 是 Webb 的仇家——被撕毁合同(1301)显示 Whale 雇人对付 Webb"
    - "Vivian 在 23:10 去找 Webb，被人用爱尔兰口音喊'Don't be bothering me!'赶走（证词 4061003）"
    - "Webb 取消巴黎之行是为了保护 Vivian，并非因 Rita 抛弃她——保险箱密码是 Webb 与 Vivian 的相遇日"
    - "Morrison 看见 .45 弹壳后脸色大变，随即没收弹壳(1403)、撕毁合同(1101)、宣布 Vivian 有罪并逮捕"
    - "Morrison 在刻意阻碍真相——他认出了弹壳背后的势力关联"
    # ── L5 post_expose_knowledge 累积 ──
    - "Jimmy 是真凶：23:00-23:05 趁《芝加哥狂想曲》高潮掩盖枪声，在 Webb 会客室枪杀 Webb"
    - "Jimmy 模仿 Webb 的爱尔兰口音喊'Don't be bothering me!'骗走 23:10 来访的 Vivian"
    - "23:30 Jimmy 从二楼空射一枪制造虚假死亡时间，诱使 Vivian 返回发现尸体"
    - "Jimmy 被 Whale 操控，以签订合同(1301)的方式受雇杀 Webb"
    - "Jimmy 字迹与威胁纸条(1303)和合同(1301)高度一致——练习书(1504)是关键证据"
    - "Jimmy 为保护怀孕的妻子 Anna 不受 Whale 报复，在被指证后开枪自杀"
    - "凶器手枪(1506)——米勒集团特制型——在 cutscene 后入库"
    - "Tommy 主动交出久远弹壳(1501)，证实这是 Whale（米勒集团）的专用弹药型号"
  new_directions:
    - direction: "Morrison 与 Whale 的金钱关联"
      trigger: "Whale 打来 Morrison 家电话，引出对 Morrison 家的搜证"
    - direction: "Morrison 家中的秘密文件"
      trigger: "Morrison 家搜证发现赌债欠条(1601)和借款证据(1602)——揭示 Whale 的经济控制"
    - direction: "当众指证——以当场击破结案"
      trigger: "积累足够证据后，Zack 选择在警察局当着 Morrison 同僚的面进行最终指证"
  post_expose_knowledge:
    # ── Unit1 最终总结——Vivian 获释，南区计划浮出 ──
    - "Morrison 因欠下 Whale（疤面熊星集团）$5,000 赌债，又向 Whale 借钱还债，被彻底经济控制"
    - "Morrison 被 Whale 授意：压下弹壳证据、结案归罪 Vivian、保护 Jimmy 的不在场证明"
    - "Morrison 并非主谋，而是 Whale 的棋子——整个案件是 Whale 对 Webb 的有组织反杀"
    - "Morrison 当众被同僚认定失职（涉嫌包庇+伪证），被停职接受调查"
    - "Vivian 无罪释放——Webb 的遗产依据协议书(1101)保全"
    - "保险箱密码是 Webb 与 Vivian 相遇日——打开后发现'南区计划'文件"
    - "南区计划揭示 Whale 在芝加哥南区的更大图谋——Unit2 调查起点"

# ═══════════════════════════════════════
# PART 1: 开篇（Whale 电话 + Emma 对话）
# ═══════════════════════════════════════
#
# 场景状态表 L6:
#   ⚡ 突发事件: Whale 打来 Morrison 家电话——"证明正义是否存在"
#   Morrison 家(1112)   → 🔓搜证（赌债欠条、借钱证据）
#   警察局(1113)        → ⚔️指证（Morrison 3 阶段）
#   结局场景(1114)      → 🎬结尾（释放 Vivian；打开保险箱；南区计划）
#
# L6 无标准 Opening 对话场景；以 Whale 电话事件切入，随后进入 Morrison 家搜证。
# Emma 在此作简短的"最后叮嘱"对话，交代调查目标。

opening:
  scene_id: null  # 无场景 ID——以事件驱动（⚡ 突发电话）切入
  characters: [Zack, Emma]
  purpose: "Whale 的电话触发 L6——暗示 Morrison 是棋子。Emma 和 Zack 梳理调查路径，锁定 Morrison 家搜证 + 警察局指证"
  talk: emma_106

  # ── ⚡ 突发事件：Whale 的电话 ──
  event:
    name: "Whale 的电话"
    trigger: "L5 结束后，Zack 收到消息——Whale 致电 Morrison 家"
    type: "突发（⚡）"
    description: |
      Whale 打来 Morrison 家的电话，留下一句话：
      "I just want to know if justice still exists in this city."
      这句话成为 L6 的主题——Zack 意识到 Whale 在玩弄棋局，而 Morrison 是被利用的棋子。
      Zack 赶往 Morrison 家搜证，随后前往警察局作最终指证。
    purpose: "触发 L6 调查方向；点明主题'正义的重量'；Morrison 家搜证的叙事理由"

  emma_106:
    is_liar: false
    motive: "帮 Zack 梳理最后一步——所有证据指向 Morrison 与 Whale 的关联，必须在 Morrison 同僚面前完成最终指证"
    mindset: "沉稳而凝重——Jimmy 的死让两人都沉默了一段时间；Whale 的电话像一记警钟，事情还没结束"

    knows:
      - "Jimmy 是真凶，已自杀身亡；凶器手枪(1506)入库"
      - "Morrison 在 L4 强行没收弹壳(1403)，阻碍了真相——他一定有苦衷或动机"
      - "Whale 打来 Morrison 家电话——Morrison 家可能有 Whale 控制他的证据"
      - "凭手中的证据（弹壳 1501、凶器 1506、回信 1503）可以在公开场合指证 Morrison"
      - "Vivian 还被关押着，必须尽快完成指证让她获释"
    does_not_know:
      - "Morrison 家中的具体证据内容（赌债欠条、借款证明）"
      - "南区计划的详细内容"
      - "保险箱里究竟放了什么"

    lie: null

    # ── 4. 鉴赏力 ──
    connoisseur: []  # Unit1 无鉴赏力系统

# ═══════════════════════════════════════
# PART 2: 自由探索（搜证）
# ═══════════════════════════════════════
#
# 场景状态表 L6 搜证:
#   Morrison 家(1112) → 🔓搜证（赌债欠条 1601、借钱证据 1602）
#   警察局(1113)      → ⚔️指证（Morrison 3 阶段指证）
#   结局场景(1114)    → 🎬结尾（获释 + 保险箱 + 南区计划）

scenes:
  # ── SC1112 Morrison 家 ──
  - id: 1112
    name: "Morrison 家"
    note: "L6 新解锁。Whale 电话触发后，Zack 赶往 Morrison 家搜证。Morrison 不在场（已去警察局）。房间内有经济往来的关键文件。"
    evidence:
      - id: 1601
        name: "Morrison 赌债欠条（$5,000，疤面熊星）+ 威胁信"
        note: "关键——Expose 阶段2 核心证据。欠条由疤面熊星集团（Whale 旗下组织）签发，金额 $5,000；威胁信内容涉及'不配合则公开赌债，断送警察生涯'"
      - id: 1602
        name: "Morrison 向 Whale 借款的收据"
        note: "关键——Expose 阶段2 核心证据。Morrison 从 Whale 手下借钱还赌债，相当于将自己卖给了 Whale；收据上有疤面熊星集团印章"

  # ── SC1113 警察局 ──
  - id: 1113
    name: "警察局"
    note: "⚔️ 指证场所——Zack 当着 Morrison 同僚的面进行最终指证。Morrison 在此被逼到无路可退。"
    evidence: []

  # ── SC1114 结局场景 ──
  - id: 1114
    name: "结局场景"
    note: "🎬 结尾场景——Morrison 被停职、Vivian 释放、打开保险箱、南区计划出现。"
    evidence: []
    npcs:
      vivian_006:
        # ── 基本信息 ──
        talk: loop6_vivian_ending
        is_liar: false
        motive: "获释后的感激与迷茫——Webb 的案子终于真相大白，但她的生活已彻底改变；保险箱密码只有她知道"
        mindset: "虚脱后的平静——多天的监禁和压力令她精疲力竭；但看见 Zack 的那一刻，几乎落泪"

        # ── 1. NPC 已知信息（模式 B：第四次出场） ──
        # 知识池见 npc_knowledge_pools.yaml → vivian（Unit1 版）
        awareness:
          - content: "Jimmy 是真正的凶手，已经自杀身亡——杀死 Webb 的不是她"
            trigger: "L5 Expose 后，Jimmy 自杀的消息传到关押处"
          - content: "Morrison 被带走接受调查，Zack 完成了指证"
            trigger: "L6 Morrison 指证结束，消息传到 Vivian"
          - content: "Webb 的保险箱密码是 Webb 与 Vivian 的相遇日——Webb 从未忘记她"
            trigger: "L4 指证后 Vivian 意识到（字条+密码）Webb 对她真正的情感"

        active_topics:
          - "保险箱密码（相遇日——说出密码，帮助打开保险箱）"
          - "Webb 对自己真实情感的完整表述（情感结尾，释放所有保留）"
          - "南区计划的存在（Vivian 知道 Webb 提过，但不清楚内容）"
        withheld_topics: []  # L6 最终循环，全部释放

        # ── 2. 玩家询问意图 ──
        player_inquiry:
          - "\"保险箱密码——Vivian 告诉 Zack 密码是 Webb 与她的相遇日\" # 10"
          - "\"Vivian 对 Jimmy 自杀的感受——她如何看待这个为妻儿铤而走险的人\" # 7"
          - "\"Webb 的南区计划——Webb 曾提到过吗？\" # 8"

        # ── 3. 可提取证词 ──
