        # ── 4. 鉴赏力 ──
        connoisseur: []  # Unit1 无鉴赏力系统

# ═══════════════════════════════════════
# PART 3: 指证（Expose）
# ═══════════════════════════════════════
#
# 场景状态表: 警察局(1113) → ⚔️指证（Morrison，3 阶段）
# exposeNpcId: 104 (Morrison)
#
# 核心逻辑链:
#   阶段1: Vivian 手枪(.25 ACP) + Morrison 用的是.45 ACP弹壳(1501) + 凶器(1506, .45 ACP)
#          → Morrison 声称"Vivian 的手枪是凶器"根本不成立
#   阶段2: 赌债欠条(1601) + 借款收据(1602)
#          → Morrison 不是失误，是被 Whale 经济控制后有意压制证据
#   阶段3: Jimmy 给 Whale 的回信(1503)
#          → Morrison 声称"Whale 只是放贷的"——回信证明 Whale 是雇凶主使，两者是合谋关系
#
# 情绪设计: Morrison 从强硬到崩溃。他不是纯粹的恶人——是被环境摧毁的人。
# 结局: 同僚当场认定 Morrison 失职（涉嫌包庇），停职调查。Morrison 没有辩解，只是沉默。

expose:
  target: "Morrison (104)"
  total_rounds: 3

  morrison:
    # ── 基本信息 ──
    talk: loop6_morrison_expose
    is_liar: true
    motive: "死守阵地——Morrison 知道一旦认罪，自己的警察生涯彻底终结，Whale 也不会放过他；他选择用谎言撑到最后一刻"
    mindset: "强硬防守，内心已经崩溃——L4 翻脸、L5 Jimmy 自杀的消息已经传到他耳中；他知道大势已去，但在同僚面前仍要维持一个体面的防线"

    # ── 1. NPC 已知信息（模式 B：第三次出场） ──
    # 知识池见 npc_knowledge_pools.yaml → morrison（Unit1 版）
    awareness:
      - content: "L1 Expose 后 Zack 获得 72 小时调查权——Morrison 开始意识到 Zack 比预想的更难对付"
        trigger: "L1 Expose 结果（Morrison 被迫同意调查权）"
      - content: "L4 翻脸——没收弹壳(1403)、撕毁合同(1101)、逮捕 Vivian——押注 Whale 那边的决定已经做出"
        trigger: "L4 Part7 Morrison 翻脸事件"
      - content: "Jimmy 已经自杀身亡，凶器手枪(1506)入库——最后一道屏障消失了"
        trigger: "L5 Jimmy 自杀 cutscene 后，消息在警察局内部传开"
      - content: "Zack 现在来警察局，手里一定握有新证据——Whale 的电话是 Whale 在测试他，还是放弃了他？"
        trigger: "Whale 打来 Morrison 家电话（L6 开篇突发事件）"

    active_topics: []  # Expose 对象，无主动 Talk 阶段；知识在 Expose 中被动揭示
    withheld_topics: []  # L6 最终循环，全部释放

    # ── 2. 玩家询问意图 ──
    player_inquiry: null  # Expose 对象，指证中被动回应，非主动提问

    # ── 3. 可提取证词 ──
    testimony_ids:
      - 6041001  # ⚠谎言: Vivian 的手枪就是凶器，逮捕是正当的
      - 6041002  # ⚠谎言: 临时接警搜查失误，没有故意压制证据
      - 6041003  # ⚠谎言: Whale 只是一个放贷的商人，和本案没有任何关联

    # ── 4. 鉴赏力 ──
    connoisseur: []  # Unit1 无鉴赏力系统

  # ── 阶段 1：物证层——"Vivian 的手枪就是凶器" ──
  # 核心逻辑: Morrison 声称凭 Vivian 持枪定罪，但弹道学证据彻底排除 Vivian
  round_1:
    lie: "Vivian 当时手持凶器站在现场，我依据现有证据做出逮捕——这是合规的执法"
    lie_source: "证词 6041001（Morrison 为 L4 逮捕行为辩护）"
    usable_evidence:
      - id: 1501
        name: "Tommy 交出的久远弹壳（.45 ACP，Whale 型号）"
        用途: "案发现场的弹壳是 .45 ACP 型号——而 Vivian 的手枪是 .25 ACP，根本不可能打出这颗弹壳；Morrison 知道型号不符却仍逮捕 Vivian"
      - id: 1506
        name: "凶器手枪（米勒集团特制，.45 ACP）"
        用途: "Jimmy 自杀后入库的凶器手枪发射 .45 ACP——与 Vivian 的 .25 ACP 手枪完全不同；这是真凶的武器，证明 Morrison 所依据的'现有证据'根本不成立"
    trap_evidence:
      - id: 1102
        name: "Vivian 的手枪（.25 ACP）"
        陷阱原因: "此物证只能说明 Vivian 的枪未开过（无硝烟），不能直接证明 Morrison 知情伪证——需要弹壳 1501 + 凶器 1506 才能建立完整对比"
    result: |
      Zack 用弹壳(1501)和凶器(1506)同台对比：两把枪、两种口径、无法共存。
      Morrison 被迫放弃"持枪定罪"这条线，转移到程序层面的防线：
      - "这只能说明我当时在信息不完整的情况下做了判断——这是执法失误，不是故意为之。"
      - Morrison 升级到阶段2：声称"临时接警搜查失误"

  # ── 阶段 2：财务层——"临时接警搜查失误" ──
  # 核心逻辑: Morrison 声称只是判断失误，但赌债 + 借款证明他是被 Whale 经济控制的
  round_2:
    lie: "我是临时接到报案的，现场搜查过于仓促，有些证据被忽略了——这是专业失误，不存在主观故意"
    lie_source: "证词 6041002（Morrison 的退守防线）"
    usable_evidence:
