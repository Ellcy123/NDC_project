# ═══════════════════════════════════════
# PART 3: 指证（Expose）
# ═══════════════════════════════════════
#
# 场景状态表: 酒吧大堂(1103) → ⚔️指证（Rosa）
# 指证设计: 2 轮完整指证
# exposeNpcId: 103 (Rosa)
#
# 核心推理链:
#   碎片在垃圾袋下（1302 分析后有硝烟）
#   → 碎片来自子弹穿窗
#   → 碎片产生时间早于 Rosa 23:20 倒垃圾
#   → 真实枪击早于 23:20
#   → Rosa 所称的"23:30 只有 Vivian 在里面"不可能是案发时间
#   → Rosa 在撒谎（时间层）
#   → 出示威胁纸条（1303）
#   → 不是记错，是被人提前写好了台词（动机层）
#   → Rosa 被胁迫伪证

expose:
  target: "Rosa (103)"
  total_rounds: 2

  rosa:
    # ── 基本信息 ──
    talk: loop3_rosa_expose
    is_liar: true
    motive: "被 Jimmy 以威胁纸条胁迫（以女儿高额医疗费为要挟），出于对女儿安全的恐惧继续维持伪证"
    mindset: "强硬防守——此次 Morrison 不在场，但 Rosa 的谎言已成公开证词，她不能轻易认输；内心越来越恐惧，知道 Zack 手里有证据"

    # ── 1. NPC 已知信息 ──
    # 知识同 rosa_003（探索阶段），awareness 同上
    # Expose 阶段额外心理状态：玩家拿出证据前 Rosa 仍会防守

    # ── 2. 玩家询问意图 ──
    player_inquiry: null  # Expose 对象，不设 player_inquiry

    # ── 3. 可提取证词 ──
    testimony_ids:
      - 3031001  # 23:20 自己去外面倒过垃圾（R1 推理逻辑起点）
      - 3031002  # ⚠谎言: 记忆搞错了，反正一定是 Vivian（R2 谎言来源）

    # ── 4. 鉴赏力 ──
    connoisseur: []

  # ── 第一轮：时间层——"23:30 只有 Vivian 在里面" ──
  # 核心逻辑: 玻璃碎片(1302 分析) + Rosa 自己的证词(3031001:23:20 倒垃圾) → 枪击必须早于 23:20
  round_1:
    lie: "23:30 那时候只有 Vivian 在里面——我亲眼看见，不可能有错"
    lie_source: "证词 1031002（L1 谎言2，本 Loop 正式被击破）"
    usable_evidence:
      - id: 1302
        name: "玻璃碎片（压在垃圾袋下，分析后有硝烟痕迹）"
        用途: "碎片来自子弹穿窗击碎会客室玻璃。Rosa 23:20 倒垃圾时垃圾袋压在碎片上方——碎片产生早于 23:20，意味着真实枪击发生在 23:20 之前，不可能是 23:30"
      - id: 3031001
        name: "Rosa 的证词：23:20 自己去外面倒过垃圾"
        用途: "Rosa 自己的证词与碎片证据交叉——用她自己说过的话证明她 23:30 的目击时间根本不可能是案发时间"
    trap_evidence: []
    result: |
      Zack 用 Rosa 自己的话反驳 Rosa：
      - "你自己说过 23:20 去走廊倒了垃圾。但垃圾袋下面压着会客室窗玻璃的碎片——碎片是子弹穿窗留下的。"
      - "这意味着枪击发生在 23:20 之前，而不是 23:30。你所谓的'亲眼目击'时间根本不可能是真正的案发时间。"
      Rosa 开始崩溃，但仍防守——升级到新防线（谎言2）：
      - "那……那也许是我记错时间了。也许是 23:40？也许更晚？反正我亲眼看见 Vivian 进去了，这一点是真的。"

  # ── 第二轮：动机层——"可能是我记忆搞错了，反正一定是 Vivian" ──
  # 核心逻辑: 威胁纸条(1303) → 有人提前写好了台词，不是记错，是被迫
  round_2:
    lie: "可能是我记忆搞错了，反正一定是 Vivian——我当时确实看见她进去了"
    lie_source: "证词 3031002（Expose 过程中 Rosa 的退守谎言）"
    usable_evidence:
      - id: 1303
        name: "威胁纸条（含女儿医疗单）"
        用途: "纸条明确写着要求 Rosa 在 Morrison 面前指认 Vivian——有人提前给她写好了台词和时间。这不是记忆错误，是被人指定的伪证内容"
    trap_evidence: []
    result: |
      威胁纸条彻底击穿"记错时间"的说法：
      - "这张纸条明确告诉你要说什么、说哪个时间——这不是记忆问题，是有人替你编好了供词。"
      Rosa 崩溃，哭泣承认真相（假胜利阶段）：
      - 承认收到威胁纸条，被迫在 Morrison 面前作伪证
      - 说出："大家都知道 Vivian 每晚给 Webb 送酒——有人刻意利用这一点来嫁祸她"
      - 从衣物内取出藏匿的一颗 .45 弹壳，交给 Zack（这颗弹壳 ID 1403，L4 正式入库使用）
      - 恳求 Zack："求求你不要暴露我——我只是为了保护我女儿"
      假胜利：Zack 得到 .45 弹壳，型号与 Vivian 的 .25 ACP 手枪不符——真凶用了不同的枪。
      但 Vivian 是否真的清白？真凶到底是谁？调查仍未结束。

  # ── 指证后特殊事件 ──
  post_expose:
    new_evidence:
      - id: 1403
        name: "Rosa 交出的 .45 弹壳"
        note: "关键——L4 Vivian R1 核心证据。L3 指证后 Rosa 从藏匿处取出交给 Zack，ID 1403（14xx 系列，L4 正式入库使用）。L4 Part7 中被 Morrison 没收"
        obtained_trigger: "Rosa 指证第二轮击破后，Rosa 主动交出"
    note: "假胜利结构：Vivian 嫌疑暂时解除，但真凶未明。Rosa 交出弹壳后仍在情绪崩溃中，Zack 握有 .45 弹壳这一关键物证，调查进入 L4。"

