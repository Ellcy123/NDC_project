# PART 2: 疑点列表
# ═══════════════════════════════════════

doubts:
  - id: 2001
    text: "Webb 真实收入远超酒吧营业额——差额 $11,000 来自哪里？"
    unlock_condition: "持有 Webb 个人收入记录(1203) + 酒吧收入账本(1204)（两件物证交叉验证）"
  - id: 2002
    text: "客户记录的笔迹——是 Tommy 亲自操刀敲诈勒索？"
    unlock_condition: "持有客户记录(1205) + 完成笔迹鉴定(1701)（物证派生分析）"
  - id: 2003
    text: "Rita 是谁？Tommy 为什么暗示她是间谍？"
    unlock_condition: "完成 Tommy 讯问话题2（获得证词2051002）+ 持有 VIP 合影(1207)（证词×物证交叉）"
  - id: 2004
    text: "Jimmy 厨房工作表记录 23:00-23:30 他在场——那枪声是从哪里来的？"
    unlock_condition: "持有厨房工作表(1202) + 已知 Vivian 手枪无硝烟（L1 known_facts）（物证×前序知识交叉）"

# ═══════════════════════════════════════
# 自检清单（Validation）
# ═══════════════════════════════════════
#
# A. 结构完整性
#   [PASS] player_context（goals/known_facts/new_directions/post_expose_knowledge）全部存在
#   [PASS] 5个场景全部列出（1105/1106/1107/1101/1102）
#   [PASS] 无 expose 段落（L2 exposeNpcId=0，符合设计）
#   [PASS] 派生证据 + Tommy 讯问说明块单独列出
#   [PASS] doubts 列表存在
#
# B. 证据覆盖
#   [PASS] 1201(SC1106) 1202(SC1106) 1203(SC1102) 1204(SC1102)
#          1205(SC1102) 1206(SC1105) 1207(SC1101) 1208(SC1107)
#          1209(SC1107) 1701(派生←1205) 全部分配
#   [PASS] 弹壳未分配 ID（设计意图：L2被夺回，L5才入库为1501）——符合讨论结论
#
# C. NPC 条目
