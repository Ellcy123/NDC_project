# 指证设计: 3 轮完整指证 + cutscene 自杀
# exposeNpcId: 107 (Jimmy)
#
# 核心推理链:
#   R1: 鼓点单子(1502)证明 23:00-23:05 是高潮段
#       + Vivian 证词(4061003)鼓点掩盖枪声
#       → 真实枪击在 23:00-23:05，Jimmy 的"23:30 不在场"是假的
#   R2: 爱尔兰身份(1505)证明 Jimmy 有爱尔兰口音
#       + 证词(4061003)"Don't be bothering me"爱尔兰口音
#       → Jimmy 就是锁门模仿 Webb 喊走 Vivian 的人，Webb 当时已经死了
#   R3: 合同(1301)+练习书(1504)字迹比对威胁纸条(1303)
#       + Anna 证词(5081001)怀孕需要钱
#       → Jimmy 是合同签订者、纸条书写者，有杀人动机

expose:
  target: "Jimmy (107)"
  total_rounds: 3
  cutscene_after: true
  cutscene_note: "R3 击破后进入 cutscene：Jimmy 崩溃 → 视觉暗示 Whale 手下在暗处（交易已暴露）→ Jimmy 说'Anna…' → 开枪自杀 → 凶器手枪(1506)入库。系统实现：script=8+script=3 混合"

  jimmy:
    # ── 基本信息 ──
    talk: loop5_jimmy_expose
    is_liar: true
    motive: "已无退路——如果承认，Whale 必然对 Anna 下手；继续抵赖是唯一能为 Anna 争取时间的办法"
    mindset: "绝望中的强硬——Jimmy 知道游戏结束了，但保护 Anna 的本能让他坚持到最后一刻；三轮被击破后，视觉确认 Whale 手下就在现场，知道 Anna 已经不安全——唯一的出路是用死换取 Whale 不再追究"

    # ── 1. NPC 已知信息 ──
    # 知识同 jimmy_005（对话阶段），aware 同上，Expose 阶段无新 awareness

    # ── 2. 玩家询问意图 ──
    player_inquiry: null  # Expose 对象，不设 player_inquiry

    # ── 3. 可提取证词 ──
    testimony_ids:
      - 5071001  # ⚠谎言: 枪声 23:30 我有不在场证明（R1 谎言来源）
      - 5071002  # ⚠谎言: Vivian 找过 Webb 说明他还活着（R2 谎言来源）
      - 5071003  # ⚠谎言: 我没有理由杀 Webb（R3 谎言来源）

    # ── 4. 鉴赏力 ──
    connoisseur: []

  # ── 第一轮：时间线——"我有不在场证明，枪声 23:30 我在厨房" ──
  # 核心逻辑: 鼓点单子证明 23:00-23:05 是高潮段 + Vivian 证词证明鼓点可掩盖枪声
  # → Jimmy 不在场证明基于假时间线，真实枪击就在 23:00-23:05
  round_1:
    lie: "23:30 枪响的时候我在厨房，有工作表为证——我根本没有离开过厨房"
    lie_source: "证词 5071001（Jimmy 自述不在场证明，基于 23:30 这个假死亡时间）"
    usable_evidence:
      - id: 1502
        name: "芝加哥鼓点完整单子"
        用途: "单子记录《芝加哥狂想曲》各段精确时间，23:00-23:05 是最响亮的高潮段——在这段时间内枪声完全可能被掩盖。Jimmy 的不在场证明是针对 23:30 假时间线建立的，对真实枪击时间 23:00-23:05 无效"
      - id: 4061003
        name: "Vivian 证词：23:10 被爱尔兰口音喊走时鼓点正在演奏"
        用途: "Vivian 回忆被喊走时鼓点声音很大——证实高潮段演奏时确实可以掩盖枪声；同时证明 23:10 时 Webb 会客室里已有另一个人（Jimmy）"
    result: |
      Zack 用鼓点单子证明真实枪击时间不是 23:30：
      - "《芝加哥狂想曲》23:00 到 23:05 是整晚最响的高潮段——枪声完全可以在这段时间里被掩盖。"
      - "你的'不在场证明'是针对 23:30 建立的。但如果枪击发生在 23:00-23:05，你的证明就什么都不是。"
      Jimmy 脸色一变，随即调整防线：
      - "就算是那样……Vivian 亲自去找过 Webb，说明那时候 Webb 还活着。"

  # ── 第二轮：语言特征——"Vivian 找过 Webb 说明他还活着" ──
  # 核心逻辑: 爱尔兰身份证明 Jimmy 有爱尔兰口音
  # + Vivian 证词(4061003)"Don't be bothering me"爱尔兰口音
  # → Jimmy 锁上门模仿 Webb 的爱尔兰口音喊走了 Vivian，Webb 那时已经死了
  round_2:
    lie: "Vivian 亲口说过她 23:10 去找过 Webb，Webb 让她走——说明那时候 Webb 还活着，不是我杀的"
    lie_source: "证词 5071002（Jimmy 用 Vivian 的证词反驳 Zack，声称这证明 Webb 在 23:10 还活着）"
    usable_evidence:
      - id: 1505
        name: "Jimmy 的爱尔兰商身份证明"
        用途: "证明 Jimmy 是爱尔兰移民，具有爱尔兰口音——与 Vivian 证词中'Don't be bothering me'的爱尔兰口音吻合；Webb 是美国本地人，不会有爱尔兰口音，说那句话的人只能是 Jimmy"
      - id: 4061003
        name: "Vivian 证词：23:10 被'Don't be bothering me'爱尔兰口音喊走"
        用途: "Vivian 描述的那个声音有爱尔兰口音——Webb 不会有这个口音，只有 Jimmy 这个爱尔兰移民才会。Jimmy 当时锁着门模仿 Webb 的腔调把 Vivian 骗走了，但口音出卖了他"
    result: |
      Zack 指出口音的致命漏洞：
      - "Vivian 说那个声音是爱尔兰口音。Webb 是芝加哥本地人——他说话有爱尔兰腔调吗？"
      - "你是从爱尔兰来的移民。那句'Don't be bothering me'，说的是你，不是 Webb。"
      Jimmy 的第二道防线崩塌，沉默片刻后：
      - "……你根本什么都证明不了。我没有理由杀他。"

  # ── 第三轮：动机+字迹——"我没有理由杀 Webb" ──
  # 核心逻辑: 合同(1301)证明 Jimmy 被雇用 + 练习书(1504)字迹比对纸条(1303)和合同
  # + Anna 证词(5081001)怀孕需要钱 → Jimmy 有强烈动机，字迹证明他是执行者
  round_3:
    lie: "我没有理由杀 Webb——我只是个厨师，我为什么要那样做？"
    lie_source: "证词 5071003（Jimmy 的最后防线：否认动机）"
    usable_evidence:
      - id: 1301
        name: "被撕毁的合同（Whale 与某人）"
        用途: "合同中'某人'的字迹特征在 L5 首次描述（裁决4）——与练习书(1504)和威胁纸条(1303)字迹比对，是同一人的笔迹，证明 Jimmy 就是合同签订者（被雇杀 Webb 的人）"
      - id: 1504
        name: "Jimmy 的英语练习书"
        用途: "练习书字迹与合同(1301)和威胁纸条(1303)高度一致——三份字迹指向同一人，Jimmy 不仅签了杀人合同，还亲手写了威胁 Rosa 的纸条"
      - id: 1303
        name: "威胁纸条（含女儿医疗单）"
        用途: "纸条字迹与练习书(1504)吻合——Jimmy 亲手胁迫了 Rosa；同时纸条的存在本身证明了计划的周密性，这是有预谋的杀人，而非偶发冲动"
      - id: 5081001
        name: "Anna 证词：怀孕需要一大笔钱"
        用途: "Anna 怀孕、医疗费昂贵、Jimmy 经济极度困难——这就是 Jimmy 接受 Whale 合同的理由；不是没有理由，而是被逼到墙角才铤而走险"
    result: |
      Zack 用字迹和动机双重击穿最后一道防线：
      - "三份字迹——合同、威胁纸条、你的英语练习书——是同一个人写的。"
      - "你妻子怀孕了。你们没有钱。而 Whale 的合同提供了你们需要的一切。"
      - "这就是理由。"
      ——cutscene 开始——
      Jimmy 慢慢放下手中的工具，不再说话。他抬起头，目光扫向厨房的暗处——
      Whale 的手下就站在那里，全程目睹了这一切。交易已经暴露。
      Jimmy 的眼神里闪过一瞬间的平静。
      "Anna……"
      一声枪响。

  # ── 指证后特殊事件（cutscene + 收尾） ──
  post_expose:
    new_evidence:
      - id: 1506
        name: "米勒集团特制手枪"
        note: "关键——L6 Morrison 阶段1核心证据。Jimmy 自杀后从现场获取。手枪为米勒集团特制型号，与弹壳(1501)型号吻合，是连接 Morrison（米勒集团关联）与此案的关键物证"
        obtained_trigger: "cutscene：Jimmy 自杀后，Zack 从现场获取凶器"
    cutscene:
      script_type: "script=8+script=3 混合实现"
      beats:
        - "R3 击破后进入 cutscene"
        - "Jimmy 放下工具，目光扫向厨房暗处"
        - "视觉暗示：Whale 的手下站在暗处，全程观察（交易暴露，Anna 的安全已无法保证）"
        - "Jimmy 说出'Anna…'（保护妻子动机的最终体现）"
        - "枪响，Jimmy 倒下"
        - "凶器手枪(1506)入库"
    post_cutscene:
      note: "Jimmy 自杀后，Zack 和 Emma 感情进展场景。Emma 面对这一切表现出真实的恐惧，但随后拒绝退出调查——'但我不走'。Emma 的台词必须先有真实的恐惧才说这句话，不是空洞口号"

