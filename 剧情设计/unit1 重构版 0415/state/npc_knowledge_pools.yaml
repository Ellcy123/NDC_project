# ============================================================
# Unit1 NPC 知识池 / npc_knowledge_pools.yaml
# ============================================================
#
# 所有 state 文件通过 "# 知识池见 npc_knowledge_pools.yaml → {npc}" 引用本文件。
#
# 包含 NPC：rosa(103), morrison(104), tommy(105), vivian(106), jimmy(107)
# Emma(102) 使用全动态 knows/does_not_know，不纳入知识池。
# Webb(109)/Anna(108) 均为一次性 NPC，不纳入知识池。
#
# 内容原则：
#   - 知识池条目是该 NPC 在整个游戏中始终知道的事实，不因循环推进而改变
#   - 按主题（topic）分类，对应 state 文件的 active_topics / withheld_topics
#   - blind_spots 标注该 NPC 在整个游戏中永远不会知道的信息
#
# 数据来源：剧情设计/unit1 重构版 0415/讨论结论.md（0415定稿版）
# ============================================================

# ─────────────────────────────────────────
# Rosa (NPC 103)
# 出场：L1(expose)  L3(explore+expose)
# ─────────────────────────────────────────

rosa:
  knowledge_pool:

    identity:
      # 身份与日常工作
      - 酒吧清洁工，长期在 Webb 的蓝月亮酒吧工作
      - 每晚 23:20 前后负责将后厨垃圾袋拖到楼下走廊垃圾桶
      - 工作时段覆盖宴会后的清洁，对酒吧内部动线非常熟悉

    family:
      # 家庭与经济困境（胁迫的脆弱点）
      - 独自抚养一个生病的女儿，女儿需要高额持续的医疗治疗
      - 医疗费用已超出 Rosa 一人的收入承受范围，长期陷入经济压力
      - 女儿的病情是 Rosa 最大的软肋，胁迫者正是利用了这一点

    blackmail:
      # 威胁纸条事件（Rosa 被胁迫作伪证）
      - 案发前收到一张匿名威胁纸条，要求她在 Morrison 面前指认 Vivian 是凶手
      - 纸条内容涉及女儿的高额医疗费：若不配合，医疗费来源将被切断
      - Rosa 因恐惧选择服从，在 L1 指认 Vivian 持枪杀 Webb
      - Rosa 藏有案发现场捡到的一颗 .45 ACP 弹壳（L3 指证后才交出，ID 1403）
      - Rosa 不知道威胁纸条的实际作者是谁——她只收到匿名纸条

    vivian_routine:
      # 关于 Vivian 每晚送酒的规律（公开信息）
      - Vivian 每晚 23:30 前后准时给 Webb 送酒，这是酒吧人尽皆知的规律
      - Rosa 在工作中多次亲眼见过 Vivian 拿着酒瓶去会客室

    scene_observation:
      # 案发当晚的实际目击（真实的部分）
      - 23:20 Rosa 将垃圾袋拖到一楼走廊，垃圾袋自然压在已落地的玻璃碎片上
      - Rosa 当时未注意到垃圾袋下的玻璃碎片，不知道碎片来自子弹穿窗
      - 23:30 枪响后，Rosa 和其他人一起目睹 Vivian 进入会客室发现 Webb 已死
      - 案发现场附近发现了一颗 .45 ACP 弹壳，Rosa 秘密捡起并藏好

  blind_spots:
    - 威胁纸条的作者是 Jimmy（Rosa 只收到匿名纸条，从未怀疑 Jimmy）
    - 玻璃碎片的意义——碎片被垃圾袋压住证明案发时间早于 23:20（Rosa 无此推理认知）
    - 真正的枪击时间（23:00-23:05）和枪声掩盖机制
    - Webb 会客室内发生了什么（Rosa 始终不在场）
    - Whale 的具体身份和组织关系
    - Morrison 与 Whale 的关系
    - Jimmy 是杀手这一事实


# ─────────────────────────────────────────
# Morrison (NPC 104)
# 出场：L1(叙事硬切)  L4(Part7 翻脸)  L6(expose)
# ─────────────────────────────────────────

morrison:
  knowledge_pool:

    authority:
      # 警察身份与案件处理权
      - 现役警察，在案发现场最先宣布 Webb 死亡
      - 拥有对本案的正式处理权，可以决定逮捕、搜查和结案
      - 协议书(1101)是 Zack 能够介入调查的法律依据——Morrison 对此感到不满但无法拒绝

    debt:
      # 赌债与 Whale 的经济控制（核心腐败原因）
      - 欠疤面熊星集团（Whale 旗下组织）$5,000 赌债，收到威胁信：不配合则公开赌债、断送警察生涯
      - 为了还赌债，向 Whale 手下借款，彻底将自己置于 Whale 的经济控制之下
      - 收据上有疤面熊星集团印章，Morrison 无法否认双方的金钱从属关系
      - 这一切文件被 Morrison 保存在家中（L6 Morrison 家搜证场景中玩家可发现）

    webb_case:
      # Continental 银行/Webb 案件的利益关系
      - 案发第一时间赶到，掌握了第一手现场信息
      - 看见 .45 ACP 弹壳后认出米勒集团（疤面熊星）的专用弹药型号——知道弹壳背后的势力
      - 受 Whale 授意：压下弹壳证据、将案件归罪 Vivian、保护 Jimmy 的不在场证明
      - L4 出手没收弹壳(1403)、撕毁协议书(1101)、正式逮捕 Vivian——是主动配合 Whale，而非意外失误

    bullet_knowledge:
      # 弹壳型号的专业认知（L4 翻脸的触发点）
      - 知道 .45 ACP 弹壳是米勒集团（Whale 旗下疤面熊星集团）的专用弹药型号
      - 这一认知是他 L4 看见弹壳后脸色大变的直接原因

  blind_spots:
    - Jimmy 是凶手的具体操作细节（Morrison 只知道结果，不知道枪声掩盖的具体手法）
    - Jimmy 和 Whale 的合同内容细节（Morrison 只知道 Whale 策划了这一切，不知道具体条款）
    - Rosa 收到威胁纸条一事（Morrison 只是利用了 Rosa 的指控，没有直接参与威胁）
    - 保险箱密码和南区计划的内容（Morrison 不知道 Webb 的秘密文件）


# ─────────────────────────────────────────
# Tommy (NPC 105)
# 出场：L2(explore+讯问)  L3(explore)  L5(交出弹壳+鼓点单子)
# ─────────────────────────────────────────

tommy:
  knowledge_pool:

    bar_secret:
      # 酒吧的真实经营内幕
      - 蓝月亮酒吧的合法生意只是私酒，月净利润约 $4,000
      - Webb 真实月收入约 $15,000，差额 $11,000 来自对中产阶级客户的敲诈勒索
      - 敲诈勒索的客户名单由 Tommy 亲自记录（客户记录(1205)的笔迹是 Tommy 本人的）
      - Webb 沉迷 Rita 后，自 11 月中旬起停止了敲诈勒索活动
      - Webb 惹上了比自己更大的势力，有意转移财产准备出逃

    executor_past:
      # Tommy 自己的执行人经历
      - Tommy 曾经是 Webb 敲诈帝国的执行人——上门催款、施压、传递威胁
      - Webb 停止勒索活动后，Tommy 也随之退出，自称已不再参与
      - Tommy 仍保有对这些业务的了解，只是不再主动执行

    intel_on_rita:
      # Rita 是 Whale 间谍的判断
      - Rita 在 Webb 沉迷她期间获取了 Webb 的重要商业情报
      - Tommy 认为 Rita 是被某个大人物派来接近 Webb 的——即 Whale 的间谍
      - Rita 的出现是 Webb 被迫暴露给 Whale 的起点

    bullet_find:
      # 在办公室发现可疑弹壳（关键物件的起源）
      - 在自己办公室的抽屉里发现了一颗不属于自己的陈旧子弹（.45 ACP，米勒集团型号）
      - L2 时当着 Zack 的面把弹壳夺回——刻意不让 Zack 带走
      - 认出该弹壳是 Whale（米勒集团）的专用弹药型号，知道这颗弹壳意味着 Whale 的介入
      - L5 决定信任 Zack 后，主动将这颗子弹（ID 1501）和鼓点完整单子(1502)交出

    drumroll_sheet:
      # 鼓点单子的存在与意义
      - 手中保存有《芝加哥狂想曲》那晚的鼓点完整单子(1502)，记录了精确的演奏时间节点
      - L3 发现 Jimmy 在厨房销毁的是被撕毁的鼓点单子副本——Tommy 刻意保留了正本
      - 单子上的时间节点与案发时间存在可疑的重叠（鼓点高潮恰好覆盖 23:00-23:05）

  blind_spots:
    - Jimmy 是真凶（Tommy 对 Jimmy 一无所知，始终不怀疑这个默默无闻的厨师）
    - Morrison 与 Whale 的具体关联细节（Tommy 只有模糊认知：Morrison"肯定不干净"）
    - 威胁纸条是 Jimmy 写的（Tommy 知道 Rosa 被胁迫，但不知道是谁干的）
    - Vivian 的绝笔信和船票的存在
    - Jimmy 与 Anna 的婚姻和 Anna 怀孕的情况


# ─────────────────────────────────────────
# Vivian (NPC 106)
# 出场：L1(开篇硬切)  L2(explore)  L4(explore+expose)  L6(结局)
# ─────────────────────────────────────────

vivian:
  knowledge_pool:

    webb_relationship:
      # 与 Webb 的复杂关系（爱恨交织）
      - 是 Webb 的驻场歌手，与 Webb 有超出雇佣关系的情感纠葛
      - Webb 曾利用 Vivian 对中产阶级客户进行接触和勒索，Vivian 内心对此充满怨恨
      - Webb 取消去巴黎的计划，Vivian 误以为是因为 Rita——实为 Webb 为保护 Vivian 主动牺牲
      - Webb 在协议书(1101)中安排了财产继承条款，始终想保护 Vivian
      - 保险箱密码是 Webb 与 Vivian 的相遇日——Webb 从未忘记她

    alcohol_routine:
      # 每晚 23:30 送酒的规律（公开信息，被利用嫁祸的关键）
      - 每晚 23:30 前后准时给 Webb 送酒，这是整个酒吧人尽皆知的固定习惯
      - 案发当晚正常执行了这一习惯——23:30 听到枪声后返回开门，发现 Webb 已死
      - 持班表(1206)记录了这一规律，任何知情者都可以利用此规律嫁祸她

    blackmail_involvement:
      # 被 Webb 利用进行勒索的经历
      - Webb 主要让 Vivian 负责接触和软化中产阶级客户，为后续勒索铺路
      - 勒索 Whale 这类大人物的执行工作从未让 Vivian 参与
      - Vivian 对 Webb 利用她的愤恨是她写下绝笔信的情绪背景

    night_of_crime:
      # 案发当晚的真实经历
      - 23:10 去找 Webb，被门后人用爱尔兰口音大喊"Don't be bothering me!"赶走
      - 当时以为是 Webb 本人不想见她（Webb 本身是爱尔兰裔，口音相似）
      - 23:30 听到枪声后再次返回，开门发现 Webb 已死
      - 此后在 Morrison 宣布她是嫌疑人时，选择了自认有罪（主观上认为自己的存在导致了 Webb 之死）

    kill_plan:
      # 曾有杀人计划但未实施（绝笔信与船票）
      - 曾经在极度绝望中写下绝笔信，计划杀 Webb 后自杀
      - 买过前往巴黎的两张单程船票，后来将其撕毁
      - 最终没有付诸行动——在最后时刻选择了放弃

  blind_spots:
    - Jimmy 是真凶（Vivian 从未怀疑过这个厨师）
    - "Don't be bothering me"是 Jimmy 模仿 Webb 的爱尔兰口音（她以为当时说话的人就是 Webb）
    - Webb 保险箱密码的含义直到 L4 指证揭示后才领悟（R3 情感高潮）
    - 威胁纸条和 Rosa 被胁迫一事（Vivian 不知道背后的操控）
    - Morrison 与 Whale 的关系


# ─────────────────────────────────────────
# Jimmy (NPC 107)
# 出场：L2(explore)  L3(突发)  L5(explore+expose→自杀)
# ─────────────────────────────────────────

jimmy:
  knowledge_pool:

    identity:
      # 爱尔兰移民身份与蓝月亮酒吧厨师
      - 爱尔兰移民，在蓝月亮酒吧担任兼职厨师，工资微薄
      - 移民身份办理一再受阻，合法居留和身份证明迟迟无法落实
      - 具有明显的爱尔兰口音，日常刻意压低、模仿本地口音以减少注意

    family:
      # 与 Anna 的婚姻，Anna 怀孕
      - 与妻子 Anna 的婚姻是他生命中最重要的支撑
      - Anna 已怀孕，孩子的出生和合法身份问题让 Jimmy 陷入极度焦虑
      - 保护 Anna 和未出生的孩子是 Jimmy 接受 Whale 委托的核心动机，也是最终自杀的动机

    financial_desperation:
      # 经济困境——接受 Whale 委托的背景
      - 薪水极低，无法支撑 Anna 的医疗开销和孩子的未来
      - 移民身份的不确定性使 Jimmy 始终处于法律边缘，无法获得正当的经济改善渠道
      - Whale 提出的条件（移民身份办理 + 大笔现金）对 Jimmy 来说是无法拒绝的出路

    murder_execution:
      # 被 Whale 利用杀害 Webb 的全过程
      - 与 Whale 签订了杀人合同（被撕毁的合同 ID 1301，L3 在走廊垃圾桶旁发现）
      - 合同规定酬劳：移民身份办理 + 大笔现金（具体金额在合同中，L3 只知道"酬劳丰厚"）
      - 事先获知《芝加哥狂想曲》的演奏排期，知道 23:00-23:05 是鼓点高潮段（最响时段）
      - 23:00-23:05 趁鼓点高潮掩盖枪声，在 Webb 会客室开枪枪杀 Webb；子弹穿窗击碎玻璃
      - 23:05 左右 Vivian 来到门口，Jimmy 锁门，模仿 Webb 的爱尔兰口音大喊"Don't be bothering me!"骗走 Vivian
      - 23:05-23:20 返回厨房，补录厨房工作表（不在场证明，ID 1202），制造全程在厨房的假象
      - 23:30 Jimmy 从二楼窗口对外空射一枪，制造虚假的案发时间——诱使 Vivian 返回发现尸体
      - 凶器手枪为米勒集团特制（.45 ACP，ID 1506），Jimmy 在自杀 cutscene 后遗弃，玩家入库

    cover_up:
      # 销毁证据和胁迫证人
      - 写下匿名威胁纸条（ID 1303）胁迫 Rosa 指认 Vivian，以Rosa女儿的医疗费为要挟
      - 纸条笔迹与 Jimmy 的英语练习书(1504)一致——这是 L5 指证 R3 的关键证据之一
      - L3 时 Jimmy 在厨房销毁《芝加哥狂想曲》歌点单子副本（突发场景：玩家目击但无法阻止）
      - 鼓点单子正本被 Tommy 保存，最终由 Tommy 在 L5 交出（ID 1502）

  blind_spots:
    - Rosa 在现场捡走并藏起了一颗 .45 ACP 弹壳（ID 1403）——Jimmy 以为现场已清理干净
    - 玻璃碎片被 Rosa 23:20 的垃圾袋压住，形成了时序证据——Jimmy 没想到碎片会成为关键线索
    - Tommy 保留了鼓点单子的正本，L5 将其交给 Zack
    - Whale 在交易暴露后会派手下在场监视——Jimmy 以为 Whale 仍在保护他
    - Zack 会一直追查到底（Jimmy 起初低估了 Zack 的调查能力）
