# ============================================================
# Loop 1 — 枪响之夜 / The Night of the Shot
# 本循环说谎者: Rosa (103)，教程级指证（R1成功 + R2失败）
# 核心揭示: 表面案件——Webb被枪杀，Vivian是最大嫌疑人（但物证不支持）
# 前序事件: 无（本循环为全章开篇，玩家对Unit1案件一无所知）
# 时间: 1927年（待策划确认），深夜宴会结束前后
# ChapterConfig exposeNpcId: 103 (Rosa)
# ============================================================

# ═══════════════════════════════════════
# 玩家视角（本循环）
# ═══════════════════════════════════════

player_context:
  goals:
    primary: "Vivian 真的杀了 Webb 吗？"
    secondary:
      - "Rosa 的指认可信吗？"
      - "Zack 凭什么卷入这个案件？"
  known_facts: []  # L1，玩家对本章案件一无所知
  new_directions:
    - direction: "Vivian 的无罪可能"
      trigger: "Vivian 的手枪（.25 ACP）无硝烟反应——物证不支持 Rosa 的指控"
    - direction: "Rosa 的目击可靠性"
      trigger: "R1 成功击破谎言1后，Rosa 仍坚持 23:30 只有 Vivian 在里面——玩家缺乏证据反驳"
    - direction: "Zack 的委托关系"
      trigger: "协议书(1101)揭示 Webb 预先雇用了 Zack 保护 Vivian，暗示 Webb 预感到危险"
  post_expose_knowledge:
    - "Webb 在宴会上被枪杀"
    - "Rosa 指认 Vivian 是凶手（声称 23:30 目击 Vivian 射杀 Webb）"
    - "Vivian 的手枪（.25 ACP）无硝烟反应——物证不支持 Rosa 指控（R1 成功击破）"
    - "Rosa 谎言2（23:30 只有 Vivian 在里面）暂时无法反驳（R2 失败）"
    - "保密侦探协议书(1101)：Zack 受 Webb 委托保护 Vivian + 财产继承条款"
    - "Vivian 自认有罪（'是我杀了 Webb'），被 Morrison 禁足化妆室"
    - "Zack 凭协议书获得 Morrison 的 72 小时调查权"
    - "Webb 似乎预感到自己会死——主动雇用 Zack 是最后的保障安排"

# ═══════════════════════════════════════
# PART 1: 开篇（全硬切剧情）
# ═══════════════════════════════════════
#
# 场景状态表 L1:
#   酒吧歌舞厅(1101)   → 🎬开篇（舞会进行中，相遇）
#   Webb 会客室(1102)  → 🎬剧情（签约→案发）
#   酒吧大堂(1103)     → ⚔️指证（Rosa 指认 + Zack 反驳）
#   酒吧大门口(1104)   → 🎬激励事件（Emma，进入下一循环）
#
# L1 全程硬切剧情，无自由探索场景（scenes: []）。
# 两件证据均在硬切剧情中自动入库，无需玩家主动搜证。

opening:
  # ── 酒吧歌舞厅(1101) ──
  # 舞会正在进行。Zack 初到，Emma 接应，Vivian 短暂亮相。
  # Webb 隔空示意 Zack——随后带他去会客室签约。
  scene_id: 1101
  characters: [Zack, Emma, Vivian, Webb]
  purpose: "建立人物关系；舞会气氛；Webb 邀 Zack 签约"
  talk: emma_001

  emma_001:
    is_liar: false
    motive: "引导 Zack 认识环境与人物——这是她第一次和 Zack 合作，既兴奋又想表现得专业"
    mindset: "轻快、观察敏锐——宴会现场给她提供了大量细节，她会选择性地分享最有用的部分"

    knows:
      - "今晚是 Webb 的私人宴会，受邀宾客都是酒吧的重要客户"
      - "Vivian 是酒吧的驻场歌手，Webb 的心腹"
      - "Webb 最近行事低调，据说惹上了什么麻烦"
      - "Morrison 也在场——他和 Webb 有私下往来"
    does_not_know:
      - "Webb 找 Zack 谈什么"
      - "案件的任何细节"
      - "Rosa 的存在"
      - "Jimmy 是 Whale 的人"

    lie: null

    # ── 4. 鉴赏力 ──
    connoisseur: []  # Unit1 无鉴赏力系统

  # ── Webb 会客室(1102) ──
  # Zack 和 Webb 私下签约。协议书(1101)在此入库。
  # 随后案发——枪声，Webb 倒地，Morrison 冲入宣布死亡。
  webb_001:
    # ── 基本信息 ──（模式 D：一次性 NPC，在本场景死亡）
    talk: webb_001
    is_liar: false
    motive: "紧急委托——Webb 预感到有人要杀自己，以最后的安排确保 Vivian 不受牵连"
    mindset: "表面镇定、内心焦虑——话语精炼、目的明确，刻意不透露更多危险细节以免吓退 Zack"

    # ── 1. NPC 已知信息（模式 D：一次性 NPC）──
    knows:
      - "自己可能即将面临危险"
      - "Vivian 对自己最忠心，一旦自己死亡她将成为替罪羊"
      - "协议书中包含：保护 Vivian 的人身安全 + 确保她继承遗产"
      - "Whale 是让他感到真正危险的人"
    does_not_know:
      - "Zack 是否足够可信"
      - "具体谁会动手（Jimmy 是幕后执行人，Webb 不知道）"
      - "Rosa 会被胁迫作伪证"

    # ── 2. 玩家询问意图 ──
    player_inquiry:
      - "\"Webb 为什么紧急雇用我——具体威胁是什么？\" # 8"
      - "\"协议书的法律效力——Morrison 能阻止我调查吗？\" # 6"

    # ── 3. 可提取证词 ──
    testimony_ids: []  # Webb 在签约后立即遇害，证词内容通过硬切剧情呈现，不单独提取

    # ── 4. 鉴赏力 ──
    connoisseur: []  # Unit1 无鉴赏力系统

# ═══════════════════════════════════════
# PART 2: 自由探索
# ═══════════════════════════════════════
#
# L1 无自由探索场景。全程为线性硬切剧情。
# 两件证据均在剧情中自动交付：
#   1101（协议书）— Webb 签约时入库
#   1102（Vivian 手枪）— Morrison 缴械 Vivian 时 Zack 获取检视机会

scenes: []

# ═══════════════════════════════════════
# PART 3: 指证（Expose）
# ═══════════════════════════════════════
#
# 场景状态表: 酒吧大堂(1103) → ⚔️指证（Rosa 教程级）
# Morrison 场景叙事功能：宣布死亡、Case发现现场、允许/阻止调查。
# Morrison 不需要完整 NPC 条目（无对话分支，无证词提取）。
# 指证设计: 2 轮（R1 成功教会系统 + R2 失败教会"证据不足"状态）

expose:
  target: "Rosa (103)"
  total_rounds: 2
  # 注：R2 失败为设计意图——教程级指证刻意留下一个"证据不足"的失败体验，
  # 让玩家理解"没有证据时无法击破谎言"的系统规则。

  rosa_001:
    # ── 基本信息 ──
    talk: loop1_rosa_expose
    is_liar: true
    motive: "被 Whale 的人威胁——必须把 Vivian 指认为凶手，否则女儿的医疗费无法保障"
    mindset: "表面强硬，内心恐惧——对 Zack 的反驳感到出乎意料，但威胁纸条的压力让她无法退让"

    # ── 1. NPC 已知信息（模式 A：首次出场）──
    # 知识池见 npc_knowledge_pools.yaml → rosa

    active_topics:
      - "目击声称（23:30 看见 Vivian 持枪站在会客室门口）"
      - "Vivian 每晚 23:30 给 Webb 送酒的规律（公开信息）"
    withheld_topics:
      - "威胁纸条的存在（L3 才被搜出）"
      - "自己藏有弹壳（L3 指证后才交出，入库 1403）"
      - "自己 23:20 倒垃圾的时间细节（L3 指证 R1 核心）"
      - "写威胁纸条的人是 Jimmy（Rosa 也不知道）"

    # ── 2. 玩家询问意图 ──
    player_inquiry: null  # Expose 对象，指证中被动回应，非主动提问

    # ── 3. 可提取证词 ──
    testimony_ids:
      - 1031001  # ⚠谎言: Rosa 声称 23:30 亲眼看见 Vivian 持枪站在 Webb 会客室门口
      - 1031002  # ⚠谎言: Rosa 声称 23:30 枪响时只有 Vivian 一个人在里面

    # ── 4. 鉴赏力 ──
    connoisseur: []  # Unit1 无鉴赏力系统

  # ── 第一轮：Vivian 手枪无硝烟——物证不支持 Rosa 指控 ──
  round_1:
    lie: "Vivian 手里拿着手枪，一定是她杀的"
    lie_source: "证词 1031001"
    usable_evidence:
      - id: 1102
        name: "Vivian 的手枪（.25 ACP）"
        用途: "手枪检测无硝烟反应——如果 Vivian 刚刚开过枪，手枪必然有发射残留。无硝烟反应证明该枪未在案发时段发射"
    result: |
      R1 成功击破——Rosa 被迫退守：
      - "也许……也许我看见的枪不是用来杀人的那把？"
      - "反正 Webb 死的时候只有她在里面，不是她还能是谁！"
      - 转入谎言2（新防线）

  # ── 第二轮：23:30 只有 Vivian 在里面——证据不足，失败 ──
  # 设计意图：玩家第一次遭遇"证据不足"的失败状态，学习系统规则。
  # 系统处理：R2 失败需明确 UI 提示——"目前没有证据反驳这一点"，防止新手反复翻背包。
  round_2:
    lie: "23:30 枪响的时候，里面只有 Vivian 一个人"
    lie_source: "证词 1031002（Rosa 对 R1 被击破后的退守声明）"
    usable_evidence: []  # 设计意图：此轮无可用证据，玩家必须失败
    result: |
      R2 失败——Zack 无法反驳：
      - Zack 面对 Rosa 的这条声明，翻遍目前掌握的证据，没有任何证据可以反驳"只有 Vivian 在里面"
      - 系统提示"目前没有证据反驳这一点"
      - Morrison 宣布 Vivian 有罪，禁足化妆室
      - Zack 凭协议书(1101)向 Morrison 争得 72 小时调查权
      - 激励事件触发：转场至酒吧大门口(1104)

# ═══════════════════════════════════════
# PART 4: 激励事件（Vivian 自认有罪 → Emma 对话）
# ═══════════════════════════════════════
#
# 场景状态表: 酒吧大门口(1104) → 🎬激励事件
# Vivian 在 R2 失败后公开自认有罪，Morrison 宣布逮捕。
# Emma 在门口等候——重新聚焦 Zack，引出 Loop2 调查方向。

  # Vivian 在指证现场的表现（非对话 NPC，硬切呈现）
  vivian_001:
    # ── 基本信息 ──
    talk: loop1_vivian_cutscene
    is_liar: false  # "是我杀了 Webb"是谎言自认，但系统层面 Vivian 非本 Loop 说谎者
    motive: "对 Webb 之死感到负罪感——Vivian 相信如果不是自己，Webb 可能还活着（她认为 Webb 因她而死）"
    mindset: "心如死灰——不是恐惧，是一种平静的放弃，不想让 Zack 冒险调查"

    # ── 1. NPC 已知信息（模式 A：首次出场）──
    # 知识池见 npc_knowledge_pools.yaml → vivian

    active_topics:
      - "自认有罪（'是我杀了 Webb'）"
      - "Vivian 送酒规律（公开信息，侧面印证 Rosa 的目击有现实依据）"
    withheld_topics:
      - "23:10 去找 Webb 被喊走的细节——'Don't be bothering me!'（L4 指证后才释放，入库 4061003）"
      - "Vivian 真正的内心动机（曾经计划过逃跑/绝望，L4 揭晓）"
      - "保险箱密码（Webb 与 Vivian 相遇日，L4 揭晓）"

    # ── 2. 玩家询问意图 ──
    player_inquiry:
      - "\"Vivian 为什么承认是自己杀的——她真的杀了 Webb 吗？\" # 9"
      - "\"Vivian 和 Webb 是什么关系——为什么 Webb 要保护她？\" # 7"

    # ── 3. 可提取证词 ──
    testimony_ids:
      - 1061001  # ⚠谎言: Vivian 自认有罪——"是我杀了 Webb"（实为虚假的负罪自认）
      - 1061002  # Vivian 每晚 23:30 左右给 Webb 送酒的规律（公开事实，印证 Rosa 目击有现实基础）

    # ── 4. 鉴赏力 ──
    connoisseur: []  # Unit1 无鉴赏力系统

# ── 酒吧大门口(1104) Emma 激励事件对话 ──
  emma_104:
    is_liar: false
    motive: "稳住 Zack——72 小时调查窗口刚刚打开，不能在第一晚就放弃"
    mindset: "冷静而直接——Morrison 的压力她见过太多次，她知道突破口在 Rosa 的证词里"

    knows:
      - "Vivian 手枪无硝烟反应——Rosa 的第一条证词已被击破"
      - "R2 失败说明还缺关键证据，但案发时间本身就存疑"
      - "Morrison 同意了 72 小时调查权——时间窗口存在"
      - "协议书(1101)是法律依据，Webb 的委托是合法的"
    does_not_know:
      - "玻璃碎片的存在"
      - "威胁纸条的存在"
      - "Jimmy 的任何信息"
      - "Rosa 23:20 倒垃圾的时间细节"

    lie: null

    # ── 4. 鉴赏力 ──
    connoisseur: []  # Unit1 无鉴赏力系统

# ═══════════════════════════════════════
# PART 5: 证据列表（L1 入库）
# ═══════════════════════════════════════
#
# L1 仅 2 件证据，均通过硬切剧情自动入库，无搜证操作。

evidence:
  - id: 1101
    name: "保密侦探协议书"
    note: "关键——Zack 受 Webb 委托保护 Vivian；含财产继承条款；Zack 凭此向 Morrison 争得 72 小时调查权"
  - id: 1102
    name: "Vivian 的手枪（.25 ACP）"
    note: "关键——Expose R1 用。无硝烟反应，证明该枪案发时段未开过枪；L4 弹道学对比（.25 vs .45 弹壳）时再度引用"

# ═══════════════════════════════════════
# PART 6: 疑点
# ═══════════════════════════════════════

doubts:
  - id: 1001
    text: "Vivian 手枪无硝烟反应——Rosa 的指认有问题"
    unlock_condition: "item:1102 + testimony:1031001"
  - id: 1002
    text: "Rosa 坚持 23:30 只有 Vivian 在里面——目前无法反驳，案发时间存疑"
    unlock_condition: "testimony:1031002 + expose_r2_failed（R2 失败触发）"

