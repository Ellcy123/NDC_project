# PART 3: 指证（Expose）
# ═══════════════════════════════════════
#
# 场景状态表: Jimmy厨房(1611) → ⚔️指证(Jimmy)
# 指证设计: 5轮（弹孔揭露伪造枪声 → 演出记录掩盖真实死亡时间 → Vivian证词推翻时间线 → 送餐记录推翻不在场证明 → 贿赂记录揭露投名状）
# exposeNpcId: 107 (Jimmy)

expose:
  target: "Jimmy (107)"
  total_rounds: 5
  testimony: 1072003  # ⚠谎言: "Jimmy承认偷窃但否认杀人"

  # ── 第一轮：弹孔揭露伪造枪声 ──
  # 窗外孔洞/分析后(1706) → 弹孔从内向外，11:30的枪声是伪造的
  round_1:
    id: 21
    lie: "我承认我偷了Webb的钱，但我没有杀他"
    lie_source: "证词 1072003"
    usable_evidence:
      - id: 1706
        name: "窗外的孔洞（分析后）"
        note: "派生自1621，经分析确认弹孔方向从内向外"
        用途: "弹孔方向从内向外——11:30的枪声不是杀人时发出的，是有人从室内向窗外开枪伪造的假枪声"
    result: |
      11:30的枪声被证伪：
      - 弹孔方向从内向外 = 子弹从室内射出窗外
      - 这不是杀人的枪，而是制造假枪声的枪
      - 既然11:30不是真实死亡时间，凶手故意误导所有人
      - Tommy在L1的枪声证词(1051003)也成了被利用的假证——凶手利用枪声让所有人以为Webb在11:30才被杀
      - Jimmy被迫回应："枪声和我有什么关系？我一直在厨房！"

  # ── 第二轮：演出记录掩盖真实死亡时间 ──
  # 节目单(1631) → 11:00是当晚音乐最响时段
  round_2:
    id: 22
    lie: "我承认我偷了Webb的钱，但我没有杀他"
    lie_source: "证词 1072003（延续）"
    usable_evidence:
      - id: 1631
        name: "节目单"
        用途: "节目单显示11:00是当晚音乐最响的高潮时段——凶手选择在音乐掩护下动手，真实死亡时间是11:00"
    result: |
      真实死亡时间锁定11:00：
      - 节目单显示11:00是全场音乐最响的高潮段落
      - 凶手刻意选择音乐最响时动手——任何声响都会被掩盖
      - L5的节目更改申请(1531)佐证——演出时间安排是可以被知情者利用的
      - 11:00杀人 + 11:30伪造枪声 = 凶手制造了30分钟的时间差来布置不在场证明
      - Jimmy面色变化："这跟我没关系……我那时候在厨房准备宵夜……"

  # ── 第三轮：Vivian证词推翻时间线 ──
  # NOTE: R3/R4 order matches CONFIG not original design doc
  # Vivian证词(1065001) → 约11:05敲门被拒，但Webb已在11:00死亡
  round_3:
    id: 23
    lie: "我承认我偷了Webb的钱，但我没有杀他"
    lie_source: "证词 1072003（延续）"
    usable_evidence:
      - id: 1065001
        name: "Vivian证词：约11:05去Webb会客室被拒"
        note: "type=3 (testimony)"
        用途: "Vivian约11:05去Webb会客室敲门，有人隔门说'今晚不要再来'——但Webb已在11:00死亡，说话的不可能是Webb。是谁在模仿Webb的声音？"
    result: |
      11:05的"Webb"不是Webb本人：
      - Webb在11:00已被杀死（R1+R2已证明）
      - 约11:05 Vivian敲门，有人用Webb的声音说"今晚不要再来"
      - 说话的人是凶手——杀死Webb后留在现场，模仿Webb声音骗走Vivian
      - 凶手必须是对Webb非常熟悉、能模仿其说话方式的人
      - Jimmy作为Webb的贴身助手，是最有可能模仿Webb声音的人
      - Jimmy开始慌乱："你……你在胡说……Vivian她搞错了……"

  # ── 第四轮：送餐记录推翻不在场证明 ──
  # 厨房工作表(1414) → Jimmy的不在场证明存在空白
  # (carried from L4)
  round_4:
    id: 24
    lie: "我承认我偷了Webb的钱，但我没有杀他"
    lie_source: "证词 1072003（延续）"
    usable_evidence:
      - id: 1414
        name: "厨房工作表"
        note: "跨循环证据——来自L4 scene 1411"
        用途: "厨房工作表显示Jimmy在10:50-11:20之间有一段空白——正好覆盖11:00杀人和11:05模仿Webb声音的时间窗口"
    result: |
      不在场证明崩塌：
      - 厨房工作表明确记录Jimmy在10:50-11:20之间不在厨房
      - 这段空白完美覆盖：11:00杀人 → 11:05模仿声音骗走Vivian → 11:10-11:20回厨房
      - Jimmy自称"一直在厨房"的说法被自己的工作记录推翻
      - 时间线完全吻合：离开厨房→杀人→模仿声音→返回厨房
      - Jimmy颤抖着说不出话："我……我只是出去透个气……"

  # ── 第五轮（致命）：贿赂记录揭露投名状 ──
  # 额外收入记录(1424) + Webb个人收入记录(1311) → 与Morrison的$5000形成镜像
  # (1424 carried from L4, 1311 carried from L3)
  round_5:
    id: 25
    lie: "我承认我偷了Webb的钱，但我没有杀他"
    lie_source: "证词 1072003（延续）"
    usable_evidence:
      - id: 1424
        name: "额外收入记录"
        note: "跨循环证据——来自L4 scene 1413"
        用途: "Jimmy有一笔$5000的不明收入——与Morrison被Whale收买的金额完全一致，这是Whale支付给Jimmy的杀人报酬"
      - id: 1311
        name: "Webb个人收入记录"
        note: "跨循环证据——来自L3 scene 1308"
        用途: "Webb的收入记录中有Whale相关条目——Whale不惜花大价钱除掉Webb，$5000给Morrison栽赃、$5000给Jimmy动手，这是一场精心策划的暗杀"
    result: |
      Jimmy彻底崩溃——投名状真相暴露：
      - Jimmy的$5000与Morrison的$5000形成完美镜像——都是Whale支付的
      - Morrison是"双重保险"：栽赃Zack + 确认Jimmy完成任务
      - Jimmy杀Webb是向Whale的"投名状"——用Webb的命换取Whale的信任
      - Jimmy的动机：为妻子Anna和未出生的孩子获得合法身份和金钱
      ★ Jimmy彻底崩溃认罪 ★
      - "是我做的……11点的时候……音乐最响的时候……我用刀……"
      - "我模仿Webb的声音赶走了Vivian……然后回厨房假装什么都没发生……"
      - "11:30我又回去，从窗户开了一枪——让所有人以为那才是Webb被杀的时间……"
      - "Whale答应我……如果我做了这件事……他会给Anna身份……给我们的孩子一个未来……"
