# PART 3: 指证（Expose）
# ═══════════════════════════════════════
#
# 场景状态表: 酒吧歌舞厅(1509) → ⚔️指证(Vivian)
# 指证设计: 3轮
#   R1: 分手信(1513) → 击穿"感情深厚"
#   R2: 撕碎的船票(1514) → 揭示Vivian的绝望与仇恨
#   R3: Tommy证词(1055004) + Vivian日记(1515) → 击穿最后防线
# exposeNpcId: 106 (Vivian)
# testimony: 1063002 ("与Webb是3年秘密恋人，感情深厚，他的死让我很伤心")

expose:
  target: "Vivian (106)"
  total_rounds: 3
  testimony: 1063002  # ⚠谎言: "与Webb是3年秘密恋人，感情深厚，他的死让我很伤心"

  # ── 第一轮：击穿"感情深厚" ──
  # 分手信(1513)直接证明Webb要抛弃Vivian——"感情深厚"是谎言
  round_1:
    id: 17
    lie: "与Webb是3年秘密恋人，感情深厚，他的死让我很伤心"
    lie_source: "证词 1063002"
    usable_evidence:
      - id: 1513
        name: "分手信（合并后）"
        用途: "Webb亲笔写给Vivian的分手信——Webb要抛弃Vivian，'感情深厚'是彻底的谎言"
    result: |
      分手信击穿"感情深厚"：
      - Webb白纸黑字要和Vivian分手——3年秘密恋情是Webb单方面的利用
      - Vivian无法否认分手信的存在，开始动摇
      - Vivian辩解："他……他只是一时冲动写的，我们的感情是真的……"
      - 但信中措辞冷酷，明显不是"一时冲动"

  # ── 第二轮：揭示绝望与仇恨 ──
  # 撕碎的船票(1514)证明Vivian发现真相后的愤怒——不是悲伤而是仇恨
  round_2:
    id: 18
    lie: "与Webb是3年秘密恋人，感情深厚，他的死让我很伤心"
    lie_source: "证词 1063002"
    usable_evidence:
      - id: 1514
        name: "撕碎的船票"
        用途: "两人一起远走高飞的船票被Vivian愤怒撕碎——这不是'悲伤'，而是发现被欺骗后的愤怒和仇恨"
    result: |
      船票揭示Vivian的真实情绪是仇恨而非悲伤：
      - 船票是两人离开的计划——被Vivian亲手撕碎
      - Vivian不是"悲伤的恋人"，而是"被背叛的女人"
      - Vivian开始崩溃："你不懂！你不懂他对我做了什么！"
      - 防线动摇，但仍不愿承认杀意

  # ── 第三轮：击穿最后防线 ──
  # Tommy证词(1055004) + Vivian日记(1515) → Webb和Rita的关系 + Vivian的仇恨日记
  round_3:
    id: 19
    lie: "与Webb是3年秘密恋人，感情深厚，他的死让我很伤心"
    lie_source: "证词 1063002"
    usable_evidence:
      - id: 1055004
        name: "Tommy证词：Webb最近和Rita走得很近"
        用途: "第三方证实Webb移情别恋——Vivian不是'被分手'，而是'被替换'"
      - id: 1515
        name: "Vivian的日记"
        用途: "Vivian亲笔日记记录发现Webb和Rita后的愤怒、仇恨和杀意——'感情深厚'的谎言彻底崩塌"
    result: |
      Vivian彻底崩溃，承认一切：
      - Tommy证词证实Webb和Rita走得很近——Vivian发现自己被"替换"
      - 日记中白纸黑字记录了Vivian的仇恨和杀意
      - Vivian承认：3年感情是Webb单方面的欺骗和利用
      - Vivian承认动过杀机——但否认实际动手
      - Vivian提供关键时间线：约11:05去Webb会客室，Webb让她"今晚不要再来"
      - Vivian声称离开后再也没回去——"我恨他，但我没有杀他"
      - 真凶仍未确定，Vivian有动机但无行动证据，排除嫌疑

