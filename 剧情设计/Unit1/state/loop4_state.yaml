# PART 3: 指证（Expose）
# ═══════════════════════════════════════
#
# 场景状态表: 酒吧歌舞厅(1409) → ⚔️指证(Jimmy)
# 指证设计: 3轮（"从没干过坏事" → 水壶+鉴定报告 → 争吵证词）
# exposeNpcId: 107 (Jimmy)

expose:
  target: "Jimmy (107)"
  total_rounds: 3
  testimony: 1071006  # "Jimmy声称自己从没干过坏事"

  # ── 第一轮：戳破"从没干过坏事"——水壶伪装 ──
  # Tommy证词(1054001) + 沾泥的水壶/分析后(1705) → Jimmy偷拿水壶并伪装
  round_1:
    id: 13
    lie: "我从没干过坏事——我就是个厨师，老实做饭而已"
    lie_source: "证词 1071006（⚠谎言——Jimmy声称自己从没干过坏事）"
    usable_evidence:
      - id: 1054001
        name: "Tommy证词：看到Jimmy从Webb办公室抱出古董水壶"
        用途: "Tommy亲眼所见——Jimmy从Webb办公室偷拿了古董水壶，'老实厨师'不会做这种事"
      - id: 1705
        name: "沾泥的水壶（分析后）"
        用途: "水壶表面的泥层是人为伪装——Jimmy故意把贵重古董伪装成廉价陶泥制品藏在厨房"
    result: |
      Jimmy被迫承认拿了水壶：
      - Tommy亲眼看到 + 水壶伪装证据 = "从没干过坏事"是彻底的谎言
      - Jimmy从"我只是帮忙搬东西"退守为"水壶不值钱，Webb让我保管的"
      - Zack追问：如果不值钱，为什么要用泥巴伪装？
      - Jimmy沉默后升级谎言："好吧，我拿了水壶，但那只是个普通陶壶，不值几个钱"

  # ── 第二轮：揭穿"不值钱的陶壶"——鉴定报告 ──
  # 古董鉴定报告(1429) → Jimmy明知水壶价值不菲
  round_2:
    id: 14
    lie: "那只是个普通陶壶，不值几个钱，我只是觉得好看才拿回来"
    lie_source: "Jimmy对Round 1的新谎言"
    usable_evidence:
      - id: 1429
        name: "古董鉴定报告"
        用途: "报告明确标注Bennington陶器价值约$2,000——Jimmy家中有Bennington陶器照片(1425)，他完全知道这只水壶的真实价值"
    result: |
      Jimmy无法自圆其说：
      - 鉴定报告白纸黑字写着$2,000，不是"不值几个钱"
      - Jimmy家中就有Bennington陶器照片——他不可能不认识
      - Jimmy被迫承认知道水壶价值，声称"我拿走是为了保护它"
      - Zack追问：保护它不受谁的威胁？
      - Jimmy情绪激动但拒绝回答，升级防线："我和Webb之间的事你管不着！"

  # ── 第三轮：击穿"我和Webb没有矛盾"——争吵证词 ──
  # Vivian证词(1063001) → Jimmy和Webb之间确实存在严重矛盾
  round_3:
    id: 15
    lie: "我和Webb之间没有任何问题！我们相处得很好！"
    lie_source: "Jimmy对Round 2的新谎言"
    usable_evidence:
      - id: 1063001
        name: "Vivian证词：目睹Jimmy和另一人争吵"
        用途: "Vivian亲眼目睹Jimmy和人激烈争吵——Jimmy声称'相处得很好'与目击证词直接矛盾"
    result: |
      Jimmy彻底崩溃：
      - Vivian的目击证词直接打脸"相处很好"
      - Jimmy承认和Webb因Whale的问题产生严重分歧
      - Jimmy坦白：自己警告Webb不要惹Whale，但Webb不听
      - Jimmy揭示：Whale是一个极其危险的勒索目标，Webb太贪心了
      - Jimmy承认自己不只是厨师——是Webb最信任的助手，参与了很多"幕后工作"
      - Jimmy暗示Vivian也很可疑："你应该去问问Vivian，她知道的比她说的多得多"
      - 为L5(Vivian循环)做铺垫

