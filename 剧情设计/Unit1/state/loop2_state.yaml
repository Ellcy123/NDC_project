  goals:
    primary: "Morrison迷晕了我。证据在哪？他为什么要这么做？"
    secondary:
      - "Morrison到底什么时候到的现场？"
      - "勘验箱领用为什么在案发前一天？"
      - "Morrison检查现场用了什么工具？"
  known_facts:
    - "Rosa供出Morrison是幕后黑手"
    - "Morrison曾迷晕Zack"
    - "Webb在酒吧被杀"
  new_directions:
    - direction: "时间线矛盾"
      trigger: "Morrison称11:30接到线报后立刻赶往现场，但Tommy说车程最多15分钟，Vivian说Morrison午夜12点才到——中间多出至少15分钟无法解释"
