    - "Morrison因赌债被Whale收买，收了$5000"
    - "Whale要处理掉Webb和他的'保险侦探'Zack"
    - "Webb约Zack去酒吧不是给案子，而是把Zack当成'保险'——如果Webb出事Zack会调查到底"
    - "Morrison是Whale的工具人"

