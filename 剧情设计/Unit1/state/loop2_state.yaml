# ═══════════════════════════════════════
# PART 3: 指证（Expose）
# ═══════════════════════════════════════
#
# 场景状态表: Morrison办公室(1118) → ⚔️指证(Morrison)
# 指证设计: 4轮
#   R1: 时间线矛盾（Tommy车程 + Vivian到达时间 vs Morrison说辞）
#   R2: 勘验箱领用单（案发前一天就领了设备）
#   R3: 箱子压痕分析（勘验箱与现场压痕吻合）
#   R4: Rosa证词（Morrison检查现场未使用测量工具）
# exposeNpcId: 104 (Morrison)

expose:
  target: "Morrison (104)"
  total_rounds: 4
  # Morrison的Talk/证词见上方 scenes → 1118 → morrison_expose

  # ── 第一轮：时间线矛盾 ──
  # Morrison称11:30接到线报后立刻赶往，但车程15分钟+到达时间12:00=至少15分钟空白
  round_1:
    id: 5
    lie: "11点半接到匿名线报后立刻赶往现场"
    lie_source: "证词 1041003"
    usable_evidence:
      - id: 1052002
        name: "Tommy证词：从Morrison家到酒吧最多15分钟"
        用途: "建立车程上限——11:30出发最迟11:45到达"
      - id: 1061001
        name: "Vivian证词：Morrison在午夜12点到达现场"
        用途: "实际到达时间是12:00——比'立刻赶往'晚了至少15分钟"
    result: |
      时间线矛盾击穿"立刻赶往"：
      - 11:30接到线报 + 车程最多15分钟 = 最迟11:45到达
      - Vivian证实Morrison12:00才到——多出至少15分钟无法解释
      - Morrison无法自圆其说，但继续硬撑

  # ── 第二轮：勘验箱领用单 ──
  # 案发前一天就领了勘验设备——预谋的证据
  round_2:
    id: 6
    lie: "11点半接到匿名线报后立刻赶往现场"
    lie_source: "证词 1041003"
    usable_evidence:
      - id: 1221
        name: "勘验箱领用单"
        用途: "显示Morrison在案发前一天就领取了勘验设备——如果是临时接到线报，为什么提前一天就准备好了？"
    result: |
      领用单暴露预谋：
      - 案发前一天就领了勘验箱——说明Morrison提前知道会有案件
      - "接到匿名线报后立刻赶往"的说辞与提前准备矛盾
      - Morrison开始慌张，试图找借口

  # ── 第三轮：箱子压痕分析 ──
  # 勘验箱与现场压痕吻合——Morrison带着勘验箱去过现场
  round_3:
    id: 49
    lie: "11点半接到匿名线报后立刻赶往现场"
    lie_source: "证词 1041003"
    usable_evidence:
      - id: 1703
        name: "箱子的压痕（分析后）"
        用途: "勘验箱(1222)与Webb会客室现场压痕(1209)对比分析结果——压痕完全吻合，证明Morrison带着勘验箱去过现场"
    result: |
      物证吻合确认Morrison到过现场并携带勘验箱：
      - 勘验箱底部痕迹与现场压痕完全一致
      - Morrison无法否认自己带着勘验箱到过Webb会客室
      - 但Morrison仍试图狡辩："我带勘验箱去现场有什么问题？我是负责此案的警察"

  # ── 第四轮：Rosa证词——未使用测量工具 ──
  # 带了勘验箱却不用——勘验箱另有用途
  round_4:
    id: 7
    lie: "11点半接到匿名线报后立刻赶往现场"
    lie_source: "证词 1041003"
    usable_evidence:
      - id: 1032003
        name: "Rosa证词：Morrison检查现场未使用任何测量工具"
        用途: "提前领了勘验箱、带到现场、留下压痕——却从未使用任何测量工具。勘验箱不是用来勘验的，而是另有用途"
    result: |
      Morrison彻底崩溃：
      - 提前一天领勘验箱 + 带到现场留下压痕 + 却不使用任何工具 = 勘验箱不是用来办案的
      - Morrison承认迷晕Zack并栽赃
      - Morrison因赌债被Whale收买，收了$5000
      - Whale要处理掉Webb和他的"保险侦探"Zack
      - Webb约Zack去酒吧不是给案子，而是把Zack当成"保险"——如果Webb出事Zack会调查到底
      - Morrison是Whale的工具人——走投无路被利用

