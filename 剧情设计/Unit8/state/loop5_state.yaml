# 七、指证后戏剧（Jimmy 自杀 + Anna 托付 + 感情戏）
# ─────────────────────────────

suspect_suicide_sequence:
  type: forced_cutscene  # 🎬 强制剧情，无玩家操作
  location: "蓝月亮酒吧后门（与 arrest_cutscene / post_expose_dialogue 同一地点）"
  description: |
    【Jimmy 自杀序列——新时序】

    1. 暴露时刻（Expose round_3 结束）：
       Zack 和 Emma 指证 Jimmy 的整个过程，等同于在 Whale 手下面前
       公开宣告：Jimmy 和 Whale 的关系、Jimmy 接受的委托、整桩案件的内幕——
       这一切在这一刻都暴露给了"不该知道的人"（也就是说，Whale 知道了 Jimmy 已暴露）。

    2. 鸣笛（round_3 结束，Zack 说出 Whale 名字后）：
       ⚠️ 注意：这里是"鸣笛（whistle）"，不是"枪响（gunshot）"。
       来自酒吧后门暗处的一声哨声——那是 Whale 手下给 Jimmy 的信号，
       意思是：事情败露，无法挽回。
       Jimmy 知道这意味着什么：Whale 不会放过知情者，而 Anna 和孩子就是最脆弱的目标。
       但此时 Jimmy 紧张但还在撑——尚未崩溃。

    3. Zack 的字迹对白（post_expose_dialogue——压垮骆驼的最后一根稻草）：
       Zack 对 Jimmy 说："威胁 ROSA 的也是你——那个纸条和合同上面的 J 都是倒着写的。"
       依据是 Zack 在 Jimmy 家观察到的英语练习书（8505，envir/pickup:false）。
       这不是 Expose 轮次，而是 Expose 之后的脚本对白。

    4. Jimmy 发疯：
       字迹对白让 Jimmy 意识到——连 Rosa 那条胁迫线也被 Zack 看穿了。
       最后的"受胁迫的傀儡"伪装也没了。
       Jimmy 进入非逻辑的情绪性否认状态：
       "不是我，我没有，我没有……"

    5. Jimmy 的最后选择——自杀：
       Jimmy 看了一眼暗处的方向（Whale 手下所在位置），
       明白了一件事：自己已经彻底暴露，不只是对 Zack，也是对 Whale。
       暗处的威胁已经形成——Anna 是危险的。
       为了保护 Anna 和未出生的孩子，Jimmy 做出了最后的选择。
       他拔出了那把曾经杀死 Webb 的米勒集团特制手枪，开枪自杀。
       死前，他看向 Zack 和 Emma，说出了最后的话——
       将 Anna 托付给他们（"请……帮我照顾她"）。

    6. 现场遗留：
       Jimmy 的尸体旁，留下了那把米勒集团特制手枪（8507）——
       那把枪，曾经在 23:00 杀死了 Webb，
       现在又杀死了使用它的人。

  audio_sequence:
    # 声音事件精确时序，用于对话/过场音效配置（按新 3 层 Expose + 字迹对白时序）
    - step: 1
      event: "Expose round_3 完成"
      audio: null
    - step: 2
      event: "Zack 说出 Whale 名字（round_3 post_round_event）"
      audio: "whistle（鸣笛/哨声）——来自暗处的 Whale 手下"
      note: "这不是枪声，是哨声/鸣笛信号；Jimmy 紧张但未崩溃"
    - step: 3
      event: "post_expose_dialogue——Zack 点名字迹对白（依据：8306+8401+8505）"
      audio: null
      note: "非 Expose 轮次，Zack 主动说出；8505 为环境观察记忆，不出示物证"
    - step: 4
      event: "Jimmy 发疯（'不是我……我没有……'）"
      audio: null
    - step: 5
      event: "Jimmy 自杀完成"
      audio: "gunshot（枪响）——Jimmy 自己开枪自杀"
      note: "这是 Jimmy 自己的枪（8507），不是 Whale 手下开枪"

  new_evidence_gained:
    - id: 8507
      name: "米勒集团特制手枪"
      type: item  # 物理道具
      pickup: true
      note: "关键——loop6 指证 Morrison round_1 的核心物证；真正的凶器（杀死 Webb 的枪 = Jimmy 自杀用的枪）；米勒集团特制，弹型匹配 .45 ACP"
      description: "一把沉甸甸的手枪，米勒集团军火系统的特制型号，使用 .45 ACP 口径弹药。这把枪有两重身份：它曾经是杀死 Webb 的真正凶器，现在又成了 Jimmy 自杀的工具。弹孔痕迹可与现场（会客室窗户玻璃碎片）做弹道比对"
      metadata:
        caliber: ".45 ACP"
        classification: "米勒集团特制手枪"
        is_murder_weapon: true
        loop6_critical: true
        usage_loop6: "loop6 指证 Morrison round_1：出示此枪证明 Vivian 的手枪不是凶器，真正的凶器是 .45 口径的米勒集团手枪"

  anna_status_change:
    description: "Jimmy 自杀后，Anna 成为'被托付对象'——Zack 和 Emma 有责任保护她和孩子不受 Whale 势力威胁"
    trigger: "Jimmy 死前将 Anna 托付给 Zack 和 Emma"
    impact_on_loop6: "Anna 可在 loop6 作为证人提供 Jimmy 与 Whale 关系的补充信息（loop6 选择是否使用）"

  whale_power_reveal:
    description: "Whale 势力首次正面揭示——round_3 后一声来自暗处的鸣笛（whistle，非枪响）是 Whale 手下在场的确认。Jimmy 仅仅是因为指证暴露了 Whale 的关联、听到鸣笛信号，就选择了自杀，足以说明 Whale 的威慑力不是虚名。"
    audio_note: "whale 手下的信号是鸣笛（whistle），Jimmy 的自杀才是枪响（gunshot）——两者严格区分"
    significance: "疑点 8504 的核心背景信息——Morrison 看到 .45 弹壳脸色一变，是因为他知道与 Whale/米勒集团有关联意味着什么后果"

