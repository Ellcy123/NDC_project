post_expose_romance:
  type: story_dialogue  # 🎭 剧情对话
  location: "蓝月亮酒吧外（Jimmy 自杀后不久）"
  description: |
    Jimmy 自杀的冲击——一个人仅仅因为暴露了 Whale 的关联就选择了死亡，
    Zack 意识到这件案子已经远远超出了一桩"私人委托调查"的范畴。
    他要求 Emma 停止调查，不要再跟着他——这太危险了。
    Emma 不赞同。她不是理想主义的幼稚，她清醒地看到了这件事的危险，
    但她同样清醒地选择留下。
    两人的关系在这一刻有了质的变化：不再只是"委托人 + 记者帮手"，
    而是真正意义上的搭档——为了同一个正义，一起走到最后。

    【搭档决定——loop6 前置铺垫】
    感情戏的最后，两人确认了下一步的具体行动：
    Morrison 的家里藏有那枚被没收的弹壳（8308）——那是进一步证明 Morrison 与 Whale 关联的直接物证。
    两人决定以 Emma 的记者身份为掩护、Zack 以 Emma 助理的假身份，
    潜入 Morrison 的家，去取回那枚子弹。
    这个决定将作为 loop6 自由探索（下）的开场起点。

  infiltration_plan:
    # loop6 开场前置铺垫
    objective: "取回被 Morrison 没收的弹壳（8308）"
    cover_identity:
      emma: "记者身份（真实身份）"
      zack: "Emma 的助理（假身份）"
    target: "Morrison 的家"
    significance: "loop6 自由探索（下）的起始事件——两人以此身份进入 Morrison 家，获取 Morrison 欠条/借款证明/藏起来的弹壳等关键物证"

  emma_010:
    # ── 基本信息 ──
    talk: emma_010
    is_liar: false
    motive: "坚守自己的立场——她不是被 Zack 劝说不动的倔强，而是她有自己的判断，认为这件事值得冒险到底"
    mindset: "沉静而坚定；对 Zack 的担忧有理解，但更有一种理想主义式的清醒；对自己选择留下这件事没有一丝犹豫"

    # ── 1. NPC 已知信息（Emma 特殊模式 C）──
