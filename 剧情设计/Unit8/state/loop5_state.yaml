    - 8505 英语练习书（Jimmy 家 envir 观察——不是手持物证；Zack 的观察记忆，将在 post_expose_dialogue 字迹对白中使用；字迹三物之一）
    - 8506 爱尔兰裔身份证件（Jimmy 家发现）
    - 8085001 Anna 证言：怀孕 + 急需大笔钱
    - 8401 被撕毁的合同（loop4 发现，Whale 委托某人）
    - 8064006 Vivian 证言：23:10 在门口听到"Don't be bothering me!"（loop4）
    - 8306 Rosa 威胁纸条（loop3，字迹三物之一）
    Jimmy 面对 Zack 和 Emma 的正面指控。
    核心玩法：
    - Expose 3 轮：时间线（鼓点单子）/ 口音（爱尔兰裔身份 + 口音证词）/ 动机（被撕毁合同 + Anna 怀孕）
    - Expose 完成后 → post_expose_dialogue（字迹三物对白：8306 + 8401 + 8505 envir 观察记忆）
    - 字迹对白为压垮骆驼的最后一根稻草，触发 Jimmy 发疯 → suspect_suicide_sequence

  # ── 轮次一：时间线谜题——"枪声发生在 11:30，我有不在场证明"──
  round_1:
    lie: "我当天有不在场证明，枪声发生在 11 点半，不可能有其他时间能杀人，如果有枪声大家都能听到"
    lie_source: 8075002  # Jimmy 在 Talk 阶段声称自己一直在厨房（不在场证明暗示）
    usable_evidence:
      - id: 8503
        name: "《芝加哥鼓点》完整单子"
        用途: "完整单子明确标注：23:00 是《芝加哥狂想曲》第三乐章鼓点高潮，全曲最强爆发——此时酒吧内所有人都听不清其他声音，枪声完全可以被掩盖"
      - id: 8064002
        name: "Vivian 证言：《芝加哥狂想曲》鼓点很强，那天晚上她期待和 Webb 共舞"
        用途: "Vivian 亲身确认：案发当晚《芝加哥狂想曲》鼓点非常强劲——鼓点高潮足以掩盖枪声；23:00 时整个大厅都沉浸在音乐里，无人能辨别单独的枪声"
    result: partial_victory
    result_description: |
      Zack 指出：23:00 的鼓点高潮足以掩盖枪声——真实案发时间是 23:00 左右，不是 23:30。
      你的"不在场证明"建立在虚假的时间线上。
      Jimmy 短暂语塞，随即提出新的反驳（谎言2）：
      Vivian 当时来找 Webb——说明 Webb 那时候还活着，所以不可能是那会儿作案。

  # ── 轮次二：口音谜题——"Vivian 去找他了！说明 Webb 当时还活着"──
  round_2:
    lie: "Vivian 当时去找他了！说明当时 Webb 还活着，所以不可能是那会儿作案的"
    lie_source: "NPC 的退守谎言（round_1 被击破后 Jimmy 主动提出，以 Vivian 的行动为挡箭牌）"
    usable_evidence:
      - id: 8506
        name: "Jimmy 的爱尔兰裔身份证件"
        用途: "确认 Jimmy 是爱尔兰裔移民——爱尔兰裔英语（Hiberno-English）有独特的语法习惯，'Don't be bothering me!'就是典型的爱尔兰裔英语句式，不是美式英语习惯说法"
      - id: 8075001
        name: "Jimmy 口音证词（厨房对话记录，非物证）"
        用途: "Jimmy 在厨房对话中脱口说出'Don't be bothering me!'这个句式——与 Vivian 23:10 在门口听到的那句话完全一致；该信息以 Jimmy 的 testimony 8075001 承载，不是独立物证"
      - id: 8064006
        name: "Vivian 证言：23:10 在门口听到'Don't be bothering me!'（loop4 指证后交出）"
        用途: "Vivian 确认：她在 23:10 来到会客室门口，听到的声音是'Don't be bothering me!'——这是爱尔兰裔的口音，不是 Webb（美国人）的说话习惯；说话的那个人是 Jimmy，他模仿了 Webb 的声音来骗走 Vivian"
    result: partial_victory
    result_description: |
      Zack 指出：Vivian 在 23:10 听到的"Don't be bothering me!"不是 Webb——
      这是爱尔兰裔英语的特有句法，而你刚才也用了这个句法。
      你在那个时间模仿了 Webb 的声音，把 Vivian 骗走了。
      Jimmy 脸色发白，开始语无伦次，随即换了一道防线（谎言3）：
      那个人不是我，我根本没有理由杀 Webb。

  # ── 轮次三：动机——"我根本没有理由杀 Webb"（Expose 最终轮）──
  round_3:
    lie: "那个人不是我，我根本没有理由杀 Webb"
    lie_source: "NPC 的退守谎言（round_2 被击破后 Jimmy 的新防线：否认动机）"
    usable_evidence:
      - id: 8401
        name: "被撕毁的合同（Whale 委托某人做一件事）"
        用途: "有人与 Whale 签订了合同，Whale 愿意出一大笔钱——这个人就在酒吧内部；结合字迹一致（与威胁纸条 8306 相同），合同的签订方就是 Jimmy"
      - id: 8085001
        name: "Anna 证言：我们的孩子快出生了，家里需要一大笔钱"
        用途: "Anna 亲口说出：家里急需大笔钱来迎接孩子的到来，爱尔兰裔在芝加哥的处境本就艰难——这正是 Jimmy 为何要接受 Whale 委托的根本动机"
    result: expose_complete  # Expose 三轮全部击穿，Jimmy 的逻辑防线已完全瓦解
    result_description: |
      Zack 指出：你有动机——Anna 怀孕，家里急需大笔钱；
      Whale 给了你一个机会：杀掉 Webb，把一切推给 Vivian，换取一大笔钱。
      你签了那份合同，你就是执行人。
      Zack 说出"Whale"这个名字的瞬间——
      一声来自暗处的哨声（鸣笛）刺破夜空。
      Jimmy 的身体猛地一僵——他知道那声哨是什么意思。
      那是 Whale 手下给他的信号：你已经暴露了，什么都挽不回了。
      Jimmy 紧张到极致，但还在撑——他没有发疯、没有自杀，只是僵在那里。
      Expose 到此结束；接下来进入 post_expose_dialogue（字迹对白段），
      压垮骆驼的最后一根稻草还没落下。
    post_round_event:
      trigger: "Zack 在指证中提到 Whale 的名字"
      event_type: "whistle"  # 鸣笛（whistle），非枪响（gunshot）
      source: "暗处潜伏的 Whale 手下"
      audio_cue: "whistle（哨声/鸣笛）——这是给 Jimmy 的暗号，意味着：'你已经暴露，事情败露'"
      narrative_effect: |
        一声来自暗处的哨声（鸣笛）刺破夜空。
        Jimmy 的身体猛地一僵——他知道那声哨是什么意思。
        那是 Whale 手下给他的信号：你已经暴露了，什么都挽不回了。
        Jimmy 紧张但还在撑，尚未崩溃；崩溃发生在随后的 post_expose_dialogue 中。
      transition_to_post_expose_dialogue: |
        Expose 的逻辑交锋结束，Jimmy 保持沉默。
        但 Zack 还有最后一件事要当面说出来——关于威胁 Rosa 的字迹。
        这句话不会再走 Expose 轮次流程，而是作为对白段落直接压垮 Jimmy。

# ─────────────────────────────
# 六、指证后对白（字迹三物——压垮骆驼的最后一根稻草）
# ─────────────────────────────
# 设计说明：
#   Jimmy Expose 已从原 4 层回退为 3 层结构。字迹三物闭环（8306 + 8401 + 8505）
#   不再作为 round_4 出示，而是作为 Expose 结束后、suspect_suicide_sequence 开始前的
#   对白片段——Zack 凭自己在 Jimmy 家观察到英语练习书（8505，envir/pickup:false）时的
#   记忆，当面点名 Jimmy 是威胁 Rosa 的那个人。这是让 Jimmy 意识到 Rosa 的胁迫线
#   也已被揭穿、彻底崩溃的最后一击。
#
#   与 Expose 轮次的关键区别：
#     - 不是玩家出示证据触发，而是 Zack 主动说出（脚本推进）
#     - 8505 不是手持物证，是 Zack 的观察记忆
#     - 没有 usable_evidence / lie / result 结构，只有 dialogue beats
#     - 触发位置：round_3 post_round_event（鸣笛）之后、suspect_suicide_sequence 之前

post_expose_dialogue:
  type: story_dialogue  # 🎭 剧情对白（非 Expose 轮次，非玩家操作）
  location: "蓝月亮酒吧后门（与 arrest_cutscene / suspect_suicide_sequence 同一地点）"
  trigger: "Expose round_3 完成 + 鸣笛响起 + Jimmy 紧张但未崩溃"
  narrative_function: "字迹三物闭环——Zack 当面点名 Jimmy 是威胁 Rosa 的人，这是压垮骆驼的最后一根稻草，直接导向 Jimmy 的崩溃与自杀"

  zack_statement: |
    Zack 不再出示证据，也不再等待 Jimmy 的回应——他直接说出：
    "威胁 ROSA 的也是你——那个纸条和合同上面的 J 都是倒着写的。
    我在你家里看见过同样的字迹，是你写的英语练习本，
    那个'J'，你写了一页又一页，每一个都是倒着的。
    你不只是杀了 Webb——你还让一个母亲，用女儿的命来替你打掩护。"

  reference_evidence:
    # 这里列出 Zack 在心中闭环的三物，但它们不作为"出示物证"触发，而是 Zack 的内在依据
    - id: 8306
      name: "Rosa 收到的威胁纸条（loop3）"
      usage: "字迹三物之一——倒写的 J"
      presentation_mode: "Zack 心证，不主动出示"
    - id: 8401
      name: "被撕毁的合同（loop4）"
      usage: "字迹三物之二——与 8306 字迹一致，loop4 已确认"
      presentation_mode: "Zack 心证，不主动出示"
    - id: 8505
      name: "Jimmy 家的英语练习书（loop5）"
      usage: "字迹三物之三——Zack 在 Jimmy 家场景观察到的环境道具（envir/pickup:false），非手持物证；以对白形式使用"
      presentation_mode: "Zack 凭观察记忆陈述，不作为物证出示"

  jimmy_response: |
    Jimmy 此时已经撑不住了。
    他意识到的不是自己凶手身份被发现——那已经在 Expose round_3 结束时完成；
    他意识到的是：Rosa 那条线也被看穿了。
    他用 Rosa 女儿的命换来的掩护，Zack 全部看透。
    Whale 那边的鸣笛已经响过了——现在连"受胁迫的傀儡"的位置都没有了。
    Jimmy 发疯：
    "不是我……我没有……我没有……"
    他的声音越来越轻，随后抬头看向暗处——那是 Whale 手下所在的方向。

  transition_to_suicide: |
    Jimmy 看了一眼暗处，眼神从恐惧变成了某种决绝。
    他明白：自己已经彻底暴露，不只是对 Zack，也是对 Whale。
    Anna 和孩子会是 Whale 的下一个目标。
    除非——他现在就死。死了之后，Whale 没有理由再威胁一个不知情的孕妇。
    Jimmy 的手伸向那把米勒集团特制手枪。
    （→ 进入 suspect_suicide_sequence）

