          - content: "Zack 拿出了 Webb 的日记（1309）——日记内侧贴有'WHALE - DANGER'的便利贴"
            trigger: "loop4 s402：Zack 以 Webb 日记为凭据，逼他指认 Whale"
          - content: "Zack 还拿来了一枚弹壳（1308）请他辨认——他认出了这个型号"
            trigger: "loop4 s402：Zack 将 1308 出示给 Tommy（次线）"

        active_topics:
