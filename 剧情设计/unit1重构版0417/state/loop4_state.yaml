# 四、指证（⚔️ Expose：Vivian）
# ─────────────────────────────

expose:
  target: vivian
  target_talk: vivian_expose_001
  is_liar: true
  player_inquiry: null

  context: |
    Zack 完成自由探索后，手握：
    - 1308 弹壳（已确认为 .45 ACP 警用弹）
    - 1101 Vivian 手枪（.25 ACP，无硝烟反应）
    - 4051003 Tommy 证言（Zack 以 Webb 日记逼出的指认：Whale 就是 Webb 勒索的大人物；Rita 是 Whale 派来渗透酒吧的内线）
    - 1401 被撕毁的合同（Whale 花大钱委托酒吧里的人做某件事）
    - 1304 保险箱字条（Webb 将保险箱密码留给 Vivian）
    - 1103 Webb 委托协议书（Webb 要 Zack 保护 Vivian、确保遗产）
    Vivian 仍然坚持认罪："我杀了 Webb。"
    这场指证的基调是"救"——Zack 不是在审问凶手，而是在拯救一个想用死来解脱的人。
    三轮击破：
    - round_1：弹壳型号 vs 手枪型号不符（物证级别的无罪证明）
    - round_2：还有另一个人更有杀人动机（Whale + 被撕毁的合同）
    - round_3：Webb 从未放弃 Vivian（保险箱字条 + 委托协议书）

  # ── 轮次一：弹壳型号击穿"你不可能杀了 Webb"──
  round_1:
    lie: "我真的杀了 Webb！"
    lie_source: 4011001  # Vivian 在 Talk 阶段的认罪证词
    usable_evidence:
      - id: 1308
        name: "Rosa 给的弹壳（已确认为 .45 ACP 警用弹）"
        用途: "现场唯一找到的弹壳口径为 .45 ACP（由 Tommy 在 s402 鉴定确认）——凶器是 .45 口径的手枪"
      - id: 1101
        name: "Vivian 的小手枪（.25 ACP，无硝烟反应）"
        用途: "Vivian 的手枪是 .25 ACP 口径，且无硝烟反应——与弹壳口径不符，她的枪根本无法射出 .45 弹壳"
    result: partial_victory
    result_description: |
      Zack 指出：弹壳是 .45 ACP，你的枪是 .25 ACP——口径不对，凶器不可能是你的枪。
      Vivian 被这个事实击中，短暂沉默。
      但她随即退守到新的谎言（谎言2）：
      "但除了我是凶手，没有其他人能够杀害 Webb！"
      （她在这里可能也供述了自己的杀人计划——来增强"我才是凶手"的可信度）

  # ── 轮次二：Whale 更有动机，打破"只有我能杀他"──
  round_2:
    lie: "但除了我是凶手，没有其他人能够杀害 Webb！"
    lie_source: "NPC 的退守谎言（round_1 结果中 Vivian 主动提出，止损式退守）"
    usable_evidence:
      - id: 4051003
        name: "Tommy 证言（Zack 以 Webb 日记逼出的指认：Whale 是 Webb 勒索的大人物；Rita 是 Whale 派来渗透酒吧的人）"
        用途: "Whale 身份由 Tommy 正式指认 + Rita 是 Whale 的内线——Whale 更有可能是杀害 Webb 的主使者，且 Rita 在酒吧内部为 Whale 打探信息/传递渠道"
      - id: 1401
        name: "被撕毁的合同（Whale 花大笔钱委托了酒吧里的某人做事）"
        用途: "实物证据：Whale 与酒吧里的某人签了合同，委托做某件事——直接指向 Whale 是幕后主使者"
    result: partial_victory
    result_description: |
      Zack 向 Vivian 指出：还有一个人——Whale，他不仅可能是幕后主使，
