scenes:
  # ── 场景 S401：一楼走廊（垃圾桶附近）──
  - id: s401
    name: "一楼走廊（垃圾桶附近）"
    type: free_exploration  # 🔓 自由探索
    description: |
      一楼走廊，Zack 在垃圾桶附近发现了被撕毁的合同碎片——
      合同内容显示有人和"Whale"签订了协议，Whale 出大笔钱委托对方做一件事。
      字迹与 Rosa 收到的勒索纸条（1306）上的字迹高度一致。
      这是 loop4 中"Whale 是主使者"怀疑的核心物证。
      🟣 环境疑点：Webb 怀疑的对象和这个 Whale 有关吗？（d1002 推进）

    evidence:
      - id: 1401
        name: "被撕毁的合同"
        type: item  # 物品（文件/信件/票据类）
        pickup: true
        note: "关键——loop4 指证 Vivian round_2 的核心物证；loop5 指证 Jimmy round_3 也将使用此证据"
        description: "从垃圾桶中找到的被撕成碎片的合同残页，拼合后可读出：有一方与'Whale'签订了合同，Whale 愿意出一大笔钱委托对方做一件未明言的事。关键细节：字迹与 Rosa 收到的威胁纸条（1306）上的笔迹高度一致"
        metadata:
          cross_loop_critical: true
          loop4_critical: true
          loop5_critical: true
          handwriting_match: "1306（威胁纸条）"
          detail_note: "合同上的委托内容具体描述，在 loop5 指证 Jimmy 时将配合其他证据完整揭示"

    npcs: {}  # 一楼走廊此处无 NPC 驻场

  # ── 场景 S402：Tommy 办公室（Whale 指认 + Rita 身份揭示 + 弹壳型号鉴定）──
  - id: s402
    name: "Tommy 办公室"
    type: free_exploration  # 🔓 自由探索
    description: |
      Tommy 在自己的办公室。Zack 带着两件关键道具前来：
      loop3 从会客室获得的 Webb 日记（1309，上有"WHALE - DANGER"便利贴），
      以及 loop3 Rosa 给他的 .45 弹壳（1308）。

      ⭐ 核心叙事（主线）：Zack 以 Webb 日记为凭据，逼 Tommy 指认 Whale 并揭示 Rita 身份。
        1. Zack 谈到 Webb 的日记，要求 Tommy 指认他之前说过的"Webb 勒索的大人物"就是 Whale
        2. Tommy 沉默
        3. Zack 强调这对 Vivian 脱罪十分关键
        4. Tommy 松口："Webb 勒索过很多像 Whale 这样的人……但如此难以对付的，他还是头一个。
           连这间酒吧，也被他派来的人渗透了。"
        5. Zack 追问：是谁？
        6. Tommy：是 Rita。
      —— 这使得 Rita = Whale 派来的内部渗透者 从"Tommy 主观猜测"升级为"Tommy 明确指认"。

      ⭐ 次线：弹壳型号鉴定事件（触发点）
        Zack 将 1308 弹壳出示给 Tommy，Tommy 认出这是 .45 ACP 警用弹——
        他见过这个批次的枪：Webb 曾让他去收勒索款时被人开枪击中大腿（Whale 的一次警告），
        那次之后 Webb 就让别人接手了相关工作（不点名，loop5 才揭示是 Jimmy）。
      ⚠️ 鉴定事件技术处理：
        - 1308 弹壳的 metadata 在此场景从 "detail_locked" 升级为 ".45 ACP 警用弹"
        - 升级触发条件：Zack 将 1308 出示给 Tommy，Tommy 主动确认型号
        - 此后 1308 在 Expose round_1 可作为"已知型号"的证据使用

    evidence: []  # Tommy 办公室本次无新可拾取证据；主要是对话 + 弹壳 metadata 升级

    carried_evidence:
      # 玩家进入 s402 时需要随身携带的关键证据（用于主线对话）
      - id: 1309
        name: "Webb 的日记"
        source_loop: 3
        usage: "Zack 以此为凭据逼 Tommy 指认 Whale——日记中 'WHALE - DANGER' 便利贴是书面线索"
      - id: 1308
        name: "Rosa 给的弹壳（.45 ACP 待鉴定）"
        source_loop: 3
        usage: "出示给 Tommy 触发型号鉴定事件（次线）"

    evidence_upgrade:
      # ⭐ 弹壳型号鉴定事件（特殊：非新证据，而是已有证据的 metadata 升级）
      - target_id: 1308
        event: "Tommy 查看弹壳后确认型号"
        trigger_condition: "Zack 在本场景将 1308 出示给 Tommy"
        before_state:
          detail_locked: "具体型号（.45 ACP）在 loop4 通过与 Vivian 手枪 1101 对比后揭示"
        after_state:
          caliber: ".45 ACP"
          classification: "警用弹壳（米勒集团相关批次）"
          detail_locked: null  # 升级后解锁

    npcs:
      tommy_002:
        # ── 基本信息 ──
        talk: tommy_002
        is_liar: false
        motive: "对 Zack 的调查持有有限度的配合态度；对 Vivian 有同情；见到弹壳后会主动说出自己的经历"
        mindset: "复杂——对 Zack 帮助 Vivian 表示认可，但对自身安全仍然警惕；说到被枪击的经历时有短暂的恐惧"

        # ── 1. NPC 已知信息（模式 B：后续出场，引用知识池）──
        # 知识池见 npc_knowledge_pools.yaml → tommy（Unit1 Tommy 知识池，loop2_state.yaml 建立）
        #
        # loop2 建立的 Tommy 知识池摘要（参见 loop2_state.yaml，s204 tommy_001 注释块）：
        #   role: 曾是勒索生意执行人，11 月后不再执行
        #   knowledge: 酒吧私酒+勒索生意、Webb 个人收入、花瓶/油画仍在、客户记录是自己记的
        #              11:30 枪声来自酒吧南方、Webb 惹上大人物想跑路（猜测是 Whale）
        #              抽屉旧弹壳（Webb 收勒索被枪击的，Whale 的警告）

        awareness:
          - content: "Zack 帮助了 Vivian，把'自己是凶手'的谎言推进到了需要指证的阶段——Zack 是真的在替 Vivian 辩护"
