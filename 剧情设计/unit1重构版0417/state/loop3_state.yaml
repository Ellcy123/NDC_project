        question: "Rosa 说：嫁祸者'很熟悉酒吧'。她是根据什么信息得出这个结论的？"
        answer: "因为威胁纸条的内容利用了'Vivian 每晚固定在 23:30 给 Webb 送酒'这个习惯——不熟悉酒吧内部规律的人不可能知道这个细节（来源：loop3 指证 Rosa round_2 之后的供述）"
        note: "考查玩家是否把握了'嫁祸者熟悉酒吧'这条推理线索，引导后续关注酒吧内部人员"

# ─────────────────────────────
# 六、疑点（Doubts）
# ─────────────────────────────

doubts:
  - id: d1001
    text: "Rosa 声称目击 Vivian 在 23:30 杀死 Webb——但她的话可信吗？她真的目击了吗？"
    unlock_condition: |
      需要至少两种信息交叉验证：
      1. Vivian 手枪无硝烟反应（物证：1101）——推翻"刚刚开枪"
      2. Rosa 谎言1 被击穿（loop1 Expose 结果）——她已说过一个谎，整体可信度存疑
