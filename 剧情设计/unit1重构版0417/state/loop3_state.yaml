# 四、指证（⚔️ Expose：Rosa）
# ─────────────────────────────

expose:
  target: rosa
  target_talk: rosa_expose_002
  is_liar: true
  player_inquiry: null

  context: |
    Zack 完成自由探索后，手握玻璃碎片（1305）、Rosa 的倒垃圾时间证言（3021002）、
    威胁纸条（1306）和女儿医疗单（1307），决定正式指证 Rosa。
    Rosa 仍然坚持"23:30 枪响时 Vivian 在会客室里"的说法。
    本场指证分两轮：
    - 第一轮：时间线击穿（partial_victory——Rosa 立刻退守，换了更模糊的说法继续维持"Vivian是凶手"）
    - 第二轮：威胁纸条击穿（full_breakthrough，Rosa 崩溃并主动交出弹壳）
    设计核心：第一轮在逻辑上击穿了时间线，但 Rosa 的退守语气（"可能是我记错了"）
    表明她并非真正认错——她需要知道 Zack 真的能保护她和女儿，才会全盘托出。
    第二轮拿出威胁纸条，Rosa 才真正崩溃，说出全部实情。

  # ── 轮次一：时间线击穿（partial_victory → triggers_retreat）──
  round_1:
    lie: "大家都听到了 23:30 的枪响，当晚并没有其他枪响，当时只有 Vivian 在里面，所以只能是她杀的"
    lie_source: 3021001  # Rosa 的谎言证词（清洁间 Talk 阶段已收集）
    usable_evidence:
      - id: 1305
        name: "玻璃碎片（垃圾袋下，有硝烟痕迹）"
        用途: "碎片压在垃圾袋下：玻璃破碎时间早于垃圾袋放置时间（23:20）；碎片有硝烟痕迹：来源于子弹穿窗；结合 Rosa 自己的证言（3021002），证明真实枪击发生在 23:20 之前，不可能是 23:30 的事"
      - id: 3021002
        name: "Rosa 证言：23:20 去外面倒过垃圾"
        用途: "Rosa 自己提供的时间节点：垃圾袋是 23:20 放下的，而玻璃碎片压在垃圾袋下方——玻璃破碎必定早于 23:20，真实枪击不是 23:30"
    result: partial_victory
    triggers_retreat: true
    # partial_victory 说明：
    # 玻璃碎片 + Rosa 自己的证言构成了完整的时间线推理链，
    # Rosa 的"23:30 枪响"说法在逻辑上被击穿。
    # 但 Rosa 不是真正认罪——她立刻退守到新的谎言：
    # "可能是我记错了……那可能是 Vivian 之前就杀了人，反正一定是她杀的。"
    # Rosa 仍然在坚持"Vivian 是凶手"，以退守方式拒绝全面崩溃。
    # 设计意图：体现 Rosa 是受迫于威胁的，她无法在第一轮就彻底放弃，
    # 因为"威胁纸条还在威胁她"——她需要知道 Zack 真的能保护她和女儿，才会全盘托出。
    result_description: |
      玻璃碎片 + 时间节点逻辑击穿了 Rosa 的"23:30 是案发时间"说法。
      Rosa 明显动摇，但随即退守：
      "可能是我记错了……那可能是 Vivian 之前就杀了人，反正一定是她杀的。"（接近崩溃的情绪）
      Rosa 换了一个更模糊的方式继续维持"Vivian是凶手"。
      事件进入第二轮。

  # ── 轮次二：威胁纸条击穿（真正打穿）──
  round_2:
    lie: "可能是我记错了，那可能是 Vivian 之前杀了人，反正一定是她杀的（退守谎言，接近崩溃）"
    lie_source: "NPC 的退守谎言（round_1 结果中 Rosa 主动提出，止损式退守）"
    usable_evidence:
      - id: 1306
        name: "威胁纸条"
        用途: "纸条内容直接证明 Rosa 的'目击证言'是被人威胁说出来的：'11 点半去 Webb 的会客室，说你目击了 Vivian 杀害 Webb，否则我就杀了你女儿。' Rosa 根本不是真正的目击者——她是被指示去说这些话的"
      - id: 1307
        name: "女儿的医疗单"
        用途: "威胁纸条的附件，证明威胁者掌握了 Rosa 女儿的具体病情信息，威胁是真实且有针对性的——Rosa 被迫配合是可信的，她没有理由撒谎"
    result: full_breakthrough
    result_description: |
      威胁纸条 + 女儿医疗单彻底击穿了 Rosa 的最后防线。
      Rosa 崩溃，开始哭泣，说出实情：
      她是被威胁的，那个人知道她女儿的病情，她没有选择。
      她分析：大家都知道 Vivian 经常在晚上给 Webb 送酒，
      所以这个写纸条的人应该是有人刻意嫁祸 Vivian，而且这个人很熟悉酒吧。
      玩家获得关键信息：幕后有人刻意嫁祸，且此人对酒吧内部情况了如指掌。

  # ── 指证后剧情（Rosa 交出弹壳）──
  post_expose:
    description: |
      Rosa 彻底崩溃后，哭着向 Zack 坦白了一切。
      讯问结束时，她从衣服口袋里拿出一个弹壳，
      说这是她在现场捡到的——她保留下来是为了自保，
      如果那个写纸条的人反悔了，她可以用这个去找警察。
      她哀求 Zack 不要对外声张她坦白的事情，担心威胁者会伤害她的女儿。

    new_evidence_gained:
      - id: 1308
        name: "Rosa 给的弹壳"
        type: physical
        pickup: true
        note: "关键（loop4 核心）——Rosa 在现场捡到的一枚弹壳，请求 Zack 保密。loop3 阶段玩家只知'一个弹壳'，不揭示具体型号；loop4 指证 Vivian 时与 Vivian 手枪（1101）对比后锁定为 .45 ACP 警用弹壳，证明凶器不是 Vivian 的 .25 ACP 手枪"
        description: "一枚弹壳，Rosa 称是在 Webb 死亡现场附近拾得。外观普通，无明显品牌标记。（注：loop4 鉴定后确认为 .45 ACP 口径，与 Vivian 的 .25 ACP 手枪不符）"
        metadata:
          cross_loop_critical: true
          loop4_critical: true
          reveal_in_loop: 4
          detail_locked: "具体型号（.45 ACP）在 loop4 通过与 Vivian 手枪 1101 对比后揭示"

    player_knowledge_gained:
      - "Rosa 的'目击'是被威胁伪造的——她不是真正的目击者"
      - "幕后有人刻意嫁祸 Vivian，且此人对酒吧内部情况（Vivian 每晚送酒）了如指掌"
      - "d1003 解锁：真实枪击时间早于 23:20（玻璃碎片+倒垃圾时间线推理），23:30 枪声不是案发时间"
      - "Rosa 给了 Zack 一个她在现场捡到的弹壳（型号待 loop4 确认），请求保密"
      - "Rosa 从'被迫说谎者'变成了 Zack 的潜在协助者——她现在愿意配合"

