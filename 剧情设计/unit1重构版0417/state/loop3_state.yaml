      - "下一步：说服 Vivian 不再认罪——怎么让她开口" # 10
      - "Rosa 给的弹壳——loop4 中如何利用它" # 7

    # ── 3. 可提取证词 ──
    testimony_ids:
      - 3002001  # Emma：时间线谜题已解锁——23:30 是假枪声，真实案发时间更早
      - 3002002  # Emma：说服 Vivian 不认罪是 loop4 的核心目标，弹壳可能是关键突破口

    # ── 4. 鉴赏力 ──
    connoisseur:
      - type: source
        content: "Webb 的日记里贴着'WHALE - DANGER'便利贴——他把那些被他勒索的人称为猎物，自以为是渔夫，却在日记里留下了对自己危险处境的警告。他根本没有想到自己才是被当作鱼饵的那条鱼"
        note: "loop5 消耗：考查玩家是否注意到 Webb 日记中渔夫/鱼饵的隐喻——Webb 的自大与他实际是 Whale 棋子的处境形成反讽；与 loop5 Jimmy 受 Whale 委托的证据链形成闭环"

      - type: quiz
