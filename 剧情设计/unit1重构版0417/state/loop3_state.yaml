# ============================================================
# loop3_state.yaml — Unit1 Loop 3: 自由探索（中）/ 指证 Rosa
# ============================================================
#
# 叙事功能：犯罪现场首次开放 + 时间线谜题核心解锁 + Rosa 击穿（两轮）
# 核心体验：round_1 击破时间线谎言（partial_victory / triggers_retreat），
#           Rosa 立刻退守；round_2 威胁纸条击穿退守谎言（full_breakthrough），Rosa 主动交出弹壳
# Loop 结束：d1003（时间线谜题）解锁；Rosa 由"说谎者"转变为"协助者"；
#           .45 弹壳伏笔埋下（loop4 核心），Jimmy 销毁证据伏笔埋下（loop5）
#
# 事实源：Unit1_大纲-0417.md（剧情设计/unit1重构版0417/Unit1_大纲-0417.md）
# 前序文件：loop1_state.yaml + loop2_state.yaml
# 生成日期：2026-04-17
#
# NPC 编码（沿用规约）：
#   Emma=00, Vivian=01, Rosa=02, Morrison=03, Jimmy=04, Tommy=05, Anna=06
#
# ──────────────────────────────────────────────────────────
# 自检清单（A-G）
# A. 结构完整性   PASS — player_context / opening / scenes / expose / post_expose_scene / doubts / evidence_registry 全部存在
# B. 证据覆盖     PASS — 大纲 loop3 所有证据（13xx 系列 9 件）已分配到场景；弹壳在 post_expose 获得
#                        新增 1309 Webb 的日记（会客室）；1302/1303 改为 environmental/pickup:false
# C. NPC 条目     PASS — Emma/Jimmy/Morrison/Rosa 各含 4 必填块；Rosa 为 Expose 对象（is_liar:true, player_inquiry:null）
# D. 目标对齐     PASS — goals 与大纲"找案发现场疑点，确定 Rosa 是否在说谎"目标一致
# E. 信息节奏     PASS — 未泄露 loop4+（被撕毁合同/Whale 身份/Jimmy 真凶完整证据/Morrison 藏弹壳真相/米勒集团）
#                        .45 弹壳仅给"一个弹壳"，型号 loop4 才确认
#                        1309 Webb 日记中"WHALE-DANGER"首次出现——loop3 只揭示"Webb 知道自己有危险"，
#                        不揭示 Whale 身份/来历/与 Jimmy 关系（loop4-5 才展开），节奏合规
# F. 鉴赏力       PASS — source/quiz 节点完整配对：Morrison 神情异常 source + 2 quiz；1309 新增 source 节点
# G. Expose 逻辑  PASS — round_1 有玻璃碎片+Rosa 证言（时间线推理），result=partial_victory；
#                        round_2 有威胁纸条+女儿医疗单，result=full_breakthrough
# ──────────────────────────────────────────────────────────
#
# validation_status: PASS
# ============================================================

# ─────────────────────────────
# 一、玩家视角
# ─────────────────────────────

player_context:
  goals:
    primary: "找到案发现场（会客室）内的疑点，确认 Rosa 的时间线指控是否在撒谎"
    secondary:
      - "犯罪现场（会客室）首次开放——搜寻 Rosa 谎言的物证"
      - "重新核查所有人的时间节点，寻找 23:30 枪声不是真正案发时间的证据"
      - "了解案发现场窗户玻璃碎片的来源"

  known_facts:
    # loop1 + loop2 post_expose_knowledge 全部累积，
    # 加上 loop2 指证 Tommy 后 post_expose 中建立的事实
    - "Webb 已经死亡（Morrison 宣告），死亡地点：蓝月亮酒吧二楼会客室"
    - "Vivian 手持手枪在现场，但该枪无硝烟反应——她不是刚刚开枪的那个人"
    - "23:30 众人听到枪响，Zack 和 Emma 从一楼冲上二楼"
    - "Webb 提前雇佣 Zack：合同包含保护 Vivian + 确保其继承遗产的协议"
    - "Rosa 的谎言1（Vivian 刚刚开枪）被推翻，她的整体可信度存疑"
    - "Rosa 的谎言2（23:30 枪声 + 只有 Vivian 在场）在 loop1 无法反驳——时间线悬而未决"
    - "Webb 委托协议书证明 Webb 早知自己有被害风险（保险倾向）"
    - "Morrison 同意给 Zack 72 小时调查期，暂缓逮捕 Vivian"
    - "Emma 指出核心疑点：Webb 真正怀疑的凶手到底是谁？"
    - "Webb 的酒吧除私酒之外在做敲诈勒索生意"
    - "Tommy 曾经是敲诈勒索生意的执行人，但自从 11 月中旬 Webb 沉迷 Rita 后就不再执行了"
    - "11 月中旬之后，酒吧的勒索执行人换了——不是 Tommy（具体是谁未知）"
    - "Tommy 认为 Webb 勒索惹上了大人物，想要转移财产跑路——他对这个大人物是谁心中有猜测但未点名"
    - "Vivian 曾被 Webb 要求协助勒索中产人士（仙人跳变体），她对此十分憎恨"
    - "Vivian 平时在 23:30 给 Webb 送酒（时间节点确认）"
    - "Jimmy 是兼职主厨，有很多副业，但经济困难，对 Webb 的死有隐藏的愧疚"
    - "新疑点（d1004）：Webb 的勒索执行人换成了谁？那个大人物是谁？"

  new_directions:
    - direction: "进入会客室犯罪现场——首次开放，搜寻被忽视的物证"
      trigger: "loop2 末 Emma 提出：Rosa 的时间线说法一直没能反驳，需要重新检查案发现场"
    - direction: "调查 Morrison 勘验现场后的信息：子弹缺失是怎么回事"
      trigger: "Morrison 在大厅主动提及'子弹缺失'（loop3 新增信息）"
    - direction: "重新审视 Rosa——她被威胁的可能性"
      trigger: "Vivian 认为 Rosa 可信度低 + 大厅 Morrison 证言中隐藏的异常"

  post_expose_knowledge:
    # loop3 指证 Rosa 完整击穿后玩家获得的新知识
    - "玻璃碎片压在垃圾袋下（有硝烟痕迹）——玻璃破碎早于 23:20（Rosa 倒垃圾时间）"
    - "Rosa 23:20 去外面丢过垃圾——垃圾袋放下之前玻璃就碎了，真实枪击时间早于 23:30"
    - "d1003 解锁：23:30 的枪声不是真正的案发时间，另有更早的真实枪击发生"
    - "Rosa 是被威胁的——威胁纸条：'11 点半去 Webb 的会客室，说你目击了 Vivian 杀害 Webb，否则我就杀了你女儿'"
    - "威胁者是刻意嫁祸 Vivian 的人，且此人很熟悉酒吧（大家都知道 Vivian 每晚送酒）"
    - "Rosa 给了 Zack 一个她在现场捡到的弹壳（型号待 loop4 确认），请求 Zack 不要声张"
    - "Rosa 从'被迫说谎者'转变为'协助者'——她本人也是受害者"
    - "Webb 的日记中亲笔写着 WHALE - DANGER 的便利贴——'WHALE'这个名字首次以书面形式出现在玩家视野中（此前只有 Tommy 的口头暗示'大人物'）；Webb 的自注表明他清楚自己是被利用的鱼饵，而非渔夫"
    - "d1002 进展：Whale 从'Tommy 的猜测'升级为'Webb 日记亲笔提及'——但 Whale 的具体身份与来历仍未揭示"

# ─────────────────────────────
# 二、开篇（Emma 目标设定对话）
# ─────────────────────────────

opening:
  type: story_dialogue  # 🎭 剧情对话，设定 loop3 调查目标
  location: "蓝月亮酒吧某处（Zack 和 Emma 对话）"
  description: |
    loop2 指证 Tommy 结束后，Zack 向 Emma 汇报。
    Emma 帮助 Zack 明确 loop3 的方向：
    Morrison 已经完成现场勘验，会客室即将开放——
    目标是找到案发现场内的疑点，以确定 Rosa 到底有没有在说谎。

  emma_005:
    # ── 基本信息 ──
    talk: emma_005
    is_liar: false
    motive: "整合 loop2 调查结果，帮助 Zack 设定 loop3 调查重心；对 Rosa 时间线的持续怀疑"
    mindset: "清醒、聚焦，对'案发现场还有被忽视证据'充满期待"

    # ── 1. NPC 已知信息（Emma 特殊模式 C）──
    knows:
      - "Tommy 的指证结果：Webb 做勒索生意，执行人已换人（不是 Tommy）"
      - "Rosa 的时间线谎言仍未击破"
      - "Morrison 的现场勘验完成，会客室即将重新开放"
      - "Tommy 暗示 Webb 惹上了大人物想跑路"
      - "Vivian 被禁足，仍处于认罪状态"
    does_not_know:
      - "Rosa 收到了威胁纸条（loop3 才揭示）"
      - "案发现场窗户的玻璃碎片情况"
      - "Morrison 勘验时发现子弹缺失（loop3 才得知）"
      - "Jimmy 正在销毁《芝加哥狂想曲》鼓点单子"
    lie: null

    # ── 2. 玩家询问意图 ──
    player_inquiry:
      - "loop2 结果整合：勒索生意执行人换人，下一步调查方向" # 7
      - "为什么要进入犯罪现场——Rosa 的时间线谎言可能需要物证支撑" # 9
      - "Morrison 已经勘验完——他有没有说什么异常的情况" # 6

    # ── 3. 可提取证词 ──
    testimony_ids:
      - 3001001  # Emma：现在要找的是案发现场内的疑点，验证 Rosa 的时间线说法
      - 3001002  # Emma：如果 Rosa 是在撒谎，案发现场应该有没有被发现的证据

    # ── 4. 鉴赏力 ──
    connoisseur:
      - type: quiz
        node: "#emma_005_04"
        question: "Tommy 在 loop2 指证后，对'大人物'的暗示是什么样的态度？"
        answer: "他说这句话时神情异常，像是心中有猜测但不敢说出来——意味着这个大人物比普通商界人物更危险（来源：loop2 emma_004 connoisseur source）"
        note: "考查玩家是否记住了 Tommy 说话时的异常神情，引导其后续追问 Whale 的身份"

# ─────────────────────────────
# 三、场景（🔓 自由探索）
# ─────────────────────────────

scenes:
  # ── 场景 S301：厨房 ──
  - id: s301
    name: "厨房"
    type: free_exploration  # 🔓 自由探索
    description: |
      ⚡ 突发事件：Jimmy 正在处理整个酒吧里所有的《芝加哥狂想曲》鼓点单子。
      Zack 意外撞见，只来得及抢到碎片——鼓点单子大部分已被销毁。
      碎片上信息残缺，只显示"鼓点很响"。
      Jimmy 对问到勒索相关的话题时，声称自己只是兼职主厨。

    evidence:
      - id: 1301
        name: "《芝加哥狂想曲》鼓点单子碎片"
        type: document
        pickup: true
        note: "场景道具（loop5 伏笔）——信息残缺，只显示'鼓点很响'；loop5 与完整单子拼接后揭示真实案发时间线"
        description: "被撕碎的乐谱碎片，印有《芝加哥狂想曲》字样，可辨认内容仅有标注'高潮鼓点很响'的字迹。大部分内容已无法还原"

    npcs:
      jimmy_002:
        # ── 基本信息 ──
        talk: jimmy_002
        is_liar: false
        # 注：Jimmy 是 loop5 的 Expose 对象。loop3 中他只是紧张地销毁证据，不暴露真实身份。
        # 鼓点单子销毁是⚡突发事件，玩家只能看到他在销毁，不能拿到完整版。
        motive: "销毁关键证据，维持'普通兼职厨师'的掩护身份；对玩家的询问保持低调"
        mindset: "紧张但伪装镇定；被抓到销毁单子时措手不及，迅速用'工作需要'掩饰"

        # ── 1. NPC 已知信息（模式 B：后续出场，引用知识池）──
        # 知识池见 npc_knowledge_pools.yaml → jimmy（Unit1 Jimmy 知识池，建立于 loop2_state.yaml）
        #
        # loop2 建立的知识池摘要（参见 loop2_state.yaml，s202 jimmy_001 注释块）：
        #   identity: 爱尔兰裔移民、兼职主厨、妻子 Anna 怀孕需要一大笔钱
        #   crime（loop5 才展示）: 23:00-23:05 枪杀 Webb、模仿 Webb 声音骗走 Vivian、
        #                          23:30 鸣假枪声、接受 Whale 委托、威胁 Rosa 纸条（倒写 J）

        awareness:
          - content: "Zack 一行人在调查 Webb 的生意，且已经指证了 Tommy——调查正在推进"
            trigger: "loop2 指证 Tommy 之后，酒吧内人人知道 Zack 在追查勒索生意"
          - content: "Zack 撞见了自己销毁鼓点单子的行为"
            trigger: "loop3 厨房突发事件（⚡）"

        active_topics:
          - "兼职主厨身份（口头强调：自己只是个厨师）"
          - "对鼓点单子的掩饰说法（工作需要/不重要之类）"
          # loop3 中 Jimmy 的勒索话题被他主动回避
        withheld_topics:
          - "爱尔兰裔身份和口音特征"  # loop5 关键破绽
          - "Anna 怀孕细节"  # loop5 揭示
          - "接受 Whale 委托的细节"  # loop5 揭示
          - "真实案发时间线（23:00-23:05 枪声）"  # loop5 核心
          - "威胁 Rosa 的纸条是他写的"  # loop5 揭示
          - "鼓点单子与真实案发时间的关联"  # loop5 关键（loop3 玩家只知"鼓点很响"，无法推理）
          - "给 Whale 的回信"  # loop5 揭示

        # ── 2. 玩家询问意图 ──
        player_inquiry:
          - "Jimmy 在销毁鼓点单子——这是什么，为什么要销毁" # 9
          - "Jimmy 和 Webb 勒索生意有关系吗（d1004 驱动）" # 6
          - "Jimmy 对 Webb 的死有愧疚感——他还是兼职主厨吗" # 5

        # ── 3. 可提取证词 ──
        testimony_ids:
          - 3041001  # Jimmy：自己只是一个兼职主厨，和勒索的事没有关系
          - 3041002  # Jimmy（紧张掩饰）：销毁单子是工作需要，没什么特别的

        # ── 4. 鉴赏力 ──
        connoisseur:
          - type: source
            content: "Jimmy 被抓到销毁鼓点单子时，措手不及的紧张反应——与一个'普通厨师处理不重要文件'的淡定完全不符"
            note: "后续 loop5 考题：Jimmy 在 loop3 为什么要销毁《芝加哥狂想曲》鼓点单子（真实案发时间线的关键）"

  # ── 场景 S302：大厅 ──
  - id: s302
    name: "大厅"
    type: free_exploration  # 🔓 自由探索
    description: |
      Morrison 刚完成犯罪现场勘验，在大厅等候。
      Zack 可以从他口中得知子弹缺失的情况，以及他对 Webb 尸体伤口的描述。
      ⚠️ 设计注意：Morrison 说"子弹缺失"在技术上不算撒谎（确实缺失了），
      但实际原因是他自己藏起来的（loop6 才揭示）。
      loop3 玩家只把这当作普通现场信息，不应在此阶段揭示 Morrison 藏证据。

    evidence: []  # 大厅无可拾取证据

    npcs:
      morrison_002:
        # ── 基本信息 ──
        talk: morrison_002
        is_liar: false
        # 注：Morrison 说"子弹缺失"是事实陈述（确实缺失），但他省略了"被我藏起来"的原因。
        # 这不构成谎言（他没有说错），但在 testimony_ids 和 connoisseur 中要做特殊标注。
        motive: "向 Zack 汇报勘验结果，维持尽职警官的形象；刻意不提子弹去向"
        mindset: "表面权威、职业，说到'子弹缺失'时措辞刻意简单，不给 Zack 追问的空间"

        # ── 1. NPC 已知信息（模式 B：后续出场，引用知识池）──
        # 知识池见 npc_knowledge_pools.yaml → morrison_unit1（Unit1 Morrison 知识池，建立于 loop1_state.yaml）
        #
        # loop1 建立的 Unit1 morrison 知识池摘要（参见 loop1_state.yaml，s101 morrison_001 注释块）：
        #   - Webb 已死，Webb 是蓝月亮酒吧老板
        #   - 现场 Vivian 持枪，Rosa 声称目击
        #   - 他自己与 Whale（米勒集团）有借贷关系（loop5-6 才揭示）
        #   - 他看到 .45 弹壳会脸色一变（loop4/5 触发）
        #   - 他打算快速结案，锁定 Vivian
        #   - 他藏了 .45 弹壳（loop6 才揭示，玩家现在不知道）

        awareness:
          - content: "已完成会客室现场勘验，发现子弹缺失，尸体伤口情况已确认"
            trigger: "loop3 开篇 Morrison 完成勘验"
          - content: "Zack 已经指证了 Tommy，调查推进超出了他预期的范围"
            trigger: "loop2 指证 Tommy 的结果（酒吧内人人皆知）"

        blind_spots_L3:
          - "藏弹壳一事——loop3 玩家无法发现，loop6 才揭示（玩家只知子弹缺失，不知被谁拿走）"

        active_topics:
          - "勘验结果：子弹缺失（现场无子弹，Morrison 不解释原因）"
          - "尸体伤口状况（口述）"
          - "会客室现在可以进入了"
        withheld_topics:
          - "他藏了 .45 弹壳的事实"  # loop6 才揭示
          - "与 Whale / 米勒集团的借贷关系"  # loop5-6 才揭示
          - "他为何急于结案的真实动机"  # loop5-6 才揭示

        # ── 2. 玩家询问意图 ──
        player_inquiry:
          - "Morrison 勘验完现场——他发现了什么异常（子弹缺失是什么意思）" # 8
          - "尸体伤口状况——能确认案发时间、凶器类型吗" # 7
          - "会客室现在可以进去了吗" # 9

        # ── 3. 可提取证词 ──
        testimony_ids:
          - 3031001  # Morrison 口述：现场勘验完成，会客室现在开放
          - 3031002  # Morrison 口述：子弹缺失——现场没有找到子弹（不解释原因）
          - 3031003  # Morrison 口述：尸体伤口状况（枪伤位置、大致口径特征等描述性信息）

        # ── 4. 鉴赏力 ──
        connoisseur:
          - type: source
            content: "Morrison 说'子弹缺失'时，语气过于简短——像是有意不让对话深入。一般警官会对'找不到子弹'这件异常情况多做解释"
            note: "loop5/6 消耗：Morrison 说这话时神情异常——为什么子弹会'缺失'？（伏笔：被他自己藏起来了，loop6 才揭示）"

  # ── 场景 S303：犯罪现场（会客室）——本 Loop 首次开放 ──
  - id: s303
    name: "犯罪现场（二楼会客室）"
    type: free_exploration  # 🔓 自由探索（首次开放）
    description: |
      Webb 死亡的案发现场，本 Loop 首次对玩家开放。
      Morrison 完成勘验后离开，Zack 可以独立搜证。
      关键发现：没有玻璃的窗户——Zack 向楼下窥探，
      见到垃圾袋正压在碎玻璃上。需要下楼取回玻璃碎片。
      会客室内还有 Webb 的日记（含 WHALE-DANGER 便利贴）、保险箱字条等。
