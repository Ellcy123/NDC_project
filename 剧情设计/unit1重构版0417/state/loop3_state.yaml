        acquisition_note: "Zack 从没有玻璃的窗户向楼下窥探，发现垃圾袋压在碎玻璃上，下楼后可拾取"

    npcs: {}  # 会客室搜证阶段无 NPC 驻场

  # ── 场景 S304：清洁间 ──
  - id: s304
