  time: "晚上8点左右（呼应 1502 信件约定时间）"
  description: |
    Zack 和 Emma 返回酒吧，带齐了证据。
    Zack 决定：直接找 Jimmy，要求他跟自己去警局，
    指证他是 Webb 案的真正凶手，以此证明 Vivian 的清白。
    Emma 表示支持——她和 Zack 一起行动。

    两人来到蓝月亮酒吧后门。

    开场状态（暗示性叙事，非直接展示）：
    Jimmy 刚刚结束了和 Whale 手下的秘密交易——尾款结清。
    Zack 和 Emma 抵达时只能见到 Jimmy 的人影，以及他手中提着的装有钱的手提箱。
    场景光线昏暗，交易刚刚落幕的气息尚未散去。

    Jimmy 看见 Zack 和 Emma 出现，身形微微一僵。

  hidden_npcs:
    # Whale 的手下此时潜伏于暗处——玩家不可见，但影响叙事氛围
    - role: "Whale 的手下（复数）"
      visibility: hidden  # 玩家视角完全不可见
      presence_mode: "环境暗示——灯影、脚步声、后门另一侧隐约的呼吸声"
      narrative_function: |
        Whale 的手下作为不可见的背景存在，影响 Jimmy 的情绪反应：
        Jimmy 知道他们就在附近，他在 Zack 面前的每一个字都暴露在 Whale 的眼皮底下。
        这是 Jimmy 情绪紧张（而非单纯心虚）的根本原因。
        他们的存在将在 round_3 结束时通过"鸣笛"正式提示——那一声哨声是给 Jimmy 的信号：
        事情已经败露，无法挽回。
      trigger_event: "round_3 结束（Zack 提到 Whale 名字）→ 手下鸣笛（whistle）"

  design_note: |
    ⚠️ Zack 和 Emma 的闯入，等同于在 Whale 手下面前公开宣告了 Jimmy 的身份。
    这一场景是 Jimmy 最终自杀的叙事前提：
    他知道，指证一旦开始，无论结果如何，自己都已无法保全 Anna。
    唯一的出路，是在彻底暴露之前，用死亡切断所有通向 Whale 的线索。

