suspect_suicide_sequence:
  type: forced_cutscene  # 🎬 强制剧情，无玩家操作
  location: "蓝月亮酒吧后门（与 arrest_cutscene 同一地点）"
  description: |
    【Jimmy 自杀序列】

    1. 暴露时刻（round_3 结束）：
       Zack 和 Emma 指证 Jimmy 的整个过程，等同于在 Whale 手下面前
       公开宣告：Jimmy 和 Whale 的关系、Jimmy 接受的委托、整桩案件的内幕——
       这一切在这一刻都暴露给了"不该知道的人"（也就是说，Whale 知道了 Jimmy 已暴露）。

    2. 鸣笛（round_3 → round_4 之间，Zack 说出 Whale 名字后）：
       ⚠️ 注意：这里是"鸣笛（whistle）"，不是"枪响（gunshot）"。
       来自酒吧后门暗处的一声哨声——那是 Whale 手下给 Jimmy 的信号，
       意思是：事情败露，无法挽回。
       Jimmy 知道这意味着什么：Whale 不会放过知情者，而 Anna 和孩子就是最脆弱的目标。
       这一声鸣笛触发 Jimmy 的崩溃，进入 round_4 的发疯状态。

    3. round_4 完成——Jimmy 的最后选择：
       Zack 点出"威胁 Rosa 的也是你"+ 字迹三物（1306 + 1401 + 1505）。
       Jimmy 的心理防线彻底归零。
       他没有再开口辩解——看了一眼暗处的方向（Whale 手下所在位置），
       明白了一件事：自己已经彻底暴露，不只是对 Zack，也是对 Whale。
       暗处的威胁已经形成——Anna 是危险的。
       为了保护 Anna 和未出生的孩子，Jimmy 做出了最后的选择。
       他拔出了那把曾经杀死 Webb 的米勒集团特制手枪，开枪自杀。
       死前，他看向 Zack 和 Emma，说出了最后的话——
       将 Anna 托付给他们（"请……帮我照顾她"）。

    4. 现场遗留：
       Jimmy 的尸体旁，留下了那把米勒集团特制手枪（1507）——
       那把枪，曾经在 23:00 杀死了 Webb，
       现在又杀死了使用它的人。

