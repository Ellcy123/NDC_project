# C. NPC 条目     PASS — Vivian/Jimmy/Tommy/Emma 各含 4 必填块；Tommy 为 Expose 对象（is_liar:true, player_inquiry:null）
# D. 目标对齐     PASS — goals 与大纲"调查 Webb / 指证 Tommy"目标一致
# E. 信息节奏     PASS — 未泄露 loop3+(玻璃碎片/Rosa纸条/弹壳/Whale细节/Jimmy真凶/米勒集团)；"大人物"仅暗示未点名；11:10 Vivian 时间线细节保留至 loop4
