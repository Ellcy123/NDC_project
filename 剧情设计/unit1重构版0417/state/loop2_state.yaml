expose:
  target: tommy
  target_talk: tommy_expose_001
  is_liar: true
  player_inquiry: null

  context: |
    Zack 完成自由探索后，从 Vivian 处得知 Webb 曾强迫她协助勒索他人，
    据此对 Tommy 关于酒吧生意的陈述发起指证。
    Tommy 将从"只有私酒"→"质疑证据来源、声称账目清白"→"还有古董买卖"→"只是记账"四层退守，
    最终在客户记录笔迹面前无法狡辩。
    前提：玩家在 S201 必须已从 Vivian 获取证言 2011002，才能进入 round_1 指证。

  # ── 轮次一：击破"只有私酒"——用 Vivian 证言 ──
  round_1:
    lie: "酒吧里只有私酒生意，没有干别的"
    lie_source: 2051001  # Tommy 的谎言证词（Talk 阶段已收集）
    usable_evidence:
      - id: 2011002
        name: "Vivian 证言：因为 Webb 一直让她去勒索别人，她恨他"
        用途: "Vivian 亲身经历证明 Webb 强迫她参与勒索，酒吧生意绝不只是私酒"
    result: |
      Tommy 被 Vivian 的亲身证言打了个措手不及，无法否认 Webb 让 Vivian 参与勒索一事。
      但他立刻转移焦点，退守到新的防线（谎言2）：
      "你有证据吗？一个歌女的话算什么——酒吧里的账目都是清清白白的。"

  # ── 轮次二（新增）：击破"账目清白"——用账目差额 ──
  round_2:
    lie: "你有证据吗，一个歌女的话算什么，酒吧里的账目都是清清白白的"
    lie_source: "NPC 新谎言（被 Vivian 证言击破后的退守，Expose 中 Tommy 主动提出）"
    usable_evidence:
      - id: 1205
        name: "Webb 个人收入记录（月收入 $15,000）"
        用途: "Webb 每月收入 $15,000，但酒吧账本显示月净只有 $4,000，差额 $11,000 无法用私酒解释"
      - id: 1206
        name: "酒吧收入账本（月净 $4,000）"
        用途: "配合 1205 使用——酒吧正式账面利润远低于 Webb 的实际收入，两者差额巨大，账目根本不'清白'"
    result: |
      Tommy 无法解释巨大差额，被迫承认还有别的生意来源。
      他立刻转移话题，提出新的止损说法（谎言3）：
      "我们还做古董买卖——花瓶我卖给了 Thompson，油画卖给了 Coleman，都已经卖出去了。"

  # ── 轮次三：击破"古董已卖出"——用现场实物 ──
  round_3:
    lie: "还有古董买卖——花瓶卖给了 Thompson，油画卖给了 Coleman……都已经卖出去了"
    lie_source: "NPC 的新谎言（Expose 中 Tommy 主动提出，止损式退守）"
    usable_evidence:
      - id: 1209
        name: "假油画（仍在歌舞厅墙上）"
        用途: "油画仍然挂在歌舞厅——根本没有卖出去，Tommy 的说法是谎言"
      - id: 1210
        name: "花瓶现场照（仍在原位）"
        用途: "案发当晚拍摄的现场照片清晰显示花瓶仍在原处——同样没有卖出"
    result: |
      Tommy 的"古董买卖"说法被当场击穿。
      他神色越来越慌，再次退守到最后一道防线（谎言4）：
      "好，我承认还有其他生意……但我只是按 Webb 指示记账，不参与具体业务——那本客户记录不是我写的。"

  # ── 轮次四：击破"只是记账"——用笔迹证据 ──
  round_4:
    lie: "我只是按 Webb 指示记账，不参与其他具体业务"
    lie_source: "NPC 的新谎言（Expose 中 Tommy 主动提出，最后一道防线）"
    usable_evidence:
      - id: 1207
        name: "不明记录人的客户记录（笔迹 = Tommy）"
        用途: "通过笔迹分析，客户记录上的笔迹与 Tommy 本人笔迹高度一致——他是亲手记录的，不是'按指示'的旁观者"
    result: |
      Tommy 无法辩驳笔迹，彻底承认。
      他的防线崩溃，开始主动补充信息：
      - 他确认 Webb 的酒吧在做敲诈勒索生意，自己曾是执行人
      - 自从 11 月中旬 Webb 沉迷 Rita 之后，他就不再做勒索了
      - 他以同情语气提到：虽然别人（暗指 Vivian）可能觉得是沉迷美色，
        但他认为 Webb 是因为勒索惹上了某个大人物，想转移财产跑路
      - 说这句话时，他的神情暗示他对那个大人物是谁心中有猜测，但未点名

  # ── 指证后剧情 ──
  post_expose:
    description: |
      Tommy 承认勒索生意存在，并暗示 Webb 惹上了大人物想跑路。
      Zack 获得关键信息：当前执行人不是 Tommy，而是另有其人（loop2 未点名）。
      这将成为 loop3 继续调查的核心驱动——Rosa 的时间线谎言 + 幕后执行人是谁。
    new_evidence_gained: null
    player_knowledge_gained:
      - "Webb 的酒吧在做敲诈勒索生意（已确认）"
      - "Tommy 是曾经的执行人，11 月中旬之后不再执行"
      - "现在的执行人不是 Tommy——另有其人（loop2 未确认是谁）"
      - "Webb 可能因勒索惹上了大人物，想转移财产跑路（Tommy 心中有猜测但未点名）"

