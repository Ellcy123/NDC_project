  description: |
    loop1 结束时 Zack 和 Emma 在大门口梳理完思路——Emma 提出"Webb 真正怀疑的凶手是谁"。
    loop2 开篇：两人重新进入酒吧，开始逐一调查酒吧内的每个人。
    Morrison 仍在场，Vivian 被要求不得离开，Rosa 在清洁间。
    玩家现在进入自由探索模式。

  emma_003:
    # ── 基本信息 ──
    talk: emma_003
    is_liar: false
    motive: "作为搭档帮助 Zack 聚焦调查方向；对真相的坚守驱使她深入"
    mindset: "清醒而坚定，已完成 loop1 的目标定向，开始推进实质调查"

    # ── 1. NPC 已知信息（Emma 特殊模式 C）──
    knows:
      - "Vivian 的枪无硝烟反应，Rosa 谎言1已被击穿"
      - "Rosa 的时间线谎言（谎言2）无法反驳，时间线真相悬而未决"
      - "Webb 的委托协议书：保护 Vivian + 确保继承遗产（保险倾向）"
      - "Morrison 同意 72 小时调查期"
      - "Webb 雇佣合同的保险倾向——他预感到自己会死"
      - "下一步方向：调查 Webb 这个人——向酒吧内每个人问 Webb 的情况"
    does_not_know:
      - "Rosa 收到威胁纸条的事"
      - "Jimmy 对 Webb 有愧疚感"
      - "酒吧收入和 Webb 个人收入的差额"
      - "Tommy 在酒吧生意中扮演的角色"
      - "Vivian 曾被迫协助勒索"
    lie: null

    # ── 2. 玩家询问意图 ──
    player_inquiry:
      - "loop1 结束后的方向确认：为什么要调查 Webb 本人而不是追 Rosa" # 8
      - "Emma 对今晚舞会和 Webb 的印象——她有没有观察到什么" # 5

    # ── 3. 可提取证词 ──
    testimony_ids:
      - 2001001  # Emma：两人进入酒吧，开始调查——确认 loop2 调查目标
      - 2001002  # Emma：如果 Webb 预感到自己会死，他怀疑的人一定在酒吧里

    # ── 4. 鉴赏力 ──
    connoisseur:
      - type: quiz
        node: "#emma_003_04"
        question: "loop1 的委托协议书里，除了保护 Vivian，还有什么特别的条款让 Emma 觉得 Webb '有保险倾向'？"
        answer: "协议书要求 Zack 确保 Vivian 在 Webb 死后能顺利继承遗产——Webb 雇佣合同时已经预想到自己会死（来源：loop1 1103 证据）"
        note: "考查玩家是否从 loop1 带来了对'保险倾向'的理解，引导进入 loop2 的调查动机"

