doubts:
  - id: d1001
    text: "Rosa 声称目击 Vivian 在 23:30 杀死 Webb——但她的话可信吗？她真的目击了吗？"
    unlock_condition: |
      需要至少两种信息交叉验证：
      1. Vivian 手枪无硝烟反应（物证：1101）——推翻"刚刚开枪"
      2. Rosa 谎言1 被击穿（loop1 Expose 结果）——她已说过一个谎，整体可信度存疑
    status: "unlocked_after_loop1_expose"  # loop1 已解锁，loop2 继承

  - id: d1002
    text: "Webb 真正怀疑的凶手是谁？他为何提前立协议、紧急雇佣侦探？"
    unlock_condition: |
      需要两种信息：
      1. Webb 委托协议书（1103）——保险倾向
      2. Emma 的分析（1002001 + 1002002）——外部视角确认异常
    status: "unlocked_after_loop1_post_expose"  # loop1 已解锁，loop2 继承

  - id: d1003
    text: "23:30 的枪声真的是案发时间吗？是否有另一把枪——另一个时间节点？"
    posed_condition: |
      loop2 阶段此疑点被正式提出，来源于以下信息：
      1. Tommy 证言（2051002）：11:30 枪声来自厨房和会客室所在的酒吧南方——暗示方向/来源可能有蹊跷
      2. Webb 个人收入记录+酒吧账本（指证 Tommy 后确认勒索生意）——凶手可能早有预谋在特殊时机作案
      3. Vivian 证言（2011003）：平时 11:30 给 Webb 送酒——"23:30 就是案发时间"变成需要核实的假设
      玩家此时提出怀疑，但无法解决——解决需 loop3 的玻璃碎片 + Rosa 倒垃圾时间线证据。
