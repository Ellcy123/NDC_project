# ─────────────────────────────

player_context:
  goals:
    primary: "调查 Webb 为何如此紧急雇佣侦探——他究竟怀疑谁会杀他？酒吧里在做什么生意？"
    secondary:
      - "向酒吧里每个人询问 Webb 的情况"
      - "理解 Vivian 为何选择认罪而不自辩"
      - "揭穿 Tommy 关于酒吧生意的谎言"

  known_facts:
    # loop1 post_expose_knowledge 全部累积到此处 + loop1 指证后剧情所建立的事实
    - "Webb 已经死亡（Morrison 宣告），死亡地点：蓝月亮酒吧二楼会客室"
    - "Vivian 手持手枪在现场，但该枪无硝烟反应——她不是刚刚开枪的那个人"
    - "23:30 众人听到枪响，Zack 和 Emma 从一楼冲上二楼"
    - "Webb 提前雇佣 Zack：合同包含保护 Vivian + 确保其继承遗产的协议"
    - "Rosa 的谎言1（Vivian 刚刚开枪）被推翻，她的整体可信度存疑"
    - "Rosa 的谎言2（23:30 枪声 + 只有 Vivian 在场）在 loop1 无法反驳——时间线悬而未决"
    - "Webb 委托协议书证明 Webb 早知自己有被害风险（保险倾向）"
    - "Morrison 同意给 Zack 72 小时调查期，暂缓逮捕 Vivian"
    - "Emma 指出核心疑点：Webb 真正怀疑的凶手到底是谁？"
    - "Webb 雇佣合同体现'保险倾向'——他提前规划了 Vivian 的继承权"

  new_directions:
    - direction: "调查 Webb 的酒吧在做什么生意"
      trigger: "Webb 月收入 $15,000 vs 酒吧账面只有 $4,000，差额来源不明"
    - direction: "调查 Vivian 为何选择认罪"
      trigger: "Vivian 沉默不反驳、心如死灰——她在隐瞒什么？"
    - direction: "调查 Jimmy 与 Webb 的关系"
      trigger: "Jimmy 对 Webb 的死有隐藏的愧疚——不寻常"
    - direction: "调查 Tommy 关于酒吧生意的陈述是否诚实"
      trigger: "Tommy 声称酒吧只做私酒，但 Webb 的收入记录显示更多"

  post_expose_knowledge:
    # Tommy 指证结束后玩家确认的信息
    - "Webb 的酒吧除私酒之外在做敲诈勒索生意"
    - "Tommy 曾经是敲诈勒索生意的执行人，但自从 11 月中旬 Webb 沉迷 Rita 后就不再执行了"
    - "11 月中旬之后，酒吧的执行人换了——不是 Tommy（暗示另有其人，但 loop2 未明确点名）"
    - "Tommy 认为 Webb 勒索惹上了大人物，想要转移财产跑路——他对这个大人物是谁心中有猜测但未点名"
    - "Vivian 曾被 Webb 要求协助勒索中产人士（仙人跳变体），她对此十分憎恨"
    - "Vivian 平时在 23:30 给 Webb 送酒（时间节点确认）"
    - "Jimmy 是兼职主厨，有很多副业，但经济困难，对 Webb 的死有隐藏的愧疚"
    - "新疑点：Webb 的勒索执行人换成了谁？那个大人物是谁？"

