opening:
  type: cutscene  # 🎬 硬切，无玩家操作
  location: "蓝月亮酒吧外 / 深夜街头"
  description: |
    Jimmy 自杀后的片刻沉默。
    Emma 和 Zack 两人在夜色中整理思路——指证 Jimmy 已经完成，
    真正的凶器（1507）在手，Jimmy 与 Whale 的回信（1502）也在手。
    但 Vivian 依然被关在警局，而那道锁还有一个名字：Morrison。
    Emma 说出了接下来的计划：
    利用 Emma 的记者身份，Zack 以 Emma 助理的假身份，
    以采访为由进入 Morrison 的住所——Morrison 不在家（在警局值班），
    但两人需维持身份不被识破，才能完成搜查。
    先去 Morrison 家——他夺走的弹壳一定就藏在那里，
    他与 Whale 的关联也可能留有记录。
    然后去警局，直接走进 Morrison 的办公室，单独面对他，一件一件把证据摆出来。

  emma_011:
    # ── 基本信息 ──
    talk: emma_011
    is_liar: false
    motive: "与 Zack 共同制定 loop6 作战策略——她是这个计划的提案人，也是执行中的搭档"
    mindset: "Jimmy 自杀的震撼仍未消散，但理智和使命感让她保持着冷静；她比 Zack 更清楚接下来每一步的推演"

    # ── 1. NPC 已知信息（Emma 特殊模式 C）──
    knows:
      - "Jimmy 是真凶，1507 是真凶器，1502 直接连接 Jimmy 与 Whale——这三件事已经完全确认"
      - "Morrison 看到 .45 弹壳脸色一变，夺走弹壳（1308），意味着他有意压案——他是最后的阻碍"
      - "Morrison 夺走的 1308 弹壳一定就藏在他家里——他不会销毁它（销毁物证的风险比藏着更大）"
      - "仅凭 1507 和 1502 就足以向 Morrison 证明 Vivian 无罪，但要让 Morrison 认罪，还需要证明他与 Whale 的关系"
      - "策略：去 Morrison 家，同时寻找弹壳和财务记录——然后去他办公室，单独对质，让他在证据面前无法侥幸"
      - "Anna 和孩子需要保护——Jimmy 把她们托付给了我们"
    does_not_know:
      - "Whale 会亲自打来电话（loop6 突发事件，此刻还未发生）"
      - "Morrison 具体欠了多少赌债、欠债对象是谁（Morrison 家搜证后揭示）"
      - "保险箱里的南区计划具体内容（ending_sequence 才揭示）"
    lie: null

    # ── 2. 玩家询问意图 ──
    player_inquiry:
      - "搜查 Morrison 家：我们要找什么——弹壳和什么类型的财务记录" # 10
      - "去警局的策略：为什么选择单独进办公室对质，而不是公开质问" # 9
      - "Anna 的安置——她现在怎么办，我们能保护她吗" # 7
      - "Emma 对于接下来的危险有没有担心——Whale 会不会已经盯上了我们" # 8

    # ── 3. 可提取证词 ──
    testimony_ids:
      - 8026001  # Emma：Morrison 夺走弹壳不是要销毁它——他是要藏起来，因为那枚弹壳也是对他的威胁
      - 8026002  # Emma：我们要单独进他办公室、把所有证据一件一件摆到他眼前——在只有他和我们三个人的空间里，他没有表演对象，也没有同僚给他台阶

    # ── 4. 鉴赏力 ──
    connoisseur:
      - type: source
        content: "Emma 说：'Morrison 不是笨蛋，他知道销毁物证是什么罪——所以他只是藏着。藏着的东西，我们就能找到。'"
        note: "后续场景 1013（Morrison 家）搜证时可出题：玩家搜查 Morrison 家发现 1601 弹壳时，考查玩家是否理解 Emma 的推断链（Morrison 藏而不毁的动机）"
      - type: quiz
        node: "#emma_011_04"
        question: "Emma 推断 Morrison 把弹壳藏在了家里，而不是销毁它。她的逻辑依据是什么？"
        answer: "销毁物证罪比藏起来的风险更大，Morrison 是警察，他懂法律——他会选择风险更小的方式（来源：emma_011 opening 证词 8026001）"
        note: "引导玩家在场景 1013（Morrison 家）搜证时有目标感，同时考查对 Morrison 心理的理解"

