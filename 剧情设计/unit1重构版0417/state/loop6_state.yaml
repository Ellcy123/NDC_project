      # 不设 NPC 条目——Whale 未正式出场，不加入人物关系池
      type: narrative_event  # 非可拾取物证，非可对话 NPC
      trigger: "玩家搜查到房间中段时，Morrison 家的电话响起"
      description: |
        Morrison 家的电话响起。Zack 和 Emma 对视一眼——犹豫片刻，Zack 接了。
        电话另一端的声音低沉、不疾不徐，带着一种俯视一切的从容：
        他知道 Zack 和 Emma 在查案，知道 Jimmy 已经死了，也知道他们接下来要做什么。
        Zack 问他是谁——对方说，他就是 Whale。
        Zack 警惕地说：你不怕我们吗？
        Whale 的回答出乎意料：
        "我不是来威胁你们的。我想要你们证明给我看——
         这个城市里，是否真正还存在正义。"
        随后，他挂断了电话。
      narrative_significance:
        - "Whale 首次以声音形式直接登场——此前他只是'影子'，现在有了声音"
        - "Whale 的这句话模糊了他的立场：他是在测试 Zack，还是在为自己的下一步留退路？"
        - "这是对 Zack 和 Emma 搭档关系的隐性认可——Whale 知道他们，但没有阻止他们"
        - "Unit1 结束后 Whale 的形象依然是'空头像'——玩家知道有这个人，但不知道他是谁"
      connoisseur_source:
        type: source
        content: "Whale 在电话里说'证明给我看这个城市是否还存在正义'，语气平静，甚至带着某种期待——他没有威胁 Zack，也没有阻止 Zack 的调查。这和他雇佣 Jimmy 杀人的形象之间，有一道很深的裂缝"
        note: "Unit2 鉴赏力素材来源：Whale 的复杂性——他是犯罪策划者，却在 Unit1 末表现出某种'旁观者'的姿态；Unit2 可出考题考查玩家对此矛盾的理解"

    evidence:
      - id: 1601
        name: "Morrison 藏起来的子弹弹壳"
        type: item  # 物理道具（可分析弹型口径，继承自 1308）
        pickup: true
        inherited_from: 1308
        recovered: true
        note: "关键——loop6 Expose round_1 的核心物证之一；物理上是 1308 同一枚弹壳（Morrison loop4 末夺走后藏在家中）；.45 ACP 警用弹，与 1507（米勒集团特制手枪）的口径完全匹配"
        description: "一枚藏在 Morrison 书桌抽屉深处的子弹弹壳，.45 ACP 口径，表面略有磨损。Morrison 在 loop4 末从 Zack 手中夺走了它——他没有销毁，只是藏起来。这枚弹壳的口径（.45 ACP）与 Vivian 的手枪口径（.25 ACP）根本不相符，它才是真凶的武器型号的直接证明"
        metadata:
          caliber: ".45 ACP"
          original_id: 1308
          status_change: "confiscated_by_morrison → recovered（loop6 Morrison家搜查）"
          matches_caliber_of: 1507  # 米勒集团特制手枪

      - id: 1602
        name: "Morrison 欠疤面煞星的赌债欠条和威胁信"
        type: item  # 物品（文件/信件/票据类）（赌债欠条+手写威胁信）
        pickup: true
        note: "关键——loop6 Expose round_2 的核心物证之一；证明 Morrison 是个赌鬼且债务缠身，在经济上极度脆弱——这是 Whale 能够收买他的前提"
        description: "一叠皱巴巴的文件：一张签有 Morrison 名字的赌债欠条（欠疤面煞星地下赌场 5000 美元），以及一封夹在其中的手写威胁信，警告他若不还钱就让他从警察局'消失'。Morrison 把这些东西夹在一本旧账本里，显然不希望任何人看到"
        metadata:
          debt_amount: "$5,000"
          creditor: "疤面煞星地下赌场"
          significance: "Morrison 的经济困境使他成为 Whale 收买的目标——欠了赌债才会去借 Whale 的钱"

      - id: 1603
        name: "Morrison 向 Whale 借款的借据"
        type: item  # 物品（文件/信件/票据类）（手写借据）
        pickup: true
        note: "关键——loop6 Expose round_2 的核心物证之二；直接证明 Morrison 和 Whale 之间有财务往来——Morrison 欠 Whale 的钱，在处理 Webb 案时选择压案和快速结案，是在还这笔人情"
        description: "一份手写借据，借方是 Morrison，贷方以'W 先生'的名义出现（并非直接写 Whale 的名字，但抬头地址和金额与 Whale 的运作方式高度一致）。金额：6000 美元，时间早于 Webb 案发生约三周。Morrison 用这笔钱还清了疤面煞星的赌债，然后在 Webb 案中选择了快速结案、压制证据"
        metadata:
          lender_alias: "W 先生"
          loan_amount: "$6,000"
          loan_date_relation: "Webb 案发生前约三周"
          significance: "Morrison 借了 Whale 的钱 → 在 Webb 案中欠了 Whale 的人情 → 压案、夺走弹壳、逮捕无罪的 Vivian"

    npcs:
      # ⚠ 此场景无可对话 NPC（Morrison 不在家，Whale 仅在电话事件中出现不设 NPC 条目）
      # Emma 在此场景以搭档身份参与搜查，简短对话嵌入 phone_call_event 之内
      # 完整的 Emma 条目在 opening 和 expose 段落

  # ── 场景 1014：警局 Morrison 办公室（转折剧情准备——押送过场；s602 旧 ID）──
  - id: 1014
    name: "警局 Morrison 办公室"
    type: transition_cutscene  # 🎭 过场，玩家有限操作（到达警局后进入指证）
    description: |
      Zack 和 Emma 带着三件新证据（1601、1602、1603）和两件继承证据（1507、1502），
      来到警察局。
      Morrison 在自己的办公室里——Zack 选择单独面对他，不是公开对质。
      Emma 站在 Zack 身侧，两人推门进去的那一步，已经没有退路。
      进入办公室后，正式启动指证序列。

# ─────────────────────────────
# 四、指证（⚔️ Expose：Morrison）—— 三层谎言
# ─────────────────────────────

expose:
  target: morrison
  target_talk: morrison_expose_001
  is_liar: true
  player_inquiry: null

  context: |
    Zack 和 Emma 在 Morrison 办公室里单独对质——没有同僚在场。
    这是一场只有三个人的审判：Zack、Emma 和 Morrison。
    此时 Zack 手中的证据：
    ── 继承自 loop5 ──
    - 1507（米勒集团特制手枪，真正的凶器）
    - 1502（Jimmy 给 Whale 的回信，直接确认 Jimmy 受 Whale 委托）
    ── loop6 Morrison 家新取得 ──
    - 1601（从 Morrison 家搜到的弹壳，即原 1308，.45 ACP）
    - 1602（Morrison 的赌债欠条+威胁信）
    - 1603（Morrison 向 Whale 的借款借据）
    ── 可追加引用的已知证词 ──
    - 8064001（Vivian 证言：我真的杀了 Webb，loop4 指证的起点）
    - 1101（Vivian 的手枪，.25 ACP，loop1 现场）
    Morrison 没有外援也没有围观——他必须独自面对证据。
    指证在私密的、压迫感十足的对质中展开。

  # ── Morrison NPC 条目（Expose 对象，非自由探索阶段）──
  morrison_expose:
    # ── 基本信息 ──
    talk: morrison_expose_001
    is_liar: true
    motive: "保住警察职位和个人声誉——他不是彻底的坏人，他是个在贪婪和恐惧中做了糟糕选择的人"
    mindset: "被逼到墙角但仍在挣扎；在 Zack 和 Emma 面前一开始还想用警察权威压人，但没有外人可以充当观众——每轮谎言被击破时，他只能一次次独自承受逼近认罪的压力"

    # ── 1. NPC 已知信息（模式 B：后续出场，引用知识池）──
    # 知识池见 npc_knowledge_pools.yaml → morrison（Unit1 Morrison，loop1_state.yaml 建立）
    # 注：本文件的 morrison 条目最初为 Unit2 角色而建，此处 Unit1 Morrison 需要独立知识池。
    # Unit1 Morrison 的知识池在本 loop 首次完整定义：

    awareness:
      - content: "Jimmy 已经自杀（loop5 末），真凶已死，但手枪（1507）和回信（1502）还在 Zack 手中"
        trigger: "loop5 Jimmy 自杀事件，Morrison 在警局得到消息"
      - content: "Zack 和 Emma 进入了自己的住所——他发现家里被翻动过，知道 Zack 取走了弹壳（1601）和可能的财务记录"
        trigger: "loop6 场景 1013（Morrison 的家）Zack 搜查 Morrison 家"
      - content: "Zack 和 Emma 带着证据直接推门进了他的办公室——没有同僚在场，这是一场只有三个人的对质"
        trigger: "loop6 场景 1014（警局 Morrison 办公室）Zack+Emma 进入 Morrison 办公室"

    active_topics:
      - "三层防线（对应三轮 Expose 谎言）"
      - "关于为何快速结案的官方说法（搜查失误）"
      - "关于 Whale 的定性（只是放贷的，与本案无关）"
    withheld_topics: []
    # loop6 是 Morrison 的最终出场，所有 withheld 话题在本 loop 完全释放

    # ── 2. 玩家询问意图 ──
    player_inquiry: null  # Expose 对象，player_inquiry 设为 null

    # ── 3. 可提取证词 ──
    testimony_ids:
      - 8046001  # ⚠谎言: Morrison：Vivian 的手枪就是凶器！凶手就是 Vivian！（第一轮谎言，Expose 起点）
      - 8046002  # ⚠谎言: Morrison：我只是临时接警，搜查失误，不需要立刻释放嫌疑人——我后续可以重新调查
      - 8046003  # ⚠谎言: Morrison：Whale 只是个放贷的，和本案真凶没有任何关系

    # ── 4. 鉴赏力 ──
    connoisseur:
      - type: source
        content: "Morrison 在第二轮退守时说'我只是搜查失误'——语气里有一种疲倦，而不是愤怒。他并没有真正地想伸张正义，也没有真正地想陷害 Vivian，他只是想让一切安静下去"
        note: "Unit2 可出考题：Morrison 在 Unit1 结尾认罪后的结局（警官失职记录）——他是一个典型的'被环境腐蚀的普通人'，而不是主动作恶者"

  # ── 轮次一：凶器身份——"Vivian 的手枪就是凶器"──
  round_1:
    lie: "Vivian 的手枪（1101）就是凶器！她就是凶手！"
    lie_source: 8046001  # Morrison 在 Expose 开场的主动断言（Expose 对象的起始谎言，来自他的官方立场）
    usable_evidence:
      - id: 1601
        name: "Morrison 藏起来的子弹弹壳（从其家中搜到，原 1308）"
        用途: "这枚弹壳是 .45 ACP 口径——来自真正的凶器，而不是 Vivian 的手枪（.25 ACP）。Morrison 本人就把它藏在家里，说明他知道这枚弹壳和案件的关联，但选择压下来了"
      - id: 1507
        name: "米勒集团特制手枪（Jimmy 自杀现场，loop5 继承）"
        用途: "这才是真正的凶器——.45 ACP 口径，与 1601 弹壳口径完全匹配，而 Vivian 的手枪是 .25 ACP，根本不可能打出 .45 的弹壳。这把枪在 Jimmy 自杀现场留下，不是 Vivian 的枪"
    result: partial_victory
    result_description: |
      Zack 出示 1601（Morrison 家搜到的弹壳）和 1507（真凶器）：
      真正的凶器是 .45 ACP 口径，而 Vivian 的手枪是 .25 ACP——型号根本不符。
      Morrison 夺走的那枚弹壳，就藏在他自己家里。
      Morrison 的脸色第一次失控——他沉默了一瞬，用手摸了摸桌面的相框，
      才重新抬起头。第一道防线松动。
      Morrison 做出第一次退守：
      "好，也许是我临时接警时搜查失误——但这不代表我有任何问题，后续可以重新调查，不需要现在就释放嫌疑人。"

  # ── 轮次二：贿赂关系——"我只是搜查失误，后续可以重新调查"──
  round_2:
    lie: "我只是临时接警、搜查失误——这不是故意的，我后续完全可以重新调查，不需要立刻释放嫌疑人"
    lie_source: 8046002  # Morrison round_1 被击破后的退守谎言（止损式，归因于"失误"）
    usable_evidence:
      - id: 1602
        name: "Morrison 欠疤面煞星的赌债欠条和威胁信"
        用途: "Morrison 是个赌鬼，欠了 5000 美元赌债并被地下势力威胁——他在财务上极度脆弱，正是可以被收买的时候。这不是'搜查失误'，这是他主动选择的结果"
      - id: 1603
        name: "Morrison 向 Whale 借款的借据"
        用途: "Morrison 向 Whale 借了 6000 美元，时间在 Webb 案发生前三周——他用这笔钱还了赌债，然后在 Webb 案中选择快速结案、夺走证据。这是贿赂，不是失误"
    result: partial_victory
    result_description: |
      Zack 摆出 1602（赌债欠条+威胁信）和 1603（向 Whale 的借据）：
      你欠了 Whale 一笔钱，就在案发三周前。你用那笔钱还了赌债。
      然后案子来了，你快速结案，夺走弹壳，把无罪的 Vivian 押进警局。
      这不是失误，这是偿债——偿 Whale 的债。
      Morrison 的手抖了一下——没有外人帮他圆场，他只能自己面对这些数字。
      Morrison 做出第二次退守：
      "就算我和 Whale 之间有借贷关系，Whale 只是一个放贷的——他和 Webb 被杀有什么关系？"

  # ── 轮次三：Whale 主使身份——"Whale 只是放贷的"──
  round_3:
    lie: "Whale 只是个放贷的，和本案真凶没有任何关系——就算我和他有借贷，那也是私事"
    lie_source: 8046003  # Morrison round_2 被击破后的最后防线（把 Whale 和案件切割）
    usable_evidence:
      - id: 1502
        name: "Jimmy 给 Whale 的回信（loop5 Jimmy 家发现，继承）"
        用途: "这封信是 Jimmy 写给 Whale 的——内容是回复 Whale 的委托：Jimmy 接受了，约定在蓝月亮酒吧后门见面。Whale 不是放贷的，Whale 是策划 Webb 被杀的主使人；Jimmy 是 Whale 雇来的执行者"
    result: full_victory
    result_description: |
      Zack 出示 1502（Jimmy 给 Whale 的回信）：
      这是 Jimmy 写给 Whale 的信——他接受了 Whale 的委托，然后在 23:00 那晚杀死了 Webb。
      Whale 不是放贷的。Whale 是策划这起谋杀的幕后黑手。
      你借了他的钱，然后帮他压住了这个案子。
      这个房间里的所有人都听到了这一切。
      Morrison 的最后一道防线彻底崩塌。他低下头，不再开口辩解。
      Morrison 当众认定为警官失职。

# ─────────────────────────────
# 五、结束序列（Unit1 结束动画）
# ─────────────────────────────

ending_sequence:
  type: forced_cutscene  # 🎬 强制剧情，无玩家操作
  # 独立字段：不属于 Expose，也不属于自由探索
  # 这是 Unit1 的完整收束 + Unit2 衔接钩子
  location: "警察局内 → 警察局外走廊 → 保险箱场景（Vivian 的工作室/蓝月亮酒吧）"

  sequence:
    # ── 第一幕：Morrison 当面签下认罪书，Vivian 获释 ──
    act_1_morrison_verdict:
      description: |
        三轮指证完成后，Morrison 在自己办公室里被逼到最后一步。
        Zack 推过来一张纸——要 Morrison 当面写下认罪书：
        警官失职——故意压制证据、收受贿赂、错误羁押无辜嫌疑人。
        Emma 作为记者见证签字。
        Morrison 握着笔停顿了很久，第一次没有任何争辩，把名字签了上去。
        他当场签字撤销了 Vivian 的羁押令——
        Zack 拿到认罪书和释放令，准备把副本送交 Morrison 的上级以及公开渠道，
        但这些事留给 ending_sequence 之后的叙事。
      morrison_status_change: "在职警官 → 签下认罪书，待上级纪律审查（副本由 Emma 以记者身份留存/披露）"

    # ── 第二幕：Vivian 获释，与 Zack/Emma 相遇 ──
    act_2_vivian_release:
      description: |
        Vivian 走出警局关押室的那扇门，看到等在走廊的 Zack 和 Emma。
        她没有说话——她低头看了看自己的手，然后抬头，只说了两个字：
        "谢谢你。"
        Zack 和 Emma 说："你没事就好。"
        （顺便聊起芝加哥警局对囚犯的一些待遇问题——羁押期间的体面、饮食、通风、
         家属探视权；同样是无罪羁押，Vivian 这几天的处境可以被放进 Emma 将要写的报道里，
         让下一个 Vivian 少受一点这样的对待。）
        沉默片刻后，Vivian 抬起头说：
        "还有一件事没有做完。"
      vivian_status_change: "imprisoned（警局羁押）→ released（当场获释）"

    # ── 第三幕：保险箱——密码和"南区计划" ──
    act_3_safe_box:
      description: |
        Zack、Emma、Vivian 三人一起来到蓝月亮酒吧的会客室（案发现场，现已解封）。
        保险箱还在原处。Vivian 取出了那张字条（1304，loop3 取得的字条，上面是密码提示）——
        密码是：Webb 和 Vivian 相遇的那一天的日期。
        Vivian 一个数字一个数字地拨，保险箱"咔"的一声打开了。
        里面有一叠文件。Vivian 把它交给 Zack，说：
        "Webb 偷听到了这些。他让我，如果他出了事，就把这个交给真正能用到它的人。"
      evidence_obtained:
        - id: 1604
          name: "南区计划"
          type: item  # 物品（文件/信件/票据类）（厚实机密文件）
          pickup: true
          unit2_critical: true
          note: "关键——Unit1 结尾收束物 + Unit2 开场核心钩子；内容在 Unit1 内不揭示（悬念），仅标注为 Webb 偷听到的机密文件"
          description: "一叠厚实的文件，封面用打字机打着三个字：SOUTH DISTRICT PLAN（南区计划）。里面写了什么，在这一刻 Zack 没有完全看完，但光是扫了第一页，他就明白这件事比他想象的大得多。Webb 是在偷听一个改变整个城市的阴谋"
          metadata:
            content_revealed: false  # Unit1 内容不揭示，Unit2 开场才展开
            unit2_opening_hook: true
            obtained_via: "Vivian 用 1304 字条的密码开启保险箱"

    # ── 第四幕：Zack 的独白与 Unit1 收束 ──
    act_4_epilogue:
      description: |
        Zack 拿着那叠文件，看了一眼 Emma，又看了一眼 Vivian。
        Anna 在角落里——她来找过 Vivian，两个被这个案子伤过的女人，在这个房间里沉默地坐着。
        Zack 把文件折进西装口袋。
        他说：Whale 让我们证明这个城市是否还有正义。
        Emma 说：那就证明给他看。
        Unit1 结束。
      anna_brief_appearance:
        description: "Anna 在 epilogue 中短暂出现——她来到酒吧找 Vivian，两人相对而坐。Anna 什么都不知道，但她知道 Jimmy 不在了。这是对 Jimmy 自杀代价的最后一次注脚"

  # ── Vivian 在 ending_sequence 中的 NPC 条目 ──
  vivian_004:
