*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--dim:#8b949e;--h:#f0f6fc;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff;--orange:#f0883e;--cyan:#39d2c0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.header h1{font-size:16px;color:var(--h);white-space:nowrap}
.header .ver{font-size:11px;color:var(--orange);background:var(--orange)22;padding:2px 8px;border-radius:10px}
.tabs{display:flex;gap:3px;flex-wrap:wrap}
.tab{padding:5px 12px;border-radius:5px;cursor:pointer;font-size:12px;background:transparent;color:var(--dim);border:1px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{background:#1c2128;color:var(--text)}
.tab.active{background:var(--blue)22;color:var(--blue);border-color:var(--blue)44}
.tab .liar{font-size:10px;color:var(--red);margin-left:3px}
.main{max-width:1100px;margin:0 auto;padding:20px}
.loop-title{font-size:20px;color:var(--h);margin-bottom:3px}
.loop-sub{color:var(--dim);font-size:12px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}

.sec-h:hover{background:#1c2128}.sec-h .arr{margin-left:auto;color:var(--dim);font-size:11px;transition:transform .2s}.sec-h.c .arr{transform:rotate(-90deg)}
.sec-b{padding:14px}.sec-b.hide{display:none}
.goal-p{font-size:14px;color:var(--yellow);font-weight:500;margin-bottom:6px;padding:7px 10px;background:var(--yellow)0a;border-left:3px solid var(--yellow);border-radius:0 4px 4px 0}

.sc{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px}
.sc:last-child{margin-bottom:0}
.sc-id{font-size:10px;color:var(--dim);font-family:monospace}
.sc-name{font-size:13px;color:var(--h);font-weight:600;margin:1px 0}
.sc-note{font-size:11px;color:var(--dim);margin-bottom:6px}

.ev:hover .tip{display:block}
.tip{display:none;position:absolute;left:0;top:100%;background:var(--card);border:1px solid var(--border);padding:6px 8px;border-radius:5px;font-size:11px;color:var(--text);width:280px;z-index:10;box-shadow:0 4px 12px #0005;white-space:normal}
.npc{background:#1c2128;border-radius:5px;padding:8px 10px;margin-top:6px}
.npc-n{font-size:12px;font-weight:600;color:var(--blue)}
.npc-n .lt{color:var(--red);font-size:10px;margin-left:4px}
.npc-d{font-size:11px;color:var(--dim);margin-top:3px}
.npc-d b{color:var(--text);font-weight:500}
.npc-topics{margin-top:4px;font-size:11px}
.npc-topics .at{color:var(--green)}.npc-topics .wt{color:var(--red)}
.er{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px}
.rn{font-size:11px;font-weight:700;color:var(--orange);margin-bottom:3px}
.lie{font-size:12px;color:var(--red);font-style:italic;margin-bottom:5px;padding:5px 8px;background:var(--red)08;border-radius:4px}
.res{font-size:11px;color:var(--text);white-space:pre-line;padding:5px 8px;background:var(--green)08;border-radius:4px;border-left:3px solid var(--green)}
.di{padding:6px 10px;border-left:3px solid var(--blue);margin-bottom:6px;background:var(--blue)08;border-radius:0 4px 4px 0}
.di.cl{border-left-color:var(--green);background:var(--green)08}
.di-id{font-size:10px;color:var(--dim);font-family:monospace}
.di-t{font-size:12px;color:var(--h)}
.di-c{font-size:10px;color:var(--dim);margin-top:1px}
.dir{padding:5px 8px;margin-bottom:5px;background:var(--purple)08;border-left:3px solid var(--purple);border-radius:0 4px 4px 0}
.dir-n{font-size:12px;color:var(--purple);font-weight:500}
.dir-t{font-size:11px;color:var(--dim);margin-top:1px}
.post{padding:3px 0;font-size:11px;color:var(--text);border-bottom:1px solid var(--border)22}.post:last-child{border:none}
.p7{border:1px solid var(--red)44;border-radius:6px;padding:10px;background:var(--red)06}
.p7-t{font-size:13px;color:var(--red);font-weight:600;margin-bottom:6px}
.test{display:inline-block;padding:2px 6px;background:var(--purple)11;border:1px solid var(--purple)33;border-radius:3px;font-size:10px;color:var(--purple);margin:1px;font-family:monospace}
.vg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px}
.vi{padding:6px;background:var(--bg);border-radius:4px;border:1px solid var(--border)}
.vl{font-size:10px;color:var(--dim)}.vs{font-size:11px;font-weight:600}
.vp{color:var(--green)}.vpn{color:var(--yellow)}.vn{color:var(--dim)}
</style>

let cur=0;
function renderTabs(){document.getElementById('tabs').innerHTML=L.map((l,i)=>`<div class="tab ${i===cur?'active':''}" onclick="sw(${i})">L${l.id} ${l.title}${l.liar.includes('无')?'':`<span class="liar">⚔${l.liar.split('(')[0].split('（')[0].trim()}</span>`}</div>`).join('')}
function sw(i){cur=i;renderTabs();render()}
function S(icon,title,body){return`<div class="sec"><div class="sec-h"><span>${icon}</span>${title}<span class="arr">▼</span></div><div class="sec-b">${body}</div></div>`}

function render(){
const l=L[cur],m=document.getElementById('main');let h='';
h+=`<div class="loop-title">Loop ${l.id} — ${l.title} <span style="font-size:14px;color:var(--dim);font-weight:400">${l.en}</span></div>`;
h+=`<div class="loop-sub"><span class="badge b-liar">说谎者: ${l.liar}</span><span class="badge b-expose">${l.type}</span></div>`;
h+=`<div style="margin-bottom:14px;padding:8px 12px;background:var(--orange)0a;border:1px solid var(--orange)33;border-radius:6px;font-size:12px;color:var(--orange)">核心揭示: ${l.reveal}</div>`;

// Player Context
h+=S('🎯','玩家视角',`<div class="goal-p">${l.goals.p}</div><ul class="goal-s">${l.goals.s.map(s=>`<li>${s}</li>`).join('')}</ul>${l.kf.length?`<div style="margin-top:10px"><b style="color:var(--dim);font-size:11px">已知事实</b><ul class="fl">${l.kf.map(f=>`<li>${f}</li>`).join('')}</ul></div>`:''}`);

// Directions
if(l.dirs.length)h+=S('🧭','新调查方向',l.dirs.map(d=>`<div class="dir"><div class="dir-n">${d.n}</div><div class="dir-t">${d.t}</div></div>`).join(''));

// Opening
if(l.opening.length)h+=S('🎬','开篇',l.opening.map(o=>`<div class="sc"><span class="badge b-cut">${o.ty}</span> <span class="sc-id">${o.sc}</span><div style="font-size:12px;margin-top:3px">${o.pu}</div><div style="font-size:11px;color:var(--dim)">角色: ${o.ch}</div></div>`).join(''));

// Scenes
if(l.scenes.length){
h+=S('🔍','自由探索场景',l.scenes.map(s=>{
let c=`<div class="sc"><span class="sc-id">${s.id}</span><div class="sc-name">${s.name}</div><div class="sc-note">${s.note}</div>`;
if(s.ev&&s.ev.length)c+=`<div>${s.ev.map(e=>`<span class="ev">📦${e.id} ${e.n}</span>`).join('')}</div>`;
if(s.npcs&&s.npcs.length)c+=`<div style="margin-top:3px">${s.npcs.map(n=>`<span class="badge b-explore">👤${n}</span>`).join(' ')}</div>`;
return c+'</div>';}).join(''));
}else h+=S('🔍','自由探索场景','<div style="color:var(--dim);font-size:12px">本Loop无自由探索（全程硬切剧情）</div>');

// Expose
if(l.expose){
let ex=`<div style="margin-bottom:10px"><span class="badge b-liar">目标: ${l.expose.target}</span> <span class="badge b-expose">${l.expose.rounds}轮</span> <span style="color:var(--dim);font-size:11px">${l.expose.mode}</span></div>`;
ex+=l.expose.detail.map(r=>`<div class="er"><div class="rn">第${r.r}轮</div><div class="lie">"${r.lie}"</div><div style="margin:4px 0"><b style="font-size:10px;color:var(--yellow)">使用证据:</b> ${r.ev.map(e=>`<span class="ev" style="font-size:10px">📦${e}</span>`).join('')}</div><div class="res">${r.res}</div></div>`).join('');
h+=S('⚔️','指证 (Expose)',ex);
}else h+=S('⚔️','指证','<div style="color:var(--dim);font-size:12px">本Loop无标准指证</div>');

// Part7
if(l.part7){
let p=`<div class="p7"><div class="p7-t">💥 ${l.part7.title}</div>`;
p+=`<div style="font-size:11px;color:var(--dim);margin-bottom:6px">触发: ${l.part7.trigger}</div>`;
p+=`<ol style="padding-left:18px;font-size:12px">${l.part7.steps.map(s=>`<li style="margin-bottom:3px">${s}</li>`).join('')}</ol>`;
if(l.part7.effects)p+=`<div style="margin-top:8px;padding:6px 8px;background:var(--cyan)08;border-radius:4px;border-left:3px solid var(--cyan)"><b style="font-size:10px;color:var(--cyan)">系统效果:</b><ul class="fl">${l.part7.effects.map(e=>`<li style="color:var(--cyan)">${e}</li>`).join('')}</ul></div>`;
p+=`<div style="margin-top:8px;padding:6px 8px;background:var(--red)08;border-radius:4px;border-left:3px solid var(--red)"><b style="font-size:10px;color:var(--red)">后果:</b><ul class="fl">${l.part7.aftermath.map(a=>`<li>${a}</li>`).join('')}</ul></div>`;
p+='</div>';
h+=S('💥','情节转折 / 特殊事件',p);
}

// Post Knowledge
if(l.post.length)h+=S('📖','本轮后玩家获得的知识',l.post.map((p,i)=>`<div class="post">${i+1}. ${p}</div>`).join(''));

// NPC Overview
if(l.npcs&&l.npcs.length){
h+=S('👥','NPC 总览',l.npcs.map(n=>{
let c=`<div class="npc"><div class="npc-n">${n.name}${n.liar===true||String(n.liar).includes('true')?'<span class="lt">⚠说谎</span>':''} <span style="font-size:10px;color:var(--dim)">${n.场景}</span></div>`;
c+=`<div class="npc-d"><b>动机:</b> ${n.motive}</div>`;
if(n.active.length)c+=`<div class="npc-topics"><span class="at">可谈:</span> ${n.active.join(' / ')}</div>`;
if(n.withheld.length)c+=`<div class="npc-topics"><span class="wt">隐瞒:</span> ${n.withheld.join(' / ')}</div>`;
return c+'</div>';}).join(''));
}

// Evidence
h+=S('📦','证据一览',`<div>${l.evidence.map(e=>`<span class="ev">${e.id} ${e.n}${e.no?`<span class="tip">${e.no}</span>`:''}</span>`).join('')}</div>`);

// Doubts
if(l.doubts.length)h+=S('❓','疑点',l.doubts.map(d=>`<div class="di"><span class="di-id">#${d.id}</span><div class="di-t">${d.t}</div><div class="di-c">状态: ${d.c}</div></div>`).join(''));

// Ending
if(l.ending){
h+=S('🏁','结局',`<div style="font-size:13px;color:var(--h);margin-bottom:6px">${l.ending.scene}</div><ol style="padding-left:18px;font-size:12px">${l.ending.seq.map(s=>`<li style="margin-bottom:3px">${s}</li>`).join('')}</ol>`);
}

// Validation
const v=l.val;
h+=S('✅','验证状态',`<div class="vg">${Object.entries(v).map(([k,s])=>`<div class="vi"><div class="vl">${k}</div><div class="vs ${s==='PASS'?'vp':s==='N/A'?'vn':'vpn'}">${s}</div></div>`).join('')}</div>`);

m.innerHTML=h;
document.querySelectorAll('.sec-h').forEach(el=>{el.addEventListener('click',()=>{el.classList.toggle('c');el.nextElementSibling.classList.toggle('hide')})});
}
renderTabs();render();
</script>
