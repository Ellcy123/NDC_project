# ─────────────────────────────
# 一、玩家视角
# ─────────────────────────────

player_context:
  goals:
    primary: "阻止 Morrison 逮捕 Vivian——反驳 Rosa 的当场指控，为 Webb 案争取调查时间"
    secondary:
      - "理解 Webb 为何如此紧急雇佣 Zack 担任私家侦探"
      - "弄清 Vivian 为何手持手枪、为何沉默不反驳"

  known_facts:
    # Loop1 是首轮，已知事实来自开篇硬切展示的信息
    - "Webb 已经死亡（Morrison 宣告），死亡地点：蓝月亮酒吧二楼会客室"
    - "Vivian 手持手枪在现场，Zack 和 Emma 到达时 Rosa 也在场"
    - "23:30 众人听到枪响，Zack 和 Emma 冲进会客室"
    - "Webb 提前雇佣 Zack：合同包含保护 Vivian + 确保其继承遗产的协议"
    - "Zack 被酒保拒于门外过，Webb 的邀请让 Emma 认为今晚会有新闻"

  new_directions:
    - direction: "调查 Vivian 手中手枪是否开过枪"
      trigger: "Vivian 手持手枪的现场画面——Rosa 以此指控"
    - direction: "核实 Webb 提前立协议保护 Vivian 的真实意图"
      trigger: "Webb 委托协议书出现，且 Webb 已死"

  post_expose_knowledge:
    # 指证 Rosa 结束后玩家获得的新知识
    # 注意：这是"假胜利"——loop1 没有真正救出 Vivian，只换到 72h 调查期
    - "Vivian 手中手枪无硝烟反应——她不是刚刚开枪的那个人（但不排除另有一把枪）"
    - "Rosa 的谎言1（Vivian 刚刚开枪）被推翻，Rosa 不再那么可信"
    - "谎言2（23:30 枪响 + 只有 Vivian 在场）在本 Loop 无法反驳——时间线谜题留待后续"
    - "Webb 委托协议书证明 Webb 早知道自己有被害风险，Morrison 认可了 72 小时调查期"
    - "Webb 紧急雇佣存在'保险倾向'——他提前规划了 Vivian 的继承权，意味着他预感到自己会死"
    - "Emma 提出核心疑点：Webb 自己真正怀疑的凶手到底是谁？"

# ─────────────────────────────
# 二、开篇（硬切剧情）
# ─────────────────────────────

opening:
  type: cutscene  # 🎬 硬切，无玩家操作
  description: |
    Zack 和 Emma 站在蓝月亮酒吧大门口聊天——酒保刚刚拒绝让 Zack 进入，
    Emma 凭新闻嗅觉感觉今晚会有大事。两人边聊边进入大厅。
    23:30，二楼传来枪响。Zack 和 Emma 冲进会客室——到达时，
    Vivian 手持一把手枪怔愣在原地，Rosa 也在场。
    随后，同样听到枪响的 Morrison 醉醺醺地上楼查看尸体——他平时就常来蓝月亮喝酒，
    和 Webb 关系还行；得知是 Webb 死亡，他一边嫌麻烦一边还是姑且秉公办事，
    宣布 Webb 已经死亡，并表示要逮捕 Vivian。

  emma_001:
    # ── 基本信息 ──
    talk: emma_001
    is_liar: false
    motive: "新闻嗅觉驱动，对今晚的舞会抱有期待；同时是 Zack 进入上流俱乐部的引路人"
    mindset: "职业兴奋感，边聊边观察，即将切换到记者状态"

    # ── 1. NPC 已知信息（Emma 特殊模式 C）──
    knows:
      - "Zack 被 Webb 紧急雇佣，合同细节 Zack 知道但 Emma 不确定全貌"
      - "酒保不让 Zack 进酒吧（Emma 是引路人）"
      - "Webb 是蓝月亮酒吧老板，今晚举办舞会"
      - "23:30 枪响，Vivian 手持手枪，Rosa 在场"
      - "Morrison 宣告 Webb 死亡"
    does_not_know:
      - "Webb 委托协议书的具体内容（保护 Vivian + 继承遗产）"
      - "手枪是否有硝烟反应"
      - "Rosa 指控的真实动机"
    lie: null

    # ── 2. 玩家询问意图 ──
    player_inquiry:
      - "Emma 作为引路人，Zack 需要解释自己与 Webb 的合同关系"  # 6
      - "Emma 的新闻嗅觉——她觉得今晚会发生什么大事"  # 5

    # ── 3. 可提取证词 ──
    testimony_ids:
      - 1001001  # Emma 确认 Webb 邀请 Zack 参加舞会，Zack 被酒保拒门
      - 1001002  # Emma 表示若不知真相绝不写报道

    # ── 4. 鉴赏力 ──
    connoisseur:
      - type: source
        content: "Emma 以新闻记者的判断力感觉今晚舞会不寻常——在枪响之前就有直觉"
        note: "后续循环可出考题：Emma 的直觉来源是什么（酒保异常 / Webb 举止紧张等）"

# ─────────────────────────────
# 三、场景（🔓 自由探索 + 🎭 剧情触发）
# ─────────────────────────────

scenes:
  # ── 场景 S1：二楼会客室（现场搜证）──
  - id: 1001
    name: "二楼会客室"
    type: limited_exploration  # 🔓 有限制的自由探索（Morrison 管控现场）
    description: |
      Webb 死亡现场——Morrison 控制进入权限。
      Vivian 仍持枪站在原地，对 Webb 的死亡十分惊讶，沉默不语，暂不透露具体行为信息。
      Rosa 在场，玩家在自由探索阶段即可通过与 Rosa 对话获取其谎言和证词（谎言1 + 谎言2）。
      玩家可以检查 Vivian 手中的手枪，并找到 Webb 的委托协议书。
    notes: |
      信息流管控要点：
      - Rosa：active_topics 包含谎言1（持枪指控）和谎言2（23:30 时间线），自由探索阶段即可提取证词
      - Vivian：此时处于震惊/沉默状态，不主动透露行为信息（"准备认罪"心态在后续才显现）

    evidence:
      - id: 1101
        name: "Vivian 手里的手枪"
        type: item  # 物理道具（可分析硝烟反应）
        pickup: true
        note: "关键——用于击破 Rosa 谎言1（无硝烟反应证明 Vivian 未开枪）"
        analysis: "分析可得：枪管内无硝烟残留，表明该枪近期未被击发"

      - id: 1103
        name: "Webb 委托协议书"
        type: item  # 物品（文件/信件/票据类）
        pickup: true
        note: "关键——Webb 和 Zack 签字的委托协议；确立 Zack 合法调查身份 + 换取 Morrison 72h 调查期；证明 Webb 预感被害（保险倾向）"
        description: "协议内容：Zack 负责保护 Vivian 安全，并确保 Vivian 在 Webb 死后能顺利继承遗产（注：原设计分为 1102 委托单据 + 1103 委托协议书两件，实为同一份合同的不同提法，现合并为 1103 单件；1102 已废弃不再使用）"

    npcs:
      # ── Vivian（沉默状态）──
      vivian_001:
        # ── 基本信息 ──
        talk: vivian_001
        is_liar: false
        # 注：loop1 的 Vivian 处于震惊/沉默状态——对外不给任何说辞，对追问几乎没有反应。
        # "认罪"行为延后到 loop2 工作室深度对话；她的谎言（"我杀了 Webb"）是 loop4 指证对象。
        # ⚠️ 内部真相（loop4 才揭示）：Vivian 带着自己的小手枪进入会客室，本来也想杀 Webb——
        # 她当晚先后两次前往会客室（23:10 本想杀 Webb，被"Don't be bothering me!"挡回；23:30 送酒时间再去，推门发现 Webb 已死）。
        # loop1 她对这段经过完全沉默，不透露任何信息；玩家在 loop1 只能通过硝烟反应间接证明她不是刚刚开枪的人。
        motive: "极度震惊、沉默不语——她带枪前来想杀 Webb、却发现 Webb 已死，内心震动混乱，对外选择完全闭口不谈"
        mindset: "怔愣在原地，对 Rosa 的指控和 Zack/Morrison 的追问都没有反应；不辩解、不认罪、不解释——纯粹的沉默"

        # ── 1. NPC 已知信息 ──
        # 知识池见 npc_knowledge_pools.yaml → vivian
        # （注：vivian 的知识池在本文件建立，首次出场）
        #
        # knowledge_pool 摘要（首次出场，完整池见下方注释块）:
        #   - 她平时 23:30 给 Webb 送酒
        #   - 她当晚带着自己的小手枪前来（本来也想杀 Webb）
        #   - 23:10 首次进入会客室门口，听到"别打扰我"被挡在外面（实为 Jimmy 模仿）
        #   - 23:30 送酒时间再次前来，推门发现 Webb 已死
        #   - Webb 让她协助勒索中产（仙人跳变体）
        #   - Webb 与 Rita 的关系让她心寒
        #   - 她有船票（想逃离），有杀人计划（最终未执行——Webb 先被 Jimmy 杀了）

        active_topics: []  # loop1 Vivian 完全沉默，无主动陈述内容；她在场作为"持枪人"的画面本身是信息
        withheld_topics:
          - "她带着自己的枪前来的真相（loop4 才承认）"  # loop4 Expose round_1 的真正靶子
          - "23:10 她第一次来会客室被挡走的经过"  # loop4 才揭示
          - "她本来也想杀 Webb 的计划（带着杀意携枪前来）"  # loop4 才揭示
          - "勒索细节（仙人跳变体）"  # loop4 才揭示
          - "船票和杀人计划"  # loop4 才揭示
          - "Don't be bothering me! 的细节"  # loop4/loop5 关键伏笔
          - "Webb 让她勒索别人这件事"  # loop2 触碰，loop4 完整揭示
          - "是否开枪 / 现场经过的任何陈述"  # loop1 完全沉默，loop2 才开始主动说话（且以认罪谎言的形式）

        # ── 2. 玩家询问意图 ──
        player_inquiry:
          - "Vivian 手持枪——她是否开枪了"  # 9（她不回答，需通过硝烟反应间接判断）
          - "Vivian 为何完全沉默、不辩解也不反驳 Rosa 的指控"  # 8（反常态度本身是悬念）

        # ── 3. 可提取证词 ──
        testimony_ids:
          - 1011001  # Vivian 沉默不语：极度震惊，面对追问不作回答（不是认罪，也不辩解——纯粹的沉默）

        # ── 4. 鉴赏力 ──
        connoisseur:
          - type: source
            content: "Vivian 的手枪是 Colt 1908 袖珍手枪（.25 ACP 口径），适合女性防身"
            note: "后续 loop4 考题：为何 Vivian 的枪不可能是凶器（.25 ACP vs .45 ACP 弹壳型号不符）"

      # ── Rosa（当庭指控 / Expose 对象）──
      rosa_001:
        # ── 基本信息 ──
        talk: rosa_001
        is_liar: true  # Rosa 是本 Loop 的 Expose 对象
        motive: "奉匿名威胁者指令，在现场指认 Vivian 为凶手（威胁者以她女儿的安危要挟）"
        mindset: "恐惧和愧疚并存，说着谎言但内心已经开始动摇"
        player_inquiry: null  # Expose 对象不设 player_inquiry

        # ── 1. NPC 已知信息 ──
        # 知识池见 npc_knowledge_pools.yaml → rosa
        # （注：rosa 的知识池在本文件建立，首次出场）
        #
        # knowledge_pool 摘要（首次出场）:
        #   - 她是蓝月亮酒吧清洁工
        #   - 她当晚 23:20 去外面丢过一次垃圾（loop3 关键时间节点）
        #   - 她收到匿名纸条威胁（去 Webb 会客室，声称目击 Vivian 杀人，否则杀其女儿）
        #   - 她的女儿有医疗单（作为威胁筹码）
        #   - 她 23:30 后进入会客室，发现 Webb 已死，Vivian 也在场
        #   - 她捡到了一枚 .45 弹壳（loop3 结束时给 Zack）

        active_topics:
          - "当场指控（谎言1）：Vivian 手里有枪，她一定是刚刚杀了 Webb"
          - "时间线指控（谎言2）：23:30 枪响，当晚无其他枪响，当时只有 Vivian 在里面，所以只能是她杀的"
          # 自由探索阶段玩家即可通过对话提取谎言1+谎言2的证词；纸条威胁和弹壳仍属 withheld
        withheld_topics:
          - "23:20 倒垃圾的时间节点"  # loop3 关键
          - "匿名威胁纸条细节"  # loop3 才揭示
          - "女儿医疗单"  # loop3 才出现
          - "捡到的 .45 弹壳"  # loop3 结束时给出
          - "对案发时间的知情（她其实知道不是 23:30）"  # loop3 核心

        # ── 2. 玩家询问意图 ──
        # (is_liar: true，player_inquiry: null，已设置)

        # ── 3. 可提取证词 ──
        testimony_ids:
          - 1021001  # ⚠谎言: Rosa 谎言1——Vivian 此刻手里正拿着一把手枪，她一定是刚刚杀了 Webb
          - 1021002  # ⚠谎言: Rosa 谎言2——23:30 枪响，当晚无其他枪响，当时只有 Vivian 在里面，所以只能是她杀的

        # ── 4. 鉴赏力 ──
        connoisseur:
          - type: source
            content: "Rosa 的神态——说指控台词时眼神游移，与确信目击者的镇定形成对比"
            note: "鉴赏力素材：观察 NPC 肢体语言/情绪状态判断证词可信度"

      # ── Morrison（宣告死亡 / 接案警官）──
      morrison_001:
        # ── 基本信息 ──
        talk: morrison_001
        is_liar: false
        motive: "平时常来蓝月亮喝酒，和 Webb 关系还行；今晚醉醺醺不想干活，发现是 Webb 死亡后，一嫌麻烦一边还是姑且秉公办事——loop1 阶段尚未暴露与 Whale 的关联"
        mindset: "醉意未消、有些散漫，但职业本能驱动他接案；倾向于接受最简单的解释（Vivian 是凶手）来快速了事"

        # ── 1. NPC 已知信息 ──
        # 知识池见 npc_knowledge_pools.yaml → morrison_unit1
        # （注：Unit1 Morrison 的知识池与 Unit2 Morrison 分开维护）
        #
        # knowledge_pool 摘要（Unit1，首次出场）:
        #   - Webb 已死，Webb 是蓝月亮酒吧老板
        #   - 现场 Vivian 持枪，Rosa 声称目击
        #   - 他自己与 Whale（米勒集团）有借贷关系（loop5-6 才揭示）
        #   - 他看到 .45 弹壳会脸色一变（与米勒集团相关）
        #   - 他打算快速结案，锁定 Vivian

        active_topics:
          - "宣布 Webb 死亡"
          - "接案程序：表示将逮捕嫌疑人 Vivian"
          - "暂时承认 Zack 的调查委托（若 Zack 出示协议书）"
        withheld_topics:
          - "与 Whale / 米勒集团的借贷关系"  # loop5-6 才揭示
          - "他藏了 .45 弹壳"  # loop5-6 才揭示
          - "他为何急于结案的真实动机"  # loop5-6 才揭示
          - "子弹缺失的信息"  # loop3 他才口述（也是藏证据的行为）

        # ── 2. 玩家询问意图 ──
        player_inquiry:
          - "Morrison 是负责此案的警官——Zack 必须向他证明调查权"  # 8
          - "Morrison 为何这么快就要逮捕 Vivian（Rosa 的话可靠吗？）"  # 7

        # ── 3. 可提取证词 ──
        testimony_ids:
          - 1031001  # Morrison 宣告：Webb 死亡，Vivian 为主要嫌疑人
          - 1031002  # Morrison 宣告：准备逮捕 Vivian
          - 1031003  # Morrison（指证后）：因 Zack 揭穿 Rosa + 委托协议书，同意给 72 小时

        # ── 4. 鉴赏力 ──
        connoisseur:
          - type: source
            content: "Morrison 接案流程过于简洁——仅凭 Rosa 一面之词 + Vivian 持枪就准备结案，没有勘验现场"
            note: "后续 loop5-6 考题：Morrison 急于结案的真实原因（与 Whale 的关联）"
          - type: source
            content: "Morrison 今晚醉醺醺上楼，得知是认识的 Webb 死亡后，仍旧勉力秉公接案——这是 loop1 Morrison 的初始性格基线"
            note: "loop5-6 性格对照伏笔：loop1 Morrison 醉酒但尚存职业操守，与 loop5-6 Morrison 主动吹黑哨的反转形成鲜明对比，暗示 Whale 介入改变了他的选择"

# ─────────────────────────────
# 四、指证（⚔️ Expose：Rosa）
# ─────────────────────────────

expose:
  target: rosa
  target_talk: rosa_expose_001
  is_liar: true
  player_inquiry: null

  context: |
    Rosa 当众指控 Vivian 是凶手，Morrison 准备逮捕 Vivian。
    Vivian 沉默不反驳，显露出准备认罪的姿态。
    Zack 必须在这里反击 Rosa 的指控，否则调查权就此终止。

  # ── 轮次一：击破硝烟谎言 ──
  round_1:
    lie: "Vivian 此刻手里正拿着一把手枪，她一定是刚刚杀了 Webb"
    lie_source: 1021001  # Rosa 的指控证词
    usable_evidence:
