# B. 证据覆盖     PASS — 大纲 loop1 所有证据（手枪/委托协议书）已分配到场景；1102/1103 合并为 1103
# C. NPC 条目     PASS — Rosa/Vivian/Morrison/Emma 各含 4 必填块；Morrison 新增 connoisseur source
# D. 目标对齐     PASS — goals 与大纲"指证 Rosa"新手教程目标一致
# E. 信息节奏     PASS — 未泄露 loop2+ 内容；Vivian 沉默状态符合信息节奏（"认罪"行为延后到 loop2 自由探索）
# F. 鉴赏力       PASS — .45/.25 口径差异设为 source；Morrison 醉酒但秉公新增 source（loop5-6 对照伏笔）
