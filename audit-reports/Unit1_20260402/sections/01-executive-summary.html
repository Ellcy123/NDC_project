<section class="section" id="section-1">
  <div class="section-content">

    <!-- Section Header -->
    <div class="section-header animate-in">
      <span class="section-number">01</span>
      <h1 class="section-title">Executive Summary</h1>
      <p class="section-subtitle">Unit1 L1-L2 全流程审计总览 — 整体健康度与问题分布</p>
    </div>

    <!-- Overall Health Gauge -->
    <div class="gauge-container animate-in">
      <svg class="gauge-ring" viewBox="0 0 120 120">
        <circle class="gauge-bg" cx="60" cy="60" r="54" />
        <circle class="gauge-fill" cx="60" cy="60" r="54" data-score="77" />
      </svg>
      <span class="gauge-score" data-target="77">0</span>
      <span class="gauge-label">Overall Health Score</span>
    </div>

    <!-- Severity Score Cards -->
    <div class="score-cards stagger-children">
      <div class="score-card severity-critical animate-in">
        <div class="score-card-number" data-target="4">0</div>
        <div class="score-card-label">Critical</div>
      </div>
      <div class="score-card severity-major animate-in">
        <div class="score-card-number" data-target="6">0</div>
        <div class="score-card-label">Major</div>
      </div>
      <div class="score-card severity-minor animate-in">
        <div class="score-card-number" data-target="2">0</div>
        <div class="score-card-label">Minor</div>
      </div>
      <div class="score-card severity-suggestion animate-in">
        <div class="score-card-number" data-target="2">0</div>
        <div class="score-card-label">Suggestion</div>
      </div>
    </div>

    <!-- Scope Callout -->
    <div class="callout callout-info animate-in">
      <span class="callout-icon">&#x1F50D;</span>
      <div>
        <span class="callout-title">审计范围</span>
        <div class="callout-content">
          <p>Unit1 Loops 1-2 &middot; EPI01 &middot; 16 条证据 &middot; 14 条证词 &middot; 2 场指证 &middot; 19 个对话文件</p>
        </div>
      </div>
    </div>

    <!-- Dimension Score Mini Cards -->
    <h2 class="screen-heading animate-in">维度健康度</h2>
    <div class="score-cards stagger-children" style="grid-template-columns: repeat(4, 1fr);">
      <div class="score-card animate-in" style="border-color: var(--color-critical);">
        <div class="score-card-number" data-target="69" style="color: var(--color-critical);">0</div>
        <div class="score-card-label">玩家体验</div>
      </div>
      <div class="score-card animate-in" style="border-color: var(--color-critical);">
        <div class="score-card-number" data-target="69" style="color: var(--color-critical);">0</div>
        <div class="score-card-label">证据链路</div>
      </div>
      <div class="score-card animate-in" style="border-color: var(--color-success);">
        <div class="score-card-number" data-target="86" style="color: var(--color-success);">0</div>
        <div class="score-card-label">人物一致性</div>
      </div>
      <div class="score-card animate-in" style="border-color: var(--color-warning);">
        <div class="score-card-number" data-target="75" style="color: var(--color-warning);">0</div>
        <div class="score-card-label">对话质量</div>
      </div>
      <div class="score-card animate-in" style="border-color: var(--color-success);">
        <div class="score-card-number" data-target="85" style="color: var(--color-success);">0</div>
        <div class="score-card-label">时序一致性</div>
      </div>
      <div class="score-card animate-in" style="border-color: var(--color-warning);">
        <div class="score-card-number" data-target="78" style="color: var(--color-warning);">0</div>
        <div class="score-card-label">难度曲线</div>
      </div>
      <div class="score-card animate-in" style="border-color: var(--color-warning);">
        <div class="score-card-number" data-target="77" style="color: var(--color-warning);">0</div>
        <div class="score-card-label">叙事连贯性</div>
      </div>
    </div>

  </div>
</section>
