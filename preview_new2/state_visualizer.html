                <ul style="list-style:none;font-size:0.8rem;color:var(--ink-secondary);columns:${s.playerContext.postExposeKnowledge.length > 4 ? 2 : 1};column-gap:1.2rem;">${postKHtml}</ul>
            </div>` : '<div></div>'}
        </div>

        <!-- Mini Timeline -->
        <div class="card">
            <div class="card-title">流程缩略</div>
            ${miniTlHtml}
        </div>

        <!-- Annotations -->
        ${s.annotations.length > 0 ? `
        <div class="card">
            <div class="card-title">叙事注解 (${s.annotations.length})</div>
            ${s.annotations.map(a => `
                <div class="annotation-bubble ${a.type}" onclick="this.nextElementSibling.classList.toggle('open')">
                    ${annLabel(a.type)} ${a.location === 'expose' ? 'R' + (a.roundId||'') : a.location === 'doubt' ? '#' + (a.doubtId||'') : a.npcKey || ''}
                </div>
                <div class="annotation-detail">${esc(a.text)}</div>
            `).join('')}
        </div>` : ''}
    `;
}

// ===== Panel 2: Tension Curve (呼吸的张力曲线) =====
function renderTension() {
    const s = currentState;
    tensionNodes = calcTensionCurve(s);
    if (tensionNodes.length === 0) {
        document.getElementById('panelTension').innerHTML = '<div class="loading-msg">无张力数据</div>';
        return;
    }

    // Mark key nodes — only mark FIRST occurrence of peak
    const maxTension = Math.max(...tensionNodes.map(n => n.tension));
    let peakMarked = false;
    for (let i = 0; i < tensionNodes.length; i++) {
        const n = tensionNodes[i];
        n.markers = [];
        if (n.tension === maxTension && !peakMarked) { n.markers.push(`峰值 ${n.tension}`); peakMarked = true; }
        if (n.type === 'expose' && n.roundId === s.expose.totalRounds) {
            n.markers.push('最终指证');
            if (s.playerContext.postExposeKnowledge.length >= 5) {
                n.markers.push(`重大揭示 (${s.playerContext.postExposeKnowledge.length}条)`);
            }
        }
        if (i > 0) {
            const delta = n.tension - tensionNodes[i-1].tension;
            if (delta >= 20) n.markers.push(`+${delta}`);
            if (delta <= -15 && n.type !== 'closing') n.markers.push(`${delta}`);
        }
        if (n.type === 'sudden_event') n.markers.push('突发事件');
    }

    document.getElementById('panelTension').innerHTML = `
        <div class="card" style="padding:1rem 1.2rem;">
            <div class="card-title">情绪弧线</div>
            <div style="font-size:0.7rem;color:var(--ink-faint);margin-bottom:0.6rem;">张力值由算法根据场景内容自动估算，仅供参考。点击节点可跳转对应面板。</div>
            <div class="canvas-container">
                <canvas id="tensionCanvas" width="1200" height="520" style="width:100%;height:520px;border-radius:var(--radius-md);"></canvas>
                <div class="canvas-tooltip" id="tensionTooltip"></div>
            </div>
        </div>
    `;

    requestAnimationFrame(() => drawTensionCanvas());
}

function drawTensionCanvas() {
    const canvas = document.getElementById('tensionCanvas');
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const W = rect.width;
    const H = rect.height;

    const padL = 55, padR = 40, padT = 55, padB = 140;
    const chartW = W - padL - padR;
    const chartH = H - padT - padB;
    const nodes = tensionNodes;
    const n = nodes.length;
    if (n === 0) return;

    const xStep = n > 1 ? chartW / (n - 1) : chartW / 2;

    // Background
    ctx.fillStyle = '#0f0d0b';
    ctx.fillRect(0, 0, W, H);

    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    for (let v = 0; v <= 100; v += 20) {
        const y = padT + chartH * (1 - v / 100);
        ctx.beginPath();
        ctx.moveTo(padL, y);
        ctx.lineTo(W - padR, y);
        ctx.stroke();
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = '12px Segoe UI';
        ctx.textAlign = 'right';
        ctx.fillText(v, padL - 10, y + 3);
    }

    // Compute points
    const points = nodes.map((nd, i) => ({
        x: padL + i * xStep,
        y: padT + chartH * (1 - nd.tension / 100)
    }));

    // Phase separators (opening -> explore -> expose)
    let firstExpose = nodes.findIndex(nd => nd.type === 'expose');
    if (firstExpose > 0) {
        const sepX = (points[firstExpose].x + points[firstExpose - 1].x) / 2;
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(sepX, padT);
        ctx.lineTo(sepX, padT + chartH);
        ctx.stroke();
        ctx.setLineDash([]);
        // Labels
        ctx.fillStyle = 'rgba(232,198,120,0.5)';
        ctx.font = 'bold 13px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText('探索阶段', (padL + sepX) / 2, padT - 10);
        ctx.fillText('指证阶段', (sepX + W - padR) / 2, padT - 10);
    }

    // Gradient area fill with smooth bezier
    const areaGrad = ctx.createLinearGradient(0, padT, 0, padT + chartH);
    areaGrad.addColorStop(0, 'rgba(184, 64, 64, 0.3)');
    areaGrad.addColorStop(0.4, 'rgba(200, 160, 60, 0.12)');
    areaGrad.addColorStop(0.7, 'rgba(58, 138, 122, 0.08)');
    areaGrad.addColorStop(1, 'rgba(58, 138, 122, 0.02)');

    ctx.fillStyle = areaGrad;
    ctx.beginPath();
    ctx.moveTo(points[0].x, padT + chartH);
    ctx.lineTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
        const cpx = (points[i-1].x + points[i].x) / 2;
        ctx.quadraticCurveTo(points[i-1].x + (points[i].x - points[i-1].x)*0.5, points[i-1].y,
                             (points[i-1].x + points[i].x)/2, (points[i-1].y + points[i].y)/2);
        ctx.quadraticCurveTo(points[i].x - (points[i].x - points[i-1].x)*0.5, points[i].y,
                             points[i].x, points[i].y);
    }
    ctx.lineTo(points[points.length-1].x, padT + chartH);
    ctx.closePath();
    ctx.fill();

    // Smooth bezier curve line
    const lineGrad = ctx.createLinearGradient(padL, 0, W - padR, 0);
    lineGrad.addColorStop(0, '#4a7c59');
    lineGrad.addColorStop(0.4, '#d4a24e');
    lineGrad.addColorStop(0.7, '#b84040');
    lineGrad.addColorStop(1, '#e05050');
    ctx.strokeStyle = lineGrad;
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
        ctx.quadraticCurveTo(
            (points[i-1].x + points[i].x) / 2, points[i-1].y,
            (points[i-1].x + points[i].x) / 2, (points[i-1].y + points[i].y) / 2
        );
        ctx.quadraticCurveTo(
            (points[i-1].x + points[i].x) / 2, points[i].y,
            points[i].x, points[i].y
        );
    }
    ctx.stroke();

    // Dots and labels
    const typeColors = {
        opening: '#e8c678',
        explore: '#4a7c59',
        expose: '#e05050',
        closing: '#5c7aa8',
        sudden_event: '#e8a060'
    };

    for (let i = 0; i < points.length; i++) {
        const p = points[i];
        const nd = nodes[i];
        const dotColor = typeColors[nd.type] || '#b84040';
        const isClimax = nd.markers.some(m => m.includes('峰值'));
        const dotR = nd.markers.length > 0 ? 7 : 5;

        // Glow for CLIMAX
        if (isClimax || nd.type === 'expose') {
            ctx.save();
            ctx.shadowColor = dotColor;
            ctx.shadowBlur = isClimax ? 15 : 8;
            ctx.fillStyle = dotColor;
            ctx.beginPath();
            ctx.arc(p.x, p.y, dotR, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // Dot
        ctx.fillStyle = dotColor;
        ctx.beginPath();
        ctx.arc(p.x, p.y, dotR, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Marker annotation above
        if (nd.markers.length > 0) {
            const markerText = nd.markers[0];
            // Background pill for marker
            ctx.font = 'bold 11px Segoe UI';
            ctx.textAlign = 'center';
            const tw = ctx.measureText(markerText).width;
            ctx.fillStyle = 'rgba(30,20,10,0.85)';
            ctx.beginPath();
            ctx.roundRect(p.x - tw/2 - 6, p.y - 30, tw + 12, 18, 4);
            ctx.fill();
            ctx.fillStyle = '#e8c678';
            ctx.fillText(markerText, p.x, p.y - 16);
        }

        // X-axis label
        ctx.save();
        ctx.translate(p.x, H - padB + 16);
        ctx.rotate(-Math.PI / 6);
        ctx.fillStyle = 'rgba(232,224,212,0.7)';
        ctx.font = '12px Segoe UI';
        ctx.textAlign = 'right';
        const label = nd.label.length > 12 ? nd.label.substring(0,11) + '..' : nd.label;
        ctx.fillText(label, 0, 0);
        ctx.restore();
    }

    // Store for interaction
    canvas._tensionPoints = points;
    canvas._tensionNodes = nodes;

    // Mouse events
    canvas.onmousemove = (e) => {
        const r = canvas.getBoundingClientRect();
        const mx = e.clientX - r.left;
        const my = e.clientY - r.top;
        const tooltip = document.getElementById('tensionTooltip');
        let found = false;
        for (let i = 0; i < points.length; i++) {
            const p = points[i];
            if (Math.abs(mx - p.x) < 18 && Math.abs(my - p.y) < 18) {
                const nd = nodes[i];
                const typeLabel = {opening:'开篇',explore:'探索',expose:'指证',closing:'收尾',sudden_event:'突发事件'};
                tooltip.innerHTML = `<b>${esc(nd.label)}</b><br>张力值: ${nd.tension}<br>阶段: ${typeLabel[nd.type]||nd.type}${nd.markers.length ? '<br><span style="color:var(--gold)">' + nd.markers.join(', ') + '</span>' : ''}`;
                tooltip.style.display = 'block';
                tooltip.style.left = (mx + 18) + 'px';
                tooltip.style.top = (my - 10) + 'px';
                canvas.style.cursor = 'pointer';
                found = true;
                break;
            }
        }
        if (!found) { tooltip.style.display = 'none'; canvas.style.cursor = 'default'; }
    };

    canvas.onclick = (e) => {
        const r = canvas.getBoundingClientRect();
        const mx = e.clientX - r.left;
        const my = e.clientY - r.top;
        for (let i = 0; i < points.length; i++) {
            const p = points[i];
            if (Math.abs(mx - p.x) < 18 && Math.abs(my - p.y) < 18) {
                const nd = nodes[i];
                if (nd.type === 'expose' && nd.roundId) {
                    switchToPanel('expose');
                    setTimeout(() => {
                        const roundEl = document.querySelector(`.expose-round[data-round-id="${nd.roundId}"]`);
                        if (roundEl) roundEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 100);
                } else if (nd.sceneId) {
                    switchToPanel('scenes');
                    setTimeout(() => {
                        highlightSceneAcrossPanels(nd.sceneId);
                        toggleSceneDetail(nd.sceneId);
                    }, 100);
                }
                break;
            }
        }
    };
}

function switchToPanel(panelName) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[data-panel="${panelName}"]`).classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel' + panelName.charAt(0).toUpperCase() + panelName.slice(1)).classList.add('active');
    activePanel = panelName;
}

// ===== Panel 3: Scene Map (空间化分组) =====
function renderScenes() {
    const s = currentState;
    const sceneTypeIcons = {
        opening: '\uD83C\uDFAC', explore: '\uD83D\uDD13', locked: '\uD83D\uDD12',
        idle: '\u23F8\uFE0F', expose: '\u2694\uFE0F', event: '\u26A1', ending: '\uD83C\uDFAD'
    };

    // Group scenes by type
    const groups = {
        active: { label: '活跃场景', scenes: [] },
        idle: { label: '无新线索', scenes: [] },
        locked: { label: '锁定场景', scenes: [] }
    };
    for (const scene of s.scenes) {
        if (scene.sceneType === 'locked') groups.locked.scenes.push(scene);
        else if (scene.sceneType === 'idle') groups.idle.scenes.push(scene);
        else groups.active.scenes.push(scene);
    }

    let html = '';
    for (const [gKey, group] of Object.entries(groups)) {
        if (group.scenes.length === 0) continue;
        html += `<div class="scene-group">
            <div class="scene-group-label">${group.label} (${group.scenes.length})</div>
            <div class="scene-group-content">`;
        for (const scene of group.scenes) {
            const icon = sceneTypeIcons[scene.sceneType] || '';
            const evCount = scene.evidence.length;
            const npcCount = scene.npcs.length;
            const load = calcSceneInfoLoad(scene);
            const loadPct = Math.min(100, (load / 12) * 100);
            const loadColor = load > 9 ? '#c41e3a' : load > 6 ? '#c8a020' : '#4a7c59';
            const isLocked = scene.sceneType === 'locked';
            const isSelected = scene.id === selectedSceneId;
            const loadTipText = load <= 3 ? '轻量' : load <= 6 ? '适中' : load <= 9 ? '较重' : '过载';

            html += `
            <div class="scene-card ${isLocked ? 'locked' : ''} ${isSelected ? 'selected' : ''}"
                 data-scene-id="${scene.id}" onclick="toggleSceneDetail(${scene.id})">
                ${isLocked ? '<div class="scene-lock-icon">\uD83D\uDD12</div>' : ''}
                <div class="scene-card-header">
                    <span class="scene-card-name">${esc(scene.name)}</span>
                    <span class="scene-card-icon">${icon}</span>
                </div>
                <div class="scene-card-bubbles">
                    ${evCount > 0 ? `<span class="bubble bubble-ev">${evCount} 件证据</span>` : ''}
                    ${npcCount > 0 ? `<span class="bubble bubble-npc">${npcCount} NPC</span>` : ''}
                </div>
                <div class="density-bar-wrap">
                    <div class="density-bar">
                        <div class="density-bar-fill" style="width:${loadPct}%;background:linear-gradient(90deg, ${loadColor}88, ${loadColor});"></div>
                    </div>
                    <div class="density-bar-label">
                        <span class="density-bar-text density-tooltip" data-tip="${loadTipText} (${load})">密度 ${load}</span>
                        <span class="density-bar-text">${scene.id}</span>
                    </div>
                </div>
                <div class="collapsible-wrapper" id="sceneCollapse_${scene.id}">
                    <div class="collapsible-inner">
                        <div class="scene-detail">
                            ${renderSceneDetailInner(scene)}
                        </div>
                    </div>
                </div>
            </div>`;
        }
        html += '</div></div>';
    }
    document.getElementById('panelScenes').innerHTML = html;
}

function renderSceneDetailInner(scene) {
    let html = '';
    if (scene.evidence.length > 0) {
        html += '<div class="scene-detail-section"><h4>证据</h4>';
        for (const ev of scene.evidence) {
            const catColors = { key: '#e8a838', narrative: '#6b8f9e', prop: '#8e8e8e', derived: '#c67c3e', trap: '#cc4444' };
            const color = catColors[ev.category] || '#888';
            const catLabels = { key: '关键', narrative: '叙事', prop: '道具', derived: '派生', trap: '陷阱' };
            html += `<div class="ev-item">
                <span class="ev-dot" style="background:${color};color:${color}"></span>
                <span style="color:var(--ink-muted);font-size:0.72rem;font-weight:600;">${ev.id}</span>
                <span style="flex:1;">${esc(ev.name)}</span>
                <span class="badge badge-gray" style="font-size:0.58rem;">${catLabels[ev.category]||ev.category}</span>
            </div>`;
        }
        html += '</div>';
    }
    if (scene.npcs.length > 0) {
        html += '<div class="scene-detail-section"><h4>NPC</h4>';
        for (const npc of scene.npcs) {
            html += `<div class="ev-item">
                <span style="color:var(--gold);font-weight:600;">${esc(npc.key)}</span>
                ${npc.isLiar ? '<span class="badge badge-red">说谎者</span>' : ''}
                ${npc.testimonyIds.length > 0 ? `<span class="badge badge-blue">${npc.testimonyIds.length} 条证词</span>` : ''}
            </div>`;
        }
        html += '</div>';
    }
    if (scene.note) {
        html += `<div style="font-size:0.72rem;color:var(--ink-faint);margin-top:0.3rem;">${esc(scene.note)}</div>`;
    }
    return html || '<div style="font-size:0.75rem;color:var(--ink-muted);">无内容</div>';
}

function toggleSceneDetail(sceneId) {
    const wrapper = document.getElementById('sceneCollapse_' + sceneId);
    if (!wrapper) return;
    const isOpen = wrapper.classList.contains('open');

    // Close all
    document.querySelectorAll('.collapsible-wrapper[id^="sceneCollapse_"]').forEach(w => w.classList.remove('open'));
    document.querySelectorAll('.scene-card').forEach(c => c.classList.remove('selected'));

    if (!isOpen) {
        wrapper.classList.add('open');
        wrapper.closest('.scene-card').classList.add('selected');
        selectedSceneId = sceneId;
    } else {
        selectedSceneId = null;
    }
}

function highlightSceneAcrossPanels(sceneId) {
    document.querySelectorAll('.scene-card').forEach(c => c.classList.remove('linked-highlight'));
    const card = document.querySelector(`.scene-card[data-scene-id="${sceneId}"]`);
    if (card) {
        card.classList.add('linked-highlight');
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(() => card.classList.remove('linked-highlight'), 2500);
    }
}

// ===== Panel 4: Evidence Graph (侦探证据墙) =====
function renderGraph() {
    const s = currentState;
    const { nodes, edges } = buildGraph(s);

    // Force-directed layout
    const forceNodes = nodes.map(nd => ({
        ...nd,
        x: Math.random() * 700 + 50,
        y: Math.random() * 500 + 50,
        vx: 0, vy: 0
    }));

    // Initial positioning by layer for better convergence
    const layerOrder = { scene: 0, evidence: 1, doubt: 2, expose_round: 3 };
    const layerCounts = { scene: 0, evidence: 0, doubt: 0, expose_round: 0 };
    for (const nd of forceNodes) {
        const layer = layerOrder[nd.type] !== undefined ? layerOrder[nd.type] : 1;
        const count = layerCounts[nd.type] || 0;
        nd.x = 100 + layer * 180;
        nd.y = 40 + count * 50;
        layerCounts[nd.type] = count + 1;
    }

    // Build adjacency for force sim
    const nodeIndex = {};
    forceNodes.forEach((nd, i) => nodeIndex[nd.id] = i);

    // Run force simulation (~80 iterations)
    const iterations = 80;
    const svgW = 800;
    const svgH = Math.max(550, Math.max(...Object.values(layerCounts)) * 50 + 100);

    for (let iter = 0; iter < iterations; iter++) {
        const alpha = 1 - iter / iterations;
        const repulsion = 800 * alpha;
        const attraction = 0.02 * alpha;
        const centering = 0.001 * alpha;

        // Repulsion between all nodes
        for (let i = 0; i < forceNodes.length; i++) {
            for (let j = i + 1; j < forceNodes.length; j++) {
                let dx = forceNodes[j].x - forceNodes[i].x;
                let dy = forceNodes[j].y - forceNodes[i].y;
                let dist = Math.sqrt(dx*dx + dy*dy) || 1;
                let force = repulsion / (dist * dist);
                let fx = (dx / dist) * force;
                let fy = (dy / dist) * force;
                forceNodes[i].vx -= fx;
                forceNodes[i].vy -= fy;
                forceNodes[j].vx += fx;
                forceNodes[j].vy += fy;
            }
        }

        // Attraction along edges
        for (const edge of edges) {
            const si = nodeIndex[edge.source];
            const ti = nodeIndex[edge.target];
            if (si === undefined || ti === undefined) continue;
            const a = forceNodes[si];
            const b = forceNodes[ti];
            let dx = b.x - a.x;
            let dy = b.y - a.y;
            let dist = Math.sqrt(dx*dx + dy*dy) || 1;
            let idealDist = 100;
            let force = (dist - idealDist) * attraction;
            let fx = (dx / dist) * force;
            let fy = (dy / dist) * force;
            a.vx += fx; a.vy += fy;
            b.vx -= fx; b.vy -= fy;
        }

        // Centering force
        for (const nd of forceNodes) {
            nd.vx += (svgW/2 - nd.x) * centering;
            nd.vy += (svgH/2 - nd.y) * centering;
        }

        // Layer constraint (horizontal grouping)
        for (const nd of forceNodes) {
            const targetX = 100 + (layerOrder[nd.type] || 1) * 180;
            nd.vx += (targetX - nd.x) * 0.05 * alpha;
        }

        // Apply velocity with damping
        for (const nd of forceNodes) {
            nd.vx *= 0.6;
            nd.vy *= 0.6;
            nd.x += nd.vx;
            nd.y += nd.vy;
            nd.x = Math.max(30, Math.min(svgW - 30, nd.x));
            nd.y = Math.max(30, Math.min(svgH - 30, nd.y));
        }
    }

    // Build position map
    const posMap = {};
    for (const nd of forceNodes) {
        posMap[nd.id] = { x: Math.round(nd.x), y: Math.round(nd.y) };
    }

    // Build SVG
    let svgDefs = `
    <defs>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>`;

    let svgContent = '';

    // Draw edges as bezier curves with gradients and flowing animation
    for (const edge of edges) {
        const sp = posMap[edge.source];
        const tp = posMap[edge.target];
        if (!sp || !tp) continue;
        const mx = (sp.x + tp.x) / 2;
        const my = (sp.y + tp.y) / 2;
        // Slight curve offset
        const dx = tp.x - sp.x;
        const dy = tp.y - sp.y;
        const offset = Math.min(30, Math.sqrt(dx*dx+dy*dy) * 0.15);
        const cx = mx + (dy > 0 ? offset : -offset) * 0.5;
        const cy = my - (dx > 0 ? offset : -offset) * 0.5;

        const dashAttr = edge.dashed ? `stroke-dasharray="6,4" style="animation: dashFlow 1.5s linear infinite;"` : '';
        const pathD = `M${sp.x},${sp.y} Q${cx},${cy} ${tp.x},${tp.y}`;
        svgContent += `<path d="${pathD}" fill="none"
            stroke="${edge.color}" stroke-width="${edge.width}" ${dashAttr}
            opacity="0.5" class="graph-edge"
            data-source="${edge.source}" data-target="${edge.target}" />`;
    }

    // Draw nodes
    for (const nd of forceNodes) {
        const p = posMap[nd.id];
        if (!p) continue;
        const r = nd.size / 2;

        if (nd.shape === 'circle') {
            const isKey = nd.sourceData && nd.sourceData.category === 'key';
            const filterAttr = isKey ? 'filter="url(#glow)"' : '';
            svgContent += `<circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${nd.color}" stroke="rgba(255,255,255,0.3)" stroke-width="1"
                class="graph-node" data-node-id="${nd.id}" style="cursor:pointer" ${filterAttr} />`;
        } else if (nd.shape === 'diamond') {
            const pts = `${p.x},${p.y-r} ${p.x+r},${p.y} ${p.x},${p.y+r} ${p.x-r},${p.y}`;
            svgContent += `<polygon points="${pts}" fill="${nd.color}" stroke="rgba(255,255,255,0.3)" stroke-width="1"
                class="graph-node" data-node-id="${nd.id}" style="cursor:pointer" />`;
        } else if (nd.shape === 'rect') {
            svgContent += `<rect x="${p.x-r}" y="${p.y-r*0.7}" width="${r*2}" height="${r*1.4}" rx="4"
                fill="${nd.color}" stroke="rgba(255,255,255,0.3)" stroke-width="1"
                class="graph-node" data-node-id="${nd.id}" style="cursor:pointer" />`;
        } else if (nd.shape === 'triangle') {
            const pts = `${p.x},${p.y-r} ${p.x+r},${p.y+r*0.7} ${p.x-r},${p.y+r*0.7}`;
            svgContent += `<polygon points="${pts}" fill="${nd.color}" stroke="rgba(255,255,255,0.3)" stroke-width="1"
                class="graph-node" data-node-id="${nd.id}" style="cursor:pointer" />`;
        }

        // Label
        const labelText = nd.label.length > 10 ? nd.label.substring(0, 9) + '..' : nd.label;
        svgContent += `<text x="${p.x}" y="${p.y + r + 13}" text-anchor="middle"
            fill="rgba(255,255,255,0.45)" font-size="8" font-family="Segoe UI">${escSvg(labelText)}</text>`;
    }

    // Legend
    const legendHtml = `
        <div class="graph-legend">
            <div class="graph-legend-item"><div class="graph-legend-dot" style="background:#E8A838;box-shadow:0 0 4px #E8A838;"></div>关键证据</div>
            <div class="graph-legend-item"><div class="graph-legend-dot" style="background:#6B8F9E;"></div>叙事证据</div>
            <div class="graph-legend-item"><div class="graph-legend-dot" style="background:#8E8E8E;"></div>场景道具</div>
            <div class="graph-legend-item"><div class="graph-legend-diamond" style="background:#7A5C9E;"></div>疑点</div>
            <div class="graph-legend-item"><div class="graph-legend-triangle" style="border-bottom-color:#C44444;"></div>指证轮</div>
            <div class="graph-legend-item"><div class="graph-legend-rect" style="background:#4A7C59;"></div>场景</div>
        </div>`;

    document.getElementById('panelGraph').innerHTML = `
        ${legendHtml}
        <div class="graph-container" id="graphContainer">
            <svg id="graphSvg" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">
                <rect width="${svgW}" height="${svgH}" fill="#0f0d0b" />
                ${svgDefs}
                ${svgContent}
            </svg>
            <div class="graph-tooltip" id="graphTooltip"></div>
        </div>
    `;

    document.getElementById('graphSvg')._graphNodes = forceNodes;
    setupGraphInteraction();
}

function buildGraph(state) {
    const nodes = [];
    const edges = [];
    const nodeIds = new Set();

    function addNode(nd) {
        if (!nodeIds.has(nd.id)) { nodeIds.add(nd.id); nodes.push(nd); }
    }

    for (const scene of state.scenes) {
        if (scene.sceneType === 'idle' || scene.sceneType === 'locked') continue;
        addNode({
            id: 'scene_' + scene.id,
            type: 'scene',
            label: scene.name,
            color: '#4A7C59',
            shape: 'rect',
            size: 22,
            sourceData: scene
        });
    }

    const derivedNameMap = {};
    for (const scene of state.scenes) {
        for (const ev of scene.evidence) {
            if (ev.analyzedId) derivedNameMap[ev.analyzedId] = ev.name + '(分析后)';
        }
    }

    for (const scene of state.scenes) {
        for (const ev of scene.evidence) {
            const colorMap = { key: '#E8A838', narrative: '#6B8F9E', prop: '#8E8E8E', derived: '#C67C3E', trap: '#CC4444' };
            addNode({
                id: 'evidence_' + ev.id,
                type: 'evidence',
                label: ev.name,
                color: colorMap[ev.category] || '#888',
                shape: 'circle',
                size: ev.category === 'key' ? 18 : (ev.isDerived ? 15 : 10),
                sourceData: ev
            });
            if (scene.sceneType !== 'idle' && scene.sceneType !== 'locked') {
                edges.push({
                    id: `evidence_${ev.id}_scene_${scene.id}_located_in`,
                    source: 'evidence_' + ev.id,
                    target: 'scene_' + scene.id,
                    type: 'located_in',
                    color: '#555',
                    dashed: true,
                    label: null,
                    width: 1
                });
            }
            if (ev.analyzedId) {
                const derivedLabel = derivedNameMap[ev.analyzedId] || `派生 #${ev.analyzedId}`;
                addNode({
                    id: 'evidence_' + ev.analyzedId,
                    type: 'evidence',
                    label: derivedLabel,
                    color: '#C67C3E',
                    shape: 'circle',
                    size: 15,
                    sourceData: { id: ev.analyzedId, name: derivedLabel, isDerived: true }
                });
                edges.push({
                    id: `evidence_${ev.analyzedId}_evidence_${ev.id}_derived`,
                    source: 'evidence_' + ev.analyzedId,
                    target: 'evidence_' + ev.id,
                    type: 'derived_from',
                    color: '#C67C3E',
                    dashed: true,
                    label: null,
                    width: 1
                });
            }
        }
    }

    for (const doubt of state.doubts) {
        addNode({
            id: 'doubt_' + doubt.id,
            type: 'doubt',
            label: `D${doubt.id}`,
            color: '#7A5C9E',
            shape: 'diamond',
            size: 16,
            sourceData: doubt
        });
        for (const cond of doubt.unlockCondition) {
            if (cond.type === 'item') {
                edges.push({
                    id: `evidence_${cond.id}_doubt_${doubt.id}_unlocks`,
                    source: 'evidence_' + cond.id,
                    target: 'doubt_' + doubt.id,
                    type: 'unlocks_doubt',
                    color: '#7A5C9E',
                    dashed: false,
                    label: null,
                    width: 2
                });
            }
            if (cond.type === 'testimony') {
                edges.push({
                    id: `testimony_${cond.id}_doubt_${doubt.id}_testimony`,
                    source: 'doubt_' + doubt.id,
                    target: 'doubt_' + doubt.id,
                    type: 'testimony_for',
                    color: '#5C7AA8',
                    dashed: true,
                    label: `T${cond.id}`,
                    width: 1
                });
            }
        }
    }

    for (const round of state.expose.rounds) {
        addNode({
            id: 'expose_' + round.id,
            type: 'expose_round',
            label: `R${round.id}`,
            color: '#C44444',
            shape: 'triangle',
            size: 20,
            sourceData: round
        });
        for (const ue of round.usableEvidence) {
            edges.push({
                id: `evidence_${ue.id}_expose_${round.id}_used`,
                source: 'evidence_' + ue.id,
                target: 'expose_' + round.id,
                type: 'used_in_expose',
                color: '#C44444',
                dashed: false,
                label: null,
                width: 2
            });
        }
        for (const ae of round.autoFollowupEvidence) {
            edges.push({
                id: `evidence_${ae.id}_expose_${round.id}_auto`,
                source: 'evidence_' + ae.id,
                target: 'expose_' + round.id,
                type: 'used_in_expose',
                color: '#5C7AA8',
                dashed: false,
                label: null,
                width: 2
            });
        }
        for (const te of round.trapEvidence) {
            edges.push({
                id: `evidence_${te.id}_expose_${round.id}_trap`,
                source: 'evidence_' + te.id,
                target: 'expose_' + round.id,
                type: 'trap_in',
                color: '#CC4444',
                dashed: true,
                label: null,
                width: 1
            });
        }
    }

    for (const [origId, derivId] of Object.entries(state.derivedEvidenceMap)) {
        const derivNodeId = 'evidence_' + derivId;
        if (!nodeIds.has(derivNodeId)) {
            addNode({
                id: derivNodeId,
                type: 'evidence',
                label: `派生 #${derivId}`,
                color: '#C67C3E',
                shape: 'circle',
                size: 15,
                sourceData: { id: derivId, name: `派生 #${derivId}`, isDerived: true }
            });
        }
    }

    return { nodes, edges };
}

function setupGraphInteraction() {
    const container = document.getElementById('graphContainer');
    const svg = document.getElementById('graphSvg');
    const tooltip = document.getElementById('graphTooltip');
    if (!svg || !container) return;

    let viewBox = svg.viewBox.baseVal;
    let isPanning = false;
    let startX, startY;

    container.addEventListener('wheel', (e) => {
        e.preventDefault();
        const factor = e.deltaY > 0 ? 1.1 : 0.9;
        const rect = container.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const sx = viewBox.x + (mx / rect.width) * viewBox.width;
        const sy = viewBox.y + (my / rect.height) * viewBox.height;
        const newW = viewBox.width * factor;
        const newH = viewBox.height * factor;
        viewBox.x = sx - (mx / rect.width) * newW;
        viewBox.y = sy - (my / rect.height) * newH;
        viewBox.width = newW;
        viewBox.height = newH;
    });

    container.addEventListener('mousedown', (e) => {
        if (e.target.classList.contains('graph-node')) return;
        isPanning = true;
        startX = e.clientX;
        startY = e.clientY;
        container.style.cursor = 'grabbing';
    });
    window.addEventListener('mousemove', (e) => {
        if (!isPanning) return;
        const rect = container.getBoundingClientRect();
        const dx = (e.clientX - startX) * (viewBox.width / rect.width);
        const dy = (e.clientY - startY) * (viewBox.height / rect.height);
        viewBox.x -= dx;
        viewBox.y -= dy;
        startX = e.clientX;
        startY = e.clientY;
    });
    window.addEventListener('mouseup', () => { isPanning = false; container.style.cursor = 'grab'; });
    container.style.cursor = 'grab';

    // Store original edge opacities
    svg.querySelectorAll('.graph-edge').forEach(edge => {
        edge.dataset.origWidth = edge.getAttribute('stroke-width');
    });

    svg.addEventListener('mouseover', (e) => {
        const node = e.target.closest('.graph-node');
        if (!node) return;
        const nodeId = node.dataset.nodeId;

        const connectedIds = new Set([nodeId]);
        svg.querySelectorAll('.graph-edge').forEach(edge => {
            if (edge.dataset.source === nodeId || edge.dataset.target === nodeId) {
                edge.setAttribute('opacity', '1');
                edge.setAttribute('stroke-width', parseFloat(edge.dataset.origWidth) + 1.5);
                connectedIds.add(edge.dataset.source);
                connectedIds.add(edge.dataset.target);
            } else {
                edge.setAttribute('opacity', '0.08');
            }
        });

        svg.querySelectorAll('.graph-node').forEach(n => {
            if (!connectedIds.has(n.dataset.nodeId)) n.setAttribute('opacity', '0.12');
        });
        // Also dim labels
        svg.querySelectorAll('text').forEach(t => {
            // Only dim non-connected node labels
            const prevSibling = t.previousElementSibling;
            if (prevSibling && prevSibling.classList.contains('graph-node') && !connectedIds.has(prevSibling.dataset.nodeId)) {
                t.setAttribute('opacity', '0.12');
            }
        });

        const cachedNodes = svg._graphNodes || [];
        const nd = cachedNodes.find(n => n.id === nodeId);
        if (nd) {
            const typeLabels = {evidence:'证据',scene:'场景',doubt:'疑点',expose_round:'指证轮'};
            let tipHtml = `<b>${esc(nd.label)}</b><br>类型: ${typeLabels[nd.type]||nd.type}`;
            if (nd.sourceData) {
                if (nd.sourceData.text) tipHtml += `<br>${esc(nd.sourceData.text)}`;
                if (nd.sourceData.note) tipHtml += `<br>${esc(nd.sourceData.note)}`;
                if (nd.sourceData.lie) tipHtml += `<br>谎言: ${esc(nd.sourceData.lie.substring(0,40))}...`;
            }
            tooltip.innerHTML = tipHtml;
            const rect = container.getBoundingClientRect();
            tooltip.style.display = 'block';
            tooltip.style.left = (e.clientX - rect.left + 15) + 'px';
            tooltip.style.top = (e.clientY - rect.top - 10) + 'px';
        }
    });

    svg.addEventListener('mouseout', (e) => {
        const node = e.target.closest('.graph-node');
        if (!node) return;
        svg.querySelectorAll('.graph-edge').forEach(edge => {
            edge.setAttribute('opacity', '0.5');
            edge.setAttribute('stroke-width', edge.dataset.origWidth || '1');
        });
        svg.querySelectorAll('.graph-node').forEach(n => n.setAttribute('opacity', '1'));
        svg.querySelectorAll('text').forEach(t => t.setAttribute('opacity', '1'));
        tooltip.style.display = 'none';
    });

    container.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
}

// ===== Panel 5: NPC Knowledge (知识光谱) =====
function renderNpcKnowledge() {
    const s = currentState;

    // Deduplicate: merge scene NPC and expose NPC
    const npcMap = new Map();
    for (const npc of s.opening.npcs) {
        npcMap.set(npc.key, { ...npc, source: '开篇' });
    }
    for (const scene of s.scenes) {
        for (const npc of scene.npcs) {
            if (npcMap.has(npc.key)) {
                const existing = npcMap.get(npc.key);
                existing.knows = [...new Set([...existing.knows, ...npc.knows])];
                existing.doesNotKnow = [...new Set([...existing.doesNotKnow, ...npc.doesNotKnow])];
                if (!existing.lie && npc.lie) existing.lie = npc.lie;
                if (!existing.isLiar && npc.isLiar) existing.isLiar = true;
                existing.source += ' + 场景';
            } else {
                npcMap.set(npc.key, { ...npc, source: '场景' });
            }
        }
    }
    if (s.expose.npcState) {
        const enpc = s.expose.npcState;
        if (npcMap.has(enpc.key)) {
            const existing = npcMap.get(enpc.key);
            existing.knows = [...new Set([...existing.knows, ...enpc.knows])];
            existing.doesNotKnow = [...new Set([...existing.doesNotKnow, ...enpc.doesNotKnow])];
            if (!existing.lie && enpc.lie) existing.lie = enpc.lie;
            if (!existing.isLiar && enpc.isLiar) existing.isLiar = true;
            existing.mindset = enpc.mindset || existing.mindset;
            existing.source += ' + 指证';
        } else {
            npcMap.set(enpc.key, { ...enpc, source: '指证' });
        }
    }

    function isConcealed(knowItem, npc) {
        if (!npc.lie) return false;
        const truthLower = npc.lie.truth.toLowerCase();
        const itemLower = knowItem.toLowerCase();
        const words = itemLower.split(/\s+/).filter(w => w.length > 2);
        return words.some(w => truthLower.includes(w)) && words.length > 0;
    }

    function willRevealThisLoop(item) {
        const postK = s.playerContext.postExposeKnowledge;
        const itemLower = item.toLowerCase();
        return postK.some(pk => {
            const pkLower = pk.toLowerCase();
            const words = itemLower.split(/\s+/).filter(w => w.length > 3);
            return words.filter(w => pkLower.includes(w)).length >= 2;
        });
    }

    let html = '';
    for (const [key, npc] of npcMap) {
        const isLiar = npc.isLiar;
        const npcInitial = key.charAt(0).toUpperCase();

        html += `<div class="npc-card ${isLiar ? 'is-liar' : ''}">
            <div class="npc-card-header">
                <div style="display:flex;align-items:center;gap:0.6rem;">
                    <div style="width:32px;height:32px;border-radius:50%;background:${isLiar ? 'var(--crimson)' : 'var(--surface-3)'};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.9rem;color:${isLiar ? '#fff' : 'var(--ink-muted)'};flex-shrink:0;">${npcInitial}</div>
                    <div class="npc-card-name">${esc(key)}</div>
                </div>
                <div>
                    ${isLiar ? '<span class="badge badge-red">说谎者</span>' : '<span class="badge badge-gray">诚实</span>'}
                    <span class="badge badge-gray" style="font-size:0.58rem">${npc.source}</span>
                </div>
            </div>
            <div class="npc-columns">
                <div class="npc-col npc-col-knows">
                    <h4>已知信息 (${npc.knows.length})</h4>
                    <ul>
                        ${npc.knows.map(k => {
                            const concealed = isConcealed(k, npc);
                            return `<li${concealed ? ' class="conceal-mark"' : ''}><span>${esc(k)}</span>${concealed ? '<span class="conceal-tag">隐瞒</span>' : ''}</li>`;
                        }).join('')}
                    </ul>
                </div>
                <div class="npc-col npc-col-doesnt">
                    <h4>未知信息 (${npc.doesNotKnow.length})</h4>
                    <ul>
                        ${npc.doesNotKnow.map(d => {
                            const reveal = willRevealThisLoop(d);
                            return `<li><span>${esc(d)}</span>${reveal ? '<span class="badge badge-yellow" style="font-size:0.55rem;margin-left:0.3rem;">本Loop揭示</span>' : ''}</li>`;
                        }).join('')}
                    </ul>
                </div>
            </div>
            ${npc.lie ? `
            <div class="lie-section">
                <div class="lie-toggle" onclick="toggleLie(this)">
                    <span class="lie-toggle-arrow">&#9654;</span> 谎言 vs 真相
                </div>
                <div class="collapsible-wrapper" data-lie-content>
                    <div class="collapsible-inner">
                        <div style="padding:0.5rem 0;">
                            <div class="lie-row">
                                <span class="lie-label">谎言</span>
                                <span style="font-size:0.82rem;color:var(--ink-secondary);">${esc(npc.lie.content)}</span>
                            </div>
                            <div class="lie-row">
                                <span class="truth-label">真相</span>
                                <span style="font-size:0.82rem;color:var(--ink-secondary);">${esc(npc.lie.truth)}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>` : ''}
            ${npc.motive ? `<div class="npc-motive">动机: ${esc(npc.motive)}</div>` : ''}
        </div>`;
    }

    document.getElementById('panelNpcKnowledge').innerHTML = html || '<div class="loading-msg">无 NPC 数据</div>';
}

function toggleLie(el) {
    const wrapper = el.nextElementSibling;
    const arrow = el.querySelector('.lie-toggle-arrow');
    if (wrapper) {
        wrapper.classList.toggle('open');
        if (arrow) arrow.classList.toggle('open');
    }
}

// ===== Panel 6: Expose Breakdown (法庭攻防战报) =====
function renderExpose() {
    const s = currentState;
    const ex = s.expose;
    if (!ex || ex.rounds.length === 0) {
        document.getElementById('panelExpose').innerHTML = '<div class="loading-msg">无指证数据</div>';
        return;
    }

    const npcState = ex.npcState;

    // Infer round status
    function inferStatus(result) {
        if (result.includes('承认') && (result.includes('完整') || result.includes('最终') || result.includes('坦白'))) return { label: '击破', cls: 'status-break' };
        if (result.includes('含泪') || result.includes('崩') || result.includes('供出')) return { label: '击破', cls: 'status-break' };
        if (result.includes('部分承认') || result.includes('说漏嘴') || result.includes('退守') || result.includes('动摇')) return { label: '动摇', cls: 'status-waver' };
        if (result.includes('辩解') || result.includes('慌张') || result.includes('坚称') || result.includes('无法解释')) return { label: '防守', cls: 'status-defend' };
        return { label: '防守', cls: 'status-defend' };
    }

    // Defense bar: shows progression from full to broken
    const defenseStates = ex.rounds.map(r => inferStatus(r.result));

    // Header
    let html = `
    <div class="expose-header">
        <div class="expose-target-title">指证: ${esc(ex.target)} | 共 ${ex.totalRounds} 轮</div>
        ${npcState && npcState.mindset ? `
        <div class="mindset-bar">
            <span class="mindset-label">心态</span>
            <span class="mindset-text">${esc(npcState.mindset)}</span>
        </div>` : ''}
        <div class="defense-bar-container">
            <span class="defense-bar-label">防御值</span>
            <div class="defense-bar-segments">
                ${ex.rounds.map((r, i) => {
                    const st = defenseStates[i];
                    const color = st.cls === 'status-defend' ? 'var(--accent-green)' : st.cls === 'status-waver' ? '#c8a020' : 'var(--crimson)';
                    return `<div class="defense-segment" style="background:${color};" title="R${r.id}: ${st.label}"></div>`;
                }).join('')}
            </div>
        </div>
    </div>

    <div class="annotation-filters">
        <label style="font-size:0.82rem;color:var(--gold);font-weight:600;">注解过滤:</label>
        ${['CLIMAX','TURN','CROSS','PLANT','AMBUSH'].map(t =>
            `<label><input type="checkbox" checked data-ann-type="${t}" onchange="toggleAnnotation('${t}', this.checked)"> ${annLabel(t)}</label>`
        ).join('')}
    </div>`;

    // Rounds as battle cards
    for (const round of ex.rounds) {
        const isFinal = round.id === ex.totalRounds;
        const status = inferStatus(round.result);
        const allAnnotations = s.annotations.filter(a => a.location === 'expose' && a.roundId === round.id);

        html += `
        <div class="expose-round ${isFinal ? 'final-round' : ''}" data-round-id="${round.id}">
            <div class="expose-round-header">
                <span class="round-title">第 ${round.id} 轮${round.lieSource ? ` — ${esc(round.lieSource)}` : ''}</span>
                <span class="round-status ${status.cls}">${status.label}</span>
            </div>
            <div class="expose-battle">
                <!-- Left: NPC lie/defense -->
                <div class="battle-left">
                    <div class="battle-section-label">NPC 谎言 / 辩护</div>
                    <div class="lie-quote">${esc(round.lie)}</div>
                    ${round.trapEvidence.length > 0 ? `
                    <div style="margin-top:0.6rem;">
                        <div style="font-size:0.68rem;color:var(--crimson-glow);text-transform:uppercase;font-weight:600;letter-spacing:0.5px;margin-bottom:0.3rem;">陷阱证据</div>
                        <div class="evidence-list">
                            ${round.trapEvidence.map(e =>
                                `<div class="evidence-chip trap" title="${escAttr(e.usage)}">
                                    <b>${e.id}</b> ${esc(e.name)}
                                </div>`
                            ).join('')}
                        </div>
                    </div>` : ''}
                </div>

                <!-- Center: VS -->
                <div class="battle-center">
                    <div class="battle-vs">VS</div>
                </div>

                <!-- Right: Evidence + Result -->
                <div class="battle-right">
                    <div class="battle-section-label">可用证据</div>
                    <div class="evidence-list">
                        ${round.usableEvidence.map(e =>
                            `<div class="evidence-chip" title="${escAttr(e.usage)}">
                                <b>${e.id}</b> ${esc(e.name)}
                            </div>`
                        ).join('')}
                    </div>
                    ${round.autoFollowupEvidence.length > 0 ? `
                    <div style="margin-top:0.5rem;">
                        <div style="font-size:0.68rem;color:#8ab4cc;text-transform:uppercase;font-weight:600;letter-spacing:0.5px;margin-bottom:0.3rem;">自动追问</div>
                        <div class="evidence-list">
                            ${round.autoFollowupEvidence.map(e =>
                                `<div class="evidence-chip auto" title="${escAttr(e.usage)}">
                                    <b>${e.id}</b> ${esc(e.name)}
                                </div>`
                            ).join('')}
                        </div>
                    </div>` : ''}
                </div>
            </div>

            <!-- Result -->
            <div class="expose-result">
                <div class="result-label">击穿结果</div>
                <div class="result-text">${esc(round.result)}</div>
                ${round.relationNetwork ? `
                <div style="margin-top:0.5rem;">
                    <div style="font-size:0.68rem;color:var(--accent-purple-light);text-transform:uppercase;font-weight:600;letter-spacing:0.5px;margin-bottom:0.3rem;">关系网络</div>
                    <div style="font-size:0.78rem;color:var(--ink-secondary);">
                        ${round.relationNetwork.map(rn =>
                            `<div style="padding:0.1rem 0;">T${rn.testimony} ${esc(rn['连接'] || rn.connection || '')} — ${esc(rn['验证'] || rn.validation || '')}</div>`
                        ).join('')}
                    </div>
                </div>` : ''}
            </div>

            ${allAnnotations.length > 0 ? `
            <div style="padding:0.5rem 1rem;background:var(--surface-1);border-top:1px solid var(--surface-3);">
                ${allAnnotations.map(a => `
                    <span class="annotation-bubble ${a.type} ann-${a.type}" onclick="this.nextElementSibling.classList.toggle('open')">${annLabel(a.type)}</span>
                    <div class="annotation-detail ann-${a.type}">${esc(a.text)}</div>
                `).join('')}
            </div>` : ''}
        </div>`;
    }

    // Related doubt annotations
    const doubtAnnotations = s.annotations.filter(a => a.location === 'doubt');
    if (doubtAnnotations.length > 0) {
        html += `<div class="card" style="margin-top:0.5rem;">
            <div class="card-title">相关疑点注解</div>
            ${doubtAnnotations.map(a => `
                <span class="annotation-bubble ${a.type} ann-${a.type}" onclick="this.nextElementSibling.classList.toggle('open')">${annLabel(a.type)} D#${a.doubtId || ''}</span>
                <div class="annotation-detail ann-${a.type}">${esc(a.text)}</div>
            `).join('')}
        </div>`;
    }

    document.getElementById('panelExpose').innerHTML = html;
}

function toggleAnnotation(type, checked) {
    annotationFilters[type] = checked;
    document.querySelectorAll(`.ann-${type}`).forEach(el => {
        el.style.display = checked ? '' : 'none';
    });
}

// ===== Utility =====
const annTypeLabel = { CLIMAX: '高潮', TURN: '转折', CROSS: '交叉验证', PLANT: '伏笔', AMBUSH: '人性冲击' };
function annLabel(type) { return annTypeLabel[type] || type; }
function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) {
    return esc(str).replace(/'/g, '&#39;');
}
function escSvg(str) {
    return esc(str);
}
</script>
</body>
</html>
