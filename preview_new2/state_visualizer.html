<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDC State Visualizer</title>
    <script>
    (function(){
        var h = location.hostname;
        var isLocal = (h === 'localhost' || h === '127.0.0.1' || location.protocol === 'file:');
        var src = isLocal ? '/NDC_project/preview_new2/js-yaml.min.js' : '/preview_new2/js-yaml.min.js';
        document.write('<scr'+'ipt src="'+src+'"><\/scr'+'ipt>');
    })();
    </script>
    <style>
        /* ===== DESIGN TOKENS ===== */
        :root {
            /* Elevation system: 4-level surfaces */
            --surface-0: #0c0a09;
            --surface-1: #1a1614;
            --surface-2: #28221e;
            --surface-3: #362e28;
            --surface-4: #443a32;

            --shadow-1: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
            --shadow-2: 0 3px 6px rgba(0,0,0,0.4), 0 3px 6px rgba(0,0,0,0.3);
            --shadow-3: 0 10px 20px rgba(0,0,0,0.4), 0 6px 6px rgba(0,0,0,0.3);
            --shadow-4: 0 14px 28px rgba(0,0,0,0.5), 0 10px 10px rgba(0,0,0,0.3);

            /* 1920s palette */
            --amber: #d4a24e;
            --amber-dim: #a67c38;
            --copper: #c67c3e;
            --crimson: #b84040;
            --crimson-dark: #8a2020;
            --crimson-glow: #e05050;
            --gold: #e8c678;
            --gold-dim: #8a7030;

            --ink: #e8e0d4;
            --ink-secondary: #bfb5a5;
            --ink-muted: #8a8070;
            --ink-faint: #5a544c;

            --accent-green: #4a7c59;
            --accent-blue: #5c7aa8;
            --accent-purple: #7a5c9e;
            --accent-purple-light: #c9a8e8;
            --accent-teal: #3a8a7a;

            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;

            --transition-fast: 150ms ease;
            --transition-normal: 250ms ease;
            --transition-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ===== GLOBAL RESET & BASE ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--surface-0);
            color: var(--ink);
            line-height: 1.6;
            min-height: 100vh;
            /* Paper noise texture */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--surface-0); }
        ::-webkit-scrollbar-thumb { background: var(--surface-4); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--ink-muted); }

        /* ===== HEADER ===== */
        .header {
            background: var(--surface-1);
            padding: 0.6rem 1.5rem;
            border-bottom: 2px solid var(--crimson);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-2);
        }
        .header-title {
            font-size: 1.15rem;
            color: var(--gold);
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .header-controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        select, .btn {
            background: var(--surface-3);
            color: var(--ink);
            border: 1px solid var(--surface-4);
            padding: 0.35rem 0.7rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.85rem;
            transition: border-color var(--transition-fast);
        }
        select:hover, select:focus { border-color: var(--amber-dim); outline: none; }
        .btn {
            background: var(--crimson);
            border: none;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: background var(--transition-fast), transform var(--transition-fast);
        }
        .btn:hover { background: var(--crimson-glow); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* ===== TAB BAR ===== */
        .tab-bar {
            display: flex;
            background: var(--surface-1);
            border-bottom: 1px solid var(--surface-3);
            padding: 0 1rem;
            position: sticky;
            top: 42px;
            z-index: 99;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .tab {
            padding: 0.6rem 1.1rem;
            cursor: pointer;
            font-size: 0.82rem;
            color: var(--ink-muted);
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: color var(--transition-fast), border-color var(--transition-fast);
            white-space: nowrap;
            font-weight: 500;
        }
        .tab:hover { color: var(--ink-secondary); }
        .tab.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
            font-weight: 700;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            padding: 1.2rem 1.5rem 3rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .panel { display: none; }
        .panel.active { display: block; animation: panelFadeIn 0.3s ease; }
        @keyframes panelFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== LOADING / ERROR ===== */
        .loading-msg, .error-msg {
            text-align: center;
            padding: 5rem 2rem;
            color: var(--ink-muted);
            font-size: 1.1rem;
        }
        .error-msg { color: var(--crimson-glow); }

        /* ===== CARD SYSTEM (Elevation-based) ===== */
        .card {
            background: var(--surface-1);
            border: 1px solid var(--surface-3);
            border-radius: var(--radius-lg);
            padding: 1.2rem 1.4rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow-1);
            transition: transform var(--transition-normal), box-shadow var(--transition-normal);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(212,162,78,0.04), transparent 40%);
            pointer-events: none;
            opacity: 0;
            transition: opacity var(--transition-normal);
        }
        .card:hover::before { opacity: 1; }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-2);
        }
        .card-elevated {
            background: var(--surface-2);
            border-color: var(--surface-4);
            box-shadow: var(--shadow-2);
        }
        .card-elevated:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-3);
        }
        .card-title {
            color: var(--gold);
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
            letter-spacing: 0.3px;
        }

        /* ===== COLLAPSE / EXPAND ANIMATION ===== */
        .collapsible-wrapper {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows var(--transition-slow);
        }
        .collapsible-wrapper.open {
            grid-template-rows: 1fr;
        }
        .collapsible-inner {
            overflow: hidden;
        }

        /* ===== GRIDS ===== */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }

        /* ===== BADGES ===== */
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-size: 0.68rem;
            font-weight: 600;
            margin: 0.1rem;
            letter-spacing: 0.3px;
        }
        .badge-red { background: rgba(184,64,64,0.25); color: var(--crimson-glow); border: 1px solid rgba(184,64,64,0.3); }
        .badge-green { background: rgba(74,124,89,0.2); color: #6da07a; border: 1px solid rgba(74,124,89,0.25); }
        .badge-yellow { background: rgba(138,112,48,0.25); color: var(--gold); border: 1px solid rgba(138,112,48,0.3); }
        .badge-purple { background: rgba(122,92,158,0.2); color: var(--accent-purple-light); border: 1px solid rgba(122,92,158,0.25); }
        .badge-blue { background: rgba(92,122,168,0.2); color: #8ab4cc; border: 1px solid rgba(92,122,168,0.25); }
        .badge-gray { background: rgba(138,128,112,0.15); color: var(--ink-muted); border: 1px solid rgba(138,128,112,0.2); }

        /* ===== ANNOTATION BUBBLES ===== */
        .annotation-bubble {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.6rem;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            margin: 0.15rem;
            transition: transform var(--transition-fast), box-shadow var(--transition-fast);
        }
        .annotation-bubble:hover { transform: scale(1.05); }
        .annotation-bubble.CLIMAX { background: rgba(204,68,68,0.2); color: #e07070; border: 1px solid rgba(204,68,68,0.3); }
        .annotation-bubble.TURN { background: rgba(200,180,60,0.2); color: #c8c060; border: 1px solid rgba(200,180,60,0.3); }
        .annotation-bubble.CROSS { background: rgba(122,92,158,0.2); color: #c9a8e8; border: 1px solid rgba(122,92,158,0.3); }
        .annotation-bubble.PLANT { background: rgba(74,124,89,0.2); color: #6da07a; border: 1px solid rgba(74,124,89,0.3); }
        .annotation-bubble.AMBUSH { background: rgba(200,120,60,0.2); color: #e8a060; border: 1px solid rgba(200,120,60,0.3); }
        .annotation-detail {
            display: none;
            margin-top: 0.3rem;
            font-size: 0.78rem;
            color: var(--ink-secondary);
            padding: 0.5rem 0.8rem;
            background: rgba(255,255,255,0.02);
            border-radius: var(--radius-sm);
            line-height: 1.5;
            border-left: 2px solid var(--ink-faint);
        }
        .annotation-detail.open { display: block; }

        /* ============================================ */
        /* PANEL 1: HERO OVERVIEW "剧情仪表盘"          */
        /* ============================================ */
        .hero-banner {
            background: linear-gradient(135deg, #1a0808 0%, var(--surface-0) 60%);
            border-radius: var(--radius-xl);
            padding: 2rem 2.5rem;
            margin-bottom: 1.2rem;
            border: 1px solid var(--surface-3);
            position: relative;
            overflow: hidden;
        }
        .hero-banner::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 300px; height: 100%;
            background: radial-gradient(ellipse at 100% 50%, rgba(184,64,64,0.08), transparent 70%);
            pointer-events: none;
        }
        .hero-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--gold);
            letter-spacing: 1px;
            margin-bottom: 0.2rem;
        }
        .hero-subtitle {
            color: var(--ink-muted);
            font-size: 0.88rem;
            margin-bottom: 0.2rem;
        }
        .hero-liar {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .hero-liar-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--crimson);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1rem;
            color: #fff;
            box-shadow: 0 0 12px rgba(184,64,64,0.4);
        }
        .hero-liar-name {
            color: var(--crimson-glow);
            font-weight: 700;
            font-size: 1rem;
        }
        .hero-liar-label {
            color: var(--ink-muted);
            font-size: 0.75rem;
        }
        .hero-reveal {
            color: var(--ink-secondary);
            font-size: 0.85rem;
            margin-top: 0.8rem;
            line-height: 1.6;
            max-width: 600px;
        }

        /* Donut chart metrics */
        .metrics-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 1.2rem;
        }
        .metric-card {
            background: var(--surface-1);
            border: 1px solid var(--surface-3);
            border-radius: var(--radius-lg);
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            box-shadow: var(--shadow-1);
            transition: transform var(--transition-normal), box-shadow var(--transition-normal);
        }
        .metric-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-2);
        }
        .donut-wrapper {
            width: 52px; height: 52px;
            position: relative;
            flex-shrink: 0;
        }
        .donut-wrapper svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .donut-value {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--gold);
        }
        .metric-label {
            font-size: 0.75rem;
            color: var(--ink-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Liar highlight card */
        .liar-card {
            background: linear-gradient(135deg, rgba(184,64,64,0.08), var(--surface-1));
            border: 1px solid var(--surface-3);
            border-left: 4px solid var(--crimson);
            border-radius: var(--radius-lg);
            padding: 1rem 1.2rem;
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            box-shadow: var(--shadow-1);
        }
        .liar-card-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--crimson);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 0 16px rgba(184,64,64,0.3);
        }
        .liar-card-body { flex: 1; }
        .liar-card-name { font-weight: 700; color: var(--crimson-glow); font-size: 0.95rem; }
        .liar-card-detail { font-size: 0.78rem; color: var(--ink-secondary); margin-top: 0.2rem; line-height: 1.5; }

        /* Mini timeline */
        .mini-timeline {
            display: flex;
            align-items: center;
            gap: 0;
            padding: 0.8rem 0 0.3rem;
            position: relative;
            overflow-x: auto;
        }
        .mini-timeline-line {
            position: absolute;
            top: 50%;
            left: 20px; right: 20px;
            height: 2px;
            background: var(--surface-3);
            transform: translateY(-50%);
        }
        .mini-tl-node {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            min-width: 60px;
        }
        .mini-tl-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            border: 2px solid var(--surface-0);
            box-shadow: 0 0 0 1px var(--ink-faint);
        }
        .mini-tl-dot.type-opening { background: var(--gold); }
        .mini-tl-dot.type-explore { background: var(--accent-green); }
        .mini-tl-dot.type-expose { background: var(--crimson); box-shadow: 0 0 6px rgba(184,64,64,0.5); }
        .mini-tl-dot.type-closing { background: var(--accent-blue); }
        .mini-tl-dot.type-sudden_event { background: #e8a060; }
        .mini-tl-label {
            font-size: 0.6rem;
            color: var(--ink-muted);
            text-align: center;
            max-width: 70px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ============================================ */
        /* PANEL 2: TENSION CURVE "呼吸的张力曲线"       */
        /* ============================================ */
        .canvas-container {
            position: relative;
            width: 100%;
        }
        .canvas-tooltip {
            position: absolute;
            display: none;
            background: var(--surface-2);
            border: 1px solid var(--amber-dim);
            padding: 0.5rem 0.8rem;
            border-radius: var(--radius-md);
            font-size: 0.88rem;
            color: var(--ink);
            max-width: 340px;
            line-height: 1.5;
            pointer-events: none;
            z-index: 50;
            box-shadow: var(--shadow-3);
        }

        /* ============================================ */
        /* PANEL 3: SCENE MAP "空间化分组"               */
        /* ============================================ */
        .scene-group {
            margin-bottom: 1.5rem;
        }
        .scene-group-label {
            font-size: 0.72rem;
            color: var(--ink-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0.3rem 0.6rem;
            margin-bottom: 0.6rem;
            font-weight: 600;
        }
        .scene-group-content {
            border: 1px dashed var(--surface-4);
            border-radius: var(--radius-lg);
            padding: 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 0.8rem;
        }
        .scene-card {
            background: var(--surface-2);
            border: 1px solid var(--surface-3);
            border-radius: var(--radius-md);
            padding: 0.9rem 1rem;
            cursor: pointer;
            transition: transform var(--transition-normal), box-shadow var(--transition-normal), border-color var(--transition-fast);
            position: relative;
            overflow: hidden;
        }
        .scene-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(400px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(212,162,78,0.06), transparent 40%);
            pointer-events: none;
            opacity: 0;
            transition: opacity var(--transition-normal);
        }
        .scene-card:hover::before { opacity: 1; }
        .scene-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-3);
            border-color: var(--amber-dim);
        }
        .scene-card.locked {
            opacity: 0.5;
            position: relative;
        }
        .scene-card.locked::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(12,10,9,0.4);
            backdrop-filter: blur(1px);
            border-radius: var(--radius-md);
            pointer-events: none;
        }
        .scene-lock-icon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            z-index: 2;
            opacity: 0.6;
        }
        .scene-card.selected {
            border-color: var(--gold);
            box-shadow: 0 0 12px rgba(232,198,120,0.15);
        }
        .scene-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.4rem;
        }
        .scene-card-name { font-weight: 600; font-size: 0.88rem; color: var(--ink); }
        .scene-card-icon { font-size: 1.1rem; }
        .scene-card-bubbles { display: flex; gap: 0.4rem; margin-top: 0.35rem; flex-wrap: wrap; }
        .bubble { font-size: 0.68rem; padding: 0.12rem 0.45rem; border-radius: 8px; }
        .bubble-ev { background: rgba(212,162,78,0.15); color: var(--amber); border: 1px solid rgba(212,162,78,0.2); }
        .bubble-npc { background: rgba(74,124,89,0.15); color: #6da07a; border: 1px solid rgba(74,124,89,0.2); }

        /* Density bar (gradient style) */
        .density-bar-wrap { margin-top: 0.4rem; }
        .density-bar {
            height: 4px;
            border-radius: 2px;
            background: var(--surface-4);
            overflow: hidden;
        }
        .density-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.4s ease;
        }
        .density-bar-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.15rem;
        }
        .density-bar-text {
            font-size: 0.65rem;
            color: var(--ink-faint);
        }
        .density-tooltip {
            position: relative;
            cursor: help;
        }
        .density-tooltip::after {
            content: attr(data-tip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface-3);
            color: var(--ink-secondary);
            font-size: 0.68rem;
            padding: 0.3rem 0.5rem;
            border-radius: var(--radius-sm);
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }
        .density-tooltip:hover::after { opacity: 1; }

        /* Scene detail (collapsible) */
        .scene-detail {
            margin-top: 0.8rem;
            border-top: 1px solid var(--surface-4);
            padding-top: 0.6rem;
        }
        .scene-detail-section { margin-bottom: 0.6rem; }
        .scene-detail-section h4 {
            color: var(--amber);
            font-size: 0.78rem;
            margin-bottom: 0.3rem;
            font-weight: 600;
        }
        .ev-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0;
            font-size: 0.8rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .ev-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 4px currentColor;
        }

        /* ============================================ */
        /* PANEL 4: EVIDENCE GRAPH "侦探证据墙"          */
        /* ============================================ */
        .graph-container {
            width: 100%;
            height: 650px;
            border: 1px solid var(--surface-3);
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--surface-1);
            position: relative;
            box-shadow: var(--shadow-2);
        }
        .graph-container svg { width: 100%; height: 100%; }

        /* Flowing dash animation */

        /* ============================================ */

        .conceal-mark {

    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">NDC State Visualizer</div>
        <div class="header-controls">
            <select id="unitSelect">
                <option value="1">Unit 1</option>
                <option value="2">Unit 2</option>
                <option value="3">Unit 3</option>
            </select>
            <select id="loopSelect">
                <option value="1">Loop 1</option>
                <option value="2">Loop 2</option>
                <option value="3">Loop 3</option>
                <option value="4">Loop 4</option>
                <option value="5">Loop 5</option>
                <option value="6">Loop 6</option>
            </select>
            <button class="btn" id="loadBtn">加载</button>
            <span id="statusText" style="color:var(--ink-muted);font-size:0.78rem;margin-left:0.5rem;"></span>
        </div>
    </div>
    <div class="tab-bar" id="tabBar">
        <div class="tab active" data-panel="overview">剧情仪表盘</div>
        <div class="tab" data-panel="tension">张力曲线</div>
        <div class="tab" data-panel="scenes">场景地图</div>
        <div class="tab" data-panel="graph">证据关系网</div>
        <div class="tab" data-panel="npcKnowledge">知识光谱</div>
        <div class="tab" data-panel="expose">攻防战报</div>
    </div>
    <div class="main-content">
        <div id="emptyState" class="loading-msg">选择 Unit 和 Loop 后点击「加载」</div>
        <div id="panelOverview" class="panel"></div>
        <div id="panelTension" class="panel"></div>
        <div id="panelScenes" class="panel"></div>
        <div id="panelGraph" class="panel"></div>
        <div id="panelNpcKnowledge" class="panel"></div>
        <div id="panelExpose" class="panel"></div>
    </div>

<script>
// ===== Config =====
const Config = {
    get mode() {
        const h = location.hostname;
        return (h === 'localhost' || h === '127.0.0.1' || location.protocol === 'file:') ? 'local' : 'deploy';
    },
    getStatePath(unit, loop) {
        const base = this.mode === 'local' ? '/NDC_project' : '';
        return `${base}/剧情设计/Unit${unit}/state/loop${loop}_state.yaml`;
    }
};

// ===== Global State =====
let currentState = null;
let activePanel = 'overview';
let tensionNodes = [];
let annotationFilters = { CLIMAX: true, TURN: true, CROSS: true, PLANT: true, AMBUSH: true };
let selectedSceneId = null;

// ===== Mouse tracking for card light effects =====
document.addEventListener('mousemove', (e) => {
    const cards = document.querySelectorAll('.card, .scene-card, .metric-card');
    cards.forEach(card => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        card.style.setProperty('--mouse-x', x + 'px');
        card.style.setProperty('--mouse-y', y + 'px');
    });
});

// ===== Tab switching =====
document.getElementById('tabBar').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab || !currentState) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activePanel = tab.dataset.panel;
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    const panel = document.getElementById('panel' + activePanel.charAt(0).toUpperCase() + activePanel.slice(1));
    if (panel) panel.classList.add('active');
    // Canvas needs visible container to measure dimensions
    if (activePanel === 'tension' && tensionNodes.length > 0) {
        requestAnimationFrame(() => drawTensionCanvas());
    }
});

// ===== Load button =====
document.getElementById('loadBtn').addEventListener('click', async () => {
    const unit = parseInt(document.getElementById('unitSelect').value);
    const loop = parseInt(document.getElementById('loopSelect').value);
    const status = document.getElementById('statusText');
    const btn = document.getElementById('loadBtn');
    btn.disabled = true;
    status.textContent = '加载中...';
    try {
        const url = Config.getStatePath(unit, loop);
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${url}`);
        const raw = await resp.text();
        const meta = extractMeta(raw, unit, loop);
        const yaml = jsyaml.load(raw);
        currentState = normalize(yaml, meta, raw);
        enrichEvidenceWithExposeInfo(currentState);
        currentState.annotations = generateAnnotations(currentState);
        document.getElementById('emptyState').style.display = 'none';
        renderAll();
        // Activate overview tab
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector('.tab[data-panel="overview"]').classList.add('active');
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById('panelOverview').classList.add('active');
        activePanel = 'overview';
        status.textContent = `Unit${unit} Loop${loop} 已加载`;
    } catch(err) {
        status.textContent = '错误: ' + err.message;
        console.error(err);
    }
    btn.disabled = false;
});

// ===== Meta extraction from comments =====
function extractMeta(raw, unit, loop) {
    const lines = raw.split('\n');
    const meta = { unit, loop, title: '', liar: '', coreReveal: '', precedingEvents: '', timeLabel: '' };
    const titleRegex = /^#\s*Loop\s*\d+\s*[—–-]+\s*(.+)/;
    const liarRegex = /# 本循环说谎者[：:]\s*(.+)/;
    const revealRegex = /# 核心揭示[：:]\s*(.+)/;
    const preRegex = /# 前序事件[：:]\s*(.+)/;
    const timeRegex = /# 时间[：:]\s*(.+)/;
    for (const line of lines) {
        let m;
        if ((m = line.match(titleRegex))) meta.title = m[1].trim();
        if ((m = line.match(liarRegex))) meta.liar = m[1].trim();
        if ((m = line.match(revealRegex))) meta.coreReveal = m[1].trim();
        if ((m = line.match(preRegex))) meta.precedingEvents = m[1].trim();
        if ((m = line.match(timeRegex))) meta.timeLabel = m[1].trim();
    }
    return meta;
}

// ===== Normalize YAML to StateData =====
function normalize(yaml, meta, raw) {
    const state = { meta };

    // Player context
    const pc = yaml.player_context || {};
    state.playerContext = {
        chapterGoal: pc.chapter_goal || null,
        goals: {
            primary: (pc.goals && pc.goals.primary) || '',
            secondary: (pc.goals && pc.goals.secondary) || []
        },
        knownFacts: pc.known_facts || [],
        newDirections: (pc.new_directions || []).map(d => ({
            direction: d.direction || '',
            trigger: d.trigger || ''
        })),
        postExposeKnowledge: pc.post_expose_knowledge || []
    };

    // Opening
    const op = yaml.opening || {};
    const openingNpcs = [];
    const nonNpcKeys = ['scene_id','characters','purpose','talk','role','discovery','dialogue_tone'];
    for (const key of Object.keys(op)) {
        if (nonNpcKeys.includes(key)) continue;
        const val = op[key];
        if (val && typeof val === 'object' && ('is_liar' in val || 'knows' in val)) {
            openingNpcs.push(parseNpc(key, val));
        }
    }
    state.opening = {
        sceneId: op.scene_id || 0,
        characters: op.characters || [],
        purpose: op.purpose || '',
        talkRef: op.talk || '',
        npcs: openingNpcs,
        suddenEvent: null
    };
    // Sudden event (Unit2)
    const suddenSrc = op.sudden_event || yaml.sudden_event || null;
    if (suddenSrc) {
        state.opening.suddenEvent = {
            name: suddenSrc.name || '',
            trigger: suddenSrc.trigger || '',
            characters: suddenSrc.characters || [],
            purpose: suddenSrc.purpose || '',
            result: suddenSrc.result || ''
        };
    }

    // Scenes
    state.scenes = (yaml.scenes || []).map(s => {
        const scene = {
            id: s.id || 0,
            name: s.name || '',
            note: s.note || null,
            sceneType: inferSceneType(s, state.opening.sceneId, true),
            evidence: (s.evidence || []).map(ev => parseEvidence(ev)),
            npcs: [],
            connoisseur: []
        };
        if (s.npcs && typeof s.npcs === 'object') {
            for (const [nk, nv] of Object.entries(s.npcs)) {
                if (nv && typeof nv === 'object') {
                    scene.npcs.push(parseNpc(nk, nv));
                }
            }
        }
        if (s.connoisseur) scene.connoisseur = parseConnoisseurList(s.connoisseur);
        return scene;
    });

    // Expose
    const ex = yaml.expose || {};
    const rounds = [];
    for (let i = 1; i <= 10; i++) {
        const rk = 'round_' + i;
        if (ex[rk]) {
            rounds.push(parseExposeRound(ex[rk], i));
        }
    }
    let exposeNpcState = null;
    const exposeNonRound = ['target','total_rounds'];
    for (const key of Object.keys(ex)) {
        if (exposeNonRound.includes(key) || key.startsWith('round_')) continue;
        const val = ex[key];
        if (val && typeof val === 'object' && ('is_liar' in val || 'knows' in val)) {
            exposeNpcState = parseNpc(key, val);
        }
    }
    state.expose = {
        target: ex.target || '',
        totalRounds: ex.total_rounds || rounds.length,
        npcState: exposeNpcState,
        rounds
    };

    // Doubts
    state.doubts = (yaml.doubts || []).map(d => {
        const conditions = parseUnlockCondition(d.unlock_condition || '');
        return {
            id: d.id || 0,
            text: d.text || '',
            unlockConditionRaw: d.unlock_condition || '',
            unlockCondition: conditions,
            clear: d.clear !== undefined ? d.clear : null
        };
    });

    // Special events
    state.specialEvents = [];
    if (yaml.events && Array.isArray(yaml.events)) {
        for (const ev of yaml.events) {
            state.specialEvents.push({
                type: ev.type || 'closing',
                name: ev.name || '',
                sceneId: ev.scene_id || null,
                trigger: ev.trigger || '',
                characters: ev.characters || [],
                purpose: ev.purpose || '',
                result: ev.result || null
            });
        }
    }

    // Derived evidence map
    state.derivedEvidenceMap = buildDerivedMap(raw, state);

    return state;
}

function parseNpc(key, obj) {
    return {
        key,
        isLiar: obj.is_liar === true,
        motive: obj.motive || '',
        mindset: obj.mindset || '',
        knows: obj.knows || [],
        doesNotKnow: obj.does_not_know || [],
        awareness: (obj.awareness || []).map(a => ({
            content: typeof a === 'string' ? a : (a.content || ''),
            trigger: typeof a === 'string' ? '' : (a.trigger || '')
        })),
        lie: obj.lie ? { content: obj.lie.content || '', truth: obj.lie.truth || '' } : null,
        testimonyIds: obj.testimony_ids || [],
        connoisseur: parseConnoisseurList(obj.connoisseur || []),
        talkRef: obj.talk || ''
    };
}

function parseConnoisseurList(arr) {
    if (!arr || !Array.isArray(arr)) return [];
    return arr.map(c => ({
        type: c.type || 'source',
        nodeId: c.node || null,
        triggerMode: c.trigger_mode || null,
        content: c.content || null,
        noteForFuture: c.note || null,
        question: c.question || null,
        answer: c.answer || null,
        reward: c.reward || null
    }));
}

function parseEvidence(ev) {
    const note = ev.note || '';
    let category = 'prop';
    let usage = null;
    if (note.startsWith('关键')) {
        category = 'key';
        const m = note.match(/关键[—\-]+(.+)/);
        if (m) usage = m[1].trim();
    } else if (note.startsWith('环境叙事')) {
        category = 'narrative';
    } else if (note.startsWith('场景道具') || note.startsWith('非指证')) {
        category = 'prop';
    }
    const id = ev.id || 0;
    const idStr = String(id);
    const isDerived = idStr.length === 4 && idStr[1] === '7';
    return {
        id,
        name: ev.name || '',
        note,
        category,
        usage,
        analyzedId: ev.analyzed_id || null,
        usedInExposeRounds: [],
        isTrap: false,
        isDerived
    };
}

function parseExposeRound(r, idx) {
    return {
        id: r.id || idx,
        lie: r.lie || '',
        lieSource: r.lie_source || '',
        usableEvidence: (r.usable_evidence || []).map(e => ({
            id: e.id || 0,
            name: e.name || '',
            usage: e['用途'] || e.usage || ''
        })),
        trapEvidence: (r.trap_evidence || []).map(e => ({
            id: e.id || 0,
            name: e.name || '',
            usage: e['用途'] || e.usage || ''
        })),
        autoFollowupEvidence: (r.auto_followup_evidence || []).map(e => ({
            id: e.id || 0,
            name: e.name || '',
            usage: e['用途'] || e.usage || ''
        })),
        result: r.result || '',
        relationNetwork: r.relation_network || null
    };
}

function parseUnlockCondition(str) {
    if (!str) return [];
    return str.split(/\s*\+\s*/).map(part => {
        const m = part.match(/(testimony|item)[：:](\d+)/i);
        if (m) return { type: m[1].toLowerCase(), id: parseInt(m[2]) };
        return null;
    }).filter(Boolean);
}

function inferSceneType(s, openingSceneId, exposeNpcIsLiar) {
    const note = (s.note || '').toLowerCase();
    if (note.includes('initscene') || note.includes('开篇') || s.id === openingSceneId) return 'opening';
    if (note.includes('指证') || note.includes('\u2694\uFE0F')) return 'expose';
    const hasEvidence = s.evidence && s.evidence.length > 0;
    const hasNpcs = s.npcs && Object.keys(s.npcs).length > 0;
    if (hasNpcs && s.npcs) {
        const npcValues = typeof s.npcs === 'object' && !Array.isArray(s.npcs) ? Object.values(s.npcs) : [];
        if (npcValues.some(n => n && n.is_liar === true)) return 'expose';
    }
    if (note.includes('\uD83D\uDD12') || note.includes('不可进入') || note.includes('锁定')) return 'locked';
    if (note.includes('\u23F8\uFE0F') || note.includes('无新线索') || note.includes('无新证据')) return 'idle';
    if (hasEvidence || hasNpcs) return 'explore';
    if (!hasEvidence && !hasNpcs) return 'idle';
    return 'explore';
}

function buildDerivedMap(raw, state) {
    const map = {};
    for (const scene of state.scenes) {
        for (const ev of scene.evidence) {
            if (ev.analyzedId) {
                map[ev.id] = ev.analyzedId;
            }
        }
    }
    const regex = /# (\d{4})\(.+?\)\s*→\s*.+?\s*→\s*(\d{4})/g;
    let m;
    while ((m = regex.exec(raw)) !== null) {
        map[parseInt(m[1])] = parseInt(m[2]);
    }
    const derivedBlock = /# (\d{4})\s+.+?\n#\s+获取方式[：:].*?(\d{4})/g;
    while ((m = derivedBlock.exec(raw)) !== null) {
        map[parseInt(m[2])] = parseInt(m[1]);
    }
    return map;
}

function enrichEvidenceWithExposeInfo(state) {
    const allEvidence = new Map();
    for (const scene of state.scenes) {
        for (const ev of scene.evidence) {
            allEvidence.set(ev.id, ev);
        }
    }
    for (const round of state.expose.rounds) {
        for (const ue of round.usableEvidence) {
            const ev = allEvidence.get(ue.id);
            if (ev) ev.usedInExposeRounds.push(round.id);
        }
        for (const te of round.trapEvidence) {
            const ev = allEvidence.get(te.id);
            if (ev) { ev.isTrap = true; ev.category = 'trap'; }
        }
        for (const ae of round.autoFollowupEvidence) {
            const ev = allEvidence.get(ae.id);
            if (ev) ev.usedInExposeRounds.push(round.id);
        }
    }
}

// ===== Information Density =====
function calcSceneInfoLoad(scene) {
    let load = 0;
    for (const ev of scene.evidence) {
        if (ev.category === 'key') load += 3.0;
        else if (ev.isDerived) load += 2.5;
        else if (ev.category === 'narrative') load += 0.5;
        else load += 0.3;
    }
    for (const npc of scene.npcs) {
        if (npc.isLiar) load += 4.0;
        if (npc.testimonyIds.length > 0) load += 2.0;
        if (npc.connoisseur.length > 0) load += 1.5;
    }
    return Math.round(load * 10) / 10;
}

function calcLoopInfoLoad(state) {
    let total = 0;
    for (const scene of state.scenes) {
        total += calcSceneInfoLoad(scene);
    }
    const ex = state.expose;
    total += ex.totalRounds * 5.0;
    for (const r of ex.rounds) {
        total += r.usableEvidence.length * 2.0;
    }
    total += state.playerContext.postExposeKnowledge.length * 1.5;
    return Math.round(total * 10) / 10;
}

function calcDistributionScore(state) {
    const loads = state.scenes.map(s => calcSceneInfoLoad(s)).filter(l => l > 0);
    if (loads.length === 0) return 0;
    const maxL = Math.max(...loads);
    const sumL = loads.reduce((a,b) => a+b, 0);
    return sumL > 0 ? Math.round((maxL / sumL) * 100) / 100 : 0;
}

// ===== Tension Curve =====
function calcTensionCurve(state) {
    const nodes = [];
    let baseTension = 30;
    const opNpcs = state.opening.npcs;
    if (opNpcs.some(n => n.isLiar)) baseTension += 15;
    if (state.opening.suddenEvent) baseTension += 10;
    if (state.playerContext.knownFacts.length >= 5) baseTension += 10;
    if (state.playerContext.knownFacts.length === 0) baseTension -= 5;
    baseTension = Math.max(20, Math.min(60, baseTension));
    nodes.push({ label: '开篇', tension: baseTension, sceneId: state.opening.sceneId, type: 'opening' });

    if (state.opening.suddenEvent) {
        nodes.push({
            label: state.opening.suddenEvent.name,
            tension: Math.min(85, nodes[nodes.length-1].tension + 20),
            type: 'sudden_event'
        });
    }

    for (const scene of state.scenes) {
        if (scene.sceneType === 'idle' || scene.sceneType === 'locked' || scene.id === state.opening.sceneId) continue;
        const contrib = calcSceneTensionContrib(scene, state);
        if (contrib === 0 && scene.evidence.length === 0 && scene.npcs.length === 0) continue;
        const prev = nodes[nodes.length-1].tension;
        const tension = Math.max(0, Math.min(85, prev + contrib));
        nodes.push({ label: scene.name, tension, sceneId: scene.id, type: scene.sceneType });
    }

    for (const round of state.expose.rounds) {
        const tension = calcExposeRoundTension(round);
        nodes.push({
            label: `R${round.id}: ${round.lie.substring(0, 16)}...`,
            tension: Math.min(100, tension),
            type: 'expose',
            roundId: round.id
        });
    }

    for (const ev of state.specialEvents.filter(e => e.type === 'closing')) {
        const prev = nodes[nodes.length-1].tension;
        nodes.push({
            label: ev.name,
            tension: Math.max(40, prev - 15),
            type: 'closing'
        });
    }

    return nodes;
}

function calcSceneTensionContrib(scene, state) {
    let score = 0;
    for (const ev of scene.evidence) {
        if (ev.category === 'key') score += 15;
        else if (ev.category === 'narrative') score += 3;
        else if (ev.category === 'prop') score += 2;
        if (ev.isDerived) score += 10;
    }
    if (scene.npcs.length > 0) score += 5;
    if (scene.npcs.some(n => n.isLiar)) score += 15;
    if (scene.npcs.some(n => n.testimonyIds.length > 0)) score += 8;
    if (scene.npcs.some(n => n.connoisseur.length > 0)) score += 4;
    for (const doubt of state.doubts) {
        for (const cond of doubt.unlockCondition) {
            if (cond.type === 'item' && scene.evidence.some(e => e.id === cond.id)) score += 10;
        }
    }
    return score;
}

function calcExposeRoundTension(round) {
    let tension = 60 + round.id * 12;
    const result = round.result || '';
    if (result.includes('彻底崩溃') || result.includes('防线崩溃') || result.includes('完整坦白')) tension += 15;
    else if (result.includes('被迫承认')) tension += 8;
    else if (result.includes('部分承认') || result.includes('含泪承认')) tension += 5;
    else if (result.includes('辩解') || result.includes('慌张辩解')) tension += 3;
    tension += round.usableEvidence.length * 5;
    tension += round.autoFollowupEvidence.length * 8;
    if (round.trapEvidence.length > 0) tension -= 3;
    return Math.min(100, tension);
}

// ===== Annotation Generation =====
function generateAnnotations(state) {
    const annotations = [];
    const tn = calcTensionCurve(state);
    tensionNodes = tn;

    if (state.expose.rounds.length > 0 && state.playerContext.postExposeKnowledge.length > 0) {
        const lastRound = state.expose.rounds[state.expose.rounds.length - 1];
        annotations.push({
            type: 'CLIMAX',
            location: 'expose',
            roundId: lastRound.id,
            text: `${state.meta.liar || state.expose.target} 在最终轮指证后完整坦白。本循环的情感顶点。`
        });
    }

    for (const round of state.expose.rounds) {
        if (round.result.includes('退守') || round.result.includes('升级谎言')) {
            if (round.id < state.expose.totalRounds) {
                annotations.push({
                    type: 'TURN',
                    location: 'expose',
                    roundId: round.id,
                    text: `R${round.id} 击穿后 NPC 退守新谎言，谎言结构是多层的。`
                });
                if (annotations.filter(a => a.type === 'TURN').length >= 2) break;
            }
        }
    }

    for (const doubt of state.doubts) {
        const types = new Set(doubt.unlockCondition.map(c => c.type));
        if (types.size >= 2) {
            annotations.push({
                type: 'CROSS',
                location: 'doubt',
                doubtId: doubt.id,
                text: `疑点 ${doubt.id} 需要不同来源信息交叉验证（${doubt.unlockConditionRaw}）。`
            });
        }
        if (annotations.filter(a => a.type === 'CROSS').length >= 3) break;
    }
    for (const round of state.expose.rounds) {
        if (round.usableEvidence.length >= 2) {
            const sceneIds = new Set();
            for (const ue of round.usableEvidence) {
                for (const scene of state.scenes) {
                    if (scene.evidence.some(e => e.id === ue.id)) { sceneIds.add(scene.id); break; }
                }
            }
            if (sceneIds.size >= 2 && annotations.filter(a => a.type === 'CROSS').length < 3) {
                annotations.push({
                    type: 'CROSS',
                    location: 'expose',
                    roundId: round.id,
                    text: `R${round.id} 证据来自 ${sceneIds.size} 个不同场景，构成交叉验证。`
                });
            }
        }
    }

    for (const doubt of state.doubts) {
        if (doubt.clear === false) {
            annotations.push({
                type: 'PLANT',
                location: 'doubt',
                doubtId: doubt.id,
                text: `疑点 ${doubt.id} 本 Loop 未解决，遗留至后续。`
            });
            if (annotations.filter(a => a.type === 'PLANT').length >= 2) break;
        }
    }
    for (const round of state.expose.rounds) {
        if (round.result.includes('\uD83D\uDD12') && annotations.filter(a => a.type === 'PLANT').length < 2) {
            annotations.push({
                type: 'PLANT',
                location: 'expose',
                roundId: round.id,
                text: `R${round.id} 包含开放性结论，是后续 Loop 的引子。`
            });
        }
    }

    const allNpcs = getAllNpcs(state);
    for (const npc of allNpcs) {
        if (!npc.lie) continue;
        const motive = npc.motive.toLowerCase();
        const hasEmotion = ['家庭','恐惧','生存','女儿','孩子','母亲','父亲','童年','压力'].some(k => motive.includes(k));
        if (hasEmotion) {
            annotations.push({
                type: 'AMBUSH',
                location: 'npc',
                npcKey: npc.key,
                text: `${npc.key} 的谎言背后是人性的挣扎（${npc.motive.substring(0, 40)}...）。`
            });
            break;
        }
    }

    return annotations.slice(0, 5);
}

function getAllNpcs(state) {
    const npcs = [...state.opening.npcs];
    for (const scene of state.scenes) {
        for (const npc of scene.npcs) npcs.push(npc);
    }
    if (state.expose.npcState) npcs.push(state.expose.npcState);
    return npcs;
}

// ===== SVG Donut Chart Helper =====
function svgDonut(value, max, color, size) {
    const r = (size - 4) / 2;
    const circ = 2 * Math.PI * r;
    const pct = max > 0 ? Math.min(value / max, 1) : 0;
    const dashLen = circ * pct;
    return `<svg viewBox="0 0 ${size} ${size}">
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--surface-3)" stroke-width="4"/>
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="4"
            stroke-dasharray="${dashLen} ${circ - dashLen}" stroke-linecap="round"/>
    </svg>`;
}
