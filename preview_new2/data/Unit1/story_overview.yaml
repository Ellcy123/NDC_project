loop1: |
  【循环1：目击者的沉默 —— 指证 Rosa（3轮）】

  ———— 开篇 ————
  私家侦探 Zack Brennan 在蓝月歌舞厅的会客室醒来，头痛欲裂。Webb 的尸体就在身边，Zack 手中握着一把.38左轮手枪，大衣上全是血。Morrison 带着两名警察冲进来，当场要逮捕 Zack。记者 Emma O'Malley 从储物间冲出，亮出记者证，声称她在23:45拍到一个男人从后门逃离。Morrison 犹豫了——给 Zack 72小时找到真凶。出门后 Emma 坦白：照片模糊，根本上不了法庭，但足够让 Morrison 动摇。

  ———— 自由探索 ————
  Rosa储藏室(SC001)：Rosa 不在。搜索发现：芝加哥警方通缉令（"刀疤脸 Tony"，$5000悬赏）、Rosa 女儿 Miguel 的照片（背面写着生日0915）、医院处方清单（Miguel 的高额药费——经济压力）。上锁的清洁工具箱需要4位密码——0915打开后找到：一条毛巾（关键证据，化验出氯仿气味）和一张工作排班卡（显示 Rosa 被分配到后台走廊23:00-01:00，而不是地下酒窖）。
  一楼走廊(SC002)：走廊犯罪现场区域。发现：垃圾桶里的氯仿瓶、地面拖拽痕迹（分析显示被拖拽者体重150磅以上——一般女性拖不动）。
  Tommy办公室(SC003)：Tommy 紧张地整理文件。对话获得证词："确实有一声枪响……大约11:30……但听起来跟一般的帮派枪战不同，就一声"（为循环6伏笔）。
  酒吧大堂(SC010)：Rosa 在此打扫。对话场景和指证地点。

  ———— 指证 Rosa（酒吧大堂 SC010）————
  第1轮——Rosa 说"我整晚在地下酒窖打扫"。Zack 出示工作排班卡：她被分配到后台走廊23:00-01:00，不是酒窖。Rosa 慌了："哦……可能记混了……最近太累了。"
  第2轮——Rosa 说"走廊很安静，我什么都没看到"。Zack 出示拖拽痕迹分析：150磅以上的人被从走廊中段拖到会客室门口。Rosa 松口："有人用东西捂住了另一个人的脸……有股甜腻的气味……那个人就瘫软了，被拖走了。"
  第3轮——Rosa 坚持"我只是旁观者"。Zack 出示氯仿毛巾（在她储藏室找到的）+ 氯仿瓶（走廊垃圾桶）。毛巾在她的房间里——她拿走了证据。最终 Rosa 说出真相："是 Morrison……Morrison 警官。他在走廊等着……捂住那个人的脸……拖进了会客室。我躲在转角……他没看到我。"

  【情感基调】恐惧、内疚、母性的绝望
  Rosa 不是反派，是一个被生存本能困住的母亲。Morrison——一个警察——干了这件事，是第一个重大冲击。玩家开始意识到：被栽赃的不只是 Zack，整个案件背后有更大的阴谋。

loop2: |
  【循环2：腐败的徽章 —— 指证 Morrison（4轮）】

  ———— 开篇 ————
  Rosa 的供述后，Emma 和 Zack 在酒吧外讨论。Morrison 成为下一个目标。两人前往 Morrison 家调查。

  ———— 自由探索 ————
  Morrison家客厅(SC005)：Morrison 太太在家。她透露 Morrison 在00:30声称"工作紧急"出门了，最近脾气越来越差，经常深夜外出。
  Morrison家书房(SC006)：Morrison 外出。搜索发现：犯罪现场工具包领取单（Morrison 签字，在谋杀案发生前一天19:30就领走了——证明预谋）、工具包实物（需与现场压痕比对）、赌债欠条（欠"刀疤脸 Tony" $5000，威胁家人安全）、"鲸鱼"匿名纸条（神秘人提供$5000——"这点零花钱能救你的命"）、赌场筹码（一枚刻着"最后一次"）。
  Webb会客室(SC004)：犯罪现场可进入。发现地毯上的矩形压痕（分析与犯罪现场工具包尺寸完全吻合）。
  Vivian化妆室(SC007)：Vivian 提供证词——Morrison 在01:00才到达现场。
  Tommy办公室(SC003)：Tommy 确认从 Morrison 家到酒吧最多15分钟车程。

  ———— 指证 Morrison（警局 SC004）————
  第1轮——Morrison 说"00:30接到匿名举报，赶紧赶到现场"。Zack 出示 Tommy 证词（15分钟车程）+ Vivian 证词（Morrison 01:00才到）。00:30出发+15分钟=最迟00:45到，但他01:00才到，多出的15分钟去哪了？
  第2轮——Morrison 坚持"临时反应"。Zack 出示工具包领取单：案发前一天就领了设备。"临时反应"怎么能提前准备？
  第3轮——Morrison 说"我从没用过那个工具包"。Zack 出示地毯压痕分析：工具包的尺寸与地板压痕完全吻合。工具包留下了痕迹。
  第4轮——致命一击。Zack 出示 Rosa 证词：Rosa 在 Morrison 到达现场时就在场，确认他在勘查时从头到尾没有使用任何测量工具。如果他带了工具包、留下了压痕、却没用来勘查——那工具包不是用来调查的，是用来布置现场的。Morrison 崩溃："够了……我承认……是我干的。" 供出真相：他欠"刀疤脸 Tony" $5000。"鲸鱼"出钱还债，交换条件是制服 Zack 并栽赃。Webb 请 Zack 当"保险"——如果 Webb 出事，Zack 会来查。鲸鱼想同时除掉 Webb 和他的"保险侦探"。

  【情感基调】正义的愤怒、侦探的满足、潜伏的不安
  Morrison 是可悲而非邪恶的——一个走投无路被当工具使的男人。"鲸鱼"作为真正的幕后操纵者浮出水面，把赌注大幅提高。

loop3: |
  【循环3：古董密码 —— 指证 Tommy（3轮）】

  ———— 开篇 ————
  Morrison 只是执行者。真正的问题是：Webb 做什么生意？鲸鱼为什么要他死？两人决定调查 Webb 的办公室——之前一直上锁。

  ———— 自由探索 ————
  Webb办公室(SC008)：首次解锁，证据宝库。Webb 个人收入记录（月入$15,000，远超酒吧收入）、不明作者的客户记录（笔迹分析确认是 Tommy 写的）、VIP客户照片（Thompson参议员、Coleman银行家、Tisra检察官）、Webb 给 Vivian 的虚假承诺信、Webb 私人日记（藏在圣经夹层——"他们的虚伪是我的财富，他们的秘密是我的保险柜" + "鲸鱼=危险"便签）、Thompson参议员的让步信（每月$8000"古董鉴赏费"）、Coleman银行家的转账记录（每月$6000买"欧洲油画"）、古董鉴定报告（Bennington陶器$2000、欧洲油画$150、中国花瓶$15赝品）。特殊事件：找到日记后，办公室电话响了——鲸鱼直接威胁 Zack："别查了。这对你没好处。"
  歌舞厅舞台(SC009)：古董展示区。欧洲油画还挂在墙上（据说已"卖给"Coleman），中国花瓶还在原处（据说已"卖给"Thompson）——证明古董从未真正卖出。
  Tommy办公室(SC003)：酒吧收入账本（月净收入仅$4,000）、Tommy 的同情日记（用于笔迹比对）。
  小玩法——笔迹分析：比对客户记录和 Tommy 日记中的三个关键词（Important/Confirmed/Urgent），确认是 Tommy 的笔迹。

  ———— 指证 Tommy（酒吧大堂/Tommy办公室）————
  第1轮——Tommy 坚持"Webb 只经营地下酒吧"。Zack 出示 Webb 收入记录（$15,000/月）+ 酒吧账本（$4,000/月）。$11,000的缺口无法解释。Tommy 被迫承认："还有古董交易……正常的艺术品买卖。"
  第2轮——Tommy 说"古董是合法销售的"。Zack 出示舞台区照片——两件"已售出"的古董还在原处。同一件古董反复"卖"给不同客户。Tommy 退守："我只是按 Webb 说的记账。"
  第3轮——Tommy 说"我不知情，只是做账"。Zack 出示笔迹分析：客户记录是 Tommy 亲笔写的——详细的客户来访时间、停留时长、古董类型。不是"做账"，而是勒索网络的核心经办人。Tommy 崩溃："同一件古董反复'出售'——实际上是每月保护费。" Webb 用假古董交易勒索政客和商人。Tommy 哭着说："我只是跟着干！我需要这份工作养家！"但警告："真正危险的人不是 Webb……是鲸鱼。"

  【情感基调】调查的满足转为恐惧
  Webb 的世界比预想的黑暗得多。鲸鱼的电话让威胁变得切身。Tommy 的供述揭开了 Webb 整个犯罪帝国的面纱。

loop4: |
  【循环4：厨子的秘密 —— 指证 Jimmy 第一次（3轮）】

  ———— 开篇 ————
  Tommy 供述后，勒索网络曝光了，但鲸鱼的身份仍是谜。Jimmy——Webb 最亲密的助手，伪装成"只是个厨子"——成为下一个目标。

  ———— 自由探索 ————
  Jimmy厨房(SC011)：此前上锁，现在可进入。发现：一个满是泥土的陶瓷水壶（分析揭示是刻意伪装的古董——Bennington 陶器，价值$2000）、Jimmy 的优秀员工证书（误导——"忠诚可靠"）、厨房送餐日志（23:00没有任何送餐订单——与 Jimmy 后来声称的"下楼送餐"矛盾，循环6关键证据）。
  Jimmy家客厅/卧室(SC013)：妻子 Anna 在家，焦虑不安。发现：全家福照片（写着"我的全世界"）、鲸鱼联络纸条（纸质与 Morrison 的纸条一致）、Jimmy 给 Anna 的诀别信（"如果上帝召唤我回家，记住我们在圣帕特里克的誓言……钱够你和孩子用了。我祈祷我们的孩子永远不必在良心和面包之间做选择"——悲剧伏笔）、额外收入记录（鲸鱼标记——9月18日收到$5000）、Bennington 陶器照片（证明 Jimmy 认识这个陶器）、磨损的英语学习课本（反复练习"American Dream"）、撕碎的移民申请（$1500费用被红笔圈出）。
  Tommy办公室(SC003)：Tommy 供出证词："我看到 Jimmy 从 Webb 办公室搬出一个古董水壶。"
  Vivian化妆室(SC007)：Vivian 提供证词："我目击 Jimmy 跟人激烈争吵。"

  ———— 指证 Jimmy（歌舞厅舞台区）————
  第1轮——Jimmy 坚持"我只是个厨子"。Zack 出示 Tommy 证词（看到 Jimmy 搬走陶器）+ 伪装古董分析。Jimmy 从"没见过"变成"不知道是古董"——自相矛盾。
  第2轮——Jimmy 说"就是个破罐子"。Zack 出示古董鉴定报告（Bennington 陶器价值$2000）+ 他家里的 Bennington 照片。他明知价值。Jimmy 改口："我拿走是为了保护它！"
  第3轮——Jimmy 说"我和 Webb 没矛盾"。Zack 出示 Vivian 的目击证词。Jimmy 终于承认：Webb 想勒索"鲸鱼"，Jimmy 反复警告他别碰。"鲸鱼非常危险……Webb 太贪了。" Jimmy 透露自己不只是厨子——是 Webb 最信任的副手。临走扔下一句："你应该去问 Vivian……她知道的比说出来的多。"

  【情感基调】对 Jimmy 的同情与怀疑交织
  移民家庭的故事（Anna、未出生的孩子、撕碎的移民表、诀别信）制造了强烈的情感张力。Jimmy 关于鲸鱼的警告和对 Vivian 的暗示为循环5铺路。

loop5: |
  【循环5：歌手的仇恨 —— 指证 Vivian（3轮）】

  ———— 开篇 ————
  根据 Jimmy 的暗示，Emma 和 Zack 重新审视 Vivian。她一直扮演"悲痛的情人"——但 Jimmy 说那是装的。是时候调查 Vivian 和 Webb 的真正关系了。

  ———— 自由探索 ————
  Vivian化妆室(SC007)：Vivian 在台上表演，房间空着。发现：Vivian 亲笔分手信+"我受够了。三年！你答应了一切却什么都没给。我不是你的洋娃娃。我们完了。"、垃圾桶里撕碎的船票（小玩法拼图——拼好后：去法国的豪华客轮头等舱，"Vivian Rose小姐"，单程，$450）、化妆镜上的工作痛苦记录（VIP"服务"日期表，旁注"雪茄味让我想吐""我还要忍多久？！"）。
  Webb办公室(SC008)：沙发垫下找到 Vivian 的私人日记："今天我看到 Webb 和那个该死的 Rita……穿着我从没见过的昂贵丝裙和珍珠。他看她的眼神带着从未给过我的温柔。如果谁背叛了我，我会让他承受世界上最痛苦的事。"
  Tommy办公室(SC003)：舞台演出日程变更申请——Vivian 把23:00从柔情小曲改成了最嘈杂的爵士鼓点（循环6伏笔）。Tommy 提供证词："Webb 最近两个月跟一个叫 Rita 的女人走得很近。"

  ———— 指证 Vivian（歌舞厅舞台区）————
  第1轮——Vivian 表演悲痛："Webb 的死让我崩溃……我们相爱多年。" Zack 出示分手信："我们完了。" 是 Vivian 的亲笔。Vivian："那只是……吵架时写的！情侣都这样！我们和好了，还计划去法国！"
  第2轮——Vivian 说"我们和好了，买了去法国的船票"。Zack 出示撕碎的船票——在她的垃圾桶里找到的。Emma："如果真的计划旅行，你不会把票撕碎。" Vivian："好吧……我们确实有问题。我吵架时撕的。但我们决定和平分手，没有仇恨。"
  第3轮——Vivian 说"和平分手，没有恶意"。Zack 出示她的日记（"我会让他承受最痛苦的事"）+ Tommy 关于 Webb 和 Rita 的证词。Vivian 彻底崩溃："是！我恨他！我付出了几年，陪那些恶心的老男人睡觉来收集他们的秘密，都是为了我们能逃出去！但他跟 Rita 在一起！" 她承认有过杀意但否认动手。关键时间线信息："那晚23:05左右我去了 Webb 的会客室，但他隔着锁着的门说'今晚别来'，我就走了。"

  【情感基调】悲剧揭示，对 Vivian 的同情
  她是 Webb 剥削体系的又一个受害者——被迫用身体换取VIP客户的秘密为 Webb 的勒索服务，被许诺了一个永远不会到来的未来，然后被 Rita 取代。但23:05的细节——Webb 隔着锁着的门说话——成为循环6的关键线索：如果 Webb 在23:00就死了，23:05说话的人不是 Webb。

loop6: |
  【循环6：真相大白 —— 终极指证 Jimmy（5轮）】

  ———— 开篇 ————
  所有线索汇聚。Morrison 栽赃 Zack（L2），Tommy 做账（L3），Jimmy 是 Webb 的副手且有深层矛盾（L4），Vivian 有动机但声称无辜（L5）。真正的凶手仍然未知。Zack 和 Emma 决定从 Webb 的会客室——终于被警方解封——重新开始。

  ———— 自由探索 ————
  Webb会客室(SC004)：警方封条拆除。发现：窗户上的弹孔（分析揭示弹道从室内射向室外——23:30那声枪响不是射向 Webb 的杀人枪——是有人从室内向外开枪制造假枪声）。
  歌舞厅舞台(SC009)：演出记录确认23:00-23:10是最嘈杂的爵士鼓点段落，音量足以完全掩盖一声枪响。道具箱里有一把手枪（证明 Vivian 确实准备了武器但从未使用——佐证她循环5的证词）。
  Vivian化妆室(SC007)：Vivian 提供关键证词："23:05左右我去了 Webb 会客室门口。他的门一向不锁，但那晚锁着。我敲门，他说'今晚别来'。我就走了。"——但如果 Webb 在23:00就死了，23:05说话的不可能是 Webb。
  Rosa储藏室(SC001)：Rosa 回忆看到 Vivian 离开舞台时"偷偷往包里塞了什么"（误导——支持 Vivian 有计划但未执行）。

  ———— 终极指证 Jimmy（Jimmy厨房 SC011）————
  第1轮——Jimmy 说"Webb 在23:30死于枪击，我在厨房，有不在场证明"。Zack 出示窗户弹孔分析：弹道从内向外。23:30的枪声不是射向 Webb 的——是向外射击制造假死亡时间。Tommy 循环1的证词"不同寻常的一声枪响"现在说得通了——那是一声伪造的枪声。
  第2轮——Jimmy 说"如果更早有枪声，所有人都会听到"。Zack 出示演出记录：23:00-23:10是最响的鼓点时段，一声枪响会被完全掩盖。真正的杀人发生在23:00，被音乐掩盖了。
  第3轮——Jimmy 的新防线："Vivian 在23:05跟 Webb 说了话，证明他还活着！" Zack 出示 Vivian 证词：她在23:05去了，门是锁着的（Webb 从不锁门），"Webb" 隔着门说话没开门。如果 Webb 在23:00死了，23:05说话的人不是 Webb。有人在模仿 Webb 的声音。Jimmy 作为 Webb 最亲密的助手，是唯一能以假乱真的人。
  第4轮——Jimmy 说"我当时在楼下送餐"。Zack 出示厨房送餐日志（循环4搜到的）：23:00时段没有任何送餐订单。Jimmy 声称离开厨房的理由根本不存在。时间线完美吻合：离开厨房 → 23:00杀 Webb → 23:05模仿声音骗走 Vivian → 23:10前回到厨房。
  第5轮——致命一击。Jimmy 说"我没有动机杀 Webb！" Zack 出示 Jimmy 的额外收入记录（循环4搜到的，$5000鲸鱼标记）+ Webb 的个人收入记录（循环3搜到的）。Jimmy 从鲸鱼那里收了$5000——和 Morrison 收的数目一模一样。鲸鱼付 Morrison $5000栽赃，付 Jimmy $5000杀人。Morrison 是"双重保险"——既栽赃又确认 Jimmy 完成了任务。

  ———— Jimmy 的供述与悲剧结局 ————
  Jimmy 彻底崩溃。"我杀了 Webb……在23:00……音乐最响的时候……我用的刀。" 完整真相：鲸鱼知道 Webb 要勒索他，联系 Jimmy，许诺金钱、Anna 和未出生孩子的未来、合法移民身份——交换条件是杀 Webb 作为"投名状"。Jimmy 在23:00趁音乐掩盖杀了 Webb，23:05模仿声音骗走 Vivian，23:10回到厨房，23:30回去向窗外开枪伪造死亡时间。Morrison 在00:00到达，给 Zack 下氯仿并布置栽赃现场。

  Jimmy 意识到如果被捕，鲸鱼会为了灭口找上 Anna 和孩子。"我的孩子需要一个好父亲，不是一个杀人犯。" Jimmy 选择结束自己的生命——他认为这是保护家人安全和尊严的唯一方式。

  【情感基调】毁灭性的悲剧
  Jimmy 既是加害者也是受害者——一个非法移民被困在良心与生存之间，为了家人的未来选择了杀害雇主。Webb 的贪婪导致了自己的毁灭，但真正付出代价的是 Jimmy 和他的家庭。而真正的幕后黑手——鲸鱼——完全逍遥法外，为后续章节的宏大悬念埋下伏笔。
