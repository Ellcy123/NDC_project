  summary: 【Part1 情节转折——Morrison 逆转】
  description: "【Part1 情节转折——Morrison 逆转】\n\n1. Zack 先指出：自己已经得到了 Vivian 不认罪的证词（Expose\
    \ 结果），\n   事后 Morrison 可以再去向 Vivian 亲自求证一次。\n2. 接着 Zack 出示弹壳（1308）并提出推理：凶器型号是\
    \ .45 ACP，\n   与 Vivian 的 .25 手枪不符——Vivian 无罪（展示 Vivian 无罪的证明）。\n\nMorrison 看到\
    \ .45 弹壳后，脸色骤变——\n（玩家不知道原因，但可以看到那是\"认出了某种东西\"的表情，不是单纯的惊讶）\n\n随后，Morrison 的态度急转直下：\n\
    1. 他不再客气，对 Emma 和 Zack 的态度变得强硬\n2. 拿走了那个揭穿的证物——Webb 委托协议书（1103）\n   ——1103 状态更新为\
    \ confiscated_by_morrison（内容玩家已知，无法再作为证物出示）\n3. 夺走了 Zack 手中的弹壳（1308）\n   ——1308\
    \ 状态更新为 confiscated_by_morrison\n   （loop5 时玩家手中不再持有此弹壳；loop6 揭示被 Morrison 藏起来）\n\
    4. 宣布：Vivian 拥有杀人动机和计划，她的手枪就是真正的凶器\n5. 下令将 Vivian 逮捕，押回警局\n\nZack 和 Emma 无力阻止——Morrison\
    \ 是在场的最高警方权威。\nVivian 被带走时回头看了 Zack 一眼（情感戏收尾）。"
- type: post_expose_scene
  title: 指证后剧情
  subtype: story_dialogue
  location: 蓝月亮酒吧大门口（Zack 和 Emma 对话）
  summary: Morrison 强押 Vivian 离开后，Zack 和 Emma 留在酒吧。
  description: 'Morrison 强押 Vivian 离开后，Zack 和 Emma 留在酒吧。

    两人面对 Part1 的失败——明明拿出了证据，却无法阻止逮捕。

    Emma 帮助 Zack 梳理：Morrison 的异常反应说明了什么？

    接下来必须做两件事：

    1. 找到真正的凶器（Morrison 说 Vivian 的枪是凶器——但弹壳口径不符，真正的凶器还在哪里？）

    2. 击破 Morrison——他藏了什么，他和 Whale 有什么关系？

    🟣 新疑点（1401）：真正的凶器到底在哪？'
