- type: post_expose_romance
  title: 指证后·情感戏
  subtype: story_dialogue
  location: 蓝月亮酒吧外（Jimmy 自杀后不久）
  summary: Jimmy 自杀的冲击——一个人仅仅因为暴露了 Whale 的关联就选择了死亡，
  description: 'Jimmy 自杀的冲击——一个人仅仅因为暴露了 Whale 的关联就选择了死亡，

    Zack 意识到这件案子已经远远超出了一桩"私人委托调查"的范畴。

    他要求 Emma 停止调查，不要再跟着他——这太危险了。

    Emma 不赞同。她不是理想主义的幼稚，她清醒地看到了这件事的危险，

    但她同样清醒地选择留下。

    两人的关系在这一刻有了质的变化：不再只是"委托人 + 记者帮手"，

    而是真正意义上的搭档——为了同一个正义，一起走到最后。


    【搭档决定——loop6 前置铺垫】

    感情戏的最后，两人确认了下一步的具体行动：

    Morrison 的家里藏有那枚被没收的弹壳（1308）——那是进一步证明 Morrison 与 Whale 关联的直接物证。

    两人决定以 Emma 的记者身份为掩护、Zack 以 Emma 助理的假身份，

    潜入 Morrison 的家，去取回那枚子弹。

    这个决定将作为 loop6 自由探索（下）的开场起点。'
