special_cutscenes:
- type: suspect_suicide_sequence
  title: 嫌疑人自尽
  subtype: forced_cutscene
  location: 蓝月亮酒吧后门（与 arrest_cutscene / post_expose_dialogue 同一地点）
  summary: 【Jimmy 自杀序列——新时序】
  description: "【Jimmy 自杀序列——新时序】\n\n1. 暴露时刻（Expose round_3 结束）：\n   Zack 和 Emma 指证\
    \ Jimmy 的整个过程，等同于在 Whale 手下面前\n   公开宣告：Jimmy 和 Whale 的关系、Jimmy 接受的委托、整桩案件的内幕——\n\
    \   这一切在这一刻都暴露给了\"不该知道的人\"（也就是说，Whale 知道了 Jimmy 已暴露）。\n\n2. 鸣笛（round_3 结束，Zack\
    \ 说出 Whale 名字后）：\n   ⚠️ 注意：这里是\"鸣笛（whistle）\"，不是\"枪响（gunshot）\"。\n   来自酒吧后门暗处的一声哨声——那是\
    \ Whale 手下给 Jimmy 的信号，\n   意思是：事情败露，无法挽回。\n   Jimmy 知道这意味着什么：Whale 不会放过知情者，而 Anna\
    \ 和孩子就是最脆弱的目标。\n   但此时 Jimmy 紧张但还在撑——尚未崩溃。\n\n3. Zack 的字迹对白（post_expose_dialogue——压垮骆驼的最后一根稻草）：\n\
    \   Zack 对 Jimmy 说：\"威胁 ROSA 的也是你——那个纸条和合同上面的 J 都是倒着写的。\"\n   依据是 Zack 在 Jimmy\
    \ 家观察到的英语练习书（1505，envir/pickup:false）。\n   这不是 Expose 轮次，而是 Expose 之后的脚本对白。\n\n\
    4. Jimmy 发疯：\n   字迹对白让 Jimmy 意识到——连 Rosa 那条胁迫线也被 Zack 看穿了。\n   最后的\"受胁迫的傀儡\"伪装也没了。\n\
    \   Jimmy 进入非逻辑的情绪性否认状态：\n   \"不是我，我没有，我没有……\"\n\n5. Jimmy 的最后选择——自杀：\n   Jimmy\
    \ 看了一眼暗处的方向（Whale 手下所在位置），\n   明白了一件事：自己已经彻底暴露，不只是对 Zack，也是对 Whale。\n   暗处的威胁已经形成——Anna\
    \ 是危险的。\n   为了保护 Anna 和未出生的孩子，Jimmy 做出了最后的选择。\n   他拔出了那把曾经杀死 Webb 的米勒集团特制手枪，开枪自杀。\n\
    \   死前，他看向 Zack 和 Emma，说出了最后的话——\n   将 Anna 托付给他们（\"请……帮我照顾她\"）。\n\n6. 现场遗留：\n\
    \   Jimmy 的尸体旁，留下了那把米勒集团特制手枪（1507）——\n   那把枪，曾经在 23:00 杀死了 Webb，\n   现在又杀死了使用它的人。"
- type: arrest_cutscene
  title: 逮捕现场
  subtype: story_cutscene
  location: 蓝月亮酒吧后门
  summary: Zack 和 Emma 返回酒吧，带齐了证据。
  description: 'Zack 和 Emma 返回酒吧，带齐了证据。

    Zack 决定：直接找 Jimmy，要求他跟自己去警局，

    指证他是 Webb 案的真正凶手，以此证明 Vivian 的清白。

    Emma 表示支持——她和 Zack 一起行动。


    两人来到蓝月亮酒吧后门。


    开场状态（暗示性叙事，非直接展示）：

    Jimmy 刚刚结束了和 Whale 手下的秘密交易——尾款结清。

    Zack 和 Emma 抵达时只能见到 Jimmy 的人影，以及他手中提着的装有钱的手提箱。

    场景光线昏暗，交易刚刚落幕的气息尚未散去。


    Jimmy 看见 Zack 和 Emma 出现，身形微微一僵。'
