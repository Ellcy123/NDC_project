loop1: |
  【循环1：残酷的身份确认 —— 指证 Morrison（2轮）】

  ———— 开篇 ————
  Zack 接到电话：Margaret 的鞋坊起火了。他赶到现场，Morrison 冷冰冰地说"尸体应该是她的"。Zack 崩溃了——以为母亲死了。Emma 保持冷静，引导 Zack 开始调查而不是接受 Morrison 的无凭断言。

  ———— 自由探索 ————
  Margaret鞋坊（火灾现场）：一具烧焦的尸体（性别无法辨认），有纵火痕迹（助燃剂）。楼上有搏斗迹象——A型血迹、翻倒的家具、Margaret 的私人物品。
  关键发现：尸体手指没有戒指。Margaret 的相册显示她30年来一直戴着结婚戒指从不摘下。首饰盒空了——戒指位置空缺。尸体周围地面搜索没有金属残留物（黄金熔点1064°C，远超建筑火灾温度——如果她戴着戒指，戒指不会消失）。
  Emma 联系法医 Foster：他确认验尸报告还没开始做，连性别都无法确认。
  邻居们："Margaret 下午还好好的。" "听到楼下有争吵声。" "附近看到过一个陌生人。"

  ———— 指证 Morrison（2轮）————
  第1轮——Morrison 说"尸体应该是 Margaret"。Zack 出示戒指证据链：尸体无戒指 + Margaret 从不摘戒指 + 首饰盒空了 + 地面无金属残留（黄金烧不掉）。Morrison 狡辩："我有法医调查信息。"
  第2轮——Morrison 声称有法医证据支持。Zack 出示 Emma 记录的 Foster 原话：验尸报告要到明天才出，连性别都确认不了。Morrison 完全被揭穿——他在撒谎。他承认：蓝月歌舞厅事件（Unit1中 Morrison 给 Zack 下药并栽赃谋杀，后被揭穿）的仇恨驱使他误导 Zack，也图省事想草率结案。Morrison 交出在入口处找到的 Frank Kowalski 的钱包（确认死者身份），并透露一个匿名来电警告他"别查 Margaret Brennan"。Morrison 提出交易：Zack 查清 Frank 的案子并给他一个结案答案，Morrison 去找 Margaret。

  【情感基调】绝望 → 怀疑 → 愤怒 → 被迫交易 → 决心
  身份揭晓是一记情感重击。Morrison 的小气和腐败令人厌恶。悬念：Margaret 在哪里？Frank 为什么死在她的鞋坊里？

loop2: |
  【循环2：威胁链条与连号钞票拼图 —— 指证 Leonard Ross（3轮）】

  ———— 开篇 ————
  Zack 开始调查 Frank 的生活。Emma 协助收集邻居证词。Frank 的负面形象初步建立："赌债缠身"、"被女人骗了"、"欠 Moore 银行$3,200"。

  ———— 自由探索 ————
  Frank废墟(家)：Moore 银行的催收信（Leonard 签字）、黑帮威胁纸条。
  O'Hara太太家：她身上有 Vinnie 恐吓留下的淤伤。她揭露了一个模式："Leonard 先来'善意提醒'，2-3天后 Vinnie 就出现了。"她的还贷现金是连号的新$20钞票：A73625900-904B, 909-914B——中间905-908B四张缺失。
  Silver Moon酒吧：老板 Tony 提到 Vinnie 用崭新钞票消费。Zack 获得 Vinnie 的消费钞票：A73625905B、906B、908B——正好填上 O'Hara 序列的缺口。Tony 说 Vinnie 把这钱说成"赚的"，从没说过"还债"。
  Vinnie 问话：Zack 亮出 Leonard 的照片。Vinnie 说"我不认识什么 Russo！"——然后赶紧改口说"Ross"。口误暴露他知道 Leonard 的真实意大利姓氏。
  Moore 银行：Moore 透露 Leonard 的人事档案显示他改名从"Russo"到"Ross"。

  ———— 指证 Leonard Ross（3轮）————
  第1轮——Leonard 说"我不认识 Vinnie Moretti"。Zack 播放 Vinnie 的口误"Russo" + 出示 Leonard 的改名记录（Russo → Ross）。Leonard 被迫承认以前姓 Russo 且认识 Vinnie，但声称"只是认识，没有来往"。
  第2轮——Leonard 说"我们没有来往"。Zack 出示连号钞票拼图：O'Hara 的钞票缺905-908B；Vinnie 手里有905B、906B、908B，来自同一批。连号钞票只能来自同一次银行取款。缺失的钞票在 Vinnie 手里——钱从 Leonard 流向了 Vinnie。Leonard 承认给 Vinnie 钱但声称"是借的"。
  第3轮——Leonard 说"我借钱给 Vinnie"。Zack 出示 Tony 的证词（Vinnie 说"赚的"不是"还的"）+ Vinnie 的工作日历（记录任务和报酬）+ 一致的五五分成模式（收$100 → $50给 Vinnie）。Leonard 崩溃，承认雇 Vinnie 做暴力催收。但 Leonard 威胁："没有法院令，你无权查银行内部。"

  【情感基调】连号钞票拼图的侦探快感，对 Leonard 威胁的挫败感
  玩家此时仍然觉得 Frank 是个"赌鬼活该"。对 Margaret 下落的焦虑持续。

loop3: |
  【循环3：Mickey 登场 + 掠夺性贷款真相 —— 指证 Harold Moore（3轮）】

  ———— 开篇 ————
  Zack 的法院令申请被驳回，调查陷入死胡同。搜索 Frank 废墟时，Mickey Donnelly——Zack 的儿时好友、现在的律师、失联12年——"恰好"出现并主动帮忙。他展示出神秘的专业能力，向 Moore 施压。

  ———— 自由探索 ————
  Frank废墟（深入搜索）：Frank 的日记——"1923年12月15日，去 Moore 银行借点钱。Leonard 说我手抖得厉害，他帮我填表，我只管签字就好"。Frank 的亲笔字迹样本（送奶收据）。
  Moore银行（Mickey 协助）：Mickey 获得银行内部记录——贷款金额$3,200，用途"赌债偿还"，签名人"Frank Kowalski"——但笔迹是 Leonard 的，旁注"客户口头确认"。
  贷款协议分析：合同揭露恐怖条款——月利率12%复利（年化289%，远超伊利诺伊州7%法定上限）、未付利息滚入本金、每月$50"管理费"（年$600=本金的100%）。
  关键发现：Moore 得意地暗示玩家仔细看协议封面——抬头写的是"LAKESHORE INVESTMENT CO."而不是"Lakeshore Trust Bank"。Frank 的日记写的是"去 Moore 银行"——Frank 根本不知道自己签的是投资协议，不是银行贷款。
  工人互助会：Frank 多年来持续捐款，参与工人权益活动。

  ———— 指证 Harold Moore（3轮）————
  第1轮——Moore 说"Frank 亲自签署了$3,200的赌博贷款申请"。Zack 出示 Frank 日记（"Leonard 帮我填的表"）+ 笔迹对比（日记 vs 申请表=完全不同的笔迹）+ 银行记录（Leonard 签字，Frank"口头确认"）。Moore 承认是 Leonard 填的但转移话题："协议条款完全合法。"
  第2轮——Moore 说"条款合法"。Zack 出示三重违规：289%年利率 vs 7%法定上限（40倍超标）、复利陷阱、隐藏的$600管理费。Moore 无法反驳，但突然镇定自若："这些条款在我们的协议框架内完全合法。尽管去告我。你在法庭上会像个小丑。"
  第3轮——Moore 嘲讽"你会像个小丑"。Zack 揭示投资公司抬头 + Frank 日记"去银行"。Frank 以为在银行贷款，实际被骗签了投资协议。投资公司不受银行贷款法约束——所以 Moore 才如此自信。但欺骗老人签署不同性质的协议本身就是刑事欺诈。Moore 崩溃，怕 Frank 之死触发审计，主动交出 Frank 的遗嘱。
  遗嘱内容：财产捐赠工人互助会；如果 Frank 与 Rose Martinez 结婚，财产归 Rose；Danny 什么都没有。

  【情感基调】第一次叙事反转——Frank 从"赌鬼活该"变成"系统性欺诈的受害者"
  对 Mickey 的感激但也好奇他神秘的能力。对系统的愤怒。Danny 的种族敌意（"那个女人骗了我叔叔！"）引出下一个谜团。

loop4: |
  【循环4：Rose的深情告白——黄昏恋 —— 指证 Danny Kowalski（3轮）】

  ———— 开篇 ————
  追查遗嘱线索，Zack 寻找 Rose Martinez。Danny 恶毒地用种族歧视攻击 Rose："那个墨西哥女人骗了我叔叔！"

  ———— 自由探索 ————
  Rose的小公寓：墙上贴满她和 Frank 的合照（密歇根湖畔，假装游客）。五年的爱情故事通过照片讲述。
  Margaret鞋坊地下室：Frank 和 Rose 的秘密约会场所（Rose 建议的，为了保护 Frank 的名声）。简朴但温馨。旧沙发显示3-5年的大量使用——扶手磨损、坐垫深陷。褪色窗帘。固定位置的地板磨损痕迹。情侣照片墙。
  Rose深入访谈：完整故事——1923年在圣卢克医院相识，Rose 是 Frank 的护士。被社会偏见逼迫的禁忌之恋（波兰退休工人 + 墨西哥护士）不得不秘密交往。五年的地下室约会。Frank 决心给 Rose"阳光下的未来"。
  Danny房间：失业通知、信用卡逾期60天、典当的手表和戒指、向 Frank 要钱的信件草稿。
  贷款真相：实际用途是"房屋修缮——Margaret 鞋坊地下室"。维修收据显示$600全部花在了那个房间。Margaret 的租赁协议："1920年，免费借地下室给 Frank 和 Rose 使用。"
  遗嘱附录（Frank 亲笔）："如果 Rose 不愿接受，一切捐给工人互助会。"

  ———— 指证 Danny Kowalski（3轮）————
  第1轮——Danny 说"Rose 最近才勾引了我叔叔"。Zack 出示地下室物证：沙发磨损3-5年 + 褪色窗帘 + 地板磨损痕迹。物理证据造不了假。Danny 被迫承认"他们认识有一阵子了"但转移："她骗他去贷款！"
  第2轮——Danny 说"Rose 逼他贷款"。Zack 出示真实贷款用途（地下室修缮，不是赌博）+ Margaret 的免费租赁协议 + 维修收据（$600全花在那个房间）+ Rose 的证词（她反对贷款）。Frank 是出于爱自愿做的。Danny 转移："她图遗产！遗嘱证明了！"
  第3轮——Danny 说"Rose 图遗产"。Zack 出示遗嘱附录（"尊重 Rose 的选择"）+ Rose 此前的声明。Danny 冷笑："嘴上说说，她会变卦的。" 此时 Rose 戏剧性地走进房间（Emma 安排她在外面等候）。Rose 当场签署继承权放弃书："我从不在乎 Frank 的财产。他给我的是五年的爱。" Zack 随后揭露 Danny 的经济窘境：失业、债务、典当物品，房子在 Miller 公司拆迁区域值几千美元补偿金——图钱的人是 Danny 自己。

  【情感基调】第二次叙事反转——Frank 从"被女人骗的老傻瓜"变成"为爱而战的黄昏英雄"
  Rose 的戏剧性入场和当场签字是情感高潮。对五年秘密恋情的深深共情。对 Danny 种族歧视和贪婪的厌恶。Rose 提供保险箱钥匙和证词："11月6日，Frank 说他要去做一件很危险的事。"

loop5: |
  【循环5：Vinnie 的纵火认罪——误导性结局 —— 指证 Vinnie Moretti（1轮）】

  ———— 开篇 ————
  Zack 用 Rose 的钥匙打开 Frank 的银行保险箱。里面：Frank 针对 Moore 银行和黑帮的完整举报材料——掠夺性贷款证据、Leonard 和 Vinnie 勾结的照片、受害者名单（包括 Margaret）。Frank 的遗言："如果我出事了，把这些交给警方。" Foster 交出完整尸检报告：Frank 在火灾前就因钝器击打头部致死——这是谋杀，不是纵火致死。

  ———— 自由探索 ————
  Margaret鞋坊废墟（深入搜索）：Frank 床边找到一只银色打火机——状态完好、几乎没有烟熏痕迹，侧面刻着"V"。在火灾现场如此完好太可疑——暗示是火灾后被人放上去的。
  Rose补充证词："11月6日晚上8:20左右，我看到一个戴眼镜的男人从店里出来，踉踉跄跄好像看不清路。9点左右，又看到一个穿深色衣服的大块头匆匆离开——体型壮硕，看着像意大利人。"
  Silver Moon酒吧：Tony 认出打火机是 Vinnie 的——"他每天用，上面的'V'是他自己刻的，上周还在炫耀。"
  Vinnie 的矛盾：被问到最近是否去过 Frank 那里，Vinnie 声称"至少两三个月没去过了"——与所有证据矛盾。

  ———— 指证 Vinnie（1轮——快速认罪）————
  Zack 出示打火机 + Tony 的辨认 + Rose 关于"大块头意大利人"的描述。Vinnie"几个月没去过"的谎言崩塌。
  然后 Vinnie 突然急切地打断 Zack："够了！我认了！是我放的火！我杀了 Frank！我透过窗户看到老头在床上睡觉，然后我放了火！"
  认罪"太快、太急切"——明显在保护某人。关键漏洞：他说"在床上睡觉"（不是"受伤倒在地上"），说"纵火烧死"（但 Frank 死于钝器重击），动机也说不通（"催收" → 看到人睡着 → 放火？）。

  ———— 戏剧性转折——Mickey 救出 Margaret ————
  就在 Zack 要继续追问时，Mickey 冲进来："我知道你妈在哪！" Vinnie 被戴上手铐带走时爆发："Mickey！！你这叛徒！你背叛了盟约！你出卖了 Leo！" Mickey 冷淡地无视他。Zack 跟着 Mickey 赶到废弃码头仓库，救出了 Margaret——活着，但受了伤。
  Zack 对 Mickey 的信任达到顶点："谢谢你……要不是你……"
  Emma 安静地保持怀疑。

  【情感基调】Margaret 获救的释然，Frank 勇气的震撼，Vinnie 急切认罪的深深不安
  Vinnie 对 Mickey 的愤怒指控——"Leo"作为名字首次出现。Vinnie 是真凶吗？为什么打火机那么完好？"背叛了盟约"是什么意思？玩家想信任 Mickey——他刚救了 Zack 的母亲。

loop6: |
  【循环6：Leonard 终极指证——诱供 —— 指证 Leonard Russo（4轮 + 新玩法机制）】

  ———— 开篇 ————
  Margaret 在医院苏醒。她提供关键证词："8点左右我走回来，在街角看到一个戴眼镜穿西装的男人从店里匆匆走出，踉踉跄跄好像看不清路。进去后发现 Frank 倒在地上大出血。我冲过去查看，然后被人从背后打晕了。" Zack 用这份证词迫使 Morrison 签发 Leonard 住所的搜查令。

  ———— 自由探索 ————
  Margaret鞋坊（凶器深查）：熏黑的黄铜烛台——底座凹痕与 Frank 的头骨伤口完美吻合（Foster 法医报告确认）。用医用镊子从烛台下方地板缝隙提取出一片眼镜镜片碎片——微微泛黄，说明是旧镜片。
  Leonard住所（搜查令进入）：1910年童年照片——年幼的 Leonard 和年幼的 Vinnie 在南区合影。墙上一个空的银相框，刻着"To Leo, Best Friends Forever - 1910"——照片已被取走。旧报纸剪报：1915年 Russo 家面包店被黑帮纵火，Leonard 父母双亡。Leonard 的眼镜：一片镜片透明如新（右），一片泛黄陈旧（左）。眼镜维修收据：11月7日（案发第二天），加急更换右镜片，旧镜片按客户要求丢弃。电话记录：Leonard 在11月6日20:05给 Vinnie 打电话，37秒。

  ———— 指证 Leonard Russo（4轮）————
  第1轮——Leonard 说"我整晚在家，没去过鞋坊"。Zack 出示烛台下的眼镜碎片 + Margaret 关于"戴眼镜西装男踉跄离开"的证词。Frank 视力正常不戴眼镜——碎片属于凶手。Leonard 狡辩："很多人戴眼镜，这不能证明是我的。"
  第2轮——Leonard 说"就算有碎片也不能证明是我的"。Zack 观察 Leonard 现在的眼镜：右片透明新（新），左片泛黄（旧）。碎片是泛黄的——匹配旧镜片。加上11月7日的维修收据证明他在案发第二天更换了右镜片。Leonard 被迫承认去过现场但声称"只是拜访 Frank，不小心碰碎了眼镜"。

  第3轮——全新玩法：诱供系统。Leonard 说"我只是拜访，不小心碰碎了眼镜"。火灾毁掉了所有直接证据（血迹、指纹）。Zack 只有物证（烛台凹痕 + 碎片）和间接证词，必须使用心理战术。
  Zack 告诉 Leonard："Vinnie 已经认罪了。" Leonard 明显放松。
  诱供节点1：玩家选择"暗示 Vinnie 已经扛下所有责任"（正确：+30%）vs "直接威胁 Leonard"（错误：指针下降）。
  Zack 出示 Margaret 的搏斗证词 + 烛台吻合 Frank 致命伤口。
  诱供节点2：玩家选择"安抚——既然 Vinnie 认了，承认打架也没事"（+40%）vs "威胁动武"（错误）。
  诱供节点3：玩家选择温和的"到底发生了什么，Leonard？"（+30% → 100%）vs "认罪不然后果自负！"（错误）。
  QTE触发：Leonard 特写，汗珠、颤抖。玩家在3秒内按键。
  Leonard 崩溃："是！我用烛台打了他！我们打起来了！我抓起烛台打了他的头！他倒下了，在流血，拐杖掉了，他爬不起来！" 但 Leonard 立刻转移："我走的时候他还活着！Vinnie 后来去了，杀了他！我最多算伤害罪，不是杀人！"

  第4轮——致命一击。Leonard 说"我打伤了 Frank，但 Vinnie 说'让他死吧'然后放火烧了他"。Leonard 声称 Vinnie 到场时看到的是"Frank 受伤倒在地上"。Zack 请 Leonard 确认："你确定 Vinnie 看到的是'Frank 受伤倒在地上'？" Leonard 确认。然后 Zack 出示 Vinnie 的实际认罪证词："我透过窗户看到老头在床上睡觉。" 致命矛盾：
  Leonard 说：受伤、在地上、爬不起来
  Vinnie 说：在床上睡觉
  Zack 的推理：Vinnie 到达时 Frank 已经死了。Vinnie 把尸体从地上搬到床上，布置成"睡梦中被烧死"的假象。所以 Vinnie 的认罪说"在床上"——因为那是 Vinnie 自己布置的场景。Vinnie 不知道打斗的事，不知道 Frank 受过伤——因为 Frank 死的时候只有 Leonard 在场。
  Leonard 彻底崩溃："是我……我用烛台打了他……他没有再呼吸了……我知道他死了……我花了十年建立这一切……我不能坐牢……我打电话给 Vinnie……我不知道他会搬动尸体……我不知道他会认罪……"

  ———— 结局——悲剧的终章 ————
  三条平行线：

  监狱——Vinnie 和 Leonard 的最后对话（隔着玻璃）：
  Vinnie："因为我爱你，Leo。从小时候开始。" Leonard 震惊："什么……？" Vinnie："我知道你不爱我。我知道你只把我当工具。即使你十多年没联系我，即使你看不起我……我还是会来。" Leonard 一言不发转身离开。Vinnie 看着他的背影——爱、痛苦、绝望。

  Margaret鞋坊废墟——Rose 的告别：
  Rose 抱着 Frank 的照片："Frank……我终于可以光明正大地说——我爱你。但你走了……你答应过我，事情结束后带我走……现在我自由了，我可以在阳光下爱你了……但你不在了。"

  医院走廊——Zack 和 Emma 的对话：
  Zack："Vinnie 故意留下了那只打火机。他从一开始就打算认罪。" "Frank 和 Rose 相爱五年却不能公开。Vinnie 爱了 Leonard 一辈子却只能在暗处守着。两种爱，都被这座城市碾碎了。" Emma："至少 Leonard 和 Vinnie 会受到审判。正义得到了伸张。" Zack（苦笑）："正义？Moore 银行呢？Miller 公司呢？真正的犯罪者毫发无伤。Leonard 和 Vinnie 不过是底层被压迫的人……互相伤害，而真正的恶逍遥法外。"

  【情感基调】全剧最复杂的情感冲击
  破案的释然。双重爱情悲剧的深沉悲伤（Frank+Rose：相爱却被摧毁；Vinnie+Leonard：单恋却被丢弃）。诱供机制创造了道德模糊——Zack 利用了 Leonard 对 Vinnie 认罪的信任。双重"信息不对称"（Leonard 不知道 Vinnie 爱他 + 不知道 Vinnie 认罪的具体内容）既是精妙的逻辑陷阱，也是深刻的悲剧。结局强化主题：真正的恶人（Moore 银行、Miller 公司）毫发无伤，被压迫者互相毁灭。
