loop1: |
  【循环1：自杀还是他杀？—— 指证 Morrison（2轮）】

  ———— 开篇 ————
  Thomas Sullivan 从公寓楼顶坠亡。腐败警探 Morrison 故意拖延了9.5小时才通知 Zack，想赶在他到来前按"自杀"结案。清晨的楼下现场，Morrison 对着尸体挥挥手说"一眼就看出来，喝多了自己跳的"。Emma 拉住想发火的 Zack，引导他冷静搜证。

  ———— 自由探索 ————
  楼下现场(SC3001)：尸体着地点距墙仅0.8米——自杀跳出通常在1.5米以上，说明几乎没有水平初速度。墙体3米高处有衣物摩擦痕迹。
  楼顶(SC3002)：护栏边发现两组脚印——Thomas的42码靴印和约38码的女性鞋印，面对面分布在护栏附近。脚印深浅不一、方向杂乱（藏梗：实际是两个体重不同的女人的脚印混在一起，但此时所有人以为是一个人的）。护栏外侧灰尘完整无损（没人翻越过去），内侧有手掌印和衣物擦痕。护栏边还有一瓶完整的Jameson威士忌空瓶——$3的好酒，Thomas这种穷酒鬼买不起。
  法医办公室(SC3005)：Foster报告血液酒精浓度0.25%，明显醉酒。指甲下有少量组织，经检查是死者本人的——坠落瞬间本能抓了一下护栏边缘，不像剧烈挣扎。Thomas随身物品移交：钱包里有一把形状特殊的钥匙（用途不明，伏笔）。

  ———— 指证 Morrison（警局 SC3004）————
  第1轮——Morrison说"现场干干净净，只有死者一个人的痕迹"。Zack出示女性脚印照片：38码女鞋印，与Thomas面对面站在护栏边，不是路过。Morrison退守："有人在场不代表有人推他。"
  第2轮——Morrison说"他明显是自己跳下去的，护栏那么矮，喝多了一脚踩空就掉了"。Zack出示护栏灰尘照片（外侧完好=没翻越）+ 着地点照片（0.8米=无水平初速度）。Morrison无法自圆其说，被迫承认不是自杀。
  指证后 Morrison 佛系甩手：暗示脚印"十有八九是楼下那个Mary Sullivan的"，还说了句"这案子比你想的复杂，真相不一定是你想要的"。

  【情感基调】阴冷、愤怒、好奇
  玩家对 Morrison 草率办案感到厌恶。"楼顶的女人是谁？为什么推了Thomas？" 成为核心悬念。Morrison 最后的警告像一根刺——他是敷衍，还是知道什么？

loop2: |
  【循环2：Mary的谎言 —— 指证 Mary（4轮）】

  ———— 开篇 ————
  Emma 回顾循环1的发现：楼顶女性脚印 + Morrison 暗示"十有八九是Mary"。Zack 来到公寓楼门口(SC3013)敲门。开门的是 Mary Sullivan——Thomas 的妻子，瘦弱疲惫，眼底有旧日淤痕。8岁的女儿 Emily 在屋里安静地画画。

  ———— 自由探索 ————
  Sullivan家客厅(SC3003)：Mary 对话后解锁入内搜证。满屋家暴痕迹——墙上多处拳头凹陷、断裂修补过的椅子腿、厨房角落堆了30-40个$0.10级廉价酒瓶。Emily 的蜡笔画贴在墙上：女人牵着小女孩走在阳光下，男人被黑色蜡笔用力涂黑。Emily 房间门外侧180cm高处装了一个金属滑栓——Mary 装的防护装置。旧报纸堆中有一份带专业批注的保险版面（伏笔：循环5才会用到）。
  Sullivan家卧室(SC3012)：衣柜最底层纸盒里翻出Thomas的白衬衫——领口有珊瑚红口红印，衣物已发黄落了一层薄灰（保存很久了）。关键：Mary 用的是玫瑰红口红，Helen 用的是珊瑚红——这不是 Mary 的口红。梳妆台上找到 Mary 的玫瑰红口红（用于比对）。还有 Mary 的黑色蕾丝祈祷披肩（母亲遗物），边缘有一处微小勾丝破损。外出鞋约38码（与楼顶脚印码数一致）。
  教堂(SC3007)：Mary 声称"那晚在教堂祈祷到很晚，读到第23章"。实地验证发现：Mary 专属蜡烛位（底座刻"M.S."）上，蜡烛折断了——残余长度显示只烧了约15分钟就被风吹倒。祈祷册书签夹在第23章，但第5章页面被蜡油浸透粘连，蜡油颜色与祈祷蜡烛完全一致。
  楼下现场(SC3001)重搜：找到1928年11月21日报纸天气版——"昨夜大风警报，湖区及山区阵风达40英里/小时"（用于证明蜡烛是被大风吹倒的，不是"之后发生的事"）。
  楼顶(SC3002)重搜：确认有两组女性脚印（此时仍以为是一个人的不同步态）。

  ———— 指证 Mary（公寓楼门口 SC3013）————
  第1轮——Mary说"那晚在教堂祈祷了很久，读到第23章，蜡烛也烧了很久"。Zack出示祈祷册（蜡油粘在第5章不是第23章）+ 蜡烛残骸（只烧了15分钟就折断）。Mary 反驳："蜡烛倒了？那是我离开之后的事。"
  第2轮——Zack出示报纸天气版：当晚大风警报，教堂窗缝灌风→吹回书页到实际阅读的第5章→吹倒蜡烛→蜡油封住第5章。"你确实知道第23章的内容，但不是当晚读的。" Mary 精心伪造不在场证明的整套预谋被揭穿（提前背内容+挪书签+留蜡烛），崩溃承认提前离开了教堂。然后主动供出Helen的名字："最近听说Thomas跟三楼的Helen有不清不楚的关系……那晚上楼顶想找他问清楚，但没找到他。"
  第3轮——Mary说"最近才听说Thomas和Helen的事"。Zack出示口红比对：衬衫上是珊瑚红（Helen的），不是Mary的玫瑰红，且衣物发黄积灰说明保存已久。Mary 不是"最近才知道"——她至少三个月前就知道了。Mary 被迫承认："好吧……我知道他们的事很久了。我一直在忍。"但仍坚持"那晚上去没找到他"。
  第4轮——Mary说"上去看了一圈，没找到他就回来了"。Zack出示搜身观察结果：Mary的祈祷披肩（母亲遗物）边缘有微小勾丝破损，与Foster验尸报告中Thomas右袖扣上的异源黑色蕾丝织物特征一致。Thomas抓过Mary的披肩=近距离肢体接触。（小玩法：搜身观察——玩家观察Mary身上的披肩和手链，发现关键线索。）Mary最终承认："我找到他了……我们在护栏边吵了起来。Thomas发酒疯想动手打我，他抓了我的披肩。他喝多了站不稳，失足掉下去了。"
  关于第二组脚印，Mary 说"楼顶是公共区域，平时有人晒衣服"——但脚印在护栏附近，不是晒衣区。

  【情感基调】同情中夹杂疑虑
  玩家恨Thomas（家暴+出轨+酗酒），对Mary有强烈同情（Emily的蜡笔画、门上的滑栓、报过三次警没人管）。但两个问题挥之不去：第二组女性脚印到底是谁的？一个愤怒的妻子为什么不把"在场的情妇"也拉下水？Mary 供出 Helen 名字的时机太"恰当"——像是精心控制的信息释放。

loop3: |
  【循环3：杀妻骗保计划 —— 指证 Helen（3轮）】

  ———— 开篇 ————
  Emma 指出 Mary 被追问 Helen 是否在楼顶时"眼神闪烁、明显心虚"。Zack 想起Thomas钱包里那把形状特殊的钥匙——用途不明。两条线索都指向三楼的 Helen。敲门，一个冷漠瘦削的女人打开了门。

  ———— 自由探索 ————
  Helen家(SC3008)：母亲上月刚去世，家中弥漫丧家的冷清感。客厅整面墙贴满女性权益运动报纸剪报。窗边是母亲的轮椅和工具箱——工具箱里有 Standard Oil 润滑剂油壶，液位明显偏低。玄关小桌上有一把铜制钥匙。卧室床头是18年的药瓶和医疗账单。还有白衬衫（领口珊瑚红口红印）、珊瑚红口红、一瓶已开封剩约1/3的 Jameson 威士忌（母亲的"药酒"）。外出鞋鞋底有油迹残留。
  关键发现：Thomas钱包里的钥匙试Helen的门——打不开。试楼顶安全门——打开了。这不是"情人钥匙"，是楼顶通行钥匙。
  公寓二楼走廊(SC3006)：邻居 Seamus Byrne 是整栋楼的"活监控"。他证实：两周前 Helen 以"检查漏水"为由借了楼管的钥匙串出门，半小时后还了。第二天 Helen 再次出门，回来时口袋鼓了一块。Helen 借钥匙串→外出配钥匙→Thomas拿到楼顶钥匙。
  楼顶(SC3002)二次搜证：Morrison 之前封锁的区域现在可以进入。地面发现一段约1.5米的极薄石油基润滑剂涂抹痕迹——只涂了护栏旁靠近一个生锈大铁箱的位置（那是唯一的避风死角，Thomas必定会把Mary逼到这里）。
  银行公共区域(SC3009)：保险代理人 Bernard Wells 提供 Mary 的$10,000人寿保险单副本（受益人Thomas）。Bernard 证实 Thomas 咨询时问过"怎么让意外看起来合理"，且 Helen 在场旁听了全过程。

  ———— 指证 Helen（Helen家 SC3008）————
  第1轮——Helen说"Thomas只是来找我聊天诉苦，Mary多心了"。Zack用钥匙试锁：Thomas钱包的钥匙打不开Helen的门，却打开了楼顶安全门。加上 Seamus 的证词（Helen借钥匙串+外出配钥匙），Helen 为Thomas提供了楼顶通行权——不是"聊天诉苦"。Helen改口："他说喜欢上楼顶吹风散心，我只是帮了个忙。"
  第2轮——Helen说"我只是帮他配了把钥匙，楼顶发生的事跟我没关系"。Zack出示地面油迹（只涂了一段1.5米）+ Helen家轮椅维护油壶液位偏低 + Foster化学比对=完全一致。Helen 在地面制造了致命陷阱。Helen 崩溃："是Thomas逼我的……他说如果我不帮他，他就到处说我勾引他……"
  第3轮——Helen说"Thomas只是想在楼顶吓唬Mary，让她害怕以后不敢反抗"。Zack出示$10,000保险单（受益人Thomas）+ Bernard证词（Thomas问"怎么让意外看起来合理"，Helen全程在场）。这不是"吓唬"——是杀妻骗保。Helen 含泪坦白完整计划：Thomas欠$12,000高利贷，买了Mary的$10,000保险，计划把Mary推下楼伪装意外骗保还债。Helen 坚称是被Thomas胁迫："他威胁毁掉我的名声……你不知道一个女人的名声被毁意味着什么。"
  Helen 始终说自己那晚"在家"——没有上过楼顶。

  【情感基调】愤怒 → 同情转移
  玩家对Thomas的愤怒达到顶点——家暴+出轨+杀妻骗保+胁迫邻居，完全的恶人。Helen 从"可疑情妇"变成"另一个受害者"（被Thomas威胁名声）。但第二组女性脚印仍未解释——Helen 真的那晚不在场吗？
  隐藏线索：油只涂在Thomas坠落的那一段地面——原计划是推Mary，油应该涂在Mary会站的位置，为什么涂在了Thomas那侧？被逼的人会做得这么"完美"吗？

loop4: |
  【循环4：真相与正当防卫 —— 补充指证 Helen（3轮）+ 虚假结局】

  ———— 开篇 ————
  Zack 回到楼顶(SC3002)，遇到法医 Foster 在做现场收尾。Foster 关门时随口提了一句："门把手外侧有点滑腻。" Zack 立刻意识到这是新线索——外侧干净说明上楼的人手上没油，内侧有油说明离开时手上沾了油。Thomas 从外侧上楼且坠楼未归，那沾油离开的人≠Thomas。

  ———— 自由探索 ————
  楼顶(SC3002)第三次搜证：专查门把手。外侧把手干净，内侧把手有油膜，Foster 采样确认与循环3的轮椅维护油成分一致。有人沾着油从楼顶走了出来。
  Helen家(SC3008)回访对话：Helen 维持"那晚在家"的说法。Helen 门口的外出鞋鞋底有楼顶地面涂油区域的油迹残留——Zack 注意到这双鞋和 Mary 的外出鞋非常相似（同码数同类型）。
  Margaret鞋坊(SC3010)首次解锁：Zack 翻案卷发现Thomas公寓距母亲鞋坊只有两个街区，案发22:30正是收摊回家时间。Margaret 此前未出现在调查链中。Margaret 提供关键目击证词——案发当晚22:30路过楼下，听到争吵声和挣扎声，看到楼顶有三个人的剪影在剧烈晃动，"绝不是一个人自己摔下去的"。一个男人失去平衡坠落。
  公寓门口(SC3013)回访Mary：循环3揭示Helen参与骗保计划后，案件走向对Mary有利。Zack 在门口看看 Mary 和 Emily 的状态，Mary 在放松状态下接待 Zack，Emily 首次直接出场（在客厅画画）。

  ———— 指证 Helen（Helen家 SC3008）————
  第1轮——Helen说"那天晚上我一直待在家里"。Zack出示门把手油迹证据（外侧干净/内侧有油=有人沾油从楼顶走出）+ Helen外出鞋鞋底油迹 + Foster化学比对=同一来源。Helen 上过楼顶并沾着油离开了。Helen 改口："Thomas叫我上去看看油干没干……我看了一眼就回去了。"——第二组女性脚印终于有了解释：是Helen的。
  第2轮——Helen说"Thomas自己在喝酒，我只是在旁边待了一会儿"。Zack出示：楼顶空瓶是Jameson（$3/瓶），Thomas家全是$0.10级廉价酒没有一瓶超过$0.50，Thomas欠债$12,000根本买不起；Helen 家橱柜有同品牌Jameson已开封剩1/3；Foster报告血液酒精0.25%="有人在不断给他倒酒"。Helen 带酒上楼顶并持续给Thomas灌酒。Helen 承认："酒是我带的……我一直在给他倒。我想着……他喝醉了也许就不动手了……"
  第3轮——Helen说"谁都没碰他，他自己醉倒摔下去的"。Zack出示 Margaret 目击证词：三人剪影剧烈晃动，肢体冲突，不是一个人自己摔的。Helen 最终承认："Thomas喝了那么多……还是扑向了Mary……我吓坏了，但还是拉住了他。Mary推开了他。然后他翻过了护栏。"
  Helen 解释为什么一直隐瞒："事后我害怕极了。两个女人把一个男人弄死了——谁会信是防卫？我求Mary不要提我在场。我们商量好了，对外就说只有Mary和Thomas在，Thomas失足。"

  ———— 指证后剧情 ————
  Mickey 宣布为 Mary 辩护，正当防卫判决。案子似乎圆满结束。

  【情感基调】释然、满足——这是精心设计的"虚假结局"
  玩家觉得正义得到了伸张：Thomas 是杀妻骗保的恶人，咎由自取。Helen 从"帮凶"变成"害怕但善良的人"——关键时刻还是帮了 Mary。Margaret 的目击佐证了正当防卫。
  ⚠️ 此时玩家对 Mary 和 Helen 的信任度达到最高——为后面的冲击蓄力。
  隐藏线索：Helen说"心软了"，但第1轮承认当晚上楼是"确认油干没干"——真正心软的人应该把油擦掉，而不是确认陷阱有效。0.25%的血液酒精意味着Thomas连站都站不稳——他真的能"扑向Mary"吗？Margaret 深夜从地面仰视三楼楼顶，借微弱煤气灯光——真的能分清"谁推谁"？

loop5: |
  【循环5：银行的诱导 —— 指证 Bernard Wells（3轮）—— 第一次反转】

  ———— 开篇 ————
  警局(SC3004)。案子已判正当防卫，Zack 本以为结束了。但 Mickey 来访提出一个关键质疑：Thomas 只有小学文化，日记拼写错误连篇——他怎么设计出"配钥匙、涂油、约人上楼顶"这样精密的骗保计划？Zack 想起循环2在 Sullivan 家搜到的那份旧报纸——保险版面有大量专业批注，用了"ACC.D"（意外死亡）、"BEN.CHG"（受益人变更）等 Continental 银行内部缩写术语。笔迹比对确认不是Thomas写的（Thomas笔迹潦草、错别字多，批注字迹工整专业）。银行内部术语 + 非Thomas笔迹 → 直指银行从业者。循环3 Bernard 已承认 Thomas 咨询时 Helen 在场旁听——现在需要去 Bernard 的私人办公室找物理证据。

  ———— 自由探索 ————
  Bernard办公室(SC3014)首次解锁：深色木质办公桌，极其整洁。墙上挂着1927年度服务之星表彰状，桌上有全家福照片（妻子+两个穿校服的孩子）。抽屉里翻出一块旧皮质书写垫板——表面磨损严重，有多层叠加的压痕。
  小玩法-侧光压痕分析：玩家选择报纸实物放在垫板上对比，调整侧光角度——压痕与报纸批注完全重合。圈画轨迹、字迹、位置分布完美吻合。压痕力度不均匀，是"边说边写"的节奏——面对面教学的物理铁证。
  小玩法-花形压痕发现：Foster 在垫板表面还发现了一个微小的花形压痕——不是笔迹，是硬物按压留下的深印。Foster 特别指出：压痕深及多层牛皮，说明留下印记的人手腕极度用力或重重砸在桌上。与 Mary 手链上的雏菊花形吊坠比对——五瓣花形、尺寸、轮廓弧度完全一致。有人戴着这条手链长时间坐在 Bernard 桌前。

  ———— 指证 Bernard（Bernard办公室 SC3014）————
  第1轮——Bernard说"Thomas来买了标准保单，我没做任何多余的事"。Zack出示标注报纸：专业保险批注 + 银行内部缩写 + 笔迹不是Thomas的。Bernard 改口："我确实在报纸上给Thomas做过标记，但那是标准的客户讲解。每个代理人都这样做。"
  第2轮——Bernard说"我只是给客户讲解条款，这是标准服务"。Zack出示垫板压痕比对：压痕与报纸批注完全吻合=报纸就是在这张桌上写的，力度不均匀=边说边写=面对面教学。不是"碰巧讲解"，是手把手教Thomas"如何让意外看起来合理"。Bernard 沉默后承认："Thomas说他妻子经常'出事故'。他问如果出了严重事故，保险怎么赔。我照实回答了他的问题。银行有规定，客户问什么我就答什么。" 并进一步透露银行机制：高风险贷款客户→保险理赔回收贷款→代理人有额外提成；客户出事→没收抵押房产。"无论哪种结果，银行都不亏。"
  第3轮——Bernard说"之后没有其他人来找过我"。Zack出示垫板上的花形压痕 + Mary 手链雏菊吊坠比对=完全吻合。有人戴着这条手链坐在Bernard桌前。Bernard 被迫承认："确实有个女人来过。她问了'投保人意外身亡后保单效力如何''受益人先于被保险人死亡怎么办''自杀免赔期多久''坠楼算意外还是自杀'。都是很专业的问题。" 但 Bernard 始终不确认那个女人就是Mary——"每天来很多客户，我不记得了。"

  【情感基调】从愤怒突然转为不安——循环4的释然开始崩塌
  玩家先是对银行系统性诱导犯罪感到愤怒：Bernard 是"平庸之恶"的化身——面无表情地说"这是我的工作"，却亲手为一场谋杀提供了全套方案。
  但雏菊压痕的发现让一切改变——那些问题的角度不是"怎么害人"，而是"投保人死了怎么赔"。如果 Mary 在 Thomas 动手之前就去银行研究过保险条款，那她到底是"被动自卫"还是"主动策划"？循环4刚建立的"正义得到伸张"的满足感出现了第一道裂痕。

loop6: |
  【循环6：好友推理对决 —— 辩论 Mickey（5轮）—— 终极反转 + 道德抉择】

  ———— 开篇 ————
  警局(SC3004)。Zack 整理循环5的发现，向 Emma 表达不安。Mickey 来警局找 Zack："我听说你去了Continental银行？跟我来，我需要跟你谈谈。" Mickey 不想在警局正式场合讨论——拉 Zack 到街角，老朋友之间的私下对话。

  ———— 自由探索（辩论前的情感铺垫）————
  法医办公室(SC3005)：Zack 带着明确疑问回来——"0.25%血液酒精浓度，Thomas真的还能主动攻击人吗？" Foster 补充分析：这个浓度下连走直线都做不到，主动攻击基本不可能。Foster 还承认：循环1报告中"组织量极少"的措辞是有意保守的——"我不想让一个受害者因为技术细节被起诉。"
  Margaret鞋坊(SC3010)：辩论前 Zack 想听母亲讲 Mary 这些年的真实生活。Margaret 回忆十年来看着 Mary 脸上带着淤青去买菜、带着伤痕去教堂。不是为了证据，是 Zack 在整理自己的情感。
  公寓门口(SC3013)回访Mary：Zack 想在最终决定前看看 Mary。补过的墙洞、Emily 的画、生活拮据的痕迹——不是调查，是观察一个被法律抛弃的家庭。
  Helen家(SC3008)回访：Helen 平静接受现状。
  街角(SC3011)首次解锁：Mickey 等在这里——非正式场合，让对话从法律推向人性。

  ———— 辩论 Mickey（街角 SC3011）————
  形式：不是传统的"戳穿谎言"——是 Zack（控方）和 Mickey（辩方）用同样的证据做出相反解读。Mickey 每轮先提辩护主张，Zack 用证据反驳。Zack 逐轮获胜，但 Mickey 的每次辩护都让 Zack（和玩家）更深入理解 Mary 的处境。

  第1轮——Mickey说"酗酒者暴力是肌肉记忆，0.25%对这种人不算什么，正当防卫成立"。Zack反驳：Foster 补充报告——0.25%浓度连走直线都做不到；指甲下组织量极少，不像剧烈挣扎，更像被推时本能抓了一下。Thomas 没有攻击能力。Zack赢。Mickey过渡："好，就算Thomas没有攻击能力——但Helen最后关头反悔了。"

  第2轮——Mickey说"Helen被胁迫参与准备，不清楚油该涂哪侧；当晚上楼是在犹豫要不要擦油，但事情发展太快了"。Zack反驳：油涂在Thomas那一侧（是给Thomas准备的陷阱，不是给Mary的）；Helen上楼是"确认油干没干"而非擦油=确保陷阱有效。Helen 没有反悔——从头到尾都是合谋。Zack赢。Mickey过渡："Helen那边我说不过你。但Mary——她不是策划者。"

  第3轮——Mickey说"Mary 20:00离开教堂，花了45分钟才到公寓。这是恐惧，不是预谋。一个决定去面对可能杀她的丈夫的女人，在路上犹豫害怕"。Zack反驳：时间线太精确——Mary 20:00到、Thomas 21:00到Helen家、Helen 21:30灌酒、22:30坠楼。天衣无缝的配合不是"犹豫"能解释的。Zack赢。但Mickey补了一句："她报警三次。三次，Zack。法律每一次都让她失望。如果是你——你会继续等下去吗？" Zack 第一次没有立刻回应。

  第4轮（转折点）——Mickey说"就算Mary有预谋，那也是求生不是谋杀"。Zack反驳：雏菊压痕证明Mary去过Bernard办公室 + Bernard供述"有女人问了'投保人死亡后保单效力'"= 经济动机确凿，不只是"求生"。Mickey 低声说："她还有一个8岁的女儿。Thomas死了，保险怎么赔，直接决定她们母女能不能活下去。你管这叫'经济动机'。我管这叫'一个母亲在想怎么养活孩子'。" 双方沉默。没有赢家。

  第5轮（情感高潮）——Mickey说"别再查了。法庭已经判了。让案子结了吧。" Zack没有停下。他仔细追问母亲Margaret：那晚你到底看到了什么具体动作？Margaret 声称看清了"男人推女人，女人拉男人"。但物理验证：护栏遮挡视线、65度仰角、深夜煤气灯不照楼顶——从地面最多只能看到模糊的剪影晃动，绝不可能分辨出具体肢体动作，更不可能看清"谁推谁"。Margaret 的模糊观察被认知偏差自动解读为"Thomas攻击Mary"——十年来看着Mary被打，她的大脑自动将画面填补为符合预期的"防卫"场景。她自己可能真心相信那就是她看到的。

  ———— 最终选择 ————
  Zack 赢了辩论。他慢慢收起桌上的文件，走向壁炉。Mickey 没有说话，没有劝他，只是看着他。Zack 把文件扔进火里。"我什么都没发现。案子结了。"

  【情感基调】推理快感 → 动摇 → 撕裂 → 理解 → 沉默的选择
  不是 Mickey 说服了 Zack。是 Zack 自己理解了：Foster 用模糊措辞保护Mary，Margaret 的认知偏差间接保护了Mary，Helen 甘愿背负"被胁迫者"的身份保护Mary。当所有好人都选择保护一个杀人犯——而法律三次抛弃了她——Zack 选择加入他们。
  火焰吞没文件的画面，是整个Unit3的终幕。
