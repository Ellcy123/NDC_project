                            <th class="type-col">NPC</th>
                            <th class="desc-col">背景资源</th>
                            <th>场景美术需求</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            if (merged.length === 0) {
                html += `<tr><td colspan="6" style="text-align:center; color:var(--text-muted); padding:2rem;">
                    ${AppState.allScenes.length === 0 ? '请先点击「加载」' : '没有匹配的场景'}
                </td></tr>`;
            }

            merged.forEach(m => {
                const artClass = m.ArtRequirement ? 'art-req' : 'art-req empty';
                const artText = m.ArtRequirement || '未填写';
                const npcCount = m.npcMap.size;
                const bgName = m.backgroundImage ? m.backgroundImage.split('\\').pop() : '无';
                const loopTags = m.loops.sort().map(l => `L${l}`).join(' ');

                // NPC art sub-rows
                let npcRows = '';
                for (const [npcName, npcEntry] of m.npcMap) {
                    const npcArtClass = npcEntry.ArtRequirement ? 'art-req' : 'art-req empty';
                    const npcArtText = npcEntry.ArtRequirement || '未填写';
                    const resList = Array.from(npcEntry.resPaths);
                    npcRows += `
                        <tr style="background: rgba(232,198,120,0.03); cursor:pointer;" onclick="UI.showNpcModal('${npcEntry.info?.NPC?.id || ''}')">
                            <td style="padding-left:1.5rem; color:var(--text-muted);">└</td>
                            <td class="name-col" style="color:var(--highlight);">${escapeHtml(npcName)}</td>
                            <td class="name-col"></td>
                            <td class="type-col" style="font-size:0.75rem; color:var(--text-muted);">${resList.length}个立绘</td>
                            <td class="desc-col" style="font-size:0.75rem;">${resList.map(r => `<span class="copy-tag" onclick="event.stopPropagation(); copyText('${escapeHtml(r)}', this)">${escapeHtml(r)}</span>`).join(' ')}</td>
                            <td class="${npcArtClass}">${escapeHtml(truncate(npcArtText, 60))}</td>
                        </tr>
                    `;
                }

                html += `
                    <tr data-scene-key="${escapeHtml(m.key)}" onclick="UI.showSceneModal(this.dataset.sceneKey)" style="cursor:pointer;">
                        <td style="font-size:0.8rem; color:var(--text-muted);">${loopTags}</td>
                        <td class="name-col">${escapeHtml(m.sceneName)}</td>
                        <td class="name-col">${escapeHtml(m.sceneNameEn)}</td>
                        <td class="type-col">${npcCount > 0 ? `<span class="badge npc">${npcCount}</span>` : '0'}</td>
                        <td class="desc-col" style="font-size:0.8rem;">${escapeHtml(bgName)}</td>
                        <td class="${artClass}">${escapeHtml(truncate(artText, 60))}</td>
                    </tr>
                    ${npcRows}

            });

            html += `</tbody></table>`;
            return html;
        },

        // ---- Shared filter methods ----
        onFilter(text) {

        clearFilter() {

        filterByLocation(loc) {

    // ===== Flow View =====
    const FlowView = {
        showScene(sceneId, autoPlayTalkId) {
            AppState.previousPhase = AppState.currentPhase || 'opening';
            AppState.currentPhase = 'scene';
            AppState.currentSceneId = sceneId;
            if (typeof DoubtView !== 'undefined') DoubtView.refreshEntry();

            const scene = DataManager.getScene(sceneId);
            if (!scene) {
                document.getElementById('content').innerHTML =
                    `<p style="color:var(--text-muted)">场景 ${escapeHtml(sceneId)} 在 SceneConfig 中未找到</p>`;
                UI.renderSidebar();
                return;
            }

            const bgUrl = Config.getAssetUrl(scene.backgroundImage);
            const evidenceItems = DataManager.sceneEvidence(sceneId);
            const npcInfos = scene.NPCInfos || [];
            const otherItems = DataManager.sceneOtherItems(sceneId);

            // Game reference resolution for NPC positioning
            const REF_W = 2560, REF_H = 1440;

            const noteTag = scene.note
                ? `<span style="display:inline-block; padding:0.1rem 0.4rem; border-radius:3px; font-size:0.75rem; margin-left:0.5rem; background:${scene.note === '晚上' ? '#1a237e' : '#e8a735'}; color:${scene.note === '晚上' ? '#90caf9' : '#3e2723'};">${escapeHtml(scene.note)}</span>`
                : '';
            const prevPhase = AppState.previousPhase || 'opening';
            const backLabel = prevPhase === 'expose' ? '← 返回指证阶段' : prevPhase === 'ending' ? '← 返回结尾阶段' : prevPhase === 'events' ? '← 返回突发事件' : prevPhase === 'free' ? '← 返回自由探索' : '← 返回开篇阶段';
            // Check if this is an opening/ending scene
            const loopRef = AppState.loopData;
            let openingMeta = null;
            if (loopRef?.opening) {
                openingMeta = loopRef.opening.find(item =>
                    String(typeof item === 'object' ? item.id : item) === String(sceneId)
                );
                if (openingMeta && typeof openingMeta !== 'object') openingMeta = null;
            }

            let html = `
                <div style="margin-bottom:0.5rem;">
                    <button class="btn" onclick="FlowView.showPhase('${prevPhase}')" style="font-size:0.8rem; padding:0.2rem 0.6rem;">${backLabel}</button>
                </div>
                <div class="scene-title">
                    ${escapeHtml(scene.sceneName)}
                    <span style="color:var(--text-muted); font-size:0.85rem;"> (${scene.sceneId})</span>
                    ${noteTag}
                </div>
            `;

            // Display backgroundImage asset path if available
            if (scene.backgroundImage) {
                const bgName = scene.backgroundImage.split('\\').pop();
                html += `<div style="margin:0.3rem 0 0.5rem; display:flex; align-items:center; gap:0.5rem;">
                    <span style="color:var(--text-muted); font-size:0.8rem;">背景美术:</span>
                    <span class="copy-tag" onclick="copyText('${escapeHtml(bgName)}', this)" style="font-size:0.8rem;">🎨 ${escapeHtml(bgName)}</span>
                    <span style="color:var(--text-muted); font-size:0.7rem;">${escapeHtml(scene.backgroundImage)}</span>
                </div>`;
            }

            // Opening scene: show characters, purpose, talk files inline
            if (openingMeta) {
                if (openingMeta.characters?.length) {
                    html += `<div style="display:flex; flex-wrap:wrap; gap:0.4rem; margin:0.5rem 0;">`;
                    openingMeta.characters.forEach(name => {
                        html += `<span style="background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:0.2rem 0.5rem; font-size:0.85rem;">${escapeHtml(name)}</span>`;
                    });
                    html += `</div>`;
                }
                if (openingMeta.purpose) {
                    html += `<p style="margin:0.5rem 0; color:var(--text-secondary);">${escapeHtml(openingMeta.purpose)}</p>`;
                }
                if (openingMeta.talk) {
                    const fileName = openingMeta.talk;
                    const entries = AppState.allTalks.filter(t => t.videoScene === fileName);
                    const firstId = entries.length > 0 ? entries[0].id : '';
                    html += `<div style="display:flex; align-items:center; gap:0.75rem; margin:0.5rem 0; flex-wrap:wrap;">`;
                    html += `<span class="copy-tag" onclick="copyText('${escapeHtml(fileName)}', this)">📄 ${escapeHtml(fileName)}.json</span>`;
                    if (entries.length > 0) {
                        html += `<span style="color:var(--text-muted); font-size:0.8rem;">${entries.length} 句 | 首句: ${firstId}</span>`;
                    } else {
                        html += `<span style="color:var(--warning); font-size:0.8rem;">(未加载)</span>`;
                    }
                    if (firstId) {
                        html += `<button class="btn" onclick="DialogController.startFromTalkId('${firstId}')" style="font-size:0.85rem; padding:0.3rem 0.8rem;">▶ 播放</button>`;
                    }
                    html += `</div>`;
                }
            }

            // Scene container: background + NPC sprites overlay + dialog target
            html += `<div class="scene-container"${bgUrl ? '' : ' style="min-height:280px;"'}>`;
            if (bgUrl) {
                html += `<img class="scene-bg" src="${bgUrl}" onerror="this.style.display='none';" alt="">`;
            }

            // 所有 NPC 都在场景里占位 —— 无坐标的自动按"缺失"数量在场景底部 40% 区域等距散布
            // 效果:像原型一样,每个人都有一个大砖红占位框贴在场景上,一眼看清"这里少个人"
            const totalNoPos = npcInfos.filter(i => !(parseFloat(i.PosX) > 0 || parseFloat(i.Posy) > 0)).length;
            let autoIdx = 0;
            npcInfos.forEach((info, npcIdx) => {
                const resA = info.ResPath ? Config.getAssetUrl(info.ResPath) : '';
                const npcName = info.NPC?.Name?.[1] || cn(info.NPC?.Name) || '?';
                const px = parseFloat(info.PosX) || 0;
                const py = parseFloat(info.Posy) || 0;
                const hasPos = (px > 0 || py > 0);

                let leftPct, topPct;
                if (hasPos) {
                    leftPct = (px / REF_W * 100).toFixed(1);
                    topPct  = (py / REF_H * 100).toFixed(1);
                } else {
                    // 自动散布:占场景宽度 70%,垂直位置 65%(大致在人物中线高度)
                    const span = 70;
                    const start = 50 - span / 2;
                    const i = autoIdx++;
                    leftPct = totalNoPos > 1 ? (start + (span / (totalNoPos - 1)) * i).toFixed(1) : 50;
                    topPct = 65;
                }

                if (resA) {
                    // 图片可能 404(艺术资源未交付) —— onerror 要用 figure-miss 红框替换 <img>,而不是简单移除
                    html += `
                        <div class="npc-on-scene${hasPos ? '' : ' auto-placed'}" style="left:${leftPct}%; top:${topPct}%;"
                             onclick="UI.showNpcDrawerBySceneIdx(${npcIdx})">
                            <img src="${resA}" onerror="var p=this.parentElement; p.classList.add('missing'); var d=document.createElement('div'); d.className='npc-figure-miss'; d.textContent='?'; this.replaceWith(d);" alt="">
                            <div class="npc-label">${escapeHtml(npcName)}</div>
                        </div>
                    `;

                    html += `
                        <div class="npc-on-scene missing${hasPos ? '' : ' auto-placed'}" style="left:${leftPct}%; top:${topPct}%;"

            html += `</div>`;

            // Opening scene metadata — handled inline in title block below

                    // Production spec area

                        const entries = AppState.allTalks.filter(t => t.videoScene === talkName).sort((a, b) => Number(a.videoId || a.id) - Number(b.videoId || b.id));
                        const firstId = entries.length > 0 ? entries[0].id : '';
                        const loaded = entries.length > 0;
                        const sub = `${talkName}.json · ${entries.length} 句`;
                        const playAction = `UI.playTalkInDrawer('${firstId}', 'TALK', '${escapeHtml(talkName).replace(/'/g, '&apos;')}', '${escapeHtml(sub).replace(/'/g, '&apos;')}')`;
                        html += `<div class="phase-scene-talk" style="margin:0.5rem 0;">`;
                        html += `<span class="copy-asset" onclick="copyText('${escapeHtml(talkName)}', this)">

                        if (loaded) {
                            html += `<span class="talk-meta">${entries.length} 句 · 首句 <span class="talk-meta-id">#${firstId}</span></span>`;
                        } else {

                        if (seStartId) {

    // ===== Dialog Controller (one-line-at-a-time navigation) =====
    const DialogController = {
        _state: {
            chain: [],       // 当前线性对话链 [{talk, branches}]
            index: 0,        // 当前位置
            history: [],     // 分支历史栈，用于返回上一层
            avatarUrl: '',   // NPC 默认头像
            sceneId: '',
        },

        start(npcIdx, talkType, containerId) {
            const scene = DataManager.getScene(AppState.currentSceneId);
            const info = scene?.NPCInfos?.[npcIdx];
            if (!info) return;

            const talkId = talkType === 'loopTalk'
                ? (info.LoopTalkInfo?.id || '')
                : (info.TalkInfo?.id || DataManager.findTalkForNPC(info.NPC?.id) || '');
            if (!talkId) return;

            const resA = info.ResPath ? Config.getAssetUrl(info.ResPath) : '';
            const resB = info.ClickResPath ? Config.getAssetUrl(info.ClickResPath) : '';

            this._state = {
                chain: DataManager.buildDialogueChain(talkId),
                index: 0,
                history: [],
                avatarUrl: resA || resB,
                sceneId: AppState.currentSceneId,
                containerId: containerId || null,
                focusSpeakerId: info.NPC?.id || '',
            };

            if (this._state.chain.length === 0) {
                UI.updateStatus('该 NPC 无对话数据');
                return;
            }

            this._render();
        },

        // 从任意 Talk ID 开始对话（不依赖 NPCInfos）
        startFromTalkId(talkId, containerId) {
            if (!talkId) return;
            const chain = DataManager.buildDialogueChain(talkId);
            if (chain.length === 0) {
                UI.updateStatus('无对话数据');
                return;
            }
            const firstIcon = chain.find(n => n.talk.Speaker?.IconSmall)?.talk.Speaker?.IconSmall;
            const firstSpeakerId = chain[0]?.talk?.Speaker?.id || '';
            this._state = {
                chain, index: 0, history: [],
                avatarUrl: firstIcon ? `${Config.paths.assets}/Art/NPC/Icon/${firstIcon}.png` : '',
                sceneId: '', containerId: containerId || null,
                focusSpeakerId: firstSpeakerId,
            };
            this._render();
        },

        _render() {
            if (!this._state.chain.length) { this.close(); return; }

            // 所有对白都在 drawer 里 streaming。没 containerId 说明调用方没走 drawer 入口 ——
            // 用 UI.showDialogDrawer 兜底,把当前 chain 的首句 id 送进去开 drawer(再回头调 startFromTalkId 传 containerId)
            if (!this._state.containerId) {
                const firstTalkId = this._state.chain[0]?.talk?.id;
                if (firstTalkId && typeof UI !== 'undefined' && UI.showDialogDrawer) {
                    UI.showDialogDrawer(String(firstTalkId));
                }
                return;
            }
            this._renderStream();
        },

        // 流水式渲染(drawer 专用)：lines[0..index] 全部堆叠，淡化旧的，高亮当前
        _renderStream() {
            const { chain, index, containerId, focusSpeakerId } = this._state;
            const stage = document.getElementById(containerId);
            if (!stage) return;

            const total = chain.length;
            const curNode = chain[index];
            const curTalk = curNode.talk;
            const isLast = (index === total - 1);
            const hasBranches = isLast && curNode.branches && curNode.branches.length > 0;
            const isEnd = isLast && !curNode.branches;
            const canPrev = index > 0 || this._state.history.length > 0;
            // 主角 Zack / 搭档 Emma 在不同 Unit 的 NPC id 不统一，按姓名判断更稳
            const PROTAGONIST_NAMES = ['Zack', 'Zack Brennan', '扎克', '扎克·布伦南'];
            const PARTNER_NAMES = ['Emma', "Emma O'Malley", '艾玛', '艾玛·奥马利'];

            const buildLineHtml = (i) => {
                const n = chain[i];
                const t = n.talk;
                const speakerName = cn(t.Speaker?.Name) || t.Speaker?.id || '?';
                const speakerId = String(t.Speaker?.id || '');
                const words = cn(t.Words) || '';
                const action = t.cnAction || '';
                const isCurrent = (i === index);
                const isSelf = focusSpeakerId && speakerId === String(focusSpeakerId);
                const speakerNameEn = t.Speaker?.Name?.[1] || '';
                const isProtagonist = PROTAGONIST_NAMES.includes(speakerName)
                    || PROTAGONIST_NAMES.includes(speakerNameEn);
                const isPartner = PARTNER_NAMES.includes(speakerName)
                    || PARTNER_NAMES.includes(speakerNameEn);
                const isLie = t.script === 'Lie' || t.script === 'lie';
                const lieEv = isLie ? (t.Parameters?.[0]?.ParameterStr || '') : '';
                const roleCls = isProtagonist ? 'protagonist' : (isPartner ? 'partner' : (isSelf ? 'self' : ''));
                return `
                    <div class="avg-line ${isCurrent ? 'current' : 'faded'} ${roleCls}">
                        <div class="avg-who">${escapeHtml(speakerName)}${action ? `<span class="avg-mood">(${escapeHtml(action)})</span>` : ''}</div>
                        <div class="avg-text">&ldquo;${escapeHtml(words)}&rdquo;</div>
                        ${isLie ? `<div class="avg-lie">&#x1f3af; 指证点 · 证据 ${escapeHtml(lieEv)}</div>` : ''}
                    </div>
                `;
            };

            let footerHtml;
            if (hasBranches) {
                let branchBtns = '';
                curNode.branches.forEach(b => {
                    branchBtns += `<button class="avg-branch-btn" onclick="DialogController.selectBranch('${b.targetId}')">${escapeHtml(b.text)}</button>`;
                });
                footerHtml = `<div class="avg-branches">${branchBtns}</div>`;
            } else {
                const hintText = isEnd ? '对白结束' : '点击 / 空格 继续 ▸';
                footerHtml = `
                    <div class="avg-footer">
                        <span class="avg-progress mono">${index + 1} / ${total}<span class="avg-sep">·</span>Talk #${escapeHtml(String(curTalk.id || '?'))}</span>
                        <span class="avg-hint mono">${hintText}</span>
                    </div>
                `;
            }

            const controlsHtml = `
                <div class="avg-controls">
                    <button class="avg-pill" onclick="DialogController.replay()" ${canPrev ? '' : 'disabled'}>&#x21bb; 重播本段</button>
                    <button class="avg-pill" onclick="DialogController.prev()" ${canPrev ? '' : 'disabled'}>&larr; 上一句</button>
                    ${!isEnd && !hasBranches ? '<button class="avg-pill on" onclick="DialogController.next()">下一句 &rarr;</button>' : ''}
                    ${isEnd ? '<button class="avg-pill on" onclick="DialogController.close()">关闭</button>' : ''}
                </div>
            `;

            const existing = stage.querySelector('.avg-stream');
            const alreadyRendered = existing ? existing.children.length : 0;
            // 可 append：stream 已存在 + 链还是同一条 + 至少有 1 条新行要追加(alreadyRendered ≤ index)
            // 严格 ≤ index(不是 ≤ index+1)：避免同 index 二次渲染把 .current 误改为 .faded 又没新行接上
            const sameChain = existing && stage._avgRenderedChain === chain;
            const canAppend = existing && sameChain && alreadyRendered > 0 && alreadyRendered <= index;

            if (canAppend) {
                // 1) 上次的 .current → .faded
                const prevCurrent = existing.querySelector('.avg-line.current');
                if (prevCurrent) {
                    prevCurrent.classList.remove('current');
                    prevCurrent.classList.add('faded');
                }
                // 2) 追加 [alreadyRendered..index] 的新行(通常 1 行)
                let newHtml = '';
                for (let i = alreadyRendered; i <= index; i++) newHtml += buildLineHtml(i);
                if (newHtml) existing.insertAdjacentHTML('beforeend', newHtml);

                // 3) 只替换 footer，不动 stream
                const outer = stage.querySelector('.avg-stage');
                if (outer) {
                    const oldFooter = outer.querySelector('.avg-footer, .avg-branches');
                    if (oldFooter) oldFooter.outerHTML = footerHtml;
                    else outer.insertAdjacentHTML('beforeend', footerHtml);
                    outer.classList.toggle('done', isEnd);
                    if (!isEnd && !hasBranches) outer.setAttribute('onclick', 'DialogController.next()');
                    else outer.removeAttribute('onclick');
                }
                // 4) 替换 controls
                const oldControls = stage.querySelector('.avg-controls');
                if (oldControls) oldControls.outerHTML = controlsHtml;
                else stage.insertAdjacentHTML('beforeend', controlsHtml);

                // 5) 只在确实追加了新行时 scroll 到底；其它情况 scrollTop 保持
                if (newHtml) {
                    existing.scrollTop = existing.scrollHeight;
                    // 新 current 行启动打字机
                    const newCurrent = existing.querySelector('.avg-line.current .avg-text');
                    if (newCurrent) this._startTypewriter(newCurrent);
                }
                return;
            }

            // 全量重建（首次开播 / replay / prev / branch 切换）
            this._stopTypewriter();
            let linesHtml = '';
            for (let i = 0; i <= index; i++) linesHtml += buildLineHtml(i);

            const clickHandler = (!hasBranches && !isEnd) ? 'onclick="DialogController.next()"' : '';
            stage.innerHTML = `
                <div class="avg-stage${isEnd ? ' done' : ''}" ${clickHandler} tabindex="0">
                    <div class="avg-stream">${linesHtml}</div>
                    ${footerHtml}
                </div>
                ${controlsHtml}
            `;
            // 标记这次渲染对应的 chain 引用；后续 _renderStream 会比对，不一致则强制重建
            stage._avgRenderedChain = chain;
            const stream = stage.querySelector('.avg-stream');
            if (stream) stream.scrollTop = stream.scrollHeight;
            // 当前句启动打字机(全量重建/首次开播/replay/prev 场景)
            const curText = stage.querySelector('.avg-line.current .avg-text');
            if (curText) this._startTypewriter(curText);
        },

        // 打字机效果 —— 按字符逐一揭露当前行，22ms/char，末尾带闪烁光标
        _startTypewriter(textEl) {
            if (!textEl) return;
            this._stopTypewriter();
            const full = textEl.textContent;
            textEl.dataset.full = full;
            textEl.textContent = '';
            textEl.classList.add('typing');
            this._state.typing = true;
            this._state.typeEl = textEl;
            let i = 0;
            this._state.typeInterval = setInterval(() => {
                i++;
                textEl.textContent = full.slice(0, i);
                if (i >= full.length) {
                    clearInterval(this._state.typeInterval);
                    this._state.typeInterval = null;
                    this._state.typing = false;
                    textEl.classList.remove('typing');
                }
            }, 22);
        },

        // 立即填完当前在打的行(点击 / 空格可跳过打字)
        _completeTypewriter() {
            if (!this._state.typeInterval) return;
            clearInterval(this._state.typeInterval);
            this._state.typeInterval = null;
            this._state.typing = false;
            const el = this._state.typeEl;
            if (el && el.dataset.full != null) {
                el.textContent = el.dataset.full;
                el.classList.remove('typing');
            }
            this._state.typeEl = null;
        },

        // 彻底停掉(切链/close 用)
        _stopTypewriter() {
            if (this._state.typeInterval) {
                clearInterval(this._state.typeInterval);
                this._state.typeInterval = null;
            }
            this._state.typing = false;
            this._state.typeEl = null;
        },

        replay() {
            this._state.index = 0;
            this._state.history = [];
            this._render();
        },

        next() {
            // 还在打字时：第一次 click/next 先跳完当前句；第二次才真推进
            if (this._state.typing) {
                this._completeTypewriter();
                return;
            }
            const { chain, index } = this._state;
            if (index < chain.length - 1) {
                this._state.index++;
                this._render();
            }
        },

        prev() {
            if (this._state.index > 0) {
                this._state.index--;
                this._render();
            } else if (this._state.history.length > 0) {
                const prev = this._state.history.pop();
                this._state.chain = prev.chain;
                this._state.index = prev.index;
                this._render();
            }
        },

        selectBranch(targetId) {
            this._state.history.push({
                chain: this._state.chain,
                index: this._state.index
            });
            this._state.chain = DataManager.buildDialogueChain(targetId);
            this._state.index = 0;

            if (this._state.chain.length === 0) {
                UI.updateStatus('分支无后续对话');
                this.close();
                return;
            }
            this._render();
        },

        close() {
            this._stopTypewriter();
            const cid = this._state.containerId;
            if (cid) {
                const stage = document.getElementById(cid);
                if (stage) stage.innerHTML = '';
                // fallback 容器用完就删，保持 #content 干净；drawer 容器(#npcDrawerDialog)由 drawer 自己管理
                if (cid === 'dlg-fallback-container') {
                    const fb = document.getElementById(cid);
                    if (fb && fb.parentElement) fb.remove();
                }
                this._state.containerId = null;
            }
        }
    };

    // ===== Game Controller =====
    const GameController = {
        async load() {
            const unit = document.getElementById('unitSelect').value;
            const loop = document.getElementById('loopSelect').value;

            AppState.currentUnit = unit;
            AppState.currentLoop = loop;
            AppState.reset();

            UI.updateStatus('加载中...');

            try {
                // 检测是否为 file:// 协议
                if (location.protocol === 'file:') {
                    const msg = '当前使用 file:// 协议打开，浏览器会阻止加载本地文件。\n\n' +
                        '请用以下任一方式启动本地服务器：\n' +
                        '1. VS Code 安装 Live Server 插件，右键 index.html → Open with Live Server\n' +
                        '2. 命令行进入 preview_new2 目录，运行: python -m http.server 8080\n' +
                        '   然后访问 http://localhost:8080\n\n' +
                        '尝试继续加载...';
                    console.warn(msg);
                    UI.updateStatus('警告: file:// 协议可能导致加载失败，建议使用本地服务器');
                }

                console.log('Loading table data from:', Config.paths.tableData);
                await DataLoader.loadTableData();
                console.log('Table data loaded successfully');

                console.log('Loading loop config:', unit, loop);
                await Promise.all([
                    DataLoader.loadLoopConfig(unit, loop),
                    DataLoader.loadChapterConfig(),
                    DataLoader.loadTalkSummaries(unit),
                    DataLoader.loadStoryOverview(unit)
                ]);
                console.log('Loop config loaded:', AppState.loopData ? 'OK' : 'not found');

                // 加载 AVG Talk + Expose 数据（替代 Talk.json）
                console.log('Loading AVG Talk data:', loop);
                const talkCount = await DataLoader.loadAVGTalks(loop);
                const exposeCount = await DataLoader.loadAVGExpose(loop);
                console.log(`AVG data loaded: ${talkCount} talks, ${exposeCount} expose entries`);

                const chapter = DataManager.chapter(unit);
                const chapterItems = DataManager.itemsByChapter(chapter);
                const loopScenes = DataManager.scenesForLoop(unit, loop);
                const hasArt = chapterItems.filter(i => i.ArtRequirement).length;

                UI.updateStatus(
                    `${unit} ${loop} | ` +
                    `证据: ${chapterItems.length} (美术需求: ${hasArt}/${chapterItems.length}) | ` +
                    `场景: ${loopScenes.length} | ` +
                    `对话: ${talkCount} + 指证: ${exposeCount}`
                );

                this.switchView(AppState.currentView);
            } catch (e) {
                console.error('Load failed:', e);
                const errMsg = `加载失败: ${e.message}`;
                UI.updateStatus(errMsg);
                document.getElementById('content').innerHTML = `
                    <div style="color:var(--warning); padding:2rem; max-width:600px;">
                        <h3 style="margin-bottom:1rem;">加载失败</h3>
                        <p><strong>错误：</strong>${escapeHtml(e.message)}</p>
                        <p style="margin-top:1rem; color:var(--text-secondary);">
                            如果是网络错误 (Failed to fetch)，通常是因为用 file:// 协议直接打开了 HTML 文件。<br><br>
                            <strong>解决方法：</strong><br>
                            1. VS Code 安装 <strong>Live Server</strong> 插件 → 右键 index.html → Open with Live Server<br>
                            2. 或在 preview_new2 目录运行: <code style="background:var(--card);padding:0.2rem 0.4rem;border-radius:3px;">python -m http.server 8080</code><br>
                            然后访问 <code style="background:var(--card);padding:0.2rem 0.4rem;border-radius:3px;">http://localhost:8080</code>
                        </p>
                        <p style="margin-top:1rem; color:var(--text-muted);">
                            数据路径: ${escapeHtml(Config.paths.tableData)}<br>
                            当前协议: ${location.protocol}
                        </p>
                    </div>
                `;
            }
        },

        switchView(view) {
            AppState.currentView = view;

            document.getElementById('btnArt').classList.toggle('active', view === 'art');
            document.getElementById('btnFlow').classList.toggle('active', view === 'flow');

            // 美术需求总览不需要 Loops 按钮（按 Unit 维度展示，不按 Loop 切换）
            const hideLoops = (view === 'art');
            const sideHead = document.querySelector('.sidebar > .side-head');
            const loopRow = document.querySelector('.sidebar > .loop-row');
            const loopCurrent = document.querySelector('.sidebar > .loop-current');
            if (sideHead) sideHead.style.display = hideLoops ? 'none' : '';
            if (loopRow) loopRow.style.display = hideLoops ? 'none' : '';
            if (loopCurrent) loopCurrent.style.display = hideLoops ? 'none' : '';

            if (view === 'art') {
                ArtOverviewView.render();
            } else {
                if (AppState.loopData?.opening) {
                    FlowView.showPhase('opening');
                } else {
                    document.getElementById('content').innerHTML =
                        '<p style="color:var(--text-muted); text-align:center; margin-top:20vh;">该循环暂无场景数据</p>';
                    UI.renderSidebar();
                }
            }

            UI.renderSidebar();
            if (typeof DoubtView !== 'undefined') DoubtView.refreshEntry();
        }
    };

    // ===== Init =====
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('btnArt').classList.add('active');
        // initial loop chip sync (shows loop1 active by default)
        if (typeof syncLoopChips === 'function') syncLoopChips();
        // 初始默认为美术需求总览视图 → 隐藏 Loops 按钮区
        const sideHead = document.querySelector('.sidebar > .side-head');
        const loopRow = document.querySelector('.sidebar > .loop-row');
        const loopCurrent = document.querySelector('.sidebar > .loop-current');
        if (sideHead) sideHead.style.display = 'none';
        if (loopRow) loopRow.style.display = 'none';
        if (loopCurrent) loopCurrent.style.display = 'none';
    });
    </script>
