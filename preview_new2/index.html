<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDC Preview v4.0 (New Table)</title>
    <script>
    // js-yaml: 根据环境选择路径
    (function(){
        var h = location.hostname;
        var isLocal = (h === 'localhost' || h === '127.0.0.1' || location.protocol === 'file:');
        var src = isLocal ? '/NDC_project/preview_new2/js-yaml.min.js' : '/preview_new2/js-yaml.min.js';
        document.write('<scr'+'ipt src="'+src+'"><\/scr'+'ipt>');
    })();
    </script>
    <style>
        /* ===== CSS Variables ===== */
        :root {
            --primary: #0a0a0a;
            --secondary: #1a1a1a;
            --card: #2a1515;
            --accent: #b84040;
            --highlight: #e8c678;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --text-muted: #888888;
            --success: #4a7c59;
            --warning: #c41e3a;
            --border: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--primary);
            color: var(--text-primary);
            line-height: 1.6;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ===== Header ===== */
        .header {
            background: var(--secondary);
            padding: 0.75rem 1.5rem;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 1.25rem;
            color: var(--highlight);
            font-weight: 600;
        }

        .header-controls {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        select, .btn {
            background: var(--card);
            color: var(--text-primary);
            border: 1px solid var(--accent);
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn { background: var(--accent); border: none; }
        .btn:hover { background: #d44; }
        .btn.active { background: var(--highlight); color: #000; }

        /* ===== Main Layout ===== */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ===== Sidebar ===== */
        .sidebar {
            width: 240px;
            background: var(--secondary);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 0.5rem 0;
            flex-shrink: 0;
        }

        .sidebar-section {
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            color: var(--highlight);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }

        .sidebar-item {
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.15s;
            font-size: 0.85rem;
        }

        .sidebar-item:hover { background: rgba(184, 64, 64, 0.1); }
        .sidebar-item.active {
            background: rgba(184, 64, 64, 0.2);
            border-left-color: var(--accent);
        }

        .badge {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 0 0.4rem;
            border-radius: 8px;
            font-size: 0.7rem;
            margin-left: 0.3rem;
        }
        .badge.npc { background: var(--success); }

        /* ===== Content ===== */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        /* ===== Evidence Table ===== */
        .evidence-table {
            width: 100%;
            border-collapse: collapse;
        }

        .evidence-table th {
            background: var(--secondary);
            padding: 0.6rem 0.8rem;
            text-align: left;
            border-bottom: 2px solid var(--accent);
            font-size: 0.8rem;
            color: var(--highlight);
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .evidence-table td {
            padding: 0.5rem 0.8rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            vertical-align: top;
        }

        .evidence-table tr:hover { background: rgba(184, 64, 64, 0.1); }

        .evidence-table .art-req { color: var(--highlight); font-weight: 500; }
        .evidence-table .art-req.empty { color: var(--warning); font-style: italic; }

        .id-col { width: 60px; color: var(--text-muted); }
        .type-col { width: 80px; }
        .name-col { width: 160px; font-weight: 500; }
        .location-col { width: 150px; color: var(--text-secondary); }
        .desc-col { max-width: 300px; }

        /* ===== Filter Bar ===== */
        .filter-bar {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 1rem;
            padding: 0.5rem 0.75rem;
            background: var(--secondary);
            border-radius: 4px;
            flex-wrap: wrap;
        }

        .filter-bar label { color: var(--text-muted); font-size: 0.85rem; }

        .filter-bar input {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.85rem;
            width: 200px;
        }

        .stats {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-left: auto;
        }
        .stats .has-art { color: var(--success); }
        .stats .no-art { color: var(--warning); }

        /* ===== Art Tab Bar ===== */
        .art-tab-bar {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--border);
            margin-bottom: 0;
            background: var(--secondary);
            padding: 0 1rem;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .art-tab {
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: color 0.2s, border-color 0.2s;
        }
        .art-tab:hover { color: var(--text-primary); }
        .art-tab.active {
            color: var(--highlight);
            border-bottom-color: var(--highlight);
            font-weight: 600;
        }
        .art-tab .tab-badge {
            display: inline-block;
            background: var(--warning);
            color: white;
            padding: 0 0.4rem;
            border-radius: 8px;
            font-size: 0.7rem;
            margin-left: 0.4rem;
            vertical-align: middle;
        }
        .art-tab .tab-badge.done {
            background: var(--success);
        }

        /* ===== Scene View ===== */
        .scene-title {
            font-size: 1.2rem;
            color: var(--highlight);
            margin-bottom: 0.5rem;
        }

        .scene-container {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            background: #000;
            min-height: 320px;
        }

        .scene-container .scene-bg {
            width: 100%;
            display: block;
            max-height: 400px;
            object-fit: cover;
        }

        .npc-on-scene {
            position: absolute;
            transform: translate(-50%, -80%);
            cursor: pointer;
            transition: filter 0.15s;
        }

        .npc-on-scene img {
            height: 120px;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.8));
        }

        .npc-on-scene:hover img { filter: drop-shadow(0 2px 8px rgba(184,64,64,0.6)) brightness(1.1); }

        .npc-on-scene .npc-label {
            text-align: center;
            font-size: 0.7rem;
            color: var(--highlight);
            text-shadow: 0 1px 3px #000;
            margin-top: 0.15rem;
        }

        .scene-bg {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
        }

        .section-title {
            font-size: 1rem;
            color: var(--highlight);
            margin: 1.25rem 0 0.5rem;
            padding-bottom: 0.3rem;
            border-bottom: 1px solid var(--border);
        }

        /* ===== Evidence Cards ===== */
        .evidence-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.75rem;
        }

        .evidence-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.75rem;
            cursor: pointer;
            transition: all 0.15s;
        }

        .evidence-card:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .ev-name { font-weight: 600; margin-bottom: 0.3rem; }
        .ev-id { color: var(--text-muted); font-size: 0.75rem; }

        .ev-type {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 0 0.4rem;
            border-radius: 4px;
            font-size: 0.7rem;
        }
        .ev-type.type-clue { background: #c0392b; }
        .ev-type.type-item { background: #2980b9; }
        .ev-type.type-envir { background: #7f8c8d; }
        .ev-type.type-note { background: #8e44ad; }

        .ev-desc {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 0.3rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .ev-art {
            font-size: 0.8rem;
            margin-top: 0.3rem;
            padding-top: 0.3rem;
            border-top: 1px solid var(--border);
        }
        .ev-art.filled { color: var(--highlight); }
        .ev-art.empty { color: var(--warning); }

        /* ===== NPC Cards ===== */
        .npc-card {
            background: var(--card);
            border: 1px solid var(--success);
            border-radius: 6px;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .npc-name { font-weight: 600; color: var(--success); }

        .npc-dialogue {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 0.3rem;
            font-style: italic;
        }

        .npc-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
        }

        /* ===== Production Spec ===== */
        .prod-spec {
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px dashed var(--border);
            font-size: 0.8rem;
        }
        .prod-spec .spec-row {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.25rem;
            flex-wrap: wrap;
        }
        .prod-spec .spec-label {
            color: var(--text-muted);
            min-width: 5.5em;
            flex-shrink: 0;
        }
        .prod-spec .spec-summary {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 0.3rem;
            line-height: 1.4;
        }
        .copy-tag {
            font-family: monospace;
            background: var(--bg);
            padding: 2px 6px;
            border-radius: 3px;
            cursor: pointer;
            border: 1px solid var(--border);
            font-size: 0.78rem;
            color: var(--text);
        }
        .copy-tag:hover { border-color: var(--highlight); }

        /* ===== Modal ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--secondary);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 1.5rem;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 1.1rem;
            color: var(--highlight);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .modal-close {
            float: right;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
        }
        .modal-close:hover { color: var(--text-primary); }

        .modal p { margin-bottom: 0.5rem; font-size: 0.9rem; }
        .modal strong { color: var(--text-secondary); }

        .art-highlight {
            background: rgba(232, 198, 120, 0.1);
            border: 1px solid var(--highlight);
            border-radius: 4px;
            padding: 0.75rem;
            margin-top: 0.75rem;
        }

        .copy-tag {
            background: rgba(232, 198, 120, 0.15);
            color: var(--highlight);
            padding: 2px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-family: monospace;
            transition: background 0.2s;
        }
        .copy-tag:hover { background: rgba(232, 198, 120, 0.3); }
        .derive-link {
            background: rgba(100, 180, 255, 0.1);
            border-left: 3px solid rgba(100, 180, 255, 0.6);
            padding: 6px 10px;
            margin: 6px 0;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            transition: background 0.2s;
        }
        .derive-link:hover { background: rgba(100, 180, 255, 0.25); }

        .art-missing {
            background: rgba(196, 30, 58, 0.1);
            border: 1px solid var(--warning);
            border-radius: 4px;
            padding: 0.75rem;
            margin-top: 0.75rem;
            color: var(--warning);
        }

        /* ===== Expose ===== */
        .expose-round {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 0.75rem;
        }

        .round-title { color: var(--warning); font-weight: 600; margin-bottom: 0.5rem; }

        .evidence-tag {
            display: inline-block;
            background: var(--secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            margin: 0.2rem;
            font-size: 0.85rem;
        }

        /* ===== Phase Tags ===== */
        .phase-tag {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 0.3rem;
        }
        .phase-tag.opening { background: #2a4a6b; }
        .phase-tag.free { background: #2a6b3a; }
        .phase-tag.expose { background: #6b2a2a; }
        .phase-tag.ending { background: #4a2a6b; }
        .phase-tag.events { background: #b8860b; }

        .sidebar-item.locked {
            opacity: 0.6;
            cursor: default;
        }
        .sidebar-item.locked:hover { background: none; }
        .sidebar-item.closed {
            opacity: 0.35;
            cursor: default;
            text-decoration: line-through;
        }
        .sidebar-item.closed:hover { background: none; }

        /* ===== Dialog Box (one-line-at-a-time, preview_new style) ===== */
        .dialog-box {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 820px;
            background: rgba(20, 10, 10, 0.95);
            border: 2px solid var(--accent);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            display: flex;
            gap: 1rem;
            z-index: 10;
        }

        #dlg-fallback-container .dialog-box {
            position: relative;
            bottom: auto; left: auto;
            transform: none;
            width: 100%; max-width: 100%;
        }

        .dialog-box .dlg-avatar {
            flex-shrink: 0;
            width: 80px;
            height: 110px;
            border-radius: 6px;
            overflow: hidden;
            background: var(--card);
            border: 1px solid var(--accent);
        }

        .dialog-box .dlg-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
        }

        .dialog-box .dlg-body {
            flex: 1;
            min-width: 0;
        }

        .dialog-box .dlg-speaker {
            color: var(--highlight);
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.3rem;
        }

        .dialog-box .dlg-text {
            font-size: 1rem;
            line-height: 1.8;
            min-height: 40px;
            color: var(--text-primary);
        }

        .dialog-box .dlg-id {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .dialog-box .dlg-controls {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .dialog-box .dlg-branches {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .dialog-box .branch-btn {
            background: var(--card);
            border: 1px solid var(--accent);
            color: var(--text-primary);
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .dialog-box .branch-btn:hover {
            background: var(--accent);
            border-color: var(--highlight);
        }

        .dlg-close-btn {
            position: absolute;
            top: 0.3rem;
            right: 0.5rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            line-height: 1;
        }
        .dlg-close-btn:hover { color: var(--text-primary); }

        /* ===== Status Bar ===== */
        .status-bar {
            background: var(--secondary);
            padding: 0.4rem 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--primary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <div class="header-title">NDC Preview v4.0</div>
            <div class="header-controls">
                <select id="unitSelect">
                    <option value="Unit1">Unit 1 - Webb谋杀案</option>
                    <option value="Unit2">Unit 2 - 鞋坊纵火案</option>
                    <option value="Unit3">Unit 3 - Thomas坠楼案</option>
                </select>
                <select id="loopSelect">
                    <option value="loop1">Loop 1</option>
                    <option value="loop2">Loop 2</option>
                    <option value="loop3">Loop 3</option>
                    <option value="loop4">Loop 4</option>
                    <option value="loop5">Loop 5</option>
                    <option value="loop6">Loop 6</option>
                </select>
                <button class="btn" onclick="GameController.load()">加载</button>
                <span style="color:var(--border)">|</span>
                <button class="btn" id="btnArt" onclick="GameController.switchView('art')">美术需求总览</button>
                <button class="btn" id="btnFlow" onclick="GameController.switchView('flow')">流程预览</button>
                <button class="btn" onclick="UI.showStoryOverview()">故事概览</button>
            </div>
        </div>

        <!-- Main -->
        <div class="main">
            <div class="sidebar" id="sidebar"></div>
            <div class="content" id="content">
                <div style="color: var(--text-muted); text-align: center; margin-top: 40vh;">
                    选择 Unit 和 Loop，点击「加载」开始
                </div>
            </div>
        </div>

        <!-- Status -->
        <div class="status-bar" id="statusBar">就绪</div>
    </div>

    <!-- Evidence Modal -->
    <div class="modal-overlay" id="evidenceModal" onclick="if(event.target===this) UI.closeModal()">
        <div class="modal">
            <button class="modal-close" onclick="UI.closeModal()">&times;</button>
            <div class="modal-title" id="modalTitle"></div>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
    // ===== Utilities =====
    function stripPrefix(id) {
        if (id == null) return '';
        id = String(id);
        if (id.startsWith('EV')) return id.slice(2);
        if (id.startsWith('SC')) return id.slice(2);
        if (id.startsWith('NPC')) return id.slice(3);
        return id;
    }

    function cn(field) {
        if (Array.isArray(field)) return field[0] || '';
        return field || '';
    }

    function truncate(str, len) {
        str = str || '';
        return str.length > len ? str.slice(0, len) + '...' : str;
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str || '';
        return div.innerHTML;
    }

    function escapeHtmlWithBr(str) {
        return escapeHtml(str).replace(/\n/g, '<br>');
    }

    function copyText(text, el) {
        navigator.clipboard.writeText(text).then(() => {
            const orig = el.textContent;
            el.textContent = '已复制!';
            el.style.background = 'rgba(80,200,120,0.3)';
            setTimeout(() => { el.textContent = orig; el.style.background = ''; }, 800);
        });
    }

    // ===== Configuration =====
    const Config = {
        // 自动检测：localhost/127.0.0.1 = local，否则 = deploy
        get mode() {
            const h = location.hostname;
            return (h === 'localhost' || h === '127.0.0.1' || location.protocol === 'file:') ? 'local' : 'deploy';
        },
        get paths() {
            if (this.mode === 'deploy') {
                // Vercel: 从 NDC_project/ 部署, rewrite / → /preview_new2/index.html
                return {
                    tableData: '/preview_new2/data/table',
                    loopConfig: '/preview_new2/data',
                    assets: '/Assets/Resources',
                    avgData: '/AVG'
                };
            }
            // 本地: 从 D:\ 启动 server, 访问 /NDC_project/preview_new2/index.html
            return {
                tableData: '/NDC_project/preview_new2/data/table',
                loopConfig: '/NDC_project/preview_new2/data',
                assets: '/NDC/Assets/Resources',
                avgData: '/NDC_project/AVG'
            };
        },
        getAssetUrl(configPath) {
            if (!configPath) return '';
            return `${this.paths.assets}/${configPath.replace(/\\/g, '/')}.png`;
        }
    };

    // ===== App State =====
    const AppState = {
        currentUnit: 'Unit1',
        currentLoop: 'loop1',
        currentView: 'flow',

        allItems: [],
        allScenes: [],
        allNPCs: [],
        allTalks: [],

        itemsMap: new Map(),
        scenesMap: new Map(),
        npcsMap: new Map(),
        talksMap: new Map(),

    // ===== Data Loader =====
    const DataLoader = {
        async loadJSON(path) {
            const resp = await fetch(path);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${path}`);
            const text = await resp.text();
            return JSON.parse(this.fixJson(text));
        },

        // 状态机修复游戏导出的非标准 JSON：
        // 1. 字符串内字面换行符 → 空格  (Describe 字段跨行)
        // 2. 未转义反斜杠 → \\          (Art\Scene 路径)
        // 3. 字符串内裸双引号 → \"       (中文引号用了ASCII双引号)
        fixJson(text) {
            let out = '';
            let inStr = false;
            for (let i = 0; i < text.length; i++) {
                const c = text.charAt(i);
                if (!inStr) {
                    out += c;
                    if (c === '"') inStr = true;
                    continue;
                }
                // 以下都在字符串内部
                if (c === '\\') {
                    const nx = text.charAt(i + 1);
                    if ('"\\\/bfnrt'.includes(nx)) {
                        out += c + nx; i++;           // 合法 2 字符转义
                    } else if (nx === 'u' && /^[0-9a-fA-F]{4}$/.test(text.substring(i + 2, i + 6))) {
                        out += text.substring(i, i + 6); i += 5; // 合法 \uXXXX
                    } else {
                        out += '\\\\';                // 修正非法反斜杠
                    }
                } else if (c === '"') {
                    // 判断是字符串结束引号还是内容引号
                    // 关键：跳过空白后检查下一个非空白字符是否为 JSON 结构符
                    const nx = text.charAt(i + 1);
                    if (nx === '' || ',:]}'.includes(nx)) {
                        out += c; inStr = false;      // 明确的结束引号
                    } else if (' \t\r\n'.includes(nx)) {
                        // 引号后是空白 → 向前看跳过空白
                        let j = i + 1;
                        while (j < text.length && ' \t\r\n'.includes(text.charAt(j))) j++;
                        const after = text.charAt(j);
                        if (after === '' || ',:]}'.includes(after)) {
                            out += c; inStr = false;  // 空白后是结构符 → 结束引号
                        } else {
                            out += '\\"';             // 空白后还是内容 → 内容引号
                        }
                    } else {
                        out += '\\"';                 // 后面直接是内容字符 → 内容引号
                    }
                } else if (c === '\n') {
                    out += '\\n';                     // 字符串内换行 → 保留为 \n
                } else if (c === '\r') {
                    // 忽略 CR（\r\n 中的 \r）
                } else {
                    out += c;
                }
            }
            return out;
        },

        async loadYAML(path) {
            const resp = await fetch(`${path}?t=${Date.now()}`);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${path}`);
            return jsyaml.load(await resp.text());
        },

        async loadTableData() {
            const base = Config.paths.tableData;

            const [items, scenes, npcs] = await Promise.all([
                this.loadJSON(`${base}/ItemStaticData.json${t}`),
                this.loadJSON(`${base}/SceneConfig.json${t}`),

            ]);

            AppState.allItems = items;
            AppState.allScenes = scenes;
            AppState.allNPCs = npcs;

            AppState.itemsMap.clear();
            items.forEach(i => AppState.itemsMap.set(String(i.id), i));

            AppState.scenesMap.clear();
            scenes.forEach(s => AppState.scenesMap.set(String(s.sceneId), s));

            AppState.npcsMap.clear();
            npcs.forEach(n => AppState.npcsMap.set(String(n.id), n));

            console.log(`Table data loaded: ${items.length} items, ${scenes.length} scenes, ${npcs.length} NPCs`);
        },

        async loadLoopConfig(unit, loop) {
            try {
                const path = `${Config.paths.loopConfig}/${unit}/${loop}.yaml`;
                AppState.loopData = await this.loadYAML(path);

            } catch (e) {

                AppState.loopData = null;

            try {
                const locPath = `${Config.paths.loopConfig}/${unit}/locations.yaml`;
                AppState.locationsData = await this.loadYAML(locPath);
            } catch (e) {
                AppState.locationsData = null;

        async loadChapterConfig() {
            try {
                const base = Config.paths.tableData;
                const t = `?t=${Date.now()}`;
                const data = await this.loadJSON(`${base}/ChapterConfig.json${t}`);
                AppState.chapterConfigs = data;

            } catch (e) {
                console.warn('ChapterConfig not available:', e.message);
                AppState.chapterConfigs = [];
            }
        },

        async loadTalkSummaries(unit) {
            AppState.talkSummaries = {};
            AppState.sceneTalkSummaries = {};
            try {
                const path = `${Config.paths.loopConfig}/${unit}/talk_summary.yaml`;
                const data = await this.loadYAML(path);
                if (!data) return;
                // 分离 scene_talks 和普通摘要
                Object.entries(data).forEach(([key, val]) => {
                    if (key === 'scene_talks' && typeof val === 'object') {
                        Object.entries(val).forEach(([sceneId, summary]) => {
                            AppState.sceneTalkSummaries[String(sceneId)] = summary;
                        });
                    } else {
                        AppState.talkSummaries[String(key)] = val;
                    }
                });
                console.log(`Talk summaries loaded: ${Object.keys(AppState.talkSummaries).length} entries, ${Object.keys(AppState.sceneTalkSummaries).length} scene overrides`);
            } catch (e) {
                console.warn('Talk summaries not available:', e.message);
            }
        },

        async loadStoryOverview(unit) {
            AppState.storyOverview = {};
            try {
                const path = `${Config.paths.loopConfig}/${unit}/story_overview.yaml`;
                const data = await this.loadYAML(path);
                if (data) {
                    Object.entries(data).forEach(([k, v]) => {
                        AppState.storyOverview[k] = v;
                    });
                }
            } catch (e) { /* silent */ }
        },

        // ===== AVG Talk 加载 =====

        // 发现目录下的 .json 文件：优先读 _manifest.json，回退到 HTTP 目录列表
        async listJsonFiles(dirUrl) {
            // 1. 尝试读取 deploy 时生成的清单文件
            try {
                const resp = await fetch(`${dirUrl}_manifest.json?t=${Date.now()}`);
                if (resp.ok) {
                    const files = await resp.json();
                    if (Array.isArray(files) && files.length > 0) return files;
                }
            } catch (e) { /* 清单不存在，回退 */ }

            // 2. 回退：解析 Python HTTP server 的目录列表 HTML
            try {
                const resp = await fetch(dirUrl);
                if (!resp.ok) return [];
                const html = await resp.text();
                const matches = [...html.matchAll(/href="([^"]+\.json)"/gi)];
                return matches.map(m => m[1]).filter(f => f !== '_manifest.json');
            } catch (e) { return []; }
        },

        // AVG 扁平格式 → 内部 Talk 格式
        convertAVGTalk(entry) {
            const npcId = (entry.IdSpeaker || '').replace(/^NPC/, '');
            const npcData = AppState.npcsMap.get(npcId);
            return {
                id: String(entry.id),
                step: String(entry.step || ''),
                speakType: entry.speakType,
                waitTime: String(entry.waitTime || 0),
                Speaker: {
                    id: npcId,
                    Name: [entry.cnSpeaker || '', entry.enSpeaker || ''],
                    role: npcData?.role || '',
                    Chapter: npcData?.Chapter || '',
                    IconSmall: npcData?.IconSmall || '',
                    IconLarge: npcData?.IconLarge || ''
                },
                Words: [entry.cnWords || '', entry.enWords || ''],
                next: entry.next ? String(entry.next) : '',
                script: entry.script || '',
                Parameters: this._buildParameters(entry),
                // AVG 独有字段
                cnAction: entry.cnAction || '',
                enAction: entry.enAction || '',
                Location: entry.Location || '',
                // 视频字段
                videoEpisode: entry.videoEpisode || '',
                videoLoop: entry.videoLoop || '',
                videoScene: entry.videoScene || '',
                videoId: entry.videoId ? String(entry.videoId) : ''
            };
        },

        _buildParameters(entry) {
            const params = [];
            for (let i = 0; i < 3; i++) {
                const str = entry[`ParameterStr${i}`] || '';
                const int = entry[`ParameterInt${i}`];
                if (str || int) {
                    params.push({ ParameterStr: str, ParameterInt: String(int || 0) });
                }
            }
            return params.length > 0 ? params : [{ ParameterInt: '0' }];
        },

        // 加载指定 loop 的所有 AVG Talk 文件
        async loadAVGTalks(loop) {
            const base = Config.paths.avgData;
            const episode = DataManager.chapter(AppState.currentUnit);
            const dirUrl = `${base}/${episode}/Talk/${loop}/`;

            AppState.talksMap.clear();
            AppState.allTalks = [];
            let totalLoaded = 0;

            try {
                const files = await this.listJsonFiles(dirUrl);
                if (files.length === 0) {
                    console.warn(`No AVG Talk files found in ${dirUrl}`);
                    return 0;
                }

                const results = await Promise.all(
                    files.map(async (filename) => {
                        try {
                            const resp = await fetch(`${dirUrl}${filename}?t=${Date.now()}`);
                            if (!resp.ok) return { filename, entries: [] };
                            return { filename, entries: await resp.json() };
                        } catch (e) {
                            console.warn(`Failed to load AVG Talk: ${filename}`, e.message);
                            return { filename, entries: [] };
                        }
                    })
                );

                const sceneName = (fn) => fn.replace(/\.json$/i, '');
                results.forEach(({ filename, entries }) => {
                    const vs = sceneName(filename);
                    entries.forEach(raw => {
                        const talk = this.convertAVGTalk(raw);
                        if (!talk.videoScene) talk.videoScene = vs;
                        AppState.talksMap.set(talk.id, talk);
                        AppState.allTalks.push(talk);
                        totalLoaded++;
                    });
                });

                console.log(`AVG Talk loaded: ${totalLoaded} entries from ${files.length} files (${loop})`);
            } catch (e) {
                console.warn('AVG Talk loading failed:', e.message);
            }
            return totalLoaded;
        },

        // 加载指定 loop 的 Expose 对话文件
        async loadAVGExpose(loop) {
            const base = Config.paths.avgData;
            const episode = DataManager.chapter(AppState.currentUnit);
            const dirUrl = `${base}/${episode}/Expose/`;
            const loopNum = loop.replace('loop', '');
            let totalLoaded = 0;

            try {
                const allFiles = await this.listJsonFiles(dirUrl);
                // 筛选当前 loop 的 expose 文件 (如 loop1_rosa.json)
                const loopFiles = allFiles.filter(f => f.startsWith(`loop${loopNum}_`));

                if (loopFiles.length === 0) {
                    console.warn(`No AVG Expose files found for ${loop}`);
                    return 0;
                }

                const results = await Promise.all(
                    loopFiles.map(async (filename) => {
                        try {
                            const resp = await fetch(`${dirUrl}${filename}?t=${Date.now()}`);
                            if (!resp.ok) return { filename, entries: [] };
                            return { filename, entries: await resp.json() };
                        } catch (e) {
                            console.warn(`Failed to load AVG Expose: ${filename}`, e.message);
                            return { filename, entries: [] };
                        }
                    })
                );

                const sceneName = (fn) => fn.replace(/\.json$/i, '');
                results.forEach(({ filename, entries }) => {
                    const vs = sceneName(filename);
                    entries.forEach(raw => {
                        const talk = this.convertAVGTalk(raw);
                        if (!talk.videoScene) talk.videoScene = vs;
                        AppState.talksMap.set(talk.id, talk);
                        AppState.allTalks.push(talk);
                        totalLoaded++;

                });

                console.log(`AVG Expose loaded: ${totalLoaded} entries from ${loopFiles.length} files (${loop})`);
            } catch (e) {

    // ===== Data Manager =====
    const DataManager = {
        getItem(id) {
            return AppState.itemsMap.get(stripPrefix(id)) || null;
        },

        getScene(id) {
            return AppState.scenesMap.get(stripPrefix(id)) || null;
        },

        getNPC(id) {
            return AppState.npcsMap.get(stripPrefix(id)) || null;
        },

        itemName(item) { return cn(item?.Name); },
        itemDesc(item) { return cn(item?.Describe); },
        itemShortDesc(item) { return cn(item?.ShortDescribe); },
        itemLocation(item) { return cn(item?.location); },

        typeName(type) {
            return { '0': '装饰', '1': '线索', '2': '环境', '3': '道具', '4': '笔记', '5': '门', '6': '可交互道具', '7': '内嵌道具' }[String(type)] || type || '?';
        },
        typeClass(type) {
            return { '1': 'type-clue', '2': 'type-envir', '3': 'type-item', '4': 'type-note' }[String(type)] || '';
        },

        chapter(unit) {
            if (unit === 'Unit3') return 'EPI03';
            return unit === 'Unit2' ? 'EPI02' : 'EPI01';
        },

        itemsByChapter(chapter) {
            return AppState.allItems.filter(i => i.Chapter === chapter);
        },

        // 反查：给定原料ID，找到哪个产物的combineParameter包含它
        findCombineProduct(ingredientId) {
            const id = stripPrefix(ingredientId);
            return AppState.allItems.find(i => Array.isArray(i.combineParameter) && i.combineParameter.includes(id));
        },

        // Scene ID prefix for a given unit+loop: Unit1/loop1 -> "11", Unit2/loop3 -> "23"
        loopPrefix(unit, loop) {
            const u = unit === 'Unit3' ? '3' : (unit === 'Unit2' ? '2' : '1');
            const l = loop.replace('loop', '');
            return `${u}${l}`;
        },

        scenesForLoop(unit, loop) {
            const prefix = this.loopPrefix(unit, loop);
            return AppState.allScenes.filter(s => String(s.sceneId).startsWith(prefix));
        },

        // Get evidence items from a scene's ItemIDs (skip IDs not in ItemStaticData)
        sceneEvidence(sceneId) {
            const scene = this.getScene(sceneId);
            if (!scene?.ItemIDs) return [];
            return scene.ItemIDs.map(id => this.getItem(id)).filter(Boolean);
        },

        sceneNPCs(sceneId) {
            const scene = this.getScene(sceneId);
            return scene?.NPCInfos || [];
        },

        // Get non-evidence ItemIDs (those not found in ItemStaticData)
        sceneOtherItems(sceneId) {
            const scene = this.getScene(sceneId);
            if (!scene?.ItemIDs) return [];
            return scene.ItemIDs.filter(id => !this.getItem(id));
        },

        getTalk(id) {
            return AppState.talksMap.get(String(id)) || null;
        },

        getTalkSummary(talkId, sceneId) {
            if (sceneId && AppState.sceneTalkSummaries[String(sceneId)]) {
                return AppState.sceneTalkSummaries[String(sceneId)];
            }
            return AppState.talkSummaries[String(talkId)] || '';
        },

        getChapterConfig(unit, loop) {
            const unitNum = unit === 'Unit3' ? 3 : (unit === 'Unit2' ? 2 : 1);
            const loopNum = parseInt(loop.replace('loop', ''));
            const id = String(unitNum * 100 + loopNum);
            return AppState.chapterConfigMap.get(id) || null;
        },

        extractNpcKey(resPath) {
            if (!resPath) return '';
            const m = resPath.match(/_npc_([A-Za-z]+)\d*$/);
            return m ? m[1] : '';
        },

        // 从起始 Talk ID 遍历对话链，返回节点数组
        // 每个节点: { talk, branches: null | [{text, targetId}] }
        // 分支检测: script === "1" 且 Parameters 含 ParameterStr/ParameterInt
        buildDialogueChain(startId) {
            const chain = [];
            const visited = new Set();
            let currentId = String(startId);

            while (currentId && !visited.has(currentId)) {
                visited.add(currentId);
                const talk = this.getTalk(currentId);
                if (!talk) break;

                const node = { talk, branches: null };

                // 检测分支: script "1" 或 "branches" + Parameters 含 ParameterStr/ParameterInt
                if ((talk.script === '1' || talk.script === 'branches') && talk.Parameters && talk.Parameters.length > 0) {
                    const branchParams = talk.Parameters.filter(p => p.ParameterStr && p.ParameterInt);
                    if (branchParams.length > 0) {
                        node.branches = branchParams.map(p => ({
                            text: p.ParameterStr,
                            targetId: String(p.ParameterInt)
                        }));
                        chain.push(node);
                        break; // 分支处停止主链
                    }
                }

                if (!talk.next) {
                    // Lie (指证) entries: auto-follow ParameterInt0 jump target
                    const isLie = talk.script === 'Lie' || talk.script === 'lie';
                    const lieTarget = talk.Parameters?.[0]?.ParameterInt;
                    if (isLie && lieTarget && lieTarget !== '0') {
                        chain.push(node);
                        currentId = lieTarget;
                        continue;
                    }
                    // 无 next → 对话结束
                    chain.push(node);
                    break;
                }

                const nextStr = String(talk.next);
                if (nextStr.includes('/')) {
                    // 旧格式分支: next = "id1/id2/id3"
                    const branchIds = nextStr.split('/');
                    const params = talk.Parameters || [];
                    node.branches = branchIds.map((bid, i) => ({
                        text: params[i]?.ParameterStr || `选项 ${i + 1}`,
                        targetId: bid.trim()
                    }));
                    chain.push(node);
                    break;
                }

                chain.push(node);
                currentId = nextStr;
            }
            return chain;
        }
    };

    // ===== UI =====
    const UI = {
        updateStatus(text) {
            document.getElementById('statusBar').textContent = text;
        },

        _modalHistory: [],

        showStoryOverview() {
            const loop = AppState.currentLoop;
            const text = AppState.storyOverview[loop];
            const titleEl = document.getElementById('modalTitle');
            const contentEl = document.getElementById('modalContent');
            this._modalHistory = [];
            if (titleEl) delete titleEl.dataset.itemId;
            if (!text) {
                titleEl.textContent = '故事概览';
                contentEl.innerHTML = '<p style="color:var(--text-muted)">当前循环暂无故事概览数据</p>';
                document.getElementById('evidenceModal').classList.add('active');
                return;
            }
            titleEl.textContent = '故事概览 — ' + (loop || '').replace('loop', 'Loop ');
            const html = text.trim().split('\n').map(line => {
                line = line.trim();
                if (!line) return '<br>';
                if (line.startsWith('【'))
                    return `<p style="color:var(--highlight);font-weight:600;margin-top:1rem;font-size:1.05rem;">${line}</p>`;
                return `<p style="margin:0.3rem 0;line-height:1.8;color:var(--text-secondary);">${line}</p>`;
            }).join('');
            contentEl.innerHTML = html;
            document.querySelector('#evidenceModal .modal').style.maxWidth = '800px';
            document.getElementById('evidenceModal').classList.add('active');
        },

        closeModal() {
            document.getElementById('evidenceModal').classList.remove('active');
            document.querySelector('#evidenceModal .modal').style.maxWidth = '';
            this._modalHistory = [];
            const titleEl = document.getElementById('modalTitle');
            if (titleEl) delete titleEl.dataset.itemId;
        },

        modalBack() {
            if (this._modalHistory.length > 0) {
                const prevId = this._modalHistory.pop();
                this._showEvidenceModalInner(prevId, false);
            }
        },

        showEvidenceModal(id) {
            this._showEvidenceModalInner(id, true);
        },

        _showEvidenceModalInner(id, pushHistory) {
            const item = DataManager.getItem(id);
            if (!item) return;

            // 记录历史（只在正向导航时 push）
            const currentId = document.getElementById('modalTitle')?.dataset?.itemId;
            if (pushHistory && currentId) {
                this._modalHistory.push(currentId);
            }

            const name = DataManager.itemName(item);
            const desc = DataManager.itemDesc(item);
            const shortDesc = DataManager.itemShortDesc(item);
            const location = DataManager.itemLocation(item);
            const typeName = DataManager.typeName(item.itemType);

            const titleEl = document.getElementById('modalTitle');
            titleEl.textContent = `${name} (ID: ${item.id})`;
            titleEl.dataset.itemId = String(item.id);

            let html = `
                <p><strong>类型：</strong>${escapeHtml(typeName)}</p>
                <p><strong>位置：</strong>${escapeHtml(location)}</p>
                <p><strong>章节：</strong>${escapeHtml(item.Chapter)}</p>
                <p><strong>详情描述：</strong>${escapeHtml(desc)}</p>
                ${shortDesc ? `<p><strong>简述：</strong>${escapeHtml(shortDesc)}</p>` : ''}
                ${item.canAnalyzed === 'true' ? (() => {
                    const target = DataManager.getItem(item.analysedEvidence);
                    const tName = target ? DataManager.itemName(target) : '?';
                    return `<p class="derive-link" onclick="UI.showEvidenceModal('${item.analysedEvidence}')"><strong>🔍 查看分析后 →</strong> ${escapeHtml(tName)} (ID: ${item.analysedEvidence})</p>`;
                })() : ''}
                ${item.canCombined === 'true' ? (() => {
                    const product = DataManager.findCombineProduct(item.id);
                    if (!product) return '<p style="color:var(--warning)">可合成，但未找到对应产物</p>';
                    const pName = DataManager.itemName(product);
                    const ingredients = (product.combineParameter || []).map(pid => { const p = DataManager.getItem(pid); return p ? `${DataManager.itemName(p)}(${pid})` : pid; });
                    return `<p class="derive-link" onclick="UI.showEvidenceModal('${product.id}')"><strong>🔗 查看合成后 →</strong> ${escapeHtml(pName)} (ID: ${product.id})<br><span style="color:var(--text-dim);margin-left:2em;">合成原料：${escapeHtml(ingredients.join(' + '))}</span></p>`;
                })() : ''}
                ${Array.isArray(item.combineParameter) && item.combineParameter.length ? (() => {
                    const parts = item.combineParameter.map(pid => {
                        const p = DataManager.getItem(pid);
                        const name = p ? DataManager.itemName(p) : '?';
                        return `<span class="copy-tag" onclick="event.stopPropagation();UI.showEvidenceModal('${pid}')" style="cursor:pointer">${escapeHtml(name)}(${pid})</span>`;
                    });
                    return `<p class="derive-link"><strong>🧩 合成原料：</strong>${parts.join(' + ')}</p>`;
                })() : ''}
                ${item.folderPath ? `<p><strong>文件夹：</strong>${escapeHtml(item.folderPath)}</p>` : ''}
                ${item.desSpritePath ? `<p><strong>详情图：</strong><span class="copy-tag" onclick="copyText('${escapeHtml(item.desSpritePath)}', this)">${escapeHtml(item.desSpritePath)}</span></p>` : '<p><strong>详情图：</strong><span style="color:var(--warning)">未配置</span></p>'}
                ${item.mapSpritePath ? `<p><strong>地图图：</strong><span class="copy-tag" onclick="copyText('${escapeHtml(item.mapSpritePath)}', this)">${escapeHtml(item.mapSpritePath)}</span></p>` : '<p><strong>地图图：</strong><span style="color:var(--warning)">未配置</span></p>'}
                ${item.iconPath ? `<p><strong>Icon：</strong><span class="copy-tag" onclick="copyText('${escapeHtml(item.iconPath)}', this)">${escapeHtml(item.iconPath)}</span></p>` : '<p><strong>Icon：</strong><span style="color:var(--warning)">未配置</span></p>'}
            `;

            if (item.ArtRequirement) {
                html += `
                    <div class="art-highlight">
                        <strong style="color: var(--highlight);">[ART] 美术需求：</strong><br>
                        ${escapeHtmlWithBr(item.ArtRequirement)}
                    </div>
                `;
            } else {
                html += `<div class="art-missing"><strong>[!] 未填写美术需求</strong></div>`;
            }

            // 有历史时显示返回按钮
            if (this._modalHistory.length > 0) {
                html = `<button class="btn" onclick="UI.modalBack()" style="margin-bottom:0.75rem;font-size:0.9rem;padding:0.3rem 0.8rem;background:var(--surface);border:1px solid var(--border);color:var(--text);cursor:pointer;border-radius:4px;">← 返回上一个</button>` + html;
            }

            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('evidenceModal').classList.add('active');
        },

        renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (AppState.currentView === 'art') {
                this.renderArtSidebar(sidebar);
            } else {
                this.renderFlowSidebar(sidebar);
            }
        },

        renderArtSidebar(sidebar) {
            const chapter = DataManager.chapter(AppState.currentUnit);
            const tab = ArtOverviewView.currentTab;
            let html = '';

            if (tab === 'evidence') {
                const items = DataManager.itemsByChapter(chapter);
                const hasArt = items.filter(i => i.ArtRequirement).length;
                const noArt = items.length - hasArt;
                const byLocation = {};
                items.forEach(i => {
                    const loc = DataManager.itemLocation(i) || '未知位置';
                    if (!byLocation[loc]) byLocation[loc] = [];
                    byLocation[loc].push(i);
                });

                html += `
                    <div class="sidebar-section">证据统计 (${chapter})</div>
                    <div style="padding: 0.5rem 1rem; font-size: 0.85rem;">
                        <div>总计: <strong>${items.length}</strong> 个证据</div>
                        <div style="color: var(--success);">已填美术需求: ${hasArt}</div>
                        <div style="color: var(--warning);">未填美术需求: ${noArt}</div>
                    </div>
                    <div class="sidebar-section">按位置分组</div>
                `;
                for (const loc of Object.keys(byLocation)) {
                    const count = byLocation[loc].length;
                    const artCount = byLocation[loc].filter(i => i.ArtRequirement).length;
                    html += `
                        <div class="sidebar-item" onclick="ArtOverviewView.filterByLocation('${loc.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
                            ${escapeHtml(loc)} <span class="badge">${count}</span>
                            ${artCount < count ? `<span class="badge" style="background:var(--warning)">${count - artCount}</span>` : ''}
                        </div>
                    `;
                }
            } else if (tab === 'npc') {
                const npcs = AppState.allNPCs.filter(n => n.Chapter === chapter);
                const hasArt = npcs.filter(n => n.ArtRequirement).length;
                html += `
                    <div class="sidebar-section">人物统计 (${chapter})</div>
                    <div style="padding: 0.5rem 1rem; font-size: 0.85rem;">
                        <div>总计: <strong>${npcs.length}</strong> 个人物</div>
                        <div style="color: var(--success);">已填美术需求: ${hasArt}</div>
                        <div style="color: var(--warning);">未填美术需求: ${npcs.length - hasArt}</div>
                    </div>
                `;
            } else if (tab === 'scene') {
                const chPrefix = chapter === 'EPI01' ? '1' : chapter === 'EPI02' ? '2' : '3';
                const rawScenes = AppState.allScenes.filter(s => s.sceneId && String(s.sceneId).startsWith(chPrefix));
                const merged = ArtOverviewView._mergeScenes(rawScenes);
                const hasArt = merged.filter(m => m.ArtRequirement).length;
                let totalNpcs = 0, npcWithArt = 0;
                merged.forEach(m => {
                    m.npcMap.forEach(entry => {
                        totalNpcs++;
                        if (entry.ArtRequirement) npcWithArt++;
                    });
                });
                html += `
                    <div class="sidebar-section">场景统计 (${chapter})</div>
                    <div style="padding: 0.5rem 1rem; font-size: 0.85rem;">
                        <div>物理场景: <strong>${merged.length}</strong> 个</div>
                        <div style="color: var(--success);">场景背景已填: ${hasArt}</div>
                        <div style="color: var(--warning);">场景背景未填: ${merged.length - hasArt}</div>
                        <div style="margin-top:0.3rem;">场景内NPC: <strong>${totalNpcs}</strong> 个</div>
                        <div style="color: var(--success);">立绘需求已填: ${npcWithArt}</div>
                        <div style="color: var(--warning);">立绘需求未填: ${totalNpcs - npcWithArt}</div>
                    </div>
                `;
            }

            sidebar.innerHTML = html;
        },

        renderFlowSidebar(sidebar) {
            const loop = AppState.loopData;
            let html = '';

            if (!loop) {
                html = `<div class="sidebar-section">无循环数据</div>`;
                sidebar.innerHTML = html;
                return;
            }

            // Loop title, time & target
            html += `<div class="sidebar-section">${escapeHtml(loop.title || AppState.currentLoop)}</div>`;
            if (loop.time) {
                html += `<div style="padding: 0.15rem 1rem; font-size: 0.75rem; color: var(--highlight);">${escapeHtml(loop.time)}</div>`;
            }
            if (loop.target) {
                html += `<div style="padding: 0.3rem 1rem; font-size: 0.8rem; color: var(--text-muted);">${escapeHtml(loop.target)}</div>`;
            }

            // Opening
            if (loop.opening && loop.opening.length > 0) {
                html += `
                    <div class="sidebar-item ${AppState.currentPhase === 'opening' ? 'active' : ''}"
                         onclick="FlowView.showPhase('opening')">
                        <span class="phase-tag opening">开篇</span> (${loop.opening.length}场景)
                    </div>
                `;
            }

            // Scene list: support both old free_phase and new scenes{unlocked,locked,closed}
            if (loop.scenes) {
                const unlocked = loop.scenes.unlocked || [];
                const locked = loop.scenes.locked || [];
                const closed = loop.scenes.closed || [];
                const locations = AppState.locationsData?.locations;

                // Helper: extract location code (last 2 digits) from scene ID
                const locCode = (sid) => String(sid).slice(-2);
                const padCode = (n) => String(n).padStart(2, '0');

                // Helper: find location group for a scene ID
                const findLocation = (sid) => {
                    if (!locations) return null;
                    const code = locCode(sid);
                    return locations.find(loc =>
                        padCode(loc.entry) === code ||
                        (loc.children || []).map(c => padCode(c)).includes(code)
                    );
                };

                // Helper: group items by location, preserving order
                const groupByLocation = (items, getId) => {
                    const groups = new Map(); // locName → items[]
                    const noGroup = [];
                    items.forEach(item => {
                        const sid = getId(item);
                        const loc = findLocation(sid);
                        if (loc) {
                            if (!groups.has(loc.name)) groups.set(loc.name, []);
                            groups.get(loc.name).push(item);
                        } else {
                            noGroup.push(item);
                        }
                    });
                    return { groups, noGroup };
                };

                // Render unlocked scenes grouped by location
                if (unlocked.length > 0) {
                    html += `<div class="sidebar-section">解锁 (${unlocked.length})</div>`;
                    const { groups, noGroup } = groupByLocation(unlocked, id => String(id));

                    for (const [locName, sceneIds] of groups) {
                        html += `<div style="padding:0.3rem 1rem 0.1rem; font-size:0.75rem; color:var(--highlight); font-weight:600;">${escapeHtml(locName)}</div>`;
                        sceneIds.forEach(sceneId => {
                            const sid = String(sceneId);
                            const scene = DataManager.getScene(sid);
                            const sceneName = scene?.sceneName || `场景 ${sid}`;
                            const npcCount = scene?.NPCInfos?.length || 0;
                            const evidenceItems = scene ? DataManager.sceneEvidence(sid) : [];
                            const isActive = AppState.currentSceneId === sid;
                            const noteIcon = scene?.note === '晚上' ? '🌙' : scene?.note === '白天' ? '☀️' : '';
                            html += `
                                <div class="sidebar-item ${isActive ? 'active' : ''}"
                                     onclick="FlowView.showScene('${sid}')" style="padding-left:1.5rem;">
                                    ${noteIcon ? `<span title="${scene.note}">${noteIcon}</span>` : ''}
                                    ${escapeHtml(sceneName)}
                                    <span style="color:var(--text-muted); font-size:0.75rem;">${sid}</span>
                                    ${npcCount ? `<span class="badge npc">${npcCount}NPC</span>` : ''}
                                    ${evidenceItems.length ? `<span class="badge">${evidenceItems.length}</span>` : ''}
                                </div>
                            `;
                        });
                    }
                    noGroup.forEach(sceneId => {
                        const sid = String(sceneId);
                        const scene = DataManager.getScene(sid);
                        const sceneName = scene?.sceneName || `场景 ${sid}`;
                        const npcCount = scene?.NPCInfos?.length || 0;
                        const evidenceItems = scene ? DataManager.sceneEvidence(sid) : [];
                        const isActive = AppState.currentSceneId === sid;
                        const noteIcon = scene?.note === '晚上' ? '🌙' : scene?.note === '白天' ? '☀️' : '';
                        html += `
                            <div class="sidebar-item ${isActive ? 'active' : ''}"
                                 onclick="FlowView.showScene('${sid}')">
                                ${noteIcon ? `<span title="${scene.note}">${noteIcon}</span>` : ''}
                                ${escapeHtml(sceneName)}
                                <span style="color:var(--text-muted); font-size:0.75rem;">${sid}</span>
                                ${npcCount ? `<span class="badge npc">${npcCount}NPC</span>` : ''}
                                ${evidenceItems.length ? `<span class="badge">${evidenceItems.length}</span>` : ''}
                            </div>
                        `;
                    });
                }

                // Render locked scenes grouped by location
                if (locked.length > 0) {
                    html += `<div class="sidebar-section">未解锁 (${locked.length})</div>`;
                    const { groups, noGroup } = groupByLocation(locked, item => String(typeof item === 'object' ? item.id : item));

                    for (const [locName, items] of groups) {
                        html += `<div style="padding:0.3rem 1rem 0.1rem; font-size:0.75rem; color:var(--highlight); font-weight:600;">${escapeHtml(locName)}</div>`;
                        items.forEach(item => {
                            const sid = String(typeof item === 'object' ? item.id : item);
                            const reason = (typeof item === 'object' && item.reason) ? item.reason : '';
                            const scene = DataManager.getScene(sid);
                            const sceneName = scene?.sceneName || `场景 ${sid}`;
                            html += `
                                <div class="sidebar-item locked" style="padding-left:1.5rem;" ${reason ? `title="${escapeHtml(reason)}"` : ''}>
                                    🔒 ${escapeHtml(sceneName)}
                                    <span style="color:var(--text-muted); font-size:0.75rem;">${sid}</span>
                                    ${reason ? `<div style="font-size:0.75rem; color:var(--text-muted); margin-top:2px;">${escapeHtml(reason)}</div>` : ''}
                                </div>
                            `;
                        });
                    }
                    noGroup.forEach(item => {
                        const sid = String(typeof item === 'object' ? item.id : item);
                        const reason = (typeof item === 'object' && item.reason) ? item.reason : '';
                        const scene = DataManager.getScene(sid);
                        const sceneName = scene?.sceneName || `场景 ${sid}`;
                        html += `
                            <div class="sidebar-item locked" ${reason ? `title="${escapeHtml(reason)}"` : ''}>
                                🔒 ${escapeHtml(sceneName)}
                                <span style="color:var(--text-muted); font-size:0.75rem;">${sid}</span>
                                ${reason ? `<div style="font-size:0.75rem; color:var(--text-muted); margin-top:2px;">${escapeHtml(reason)}</div>` : ''}
                            </div>
                        `;
                    });
                }

                // Render closed scenes grouped by location
                if (closed.length > 0) {
                    html += `<div class="sidebar-section">不开放 (${closed.length})</div>`;
                    const { groups, noGroup } = groupByLocation(closed, item => String(typeof item === 'object' ? item.id : item));

                    for (const [locName, items] of groups) {
                        html += `<div style="padding:0.3rem 1rem 0.1rem; font-size:0.75rem; color:var(--highlight); font-weight:600;">${escapeHtml(locName)}</div>`;
                        items.forEach(item => {
                            const sid = String(typeof item === 'object' ? item.id : item);
                            const reason = (typeof item === 'object' && item.reason) ? item.reason : '';
                            const scene = DataManager.getScene(sid);
                            const sceneName = scene?.sceneName || `场景 ${sid}`;
                            html += `
                                <div class="sidebar-item closed" style="padding-left:1.5rem;" ${reason ? `title="${escapeHtml(reason)}"` : ''}>
                                    ${escapeHtml(sceneName)}
                                    <span style="color:var(--text-muted); font-size:0.75rem;">${sid}</span>
                                    ${reason ? `<div style="font-size:0.75rem; color:var(--text-muted); margin-top:2px;">${escapeHtml(reason)}</div>` : ''}
                                </div>
                            `;
                        });
                    }
                    noGroup.forEach(item => {
                        const sid = String(typeof item === 'object' ? item.id : item);
                        const reason = (typeof item === 'object' && item.reason) ? item.reason : '';
                        const scene = DataManager.getScene(sid);
                        const sceneName = scene?.sceneName || `场景 ${sid}`;
                        html += `
                            <div class="sidebar-item closed" ${reason ? `title="${escapeHtml(reason)}"` : ''}>
                                ${escapeHtml(sceneName)}
                                <span style="color:var(--text-muted); font-size:0.75rem;">${sid}</span>
                                ${reason ? `<div style="font-size:0.75rem; color:var(--text-muted); margin-top:2px;">${escapeHtml(reason)}</div>` : ''}
                            </div>
                        `;
                    });
                }
            } else if (loop.free_phase && loop.free_phase.length > 0) {
                // Legacy flat list (Unit1 backward compat)
                html += `<div class="sidebar-section">自由探索 (${loop.free_phase.length})</div>`;
                loop.free_phase.forEach(sceneId => {
                    const sid = String(sceneId);
                    const scene = DataManager.getScene(sid);
                    const sceneName = scene?.sceneName || `场景 ${sid}`;
                    const npcCount = scene?.NPCInfos?.length || 0;
                    const evidenceItems = scene ? DataManager.sceneEvidence(sid) : [];
                    const isActive = AppState.currentSceneId === sid;
                    const noteIcon = scene?.note === '晚上' ? '🌙' : scene?.note === '白天' ? '☀️' : '';
                    html += `
                        <div class="sidebar-item ${isActive ? 'active' : ''}"
                             onclick="FlowView.showScene('${sid}')">
                            ${noteIcon ? `<span title="${scene.note}">${noteIcon}</span>` : ''}
                            ${escapeHtml(sceneName)}
                            <span style="color:var(--text-muted); font-size:0.75rem;">${sid}</span>
                            ${npcCount ? `<span class="badge npc">${npcCount}NPC</span>` : ''}
                            ${evidenceItems.length ? `<span class="badge">${evidenceItems.length}</span>` : ''}
                        </div>
                    `;
                });
            }

            // Expose
            if (loop.expose) {
                html += `
                    <div class="sidebar-item ${AppState.currentPhase === 'expose' ? 'active' : ''}"
                         onclick="FlowView.showPhase('expose')">
                        <span class="phase-tag expose">指证</span> ${escapeHtml(loop.expose.target_name || '')}
                    </div>
                `;
            }

            // Events (突发事件)
            if (loop.events && loop.events.length > 0) {
                html += `
                    <div class="sidebar-item ${AppState.currentPhase === 'events' ? 'active' : ''}"
                         onclick="FlowView.showPhase('events')">
                        <span class="phase-tag events">突发事件</span> (${loop.events.length})
                    </div>
                `;
            }

            // Ending (Loop 6 only)
            if (loop.ending && loop.ending.length > 0) {
                html += `
                    <div class="sidebar-item ${AppState.currentPhase === 'ending' ? 'active' : ''}"
                         onclick="FlowView.showPhase('ending')">
                        <span class="phase-tag ending">结尾</span> (${loop.ending.length}场景)
                    </div>
                `;
            }

            sidebar.innerHTML = html;
        }
    };

    // ===== Art Overview View (3 tabs: evidence, npc, scene) =====
    const ArtOverviewView = {
        currentTab: 'evidence',
        filterText: '',
        showOnlyNoArt: false,

        render() {
            const chapter = DataManager.chapter(AppState.currentUnit);

            // Count stats for tab badges
            const items = DataManager.itemsByChapter(chapter);
            const evNoArt = items.filter(i => !i.ArtRequirement).length;

            const npcs = AppState.allNPCs.filter(n => n.Chapter === chapter);
            const npcNoArt = npcs.filter(n => !n.ArtRequirement).length;

            const chPrefix = chapter === 'EPI01' ? '1' : chapter === 'EPI02' ? '2' : '3';
            const rawScenes = AppState.allScenes.filter(s => s.sceneId && String(s.sceneId).startsWith(chPrefix));
            const mergedScenes = this._mergeScenes(rawScenes);
            const scNoArt = mergedScenes.filter(m => !m.ArtRequirement).length;

            // Tab bar
            let html = `<div class="art-tab-bar">`;
            html += `<div class="art-tab ${this.currentTab === 'evidence' ? 'active' : ''}" onclick="ArtOverviewView.switchTab('evidence')">
                证据需求 ${evNoArt > 0 ? `<span class="tab-badge">${evNoArt}</span>` : `<span class="tab-badge done">${items.length}</span>`}
            </div>`;
            html += `<div class="art-tab ${this.currentTab === 'npc' ? 'active' : ''}" onclick="ArtOverviewView.switchTab('npc')">
                人物需求 ${npcNoArt > 0 ? `<span class="tab-badge">${npcNoArt}</span>` : `<span class="tab-badge done">${npcs.length}</span>`}
            </div>`;
            html += `<div class="art-tab ${this.currentTab === 'scene' ? 'active' : ''}" onclick="ArtOverviewView.switchTab('scene')">
                场景需求 ${scNoArt > 0 ? `<span class="tab-badge">${scNoArt}</span>` : `<span class="tab-badge done">${mergedScenes.length}</span>`}
            </div>`;
            html += `</div>`;

            // Tab content
            if (this.currentTab === 'evidence') {
                html += this.renderEvidenceTab(items);
            } else if (this.currentTab === 'npc') {
                html += this.renderNPCTab(npcs);
            } else {
                html += this.renderSceneTab(rawScenes);
            }

            document.getElementById('content').innerHTML = html;
            UI.renderSidebar();
        },

        switchTab(tab) {
            this.currentTab = tab;
            this.filterText = '';
            this.showOnlyNoArt = false;
            this.render();
        },

        // ---- Evidence Tab (original logic) ----
        renderEvidenceTab(allItems) {
            let items = allItems;
            if (this.filterText) {
                const q = this.filterText.toLowerCase();
                items = items.filter(i =>
                    String(i.id).includes(q) ||
                    DataManager.itemName(i).toLowerCase().includes(q) ||
                    DataManager.itemDesc(i).toLowerCase().includes(q) ||
                    DataManager.itemLocation(i).toLowerCase().includes(q) ||
                    (i.ArtRequirement || '').toLowerCase().includes(q)
                );
            }
            if (this.showOnlyNoArt) {
                items = items.filter(i => !i.ArtRequirement);
            }

            const total = items.length;
            const hasArt = items.filter(i => i.ArtRequirement).length;

            let html = `
                <div class="filter-bar">
                    <label>搜索：</label>
                    <input type="text" id="filterInput" placeholder="ID / 名称 / 描述 / 位置..."
                           value="${escapeHtml(this.filterText)}"
                           oninput="ArtOverviewView.onFilter(this.value)">
                    <button class="btn ${this.showOnlyNoArt ? 'active' : ''}"
                            onclick="ArtOverviewView.toggleNoArt()">
                        仅未填美术需求
                    </button>
                    ${this.filterText ? `<button class="btn" onclick="ArtOverviewView.clearFilter()">清除筛选</button>` : ''}
                    <span class="stats">
                        显示 ${total} 条 |
                        <span class="has-art">已填 ${hasArt}</span> /
                        <span class="no-art">未填 ${total - hasArt}</span>
                    </span>
                </div>

                    <thead>
                        <tr>
                            <th class="id-col">ID</th>
                            <th class="name-col">名称</th>
                            <th class="type-col">类型</th>
                            <th class="location-col">位置</th>
                            <th class="desc-col">描述</th>
                            <th>美术需求</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

                html += `<tr><td colspan="6" style="text-align:center; color:var(--text-muted); padding:2rem;">

            }

            items.forEach(item => {
                const artClass = item.ArtRequirement ? 'art-req' : 'art-req empty';

                html += `
                    <tr onclick="UI.showEvidenceModal('${item.id}')" style="cursor:pointer;">
                        <td class="id-col">${escapeHtml(String(item.id))}</td>
                        <td class="name-col">${escapeHtml(DataManager.itemName(item))}</td>
                        <td class="type-col"><span class="ev-type ${DataManager.typeClass(item.itemType)}">${escapeHtml(DataManager.typeName(item.itemType))}</span></td>
                        <td class="location-col">${escapeHtml(DataManager.itemLocation(item))}</td>
                        <td class="desc-col">${escapeHtml(truncate(DataManager.itemDesc(item), 80))}</td>
                        <td class="${artClass}">${escapeHtml(truncate(artText, 60))}</td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            return html;
        },

        // ---- NPC Tab ----
        renderNPCTab(allNPCs) {

                const q = this.filterText.toLowerCase();

                    cn(n.Name).toLowerCase().includes(q) ||
                    (n.Name?.[1] || '').toLowerCase().includes(q) ||
                    (n.ArtRequirement || '').toLowerCase().includes(q)
                );
            }
            if (this.showOnlyNoArt) {
                npcs = npcs.filter(n => !n.ArtRequirement);
            }

            const total = npcs.length;
            const hasArt = npcs.filter(n => n.ArtRequirement).length;

            let html = `
                <div class="filter-bar">
                    <label>搜索：</label>
                    <input type="text" id="filterInput" placeholder="ID / 名称..."
                           value="${escapeHtml(this.filterText)}"
                           oninput="ArtOverviewView.onFilter(this.value)">
                    <button class="btn ${this.showOnlyNoArt ? 'active' : ''}"
                            onclick="ArtOverviewView.toggleNoArt()">
                        仅未填美术需求
                    </button>
                    ${this.filterText ? `<button class="btn" onclick="ArtOverviewView.clearFilter()">清除筛选</button>` : ''}
                    <span class="stats">
                        显示 ${total} 条 |
                        <span class="has-art">已填 ${hasArt}</span> /
                        <span class="no-art">未填 ${total - hasArt}</span>
                    </span>
                </div>
                <table class="evidence-table">
                    <thead>
                        <tr>
                            <th class="id-col">ID</th>
                            <th class="name-col">中文名</th>
                            <th class="name-col">英文名</th>

            npcs.forEach(npc => {
                const artClass = npc.ArtRequirement ? 'art-req' : 'art-req empty';
                const artText = npc.ArtRequirement || '未填写';
                const hasIcon = npc.IconSmall || npc.IconLarge;

                    <tr>
                        <td class="id-col">${escapeHtml(String(npc.id))}</td>

                `;
