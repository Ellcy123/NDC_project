        .dialog-box .dlg-body {
            flex: 1;
            min-width: 0;
        }

        .dialog-box .dlg-speaker {
            font-family: var(--ff-serif);
            color: var(--gold);
            font-weight: 600;
            font-size: 13px;
            letter-spacing: .06em;
            margin-bottom: 6px;
        }

        .dialog-box .dlg-text {
            font-family: var(--ff-serif);
            font-size: 16px;
            line-height: 1.7;
            min-height: 40px;
            color: var(--parchment);
            letter-spacing: .01em;
        }

        .dialog-box .dlg-id {
            font-family: var(--ff-mono);
            font-size: 10px;
            color: var(--text-faint);
            letter-spacing: .1em;
            margin-top: 6px;
        }

        .dialog-box .dlg-controls {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 10px;
        }

        .dialog-box .dlg-branches {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .dialog-box .branch-btn {
            background: var(--coal-3);
            border: 1px solid var(--rule);
            border-left: 2px solid var(--gold-2);
            color: var(--parch-mute);
            padding: 8px 12px;
            border-radius: 0;
            cursor: pointer;
            text-align: left;
            transition: color .15s, border-color .15s, background .15s, transform .15s ease-out;
            font-family: var(--ff-serif);
            font-size: 13.5px;
        }
        .dialog-box .branch-btn:hover {
            background: var(--ink);
            border-color: var(--gold-2);
            border-left-color: var(--gold);
            color: var(--parchment);
            transform: translateX(2px);
        }

        .dlg-close-btn {
            position: absolute;
            top: 6px;
            right: 10px;
            background: transparent;
            border: 1px solid var(--rule);
            color: var(--text-dim);
            font-size: 14px;
            cursor: pointer;
            line-height: 1;
            width: 22px; height: 22px;
            display: grid; place-items: center;
            border-radius: 2px;
            transition: color .15s, border-color .15s;
        }
        .dlg-close-btn:hover { color: var(--gold); border-color: var(--gold-2); }

        /* ===== Status Bar ===== */
        .status-bar {
            background: var(--secondary);
            padding: 0.35rem 1.25rem;
            border-top: 1px solid var(--border);
            font-family: var(--ff-mono);
            font-size: 11px;
            color: var(--text-faint);
            letter-spacing: .06em;
        }

        /* ===== Scrollbar (noir) ===== */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--coal-3); }
        ::-webkit-scrollbar-thumb { background: var(--rule-2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold-2); }

        /* ===== Added micro-motion (from prototype) ===== */
        @keyframes noir-shimmer {
            0%, 100% { opacity: .55; }
            50%      { opacity: 1; }
        }
        .ev-art.empty::before { animation: noir-shimmer 2.4s ease-in-out infinite; }

        @keyframes ev-card-in {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .evidence-card { animation: ev-card-in .22s ease-out both; }
        .evidence-card:nth-child(1) { animation-delay: .02s; }
        .evidence-card:nth-child(2) { animation-delay: .05s; }
        .evidence-card:nth-child(3) { animation-delay: .08s; }
        .evidence-card:nth-child(4) { animation-delay: .11s; }
        .evidence-card:nth-child(5) { animation-delay: .14s; }
        .evidence-card:nth-child(6) { animation-delay: .17s; }
        .evidence-card:nth-child(n+7) { animation-delay: .19s; }

        @keyframes scene-row-in {
            from { opacity: 0; transform: translateX(-6px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        .sidebar-item { animation: scene-row-in .2s ease-out both; }

        /* respect reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
        }

        /* ===== Mobile (≤ 768px) — 不影响桌面 ===== */
        @media (max-width: 768px) {
            /* 整页改为可纵向滚（桌面是 100vh + overflow:hidden 锁死） */
            body { font-size: 12.5px; height: auto; overflow: auto; }
            .app  { height: auto; min-height: 100vh; }

            /* Header：换行折叠，副标题/边距收紧 */
            .header { height: auto; min-height: 52px; padding: 8px 12px;
                      flex-wrap: wrap; gap: 8px; }
            .brand         { min-width: 0; }
            .brand-sub     { display: none; }
            .header-center { order: 3; flex-basis: 100%; justify-content: flex-start; gap: 6px; }
            .header-right  { min-width: 0; }
            .select-group  { height: 28px; }

            /* Tabs：横向可滑，meta 隐藏 */
            .main-tabs { padding: 0 8px; overflow-x: auto; }
            .main-tab  { padding: 10px 12px 8px; font-size: 12px; white-space: nowrap; }
            .tab-meta  { display: none; }

            /* 主区横→纵：sidebar 顶部限高，内容在下 */
            .main    { flex-direction: column; overflow: visible; }
            .sidebar { width: 100%; max-height: 220px;
                       border-right: 0; border-bottom: 1px solid var(--border); }
            .content { padding: 14px 12px 60px; overflow: visible; }

            /* 证据表横向滚动而不是挤变形 */
            .evidence-table { display: block; overflow-x: auto; white-space: nowrap; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <div class="brand">
                <span class="brand-mark">N</span>
                <div class="brand-text">
                    <div class="brand-name">NDC Preview</div>
                    <div class="brand-sub">内容工作台 · BUILD 0.4.2</div>
                </div>
            </div>
            <div class="header-center">
                <div class="select-group">
                    <span class="select-label">UNIT</span>
                    <select id="unitSelect">
                        <option value="Unit1">Unit 1 - Webb谋杀案</option>
                        <option value="Unit2">Unit 2 - 鞋坊纵火案</option>
                        <option value="Unit3">Unit 3 - Thomas坠楼案</option>
                        <option value="Unit8">Unit 8 - Webb谋杀案（重构版）</option>
                        <option value="Unit9">Unit 9 - 黑哨之夜</option>
                    </select>
                </div>
                <!-- LOOP select is hidden; loop chips in sidebar are the visible control. Kept in DOM so JS can read/write #loopSelect.value -->
                <div class="select-group" style="display:none;" aria-hidden="true">
                    <span class="select-label">LOOP</span>
                    <select id="loopSelect">
                        <option value="loop1">Loop 1</option>
                        <option value="loop2">Loop 2</option>
                        <option value="loop3">Loop 3</option>
                        <option value="loop4">Loop 4</option>
                        <option value="loop5">Loop 5</option>
                        <option value="loop6">Loop 6</option>
                    </select>
                </div>
                <button class="btn primary" onclick="GameController.load()">加载</button>
            </div>
            <div class="header-right">
                <button class="btn ghost" onclick="UI.showStoryOverview()">故事概览</button>
            </div>
        </div>

        <!-- Main Tabs -->
        <div class="main-tabs">
            <button class="main-tab" id="btnFlow" onclick="GameController.switchView('flow')">
                <span class="tab-idx">01</span>流程预览
            </button>
            <button class="main-tab" id="btnArt" onclick="GameController.switchView('art')">
                <span class="tab-idx">02</span>美术需求总览
            </button>
            <span class="tab-meta" id="tabMeta"></span>
        </div>

        <!-- Main -->
        <div class="main">
            <aside class="sidebar">
                <div class="side-head">
                    <div class="side-title">Loops</div>
                </div>
                <div class="loop-row">
                    <button class="loop-chip" data-loop="loop1" onclick="pickLoop('loop1')">LOOP 1</button>
                    <button class="loop-chip" data-loop="loop2" onclick="pickLoop('loop2')">LOOP 2</button>
                    <button class="loop-chip" data-loop="loop3" onclick="pickLoop('loop3')">LOOP 3</button>
                    <button class="loop-chip" data-loop="loop4" onclick="pickLoop('loop4')">LOOP 4</button>
                    <button class="loop-chip" data-loop="loop5" onclick="pickLoop('loop5')">LOOP 5</button>
                    <button class="loop-chip" data-loop="loop6" onclick="pickLoop('loop6')">LOOP 6</button>
                </div>
                <div class="loop-current">
                    <div class="kicker">CURRENT · <span id="loopCurrentChapter">—</span></div>
                    <div class="loop-current-title" id="loopCurrentTitle">选择 Loop 开始</div>

        <!-- Status -->

    <!-- Noir overlays (pointer-events: none, safe against all JS) -->
    <div class="vignette"></div>
    <div class="grain"></div>

    <!-- 疑点悬浮窗（CURRENT CASE 风格） -->

        <button class="df-collapse-btn" onclick="event.stopPropagation(); DoubtView.toggleCollapsed()" title="收起/展开" aria-label="收起">⌃</button>
        <!-- 展开态主体，点击打开疑点列表 -->
        <div class="df-body" onclick="DoubtView.showList()" title="点击查看本 Loop 全部疑点">
            <div class="df-kicker">
                <span class="df-label" id="doubtFloatKicker">当前目标</span>
                <span id="doubtFloatLoop">LOOP —</span>
            </div>

    <!-- Evidence Modal -->

        <div class="modal">
            <button class="modal-close" onclick="DoubtView.close()">&times;</button>
            <div id="doubtDrawerContent"></div>

    <script>
    // ===== Sidebar chip helpers =====
    function pickLoop(loopId) {
        const sel = document.getElementById('loopSelect');
        if (sel) sel.value = loopId;
        if (typeof GameController !== 'undefined' && GameController.load) {
            GameController.load();
        }
    }

    function syncLoopChips() {
        const current = (typeof AppState !== 'undefined' && AppState.currentLoop) || 'loop1';
        document.querySelectorAll('.loop-chip').forEach(chip => {
            chip.classList.toggle('active', chip.dataset.loop === current);
        });
    }

    function syncLoopHeader() {
        const titleEl = document.getElementById('loopCurrentTitle');
        const chapterEl = document.getElementById('loopCurrentChapter');
        if (!titleEl || typeof AppState === 'undefined') return;
        const loop = AppState.loopData;
        const loopKey = AppState.currentLoop || 'loop1';
        if (loop && loop.title) {
            titleEl.textContent = loop.title;
        } else {
            titleEl.textContent = loopKey.replace('loop', 'Loop ');
        }
        if (chapterEl) {
            const ch = (typeof DataManager !== 'undefined' && DataManager.chapter)
                ? DataManager.chapter(AppState.currentUnit) : '';
            chapterEl.textContent = ch || (AppState.currentUnit || '—');
        }
    }

    // ===== Utilities =====
    function stripPrefix(id) {
        if (id == null) return '';
        id = String(id);
        if (id.startsWith('EV')) return id.slice(2);
        if (id.startsWith('SC')) return id.slice(2);
        if (id.startsWith('NPC')) return id.slice(3);
        return id;
    }

    function cn(field) {
        if (Array.isArray(field)) return field[0] || '';
        return field || '';
    }

    function truncate(str, len) {
        str = str || '';
        return str.length > len ? str.slice(0, len) + '...' : str;
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str || '';
        return div.innerHTML;
    }

    function escapeHtmlWithBr(str) {
        return escapeHtml(str).replace(/\n/g, '<br>');
    }

    function copyText(text, el) {
        navigator.clipboard.writeText(text).then(() => {
            const orig = el.textContent;
            el.textContent = '已复制!';
            el.style.background = 'rgba(80,200,120,0.3)';
            setTimeout(() => { el.textContent = orig; el.style.background = ''; }, 800);
        });
    }

    // ===== Configuration =====
    const Config = {
        // 自动检测：localhost/127.0.0.1 = local，否则 = deploy
        get mode() {
            const h = location.hostname;
            return (h === 'localhost' || h === '127.0.0.1' || location.protocol === 'file:') ? 'local' : 'deploy';
        },
        get paths() {
            if (this.mode === 'deploy') {
                // Vercel: 从 NDC_project/ 部署, rewrite / → /preview_new2/index.html
                return {
                    tableData: '/preview_new2/data/table',
                    loopConfig: '/preview_new2/data',
                    assets: '/Assets/Resources',
                    avgData: '/AVG'
                };
            }
            // 本地: 从 D:\ 启动 server, 访问 /NDC_project/preview_new2/index.html
            return {
                tableData: '/NDC_project/preview_new2/data/table',
                loopConfig: '/NDC_project/preview_new2/data',
                assets: '/NDC/Assets/Resources',
                avgData: '/NDC_project/AVG'
            };
        },
        getAssetUrl(configPath) {
            if (!configPath) return '';
            return `${this.paths.assets}/${configPath.replace(/\\/g, '/')}.png`;
        }
    };

    // ===== App State =====
    const AppState = {
        currentUnit: 'Unit1',
        currentLoop: 'loop1',
        currentView: 'flow',

        allItems: [],
        allScenes: [],
        allNPCs: [],
        allTalks: [],
        allTestimonies: [],
        allDoubts: [],

        itemsMap: new Map(),
        scenesMap: new Map(),
        npcsMap: new Map(),
        talksMap: new Map(),
        testimoniesByNpc: new Map(),
        doubtsMap: new Map(),
        satisfiedConditions: new Set(),

        talkSummaries: {},
        sceneTalkSummaries: {},
        storyOverview: {},
        chapterConfigs: [],
        chapterConfigMap: new Map(),

        loopData: null,
        locationsData: null,
        collectedEvidences: new Set(),
        selectedEvidences: new Set(),

    // ===== Data Loader =====
    const DataLoader = {
        async loadJSON(path) {
            const resp = await fetch(path);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${path}`);
            const text = await resp.text();
            return JSON.parse(this.fixJson(text));
        },

        // 状态机修复游戏导出的非标准 JSON：
        // 1. 字符串内字面换行符 → 空格  (Describe 字段跨行)
        // 2. 未转义反斜杠 → \\          (Art\Scene 路径)
        // 3. 字符串内裸双引号 → \"       (中文引号用了ASCII双引号)
        fixJson(text) {
            let out = '';
            let inStr = false;
            for (let i = 0; i < text.length; i++) {
                const c = text.charAt(i);
                if (!inStr) {
                    out += c;
                    if (c === '"') inStr = true;
                    continue;
                }
                // 以下都在字符串内部
                if (c === '\\') {
                    const nx = text.charAt(i + 1);
                    if ('"\\\/bfnrt'.includes(nx)) {
                        out += c + nx; i++;           // 合法 2 字符转义
                    } else if (nx === 'u' && /^[0-9a-fA-F]{4}$/.test(text.substring(i + 2, i + 6))) {
                        out += text.substring(i, i + 6); i += 5; // 合法 \uXXXX
                    } else {
                        out += '\\\\';                // 修正非法反斜杠
                    }
                } else if (c === '"') {
                    // 判断是字符串结束引号还是内容引号
                    // 关键：跳过空白后检查下一个非空白字符是否为 JSON 结构符
                    const nx = text.charAt(i + 1);
                    if (nx === '' || ',:]}'.includes(nx)) {
                        out += c; inStr = false;      // 明确的结束引号
                    } else if (' \t\r\n'.includes(nx)) {
                        // 引号后是空白 → 向前看跳过空白
                        let j = i + 1;
                        while (j < text.length && ' \t\r\n'.includes(text.charAt(j))) j++;
                        const after = text.charAt(j);
                        if (after === '' || ',:]}'.includes(after)) {
                            out += c; inStr = false;  // 空白后是结构符 → 结束引号
                        } else {
                            out += '\\"';             // 空白后还是内容 → 内容引号
                        }
                    } else {
                        out += '\\"';                 // 后面直接是内容字符 → 内容引号
                    }
                } else if (c === '\n') {
                    out += '\\n';                     // 字符串内换行 → 保留为 \n
                } else if (c === '\r') {
                    // 忽略 CR（\r\n 中的 \r）
                } else {
                    out += c;
                }
            }
            return out;
        },

        async loadYAML(path) {
            const resp = await fetch(`${path}?t=${Date.now()}`);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${path}`);
            return jsyaml.load(await resp.text());
        },

        // ===== AVG Talk 加载 =====

        // 发现目录下的 .json 文件：优先读 _manifest.json，回退到 HTTP 目录列表
        async listJsonFiles(dirUrl) {
            // 1. 尝试读取 deploy 时生成的清单文件
            try {
                const resp = await fetch(`${dirUrl}_manifest.json?t=${Date.now()}`);
                if (resp.ok) {
                    const files = await resp.json();
                    if (Array.isArray(files) && files.length > 0) return files;
                }
            } catch (e) { /* 清单不存在，回退 */ }

            // 2. 回退：解析 Python HTTP server 的目录列表 HTML
            try {
                const resp = await fetch(dirUrl);
                if (!resp.ok) return [];
                const html = await resp.text();
                const matches = [...html.matchAll(/href="([^"]+\.json)"/gi)];
                return matches.map(m => m[1]).filter(f => f !== '_manifest.json');
            } catch (e) { return []; }
        },

        // AVG 扁平格式 → 内部 Talk 格式
        convertAVGTalk(entry) {
            const npcId = (entry.IdSpeaker || '').replace(/^NPC/, '');
            const npcData = AppState.npcsMap.get(npcId);
            return {
                id: String(entry.id),
                step: String(entry.step || ''),
                speakType: entry.speakType,
                waitTime: String(entry.waitTime || 0),
                Speaker: {
                    id: npcId,
                    Name: [entry.cnSpeaker || '', entry.enSpeaker || ''],
                    role: npcData?.role || '',
                    Chapter: npcData?.Chapter || '',
                    IconSmall: npcData?.IconSmall || '',
                    IconLarge: npcData?.IconLarge || ''
                },
                Words: [entry.cnWords || '', entry.enWords || ''],
                next: entry.next ? String(entry.next) : '',
                script: entry.script || '',
                Parameters: this._buildParameters(entry),
                // AVG 独有字段
                cnAction: entry.cnAction || '',
                enAction: entry.enAction || '',
                Location: entry.Location || '',
                // 视频字段
                videoEpisode: entry.videoEpisode || '',
                videoLoop: entry.videoLoop || '',
                videoScene: entry.videoScene || '',
                videoId: entry.videoId ? String(entry.videoId) : ''
            };
        },

        _buildParameters(entry) {
            const params = [];
            for (let i = 0; i < 3; i++) {
                const str = entry[`ParameterStr${i}`] || '';
                const int = entry[`ParameterInt${i}`];
                if (str || int) {
                    params.push({ ParameterStr: str, ParameterInt: String(int || 0) });
                }
            }
            return params.length > 0 ? params : [{ ParameterInt: '0' }];
        },

        // 加载指定 loop 的所有 AVG Talk 文件
        async loadAVGTalks(loop) {
            const base = Config.paths.avgData;
            const episode = DataManager.chapter(AppState.currentUnit);
            const dirUrl = `${base}/${episode}/Talk/${loop}/`;

            AppState.talksMap.clear();
            AppState.allTalks = [];
            let totalLoaded = 0;

            try {
                const files = await this.listJsonFiles(dirUrl);
                if (files.length === 0) {
                    console.warn(`No AVG Talk files found in ${dirUrl}`);
                    return 0;
                }

                const results = await Promise.all(
                    files.map(async (filename) => {
                        try {
                            const resp = await fetch(`${dirUrl}${filename}?t=${Date.now()}`);
                            if (!resp.ok) return { filename, entries: [] };
                            return { filename, entries: await resp.json() };
                        } catch (e) {
                            console.warn(`Failed to load AVG Talk: ${filename}`, e.message);
                            return { filename, entries: [] };
                        }
                    })
                );

                const sceneName = (fn) => fn.replace(/\.json$/i, '');
                results.forEach(({ filename, entries }) => {
                    const vs = sceneName(filename);
                    entries.forEach(raw => {
                        const talk = this.convertAVGTalk(raw);
                        if (!talk.videoScene) talk.videoScene = vs;
                        AppState.talksMap.set(talk.id, talk);
                        AppState.allTalks.push(talk);
                        totalLoaded++;
                    });
                });

                console.log(`AVG Talk loaded: ${totalLoaded} entries from ${files.length} files (${loop})`);
            } catch (e) {
                console.warn('AVG Talk loading failed:', e.message);
            }
            return totalLoaded;
        },

        // 加载指定 loop 的 Expose 对话文件
        async loadAVGExpose(loop) {

                            return { filename, entries: await resp.json() };
                        } catch (e) {
                            console.warn(`Failed to load AVG Expose: ${filename}`, e.message);
                            return { filename, entries: [] };
                        }
                    })
                );

                const sceneName = (fn) => fn.replace(/\.json$/i, '');

                    const vs = sceneName(filename);

    // ===== Data Manager =====
    const DataManager = {
        getItem(id) {
            return AppState.itemsMap.get(stripPrefix(id)) || null;
        },

        getScene(id) {
            return AppState.scenesMap.get(stripPrefix(id)) || null;
        },

        getNPC(id) {
            return AppState.npcsMap.get(stripPrefix(id)) || null;
        },

        itemName(item) { return cn(item?.Name); },
        itemDesc(item) { return cn(item?.Describe); },
        itemShortDesc(item) { return cn(item?.ShortDescribe); },
        itemLocation(item) { return cn(item?.location); },

        typeName(type) {
            return { '0': '装饰', '1': '线索', '2': '环境', '3': '道具', '4': '笔记', '5': '门', '6': '可交互道具', '7': '内嵌道具' }[String(type)] || type || '?';
        },
        typeClass(type) {
            return { '1': 'type-clue', '2': 'type-envir', '3': 'type-item', '4': 'type-note' }[String(type)] || '';
        },

        chapter(unit) {
            if (unit === 'Unit3') return 'EPI03';
            if (unit === 'Unit8') return 'EPI08';
            if (unit === 'Unit9') return 'EPI09';
            return unit === 'Unit2' ? 'EPI02' : 'EPI01';
        },

        itemsByChapter(chapter) {
            return AppState.allItems.filter(i => i.Chapter === chapter);
        },

        // 反查：给定原料ID，找到哪个产物的combineParameter包含它
        findCombineProduct(ingredientId) {
            const id = stripPrefix(ingredientId);
            return AppState.allItems.find(i => Array.isArray(i.combineParameter) && i.combineParameter.includes(id));
        },

        // Scene ID prefix for a given unit+loop: Unit1/loop1 -> "11", Unit8/loop3 -> "83"
        loopPrefix(unit, loop) {
            let u = '1';
            if (unit === 'Unit3') u = '3';
            else if (unit === 'Unit2') u = '2';
            else if (unit === 'Unit8') u = '8';
            else if (unit === 'Unit9') u = '9';
            const l = loop.replace('loop', '');
            return `${u}${l}`;
        },

        scenesForLoop(unit, loop) {
            const prefix = this.loopPrefix(unit, loop);
            return AppState.allScenes.filter(s => String(s.sceneId).startsWith(prefix));
        },

        // Get evidence items from a scene's ItemIDs (skip IDs not in ItemStaticData)
        sceneEvidence(sceneId) {
            const scene = this.getScene(sceneId);
            if (!scene?.ItemIDs) return [];
            return scene.ItemIDs.map(id => this.getItem(id)).filter(Boolean);
        },

        sceneNPCs(sceneId) {
            const scene = this.getScene(sceneId);
            return scene?.NPCInfos || [];
        },

        // Get non-evidence ItemIDs (those not found in ItemStaticData)
        sceneOtherItems(sceneId) {
            const scene = this.getScene(sceneId);
            if (!scene?.ItemIDs) return [];
            return scene.ItemIDs.filter(id => !this.getItem(id));
        },

        // Find talk file (videoScene) where given NPC id is the primary non-Zack speaker
        // Used when SceneConfig.NPCInfos[i].TalkInfo.id is empty (Unit9 case)
        findTalkForNPC(npcId) {
            if (!npcId) return '';
            const sid = String(npcId);
            // Helper: find first talk ID by videoScene name
            const firstIdByScene = (sceneName) => {
                const entries = AppState.allTalks
                    .filter(t => t.videoScene === sceneName)
                    .sort((a, b) => Number(a.videoId || a.id) - Number(b.videoId || b.id));
                return entries.length > 0 ? entries[0].id : '';
            };
            // convertAVGTalk stores Speaker.id as raw number (e.g. "807"), no "NPC" prefix
            // Try direct match (design ID 907)
            for (const talk of AppState.allTalks) {
                if (talk.Speaker?.id === sid && talk.videoScene) {
                    return firstIdByScene(talk.videoScene) || talk.id;
                }
            }
            // Fallback: 9XX → 8XX (EPI09 uses 8XX NPC codes)
            if (sid.startsWith('9')) {
                const epiId = '8' + sid.slice(1);
                for (const talk of AppState.allTalks) {
                    if (talk.Speaker?.id === epiId && talk.videoScene) {
                        return firstIdByScene(talk.videoScene) || talk.id;
                    }
                }
            }
            // Fallback: match by NPC chinese name
            const npcData = this.getNPC(sid);
            if (npcData) {
                const npcName = cn(npcData.Name);
                if (npcName) {
                    for (const talk of AppState.allTalks) {
                        if (talk.Speaker?.Name?.[0] === npcName && talk.videoScene) {
                            return firstIdByScene(talk.videoScene) || talk.id;
                        }
                    }
                }
            }
            return '';
        },

        getTalk(id) {
            if (id == null) return null;
            const key = String(id);
            const direct = AppState.talksMap.get(key);
            if (direct) return direct;
            // Unit8 uses videoScene names (e.g. "jimmy_001") as TalkInfo.id —
            // resolve to the AVG Talk entry with smallest step whose videoScene matches.
            if (!/^\d+$/.test(key)) {
                let first = null;
                for (const talk of AppState.talksMap.values()) {
                    if (talk.videoScene === key) {
                        const step = parseInt(talk.step) || 0;
                        if (!first || step < (parseInt(first.step) || 0)) first = talk;
                    }
                }
                return first || null;
            }
            return null;
        },

        getTalkSummary(talkId, sceneId) {
            if (sceneId && AppState.sceneTalkSummaries[String(sceneId)]) {
                return AppState.sceneTalkSummaries[String(sceneId)];
            }
            return AppState.talkSummaries[String(talkId)] || '';
        },

        getChapterConfig(unit, loop) {
            let unitNum = 1;
            if (unit === 'Unit3') unitNum = 3;
            else if (unit === 'Unit2') unitNum = 2;
            else if (unit === 'Unit8') unitNum = 8;
            else if (unit === 'Unit9') unitNum = 9;
            const loopNum = parseInt(loop.replace('loop', ''));
            const id = String(unitNum * 100 + loopNum);
            return AppState.chapterConfigMap.get(id) || null;
        },

        extractNpcKey(resPath) {
            if (!resPath) return '';
            const m = resPath.match(/_npc_([A-Za-z]+)\d*$/);
            return m ? m[1] : '';
        },

        // 从起始 Talk ID 遍历对话链，返回节点数组
        // 每个节点: { talk, branches: null | [{text, targetId}] }
        // 分支检测: script === "1" 且 Parameters 含 ParameterStr/ParameterInt
        buildDialogueChain(startId) {
            const chain = [];
            const visited = new Set();
            let currentId = String(startId);

            while (currentId && !visited.has(currentId)) {
                visited.add(currentId);
                const talk = this.getTalk(currentId);
                if (!talk) break;

                const node = { talk, branches: null };

                // 检测分支: script "1" 或 "branches" + Parameters 含 ParameterStr/ParameterInt
                if ((talk.script === '1' || talk.script === 'branches') && talk.Parameters && talk.Parameters.length > 0) {
                    const branchParams = talk.Parameters.filter(p => p.ParameterStr && p.ParameterInt);
                    if (branchParams.length > 0) {
                        node.branches = branchParams.map(p => ({
                            text: p.ParameterStr,
                            targetId: String(p.ParameterInt)
                        }));
                        chain.push(node);
                        break; // 分支处停止主链
                    }
                }

                if (!talk.next) {
                    // Lie (指证) entries: auto-follow ParameterInt0 jump target
                    const isLie = talk.script === 'Lie' || talk.script === 'lie';
                    const lieTarget = talk.Parameters?.[0]?.ParameterInt;
                    if (isLie && lieTarget && lieTarget !== '0') {
                        chain.push(node);
                        currentId = lieTarget;
                        continue;
                    }
                    // 无 next → 对话结束
                    chain.push(node);
                    break;
                }

                const nextStr = String(talk.next);
                if (nextStr.includes('/')) {
                    // 旧格式分支: next = "id1/id2/id3"
                    const branchIds = nextStr.split('/');
                    const params = talk.Parameters || [];
                    node.branches = branchIds.map((bid, i) => ({
                        text: params[i]?.ParameterStr || `选项 ${i + 1}`,
                        targetId: bid.trim()
                    }));
                    chain.push(node);
                    break;
                }

                chain.push(node);
                currentId = nextStr;
            }
            return chain;
        }
    };

    // ===== UI =====
    const UI = {
        updateStatus(text) {
            document.getElementById('statusBar').textContent = text;
        },

        _modalHistory: [],

        showStoryOverview() {
            const loop = AppState.currentLoop;
            const text = AppState.storyOverview[loop];
            const titleEl = document.getElementById('modalTitle');
            const contentEl = document.getElementById('modalContent');
            this._modalHistory = [];
            if (titleEl) delete titleEl.dataset.itemId;
            if (!text) {
                titleEl.textContent = '故事概览';
                contentEl.innerHTML = '<p style="color:var(--text-muted)">当前循环暂无故事概览数据</p>';
                document.getElementById('evidenceModal').classList.add('active');
                return;
            }
            titleEl.textContent = '故事概览 — ' + (loop || '').replace('loop', 'Loop ');
            const html = text.trim().split('\n').map(line => {
                line = line.trim();
                if (!line) return '<br>';
                if (line.startsWith('【'))
                    return `<p style="color:var(--highlight);font-weight:600;margin-top:1rem;font-size:1.05rem;">${line}</p>`;
                return `<p style="margin:0.3rem 0;line-height:1.8;color:var(--text-secondary);">${line}</p>`;
            }).join('');
            contentEl.innerHTML = html;
            document.querySelector('#evidenceModal .modal').style.maxWidth = '800px';
            document.getElementById('evidenceModal').classList.add('active');
        },

        closeModal() {
            document.getElementById('evidenceModal').classList.remove('active');
            document.querySelector('#evidenceModal .modal').style.maxWidth = '';
            this._modalHistory = [];
            const titleEl = document.getElementById('modalTitle');
            if (titleEl) delete titleEl.dataset.itemId;
            // if a dialog was playing inside the drawer, close it to clear DialogController state
            if (typeof DialogController !== 'undefined'
                && DialogController._state
                && DialogController._state.containerId === 'npcDrawerDialog') {
                DialogController.close();
                DialogController._state.containerId = null;
            }
        },

        modalBack() {
            if (this._modalHistory.length > 0) {
                const prevId = this._modalHistory.pop();
                this._showEvidenceModalInner(prevId, false);
            }
        },

        // NPC drawer (rich, 3 sections) ——
        //   showNpcModal(npcId)         : 仅 NPC 档案(从 Art 视图或无场景上下文调用)
        //   showNpcModal(npcId, sceneNpcIdx) : 带场景上下文(ResPath + Talk/LoopTalk 入口 + 对白内嵌)
        showNpcModal(npcId, sceneNpcIdx) {
            const npc = AppState.npcsMap.get(String(npcId));
            if (!npc) return;
            this._modalHistory = [];

            const scene = (sceneNpcIdx != null) ? DataManager.getScene(AppState.currentSceneId) : null;
            const sceneInfo = (scene && scene.NPCInfos) ? scene.NPCInfos[sceneNpcIdx] : null;

            // 场景里实际用的立绘路径(ResPath) —— 只显示这个,不铺 IconLarge/Small
            const resPath = sceneInfo?.ResPath || '';
            const resUrl  = resPath ? Config.getAssetUrl(resPath) : '';
            const hasRes  = !!resPath;

            // Talk / LoopTalk 入口(仅场景上下文)
            const talkId = sceneInfo
                ? (sceneInfo.TalkInfo?.id || DataManager.findTalkForNPC(npc.id) || '')
                : '';
            const loopTalkId = sceneInfo?.LoopTalkInfo?.id || '';

            // 角色身份
            const roleMap = {'1':'主角','2':'搭档','3':'关键NPC','4':'受害者','5':'NPC','6':'嫌疑人'};
            const roleName = roleMap[npc.role] || npc.role || '未知';

            const titleEl = document.getElementById('modalTitle');
            const cnName = cn(npc.Name) || npc.id;
            const enName = npc.Name?.[1] || '';
            titleEl.innerHTML = `
                <div class="drawer-kicker">NPC · #${escapeHtml(String(npc.id))}</div>
                <div class="drawer-name">${escapeHtml(cnName)}</div>
                <div class="drawer-sub">${escapeHtml(roleName)}${enName ? ' · ' + escapeHtml(enName) : ''}${npc.Chapter ? ' · ' + escapeHtml(npc.Chapter) : ''}</div>
            `;
            titleEl.dataset.itemId = '';

            // ============ Section 1: 立绘 + 资源名 + 美术需求 ============
            let html = `<section class="npc-section npc-portrait-section">`;
            html += `<div class="npc-portrait ${hasRes ? '' : 'missing'}">`;
            if (hasRes) {
                html += `<img src="${resUrl}" alt="${escapeHtml(cnName)}" onerror="this.closest('.npc-portrait').classList.add('miss-broken'); this.remove();">`;
            } else {
                html += `<div class="npc-portrait-q">?</div>`;
            }
            html += `</div>`;
            html += `<div class="npc-portrait-meta">`;
            if (npc.ArtRequirement) {
                html += `<div class="smallcap">美术需求</div>`;
                html += `<div class="npc-art-req">${escapeHtmlWithBr(npc.ArtRequirement)}</div>`;
            }
            if (!resPath) {
                html += `<div class="art-missing">[!] NPCInfo.ResPath 未填,场景里没有指定立绘</div>`;
            }
            html += `</div></section>`;

            // ============ Section 2: 对白(drawer 内嵌，AVG 流水式) ============
            // scene context(场景名 · NPC 简述)，AVG tabs(talk / loopTalk id 芯片)，stage 容器由 DialogController 填充
            const sceneName = scene?.sceneName || '';
            html += `<section class="npc-section npc-dialog-section">`;

            // tabs 行 —— 一个或两个 id 芯片(首次/重复)
            if (talkId || loopTalkId) {
                html += `<div class="avg-tabs">`;
                if (talkId) {
                    html += `<button class="avg-tab active" data-talk="${escapeHtml(talkId)}" onclick="UI._switchNpcTab(this, ${sceneNpcIdx}, 'talk')">#${escapeHtml(talkId)}</button>`;
                }
                if (loopTalkId && loopTalkId !== talkId) {
                    html += `<button class="avg-tab" data-talk="${escapeHtml(loopTalkId)}" onclick="UI._switchNpcTab(this, ${sceneNpcIdx}, 'loopTalk')">#${escapeHtml(loopTalkId)}</button>`;
                }
                html += `</div>`;
            }

            // scene context line
            if (sceneName || cnName) {
                html += `<div class="avg-ctx mono">`;
                if (sceneName) html += `<span class="avg-ctx-scene">${escapeHtml(sceneName)}</span>`;
                if (sceneName && cnName) html += `<span class="avg-ctx-sep">·</span>`;
                html += `<span class="avg-ctx-desc">${escapeHtml(cnName)} · ${talkId || loopTalkId ? '点击 stage 播放' : '无对话'}</span>`;
                html += `</div>`;
            }

            // stage 容器 —— DialogController._renderStream 会往这里写 .avg-stage 等
            html += `<div id="npcDrawerDialog" class="npc-dialog-stage"></div>`;

            if (!talkId && !loopTalkId) {
                html += `<div class="dlg-entry-empty" style="padding:10px 0;">该 NPC 在本场景无对话</div>`;
            }
            html += `</section>`;

            // ============ Section 3: 相关证词 (默认折叠) ============
            const testimonies = AppState.testimoniesByNpc?.get(String(npc.id)) || [];
            const hasTestimonies = testimonies.length > 0;
            html += `<section class="npc-section npc-testimony-section collapsed">`;
            html += `<button class="testimony-toggle" onclick="UI._toggleTestimony(this)" type="button">
                <span class="chev">▸</span>
                <span class="smallcap">相关证词</span>
                <span class="section-count">${testimonies.length}</span>
                ${hasTestimonies ? '<span class="toggle-hint">点击展开</span>' : ''}
            </button>`;
            html += `<div class="npc-testimony-list-wrap">`;
            if (hasTestimonies) {
                html += `<div class="npc-testimony-list">`;
                testimonies.forEach(t => {
                    const zh = (Array.isArray(t.testimony) ? t.testimony[0] : t.testimony) || '';
                    const en = (Array.isArray(t.testimony) ? t.testimony[1] : '') || '';
                    html += `<div class="npc-testimony-item">
                        <div class="quote">"${escapeHtml(zh)}"</div>
                        ${en ? `<div class="quote-en">${escapeHtml(en)}</div>` : ''}
                        <div class="quote-meta">#${escapeHtml(String(t.id))} · type ${escapeHtml(String(t.testimonyType || '?'))}${t.triggerType ? ' · trigger ' + escapeHtml(String(t.triggerType)) : ''}</div>
                    </div>`;
                });
                html += `</div>`;
            } else {
                html += `<div class="dlg-entry-empty" style="padding:10px 0;">暂无绑定到该 NPC 的证词(或 TestimonyItem 未加载)</div>`;
            }
            html += `</div>`;
            html += `</section>`;

            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('evidenceModal').classList.add('active');

            // 自动开播第一段对话(优先 talk，没有就 loopTalk)
            if (sceneNpcIdx != null) {
                if (talkId) {
                    setTimeout(() => DialogController.start(sceneNpcIdx, 'talk', 'npcDrawerDialog'), 60);
                } else if (loopTalkId) {
                    setTimeout(() => DialogController.start(sceneNpcIdx, 'loopTalk', 'npcDrawerDialog'), 60);
                }
            }
        },

        // 相关证词折叠 / 展开
        _toggleTestimony(btn) {
            const section = btn.closest('.npc-testimony-section');
            if (!section) return;
            section.classList.toggle('collapsed');
        },

        // tab 切换 —— 激活对应 tab 并重新开播那一段
        _switchNpcTab(tabEl, sceneNpcIdx, talkType) {
            tabEl.parentElement.querySelectorAll('.avg-tab').forEach(t => t.classList.remove('active'));
            tabEl.classList.add('active');
            DialogController.start(sceneNpcIdx, talkType, 'npcDrawerDialog');
        },

        // 场景点击 NPC 立绘/roster/info 卡 → 调这个(传 NPCInfos 的 index)
        showNpcDrawerBySceneIdx(sceneNpcIdx) {
            const scene = DataManager.getScene(AppState.currentSceneId);
            const info = scene?.NPCInfos?.[sceneNpcIdx];
            const npcId = info?.NPC?.id;
            if (!npcId) return;
            this.showNpcModal(npcId, sceneNpcIdx);
        },

        // 卡片 "▶ 播放" 按钮的便捷入口 —— 位置参数版(避免 inline onclick 里 JSON 转义)
        playTalkInDrawer(talkId, kicker, title, sub) {
            this.showDialogDrawer(talkId, {
                kicker: kicker || 'DIALOG',
                title: title || ('Talk #' + talkId),
                sub: sub || ''
            });
        },

        // 通用对白抽屉 —— 无 NPC 上下文的场合(cutscene / event / ending / expose)用这个
        showDialogDrawer(talkId, opts) {
            if (!talkId) return;
            opts = opts || {};
            const titleEl = document.getElementById('modalTitle');
            const contentEl = document.getElementById('modalContent');
            this._modalHistory = [];
            if (titleEl) delete titleEl.dataset.itemId;

            titleEl.innerHTML = `
                <div class="drawer-kicker">${escapeHtml(opts.kicker || 'DIALOG')}</div>
                <div class="drawer-name">${escapeHtml(opts.title || 'Talk #' + talkId)}</div>
                ${opts.sub ? `<div class="drawer-sub">${escapeHtml(opts.sub)}</div>` : ''}
            `;

            let inner = `<section class="npc-section npc-dialog-section">`;
            if (opts.contextLine) {
                inner += `<div class="avg-ctx mono">${opts.contextLine}</div>`;
            }
            inner += `<div id="npcDrawerDialog" class="npc-dialog-stage"></div>`;
            inner += `</section>`;
            contentEl.innerHTML = inner;

            document.getElementById('evidenceModal').classList.add('active');
            // 等 drawer slide-in 一帧再 start(containerId 传 'npcDrawerDialog' 走 stream 路径)
            setTimeout(() => DialogController.startFromTalkId(talkId, 'npcDrawerDialog'), 60);
        },

        showSceneModal(sceneKey) {
            const m = (this._cachedMergedScenes || []).find(s => s.key === sceneKey);
            if (!m) return;
            this._modalHistory = [];
            const titleEl = document.getElementById('modalTitle');
            titleEl.textContent = `${m.sceneName} (${m.sceneNameEn})`;
            titleEl.dataset.itemId = '';

            const loopTags = m.loops.sort().map(l => `L${l}`).join(' ');
            const bgName = m.backgroundImage ? m.backgroundImage.split('\\').pop() : '';

            let html = `
                <p><strong>出现循环：</strong>${escapeHtml(loopTags)}</p>
                ${bgName ? `<p><strong>背景图：</strong><span class="copy-tag" onclick="event.stopPropagation();copyText('${escapeHtml(bgName)}', this)">${escapeHtml(bgName)}</span></p>` : '<p><strong>背景图：</strong><span style="color:var(--warning)">未配置</span></p>'}
            `;

            if (m.npcMap.size > 0) {
                html += `<p><strong>关联NPC：</strong>${m.npcMap.size}个</p>`;
                m.npcMap.forEach((npcEntry, npcName) => {
                    const resList = Array.from(npcEntry.resPaths);
                    const resHtml = resList.map(r => `<span class="copy-tag" onclick="event.stopPropagation();copyText('${escapeHtml(r)}', this)">${escapeHtml(r)}</span>`).join(' ');
                    html += `<p style="padding-left:1rem;color:var(--text-muted);">└ <span style="color:var(--highlight);">${escapeHtml(npcName)}</span> — ${resList.length}个立绘 ${resHtml}</p>`;
                });
            }

            if (m.ArtRequirement) {
                html += `<div class="art-highlight"><strong style="color: var(--highlight);">[ART] 美术需求：</strong><br>${escapeHtmlWithBr(m.ArtRequirement)}</div>`;
            } else {
                html += `<div class="art-missing"><strong>[!] 未填写美术需求</strong></div>`;
            }

            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('evidenceModal').classList.add('active');
        },

        showEvidenceModal(id) {
            this._showEvidenceModalInner(id, true);
        },

        _showEvidenceModalInner(id, pushHistory) {
            const item = DataManager.getItem(id);
            if (!item) return;

            // 记录历史（只在正向导航时 push）
            const currentId = document.getElementById('modalTitle')?.dataset?.itemId;
            if (pushHistory && currentId) {
                this._modalHistory.push(currentId);
            }

            const name = DataManager.itemName(item);
            const desc = DataManager.itemDesc(item);
            const shortDesc = DataManager.itemShortDesc(item);
            const location = DataManager.itemLocation(item);
            const typeName = DataManager.typeName(item.itemType);

            const titleEl = document.getElementById('modalTitle');
            titleEl.textContent = `${name} (ID: ${item.id})`;
            titleEl.dataset.itemId = String(item.id);

            let html = `
                <p><strong>类型：</strong>${escapeHtml(typeName)}</p>
                <p><strong>位置：</strong>${escapeHtml(location)}</p>
                <p><strong>章节：</strong>${escapeHtml(item.Chapter)}</p>
                <p><strong>详情描述：</strong>${escapeHtml(desc)}</p>
                ${shortDesc ? `<p><strong>简述：</strong>${escapeHtml(shortDesc)}</p>` : ''}
                ${item.canAnalyzed === 'true' ? (() => {
                    const target = DataManager.getItem(item.analysedEvidence);
                    const tName = target ? DataManager.itemName(target) : '?';
                    return `<p class="derive-link" onclick="UI.showEvidenceModal('${item.analysedEvidence}')"><strong>🔍 查看分析后 →</strong> ${escapeHtml(tName)} (ID: ${item.analysedEvidence})</p>`;
                })() : ''}
                ${item.canCombined === 'true' ? (() => {
                    const product = DataManager.findCombineProduct(item.id);
                    if (!product) return '<p style="color:var(--warning)">可合成，但未找到对应产物</p>';
                    const pName = DataManager.itemName(product);
                    const ingredients = (product.combineParameter || []).map(pid => { const p = DataManager.getItem(pid); return p ? `${DataManager.itemName(p)}(${pid})` : pid; });
                    return `<p class="derive-link" onclick="UI.showEvidenceModal('${product.id}')"><strong>🔗 查看合成后 →</strong> ${escapeHtml(pName)} (ID: ${product.id})<br><span style="color:var(--text-dim);margin-left:2em;">合成原料：${escapeHtml(ingredients.join(' + '))}</span></p>`;
                })() : ''}
                ${Array.isArray(item.combineParameter) && item.combineParameter.length ? (() => {
                    const parts = item.combineParameter.map(pid => {
                        const p = DataManager.getItem(pid);
                        const name = p ? DataManager.itemName(p) : '?';
                        return `<span class="copy-tag" onclick="event.stopPropagation();UI.showEvidenceModal('${pid}')" style="cursor:pointer">${escapeHtml(name)}(${pid})</span>`;
                    });
                    return `<p class="derive-link"><strong>🧩 合成原料：</strong>${parts.join(' + ')}</p>`;
                })() : ''}
                ${item.folderPath ? `<p><strong>文件夹：</strong>${escapeHtml(item.folderPath)}</p>` : ''}
                ${item.desSpritePath ? `<p><strong>详情图：</strong><span class="copy-tag" onclick="copyText('${escapeHtml(item.desSpritePath)}', this)">${escapeHtml(item.desSpritePath)}</span></p>` : '<p><strong>详情图：</strong><span style="color:var(--warning)">未配置</span></p>'}
                ${item.mapSpritePath ? `<p><strong>地图图：</strong><span class="copy-tag" onclick="copyText('${escapeHtml(item.mapSpritePath)}', this)">${escapeHtml(item.mapSpritePath)}</span></p>` : '<p><strong>地图图：</strong><span style="color:var(--warning)">未配置</span></p>'}
                ${item.iconPath ? `<p><strong>Icon：</strong><span class="copy-tag" onclick="copyText('${escapeHtml(item.iconPath)}', this)">${escapeHtml(item.iconPath)}</span></p>` : '<p><strong>Icon：</strong><span style="color:var(--warning)">未配置</span></p>'}
            `;

            if (item.ArtRequirement) {
                html += `
                    <div class="art-highlight">
                        <strong style="color: var(--highlight);">[ART] 美术需求：</strong><br>
                        ${escapeHtmlWithBr(item.ArtRequirement)}
                    </div>
                `;
            } else {
                html += `<div class="art-missing"><strong>[!] 未填写美术需求</strong></div>`;
            }

            // 有历史时显示返回按钮
            if (this._modalHistory.length > 0) {
                html = `<button class="btn" onclick="UI.modalBack()" style="margin-bottom:0.75rem;font-size:0.9rem;padding:0.3rem 0.8rem;background:var(--surface);border:1px solid var(--border);color:var(--text);cursor:pointer;border-radius:4px;">← 返回上一个</button>` + html;
            }

            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('evidenceModal').classList.add('active');
        },

        renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (AppState.currentView === 'art') {
                this.renderArtSidebar(sidebar);
            } else {
                this.renderFlowSidebar(sidebar);
            }
            // sync static sidebar shell (loop chips + current loop title)
            if (typeof syncLoopChips === 'function') syncLoopChips();
            if (typeof syncLoopHeader === 'function') syncLoopHeader();
        },

        renderArtSidebar(sidebar) {
            const chapter = DataManager.chapter(AppState.currentUnit);
            const tab = ArtOverviewView.currentTab;
            let html = '';

            if (tab === 'evidence') {
                const items = DataManager.itemsByChapter(chapter);
                const hasArt = items.filter(i => i.ArtRequirement).length;
                const noArt = items.length - hasArt;
                const byLocation = {};
                items.forEach(i => {
                    const loc = DataManager.itemLocation(i) || '未知位置';
                    if (!byLocation[loc]) byLocation[loc] = [];
                    byLocation[loc].push(i);
                });

                html += `
                    <div class="sidebar-section">证据统计 (${chapter})</div>
                    <div style="padding: 0.5rem 1rem; font-size: 0.85rem;">
                        <div>总计: <strong>${items.length}</strong> 个证据</div>
                        <div style="color: var(--success);">已填美术需求: ${hasArt}</div>
                        <div style="color: var(--warning);">未填美术需求: ${noArt}</div>
                    </div>
                    <div class="sidebar-section">按位置分组</div>
                `;
                for (const loc of Object.keys(byLocation)) {
                    const count = byLocation[loc].length;
                    const artCount = byLocation[loc].filter(i => i.ArtRequirement).length;
                    html += `
                        <div class="sidebar-item" onclick="ArtOverviewView.filterByLocation('${loc.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
                            ${escapeHtml(loc)} <span class="badge">${count}</span>
                            ${artCount < count ? `<span class="badge" style="background:var(--warning)">${count - artCount}</span>` : ''}
                        </div>
                    `;
                }
            } else if (tab === 'npc') {
                const npcs = AppState.allNPCs.filter(n => n.Chapter === chapter);
                const hasArt = npcs.filter(n => n.ArtRequirement).length;
                html += `
                    <div class="sidebar-section">人物统计 (${chapter})</div>
                    <div style="padding: 0.5rem 1rem; font-size: 0.85rem;">
                        <div>总计: <strong>${npcs.length}</strong> 个人物</div>
                        <div style="color: var(--success);">已填美术需求: ${hasArt}</div>
                        <div style="color: var(--warning);">未填美术需求: ${npcs.length - hasArt}</div>
                    </div>
                `;
            } else if (tab === 'scene') {
                const chPrefix = chapter === 'EPI01' ? '1' : chapter === 'EPI02' ? '2' : chapter === 'EPI08' ? '8' : chapter === 'EPI09' ? '9' : '3';
                const rawScenes = AppState.allScenes.filter(s => s.sceneId && String(s.sceneId).startsWith(chPrefix));
                const merged = ArtOverviewView._mergeScenes(rawScenes);
                const hasArt = merged.filter(m => m.ArtRequirement).length;
                let totalNpcs = 0, npcWithArt = 0;
                merged.forEach(m => {
                    m.npcMap.forEach(entry => {
                        totalNpcs++;
                        if (entry.ArtRequirement) npcWithArt++;
                    });
                });
                html += `
                    <div class="sidebar-section">场景统计 (${chapter})</div>
                    <div style="padding: 0.5rem 1rem; font-size: 0.85rem;">
                        <div>物理场景: <strong>${merged.length}</strong> 个</div>
                        <div style="color: var(--success);">场景背景已填: ${hasArt}</div>
                        <div style="color: var(--warning);">场景背景未填: ${merged.length - hasArt}</div>
                        <div style="margin-top:0.3rem;">场景内NPC: <strong>${totalNpcs}</strong> 个</div>
                        <div style="color: var(--success);">立绘需求已填: ${npcWithArt}</div>
                        <div style="color: var(--warning);">立绘需求未填: ${totalNpcs - npcWithArt}</div>
                    </div>
                `;
            }

            sidebar.innerHTML = html;
        },

        renderFlowSidebar(sidebar) {
            const loop = AppState.loopData;
            let html = '';

            if (!loop) {
                html = `<div class="sidebar-section">无循环数据</div>`;
                sidebar.innerHTML = html;
                return;
            }

            // Loop title now rendered by static .loop-current above; only time remains here
            if (loop.time) {
                html += `<div style="padding: 0.15rem 1rem; font-family: var(--ff-mono); font-size: 10px; color: var(--gold); letter-spacing: .1em;">${escapeHtml(loop.time)}</div>`;
            }
            if (loop.target) {
                html += `<div style="padding: 0.3rem 1rem; font-size: 0.8rem; color: var(--text-muted);">${escapeHtml(loop.target)}</div>`;
            }

            // Opening
            if (loop.opening && loop.opening.length > 0) {
                html += `
                    <div class="sidebar-item ${AppState.currentPhase === 'opening' ? 'active' : ''}"
                         onclick="FlowView.showPhase('opening')">
                        <span class="phase-tag opening">开篇</span> (${loop.opening.length}场景)
                    </div>
                `;
            }

            // Scene list: support both old free_phase and new scenes{unlocked,locked,closed}
            // Unit9 yaml uses nested form { unlocked: { 地点A: [id...], 地点B: [id...] } }
            // Other units use flat form { unlocked: [id, id, ...] }; flatten if object.
            const flattenScenes = (raw) => {
                const extractId = (x) => (x && typeof x === 'object' && x.id != null) ? x.id : x;
                if (Array.isArray(raw)) return raw.map(extractId);
                if (raw && typeof raw === 'object') {
                    return Object.values(raw).flat().map(extractId);
                }
                return [];
            };
            if (loop.scenes) {
                const unlocked = flattenScenes(loop.scenes.unlocked);
                const locked = flattenScenes(loop.scenes.locked);
                const closed = flattenScenes(loop.scenes.closed);
                const locations = AppState.locationsData?.locations;

                // Helper: extract location code (last 2 digits) from scene ID
                const locCode = (sid) => String(sid).slice(-2);
                const padCode = (n) => String(n).padStart(2, '0');

                // Helper: find location group for a scene ID
                const findLocation = (sid) => {
                    if (!locations) return null;
                    const code = locCode(sid);
                    return locations.find(loc =>
                        padCode(loc.entry) === code ||
                        (loc.children || []).map(c => padCode(c)).includes(code)
                    );
                };

                // Helper: group items by location, preserving order
                const groupByLocation = (items, getId) => {
                    const groups = new Map(); // locName → items[]
                    const noGroup = [];
                    items.forEach(item => {
                        const sid = getId(item);
                        const loc = findLocation(sid);
                        if (loc) {
                            if (!groups.has(loc.name)) groups.set(loc.name, []);
                            groups.get(loc.name).push(item);
                        } else {
                            noGroup.push(item);
                        }
                    });
                    return { groups, noGroup };
                };

                // Render unlocked scenes grouped by location
                if (unlocked.length > 0) {
                    html += `<div class="sidebar-section">解锁 (${unlocked.length})</div>`;

    // ===== Doubt View (疑点详情浮层) =====
    const DoubtView = {
        // Unit3 30xx 系列 ID 未在 ID 中编码 loop, 需要静态映射
        _u3loopMap: {
            '3001': 'loop1', '3002': 'loop1',
            '3003': 'loop2', '3004': 'loop2', '3005': 'loop2', '3014': 'loop2',
            '3006': 'loop3', '3007': 'loop3', '3008': 'loop3', '3010': 'loop3', '3011': 'loop3',
            '3009': 'loop4', '3012': 'loop4', '3013': 'loop4'
        },

        unitPrefix(unit) {
            if (unit === 'Unit1') return '1';
            if (unit === 'Unit3') return '3';
            if (unit === 'Unit9') return '9';
            return null;
        },

        doubtLoop(id) {
            const s = String(id);
            if (this._u3loopMap[s]) return this._u3loopMap[s];
            const d = s[1];
            if (d >= '1' && d <= '6') return 'loop' + d;
            return null;
        },

        doubtsInLoop(unit, loop) {
            const prefix = this.unitPrefix(unit);
            if (!prefix) return [];
            return AppState.allDoubts.filter(d => {
                const s = String(d.id);
                return s[0] === prefix && this.doubtLoop(s) === loop;
            });
        },

        condKey(c) { return `${c.type}:${c.param}`; },

        isSat(c) { return AppState.satisfiedConditions.has(this.condKey(c)); },

        progress(doubt) {
            const conds = doubt.condition || [];
            const done = conds.filter(c => this.isSat(c)).length;
            return { done, total: conds.length };
        },

        resolveCondition(c) {
            const type = String(c.type);
            const pid = String(c.param);
            if (type === '1') {
                const item = AppState.itemsMap.get(pid);
                return {
                    cls: 'item',
                    typeLabel: '道具',
                    name: item ? (cn(item.Name) || '(未命名)') : '(未找到)'
                };
            }
            if (type === '3') {
                const t = AppState.allTestimonies.find(x => String(x.id) === pid);
                let textZh = '(未找到)';
                let npcName = '';
                if (t && t.testimony) textZh = cn(t.testimony) || '(无文本)';
                const npcId = pid.length >= 3 ? pid.slice(0, 3) : '';
                const npc = AppState.npcsMap.get(npcId);
                if (npc) npcName = cn(npc.Name) || '';
                return {
                    cls: 'testi',
                    typeLabel: '证词',
                    name: npcName ? `${npcName}·${textZh}` : textZh
                };
            }
            if (type === '2') {
                return { cls: 'rel', typeLabel: '关系网', name: `关系连接 ${pid}` };
            }
            return { cls: '', typeLabel: '未知', name: pid };
        },

        showList() {
            this.render();
            document.getElementById('doubtModal').classList.add('active');
        },

        render() {
            const doubts = this.doubtsInLoop(AppState.currentUnit, AppState.currentLoop);
            const loopLabel = (AppState.currentLoop || '').replace('loop', 'Loop ');
            const doneCount = doubts.filter(d => {
                const p = this.progress(d);
                return p.total > 0 && p.done === p.total;
            }).length;

            let html = `
                <div class="doubt-list-header">
                    <span class="dl-title">疑点面板</span>
                    <span class="dl-sub">${escapeHtml(AppState.currentUnit)} · ${escapeHtml(loopLabel)} · ${doneCount}/${doubts.length}</span>
                </div>
            `;

            if (doubts.length === 0) {
                html += `<div class="doubt-list-empty">当前 Loop 暂无疑点配置</div>`;
                document.getElementById('doubtDrawerContent').innerHTML = html;
                return;
            }

            html += `<div class="doubt-cond-toolbar" style="margin-top:0;border-top:0;padding-top:0;">
                <button onclick="DoubtView.setAllLoop(true)">全部已满足</button>
                <button onclick="DoubtView.setAllLoop(false)">全部清除</button>
            </div>`;

            doubts.forEach(doubt => {
                const { done, total } = this.progress(doubt);
                const isDone = total > 0 && done === total;

                html += `
                    <div class="doubt-card ${isDone ? 'done' : ''}">
                        <div class="doubt-card-meta">
                            <span class="doubt-label">疑点 · #${escapeHtml(String(doubt.id))}</span>
                            <span class="doubt-progress">${done} / ${total}</span>
                        </div>
                        <div class="doubt-card-title">${escapeHtml(doubt.text || '(无文本)')}</div>
                        <div class="doubt-cond-list">
                `;

                (doubt.condition || []).forEach(c => {
                    const info = this.resolveCondition(c);
                    const sat = this.isSat(c);
                    const type = String(c.type);
                    const param = String(c.param);
                    html += `
                        <div class="doubt-cond-row ${info.cls} ${sat ? 'sat' : ''}"
                             onclick="DoubtView.toggleCondition('${type}','${param}')">
                            <span class="cond-icon"></span>
                            <span class="cond-type">${escapeHtml(info.typeLabel)}</span>
                            <span class="cond-pid">#${escapeHtml(param)}</span>
                            <span class="cond-name" title="${escapeHtml(info.name)}">${escapeHtml(info.name)}</span>
                            <span class="cond-dot"></span>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            });

            document.getElementById('doubtDrawerContent').innerHTML = html;
        },

        // 同步右上角入口按钮的徽章文字和样式
        refreshEntry() {
            const el = document.getElementById('doubtFloat');
            if (!el) return;
            // 隐藏条件：美术视图 / 未加载 Loop / 仍在开篇对白阶段 / 尚未选中任何阶段
            if (AppState.currentView === 'art'
                || !AppState.loopData
                || AppState.currentPhase === 'opening'
                || AppState.currentPhase == null) {
                el.classList.add('doubt-float-hidden');
                return;
            }
            el.classList.remove('doubt-float-hidden');

            const loopData = AppState.loopData;
            const doubts = this.doubtsInLoop(AppState.currentUnit, AppState.currentLoop);
            const doneCount = doubts.filter(d => {
                const p = this.progress(d);
                return p.total > 0 && p.done === p.total;
            }).length;

            const loopLabel = (AppState.currentLoop || '').replace('loop', 'LOOP ');
            // 注：loop.title 是策划导航标签（含剧透，如"厨师的代价"→James），
            //     绝不可展示给玩家——浮窗只显示 target 问句。
            const loopTarget = loopData.target || '(本 Loop 未填写目标)';

            document.getElementById('doubtFloatKicker').textContent = '当前目标';
            document.getElementById('doubtFloatLoop').textContent = loopLabel;
            document.getElementById('doubtFloatTarget').textContent = loopTarget;
            const progressText = doubts.length === 0 ? '无配置' : `${doneCount} / ${doubts.length}`;
            document.getElementById('doubtFloatPill').textContent = progressText;
            const miniPillEl = document.getElementById('doubtFloatMiniPill');
            if (miniPillEl) miniPillEl.textContent = doubts.length === 0 ? '—' : `${doneCount}/${doubts.length}`;

            const pct = doubts.length === 0 ? 0 : Math.round((doneCount / doubts.length) * 100);
            document.getElementById('doubtFloatBarFill').style.width = pct + '%';
            el.classList.toggle('done', doubts.length > 0 && doneCount === doubts.length);

            // 应用折叠状态（仅当用户曾主动折叠过才生效；默认展开）
            if (localStorage.getItem('ndcDoubtFloatCollapsed') === '1') {
                el.classList.add('collapsed');
            }
        },

        // 折叠/展开浮窗（状态写入 localStorage，刷新后保持）
        toggleCollapsed() {
            const el = document.getElementById('doubtFloat');
            if (!el) return;
            const collapsed = el.classList.toggle('collapsed');
            localStorage.setItem('ndcDoubtFloatCollapsed', collapsed ? '1' : '0');
        },

        toggleCondition(type, param) {
            const key = `${type}:${param}`;
            if (AppState.satisfiedConditions.has(key)) AppState.satisfiedConditions.delete(key);
            else AppState.satisfiedConditions.add(key);
            this.render();
            this.refreshEntry();
        },

        setAllLoop(val) {
            const doubts = this.doubtsInLoop(AppState.currentUnit, AppState.currentLoop);
            doubts.forEach(d => {
                (d.condition || []).forEach(c => {
                    const key = this.condKey(c);
                    if (val) AppState.satisfiedConditions.add(key);
                    else AppState.satisfiedConditions.delete(key);
                });
            });
            this.render();
            this.refreshEntry();
        },

        close() {
            document.getElementById('doubtModal').classList.remove('active');
        }
    };

    // ===== Art Overview View (3 tabs: evidence, npc, scene) =====
    const ArtOverviewView = {
        currentTab: 'evidence',
        filterText: '',
        showOnlyNoArt: false,

        render() {
            const chapter = DataManager.chapter(AppState.currentUnit);

            // Count stats for tab badges
            const items = DataManager.itemsByChapter(chapter);
            const evNoArt = items.filter(i => !i.ArtRequirement).length;

            const npcs = AppState.allNPCs.filter(n => n.Chapter === chapter);
            const npcNoArt = npcs.filter(n => !n.ArtRequirement).length;

            const chPrefix = chapter === 'EPI01' ? '1' : chapter === 'EPI02' ? '2' : chapter === 'EPI08' ? '8' : chapter === 'EPI09' ? '9' : '3';
            const rawScenes = AppState.allScenes.filter(s => s.sceneId && String(s.sceneId).startsWith(chPrefix));
            const mergedScenes = this._mergeScenes(rawScenes);
            const scNoArt = mergedScenes.filter(m => !m.ArtRequirement).length;

            // Tab bar
            let html = `<div class="art-tab-bar">`;
            html += `<div class="art-tab ${this.currentTab === 'evidence' ? 'active' : ''}" onclick="ArtOverviewView.switchTab('evidence')">
                证据需求 ${evNoArt > 0 ? `<span class="tab-badge">${evNoArt}</span>` : `<span class="tab-badge done">${items.length}</span>`}
            </div>`;
            html += `<div class="art-tab ${this.currentTab === 'npc' ? 'active' : ''}" onclick="ArtOverviewView.switchTab('npc')">
                人物需求 ${npcNoArt > 0 ? `<span class="tab-badge">${npcNoArt}</span>` : `<span class="tab-badge done">${npcs.length}</span>`}
            </div>`;
            html += `<div class="art-tab ${this.currentTab === 'scene' ? 'active' : ''}" onclick="ArtOverviewView.switchTab('scene')">
                场景需求 ${scNoArt > 0 ? `<span class="tab-badge">${scNoArt}</span>` : `<span class="tab-badge done">${mergedScenes.length}</span>`}
            </div>`;
            html += `</div>`;

            // Tab content
            if (this.currentTab === 'evidence') {
                html += this.renderEvidenceTab(items);
            } else if (this.currentTab === 'npc') {
                html += this.renderNPCTab(npcs);
            } else {
                html += this.renderSceneTab(rawScenes);
            }

            document.getElementById('content').innerHTML = html;
            UI.renderSidebar();
        },

        switchTab(tab) {
            this.currentTab = tab;
            this.filterText = '';
            this.showOnlyNoArt = false;
            this.render();
        },

        // ---- Evidence Tab (original logic) ----
        renderEvidenceTab(allItems) {
            let items = allItems;
            if (this.filterText) {
                const q = this.filterText.toLowerCase();
                items = items.filter(i =>
                    String(i.id).includes(q) ||
                    DataManager.itemName(i).toLowerCase().includes(q) ||
                    DataManager.itemDesc(i).toLowerCase().includes(q) ||
                    DataManager.itemLocation(i).toLowerCase().includes(q) ||
                    (i.ArtRequirement || '').toLowerCase().includes(q)
                );
            }
            if (this.showOnlyNoArt) {
                items = items.filter(i => !i.ArtRequirement);
            }

            const total = items.length;
            const hasArt = items.filter(i => i.ArtRequirement).length;

            let html = `
                <div class="filter-bar">
                    <label>搜索：</label>
                    <input type="text" id="filterInput" placeholder="ID / 名称 / 描述 / 位置..."
                           value="${escapeHtml(this.filterText)}"
                           oninput="ArtOverviewView.onFilter(this.value)">
                    <button class="btn ${this.showOnlyNoArt ? 'active' : ''}"
                            onclick="ArtOverviewView.toggleNoArt()">
                        仅未填美术需求
                    </button>
                    ${this.filterText ? `<button class="btn" onclick="ArtOverviewView.clearFilter()">清除筛选</button>` : ''}
                    <span class="stats">
                        显示 ${total} 条 |
                        <span class="has-art">已填 ${hasArt}</span> /
                        <span class="no-art">未填 ${total - hasArt}</span>
                    </span>
                </div>
                <table class="evidence-table">
                    <thead>
                        <tr>
                            <th class="id-col">ID</th>
                            <th class="name-col">名称</th>
                            <th class="type-col">类型</th>
                            <th class="location-col">位置</th>
                            <th class="desc-col">描述</th>
                            <th>美术需求</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            if (items.length === 0) {
                html += `<tr><td colspan="6" style="text-align:center; color:var(--text-muted); padding:2rem;">
                    ${AppState.allItems.length === 0 ? '请先点击「加载」' : '没有匹配的证据'}
                </td></tr>`;
            }

            items.forEach(item => {
                const artClass = item.ArtRequirement ? 'art-req' : 'art-req empty';
                const artText = item.ArtRequirement || '未填写';
                html += `
                    <tr onclick="UI.showEvidenceModal('${item.id}')" style="cursor:pointer;">
                        <td class="id-col">${escapeHtml(String(item.id))}</td>
                        <td class="name-col">${escapeHtml(DataManager.itemName(item))}</td>
                        <td class="type-col"><span class="ev-type ${DataManager.typeClass(item.itemType)}">${escapeHtml(DataManager.typeName(item.itemType))}</span></td>
                        <td class="location-col">${escapeHtml(DataManager.itemLocation(item))}</td>
                        <td class="desc-col">${escapeHtml(truncate(DataManager.itemDesc(item), 80))}</td>
                        <td class="${artClass}">${escapeHtml(truncate(artText, 60))}</td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            return html;
        },

        // ---- NPC Tab ----
        renderNPCTab(allNPCs) {
            let npcs = allNPCs;
            if (this.filterText) {
                const q = this.filterText.toLowerCase();
                npcs = npcs.filter(n =>
                    String(n.id).includes(q) ||
                    cn(n.Name).toLowerCase().includes(q) ||
                    (n.Name?.[1] || '').toLowerCase().includes(q) ||
                    (n.ArtRequirement || '').toLowerCase().includes(q)
                );
            }
            if (this.showOnlyNoArt) {
                npcs = npcs.filter(n => !n.ArtRequirement);

            const total = npcs.length;
            const hasArt = npcs.filter(n => n.ArtRequirement).length;

            npcs.forEach(npc => {

                    <tr onclick="UI.showNpcModal('${npc.id}')" style="cursor:pointer;">

        },

        // ---- Scene dedup helper: merge scenes by sceneNameEn ----
        _mergeScenes(allScenes) {
            const map = new Map(); // sceneNameEn → merged object
            allScenes.forEach(s => {
                const key = s.sceneNameEn || s.sceneName || String(s.sceneId);
                if (!map.has(key)) {
                    map.set(key, {
                        key,
                        sceneName: s.sceneName || '',
                        sceneNameEn: s.sceneNameEn || '',
                        backgroundImage: s.backgroundImage || '',
                        ArtRequirement: s.ArtRequirement || '',
                        loops: [],
                        npcMap: new Map() // npcNameEn → { info, resPathSet }
                    });
                }
                const m = map.get(key);
                // Collect loop number from sceneId (2nd digit)
                const loopNum = String(s.sceneId).length >= 2 ? String(s.sceneId)[1] : '?';
                if (!m.loops.includes(loopNum)) m.loops.push(loopNum);
                // Merge ArtRequirement (take first non-empty)
                if (!m.ArtRequirement && s.ArtRequirement) m.ArtRequirement = s.ArtRequirement;
                // Merge NPCInfos
                (s.NPCInfos || []).forEach(info => {
                    const npcKey = info.NPC?.Name?.[1] || cn(info.NPC?.Name) || String(info.id);
                    if (!m.npcMap.has(npcKey)) {
                        m.npcMap.set(npcKey, {
                            info,
                            resPaths: new Set(),
                            ArtRequirement: info.ArtRequirement || ''
                        });
                    }
                    const npcEntry = m.npcMap.get(npcKey);
                    if (info.ResPath) npcEntry.resPaths.add(info.ResPath.split('\\').pop());
                    if (info.ClickResPath) npcEntry.resPaths.add(info.ClickResPath.split('\\').pop());
                    if (!npcEntry.ArtRequirement && info.ArtRequirement) npcEntry.ArtRequirement = info.ArtRequirement;
                });
            });
            return Array.from(map.values());
        },

        renderSceneTab(allScenes) {

            if (this.filterText) {

                    (m.ArtRequirement || '').toLowerCase().includes(q)
                );
            }
            if (this.showOnlyNoArt) {
                merged = merged.filter(m => !m.ArtRequirement);
            }

            const total = merged.length;
            const hasArt = merged.filter(m => m.ArtRequirement).length;

            let html = `
                <div class="filter-bar">
                    <label>搜索：</label>
                    <input type="text" id="filterInput" placeholder="场景名称..."
                           value="${escapeHtml(this.filterText)}"

                    <span class="stats">

                    </span>
                </div>
                <table class="evidence-table">
                    <thead>
