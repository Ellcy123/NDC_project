<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDC Preview v4.0 (New Table)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
    <script>
    // js-yaml: 根据环境选择路径
    (function(){
        var h = location.hostname;
        var isLocal = (h === 'localhost' || h === '127.0.0.1' || location.protocol === 'file:');
        var src = isLocal ? '/NDC_project/preview_new2/js-yaml.min.js' : '/preview_new2/js-yaml.min.js';
        document.write('<scr'+'ipt src="'+src+'"><\/scr'+'ipt>');
    })();
    </script>
    <style>
        /* ===== NOIR PALETTE (legacy names preserved; prototype tokens added) ===== */
        :root {
            --primary: #0a0a0a;
            --secondary: #121212;
            --card: #201d1a;
            --accent: #b84040;
            --highlight: #e8c678;
            --text-primary: #f0e6d2;
            --text-secondary: #d8cfbb;
            --text-muted: #968c78;
            --success: #6b8f5e;
            --warning: #c78a3a;
            --border: #2e2823;
            --coal-3: #1a1818;
            --ink: #201d1a;
            --ink-2: #2a2623;
            --rule: #2e2823;
            --rule-2: #3a322b;
            --gold-2: #b89650;
            --parchment: #f0e6d2;
            --parch-mute: #c9bfa9;
            --text-dim: #968c78;
            --text-faint: #60584c;
            --brick: #b84040;
            --brick-2: #8a2e2e;
            --gold: #e8c678;
            --ok: #6b8f5e;
            --ok-2: #3f5a38;
            --warn: #c78a3a;
            --miss: #b84040;
            --locked: #4a443d;
            --ff-serif: "Playfair Display", "Noto Serif SC", "Cormorant Garamond", Georgia, serif;
            --ff-sans: "Inter", "Noto Sans SC", ui-sans-serif, system-ui, -apple-system, sans-serif;
            --ff-mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, Menlo, monospace;
        }

        /* ===== Paper grain & vignette (fixed overlays, pointer-events: none) ===== */
        .grain {
            pointer-events: none;
            position: fixed; inset: 0; z-index: 9999;
            opacity: .06; mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.92' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.9 0 0 0 0 0.85 0 0 0 0 0.7 0 0 0 .6 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
        }
        .vignette {
            pointer-events: none;
            position: fixed; inset: 0; z-index: 9998;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.45) 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--ff-sans);
            background: var(--primary);
            color: var(--text-secondary);
            line-height: 1.55;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            font-size: 13px;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ===== Header (noir topbar) ===== */
        .header {
            background:
                linear-gradient(180deg, rgba(255,255,255,.02) 0%, rgba(0,0,0,.25) 100%),
                var(--secondary);
            padding: 0 1.25rem;
            height: 56px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            flex-shrink: 0;
        }
        .header::after {
            content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-2) 20%, var(--gold-2) 80%, transparent);
            opacity: .18;
        }

        .header-title {
            font-family: var(--ff-serif);
            font-size: 1rem;
            color: var(--parchment);
            font-weight: 600;
            letter-spacing: .04em;
        }

        /* ===== Brand block (left of header) ===== */
        .brand {
            display: flex; align-items: center; gap: 10px;
            min-width: 200px;
        }
        .brand-mark {
            width: 28px; height: 28px; border-radius: 2px;
            background: var(--primary); border: 1px solid var(--gold-2);
            display: grid; place-items: center;
            color: var(--highlight); font-family: var(--ff-serif); font-weight: 700;
            font-size: 14px; letter-spacing: .05em;
            box-shadow: 0 0 0 1px var(--secondary) inset;
            flex-shrink: 0;
        }
        .brand-text { line-height: 1.15; }
        .brand-name {
            font-family: var(--ff-serif); font-size: 15px;
            color: var(--parchment); letter-spacing: .04em;
        }
        .brand-sub {
            font-family: var(--ff-mono); font-size: 9.5px;
            color: var(--text-faint); letter-spacing: .18em; text-transform: uppercase;
            margin-top: 1px;
        }

        /* ===== Header center (unit/loop pickers + load) ===== */
        .header-center {
            flex: 1;
            display: flex; align-items: center; gap: 10px;
            justify-content: center;
        }
        .header-right {
            display: flex; gap: 4px; align-items: center;
            min-width: 200px; justify-content: flex-end;
        }

        /* select-group: UNIT label + <select> together in a framed pill */
        .select-group {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--coal-3); border: 1px solid var(--border); border-radius: 2px;
            height: 30px; padding: 0 8px 0 10px;
            transition: border-color .15s ease-out;
        }
        .select-group:hover { border-color: var(--gold-2); }
        .select-group:focus-within { border-color: var(--gold-2); }
        .select-group .select-label {
            font-family: var(--ff-mono); font-size: 9.5px;
            color: var(--gold-2); letter-spacing: .18em;
            flex-shrink: 0;
        }
        .select-group select {
            border: 0; background: transparent; height: 28px;
            padding: 0 22px 0 0;
            background-position: right 2px center;
        }
        .select-group select:hover, .select-group select:focus { border: 0; }

        /* Legacy .header-controls fallback (still referenced nowhere now, but safe) */
        .header-controls {
            display: flex;
            gap: 0.4rem;
            align-items: center;
        }

        /* primary/ghost button variants */
        .btn.primary {
            background: var(--highlight); color: var(--primary);
            border-color: var(--highlight);
            font-weight: 600;
        }
        .btn.primary:hover {
            background: var(--gold-2); color: var(--primary);
            border-color: var(--gold-2);
        }
        .btn.ghost {
            background: transparent; color: var(--text-secondary);
            border-color: transparent;
            text-decoration: none;
        }
        .btn.ghost:hover {
            color: var(--highlight); border-color: var(--border); background: var(--coal-3);
        }

        /* ===== Main Tabs (below header, above main) ===== */
        .main-tabs {
            display: flex; align-items: flex-end;
            padding: 0 20px;
            background: var(--secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .main-tab {
            position: relative;
            padding: 12px 18px 10px;
            font-family: var(--ff-serif);
            font-size: 13px; letter-spacing: .04em;
            color: var(--text-muted); background: transparent;
            border: 0; cursor: pointer;
            transition: color .15s ease-out;
            text-decoration: none;
            display: inline-flex; align-items: baseline;
        }
        .main-tab:hover { color: var(--parchment); }
        .main-tab .tab-idx {
            font-family: var(--ff-mono); font-size: 10px;
            color: var(--gold-2); margin-right: 6px;
        }
        .main-tab.active { color: var(--parchment); }
        .main-tab.active::after {
            content: ""; position: absolute; left: 10px; right: 10px; bottom: -1px; height: 2px;
            background: var(--accent);
        }
        .tab-meta {
            margin-left: auto;
            font-family: var(--ff-mono); font-size: 10px;
            color: var(--text-faint);
            padding-bottom: 12px; letter-spacing: .08em;
        }

        select {
            background: var(--coal-3);
            color: var(--parchment);
            border: 1px solid var(--border);
            padding: 0 1.8rem 0 0.7rem;
            height: 30px;
            border-radius: 2px;
            cursor: pointer;
            font-family: var(--ff-sans);
            font-size: 12px;
            letter-spacing: .02em;
            appearance: none; -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%23b89650' stroke-width='1.3' fill='none'/></svg>");
            background-repeat: no-repeat;
            background-position: right 10px center;
            transition: border-color .15s ease-out, background-color .15s ease-out;
        }
        select:hover, select:focus { border-color: var(--gold-2); outline: none; }
        select option { background: var(--secondary); color: var(--parchment); }

        .btn {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 0 0.9rem;
            height: 30px;
            border-radius: 2px;
            cursor: pointer;
            font-family: var(--ff-mono);
            font-size: 11px;
            letter-spacing: .08em;
            transition: color .15s ease-out, border-color .15s ease-out, background .15s ease-out;
            display: inline-flex; align-items: center;
        }
        .btn:hover { color: var(--highlight); border-color: var(--gold-2); background: var(--coal-3); }
        .btn.active {
            color: var(--primary);
            background: var(--highlight);
            border-color: var(--highlight);
        }
        .btn.active:hover { background: var(--highlight); color: var(--primary); }

        /* ===== Main Layout ===== */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ===== Sidebar (noir with shell) ===== */
        .sidebar {
            width: 260px;
            background: var(--secondary);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0 0 2rem;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            transition: width .2s ease-out;
        }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--rule-2); border-radius: 3px; }

        .side-head {
            padding: 14px 14px 10px;
            border-bottom: 1px solid var(--rule);
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .side-title {
            font-family: var(--ff-serif); font-size: 13px;
            color: var(--parchment); letter-spacing: .04em;
        }

        .loop-row {
            padding: 10px 12px 4px;
            display: flex; gap: 4px; flex-wrap: wrap;
            flex-shrink: 0;
        }
        .loop-chip {
            font-family: var(--ff-mono); font-size: 10px;
            padding: 4px 7px;
            border-radius: 2px;
            background: var(--coal-3);
            border: 1px solid var(--rule);
            color: var(--text-dim);
            cursor: pointer;
            letter-spacing: .05em;
            transition: color .15s, border-color .15s, background .15s, box-shadow .25s;
        }
        .loop-chip:hover { color: var(--parchment); border-color: var(--rule-2); }
        .loop-chip.active {
            color: var(--gold);
            border-color: var(--gold-2);
            background: linear-gradient(180deg, rgba(232,198,120,.08), rgba(232,198,120,.02));
            box-shadow: 0 0 0 1px rgba(232,198,120,.15) inset, 0 0 12px -2px rgba(232,198,120,.18);
        }
        .loop-chip.locked { color: var(--locked); cursor: not-allowed; }

        .loop-current {
            padding: 8px 14px 14px;
            border-bottom: 1px dashed var(--rule);
            flex-shrink: 0;
        }
        .loop-current .kicker {
            font: 500 10px/1 var(--ff-sans);
            color: var(--gold);
            letter-spacing: .2em;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .loop-current-title {
            font-family: var(--ff-serif);
            font-size: 15px;
            color: var(--parchment);
            letter-spacing: .01em;
            line-height: 1.3;
        }

        .sidebar-body {
            padding: 4px 0 16px;
            flex: 1;
            min-height: 0;
        }

        .sidebar-section {
            padding: 0.9rem 0.9rem 0.3rem;
            font-family: var(--ff-sans);
            font-weight: 600;
            font-size: 9.5px;
            color: var(--text-faint);
            text-transform: uppercase;
            letter-spacing: .22em;
            margin-top: 0.2rem;
            display: flex; align-items: center; gap: 8px;
        }
        .sidebar-section::before {
            content: ""; width: 4px; height: 4px; background: var(--gold-2); border-radius: 50%; opacity: .6;
            flex-shrink: 0;
        }
        .sidebar-section::after {
            content: ""; flex: 1; height: 1px; background: var(--border); opacity: .6;
        }

        .sidebar-item {
            position: relative;
            padding: 0.45rem 0.8rem 0.45rem 1rem;
            cursor: pointer;
            border-left: none;
            transition: background .15s ease-out, color .15s ease-out;
            font-size: 12.5px;
            color: var(--text-secondary);
            display: flex; align-items: center; gap: 8px;
        }
        .sidebar-item::before {
            content: ""; position: absolute; left: 0; top: 6px; bottom: 6px; width: 3px;
            background: var(--accent);
            transform: scaleY(0); transform-origin: top;
            transition: transform .2s ease-out;
        }
        .sidebar-item:hover { background: rgba(232,198,120,.04); }
        .sidebar-item:hover::before { transform: scaleY(1); }
        .sidebar-item.active {
            background: rgba(232,198,120,.07);
            color: var(--parchment);
        }
        .sidebar-item.active::before { transform: scaleY(1); background: var(--highlight); }

        .badge {
            display: inline-flex; align-items: center; gap: 3px;
            font-family: var(--ff-mono);
            font-size: 10px;
            letter-spacing: .02em;
            padding: 1px 5px;
            border-radius: 2px;
            background: var(--coal-3);
            color: var(--text-muted);
            border: 1px solid var(--border);
            min-width: 22px;
            justify-content: center;
            margin-left: 0.25rem;
        }
        .badge.npc {
            color: var(--success);
            border-color: color-mix(in srgb, var(--success) 40%, var(--border));
            background: color-mix(in srgb, var(--success) 6%, var(--coal-3));
        }

        /* ===== Content (main view, noir) ===== */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 22px 24px 60px;
            animation: viewIn .22s ease-out;
        }
        @keyframes viewIn {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .content::-webkit-scrollbar { width: 8px; }
        .content::-webkit-scrollbar-thumb { background: var(--rule-2); border-radius: 4px; }

        /* ===== Art Table (evidence-table -> noir .art-table) ===== */
        .evidence-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .evidence-table th {
            background: var(--secondary);
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--rule);
            font-family: var(--ff-sans);
            font-weight: 600;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .18em;
            color: var(--text-faint);
            position: sticky;
            top: 0;
            z-index: 2;
        }
        .evidence-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--rule);
            color: var(--text-primary);
            vertical-align: middle;
            font-size: 12px;
        }
        .evidence-table tr:hover td { background: color-mix(in srgb, var(--gold) 4%, var(--secondary)); }
        .evidence-table .art-req { color: var(--parchment); font-weight: 500; }
        .evidence-table .art-req.empty {
            color: var(--brick);
            font-style: normal;
            font-family: var(--ff-mono);
            font-size: 10.5px;
            letter-spacing: .06em;
        }
        .evidence-table tr.missing td,
        .evidence-table tr:has(.art-req.empty) td { background: color-mix(in srgb, var(--brick) 6%, transparent); }
        .evidence-table tr.missing td:first-child,
        .evidence-table tr:has(.art-req.empty) td:first-child { box-shadow: inset 3px 0 0 var(--brick); }

        .id-col { width: 72px; font-family: var(--ff-mono); font-size: 11px; color: var(--gold); letter-spacing: .06em; }
        .type-col { width: 88px; }
        .name-col { width: 170px; font-family: var(--ff-serif); font-weight: 600; font-size: 13px; color: var(--parchment); }
        .location-col { width: 160px; color: var(--text-muted); font-size: 11.5px; }
        .desc-col { max-width: 320px; color: var(--parch-mute); font-size: 11.5px; line-height: 1.55; }

        /* ===== Filter Bar (.filter-bar -> .art-filters vibe) ===== */
        .filter-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 14px;
            padding: 10px 12px;
            background: var(--coal-3);
            border: 1px solid var(--rule);
            border-radius: 2px;
            flex-wrap: wrap;
        }
        .filter-bar label {
            color: var(--text-faint);
            font-family: var(--ff-sans); font-weight: 600;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .18em;
        }
        .filter-bar input {
            background: var(--primary);
            border: 1px solid var(--rule);
            color: var(--parchment);
            padding: 6px 10px;
            height: 30px;
            border-radius: 2px;
            font-family: var(--ff-sans); font-size: 12px;
            width: 240px;
            outline: none;
            transition: border-color .15s ease-out, background .15s ease-out;
        }
        .filter-bar input::placeholder { color: var(--text-faint); }
        .filter-bar input:focus { border-color: var(--gold-2); }
        .filter-bar .btn { height: 30px; }

        .stats {
            color: var(--text-muted);
            font-family: var(--ff-mono); font-size: 10.5px;
            letter-spacing: .08em;
            margin-left: auto;
        }
        .stats .has-art { color: var(--ok); }
        .stats .no-art  { color: var(--brick); }

        /* ===== Art Sub-Tab Bar (.art-tab-bar -> .sub-tabs) ===== */
        .art-tab-bar {
            display: flex;
            gap: 2px;
            border-bottom: 1px solid var(--rule);
            margin: 0 0 14px;
            background: transparent;
            padding: 0 2px;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .art-tab {
            padding: 10px 16px;
            cursor: pointer;
            font-family: var(--ff-mono);
            font-size: 11px;
            letter-spacing: .1em;
            color: var(--text-dim);
            background: transparent;
            border: 0;
            border-bottom: 1px solid transparent;
            margin-bottom: -1px;
            transition: color .15s;
            position: relative;
        }
        .art-tab:hover { color: var(--parchment); }
        .art-tab.active { color: var(--gold); font-weight: 500; }
        .art-tab.active::after {
            content: ""; position: absolute; left: 10px; right: 10px; bottom: -1px; height: 1px;
            background: var(--gold);
        }
        .art-tab .tab-badge {
            display: inline-block;
            background: var(--brick);
            color: var(--parchment);
            padding: 1px 6px;
            border-radius: 2px;
            font-family: var(--ff-mono);
            font-size: 10px;
            letter-spacing: .04em;
            margin-left: 6px;
            vertical-align: middle;
        }
        .art-tab .tab-badge.done {
            background: color-mix(in srgb, var(--ok) 18%, var(--coal-3));
            color: var(--ok);
            border: 1px solid color-mix(in srgb, var(--ok) 40%, var(--rule));
        }

        /* ===== Scene View (.scene-container -> .scene-stage) ===== */
        .scene-title {
            font-family: var(--ff-serif);
            font-weight: 600;
            font-size: 24px;
            letter-spacing: .01em;
            color: var(--parchment);
            margin: 4px 0 10px;
        }

        .scene-container {
            position: relative;
            border-radius: 0;
            overflow: hidden;
            margin-bottom: 18px;
            border: 1px solid var(--rule);
            background:
                radial-gradient(ellipse at 30% 40%, rgba(232,198,120,.14), transparent 55%),
                radial-gradient(ellipse at 70% 70%, rgba(184,64,64,.08), transparent 60%),
                linear-gradient(180deg, #1a1612 0%, #0c0906 100%);
            min-height: 360px;
            box-shadow: 0 1px 0 rgba(232,198,120,.05) inset, 0 24px 50px -20px rgba(0,0,0,.85);
        }
        .scene-container::after {
            content: ""; position: absolute; inset: 0; pointer-events: none;
            box-shadow: inset 0 0 160px 20px rgba(0,0,0,.7);
        }
        .scene-container::before {
            content: "● REC";
            position: absolute; top: 10px; left: 14px; z-index: 3;
            font-family: var(--ff-mono);
            font-size: 10px; letter-spacing: .22em;
            color: var(--brick);
            pointer-events: none;
            text-shadow: 0 0 6px rgba(184,64,64,.5);
            animation: noir-shimmer 1.4s step-end infinite;
        }

        /* ===== Empty State ===== */
        .empty-state {
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            color: var(--text-faint);
        }
        .empty-state-mark {
            font-family: var(--ff-serif);
            font-weight: 700;
            font-size: 48px;
            letter-spacing: .1em;
            color: var(--text-faint);
            border: 1px solid var(--rule);
            padding: 18px 28px;
            background: var(--coal-3);
            box-shadow: 0 24px 60px -20px rgba(0,0,0,.85), 0 0 0 1px rgba(232,198,120,.06) inset;
        }
        .empty-state-text {
            font-family: var(--ff-mono);
            font-size: 11px;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .scene-container .scene-bg {
            width: 100%;
            display: block;
            max-height: 440px;
            object-fit: cover;
            filter: saturate(.85) contrast(1.05);
        }

        .npc-on-scene {
            position: absolute;
            transform: translate(-50%, -80%);
            cursor: pointer;
            transition: transform .18s ease-out, filter .15s ease-out;
            z-index: 2;
        }
        .npc-on-scene img {
            height: 130px;
            filter: drop-shadow(0 18px 22px rgba(0,0,0,.9));
        }
        .npc-on-scene:hover { transform: translate(-50%, -82%); }
        .npc-on-scene:hover img {
            filter: drop-shadow(0 0 12px rgba(232,198,120,.35)) drop-shadow(0 18px 22px rgba(0,0,0,.9)) brightness(1.06);
        }
        .npc-on-scene .npc-label {
            text-align: center;
            font-family: var(--ff-mono);
            font-size: 10px;
            letter-spacing: .04em;
            color: var(--parchment);
            background: rgba(0,0,0,.8);
            border: 1px solid var(--rule-2);
            padding: 2px 8px;
            border-radius: 2px;
            text-shadow: 0 1px 3px #000;
            margin-top: 4px;
            display: inline-block;
        }
        .npc-on-scene:hover .npc-label { color: var(--gold); border-color: var(--gold-2); }

        /* 缺立绘时的占位框 —— 320×440 × 20% → 64×88 */
        .npc-figure-miss {
            width: 64px; height: 88px;
            background:
                repeating-linear-gradient(45deg, rgba(184,64,64,.8) 0 2px, rgba(20,5,5,.55) 2px 6px),
                rgba(20, 5, 5, .85);
            border: 2px solid var(--brick);
            display: grid; place-items: center;
            font-family: var(--ff-serif);
            font-size: 28px; font-weight: 700;
            color: rgba(184, 64, 64, 0);
            box-shadow:
                0 0 0 1px rgba(0,0,0,.9),
                0 0 12px rgba(184,64,64,.5),
                inset 0 0 0 1px rgba(184,64,64,.6),
                0 10px 14px -8px rgba(0,0,0,.9);
            transition: border-color .15s, transform .15s ease-out;
        }
        .npc-on-scene.missing { z-index: 2; }
        .npc-on-scene.missing:hover .npc-figure-miss {
            border-color: var(--gold-2);
            color: var(--gold);
            opacity: 1;
            transform: translateY(-3px);
        }
        /* 缺立绘的名字标签 —— 做成明显可交互的胶囊按钮(暗底 + 砖红边 + 浅字 + 轻微外发光) */
        .npc-on-scene.missing .npc-label {
            background: rgba(15, 5, 5, .92);
            border: 1px solid var(--brick);
            color: var(--parchment);
            padding: 4px 12px;
            font-size: 11.5px;
            letter-spacing: .06em;
            font-weight: 500;
            box-shadow:
                0 0 0 1px rgba(0,0,0,.7),
                0 0 10px rgba(184,64,64,.4),
                0 4px 8px -2px rgba(0,0,0,.8);
            margin-top: 6px;
        }
        .npc-on-scene.missing:hover .npc-label {
            color: var(--primary);
            background: var(--gold);
            border-color: var(--gold);
            box-shadow:
                0 0 0 1px rgba(0,0,0,.7),
                0 0 14px rgba(232,198,120,.6),
                0 4px 8px -2px rgba(0,0,0,.8);
        }

        /* 无坐标 NPC 自动散布在场景上 —— 标签样式由 .missing 主导，这里不再额外覆盖 */

        .scene-bg {
            width: 100%;
            max-height: 320px;
            object-fit: cover;
            border-radius: 0;
            margin-bottom: 12px;
            border: 1px solid var(--rule);
        }

        .section-title {
            font-family: var(--ff-serif);
            font-weight: 600;
            font-size: 17px;
            letter-spacing: .02em;
            color: var(--parchment);
            margin: 22px 0 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--rule);
            position: relative;
        }
        .section-title::after {
            content: ""; position: absolute; left: 0; bottom: -1px; width: 60px; height: 1px;
            background: var(--gold-2);
        }

        /* ===== Evidence Cards (.evidence-card -> .ev-card noir) ===== */
        .evidence-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 10px;
        }

        .evidence-card {
            position: relative;
            background: var(--ink);
            border: 1px solid var(--rule);
            border-radius: 0;
            padding: 12px 13px 11px;
            cursor: pointer;
            transition: transform .2s ease-out, border-color .15s ease-out, box-shadow .2s ease-out;
            overflow: hidden;
        }
        .evidence-card::before {
            content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
            background: var(--gold-2); opacity: .35;
        }
        .evidence-card:hover {
            border-color: var(--gold-2);
            transform: translateY(-2px);
            box-shadow: 0 0 0 1px rgba(232,198,120,.25) inset, 0 10px 22px -10px rgba(0,0,0,.9);
        }

        .ev-name {
            font-family: var(--ff-serif); font-weight: 600;
            font-size: 15px;
            line-height: 1.25;
            color: var(--parchment);
            margin: 2px 0 8px;
        }
        .ev-id {
            font-family: var(--ff-mono);
            color: var(--gold);
            font-size: 11px;
            letter-spacing: .08em;
        }

        .ev-type {
            display: inline-block;
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--rule);
            padding: 1px 6px;
            border-radius: 2px;
            font-family: var(--ff-mono);
            font-size: 9.5px;
            letter-spacing: .05em;
        }
        .ev-type.type-clue  { color: var(--brick); border-color: var(--brick-2); }
        .ev-type.type-item  { color: #6ea3c8; border-color: color-mix(in srgb, #6ea3c8 40%, var(--rule)); }
        .ev-type.type-envir { color: var(--text-muted); border-color: var(--rule-2); }
        .ev-type.type-note  { color: #a280c4; border-color: color-mix(in srgb, #a280c4 40%, var(--rule)); }

        .ev-desc {
            color: var(--parch-mute);
            font-size: 11.5px;
            margin-top: 4px;
            line-height: 1.55;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .ev-art {
            font-family: var(--ff-mono);
            font-size: 10px;
            letter-spacing: .06em;
            margin-top: 8px;
            padding-top: 7px;
            border-top: 1px solid var(--rule);
            display: inline-flex; align-items: center; gap: 6px;
        }
        .ev-art::before {
            content: ""; width: 6px; height: 6px; border-radius: 50%;
            background: currentColor;
        }
        .ev-art.filled { color: var(--ok); }
        .ev-art.empty  { color: var(--brick); }
        .ev-art.empty::before { box-shadow: 0 0 6px var(--brick); }

        /* ===== NPC Cards ===== */
        .npc-card {
            background: var(--ink);
            border: 1px solid var(--rule);
            border-left: 2px solid var(--ok);
            border-radius: 0;
            padding: 12px 13px;
            margin-bottom: 8px;
        }
        .npc-name {
            font-family: var(--ff-serif); font-weight: 600; font-size: 14px;
            color: var(--parchment);
        }
        .npc-dialogue {
            color: var(--parch-mute);
            font-size: 12.5px;
            margin-top: 6px;
            font-family: var(--ff-serif);
            font-style: italic;
            border-left: 2px solid var(--gold-2);
            padding: 4px 0 4px 12px;
        }
        .npc-meta {
            font-family: var(--ff-mono);
            font-size: 10px;
            color: var(--text-faint);
            letter-spacing: .08em;
            margin-top: 6px;
        }

        /* ===== Production Spec ===== */
        .prod-spec {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed var(--rule);
            font-size: 12px;
        }
        .prod-spec .spec-row {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }
        .prod-spec .spec-label {
            font-family: var(--ff-mono);
            color: var(--text-faint);
            font-size: 10px;
            letter-spacing: .1em;
            text-transform: uppercase;
            min-width: 6em;
            flex-shrink: 0;
        }
        .prod-spec .spec-summary {
            color: var(--parch-mute);
            font-size: 12px;
            margin-bottom: 4px;
            line-height: 1.55;
        }

        /* ===== Modal -> Right-side Drawer (noir) ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(3px);
            z-index: 100;
            justify-content: flex-end;  /* drawer slides from right */
            align-items: stretch;
        }
        .modal-overlay.active {
            display: flex;
            animation: drawerBackdrop .22s ease-out;
        }
        @keyframes drawerBackdrop {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .modal {
            background: var(--secondary);
            border: 0;
            border-left: 1px solid var(--gold-2);
            border-radius: 0;
            padding: 28px 32px 40px;
            width: 600px;
            max-width: 92vw;
            max-height: none;
            height: 100vh;
            overflow-y: auto;
            position: relative;
            box-shadow: -24px 0 60px -20px rgba(0,0,0,.85), 0 0 0 1px rgba(232,198,120,.08) inset;
            animation: drawerSlideIn .28s cubic-bezier(.2, .8, .25, 1);
            display: flex;
            flex-direction: column;
            gap: 22px;
        }
        @keyframes drawerSlideIn {
            from { transform: translateX(100%); }
            to   { transform: translateX(0); }
        }
        .modal::-webkit-scrollbar { width: 6px; }
        .modal::-webkit-scrollbar-thumb { background: var(--rule-2); border-radius: 3px; }

        .modal-title {
            font-family: var(--ff-serif); font-weight: 600;
            font-size: 22px;
            color: var(--parchment);
            margin: 0;
            padding: 2px 40px 18px 0;
            border-bottom: 1px solid var(--rule);
            letter-spacing: .01em;
            flex-shrink: 0;
        }
        .modal .drawer-kicker { font-size: 10px; margin-bottom: 6px; }
        .modal .drawer-name { font-size: 24px; line-height: 1.15; margin-top: 0; }
        .modal .drawer-sub  { font-size: 11.5px; margin-top: 5px; }

        .modal-close {
            position: absolute;
            top: 22px; right: 22px;
            float: none;
            background: transparent;
            border: 1px solid var(--rule);
            color: var(--text-dim);
            font-size: 16px;
            line-height: 1;
            width: 30px; height: 30px;
            display: grid; place-items: center;
            border-radius: 2px;
            cursor: pointer;
            transition: color .15s, border-color .15s;
            z-index: 1;
        }
        .modal-close:hover { color: var(--gold); border-color: var(--gold-2); }

        .modal p { margin-bottom: 8px; font-size: 12.5px; color: var(--parch-mute); line-height: 1.6; }
        .modal strong { color: var(--parchment); font-weight: 500; }

        /* ===== NPC Drawer — rich 3-section layout ===== */
        .modal .drawer-kicker {
            font-family: var(--ff-mono); font-size: 10px;
            color: var(--gold); letter-spacing: .18em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .modal .drawer-name {
            font-family: var(--ff-serif); font-weight: 600;
            font-size: 22px;
            color: var(--parchment);
            letter-spacing: .01em;
            line-height: 1.2;
        }
        .modal .drawer-sub {
            font-family: var(--ff-mono);
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: .08em;
            margin-top: 3px;
        }

        .npc-section { display: grid; gap: 12px; }
        /* modalContent 本身是普通 div,没有 flex gap —— 给它一个列式 flex 确保 section 间有呼吸 */
        .modal #modalContent {
            display: flex;
            flex-direction: column;
        }
        .modal #modalContent > .npc-section + .npc-section {
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px dashed var(--rule);
        }
        .npc-section .smallcap {
            font: 600 10px/1 var(--ff-sans);
            text-transform: uppercase;
            letter-spacing: .22em;
            color: var(--text-faint);
            display: inline-flex; align-items: center;
            margin-bottom: 2px;
        }
        .npc-section .section-count {
            display: inline-block;
            font-family: var(--ff-mono);
            font-size: 10px;
            color: var(--gold);
            margin-left: 8px;
            letter-spacing: .08em;
        }
        .section-head-row {
            display: flex; align-items: center; gap: 10px;
            flex-wrap: wrap;
        }

        /* Section 1: 立绘 + 资源名 + 美术需求 */
        .npc-portrait-section {
            grid-template-columns: 60px 1fr;
            align-items: start;
            gap: 14px;
        }
        .npc-portrait {
            width: 60px; height: 80px;
            background: var(--coal);
            border: 1px solid var(--gold-2);
            position: relative;
            overflow: hidden;
        }
        .npc-portrait img {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: top center;   /* 立绘是竖幅的,容器 112×80 横向,只露顶部(脸/肩) */
            display: block;
        }
        .npc-portrait::before {
            content: ""; position: absolute; inset: 3px;
            background: repeating-linear-gradient(-45deg, rgba(232,198,120,.08) 0 2px, transparent 2px 5px);
            pointer-events: none; z-index: 0;
        }
        .npc-portrait img { position: relative; z-index: 1; }
        .npc-portrait.missing,
        .npc-portrait.miss-broken {
            border-color: var(--brick);
            background: color-mix(in srgb, var(--brick) 10%, var(--coal));
        }
        .npc-portrait.missing::before,
        .npc-portrait.miss-broken::before {
            background: repeating-linear-gradient(45deg, rgba(184,64,64,.15) 0 3px, transparent 3px 7px);
        }
        .npc-portrait-q {
            position: absolute; inset: 0; display: grid; place-items: center;
            font-family: var(--ff-serif); font-size: 22px; font-weight: 700;
            color: var(--brick); opacity: .7;
            z-index: 2;
        }
        .npc-portrait-meta { min-width: 0; }

        /* copy-asset button (borrowed from prototype) */
        .copy-asset {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--coal-3); border: 1px solid var(--rule);
            padding: 6px 9px; cursor: pointer; border-radius: 2px;
            color: var(--parchment);
            transition: border-color .15s, background .15s, transform .1s;
            max-width: 100%; margin-top: 6px;
        }
        .copy-asset:hover { border-color: var(--gold-2); background: var(--ink); }
        .copy-asset:active { transform: scale(.985); }
        .copy-asset-dot {
            width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
        }
        .copy-asset-dot.ok   { background: var(--ok); }
        .copy-asset-dot.miss { background: var(--brick); box-shadow: 0 0 6px var(--brick); }
        .copy-asset-name {
            font-family: var(--ff-mono); font-size: 11px;
            color: var(--gold); letter-spacing: .03em;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            min-width: 0; flex: 1;
        }
        .copy-asset-ico {
            font-family: var(--ff-mono); font-size: 10px;
            color: var(--text-faint); letter-spacing: .08em; flex-shrink: 0;
            text-transform: uppercase;
        }
        .copy-asset:hover .copy-asset-ico { color: var(--gold); }

        .npc-art-req {
            font-family: var(--ff-serif);
            font-size: 14px; line-height: 1.7;
            color: var(--parch-mute);
            margin: 6px 0 14px;
        }

        /* ===== Phase cards (opening / ending / events) — noir scene-card 风格 ===== */
        .phase-goal {
            display: flex; align-items: baseline; gap: 10px;
            margin: 6px 0 18px;
            padding: 8px 12px;
            background: var(--coal-3);
            border-left: 2px solid var(--gold-2);
        }
        .phase-goal-label {
            font-family: var(--ff-sans);
            font-weight: 600;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .22em;
            color: var(--gold);
            flex-shrink: 0;
        }
        .phase-goal-text {
            font-family: var(--ff-serif);
            font-size: 13.5px;
            line-height: 1.55;
            color: var(--parch-mute);
        }

        .phase-scene-card {
            background: var(--ink);
            border: 1px solid var(--rule);
            margin-bottom: 12px;
            overflow: hidden;
            transition: border-color .15s, transform .15s ease-out, box-shadow .2s ease-out;
            position: relative;
        }
        .phase-scene-card.clickable { cursor: pointer; }
        .phase-scene-card.clickable::before {
            content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
            background: var(--gold-2); opacity: .35;
            transition: opacity .15s;
        }
        .phase-scene-card.clickable:hover {
            border-color: var(--gold-2);
            transform: translateY(-1px);
            box-shadow: 0 0 0 1px rgba(232,198,120,.2) inset, 0 10px 22px -10px rgba(0,0,0,.9);
        }
        .phase-scene-card.clickable:hover::before { opacity: .8; background: var(--gold); }

        .phase-scene-bg {
            width: 100%;
            height: 180px;
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid var(--rule);
            filter: saturate(.85) contrast(1.05);
            position: relative;
        }
        .phase-scene-bg::after {
            content: ""; position: absolute; inset: 0; pointer-events: none;
            background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,.45) 100%);
        }

        /* Cutscene / 无 SceneConfig 条目的占位条带 —— 渐变 + 胶片斜纹 + ID 水印 */
        .phase-scene-bg.placeholder {
            filter: none;
            background:
                radial-gradient(ellipse at 30% 35%, rgba(232,198,120,.10), transparent 55%),
                radial-gradient(ellipse at 70% 75%, rgba(184,64,64,.08), transparent 60%),
                repeating-linear-gradient(135deg, rgba(232,198,120,.035) 0 1px, transparent 1px 7px),
                linear-gradient(180deg, #1a1612 0%, #0c0906 100%);
        }
        .phase-scene-bg.placeholder::before {
            content: attr(data-kind) " · " attr(data-id);
            position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
            font-family: var(--ff-mono);
            font-size: 13px;
            letter-spacing: .3em;
            color: var(--text-faint);
            z-index: 1;
            white-space: nowrap;
        }
        /* 占位条带顶部还加一个"REC"点缀,跟场景舞台 UI 呼应 */
        .phase-scene-bg.placeholder::after {
            content: "● " attr(data-kind);
            position: absolute; top: 10px; left: 14px;
            font-family: var(--ff-mono);
            font-size: 9.5px;
            letter-spacing: .22em;
            color: var(--brick);
            background: none;
            inset: auto;
            animation: noir-shimmer 1.4s step-end infinite;
        }

        .phase-scene-body {
            padding: 14px 16px 16px;
            display: grid;
            gap: 10px;
        }
        .phase-scene-head {
            display: flex; align-items: baseline; gap: 10px;
        }
        .phase-scene-title {
            font-family: var(--ff-serif);
            font-weight: 600;
            font-size: 17px;
            color: var(--parchment);
            margin: 0;
            letter-spacing: .01em;
            line-height: 1.2;
        }
        .phase-scene-id {
            font-family: var(--ff-mono);
            font-size: 11px;
            color: var(--gold);
            letter-spacing: .08em;
        }

        .phase-scene-chars {
            display: flex; flex-wrap: wrap; gap: 5px;
        }
        .char-pill {
            font-family: var(--ff-mono);
            font-size: 10.5px;
            padding: 3px 9px;
            background: var(--coal-3);
            border: 1px solid var(--rule);
            color: var(--parch-mute);
            letter-spacing: .04em;
            border-radius: 2px;
            transition: border-color .15s, color .15s;
        }
        .char-pill:hover {
            border-color: var(--gold-2);
            color: var(--parchment);
        }

        .phase-scene-purpose {
            font-family: var(--ff-serif);
            font-size: 13px;
            line-height: 1.6;
            color: var(--parch-mute);
        }

        .phase-scene-trigger {
            display: flex; align-items: baseline; gap: 10px;
            padding: 6px 10px;
            background: color-mix(in srgb, var(--warn) 8%, var(--coal-3));
            border-left: 2px solid var(--warn);
        }
        .trigger-label {
            font-family: var(--ff-sans); font-weight: 600;
            font-size: 9.5px; text-transform: uppercase;
            letter-spacing: .22em; color: var(--warn);
            flex-shrink: 0;
        }
        .trigger-text {
            font-family: var(--ff-mono);
            font-size: 11.5px;
            color: var(--parch-mute);
            letter-spacing: .02em;
        }

        .phase-scene-talk {
            display: flex; align-items: center; gap: 10px;
            flex-wrap: wrap;
            padding-top: 10px;
            border-top: 1px dashed var(--rule);
        }
        .phase-scene-talk .copy-asset {
            margin-top: 0;
            flex-shrink: 1;
            min-width: 0;
            max-width: 360px;
        }
        .talk-meta {
            font-family: var(--ff-mono);
            font-size: 10.5px;
            color: var(--text-dim);
            letter-spacing: .04em;
        }
        .talk-meta.miss { color: var(--brick); }
        .talk-meta-id { color: var(--gold); letter-spacing: .06em; }
        .phase-play-btn {
            margin-left: auto;
            height: 30px;
            font-size: 11px;
            padding: 0 14px;
            letter-spacing: .08em;
        }

        /* ===== Section 2: AVG 对白流水(drawer 内嵌) ===== */
        .dlg-entry-empty {
            font-family: var(--ff-mono); font-size: 10.5px;
            color: var(--text-faint); letter-spacing: .06em;
            font-style: italic;
        }
        .npc-dialog-section { gap: 8px; }
        .npc-dialog-stage { display: block; min-height: 10px; }

        /* talk id 芯片行 */
        .avg-tabs {
            display: flex; gap: 8px; flex-wrap: wrap;
            margin-bottom: 2px;
        }
        .avg-tab {
            padding: 5px 11px;
            border: 1px solid var(--rule);
            background: var(--coal-2);
            color: var(--text-dim);
            font-family: var(--ff-mono);
            font-size: 11px;
            letter-spacing: .08em;
            cursor: pointer;
            border-radius: 2px;
            transition: border-color .15s, color .15s, background .15s;
        }
        .avg-tab:hover { border-color: var(--gold-2); color: var(--parchment); }
        .avg-tab.active {
            border-color: var(--gold); color: var(--gold);
            background: var(--ink);
        }

        /* scene context 行 */
        .avg-ctx {
            font-family: var(--ff-mono);
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: .04em;
            padding: 4px 0 10px;
            border-bottom: 1px dashed var(--rule-2);
            margin-bottom: 2px;
        }
        .avg-ctx-scene { color: var(--gold); }
        .avg-ctx-sep { color: var(--text-faint); margin: 0 6px; }
        .avg-ctx-desc { color: var(--text-dim); }

        /* 主舞台(stage)—— drawer 内唯一的对白区 */
        .avg-stage {
            position: relative;
            background:
                linear-gradient(180deg, rgba(232,198,120,.03), transparent 40%),
                var(--coal-3);
            border: 1px solid var(--rule-2);
            padding: 20px 22px 16px;
            min-height: 220px;
            cursor: pointer;
            outline: none;
            transition: border-color .2s;
        }
        .avg-stage:hover { border-color: var(--gold-2); }
        .avg-stage:focus-visible { border-color: var(--gold); }
        .avg-stage::before {
            content: ""; position: absolute; inset: 0;
            background: radial-gradient(ellipse at top, transparent 55%, rgba(0,0,0,.35) 100%);
            pointer-events: none;
        }
        .avg-stage.done { cursor: default; }

        /* 每条台词 */
        .avg-stream {
            display: grid; gap: 18px;
            max-height: 380px;
            overflow-y: auto;
            padding-right: 6px;
            /* 不用 smooth —— rebuild 会导致「滚到顶再滚下来」的视觉跳跃 */
        }
        .avg-stream::-webkit-scrollbar { width: 4px; }
        .avg-stream::-webkit-scrollbar-thumb { background: var(--rule-2); border-radius: 2px; }

        .avg-line { position: relative; }
        .avg-line.current { animation: avg-line-in .18s ease-out; }
        @keyframes avg-line-in {
            from { opacity: 0; transform: translateY(3px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .avg-line.self::before {
            content: ""; position: absolute; left: -12px; top: 2px; bottom: 2px;
            width: 2px; background: var(--gold);
        }
        .avg-line.protagonist::before {
            content: ""; position: absolute; left: -12px; top: 2px; bottom: 2px;
            width: 2px; background: #6ea3c8;  /* 冷蓝 —— 主角 Zack */
        }
        .avg-line.partner::before {
            content: ""; position: absolute; left: -12px; top: 2px; bottom: 2px;
            width: 2px; background: #d17089;  /* 水红 —— 搭档 Emma */
        }

        .avg-who {
            font-family: var(--ff-mono);
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: .1em;
            text-transform: uppercase;
            margin-bottom: 7px;
        }
        .avg-line.self .avg-who { color: var(--gold); }
        .avg-line.protagonist .avg-who { color: #90b4d0; }
        .avg-line.partner .avg-who { color: #e098ab; }

        .avg-mood {
            color: var(--text-faint);
            font-size: 9.5px;
            margin-left: 4px;
            font-style: italic;
            text-transform: none;
            letter-spacing: 0;
        }

        /* 打字中的光标(▌) —— 金色闪烁,只在 .avg-text.typing 后出现 */
        .avg-text.typing::after {
            content: "▌";
            color: var(--gold);
            margin-left: 1px;
            font-weight: 400;
            animation: avg-caret-blink .8s steps(2) infinite;
        }
        @keyframes avg-caret-blink { 50% { opacity: 0; } }

        /* NPC / self 对白文字：纯白；主角(Zack) 单独用冷蓝以便一眼区分 */
        .avg-text,
        .avg-line.self .avg-text,
        .avg-line.faded .avg-text,
        .avg-line.faded.self .avg-text {
            font-family: var(--ff-serif);
            font-size: 15px;
            color: #ffffff;
            line-height: 1.65;
            font-style: normal;
            letter-spacing: .01em;
        }
        .avg-line.protagonist .avg-text,
        .avg-line.faded.protagonist .avg-text {
            font-family: var(--ff-serif);
            font-size: 15px;
            color: #b8d4e8;  /* 冷蓝——和 protagonist 左侧色条、说话人名保持一致 */
            line-height: 1.65;
            font-style: normal;
            letter-spacing: .01em;
        }
        .avg-line.partner .avg-text,
        .avg-line.faded.partner .avg-text {
            font-family: var(--ff-serif);
            font-size: 15px;
            color: #f2bccb;  /* 水红——搭档 Emma；与 Zack 冷蓝形成 CP 对比 */
            line-height: 1.65;
            font-style: normal;
            letter-spacing: .01em;
        }
        .avg-line.faded { opacity: 1; }
        /* 说话人头部色仍保留区分(self 金色 / protagonist 冷蓝 / 其他 text-dim) —— 是判断「谁在说」的唯一视觉线索 */

        .avg-lie {
            margin-top: 6px;
            padding: 4px 8px;
            background: color-mix(in srgb, var(--brick) 15%, transparent);
            border-left: 2px solid var(--brick);
            font-family: var(--ff-mono);
            font-size: 10px;
            color: var(--gold);
            letter-spacing: .04em;
        }

        /* footer(进度 + 提示) */
        .avg-footer {
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px dashed var(--rule-2);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-family: var(--ff-mono);
            font-size: 10.5px;
            letter-spacing: .1em;
        }
        .avg-progress { color: var(--gold); }
        .avg-sep { color: var(--text-faint); margin: 0 5px; }
        .avg-hint { color: var(--text-faint); text-transform: uppercase; }

        /* branches 块 */
        .avg-branches {
            margin-top: 14px;
            padding-top: 10px;
            border-top: 1px dashed var(--rule-2);
            display: grid;
            gap: 6px;
        }
        .avg-branch-btn {
            background: var(--coal-3);
            border: 1px solid var(--rule);
            border-left: 2px solid var(--gold-2);
            color: var(--parch-mute);
            padding: 8px 12px;
            cursor: pointer;
            text-align: left;
            font-family: var(--ff-serif);
            font-size: 13px;
            transition: color .15s, border-color .15s, background .15s, transform .15s ease-out;
        }
        .avg-branch-btn:hover {
            border-color: var(--gold-2);
            border-left-color: var(--gold);
            color: var(--parchment);
            background: var(--ink);
            transform: translateX(2px);
        }

        /* 控制 pill(重播 / 上一句 / 下一句 / 关闭) */
        .avg-controls {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
        }
        .avg-pill {
            background: var(--coal-3);
            border: 1px solid var(--rule);
            color: var(--text-dim);
            padding: 7px 14px;
            font-family: var(--ff-mono);
            font-size: 11px;
            letter-spacing: .08em;
            cursor: pointer;
            border-radius: 2px;
            transition: border-color .15s, color .15s, background .15s;
        }
        .avg-pill:hover:not(:disabled) {
            border-color: var(--gold-2);
            color: var(--parchment);
        }
        .avg-pill:disabled { opacity: .4; cursor: not-allowed; }
        .avg-pill.on {
            border-color: var(--gold);
            color: var(--gold);
            background: var(--ink);
        }
        .avg-pill.on:hover:not(:disabled) {
            background: color-mix(in srgb, var(--gold) 10%, var(--ink));
        }

        /* Section 3: 证词引用块(默认折叠) */
        .npc-testimony-section { gap: 0; }
        .testimony-toggle {
            display: flex; align-items: center; gap: 10px;
            width: 100%;
            padding: 10px 12px;
            background: var(--coal-3);
            border: 1px solid var(--rule);
            color: var(--text-dim);
            cursor: pointer;
            text-align: left;
            transition: border-color .15s, color .15s, background .15s;
            font-family: inherit;
        }
        .testimony-toggle:hover {
            border-color: var(--gold-2);
            color: var(--parchment);
            background: var(--ink);
        }
        .testimony-toggle .chev {
            font-family: var(--ff-mono);
            font-size: 12px;
            color: var(--gold);
            transition: transform .2s ease-out;
            display: inline-block;
        }
        .npc-testimony-section:not(.collapsed) .testimony-toggle .chev { transform: rotate(90deg); }
        .testimony-toggle .smallcap { margin: 0; letter-spacing: .22em; }
        .testimony-toggle .section-count {
            font-family: var(--ff-mono); font-size: 11px;
            color: var(--gold); letter-spacing: .08em;
            margin-left: 0;
        }
        .testimony-toggle .toggle-hint {
            margin-left: auto;
            font-family: var(--ff-mono);
            font-size: 9.5px;
            color: var(--text-faint);
            letter-spacing: .18em;
            text-transform: uppercase;
        }
        .npc-testimony-section:not(.collapsed) .testimony-toggle .toggle-hint::before {
            content: "点击收起";
        }
        .npc-testimony-section:not(.collapsed) .testimony-toggle .toggle-hint {
            font-size: 0;  /* 隐藏原文本,用 ::before 替换 */
        }
        .npc-testimony-section:not(.collapsed) .testimony-toggle .toggle-hint::before {
            font-size: 9.5px;
            content: "点击收起";
        }
        .npc-testimony-list-wrap {
            overflow: hidden;
            max-height: 2000px;
            transition: max-height .3s ease-out, padding .2s ease-out;
            padding-top: 10px;
        }
        .npc-testimony-section.collapsed .npc-testimony-list-wrap {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
        }

        .npc-testimony-list { display: grid; gap: 12px; }
        .npc-testimony-item {
            background: var(--coal-3);
            border: 1px solid var(--rule);
            border-left: 2px solid var(--gold-2);
            padding: 10px 14px;
        }
        .npc-testimony-item .quote {
            border-left: none;
            padding: 0;
            font-family: var(--ff-serif); font-style: italic;
            font-size: 14px; color: var(--parchment);
            line-height: 1.55;
        }
        .npc-testimony-item .quote-en {
            font-family: var(--ff-serif); font-style: italic;
            font-size: 11.5px; color: var(--parch-mute);
            line-height: 1.5; margin-top: 3px;
            opacity: .8;
        }
        .npc-testimony-item .quote-meta {
            font: 500 10px var(--ff-mono);
            color: var(--text-dim); margin-top: 6px;
            letter-spacing: .08em;
        }

        /* staggered entry for drawer content sections */
        .modal #modalContent > * {
            animation: drawerSectionIn .22s ease-out both;
        }
        .modal #modalContent > *:nth-child(1) { animation-delay: .12s; }
        .modal #modalContent > *:nth-child(2) { animation-delay: .16s; }
        .modal #modalContent > *:nth-child(3) { animation-delay: .20s; }
        .modal #modalContent > *:nth-child(4) { animation-delay: .24s; }
        .modal #modalContent > *:nth-child(n+5) { animation-delay: .28s; }
        @keyframes drawerSectionIn {
            from { opacity: 0; transform: translateX(10px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .art-highlight {
            background: rgba(232, 198, 120, 0.06);
            border: 1px solid var(--gold-2);
            border-left: 3px solid var(--gold);
            border-radius: 0;
            padding: 10px 14px;
            margin-top: 10px;
            color: var(--parchment);
            font-size: 12.5px;
            line-height: 1.6;
        }

        /* copy-tag (JS uses this class on clickable ID / path chips in modal) */
        .copy-tag {
            display: inline-flex; align-items: center; gap: 6px;
            font-family: var(--ff-mono);
            background: var(--coal-3);
            border: 1px solid var(--rule);
            color: var(--gold);
            padding: 3px 8px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 11px;
            letter-spacing: .04em;
            transition: border-color .15s ease-out, background .15s ease-out, transform .1s;
            vertical-align: baseline;
        }
        .copy-tag:hover { border-color: var(--gold-2); background: var(--ink); }
        .copy-tag:active { transform: scale(.98); }

        .derive-link {
            background: var(--coal-3);
            border: 1px solid var(--rule);
            border-left: 3px solid var(--gold-2);
            padding: 8px 12px;
            margin: 8px 0;
            border-radius: 0;
            cursor: pointer;
            color: var(--parch-mute);
            font-size: 12px;
            line-height: 1.5;
            transition: border-color .15s, background .15s, transform .15s ease-out;
        }
        .derive-link:hover {
            border-color: var(--gold-2);
            border-left-color: var(--gold);
            background: var(--ink);
            transform: translateX(2px);
        }

        .art-missing {
            background: color-mix(in srgb, var(--brick) 8%, transparent);
            border: 1px solid var(--brick-2);
            border-left: 3px solid var(--brick);
            border-radius: 0;
            padding: 10px 14px;
            margin-top: 10px;
            color: var(--brick);
            font-family: var(--ff-mono);
            font-size: 11.5px;
            letter-spacing: .04em;
        }

        /* ===== Expose rounds ===== */
        .expose-round {
            background: var(--ink);
            border: 1px solid var(--rule);
            border-left: 3px solid var(--brick);
            border-radius: 0;
            padding: 14px 16px;
            margin-bottom: 10px;
        }
        .round-title {
            font-family: var(--ff-serif);
            color: var(--brick);
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            letter-spacing: .02em;
        }
        .evidence-tag {
            display: inline-block;
            background: var(--coal-3);
            border: 1px solid var(--rule);
            color: var(--parchment);
            padding: 4px 10px;
            border-radius: 2px;
            margin: 3px;
            font-family: var(--ff-mono);
            font-size: 11px;
            letter-spacing: .04em;
        }

        /* ===== Phase Tags (noir outlined) ===== */
        .phase-tag {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 2px;
            font-family: var(--ff-mono);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: .06em;
            margin-right: 0.3rem;
            border: 1px solid currentColor;
            background: transparent;
        }
        .phase-tag.opening { color: #6ea3c8; }
        .phase-tag.free    { color: var(--success); }
        .phase-tag.expose  { color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent); }
        .phase-tag.ending  { color: #a280c4; }
        .phase-tag.events  { color: var(--warning); }
        .phase-tag.doubt   { color: var(--gold); background: color-mix(in srgb, var(--gold) 8%, transparent); }

        /* ===== Doubt Drawer (疑点详情浮层) ===== */
        .doubt-drawer-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--ff-mono);
            font-size: 11px;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--gold);
            padding-bottom: 6px;
            flex-shrink: 0;
        }
        .doubt-drawer-meta .doubt-label::before {
            content: '◆';
            margin-right: 6px;
            color: var(--gold);
        }
        .doubt-drawer-meta .doubt-progress {
            padding: 3px 10px;
            border: 1px solid var(--rule-2);
            border-radius: 999px;
            color: var(--parch-mute);
            font-family: var(--ff-mono);
            font-size: 10.5px;
            letter-spacing: .1em;
            background: transparent;
        }
        .doubt-drawer-meta .doubt-progress.done {
            color: var(--primary);
            border-color: var(--gold);
            background: var(--gold);
            font-weight: 600;
        }
        .doubt-drawer-title {
            font-family: var(--ff-serif);
            font-weight: 600;
            font-size: 19px;
            color: var(--parchment);
            line-height: 1.45;
            padding: 2px 0 14px;
            border-bottom: 1px solid var(--rule);
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        .doubt-cond-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .doubt-cond-row {
            display: grid;
            grid-template-columns: 18px 56px 88px 1fr 12px;
            align-items: center;
            gap: 12px;
            padding: 11px 4px;
            border-bottom: 1px dashed var(--rule);
            cursor: pointer;
            transition: background .15s;
        }
        .doubt-cond-row:hover { background: rgba(232,198,120,.04); }
        .doubt-cond-row .cond-icon {
            font-size: 13px;
            color: var(--text-faint);
            justify-self: center;
            line-height: 1;
        }
        .doubt-cond-row .cond-type {
            font-family: var(--ff-mono);
            font-size: 10.5px;
            letter-spacing: .12em;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .doubt-cond-row .cond-pid {
            font-family: var(--ff-mono);
            font-size: 11px;
            color: var(--gold-2);
            letter-spacing: .02em;
        }
        .doubt-cond-row .cond-name {
            color: var(--parch-mute);
            font-size: 12.5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .doubt-cond-row .cond-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--rule-2);
            justify-self: end;
        }
        .doubt-cond-row.sat .cond-icon { color: var(--gold); }
        .doubt-cond-row.sat .cond-name { color: var(--parchment); }
        .doubt-cond-row.sat .cond-dot  { background: var(--gold); box-shadow: 0 0 8px color-mix(in srgb, var(--gold) 60%, transparent); }
        .doubt-cond-row.item   .cond-icon::before { content: '◇'; }
        .doubt-cond-row.item.sat .cond-icon::before { content: '◆'; }
        .doubt-cond-row.testi  .cond-icon::before { content: '▤'; }
        .doubt-cond-row.testi.sat .cond-icon::before { content: '▦'; }
        .doubt-cond-row.rel    .cond-icon::before { content: '△'; }
        .doubt-cond-row.rel.sat .cond-icon::before { content: '▲'; }
        .doubt-cond-toolbar {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid var(--rule);
        }
        .doubt-cond-toolbar button {
            flex: 1;
            background: transparent;
            border: 1px solid var(--rule-2);
            color: var(--text-muted);
            padding: 6px 10px;
            font-size: 11px;
            font-family: var(--ff-mono);
            letter-spacing: .1em;
            cursor: pointer;
            transition: all .15s;
            border-radius: 2px;
        }
        .doubt-cond-toolbar button:hover {
            border-color: var(--gold-2);
            color: var(--gold);
        }
        .sidebar-item.doubt-item .badge.done {
            color: var(--gold);
            border-color: var(--gold-2);
            background: color-mix(in srgb, var(--gold) 8%, var(--coal-3));
        }
        /* ===== 疑点悬浮窗（当前任务面板，玩家游戏内的 CURRENT CASE） ===== */
        #doubtFloat {
            position: fixed;
            top: 120px;
            right: 20px;
            width: 268px;
            padding: 12px 14px 14px;
            background: linear-gradient(180deg, color-mix(in srgb, var(--gold) 4%, var(--secondary)) 0%, var(--secondary) 100%);
            border: 1px solid var(--rule-2);
            border-left: 2px solid var(--gold-2);
            box-shadow: 0 12px 40px -12px rgba(0,0,0,.75), 0 0 0 1px rgba(232,198,120,.04) inset;
            cursor: pointer;
            z-index: 50;
            transition: transform .18s, border-color .18s, box-shadow .18s;
            user-select: none;
        }
        #doubtFloat.doubt-float-hidden { display: none; }
        #doubtFloat:hover {
            transform: translateY(-1px);
            border-color: var(--gold);
            box-shadow: 0 14px 44px -10px rgba(0,0,0,.85), 0 0 0 1px rgba(232,198,120,.12) inset;
        }
        #doubtFloat .df-kicker {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--ff-mono);
            font-size: 10px;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: var(--gold);
            padding-bottom: 6px;
            border-bottom: 1px solid var(--rule);
        }
        #doubtFloat .df-kicker .df-label::before {
            content: '◆';
            margin-right: 6px;
        }
        #doubtFloat .df-target {
            font-family: var(--ff-serif);
            font-size: 14px;
            color: var(--parchment);
            font-weight: 500;
            line-height: 1.5;
            letter-spacing: .01em;
            margin-top: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        #doubtFloat .df-progress-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed var(--rule);
        }
        #doubtFloat .df-progress-label {
            font-family: var(--ff-mono);
            font-size: 10.5px;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--text-muted);
        }
        #doubtFloat .df-progress-pill {
            font-family: var(--ff-mono);
            font-size: 10.5px;
            letter-spacing: .1em;
            color: var(--parch-mute);
            padding: 2px 9px;
            border: 1px solid var(--rule-2);
            border-radius: 999px;
            background: var(--coal-3);
        }
        #doubtFloat.done {
            border-left-color: var(--gold);
        }
        #doubtFloat.done .df-progress-pill {
            color: var(--primary);
            background: var(--gold);
            border-color: var(--gold);
            font-weight: 600;
        }
        #doubtFloat .df-bar {
            height: 3px;
            background: var(--coal-3);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }
        #doubtFloat .df-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold-2), var(--gold));
            transition: width .24s ease-out;
        }
        #doubtFloat .df-hint {
            font-family: var(--ff-mono);
            font-size: 9.5px;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--text-faint);
            margin-top: 10px;
            text-align: right;
        }
        /* 收起按钮 */
        #doubtFloat .df-collapse-btn {
            position: absolute;
            top: 6px; right: 6px;
            width: 22px; height: 22px;
            background: transparent;
            border: 1px solid var(--rule);
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            font-size: 12px; line-height: 1;
            border-radius: 2px;
            display: inline-flex; align-items: center; justify-content: center;
            transition: color .15s, border-color .15s, transform .2s;
            z-index: 1;
        }
        #doubtFloat .df-collapse-btn:hover {
            color: var(--gold);
            border-color: var(--gold-2);
        }
        /* 默认隐藏迷你态 */
        #doubtFloat .df-mini { display: none; }
        /* 折叠状态：缩小、切换显示、按钮翻转为 ⌄ */
        #doubtFloat.collapsed {
            width: auto;
            padding: 6px 10px;
        }
        #doubtFloat.collapsed .df-body { display: none; }
        #doubtFloat.collapsed .df-mini {
            display: inline-flex; align-items: center; gap: 8px;
            padding-right: 26px; /* 给右上角的折叠按钮让位 */
            cursor: pointer;
        }
        #doubtFloat.collapsed .df-collapse-btn {
            transform: rotate(180deg);
        }
        #doubtFloat .df-mini-icon {
            color: var(--gold); font-size: 11px;
        }
        #doubtFloat .df-mini-label {
            font-family: var(--ff-mono); font-size: 10.5px;
            letter-spacing: .14em; text-transform: uppercase;
            color: var(--text-muted);
        }
        #doubtFloat .df-mini-pill {
            font-family: var(--ff-mono); font-size: 10.5px;
            letter-spacing: .1em; color: var(--parch-mute);
            padding: 1px 8px;
            border: 1px solid var(--rule-2); border-radius: 999px;
            background: var(--coal-3);
        }
        #doubtFloat.collapsed.done .df-mini-pill {
            color: var(--primary);
            background: var(--gold);
            border-color: var(--gold);
            font-weight: 600;
        }
        /* 列表模式下每张疑点卡片 */
        .doubt-list-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 2px 0 14px;
            border-bottom: 1px solid var(--rule);
            flex-shrink: 0;
        }
        .doubt-list-header .dl-title {
            font-family: var(--ff-serif);
            font-size: 20px;
            color: var(--parchment);
            font-weight: 600;
        }
        .doubt-list-header .dl-sub {
            font-family: var(--ff-mono);
            font-size: 10.5px;
            color: var(--text-muted);
            letter-spacing: .14em;
            text-transform: uppercase;
        }
        .doubt-list-empty {
            padding: 40px 10px;
            text-align: center;
            color: var(--text-muted);
            font-size: 12.5px;
        }
        .doubt-card {
            padding: 12px 14px;
            border: 1px solid var(--rule);
            border-left: 2px solid var(--rule-2);
            background: color-mix(in srgb, var(--gold) 2%, var(--coal-3));
            margin-bottom: 10px;
            transition: border-color .15s;
        }
        .doubt-card.done {
            border-left-color: var(--gold);
            background: color-mix(in srgb, var(--gold) 5%, var(--coal-3));
        }
        .doubt-card .doubt-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--ff-mono);
            font-size: 10.5px;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--gold);
            padding-bottom: 6px;
        }
        .doubt-card .doubt-card-meta .doubt-label::before {
            content: '◆';
            margin-right: 6px;
            color: var(--gold);
        }
        .doubt-card .doubt-card-meta .doubt-progress {
            padding: 2px 9px;
            border: 1px solid var(--rule-2);
            border-radius: 999px;
            color: var(--parch-mute);
            font-size: 10.5px;
        }
        .doubt-card.done .doubt-card-meta .doubt-progress {
            color: var(--primary);
            background: var(--gold);
            border-color: var(--gold);
            font-weight: 600;
        }
        .doubt-card .doubt-card-title {
            font-family: var(--ff-serif);
            font-weight: 600;
            font-size: 15.5px;
            color: var(--parchment);
            line-height: 1.45;
            margin: 4px 0 8px;
        }

        .sidebar-item.locked,
        .sidebar-item.closed {
            flex-wrap: wrap;
            align-items: flex-start;
        }
        .sidebar-item.locked > div,
        .sidebar-item.closed > div {
            flex-basis: 100%;
            padding-left: 24px;
            white-space: normal;
            line-height: 1.4;
        }
        .sidebar-item.locked {
            color: var(--locked);
            cursor: help;
        }
        .sidebar-item.locked:hover { background: rgba(232,198,120,.02); }
        .sidebar-item.locked:hover::before { transform: scaleY(1); background: var(--locked); }
        .sidebar-item.closed {
            color: var(--text-faint);
            opacity: 0.55;
            cursor: default;
            text-decoration: line-through;
            text-decoration-color: var(--text-faint);
        }
        .sidebar-item.closed:hover { background: none; }
        .sidebar-item.closed:hover::before { transform: scaleY(0); }

        /* ===== Dialog Box (noir film subtitle look) ===== */
        .dialog-box {
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 840px;
            background: rgba(10, 10, 10, 0.92);
            border: 1px solid var(--gold-2);
            border-radius: 0;
            padding: 14px 18px;
            display: flex;
            gap: 14px;
            z-index: 10;
            backdrop-filter: blur(6px);
            box-shadow: 0 24px 40px -16px rgba(0,0,0,.85), 0 0 0 1px rgba(232,198,120,.08) inset;
        }
        .dialog-box::before {
            content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
            background: var(--gold-2); opacity: .6;
        }

        #dlg-fallback-container .dialog-box {
            position: relative;
            bottom: auto; left: auto;
            transform: none;
            width: 100%; max-width: 100%;
