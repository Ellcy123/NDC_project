<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDC Flow Blueprint</title>
    <style>
        :root {
            --bg: #0b0c0d;
            --panel: #15181c;
            --panel2: #1f252c;
            --line: #303842;
            --text: #f0efe9;
            --muted: #9ca5ad;
            --gold: #d6b56d;
            --red: #b8433d;
            --blue: #6094b5;
            --green: #72a77e;
            --violet: #9a83b5;
            --orange: #c78a3b;
            --mono: "Cascadia Mono", Consolas, monospace;
            --sans: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }
        button, input, select { font: inherit; color: inherit; }
        button, .link-btn, .file-label {
            border: 1px solid var(--line);
            border-radius: 6px;
            background: var(--panel2);
            padding: 7px 10px;
            cursor: pointer;
            color: var(--text);
            text-decoration: none;
        }
        button:hover, .link-btn:hover, .file-label:hover { border-color: var(--gold); color: var(--gold); }
        .file-label input { display: none; }
        .app { height: 100%; display: grid; grid-template-rows: 58px 1fr 30px; }
        header {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 16px;
            padding: 0 14px;
            background: #111317;
            border-bottom: 2px solid #74302e;
        }
        .brand { color: var(--gold); font-weight: 900; white-space: nowrap; letter-spacing: 0; }
        .status { color: var(--muted); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
        select, input[type="search"] {
            min-width: 120px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #0f1215;
            padding: 8px 9px;
            outline: none;
        }
        input[type="search"] { min-width: 260px; }
        main { min-height: 0; display: grid; grid-template-columns: 300px 1fr 390px; }
        aside, .inspector { min-height: 0; overflow: auto; background: var(--panel); }
        aside { border-right: 1px solid var(--line); }
        .inspector { border-left: 1px solid var(--line); }
        .block { padding: 14px; border-bottom: 1px solid var(--line); }
        .block-title { color: var(--gold); font-size: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
        .hint { color: var(--muted); font-size: 12px; line-height: 1.55; }
        .metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .metric { border: 1px solid var(--line); border-radius: 8px; padding: 9px; background: rgba(255,255,255,.025); }
        .metric strong { display: block; font-family: var(--mono); color: var(--text); font-size: 18px; }
        .metric span { color: var(--muted); font-size: 11px; }
        .type-list, .edge-list, .preset-list { display: grid; gap: 7px; }
        .preset-list { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .preset-btn { padding: 8px 6px; font-size: 12px; text-align: center; }
        .preset-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(214,181,109,.08); }
        .type-row { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; }
        .type-row input { width: auto; }
        .mini { padding: 8px; border: 1px solid var(--line); border-radius: 7px; background: rgba(255,255,255,.025); font-size: 12px; color: var(--muted); }
        .workspace {
            position: relative;
            min-width: 0;
            min-height: 0;
            overflow: auto;
            background:
                radial-gradient(circle at 0 0, rgba(214,181,109,.07), transparent 280px),
                linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.028) 1px, transparent 1px);
            background-size: 28px 28px;
        }
        .graph { position: relative; min-width: 1600px; min-height: 900px; }
        #edges { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }
        .lane-label {
            position: absolute;
            top: 12px;
            color: rgba(240,239,233,.28);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            pointer-events: none;
        }
        .node {
            position: absolute;
            width: 220px;
            min-height: 76px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: linear-gradient(180deg, #1b2026, #15191e);
            box-shadow: 0 12px 28px rgba(0,0,0,.28);
            padding: 10px;
            cursor: pointer;
        }
        .node:hover, .node.selected { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(214,181,109,.13), 0 12px 28px rgba(0,0,0,.32); }
        .node.loop { border-color: rgba(214,181,109,.72); }
        .node.goal { border-color: rgba(199,138,59,.72); }
        .node.avg { border-color: rgba(114,167,126,.58); }
        .node.scene { border-color: rgba(96,148,181,.58); }
        .node.evidence { border-color: rgba(154,131,181,.58); }
        .node.doubt { border-color: rgba(184,67,61,.7); }
        .node.expose { border-color: rgba(199,138,59,.8); }
        .node-type { display: flex; justify-content: space-between; gap: 8px; color: var(--muted); font-size: 11px; text-transform: uppercase; margin-bottom: 7px; }
        .node-title { font-weight: 850; line-height: 1.25; word-break: break-word; }
        .node-sub { color: var(--muted); font-size: 12px; margin-top: 6px; line-height: 1.25; max-height: 34px; overflow: hidden; }
        .pill { display: inline-block; border: 1px solid var(--line); border-radius: 999px; padding: 2px 7px; color: var(--muted); font-size: 12px; margin: 2px; }
        .kv { display: grid; grid-template-columns: 92px 1fr; gap: 8px; padding: 12px 14px; }
        .kv .key { color: var(--muted); }
        .mono { font-family: var(--mono); }
        .muted { color: var(--muted); }
        pre { margin: 0; white-space: pre-wrap; word-break: break-word; font-family: var(--mono); font-size: 12px; color: var(--muted); }
        footer { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; border-top: 1px solid var(--line); color: var(--muted); font-size: 12px; background: #111317; }
    </style>
</head>
<body>
<div class="app">
    <header>
        <div class="brand">NDC 剧情流程图</div>
        <div class="status" id="status">正在读取流程蓝图...</div>
        <div class="toolbar">
            <select id="loopSelect"></select>
            <input id="search" type="search" placeholder="搜索流程节点 / ID / 文本">
            <button id="resetBtn">重排</button>
            <a class="link-btn" href="./formal_blueprint.html">配置关系图</a>
            <a class="link-btn" href="./blueprint_editor.html">草稿蓝图</a>
            <label class="file-label">导入流程<input id="graphFile" type="file" accept=".json,application/json"></label>
        </div>
    </header>
    <main>
        <aside>
            <div class="block">
                <div class="block-title">流程概览</div>
                <div class="metric-grid" id="metrics"></div>
                <div class="hint" style="margin-top:10px">默认按单个 Loop 展示，Talk 会聚合成 AVG / 事件段，不展开到每句对白。</div>
            </div>
            <div class="block">
                <div class="block-title">视图层级</div>
                <div class="preset-list">
                    <button class="preset-btn active" data-preset="core">核心</button>
                    <button class="preset-btn" data-preset="scene">场景</button>
                    <button class="preset-btn" data-preset="all">全量</button>
                </div>
            </div>
            <div class="block">
                <div class="block-title">节点类型</div>
                <div class="type-list" id="typeFilters"></div>
            </div>
            <div class="block">
                <div class="block-title">当前可见</div>
                <div class="edge-list" id="visibleSummary"></div>
            </div>
        </aside>
        <section class="workspace">
            <div class="graph" id="graph">
                <svg id="edges"></svg>
                <div id="nodes"></div>
            </div>
        </section>
        <section class="inspector">
            <div class="block">
                <div class="block-title">节点详情</div>
                <div id="details" class="muted">请选择一个流程节点。</div>
            </div>
            <div class="block">
                <div class="block-title">关联流程</div>
                <div class="edge-list" id="edgeDetails"></div>
            </div>
        </section>
    </main>
    <footer>
        <span id="footerLeft">Flow graph</span>
        <span>流程顺序视图：核心流程默认折叠证据与场景，配置排错请打开“配置关系图”</span>
    </footer>
</div>

<script>
const graphUrls = [
    "data/formal/flow_blueprint.json",
    "/preview_new2/data/formal/flow_blueprint.json",
    "/NDC_project/preview_new2/data/formal/flow_blueprint.json"
];
const typeLabels = {
    loop: "Loop",
    goal: "目标",
    avg: "AVG/事件段",
    scene: "场景",
    evidence: "关键证据",
    doubt: "疑点",
    expose: "指证"
};
const typeOrder = ["loop", "goal", "avg", "scene", "evidence", "doubt", "expose"];
const presets = {
    core: ["loop", "goal", "avg", "doubt", "expose"],
    scene: ["loop", "goal", "avg", "scene", "doubt", "expose"],
    all: typeOrder
};
const S = { graph: null, loop: "loop1", search: "", visibleTypes: new Set(presets.core), preset: "core", selected: null, positioned: [] };
function $(id) { return document.getElementById(id); }
function esc(value) { return String(value ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
function short(value, n = 120) { const text = String(value ?? ""); return text.length > n ? text.slice(0, n - 1) + "…" : text; }
function loopLabel(loop) { return loop === "all" ? "全部 Loop（调试）" : loop.replace("loop", "Loop "); }
function loopNumber(loop) { const m = String(loop).match(/\d+/); return m ? Number(m[0]) : 999; }

async function loadGraph() {
    let lastError = null;
    for (const url of graphUrls) {
        try {
            const res = await fetch(`${url}?t=${Date.now()}`);
            if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
            S.graph = await res.json();
            $("status").textContent = `已读取 ${url} · ${S.graph.generatedAt}`;
            initControls();
            render();
            return;
        } catch (err) { lastError = err; }
    }
    $("status").textContent = `未能自动读取流程蓝图，可手动导入 flow_blueprint.json。${lastError?.message || ""}`;
    initControls();
}
function initControls() {
    const loops = new Set(["all"]);
    (S.graph?.nodes || []).forEach(n => { if (n.type === "loop" && n.loop) loops.add(n.loop); });
    const orderedLoops = [...loops].sort((a, b) => a === "all" ? 1 : b === "all" ? -1 : loopNumber(a) - loopNumber(b));
    if (!orderedLoops.includes(S.loop)) S.loop = orderedLoops.find(loop => loop !== "all") || "all";
    $("loopSelect").innerHTML = orderedLoops
        .map(loop => `<option value="${esc(loop)}">${esc(loopLabel(loop))}</option>`).join("");
    $("loopSelect").value = S.loop;
    $("typeFilters").innerHTML = typeOrder.map(type => {
        const count = S.graph?.summary?.nodeTypes?.[type] || 0;
        return `<label class="type-row"><input type="checkbox" data-type="${esc(type)}" ${S.visibleTypes.has(type) ? "checked" : ""}><span>${esc(typeLabels[type] || type)}</span><span class="mono">${count}</span></label>`;
    }).join("");
    renderPresetButtons();
}
function nodeMatchesView(node) {
    if (!S.visibleTypes.has(node.type)) return false;
    if (!S.search) return true;
    return JSON.stringify(node).toLowerCase().includes(S.search.toLowerCase());
}
function nodeMatchesLoop(node) {
    return S.loop === "all" || node.loop === S.loop || node.id === `loop:${S.loop}`;
}
function filteredNodes() {
    const candidates = (S.graph.nodes || []).filter(nodeMatchesView);
    if (S.loop === "all") return candidates;
    const candidateMap = new Map(candidates.map(node => [node.id, node]));
    const visibleIds = new Set(candidates.filter(nodeMatchesLoop).map(node => node.id));
    let changed = true;
    let rounds = 0;
    while (changed && rounds < 4) {
        changed = false;
        rounds += 1;
        for (const edge of S.graph.edges || []) {
            if (visibleIds.has(edge.from) && candidateMap.has(edge.to) && !visibleIds.has(edge.to)) {
                visibleIds.add(edge.to);
                changed = true;
            }
            if (visibleIds.has(edge.to) && candidateMap.has(edge.from) && !visibleIds.has(edge.from) && edge.type !== "scene_evidence") {
                visibleIds.add(edge.from);
                changed = true;
            }
        }
    }
    return candidates.filter(node => visibleIds.has(node.id));
}
function edgeVisible(edge, nodeMap) { return nodeMap.has(edge.from) && nodeMap.has(edge.to); }
function layoutNodes(nodes) {
    const activeTypes = typeOrder.filter(type => S.visibleTypes.has(type) && nodes.some(node => node.type === type));
    const lanes = new Map(activeTypes.map((type, i) => [type, { x: 30 + i * 270, y: 54 }]));
    const maxLane = Math.max(1, activeTypes.length);
    $("graph").style.minWidth = `${Math.max(1220, 60 + maxLane * 270)}px`;
    return nodes.map(node => {
        const lane = lanes.get(node.type) || { x: 30, y: 34 };
        const out = { ...node, x: lane.x, y: lane.y };
        lane.y += node.type === "avg" ? 122 : 108;
        return out;
    });
}
function render() {
    if (!S.graph) return;
    const visible = filteredNodes();
    S.positioned = layoutNodes(visible);
    const nodeMap = new Map(S.positioned.map(n => [n.id, n]));
    const edges = (S.graph.edges || []).filter(e => edgeVisible(e, nodeMap));
    renderMetrics(visible, edges);
    renderVisibleSummary(visible);
    renderNodes(S.positioned);
    renderEdges(edges, nodeMap);
    renderLanes(S.positioned);
    renderInspector();
    $("footerLeft").textContent = `${visible.length} nodes · ${edges.length} edges`;
}
function renderMetrics(nodes, edges) {
    $("metrics").innerHTML = [
        ["总节点", S.graph?.summary?.nodes || 0],
        ["总边", S.graph?.summary?.edges || 0],
        ["可见节点", nodes.length],
        ["可见边", edges.length]
    ].map(([label, value]) => `<div class="metric"><strong>${esc(value)}</strong><span>${esc(label)}</span></div>`).join("");
}
function renderVisibleSummary(nodes) {
    const byType = {};
    nodes.forEach(n => byType[n.type] = (byType[n.type] || 0) + 1);
    $("visibleSummary").innerHTML = Object.entries(byType)
        .sort((a, b) => typeOrder.indexOf(a[0]) - typeOrder.indexOf(b[0]))
        .map(([type, count]) => `<div class="mini">${esc(typeLabels[type] || type)} <span class="mono">${count}</span></div>`).join("") || `<div class="mini">没有匹配节点</div>`;
}
function renderLanes(nodes) {
    const activeTypes = typeOrder.filter(type => S.visibleTypes.has(type) && nodes.some(node => node.type === type));
    const labels = activeTypes.map((type, i) => `<div class="lane-label" style="left:${30 + i * 270}px">${esc(typeLabels[type] || type)}</div>`).join("");
    $("nodes").insertAdjacentHTML("afterbegin", labels);
    const maxY = nodes.reduce((acc, node) => Math.max(acc, node.y + 140), 900);
    $("graph").style.minHeight = `${maxY}px`;
}
function renderNodes(nodes) {
    $("nodes").innerHTML = nodes.map(n => `
        <div class="node ${esc(n.type)} ${S.selected === n.id ? "selected" : ""}" data-id="${esc(n.id)}" style="left:${n.x}px;top:${n.y}px">
            <div class="node-type"><span>${esc(typeLabels[n.type] || n.type)}</span><span class="mono">${esc(n.key || "")}</span></div>
            <div class="node-title">${esc(short(n.label, 58))}</div>
            <div class="node-sub">${esc(short(n.subtitle || "", 80))}</div>
        </div>
    `).join("");
}
function renderEdges(edges, nodeMap) {
    const paths = edges.map(edge => {
        const a = nodeMap.get(edge.from), b = nodeMap.get(edge.to);
        if (!a || !b) return "";
        const x1 = a.x + 220, y1 = a.y + 38, x2 = b.x, y2 = b.y + 38;
        const mx = Math.max(48, Math.abs(x2 - x1) * 0.42);
        return `<path d="M${x1},${y1} C${x1 + mx},${y1} ${x2 - mx},${y2} ${x2},${y2}" fill="none" stroke="${edgeColor(edge.type)}" stroke-width="1.5" opacity=".64" marker-end="url(#arrow)"></path>`;
    }).join("");
    $("edges").innerHTML = `<defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="rgba(214,181,109,.68)"></path></marker></defs>${paths}`;
}
function edgeColor(type) {
    if (type.includes("doubt")) return "rgba(184,67,61,.78)";
    if (type.includes("expose")) return "rgba(199,138,59,.78)";
    if (type.includes("avg")) return "rgba(114,167,126,.68)";
    if (type.includes("scene")) return "rgba(96,148,181,.7)";
    return "rgba(214,181,109,.58)";
}
function renderInspector() {
    const node = (S.graph?.nodes || []).find(n => n.id === S.selected);
    if (!node) {
        $("details").innerHTML = `<span class="muted">请选择一个流程节点。</span>`;
        $("edgeDetails").innerHTML = "";
        return;
    }
    $("details").innerHTML = `<div class="kv">
        <div class="key">类型</div><div>${esc(typeLabels[node.type] || node.type)}</div>
        <div class="key">ID</div><div class="mono">${esc(node.key || node.id)}</div>
        <div class="key">Loop</div><div>${esc(node.loop || "全局")}</div>
        <div class="key">表</div><div class="mono">${esc(node.table || "")}</div>
        <div class="key">标题</div><div>${esc(node.label || "")}</div>
        <div class="key">副标题</div><div>${esc(node.subtitle || "")}</div>
    </div><div class="block-title" style="padding:0 14px 8px">Meta</div><div style="padding:0 14px 14px"><pre>${esc(JSON.stringify(node.meta || {}, null, 2))}</pre></div>`;
    const related = (S.graph.edges || []).filter(e => e.from === node.id || e.to === node.id).slice(0, 120);
    $("edgeDetails").innerHTML = related.map(edge => {
        const other = edge.from === node.id ? edge.to : edge.from;
        return `<div class="mini"><div><span class="pill">${esc(edge.type)}</span> ${esc(edge.label || "")}</div><div class="mono">${esc(edge.from === node.id ? "→" : "←")} ${esc(other)}</div></div>`;
    }).join("") || `<div class="mini">暂无关联流程</div>`;
}
function applyPreset(name) {
    S.preset = name;
    S.visibleTypes = new Set(presets[name] || presets.core);
    document.querySelectorAll("#typeFilters input[data-type]").forEach(input => {
        input.checked = S.visibleTypes.has(input.dataset.type);
    });
    renderPresetButtons();
    render();
}
function renderPresetButtons() {
    document.querySelectorAll(".preset-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.preset === S.preset);
    });
}
$("loopSelect").addEventListener("change", e => { S.loop = e.target.value; render(); });
$("search").addEventListener("input", e => { S.search = e.target.value.trim(); render(); });
$("typeFilters").addEventListener("change", e => {
    const type = e.target?.dataset?.type;
    if (!type) return;
    if (e.target.checked) S.visibleTypes.add(type);
    else S.visibleTypes.delete(type);
    S.preset = "custom";
    renderPresetButtons();
    render();
});
document.querySelectorAll(".preset-btn").forEach(btn => {
    btn.addEventListener("click", () => applyPreset(btn.dataset.preset));
});
$("nodes").addEventListener("click", e => {
    const el = e.target.closest(".node");
    if (!el) return;
    S.selected = el.dataset.id;
    render();
});
$("resetBtn").addEventListener("click", render);
$("graphFile").addEventListener("change", e => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
        S.graph = JSON.parse(reader.result);
        $("status").textContent = `已导入 ${file.name}`;
        initControls();
        render();
    };
    reader.readAsText(file, "utf-8");
});
loadGraph();
</script>
</body>
</html>
