<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base href="file:///D:/NDC_project/output/pitch_deck/">
  <style>

    :root {
      --charcoal: #10100f;
      --ink: #f4efe6;
      --muted: #b9afa2;
      --paper: #e6dcc6;
      --red: #9f2f35;
      --brass: #c79a4b;
      --green: #637a62;
      --line: rgba(244, 239, 230, 0.22);
      --veil: rgba(10, 10, 10, 0.66);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--charcoal);
      color: var(--ink);
      font-family: "Noto Serif SC", "Source Han Serif SC", "Microsoft YaHei", system-ui, sans-serif;
      letter-spacing: 0;
    }

    body {
      overflow: hidden;
    }

    button {
      font: inherit;
    }

    .deck {
      width: 100vw;
      height: 100vh;
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      background: #0d0d0c;
    }

    .deck::-webkit-scrollbar {
      height: 8px;
    }

    .deck::-webkit-scrollbar-track {
      background: #171615;
    }

    .deck::-webkit-scrollbar-thumb {
      background: #6d4c3c;
    }

    .slide {
      position: relative;
      flex: 0 0 100vw;
      height: 100vh;
      overflow: hidden;
      scroll-snap-align: start;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(420px, 0.92fr);
      background: var(--charcoal);
    }

    .slide::after {
      content: attr(data-number);
      position: absolute;
      top: 28px;
      right: 36px;
      color: rgba(244, 239, 230, 0.54);
      font-size: 0.82rem;
      z-index: 4;
    }

    .cover {
      display: block;
    }

    .cover .hero-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cover .scrim {
      position: absolute;
      inset: 0;
      background: rgba(7, 7, 8, 0.52);
    }

    .cover-copy {
      position: relative;
      z-index: 2;
      min-height: 100%;
      width: min(760px, calc(100vw - 112px));
      padding: 92px 56px 72px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--brass);
      font-size: 0.9rem;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 4.6rem;
      line-height: 1.04;
      font-weight: 700;
    }

    h2 {
      margin-bottom: 28px;
      color: var(--paper);
      font-size: 2rem;
      line-height: 1.12;
      font-weight: 500;
    }

    h3 {
      margin-bottom: 24px;
      font-size: 2.75rem;
      line-height: 1.12;
      font-weight: 700;
    }

    p {
      color: var(--muted);
      font-size: 1.18rem;
      line-height: 1.82;
    }

    strong {
      color: var(--ink);
      font-weight: 700;
    }

    .copy {
      position: relative;
      z-index: 2;
      padding: 82px 72px 74px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .copy.compact {
      padding-top: 60px;
      padding-bottom: 54px;
    }

    .media {
      position: relative;
      min-width: 0;
      min-height: 0;
      background: #161412;
      overflow: hidden;
    }

    .media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .media.contain {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 42px;
      background: #171513;
    }

    .media.contain img {
      height: auto;
      max-height: 78vh;
      object-fit: contain;
      border: 1px solid rgba(244, 239, 230, 0.16);
    }

    .interface-slide {
      grid-template-columns: minmax(340px, 0.52fr) minmax(0, 1.48fr);
    }

    .interface-slide .copy {
      padding: 72px 48px 64px;
    }

    .interface-slide h3 {
      font-size: 2.65rem;
    }

    .interface-points {
      display: grid;
      gap: 16px;
      margin-top: 28px;
    }

    .interface-points p {
      margin: 0;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.62;
    }

    .interface-points b {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
      font-size: 1.04rem;
    }

    .media.ui-shot {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background: #11100f;
    }

    .media.ui-shot img {
      width: 100%;
      height: auto;
      max-height: calc(100vh - 56px);
      object-fit: contain;
      border: 1px solid rgba(244, 239, 230, 0.18);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.42);
    }

    .media.ui-shot::after {
      background: none;
    }

    .thesis-slide {
      display: block;
      background: #0d0d0c;
    }

    .thesis-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
    }

    .thesis-shade {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(10, 10, 10, 0.94) 0%, rgba(10, 10, 10, 0.82) 34%, rgba(10, 10, 10, 0.22) 66%, rgba(10, 10, 10, 0.1) 100%),
        linear-gradient(0deg, rgba(10, 10, 10, 0.38), rgba(10, 10, 10, 0.08));
    }

    .thesis-copy {
      position: relative;
      z-index: 2;
      width: min(780px, 58vw);
      min-height: 100%;
      padding: 92px 64px 86px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .thesis-copy h3 {
      font-size: 4rem;
      line-height: 1.08;
    }

    .thesis-copy .lede {
      max-width: 720px;
    }

    .thesis-copy p:not(.eyebrow) {
      max-width: 720px;
      color: var(--ink);
      font-size: 1.35rem;
      line-height: 1.75;
    }

    .media::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.18);
      pointer-events: none;
    }

    .accent {
      display: block;
      width: 64px;
      height: 3px;
      margin-bottom: 24px;
      background: var(--red);
    }

    .lede {
      max-width: 820px;
      color: var(--ink);
      font-size: 1.45rem;
      line-height: 1.7;
    }

    .small {
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.68;
    }

    .tagline {
      max-width: 720px;
      color: var(--paper);
      font-size: 1.28rem;
      line-height: 1.7;
    }

    .two-column {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
      margin-top: 28px;
    }

    .note {
      border-top: 1px solid var(--line);
      padding-top: 18px;
    }

    .note h4 {
      margin: 0 0 10px;
      color: var(--paper);
      font-size: 1.08rem;
      line-height: 1.4;
      font-weight: 700;
    }

    .note p {
      margin-bottom: 0;
      font-size: 0.98rem;
      line-height: 1.66;
    }

    .process {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      padding: 0;
      margin: 30px 0 0;
    }

    .process li {
      min-height: 132px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      background: rgba(230, 220, 198, 0.055);
    }

    .process b {
      display: block;
      margin-bottom: 9px;
      color: var(--brass);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .process span {
      color: var(--ink);
      font-size: 1rem;
      line-height: 1.55;
    }

    .quote {
      border-left: 4px solid var(--red);
      padding-left: 24px;
      max-width: 760px;
    }

    .quote p {
      color: var(--ink);
      font-size: 1.48rem;
      line-height: 1.72;
    }

    .business-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 28px;
    }

    .business-point {
      min-height: 142px;
      border-top: 1px solid var(--line);
      padding: 18px 18px 0 0;
    }

    .business-point h4 {
      margin: 0 0 10px;
      color: var(--ink);
      font-size: 1.08rem;
      line-height: 1.42;
      font-weight: 700;
    }

    .business-point p {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.66;
    }

    .history-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px 24px;
      margin-top: 28px;
    }

    .history-point {
      border-left: 3px solid rgba(199, 154, 75, 0.72);
      padding-left: 16px;
    }

    .history-point h4 {
      margin: 0 0 9px;
      color: var(--paper);
      font-size: 1.04rem;
      line-height: 1.38;
    }

    .history-point p {
      margin: 0;
      font-size: 0.94rem;
      line-height: 1.62;
    }

    .mosaic {
      display: grid;
      grid-template-columns: 1.18fr 0.82fr;
      grid-template-rows: 1fr 1fr;
      gap: 12px;
      height: 100%;
      padding: 42px;
      background: #131210;
    }

    .mosaic img {
      width: 100%;
      height: 100%;
      min-height: 0;
      object-fit: cover;
      border: 1px solid rgba(244, 239, 230, 0.14);
    }

    .mosaic img:first-child {
      grid-row: span 2;
    }

    .art-wall {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr 0.85fr;
      grid-template-rows: repeat(3, minmax(0, 1fr));
      gap: 12px;
      height: 100%;
      padding: 34px;
      background: #11100f;
    }

    .art-wall img {
      width: 100%;
      height: 100%;
      min-height: 0;
      object-fit: cover;
      display: block;
      border: 1px solid rgba(244, 239, 230, 0.14);
    }

    .art-wall img:first-child {
      grid-row: span 2;
    }

    .art-wall img:nth-child(4) {
      grid-column: span 2;
    }

    .closing {
      display: block;
      background: #0d0d0c;
    }

    .closing img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.46;
    }

    .closing::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background: rgba(9, 8, 8, 0.62);
    }

    .closing-copy {
      position: relative;
      z-index: 2;
      width: min(850px, calc(100vw - 112px));
      min-height: 100%;
      padding: 86px 56px 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .controls {
      position: fixed;
      right: 28px;
      bottom: 24px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .controls button {
      width: 44px;
      height: 44px;
      border: 1px solid rgba(244, 239, 230, 0.38);
      border-radius: 50%;
      color: var(--ink);
      background: rgba(12, 12, 12, 0.72);
      cursor: pointer;
    }

    .controls button:hover {
      border-color: var(--brass);
      color: var(--brass);
    }

    .counter {
      min-width: 64px;
      color: rgba(244, 239, 230, 0.72);
      font-size: 0.86rem;
      text-align: center;
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .deck {
        height: auto;
        min-height: 100vh;
        overflow-x: hidden;
        overflow-y: visible;
        display: block;
      }

      .slide {
        width: 100vw;
        min-height: 100vh;
        height: auto;
        display: flex;
        flex-direction: column;
      }

      .slide::after {
        top: 18px;
        right: 20px;
      }

      .media {
        min-height: 42vh;
      }

      .media.contain {
        min-height: 48vh;
        padding: 22px;
      }

      .media.ui-shot {
        min-height: 48vh;
        padding: 16px;
      }

      .interface-slide h3 {
        font-size: 2.1rem;
      }

      .thesis-copy {
        width: auto;
        min-height: 100vh;
        padding: 64px 26px 70px;
      }

      .thesis-copy h3 {
        font-size: 2.5rem;
      }

      .thesis-copy p:not(.eyebrow) {
        font-size: 1.08rem;
      }

      .copy,
      .copy.compact {
        padding: 50px 26px 62px;
      }

      .cover-copy,
      .closing-copy {
        width: auto;
        min-height: 100vh;
        padding: 64px 26px 70px;
      }

      h1 {
        font-size: 3.05rem;
      }

      h2 {
        font-size: 1.45rem;
      }

      h3 {
        font-size: 2.05rem;
      }

      p,
      .lede,
      .tagline,
      .quote p {
        font-size: 1.06rem;
      }

      .two-column,
      .process,
      .business-grid,
      .history-grid {
        grid-template-columns: 1fr;
      }

      .mosaic {
        min-height: 72vh;
        grid-template-columns: 1fr;
        grid-template-rows: repeat(3, 1fr);
        padding: 20px;
      }

      .mosaic img:first-child {
        grid-row: span 1;
      }

      .art-wall {
        min-height: 92vh;
        grid-template-columns: 1fr;
        grid-template-rows: repeat(7, minmax(132px, 1fr));
        padding: 20px;
      }

      .art-wall img:first-child,
      .art-wall img:nth-child(4) {
        grid-column: span 1;
        grid-row: span 1;
      }

      .controls {
        display: none;
      }
    }

    @media print {
      body {
        overflow: visible;
        background: #fff;
      }

      .deck {
        display: block;
        height: auto;
        overflow: visible;
      }

      .slide {
        width: 100vw;
        height: 100vh;
        page-break-after: always;
      }

      .controls {
        display: none;
      }
    }
  
html, body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
}
body {
  margin: 0;
}
.deck {
  width: 100vw;
  height: 100vh;
  display: block;
  overflow: hidden;
}
.slide {
  width: 100vw;
  height: 100vh;
  flex: none;
}
.controls {
  display: none !important;
}
  </style>
</head>
<body>
  <main class="deck">
<section class="slide thesis-slide" data-number="06 / 11">
      <img class="thesis-bg" src="assets/blue_moon_latenight.png" alt="Blue Moon 深夜案发氛围">
      <div class="thesis-shade"></div>
      <div class="thesis-copy">
        <span class="accent"></span>
        <p class="eyebrow">Core Thesis</p>
        <h3>带血的正义</h3>
        <p class="lede">在这座城市，光亮照不到真相，信任只会换来背叛。</p>
        <p>当无人可以依靠，你唯有自己定义正义—— 那是属于你一个人的，带血的正义。</p>
      </div>
    </section>
  </main>
</body>
</html>
